worthiness","d":3,"q":"AD vs Service Bulletin (SB):","o":["No difference","ADs are mandatory by law; SBs are recommendations unless mandated by an AD","SBs are more important","ADs are optional"],"c":1,"x":"AD = law. SB = manufacturer recommendation. Some ADs reference specific SBs as the mandatory compliance method."},{"e":"REGS","t":"Airworthiness","d":4,"q":"A part installed on a type-certificated aircraft must have records documenting that:","o":["It was purchased from a reputable store","The product, part, or material meets airworthiness standards","The manufacturer is a well-known company","It passed a visual inspection by the installer"],"c":1,"x":"Per CARs, every part must have documentation proving it meets airworthiness standards \u2014 authorized release certificate, conformity documentation. The installer is responsible for verifying."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"A maintenance release certifies:","o":["Aircraft can be sold","Work performed per applicable standards and aircraft airworthy for that work","It's a work order","Parts were ordered"],"c":1,"x":"Your signature = your licence on the line. Legal certification of airworthiness."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"An AMO requires:","o":["10+ employees","TC certificate, QA program, and maintenance policy manual","Business licence only","Manufacturer approval only"],"c":1,"x":"Per CAR 573: TC cert, quality assurance, MPM, qualified personnel, proper facilities/tooling."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Elementary work may be done by:","o":["Anyone unsupervised","Aircraft owner/operator for specific CARs-listed tasks","Licensed AME only","AMO only"],"c":1,"x":"CAR 625 Appendix A lists permitted tasks: oil change, tire replacement, basic inspections, etc."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"After maintenance, records must be entered in:","o":["Personal logbook only","Aircraft technical records","TC database only","Operator's filing system only"],"c":1,"x":"All maintenance in aircraft tech records: work description, date, data reference, signed release."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Specialized maintenance includes:","o":["Oil changes","NDT, welding, composite repair requiring specific training/equipment","All routine servicing","Tire changes"],"c":1,"x":"Per CAR 571.10. Requires certified personnel with specific qualifications beyond basic AME training."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"An AME discovers a crack in a primary structural member during inspection. Required action:","o":["Monitor during next 100 hours","Ground aircraft, record defect, repair using approved data before release","Report verbally to pilot","Apply temporary doubler and release"],"c":1,"x":"Primary structure crack = no-fly. Ground, document, repair with approved data (SRM or TC-approved scheme). Never release an aircraft with a known structural defect."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Life-limited part at its limit must be:","o":["Overhauled and returned to service","Permanently removed from service","Recertified by manufacturer","Inspected for extension"],"c":1,"x":"Permanently retired. No exceptions, no overhauls, no extensions. Destroyed or marked unserviceable."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Serviceable parts require:","o":["Retail receipt","Approved source with airworthiness documentation","Any shop receipt","Original aircraft provenance"],"c":1,"x":"Authorization: Form One, 8130-3 tag, or equivalent. Undocumented = bogus = illegal to install."},{"e":"REGS","t":"Parts & Records","d":2,"q":"When a defect is found, the AME must:","o":["Fix without documentation","Record in journey log and take appropriate action per CARs","Tell pilot verbally only","Wait for next scheduled inspection"],"c":1,"x":"Record defect. Assess severity: no-go (fix before flight) or deferrable per MEL. Always document."},{"e":"REGS","t":"Parts & Records","d":4,"q":"A part arrives with dual release (TC Form One AND FAA 8130-3). For a Canadian aircraft:","o":["FAA 8130-3 takes precedence","TC Form One is the controlling document","Either is equally valid","Neither \u2014 new inspection required"],"c":1,"x":"For Canadian registered aircraft, TC documentation governs. The Form One is the controlling document for Canadian installation."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Technical records for an aircraft must include:","o":["Only the journey log","Journey log, all maintenance records, life-limited tracking, AD compliance, and weight & balance data","Just the last inspection","Manufacturer brochures"],"c":1,"x":"Complete tech records = legal documents. Missing records can ground an aircraft and significantly affect its value."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"Major repairs require:","o":["Verbal approval","Approved data (SRM, TC-approved scheme, or equivalent)","No special approval","Manufacturer approval only"],"c":1,"x":"Major repairs need TC-accepted approved data. Cannot freelance structural repairs without approved backing."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"The PRM is responsible for:","o":["Flying the aircraft","Ensuring all maintenance follows the operator's maintenance control system","Fueling","Parts sales"],"c":1,"x":"Person Responsible for Maintenance oversees the entire program for the air operator."},{"e":"REGS","t":"Other Standards","d":2,"q":"An RCA (Restricted Certification Authority) allows:","o":["Signing releases for any type","Signing releases only for specific types/tasks as authorized","Pilot duties","Manufacturing approval"],"c":1,"x":"More limited than full AME. Specific tasks, specific aircraft types as defined in the certificate."},{"e":"REGS","t":"Other Standards","d":2,"q":"NDT on aircraft must be performed by:","o":["Any AME","Personnel certified in the specific NDT method per CARs","Aircraft owner","Anyone with relevant degree"],"c":1,"x":"Certified per NAS-410, CAN/CGSB, or equivalent for each specific method (PT, MT, ET, UT, RT)."},{"e":"REGS","t":"Other Standards","d":4,"q":"Under CARs, routine replacement of a hydraulic hose using approved data is classified as:","o":["Specialized maintenance requiring NDT certification","Standard maintenance \u2014 not specialized","A major repair requiring STC","Elementary work the owner can do"],"c":1,"x":"Routine hose replacement per CMM/AMM = standard maintenance. NDT, welding, composite repair = specialized per CAR 571.10. Know the distinction."},{"e":"REGS","t":"Other Standards","d":3,"q":"The maintenance release signed by the AME confirms:","o":["They watched someone else work","Work done per standards, approved data used, aircraft fit for return to service","They read the procedure","Parts were ordered"],"c":1,"x":"The AME certifies: work per standards, approved data, proper parts, aircraft fit for service. Your signature = your licence and legal responsibility."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Piston rings serve to:","o":["Reduce weight","Seal combustion, control oil, transfer heat to cylinder wall","Increase compression ratio","Lubricate crankshaft"],"c":1,"x":"Compression rings seal gases. Oil rings scrape excess oil. Both transfer heat to cooled cylinder wall."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Valve overlap is when:","o":["Both valves are open simultaneously near TDC","Both closed","Only intake open","Only exhaust open"],"c":0,"x":"Outgoing exhaust scavenges remaining gases and draws fresh charge in."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"The master rod in a radial engine:","o":["Connects all pistons directly to crankshaft","Has the crankpin bearing; link rods attach to it","Is the shortest rod","Only exists in inline engines"],"c":1,"x":"One master rod per row on crankpin. Other cylinders use link rods pinned to master rod big end."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Hydraulic valve lifters automatically:","o":["Adjust fuel mixture","Maintain zero valve clearance","Increase overlap","Reduce RPM"],"c":1,"x":"Use oil pressure to eliminate clearance. No manual adjustment needed."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"Differential compression reads 40/80 on one cylinder. This means:","o":["Normal","Possible leaking valves, worn rings, or cracked cylinder","Blocked orifice","Over-compression"],"c":1,"x":"50% retention \u2014 below minimum. Listen at exhaust (exhaust valve), intake (intake valve), oil filler (rings), adjacent cylinder (gasket)."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Wet sump lubrication stores oil in:","o":["External tank","The crankcase itself","Oil cooler","Accessory case"],"c":1,"x":"Wet = crankcase. Dry = external tank with scavenge pumps. Large aircraft recips use dry sump."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Nitriding of crankshafts increases:","o":["Weight","Surface hardness and fatigue resistance","Thermal conductivity","Machinability"],"c":1,"x":"Surface-hardening for crankshafts, gears, cylinder barrels."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Dynamic dampers on a crankshaft reduce:","o":["Static imbalance","Torsional vibration at critical RPM","HP output","Oil consumption"],"c":1,"x":"Counterweights on pins absorb torsional vibration at specific critical RPM ranges."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Horizontally opposed engine means:","o":["Cylinders in a circle","Cylinders opposite each other across crankcase","V configuration","Single row"],"c":1,"x":"Most common light aircraft config (Lycoming/Continental). Low vibration, compact frontal area."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Bearing clearance matters because:","o":["Too tight = overheating; too loose = low oil pressure and hammering","Bearings never wear","Clearance is irrelevant","Only crankshaft bearings matter"],"c":0,"x":"Proper clearance allows oil film formation. Too tight = no oil flow. Too loose = oil pressure loss."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"NO RPM drop during magneto ground check indicates:","o":["Perfect operation","Both magnetos on same plugs","P-lead disconnected \u2014 magneto always hot (fire hazard)","Excellent compression"],"c":2,"x":"No drop means the switch isn't grounding that magneto. It's ALWAYS live. Prop could fire with switch OFF."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Engine baffles serve to:","o":["Reduce noise","Direct cooling air over cylinders for proper heat dissipation","Support mounts","Filter intake air"],"c":1,"x":"Force cooling air from cowl top around cylinders and out bottom. Missing baffles = hot spots."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Volumetric efficiency is:","o":["Power/fuel ratio","Actual charge vs theoretical full charge","Compression/expansion ratio","Brake HP/indicated HP"],"c":1,"x":"100% = cylinders fully fill. In practice ~85%. Higher = more power."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"In a float carburetor, the float maintains:","o":["Engine RPM","Constant fuel level in float chamber","Intake temperature","Exhaust pressure"],"c":1,"x":"Float rises = closes needle valve. Precise fuel level required for proper mixture."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"A pressure carburetor meters fuel:","o":["By gravity only","Under pressure proportional to airflow, not float level","Without any throttle","With no adjustment possible"],"c":1,"x":"Uses fuel regulator based on venturi pressure differential. Works in all attitudes \u2014 no float affected by G forces."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"The mixture control adjusts:","o":["Ignition timing","Fuel-to-air ratio for altitude compensation","Engine RPM","Oil flow"],"c":1,"x":"Thin air at altitude needs less fuel. Full rich for takeoff/landing, lean for cruise."},{"e":"PP","t":"Recip Fuel & Control","d":4,"q":"A supercharger differs from turbocharger \u2014 supercharger is:","o":["Exhaust-driven","Mechanically driven by engine via gears","Always more efficient","Only for sea level"],"c":1,"x":"Supercharger = gear-driven (takes engine power). Turbo = exhaust-driven (recovers waste energy). Turbos more common in modern aircraft."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Dual ignition provides:","o":["Double speed","Redundancy plus more complete combustion from two flame fronts","Half fuel consumption","IFR-only requirement"],"c":1,"x":"Two plugs per cylinder: safety + faster/more complete burn = more power and efficiency."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Ignition timing spark advance fires:","o":["At TDC","Before TDC so peak pressure occurs just after TDC","After TDC","At BDC"],"c":1,"x":"Combustion takes time. Fire BTDC so pressure peaks just after TDC for maximum power stroke push."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Scavenge pump in dry sump:","o":["Delivers pressure oil","Returns oil from crankcase to external tank","Filters oil","Cools oil"],"c":1,"x":"Greater capacity than pressure pump to keep sump empty. Multiple scavenge pumps for different sections."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil cooler bypass valve opens when:","o":["Oil too hot","Oil is cold and viscous for faster warmup","Engine at idle","Oil over relief setting"],"c":1,"x":"Cold thick oil has excessive pressure drop through cooler. Bypass routes around for faster warmup."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Engine oil serves (besides lubrication):","o":["Only lubrication","Cooling, sealing, cleaning, and corrosion protection","Increasing compression","Reducing weight"],"c":1,"x":"5 functions: Lubricate, Cool, Seal, Clean (carry contaminants to filter), Protect from corrosion."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Engine fire extinguisher bottles are typically charged with:","o":["Water","Halon or HFC agent under nitrogen pressure","CO2 only","Dry powder"],"c":1,"x":"Halon 1301 or HFC-227ea. Stored under N2 pressure. Discharged electrically via squib. One or two shots per engine."},{"e":"PP","t":"Turbine Engines","d":1,"q":"A turboprop drives:","o":["Only fan duct","A propeller through reduction gearbox","Helicopter rotor directly","Only exhaust thrust"],"c":1,"x":"~90% energy to propeller, ~10% from exhaust. Efficient below 350 knots."},{"e":"PP","t":"Turbine Engines","d":1,"q":"A turboshaft differs from turboprop \u2014 it drives:","o":["A propeller","A shaft output for helicopters, generators, or pumps","Reciprocating pistons","Only APUs"],"c":1,"x":"AW139 uses PT6C-67C turboshaft engines. Power turbine drives output shaft to main gearbox."},{"e":"PP","t":"Turbine Engines","d":2,"q":"A turbojet produces ALL thrust from:","o":["Propeller","High-velocity exhaust gas","Fan duct","Gearbox output"],"c":1,"x":"Pure turbojet: all thrust from hot exhaust nozzle. Simple but loud and thirsty. Replaced by turbofans."},{"e":"PP","t":"Turbine Engines","d":3,"q":"In a dual-spool turbofan, N1 is:","o":["HP compressor/turbine","LP (fan) compressor/turbine spool","Oil pressure","EGT"],"c":1,"x":"N1 = fan/LP spool (primary thrust gauge). N2 = HP spool. Each turns independently."},{"e":"PP","t":"Turbine Engines","d":3,"q":"EPR (Engine Pressure Ratio) equals:","o":["Inlet/exhaust pressure","Exhaust total pressure / inlet total pressure","Oil/fuel pressure","N1/N2"],"c":1,"x":"EPR = Pt7/Pt2. Primary thrust setting on some engines instead of N1."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Three combustion chamber types:","o":["Can, annular, can-annular","Primary, secondary, tertiary","Hot, cold, warm","Single, dual, triple"],"c":0,"x":"Can = individual cans. Annular = single ring. Can-annular = cans inside annular casing. Modern engines prefer annular."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Turbine blade creep is:","o":["Rapid fracture","Slow permanent deformation from sustained heat and centrifugal stress","Surface erosion","Vibration cracking"],"c":1,"x":"Blades slowly stretch over time. Eventually elongate enough to rub the case. Why turbine blades are life-limited."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Turbine blades are internally cooled by:","o":["Water spray","Compressor bleed air through internal passages","Oil circulation","Fuel flow"],"c":1,"x":"Cooling air exits through tiny holes on blade surface. Allows blade to survive gas temperatures above its melting point."},{"e":"PP","t":"Turbine Engines","d":2,"q":"An APU provides:","o":["Emergency thrust","Electrical power and bleed air on ground without main engines","Extra fuel","Navigation"],"c":1,"x":"Small turbine in tail section. Ground power + engine starting bleed air + cabin AC without ground support equipment."},{"e":"PP","t":"Turbine Engines","d":4,"q":"Stall margin decreases with:","o":["Clean new blades","Blade erosion, FOD, dirty compressor, or excessive bleed extraction","Proper trimming","Low altitude"],"c":1,"x":"Anything reducing compressor efficiency moves operating line toward stall line. Degraded engines stall more easily during transients."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Free turbine means:","o":["No blades","Power turbine NOT mechanically connected to gas generator \u2014 coupled only by gas flow","Runs without fuel","Moves axially"],"c":1,"x":"Gas generator spins independently. Power turbine drives output shaft. Common in PT6 family."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Engine rated thrust is typically limited by:","o":["Fuel flow only","Maximum EGT/TGT and N1/N2 speed limits","Oil pressure","Noise regulations"],"c":1,"x":"EGT is usually the first limit. Exceeding = accelerated blade deterioration."},{"e":"PP","t":"Turbine Engines","d":4,"q":"Compressor wash is performed by:","o":["Full power with water injection","Motoring at low RPM while spraying cleaning solution into inlet","Disassembly","Running in reverse"],"c":1,"x":"Removes salt, dirt, deposits. Done regularly in marine/dusty environments. Recovers performance without removal."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"An FCU schedules fuel based on:","o":["Pilot input only","Throttle, N1/N2, inlet temp, compressor pressure, and more","Oil temp only","Altitude only"],"c":1,"x":"FCU/FADEC integrates many parameters to prevent over-temp, over-speed, blowout, and stall."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Jet fuel types include:","o":["Avgas 100LL only","Jet A and Jet A-1 (kerosene-based)","Diesel","Premium gasoline"],"c":1,"x":"Jet A (freeze -40\u00b0C), Jet A-1 (freeze -47\u00b0C). NEVER put jet fuel in a recip or avgas in a turbine."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"All turbine engines use:","o":["Wet sump","Dry sump with pressure and scavenge pumps","Splash lubrication","Grease packing"],"c":1,"x":"Dry sump required for extreme attitudes and G-forces. External tank, pressure + scavenge pumps."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"A magnetic chip detector captures:","o":["Oil temperature","Ferrous metal particles indicating wear or damage","Oil viscosity","Fuel contamination"],"c":1,"x":"Fine fuzz = normal. Chunks/flakes = bearing or gear failure. Some have electrical warning contacts."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Variable guide vanes and stator vanes:","o":["Increase efficiency always","Adjust airflow angles to prevent compressor stall at various speeds","Only operate during start","Reduce noise"],"c":1,"x":"At low RPM, blade angles mismatch airflow. Variable vanes correct this across the speed range."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"N1 and N2 gauges indicate:","o":["Oil pressure/temperature","LP and HP spool rotational speeds","Fuel flow and EGT","Vibration levels"],"c":1,"x":"N1 = LP/fan %. N2 = HP %. Critical for monitoring, power setting, and limit compliance."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"Torquemeter on a turboprop indicates:","o":["Blade angle","Power delivered to propeller","Engine vibration","Oil temperature"],"c":1,"x":"Torque = primary turboprop power indication. Measured in ft-lbs, PSI, or percent."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"ITT measures temperature:","o":["At engine inlet","Between HP and LP turbines","At exhaust nozzle exit","In combustion chamber"],"c":1,"x":"Inter-Turbine Temperature \u2014 primary temp limit like EGT/TGT."},{"e":"PP","t":"Recording & Indicating","d":4,"q":"During start, the parameter monitored most carefully is:","o":["Oil pressure","EGT/ITT to catch hot starts before turbine damage","N2 speed","Fuel flow"],"c":1,"x":"EGT rises rapidly during start. Hot start can damage turbine in seconds. Must be ready to abort instantly."},{"e":"PP","t":"Propellers","d":2,"q":"Governor uses oil pressure to:","o":["Lubricate hub","Change blade pitch to maintain selected RPM","Control fuel flow","Drive reduction gears"],"c":1,"x":"Overspeed: oil to increase pitch. Underspeed: release oil for less pitch. Hydraulic control!"},{"e":"PP","t":"Propellers","d":3,"q":"Beta range on a turboprop propeller:","o":["Normal cruise range","Ground operation range \u2014 flat pitch, zero thrust, reverse","Feathered position","Max RPM range"],"c":1,"x":"Pilot has direct pitch control for taxi, braking (reverse), ground idle."},{"e":"PP","t":"Propellers","d":2,"q":"Propeller synchrophasing:","o":["Makes all props same speed","Adjusts relative blade positions to reduce noise/vibration","Feathers all props","Locks pitch"],"c":1,"x":"Fine-tunes angular relationship between props on multi-engine aircraft. Reduces cabin beat frequency."},{"e":"PP","t":"Propellers","d":2,"q":"Blade erosion is worst on:","o":["Blade root","Leading edge near tip (highest airspeed)","Trailing edge at hub","Face center"],"c":1,"x":"Tips travel fastest. Leading edge takes rain/sand impact. Erosion strips protect it."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller de-ice typically uses:","o":["Hot bleed air","Electric heating elements via slip rings","Chemical only","No de-ice needed"],"c":1,"x":"Electric boots or elements. Power via slip rings and brushes. Ice = vibration and performance loss."},{"e":"PP","t":"Propellers","d":4,"q":"If oil to single-acting prop is lost, prop goes to:","o":["Current pitch","Feather \u2014 counterweights and springs drive to high pitch","Flat pitch","Stops rotating"],"c":1,"x":"Safety feature: loss of oil = feather automatically. Prevents windmilling drag after engine failure."},{"e":"PP","t":"Propellers","d":2,"q":"Static RPM check verifies:","o":["Blade tracking","Engine develops proper RPM at full throttle on ground","Propeller balance","Cruise blade angle"],"c":1,"x":"Full throttle static = specific RPM per specs. Low = power issue or high blade angle. High = low blade angle or over-limit."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"An MEL allows dispatch with:","o":["Any equipment inoperative","Specific items inoperative under defined conditions and time limits","No instruments","Major structural damage"],"c":1,"x":"MEL lists specific items that may be inop with conditions and repair timeframes (A/B/C/D intervals)."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"A CDL allows dispatch with:","o":["Any external part missing","Specific external parts missing with performance penalties noted","Engines missing","Primary controls missing"],"c":1,"x":"CDL covers missing fairings, panels, covers. Performance penalties specified. Not for structural items."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Borrowed parts may be installed:","o":["Indefinitely","Temporarily under specific conditions while permanent parts obtained","Only on private aircraft","Never"],"c":1,"x":"Keeps aircraft in service while permanent parts are sourced. Must be serviceable with documentation. Time limited."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Used parts need:","o":["Good appearance","Documentation of identity, condition, and conformity to standards","Same-type aircraft origin","Visual inspection only"],"c":1,"x":"Identity (P/N, S/N) + condition docs (inspection/overhaul) + type design conformity."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"A Flight Permit allows:","o":["Normal commercial ops","Specific flights when normal C of A conditions aren't met","Unlimited VFR","Military operations"],"c":1,"x":"Ferry to maintenance, test flight after mod, demonstration. Specific conditions apply."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A flight permit for failed-inspection aircraft:","o":["30 days","Limited to specific ferry flight as specified by TC","12 months","Indefinite with renewal"],"c":1,"x":"Not a C of A replacement. Limited to the specific purpose (usually ferry to repair facility)."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Journey log must include:","o":["Only flight times","Date, crew, flight time, defects, and maintenance releases","Passenger notes","Weather reports"],"c":1,"x":"Pilots enter flight info; AMEs enter maintenance releases. Travels with aircraft."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Journey log entries must be transcribed to tech logbook:","o":["Within 24 hours","Promptly, before next flight","Within 30 days","No time limit"],"c":1,"x":"Journey log travels with aircraft. Tech records at base. Transcribe promptly."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Private aircraft maintenance schedule is found in:","o":["Created by pilot","CARs Appendix B/C or manufacturer's schedule","Not required","Same for all types"],"c":1,"x":"CAR 625 Appendix B (piston) or C (turbine/large). Manufacturers also publish schedules."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Out-of-phase items are tasks that:","o":["Never required","Come due between scheduled inspections, tracked separately","Only military","Indefinitely deferrable"],"c":1,"x":"Different intervals than main inspection. Must be independently tracked and completed on time."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"A Maintenance Control System for commercial operators includes:","o":["Just aircraft list","Schedule, tracking, recording, QA, and procedures for all maintenance","Only journey logs","Pilot training"],"c":1,"x":"Per CAR 706: comprehensive system overseen by PRM. Required for Part IV/VII operators."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Altimeter/pitot-static test interval for IFR:","o":["Every 100 hours","Every 12 months","Every 24 months","Every 5 years"],"c":2,"x":"Per CAR 605.35: 24-month interval for IFR operations."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"ELT batteries must be replaced at:","o":["25% of life","50% of useful life or expiration date, whichever first","75% of life","Only when ELT fails test"],"c":1,"x":"50% life OR expiration date OR after 1 hour cumulative use. Annual operational check also required."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"In CAR 571.02, the '571' means:","o":["Section only","Part 5 Airworthiness, Subpart 71","571 pages","Sequential number"],"c":1,"x":"Part (first digit) + Subpart (next two). 571 = Part 5, Subpart 71. Helps navigate CARs."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Port (left) position light color:","o":["White","Red","Green","Blue"],"c":1,"x":"Port=RED. Starboard=GREEN. Tail=WHITE. Required sunset-sunrise and IMC."},{"e":"REGS","t":"Airworthiness","d":2,"q":"TCDS contains:","o":["Pilot training requirements","Essential data: model, weight limits, CG range, engine, fuel, limitations","Maintenance history","Insurance requirements"],"c":1,"x":"Type Certificate Data Sheet = aircraft's birth certificate. Authoritative for all design/limitation data."},{"e":"REGS","t":"Airworthiness","d":3,"q":"Major vs minor repair distinction:","o":["Cost of repair","Whether it appreciably affects weight, balance, strength, performance, or airworthiness","Size of damage","Time to repair"],"c":1,"x":"Major = appreciably affects airworthiness qualities. Determines approval requirements."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"Person performing major mod/repair must:","o":["Just do and sign","Use approved data, document on appropriate form, have work inspected","Get verbal approval","Post on social media"],"c":1,"x":"Approved data required. Documented. Inspected before release. Serious regulatory requirement."},{"e":"REGS","t":"Other Standards","d":2,"q":"'Airworthy' under CARs means:","o":["Can fly","Conforms to type design AND in condition for safe operation","Has fuel","Has valid registration"],"c":1,"x":"TWO conditions: type design conformity + safe condition. Both required."},{"e":"REGS","t":"Other Standards","d":3,"q":"Tech records (not journey log) retained for:","o":["1 year","2 years","Life of aircraft/component","30 days"],"c":2,"x":"Permanent retention. Establishes full maintenance history. Loss can ground the aircraft."},{"e":"REGS","t":"Other Standards","d":4,"q":"Complete technical records include:","o":["Just journey log","Journey log, maintenance records, life tracking, AD records, mods, W&B report","Last inspection only","Manufacturer manual"],"c":1,"x":"All maintenance history + life tracking + AD status + modifications + W&B + equipment list. Legal documents."},{"e":"REGS","t":"Other Standards","d":2,"q":"Responsible for keeping aircraft tech records:","o":["Transport Canada","Registered owner","Last AME","Pilot"],"c":1,"x":"Owner is legally responsible per CARs, even if maintenance is delegated."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"AMO update training frequency:","o":["Never","As specified in their MPM","Only when TC requests","Every 5 years"],"c":1,"x":"MPM specifies training requirements. TC audits compliance during surveillance."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Major mod/repair reporting form:","o":["24-0083","Form as specified in CAR 571","Journey log only","No form needed"],"c":1,"x":"Specific documentation required. Includes approved data reference, description, and sign-off."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Commercial operator maintenance standards in:","o":["CARs Part IV and Part VII","Manufacturer manuals only","POH","Airport regulations"],"c":0,"x":"Part IV (smaller) and Part VII (airline). More stringent than private aircraft."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"A transformer works on:","o":["DC only","AC \u2014 changes voltage through electromagnetic induction","Both equally","Solar"],"c":1,"x":"AC only. Changing magnetic field induces voltage in secondary coil. Step-up/step-down."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Impedance in AC circuit is:","o":["Same as DC resistance","Total opposition combining R, XL, and XC","Only XC","Only XL"],"c":1,"x":"Z = \u221a(R\u00b2 + (XL-XC)\u00b2). Measured in ohms."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"Wire gauge is determined by:","o":["Insulation color","Current capacity and allowable voltage drop over length","Registration number","Number of circuits"],"c":1,"x":"Longer runs or higher current = larger gauge needed."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Electrical load analysis ensures:","o":["Correct aircraft weight","Total demand doesn't exceed generating capacity","All lights work","Battery charged"],"c":1,"x":"Tallies ALL loads to verify generators can supply demand. Critical for single-generator failure scenarios."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Aircraft welding types include:","o":["Only spot","Gas (oxy-acetylene), TIG, and electric arc/resistance","Only laser","None used"],"c":1,"x":"Gas for steel tubing. TIG for aluminum/stainless/titanium. Spot for sheet metal. Each requires certification."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"100% weld penetration means:","o":["50% of thickness","Weld fused completely through full material thickness","Covers entire surface","Penetrant tested"],"c":1,"x":"Full penetration = through entire thickness. Visible as smooth bead on backside."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Fabric covering is tested by:","o":["Visual only","Fabric punch tester for minimum tensile strength","Weighing","Color measurement"],"c":1,"x":"Tester measures force to puncture. Below minimum = recover. New \u224850+ lbs."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Dope on fabric aircraft:","o":["Adds CG weight","Tightens, weatherproofs, and protects the fabric","Lubricates cables","Prevents static"],"c":1,"x":"Shrinks fabric tight, seals against moisture, provides smooth paint surface."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Bearing types in aircraft include:","o":["Only ball","Ball, roller, needle, and thrust \u2014 each for specific loads","Only sleeve","Only magnetic"],"c":1,"x":"Ball=radial+light thrust. Roller=heavy radial. Needle=tight spaces. Thrust=axial loads."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Aircraft sealant types include:","o":["Only silicone","Polysulfide, silicone, and polythioether","Only rubber cement","Household caulk"],"c":1,"x":"Polysulfide for fuel tanks. Silicone for high-temp. Polythioether for newer fuel tank applications. Wrong type = failure."},{"e":"SPM","t":"General Servicing","d":2,"q":"Avgas 100LL color:","o":["Clear","Blue","Red","Green"],"c":1,"x":"100LL=BLUE. 100=GREEN. Jet A=clear/straw. Color prevents misfueling. Jet fuel in recip = catastrophic."},{"e":"SPM","t":"General Servicing","d":3,"q":"The 'Dirty Dozen' in aviation maintenance:","o":["Only pilot training","12 common human factors causing maintenance errors","Painting programs","Fuel efficiency"],"c":1,"x":"Lack of communication, complacency, lack of knowledge, distraction, lack of teamwork, fatigue, lack of resources, pressure, lack of assertiveness, stress, lack of awareness, norms. TC tests human factors."},{"e":"AF","t":"Structures","d":2,"q":"Wood structures are inspected for:","o":["Paint condition only","Rot, fungus, compression failures, glue joints, moisture content","Surface scratches only","Weight changes"],"c":1,"x":"Moisture >15% = rot risk. Compression failures across grain from hard landings. Glue joints can fail with age."},{"e":"AF","t":"Structures","d":3,"q":"Wood scarf joint minimum slope:","o":["1:5","1:10","1:12","1:3"],"c":2,"x":"1:12 minimum for structural repairs. Long shallow angle distributes stress evenly."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Heated windshields prevent:","o":["UV damage","Ice/fog plus maintain flexibility for bird strike resistance","Scratching","Discoloration"],"c":1,"x":"Electric elements keep glass warm and flexible enough to absorb bird impacts without shattering."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Max cabin differential pressure is limited by:","o":["Engine power","Fuselage structural strength \u2014 typically 8-9 PSI on modern transports","Fuel capacity","Passenger count"],"c":1,"x":"Fuselage is a pressure vessel. Safety/relief valves prevent exceeding design limits."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"The dump valve:","o":["Adds cabin air","Rapidly depressurizes cabin in emergency or on ground","Controls temperature","Manages O2"],"c":1,"x":"Opens on ground (prevents taxi pressurization) and in emergency (smoke removal, emergency descent)."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Vapor cycle AC uses:","o":["Hot bleed air","Refrigerant with compressor, condenser, expansion valve, evaporator","Ram air only","Electric heaters"],"c":1,"x":"Same as household AC. Common on light/medium aircraft. R-134a refrigerant typical."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A voltage regulator maintains:","o":["Constant RPM","Constant output voltage regardless of load or RPM","Constant current","Constant frequency"],"c":1,"x":"Adjusts field current to maintain 28V DC or 115V AC. Without it, voltage fluctuates and damages equipment."},{"e":"AF","t":"Electrical Systems","d":4,"q":"Split-bus system bus tie purpose:","o":["Always keep buses connected","Connect buses when needed (generator failure) and isolate for fault protection","Provide ground path","Convert AC/DC"],"c":1,"x":"Normal: each generator feeds own bus. Generator fails: bus tie connects remaining generator to all essential loads. Opens for fault isolation."},{"e":"AF","t":"Landing Gear","d":3,"q":"Brake fade occurs when:","o":["Brakes are cold","Excessive heat reduces friction coefficient between pads and disc","Fluid leaks","Tire pressure high"],"c":1,"x":"Heavy braking = extreme heat = material loses friction. More pedal force for same deceleration. Need cooling period."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A hydraulic fuse:","o":["Protects against electrical overload","Shuts off flow if line ruptures to prevent total fluid loss","Filters contaminants","Regulates pressure"],"c":1,"x":"Senses abnormally high flow rate from rupture. Closes to preserve fluid for other systems. Like an electrical fuse for hydraulic flow."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"A selector valve:","o":["Relieves pressure","Directs fluid to actuator ports for directional control","Filters fluid","Stores energy"],"c":1,"x":"Routes pressure to extend/retract gear, flaps, controls. Position determines which port gets pressure vs return."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A dual or independent inspection is required after:","o":["Any maintenance on the aircraft","Only engine overhauls","Any work that disturbs engine or flight controls","Annual inspections only"],"c":2,"x":"Per CAR 571.10: dual inspection after work disturbing engine or flight controls. A second qualified person must independently verify the work. Critical safety requirement."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"During a dual inspection, the second person must:","o":["Watch the first person work","Independently verify the work without knowledge of who performed it","Just sign the paperwork","Only check torque values"],"c":1,"x":"Independent verification means the second inspector checks the work on its own merits. They shouldn't just assume it was done correctly because a qualified person did it."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Under CARs, a 'small aeroplane' has a maximum takeoff weight of:","o":["2,730 kg or less","5,700 kg or less","12,566 kg or less","15,000 kg or less"],"c":1,"x":"5,700 kg (12,566 lbs) is the dividing line between small and large aeroplanes in CARs. This affects which maintenance standards, equipment requirements, and operating rules apply."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"General provisions of the CARs are found in:","o":["AWM Chapter 571","CAR Part III","AWM Chapter 507","CAR Part I"],"c":3,"x":"Part I = General Provisions (definitions, interpretation). Part II = Aircraft Identification. Part III = Personnel Licensing. Part IV = Airworthiness. Part V = Airworthiness (maintenance). Part VI = Operating Rules. Part VII = Commercial Air Services."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"The US aviation regulations are called:","o":["JARs","CARs","PMAs","FARs (Federal Aviation Regulations)"],"c":3,"x":"Canada = CARs, USA = FARs (now called 14 CFR), Europe = EASA regulations (formerly JARs). Know the difference \u2014 TC exams reference foreign regulatory systems."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"MELs are developed from:","o":["The aircraft manufacturer's recommendation only","A Master MEL (MMEL) published by regulatory authority in consultation with manufacturer and industry","The operator's experience only","The Maintenance Review Board"],"c":1,"x":"MMEL is the starting point. The operator tailors it to their specific aircraft configuration and operations, then submits to TC for approval. The MEL can be more restrictive than the MMEL, never less."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Once an MEL is approved, the operator must:","o":["Consider the MEL conditions optional","Operate under the conditions specified in the MEL","Transfer it to other operators of the same type","Ignore it if it conflicts with the maintenance schedule"],"c":1,"x":"MEL conditions are binding once approved. Deviating from MEL conditions = operating in violation of the certificate."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"An item deferred under the MEL with a 'B' rectification interval must be repaired within:","o":["Before next flight","3 consecutive calendar days","10 consecutive calendar days","120 calendar days"],"c":1,"x":"MEL intervals: A = as specified (e.g., before next flight), B = 3 days, C = 10 days, D = 120 days. These are maximum times \u2014 repair sooner if possible."},{"e":"REGS","t":"Parts & Records","d":3,"q":"If a reportable Service Difficulty Report (SDR) of the same nature occurs again on the same product:","o":["No further reporting needed","It must be reported again each time","Only the first occurrence is reported","Report only if it causes an accident"],"c":1,"x":"EVERY occurrence must be reported, even if the same defect was previously reported. Recurring defects are a safety trend that TC needs to track."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Defects that could affect flight safety must be reported to TC via:","o":["A phone call only","A Service Difficulty Report (SDR)","Email to the manufacturer","A letter to the pilot"],"c":1,"x":"SDRs are mandatory for defects affecting safety. They feed into TC's surveillance database to identify systemic problems across the fleet."},{"e":"REGS","t":"Other Standards","d":3,"q":"A person holding a Shop Certification Authority (SCA) is:","o":["Equivalent to a full AME","Authorized in the AMO's MPM to certify maintenance on aircraft PARTS only","Authorized to sign maintenance releases on aircraft","A TC inspector"],"c":1,"x":"SCA = parts/components only in the shop, NOT whole aircraft. Authorized by the AMO's MPM. Different from AME who can sign releases on the whole aircraft."},{"e":"REGS","t":"AME Licensing","d":3,"q":"Maximum AME licence experience credits are:","o":["Unlimited","150 hours/month or 1,800 hours/year","200 hours/month","Based on employer's letter only"],"c":1,"x":"Max 150 hrs/month or 1,800 hrs/year can be credited toward the 48-month experience requirement. Must be documented."},{"e":"REGS","t":"AME Licensing","d":3,"q":"When an AME signs a task in an apprentice's logbook, the AME certifies:","o":["The task was merely completed","The apprentice can perform that task without supervision","The apprentice only observed the task","Nothing \u2014 it's just a formality"],"c":1,"x":"The AME's signature means the apprentice demonstrated competency to perform that specific task independently. It's a professional certification of the apprentice's ability, not just attendance."},{"e":"REGS","t":"AME Licensing","d":2,"q":"AME licence renewal (not expired) requires:","o":["Meeting initial requirements again","Submitting form 24-0083 and paying the appropriate fee","Passing all four technical exams again","A flight test"],"c":1,"x":"Unexpired licence: submit form + pay fee = renewed. Expired over 1 year: may need to meet initial issue requirements including CARs exam. Keep your licence current!"},{"e":"REGS","t":"AME Licensing","d":3,"q":"S and E ratings differ from M1/M2 in that S and E are:","o":["More prestigious","Specific to types of WORK rather than types of aircraft","Only for military","Less difficult to obtain"],"c":1,"x":"M1/M2 = aircraft categories (small/large). S = Structures work. E = Electronics/avionics work. S and E are work-type specific regardless of aircraft category."},{"e":"REGS","t":"Parts & Records","d":3,"q":"The TC Form One (24-0078 Authorized Release Certificate) is:","o":["Only recognized in Canada","An international document recognized worldwide","Only recognized in the USA","A manufacturer's warranty card"],"c":1,"x":"Form One is recognized internationally and in Canada. It certifies that maintenance/manufacturing was performed to approved standards. Similar to FAA 8130-3 and EASA Form 1."},{"e":"REGS","t":"Parts & Records","d":2,"q":"A part without documentation (no Form One, 8130-3, or equivalent) is:","o":["Acceptable if it looks new","A 'bogus part' \u2014 cannot be installed on any aircraft","Fine for non-critical components","Acceptable with visual inspection"],"c":1,"x":"Undocumented parts are legally and practically unusable. Installing bogus parts is a criminal offense and a severe safety hazard. ALWAYS verify part documentation."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"An AMO's MPM is amended by:","o":["The QA department at will","The PRM on the anniversary date","Proposed amendments sent to TC for approval by the certificate holder","TC amends it automatically"],"c":2,"x":"The AMO proposes changes, TC reviews and approves before implementation. MPM amendments must follow the same approval process as the original document."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Who controls authorization for elementary work?","o":["Any AME","The aircraft manufacturer specifies in the maintenance manual","The owner using the tasks listed in CAR 625 Appendix A","The pilot"],"c":2,"x":"CARs Appendix A lists the specific tasks. Owners/operators can perform ONLY those listed tasks using manufacturer's instructions. Anything beyond that list requires an AME."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"An ELT may be tested:","o":["At any time for any duration","During the first five minutes of any hour for five seconds maximum","Only in a shielded room","Only by TC inspectors"],"c":1,"x":"Testing is limited to first 5 minutes of the hour, max 5 seconds, to minimize false alerts. 406 MHz ELTs have specific test procedures that don't transmit a real alert."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"Before a test flight after maintenance, the aircraft must:","o":["Have a fresh coat of paint","Have a conditional maintenance release signed ers the overhaul requirement."},{"e":"REGS","t":"Other Standards","d":2,"q":"An amendment to an aircraft's weight and balance report must be made:","o":["Only at annual inspection","Whenever equipment is added, removed, or relocated that affects W&B","Only when the aircraft is sold","Every 5 years"],"c":1,"x":"Any change affecting weight or CG (equipment installation/removal, modifications, repaint) requires W&B amendment. Must be current and accurate."},{"e":"REGS","t":"Other Standards","d":3,"q":"Who is responsible for ensuring the aircraft weight and balance report is current?","o":["The pilot","The registered owner","The AME who last worked on it","Transport Canada"],"c":1,"x":"The owner must ensure W&B records are current. AMEs must amend the W&B when they perform work that affects it (installing/removing equipment)."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A flight permit may be issued for which of the following purposes?","o":["Normal revenue flying","Ferry flight, demonstration, test flight after maintenance, or experimental purposes","Unlimited private flying","International commercial operations"],"c":1,"x":"Flight permits cover specific non-standard situations: ferry to maintenance base, flight test, demonstration, aerial survey, experimental. Each type has specific requirements and limitations."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An aircraft damaged beyond type design conformity but still structurally sound may be issued:","o":["A standard C of A","A special C of A","A flight permit for the purpose of flying to a repair facility","No authorization to fly"],"c":2,"x":"A flight permit allows ferry to a repair base when the aircraft doesn't conform to type design but can still fly safely under specified conditions. Restrictions on route, altitude, passengers, etc."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"Repairing or modifying an aeronautical product may include:","o":["Making of replacement parts per approved data","Any creative solution the AME devises","Only installing manufacturer-supplied parts","Waiting for TC to do the repair"],"c":0,"x":"AMEs can fabricate replacement parts during repair IF using approved data (drawings, SRM specs). Not free-hand engineering \u2014 must have approved technical backing."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Which of the following are forms of approved data for major repairs?","o":["Internet forums and YouTube videos","SRM, engineering orders, STCs, and TC-approved repair schemes","Only the original manufacturer's manual","The AME's personal notes"],"c":1,"x":"Approved data: Structural Repair Manual, Engineering Orders, Supplemental Type Certificates, TC-approved schemes, manufacturer's service bulletins when referenced by an AD. Never use unverified internet sources."},{"e":"REGS","t":"Parts & Records","d":3,"q":"What constitutes the complete technical records for an aircraft?","o":["Just the journey log","Journey log, aircraft technical log, engine log, propeller log, component records, AD/SB compliance, and W&B report","Only the most recent inspection report","The manufacturer's type certificate"],"c":1,"x":"Complete tech records = total history of the aircraft from manufacture to present. Missing records can ground the aircraft and severely reduce its value."},{"e":"REGS","t":"Parts & Records","d":3,"q":"How long must technical records (other than the journey log) be retained?","o":["1 year after the work","Until the next annual inspection","For the life of the product to which they relate","90 days"],"c":2,"x":"Tech records = permanent for the life of aircraft/engine/propeller/component. Journey log entries transferred to tech log. Historical records establish airworthiness pedigree."},{"e":"REGS","t":"Parts & Records","d":2,"q":"When can an inspection sheet forming part of the tech records be disposed of?","o":["When a new inspection is performed","When the aircraft is sold","It cannot be dispo const tb=h("button","ti",{onclick(){const q=pk(S.ex,t,S.df||undefined);S.qi=Q.indexOf(q);S.tp=t;S.sel=null;S.rev=false;S.pg="quiz";go()}});
$(tb,h("div","dt",{style:"background:"+dc2}),h("span","",{txt:t}),h("span","ct",{txt:d2+"/"+tot2}));$(tl,tb)});$(R,tl)}

function rQ(){
const q=Q[S.qi],em=EM[q.e],lt=["A","B","C","D"];
const qt=h("div","qt an");$(qt,h("button","btn bb",{txt:"←",onclick(){S.pg=S.ex?"exam":"home";S.tp=null;go()}}));
$(qt,h("span","tag",{txt:em.ic+" "+em.s,style:"color:"+em.cl}));$(qt,h("span","tag",{txt:q.t}));
$(qt,h("span","dtag "+DC[q.d],{txt:DL[q.d]}));$(R,qt);
$(R,h("div","qc an",{txt:q.q}));
const opts=h("div","opts an");
q.o.forEach((a,i)=>{let cls="opt";
if(S.rev){if(i===q.c)cls+=" ok";else if(i===S.sel)cls+=" wr";else cls+=" dm"}
else if(i===S.sel)cls+=" sel";
const btn=h("button",cls,{onclick(){if(!S.rev){S.sel=i;go()}}});
$(btn,h("span","lt",{txt:lt[i]}),h("span","",{txt:a}));$(opts,btn)});$(R,opts);
if(!S.rev){const cb=h("button","btn ba bw bl",{txt:"Check Answer",onclick(){
if(S.sel===null)return;S.rev=true;const ok=S.sel===q.c;S.ans[qid(q)]=ok;S.ta++;S.dd++;
if(ok){S.tc++;S.str++;if(S.str>S.bst)S.bst=S.str}else S.str=0;sv();go()}});
if(S.sel===null)cb.setAttribute("disabled","");$(R,cb)}
if(S.rev){const ok=S.sel===q.c;
$(R,h("div","rbn pop "+(ok?"ok":"no"),{txt:ok?"✅ Correct!":"❌ Incorrect — Answer: "+lt[q.c]}));
if(S.str>=3&&ok)$(R,h("div","",{htm:'<div style="text-align:center;font-size:12px;color:var(--ac);margin-bottom:8px;font-weight:700">🔥 '+S.str+" streak!</div>"}));
$(R,h("div","expl an",{htm:"<b>Why?</b> "+q.x}));
const ac=h("div","acts an");
$(ac,h("button","btn ba",{txt:"Next →",onclick(){const nq=pk(S.ex||q.e,S.tp,S.df||undefined);S.qi=Q.indexOf(nq);S.sel=null;S.rev=false;go()}}));
$(ac,h("button","btn bs",{txt:"Back",onclick(){S.pg=S.ex?"exam":"home";S.tp=null;go()}}));$(R,ac)}}

function startMk(exam,num,mins){
let pool=exam?flt(exam):Q;pool=shuf(pool).slice(0,num);
S.mock={qs:pool.map(q=>Q.indexOf(q)),cur:0,ans:new Array(num).fill(null),sel:null,start:Date.now(),dur:mins*60*1000,exam:exam};go()}

function rMk(){
const m=S.mock,qi=m.qs[m.cur],q=Q[qi],lt=["A","B","C","D"];
const elapsed=Date.now()-m.start;const rem=Math.max(0,m.dur-elapsed);
if(rem<=0&&m.ans[m.cur]===null){finMk();return}
const mins=Math.floor(rem/60000);const secs=Math.floor(rem%60000/1000);
const bar=h("div","mbar an");$(bar,h("span","qc2",{txt:"Q "+(m.cur+1)+" / "+m.qs.length}));
$(bar,h("span","tmr"+(rem<300000?" pulse":""),{txt:mins+":"+String(secs).padStart(2,"0")}));$(R,bar);
const pips=h("div","pips an");for(let i=0;i<m.qs.length;i++){
let pc="p";if(i===m.cur)pc+=" cu";else if(m.ans[i]!==null)pc+=m.ans[i]===Q[m.qs[i]].c?" dn":" wg";
$(pips,h("div",pc))}$(R,pips);
$(R,h("div","qc an",{txt:q.q}));
const opts=h("div","opts an");q.o.forEach((a,i)=>{
let cls="opt";if(i===m.sel)cls+=" sel";
const btn=h("button",cls,{onclick(){m.sel=i;go()}});
$(btn,h("span","lt",{txt:lt[i]}),h("span","",{txt:a}));$(opts,btn)});$(R,opts);
const ac=h("div","acts an");
if(m.cur>0)$(ac,h("button","btn bs",{txt:"← Prev",onclick(){m.ans[m.cur]=m.sel;m.cur--;m.sel=m.ans[m.cur];go()}}));
if(m.cur<m.qs.length-1)$(ac,h("button","btn ba",{txt:"Next →",onclick(){m.ans[m.cur]=m.sel;m.cur++;m.sel=m.ans[m.cur];go()}}));
else $(ac,h("button","btn bg",{txt:"✓ Finish Exam",onclick(){m.ans[m.cur]=m.sel;finMk()}}));$(R,ac);
if(rem>0)setTimeout(()=>{if(S.mock)go()},1000)}

function finMk(){const m=S.mock;let correct=0;
m.qs.forEach((qi,i)=>{if(m.ans[i]===Q[qi].c)correct++});
S.mr={total:m.qs.length,correct,qs:m.qs,ans:m.ans,exam:m.exam};S.mock=null;S.pg="result";go()}

function rR(){
const r=S.mr,pct=Math.round(r.correct/r.total*100),pass=pct>=70;
const lt=["A","B","C","D"];const title=r.exam?EM[r.exam].n+" Mock Exam":"Mixed Mock Exam";
$(R,h("div","",{htm:'<div style="text-align:center;margin:16px 0"><div style="font-size:12px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:1px">'+title+" Results</div></div>"}));
$(R,h("div","rc pop "+(pass?"pa":"fa"),{txt:pct+"%"}));
$(R,h("div","",{htm:'<div style="text-align:center;margin:10px 0 20px"><div style="font-size:18px;font-weight:800;color:'+(pass?"var(--ok)":"var(--no)")+'">'+(pass?"PASSED ✈️":"FAILED")+'</div><div style="font-size:12px;color:var(--t2);margin-top:4px">'+r.correct+"/"+r.total+" correct · 70% required</div></div>"}));
$(R,h("div","lbl",{txt:"Review All Answers"}));
const rl=h("div","tl");
r.qs.forEach((qi,i)=>{const q=Q[qi],ok=r.ans[i]===q.c;
const ti=h("div","",{style:"background:var(--c1);border:1px solid var(--bd);border-left:3px solid "+(ok?"var(--ok)":"var(--no)")+";border-radius:var(--r);padding:12px;margin-bottom:6px"});
$(ti,h("div","",{htm:'<div style="font-size:11px;color:var(--t3);margin-bottom:3px">Q'+(i+1)+" · "+q.t+'</div><div style="font-size:13px;margin-bottom:6px;line-height:1.5">'+q.q+'</div><div style="font-size:12px;color:'+(ok?"var(--ok)":"var(--no)")+';font-weight:600">'+(ok?"✓ Correct":"✗ You: "+(r.ans[i]!==null?lt[r.ans[i]]:"—")+" · Answer: "+lt[q.c])+'</div><div style="font-size:11px;color:var(--t2);margin-top:4px;line-height:1.5">'+q.x+"</div>"}));
$(rl,ti)});$(R,rl);
$(R,h("button","btn ba bw bl",{txt:"Back to Home",style:"margin-top:14px",onclick(){S.pg="home";S.mr=null;go()}}))}

function rReset(){
$(R,h("div","",{htm:'<div style="text-align:center;padding:40px 0 20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><h2 style="font-size:20px;font-weight:800;margin-bottom:8px">Reset All Progress?</h2><div style="font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:24px">This will erase all your scores, streaks,<br>and answered questions.<br><br>This cannot be undone.</div></div>'}));
$(R,h("button","btn bd bw bl",{txt:"🗑️ Yes, Reset Everything",style:"margin-bottom:10px",onclick(){localStorage.removeItem(K);S=mk();S.pg="home";go()}}));
$(R,h("button","btn bs bw bl",{txt:"← No, Go Back",onclick(){S.pg="home";go()}}));
}

go();
</script>
</body>
</html>
