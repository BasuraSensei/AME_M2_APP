worthiness","d":3,"q":"AD vs Service Bulletin (SB):","o":["No difference","ADs are mandatory by law; SBs are recommendations unless mandated by an AD","SBs are more important","ADs are optional"],"c":1,"x":"AD = law. SB = manufacturer recommendation. Some ADs reference specific SBs as the mandatory compliance method."},{"e":"REGS","t":"Airworthiness","d":4,"q":"A part installed on a type-certificated aircraft must have records documenting that:","o":["It was purchased from a reputable store","The product, part, or material meets airworthiness standards","The manufacturer is a well-known company","It passed a visual inspection by the installer"],"c":1,"x":"Per CARs, every part must have documentation proving it meets airworthiness standards \u2014 authorized release certificate, conformity documentation. The installer is responsible for verifying."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"A maintenance release certifies:","o":["Aircraft can be sold","Work performed per applicable standards and aircraft airworthy for that work","It's a work order","Parts were ordered"],"c":1,"x":"Your signature = your licence on the line. Legal certification of airworthiness."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"An AMO requires:","o":["10+ employees","TC certificate, QA program, and maintenance policy manual","Business licence only","Manufacturer approval only"],"c":1,"x":"Per CAR 573: TC cert, quality assurance, MPM, qualified personnel, proper facilities/tooling."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Elementary work may be done by:","o":["Anyone unsupervised","Aircraft owner/operator for specific CARs-listed tasks","Licensed AME only","AMO only"],"c":1,"x":"CAR 625 Appendix A lists permitted tasks: oil change, tire replacement, basic inspections, etc."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"After maintenance, records must be entered in:","o":["Personal logbook only","Aircraft technical records","TC database only","Operator's filing system only"],"c":1,"x":"All maintenance in aircraft tech records: work description, date, data reference, signed release."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Specialized maintenance includes:","o":["Oil changes","NDT, welding, composite repair requiring specific training/equipment","All routine servicing","Tire changes"],"c":1,"x":"Per CAR 571.10. Requires certified personnel with specific qualifications beyond basic AME training."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"An AME discovers a crack in a primary structural member during inspection. Required action:","o":["Monitor during next 100 hours","Ground aircraft, record defect, repair using approved data before release","Report verbally to pilot","Apply temporary doubler and release"],"c":1,"x":"Primary structure crack = no-fly. Ground, document, repair with approved data (SRM or TC-approved scheme). Never release an aircraft with a known structural defect."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Life-limited part at its limit must be:","o":["Overhauled and returned to service","Permanently removed from service","Recertified by manufacturer","Inspected for extension"],"c":1,"x":"Permanently retired. No exceptions, no overhauls, no extensions. Destroyed or marked unserviceable."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Serviceable parts require:","o":["Retail receipt","Approved source with airworthiness documentation","Any shop receipt","Original aircraft provenance"],"c":1,"x":"Authorization: Form One, 8130-3 tag, or equivalent. Undocumented = bogus = illegal to install."},{"e":"REGS","t":"Parts & Records","d":2,"q":"When a defect is found, the AME must:","o":["Fix without documentation","Record in journey log and take appropriate action per CARs","Tell pilot verbally only","Wait for next scheduled inspection"],"c":1,"x":"Record defect. Assess severity: no-go (fix before flight) or deferrable per MEL. Always document."},{"e":"REGS","t":"Parts & Records","d":4,"q":"A part arrives with dual release (TC Form One AND FAA 8130-3). For a Canadian aircraft:","o":["FAA 8130-3 takes precedence","TC Form One is the controlling document","Either is equally valid","Neither \u2014 new inspection required"],"c":1,"x":"For Canadian registered aircraft, TC documentation governs. The Form One is the controlling document for Canadian installation."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Technical records for an aircraft must include:","o":["Only the journey log","Journey log, all maintenance records, life-limited tracking, AD compliance, and weight & balance data","Just the last inspection","Manufacturer brochures"],"c":1,"x":"Complete tech records = legal documents. Missing records can ground an aircraft and significantly affect its value."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"Major repairs require:","o":["Verbal approval","Approved data (SRM, TC-approved scheme, or equivalent)","No special approval","Manufacturer approval only"],"c":1,"x":"Major repairs need TC-accepted approved data. Cannot freelance structural repairs without approved backing."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"The PRM is responsible for:","o":["Flying the aircraft","Ensuring all maintenance follows the operator's maintenance control system","Fueling","Parts sales"],"c":1,"x":"Person Responsible for Maintenance oversees the entire program for the air operator."},{"e":"REGS","t":"Other Standards","d":2,"q":"An RCA (Restricted Certification Authority) allows:","o":["Signing releases for any type","Signing releases only for specific types/tasks as authorized","Pilot duties","Manufacturing approval"],"c":1,"x":"More limited than full AME. Specific tasks, specific aircraft types as defined in the certificate."},{"e":"REGS","t":"Other Standards","d":2,"q":"NDT on aircraft must be performed by:","o":["Any AME","Personnel certified in the specific NDT method per CARs","Aircraft owner","Anyone with relevant degree"],"c":1,"x":"Certified per NAS-410, CAN/CGSB, or equivalent for each specific method (PT, MT, ET, UT, RT)."},{"e":"REGS","t":"Other Standards","d":4,"q":"Under CARs, routine replacement of a hydraulic hose using approved data is classified as:","o":["Specialized maintenance requiring NDT certification","Standard maintenance \u2014 not specialized","A major repair requiring STC","Elementary work the owner can do"],"c":1,"x":"Routine hose replacement per CMM/AMM = standard maintenance. NDT, welding, composite repair = specialized per CAR 571.10. Know the distinction."},{"e":"REGS","t":"Other Standards","d":3,"q":"The maintenance release signed by the AME confirms:","o":["They watched someone else work","Work done per standards, approved data used, aircraft fit for return to service","They read the procedure","Parts were ordered"],"c":1,"x":"The AME certifies: work per standards, approved data, proper parts, aircraft fit for service. Your signature = your licence and legal responsibility."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Piston rings serve to:","o":["Reduce weight","Seal combustion, control oil, transfer heat to cylinder wall","Increase compression ratio","Lubricate crankshaft"],"c":1,"x":"Compression rings seal gases. Oil rings scrape excess oil. Both transfer heat to cooled cylinder wall."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Valve overlap is when:","o":["Both valves are open simultaneously near TDC","Both closed","Only intake open","Only exhaust open"],"c":0,"x":"Outgoing exhaust scavenges remaining gases and draws fresh charge in."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"The master rod in a radial engine:","o":["Connects all pistons directly to crankshaft","Has the crankpin bearing; link rods attach to it","Is the shortest rod","Only exists in inline engines"],"c":1,"x":"One master rod per row on crankpin. Other cylinders use link rods pinned to master rod big end."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Hydraulic valve lifters automatically:","o":["Adjust fuel mixture","Maintain zero valve clearance","Increase overlap","Reduce RPM"],"c":1,"x":"Use oil pressure to eliminate clearance. No manual adjustment needed."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"Differential compression reads 40/80 on one cylinder. This means:","o":["Normal","Possible leaking valves, worn rings, or cracked cylinder","Blocked orifice","Over-compression"],"c":1,"x":"50% retention \u2014 below minimum. Listen at exhaust (exhaust valve), intake (intake valve), oil filler (rings), adjacent cylinder (gasket)."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Wet sump lubrication stores oil in:","o":["External tank","The crankcase itself","Oil cooler","Accessory case"],"c":1,"x":"Wet = crankcase. Dry = external tank with scavenge pumps. Large aircraft recips use dry sump."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Nitriding of crankshafts increases:","o":["Weight","Surface hardness and fatigue resistance","Thermal conductivity","Machinability"],"c":1,"x":"Surface-hardening for crankshafts, gears, cylinder barrels."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Dynamic dampers on a crankshaft reduce:","o":["Static imbalance","Torsional vibration at critical RPM","HP output","Oil consumption"],"c":1,"x":"Counterweights on pins absorb torsional vibration at specific critical RPM ranges."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Horizontally opposed engine means:","o":["Cylinders in a circle","Cylinders opposite each other across crankcase","V configuration","Single row"],"c":1,"x":"Most common light aircraft config (Lycoming/Continental). Low vibration, compact frontal area."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Bearing clearance matters because:","o":["Too tight = overheating; too loose = low oil pressure and hammering","Bearings never wear","Clearance is irrelevant","Only crankshaft bearings matter"],"c":0,"x":"Proper clearance allows oil film formation. Too tight = no oil flow. Too loose = oil pressure loss."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"NO RPM drop during magneto ground check indicates:","o":["Perfect operation","Both magnetos on same plugs","P-lead disconnected \u2014 magneto always hot (fire hazard)","Excellent compression"],"c":2,"x":"No drop means the switch isn't grounding that magneto. It's ALWAYS live. Prop could fire with switch OFF."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Engine baffles serve to:","o":["Reduce noise","Direct cooling air over cylinders for proper heat dissipation","Support mounts","Filter intake air"],"c":1,"x":"Force cooling air from cowl top around cylinders and out bottom. Missing baffles = hot spots."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Volumetric efficiency is:","o":["Power/fuel ratio","Actual charge vs theoretical full charge","Compression/expansion ratio","Brake HP/indicated HP"],"c":1,"x":"100% = cylinders fully fill. In practice ~85%. Higher = more power."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"In a float carburetor, the float maintains:","o":["Engine RPM","Constant fuel level in float chamber","Intake temperature","Exhaust pressure"],"c":1,"x":"Float rises = closes needle valve. Precise fuel level required for proper mixture."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"A pressure carburetor meters fuel:","o":["By gravity only","Under pressure proportional to airflow, not float level","Without any throttle","With no adjustment possible"],"c":1,"x":"Uses fuel regulator based on venturi pressure differential. Works in all attitudes \u2014 no float affected by G forces."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"The mixture control adjusts:","o":["Ignition timing","Fuel-to-air ratio for altitude compensation","Engine RPM","Oil flow"],"c":1,"x":"Thin air at altitude needs less fuel. Full rich for takeoff/landing, lean for cruise."},{"e":"PP","t":"Recip Fuel & Control","d":4,"q":"A supercharger differs from turbocharger \u2014 supercharger is:","o":["Exhaust-driven","Mechanically driven by engine via gears","Always more efficient","Only for sea level"],"c":1,"x":"Supercharger = gear-driven (takes engine power). Turbo = exhaust-driven (recovers waste energy). Turbos more common in modern aircraft."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Dual ignition provides:","o":["Double speed","Redundancy plus more complete combustion from two flame fronts","Half fuel consumption","IFR-only requirement"],"c":1,"x":"Two plugs per cylinder: safety + faster/more complete burn = more power and efficiency."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Ignition timing spark advance fires:","o":["At TDC","Before TDC so peak pressure occurs just after TDC","After TDC","At BDC"],"c":1,"x":"Combustion takes time. Fire BTDC so pressure peaks just after TDC for maximum power stroke push."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Scavenge pump in dry sump:","o":["Delivers pressure oil","Returns oil from crankcase to external tank","Filters oil","Cools oil"],"c":1,"x":"Greater capacity than pressure pump to keep sump empty. Multiple scavenge pumps for different sections."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil cooler bypass valve opens when:","o":["Oil too hot","Oil is cold and viscous for faster warmup","Engine at idle","Oil over relief setting"],"c":1,"x":"Cold thick oil has excessive pressure drop through cooler. Bypass routes around for faster warmup."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Engine oil serves (besides lubrication):","o":["Only lubrication","Cooling, sealing, cleaning, and corrosion protection","Increasing compression","Reducing weight"],"c":1,"x":"5 functions: Lubricate, Cool, Seal, Clean (carry contaminants to filter), Protect from corrosion."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Engine fire extinguisher bottles are typically charged with:","o":["Water","Halon or HFC agent under nitrogen pressure","CO2 only","Dry powder"],"c":1,"x":"Halon 1301 or HFC-227ea. Stored under N2 pressure. Discharged electrically via squib. One or two shots per engine."},{"e":"PP","t":"Turbine Engines","d":1,"q":"A turboprop drives:","o":["Only fan duct","A propeller through reduction gearbox","Helicopter rotor directly","Only exhaust thrust"],"c":1,"x":"~90% energy to propeller, ~10% from exhaust. Efficient below 350 knots."},{"e":"PP","t":"Turbine Engines","d":1,"q":"A turboshaft differs from turboprop \u2014 it drives:","o":["A propeller","A shaft output for helicopters, generators, or pumps","Reciprocating pistons","Only APUs"],"c":1,"x":"AW139 uses PT6C-67C turboshaft engines. Power turbine drives output shaft to main gearbox."},{"e":"PP","t":"Turbine Engines","d":2,"q":"A turbojet produces ALL thrust from:","o":["Propeller","High-velocity exhaust gas","Fan duct","Gearbox output"],"c":1,"x":"Pure turbojet: all thrust from hot exhaust nozzle. Simple but loud and thirsty. Replaced by turbofans."},{"e":"PP","t":"Turbine Engines","d":3,"q":"In a dual-spool turbofan, N1 is:","o":["HP compressor/turbine","LP (fan) compressor/turbine spool","Oil pressure","EGT"],"c":1,"x":"N1 = fan/LP spool (primary thrust gauge). N2 = HP spool. Each turns independently."},{"e":"PP","t":"Turbine Engines","d":3,"q":"EPR (Engine Pressure Ratio) equals:","o":["Inlet/exhaust pressure","Exhaust total pressure / inlet total pressure","Oil/fuel pressure","N1/N2"],"c":1,"x":"EPR = Pt7/Pt2. Primary thrust setting on some engines instead of N1."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Three combustion chamber types:","o":["Can, annular, can-annular","Primary, secondary, tertiary","Hot, cold, warm","Single, dual, triple"],"c":0,"x":"Can = individual cans. Annular = single ring. Can-annular = cans inside annular casing. Modern engines prefer annular."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Turbine blade creep is:","o":["Rapid fracture","Slow permanent deformation from sustained heat and centrifugal stress","Surface erosion","Vibration cracking"],"c":1,"x":"Blades slowly stretch over time. Eventually elongate enough to rub the case. Why turbine blades are life-limited."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Turbine blades are internally cooled by:","o":["Water spray","Compressor bleed air through internal passages","Oil circulation","Fuel flow"],"c":1,"x":"Cooling air exits through tiny holes on blade surface. Allows blade to survive gas temperatures above its melting point."},{"e":"PP","t":"Turbine Engines","d":2,"q":"An APU provides:","o":["Emergency thrust","Electrical power and bleed air on ground without main engines","Extra fuel","Navigation"],"c":1,"x":"Small turbine in tail section. Ground power + engine starting bleed air + cabin AC without ground support equipment."},{"e":"PP","t":"Turbine Engines","d":4,"q":"Stall margin decreases with:","o":["Clean new blades","Blade erosion, FOD, dirty compressor, or excessive bleed extraction","Proper trimming","Low altitude"],"c":1,"x":"Anything reducing compressor efficiency moves operating line toward stall line. Degraded engines stall more easily during transients."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Free turbine means:","o":["No blades","Power turbine NOT mechanically connected to gas generator \u2014 coupled only by gas flow","Runs without fuel","Moves axially"],"c":1,"x":"Gas generator spins independently. Power turbine drives output shaft. Common in PT6 family."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Engine rated thrust is typically limited by:","o":["Fuel flow only","Maximum EGT/TGT and N1/N2 speed limits","Oil pressure","Noise regulations"],"c":1,"x":"EGT is usually the first limit. Exceeding = accelerated blade deterioration."},{"e":"PP","t":"Turbine Engines","d":4,"q":"Compressor wash is performed by:","o":["Full power with water injection","Motoring at low RPM while spraying cleaning solution into inlet","Disassembly","Running in reverse"],"c":1,"x":"Removes salt, dirt, deposits. Done regularly in marine/dusty environments. Recovers performance without removal."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"An FCU schedules fuel based on:","o":["Pilot input only","Throttle, N1/N2, inlet temp, compressor pressure, and more","Oil temp only","Altitude only"],"c":1,"x":"FCU/FADEC integrates many parameters to prevent over-temp, over-speed, blowout, and stall."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Jet fuel types include:","o":["Avgas 100LL only","Jet A and Jet A-1 (kerosene-based)","Diesel","Premium gasoline"],"c":1,"x":"Jet A (freeze -40\u00b0C), Jet A-1 (freeze -47\u00b0C). NEVER put jet fuel in a recip or avgas in a turbine."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"All turbine engines use:","o":["Wet sump","Dry sump with pressure and scavenge pumps","Splash lubrication","Grease packing"],"c":1,"x":"Dry sump required for extreme attitudes and G-forces. External tank, pressure + scavenge pumps."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"A magnetic chip detector captures:","o":["Oil temperature","Ferrous metal particles indicating wear or damage","Oil viscosity","Fuel contamination"],"c":1,"x":"Fine fuzz = normal. Chunks/flakes = bearing or gear failure. Some have electrical warning contacts."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Variable guide vanes and stator vanes:","o":["Increase efficiency always","Adjust airflow angles to prevent compressor stall at various speeds","Only operate during start","Reduce noise"],"c":1,"x":"At low RPM, blade angles mismatch airflow. Variable vanes correct this across the speed range."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"N1 and N2 gauges indicate:","o":["Oil pressure/temperature","LP and HP spool rotational speeds","Fuel flow and EGT","Vibration levels"],"c":1,"x":"N1 = LP/fan %. N2 = HP %. Critical for monitoring, power setting, and limit compliance."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"Torquemeter on a turboprop indicates:","o":["Blade angle","Power delivered to propeller","Engine vibration","Oil temperature"],"c":1,"x":"Torque = primary turboprop power indication. Measured in ft-lbs, PSI, or percent."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"ITT measures temperature:","o":["At engine inlet","Between HP and LP turbines","At exhaust nozzle exit","In combustion chamber"],"c":1,"x":"Inter-Turbine Temperature \u2014 primary temp limit like EGT/TGT."},{"e":"PP","t":"Recording & Indicating","d":4,"q":"During start, the parameter monitored most carefully is:","o":["Oil pressure","EGT/ITT to catch hot starts before turbine damage","N2 speed","Fuel flow"],"c":1,"x":"EGT rises rapidly during start. Hot start can damage turbine in seconds. Must be ready to abort instantly."},{"e":"PP","t":"Propellers","d":2,"q":"Governor uses oil pressure to:","o":["Lubricate hub","Change blade pitch to maintain selected RPM","Control fuel flow","Drive reduction gears"],"c":1,"x":"Overspeed: oil to increase pitch. Underspeed: release oil for less pitch. Hydraulic control!"},{"e":"PP","t":"Propellers","d":3,"q":"Beta range on a turboprop propeller:","o":["Normal cruise range","Ground operation range \u2014 flat pitch, zero thrust, reverse","Feathered position","Max RPM range"],"c":1,"x":"Pilot has direct pitch control for taxi, braking (reverse), ground idle."},{"e":"PP","t":"Propellers","d":2,"q":"Propeller synchrophasing:","o":["Makes all props same speed","Adjusts relative blade positions to reduce noise/vibration","Feathers all props","Locks pitch"],"c":1,"x":"Fine-tunes angular relationship between props on multi-engine aircraft. Reduces cabin beat frequency."},{"e":"PP","t":"Propellers","d":2,"q":"Blade erosion is worst on:","o":["Blade root","Leading edge near tip (highest airspeed)","Trailing edge at hub","Face center"],"c":1,"x":"Tips travel fastest. Leading edge takes rain/sand impact. Erosion strips protect it."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller de-ice typically uses:","o":["Hot bleed air","Electric heating elements via slip rings","Chemical only","No de-ice needed"],"c":1,"x":"Electric boots or elements. Power via slip rings and brushes. Ice = vibration and performance loss."},{"e":"PP","t":"Propellers","d":4,"q":"If oil to single-acting prop is lost, prop goes to:","o":["Current pitch","Feather \u2014 counterweights and springs drive to high pitch","Flat pitch","Stops rotating"],"c":1,"x":"Safety feature: loss of oil = feather automatically. Prevents windmilling drag after engine failure."},{"e":"PP","t":"Propellers","d":2,"q":"Static RPM check verifies:","o":["Blade tracking","Engine develops proper RPM at full throttle on ground","Propeller balance","Cruise blade angle"],"c":1,"x":"Full throttle static = specific RPM per specs. Low = power issue or high blade angle. High = low blade angle or over-limit."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"An MEL allows dispatch with:","o":["Any equipment inoperative","Specific items inoperative under defined conditions and time limits","No instruments","Major structural damage"],"c":1,"x":"MEL lists specific items that may be inop with conditions and repair timeframes (A/B/C/D intervals)."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"A CDL allows dispatch with:","o":["Any external part missing","Specific external parts missing with performance penalties noted","Engines missing","Primary controls missing"],"c":1,"x":"CDL covers missing fairings, panels, covers. Performance penalties specified. Not for structural items."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Borrowed parts may be installed:","o":["Indefinitely","Temporarily under specific conditions while permanent parts obtained","Only on private aircraft","Never"],"c":1,"x":"Keeps aircraft in service while permanent parts are sourced. Must be serviceable with documentation. Time limited."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Used parts need:","o":["Good appearance","Documentation of identity, condition, and conformity to standards","Same-type aircraft origin","Visual inspection only"],"c":1,"x":"Identity (P/N, S/N) + condition docs (inspection/overhaul) + type design conformity."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"A Flight Permit allows:","o":["Normal commercial ops","Specific flights when normal C of A conditions aren't met","Unlimited VFR","Military operations"],"c":1,"x":"Ferry to maintenance, test flight after mod, demonstration. Specific conditions apply."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A flight permit for failed-inspection aircraft:","o":["30 days","Limited to specific ferry flight as specified by TC","12 months","Indefinite with renewal"],"c":1,"x":"Not a C of A replacement. Limited to the specific purpose (usually ferry to repair facility)."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Journey log must include:","o":["Only flight times","Date, crew, flight time, defects, and maintenance releases","Passenger notes","Weather reports"],"c":1,"x":"Pilots enter flight info; AMEs enter maintenance releases. Travels with aircraft."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Journey log entries must be transcribed to tech logbook:","o":["Within 24 hours","Promptly, before next flight","Within 30 days","No time limit"],"c":1,"x":"Journey log travels with aircraft. Tech records at base. Transcribe promptly."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Private aircraft maintenance schedule is found in:","o":["Created by pilot","CARs Appendix B/C or manufacturer's schedule","Not required","Same for all types"],"c":1,"x":"CAR 625 Appendix B (piston) or C (turbine/large). Manufacturers also publish schedules."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Out-of-phase items are tasks that:","o":["Never required","Come due between scheduled inspections, tracked separately","Only military","Indefinitely deferrable"],"c":1,"x":"Different intervals than main inspection. Must be independently tracked and completed on time."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"A Maintenance Control System for commercial operators includes:","o":["Just aircraft list","Schedule, tracking, recording, QA, and procedures for all maintenance","Only journey logs","Pilot training"],"c":1,"x":"Per CAR 706: comprehensive system overseen by PRM. Required for Part IV/VII operators."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Altimeter/pitot-static test interval for IFR:","o":["Every 100 hours","Every 12 months","Every 24 months","Every 5 years"],"c":2,"x":"Per CAR 605.35: 24-month interval for IFR operations."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"ELT batteries must be replaced at:","o":["25% of life","50% of useful life or expiration date, whichever first","75% of life","Only when ELT fails test"],"c":1,"x":"50% life OR expiration date OR after 1 hour cumulative use. Annual operational check also required."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"In CAR 571.02, the '571' means:","o":["Section only","Part 5 Airworthiness, Subpart 71","571 pages","Sequential number"],"c":1,"x":"Part (first digit) + Subpart (next two). 571 = Part 5, Subpart 71. Helps navigate CARs."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Port (left) position light color:","o":["White","Red","Green","Blue"],"c":1,"x":"Port=RED. Starboard=GREEN. Tail=WHITE. Required sunset-sunrise and IMC."},{"e":"REGS","t":"Airworthiness","d":2,"q":"TCDS contains:","o":["Pilot training requirements","Essential data: model, weight limits, CG range, engine, fuel, limitations","Maintenance history","Insurance requirements"],"c":1,"x":"Type Certificate Data Sheet = aircraft's birth certificate. Authoritative for all design/limitation data."},{"e":"REGS","t":"Airworthiness","d":3,"q":"Major vs minor repair distinction:","o":["Cost of repair","Whether it appreciably affects weight, balance, strength, performance, or airworthiness","Size of damage","Time to repair"],"c":1,"x":"Major = appreciably affects airworthiness qualities. Determines approval requirements."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"Person performing major mod/repair must:","o":["Just do and sign","Use approved data, document on appropriate form, have work inspected","Get verbal approval","Post on social media"],"c":1,"x":"Approved data required. Documented. Inspected before release. Serious regulatory requirement."},{"e":"REGS","t":"Other Standards","d":2,"q":"'Airworthy' under CARs means:","o":["Can fly","Conforms to type design AND in condition for safe operation","Has fuel","Has valid registration"],"c":1,"x":"TWO conditions: type design conformity + safe condition. Both required."},{"e":"REGS","t":"Other Standards","d":3,"q":"Tech records (not journey log) retained for:","o":["1 year","2 years","Life of aircraft/component","30 days"],"c":2,"x":"Permanent retention. Establishes full maintenance history. Loss can ground the aircraft."},{"e":"REGS","t":"Other Standards","d":4,"q":"Complete technical records include:","o":["Just journey log","Journey log, maintenance records, life tracking, AD records, mods, W&B report","Last inspection only","Manufacturer manual"],"c":1,"x":"All maintenance history + life tracking + AD status + modifications + W&B + equipment list. Legal documents."},{"e":"REGS","t":"Other Standards","d":2,"q":"Responsible for keeping aircraft tech records:","o":["Transport Canada","Registered owner","Last AME","Pilot"],"c":1,"x":"Owner is legally responsible per CARs, even if maintenance is delegated."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"AMO update training frequency:","o":["Never","As specified in their MPM","Only when TC requests","Every 5 years"],"c":1,"x":"MPM specifies training requirements. TC audits compliance during surveillance."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Major mod/repair reporting form:","o":["24-0083","Form as specified in CAR 571","Journey log only","No form needed"],"c":1,"x":"Specific documentation required. Includes approved data reference, description, and sign-off."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Commercial operator maintenance standards in:","o":["CARs Part IV and Part VII","Manufacturer manuals only","POH","Airport regulations"],"c":0,"x":"Part IV (smaller) and Part VII (airline). More stringent than private aircraft."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"A transformer works on:","o":["DC only","AC \u2014 changes voltage through electromagnetic induction","Both equally","Solar"],"c":1,"x":"AC only. Changing magnetic field induces voltage in secondary coil. Step-up/step-down."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Impedance in AC circuit is:","o":["Same as DC resistance","Total opposition combining R, XL, and XC","Only XC","Only XL"],"c":1,"x":"Z = \u221a(R\u00b2 + (XL-XC)\u00b2). Measured in ohms."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"Wire gauge is determined by:","o":["Insulation color","Current capacity and allowable voltage drop over length","Registration number","Number of circuits"],"c":1,"x":"Longer runs or higher current = larger gauge needed."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Electrical load analysis ensures:","o":["Correct aircraft weight","Total demand doesn't exceed generating capacity","All lights work","Battery charged"],"c":1,"x":"Tallies ALL loads to verify generators can supply demand. Critical for single-generator failure scenarios."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Aircraft welding types include:","o":["Only spot","Gas (oxy-acetylene), TIG, and electric arc/resistance","Only laser","None used"],"c":1,"x":"Gas for steel tubing. TIG for aluminum/stainless/titanium. Spot for sheet metal. Each requires certification."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"100% weld penetration means:","o":["50% of thickness","Weld fused completely through full material thickness","Covers entire surface","Penetrant tested"],"c":1,"x":"Full penetration = through entire thickness. Visible as smooth bead on backside."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Fabric covering is tested by:","o":["Visual only","Fabric punch tester for minimum tensile strength","Weighing","Color measurement"],"c":1,"x":"Tester measures force to puncture. Below minimum = recover. New \u224850+ lbs."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Dope on fabric aircraft:","o":["Adds CG weight","Tightens, weatherproofs, and protects the fabric","Lubricates cables","Prevents static"],"c":1,"x":"Shrinks fabric tight, seals against moisture, provides smooth paint surface."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Bearing types in aircraft include:","o":["Only ball","Ball, roller, needle, and thrust \u2014 each for specific loads","Only sleeve","Only magnetic"],"c":1,"x":"Ball=radial+light thrust. Roller=heavy radial. Needle=tight spaces. Thrust=axial loads."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Aircraft sealant types include:","o":["Only silicone","Polysulfide, silicone, and polythioether","Only rubber cement","Household caulk"],"c":1,"x":"Polysulfide for fuel tanks. Silicone for high-temp. Polythioether for newer fuel tank applications. Wrong type = failure."},{"e":"SPM","t":"General Servicing","d":2,"q":"Avgas 100LL color:","o":["Clear","Blue","Red","Green"],"c":1,"x":"100LL=BLUE. 100=GREEN. Jet A=clear/straw. Color prevents misfueling. Jet fuel in recip = catastrophic."},{"e":"SPM","t":"General Servicing","d":3,"q":"The 'Dirty Dozen' in aviation maintenance:","o":["Only pilot training","12 common human factors causing maintenance errors","Painting programs","Fuel efficiency"],"c":1,"x":"Lack of communication, complacency, lack of knowledge, distraction, lack of teamwork, fatigue, lack of resources, pressure, lack of assertiveness, stress, lack of awareness, norms. TC tests human factors."},{"e":"AF","t":"Structures","d":2,"q":"Wood structures are inspected for:","o":["Paint condition only","Rot, fungus, compression failures, glue joints, moisture content","Surface scratches only","Weight changes"],"c":1,"x":"Moisture >15% = rot risk. Compression failures across grain from hard landings. Glue joints can fail with age."},{"e":"AF","t":"Structures","d":3,"q":"Wood scarf joint minimum slope:","o":["1:5","1:10","1:12","1:3"],"c":2,"x":"1:12 minimum for structural repairs. Long shallow angle distributes stress evenly."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Heated windshields prevent:","o":["UV damage","Ice/fog plus maintain flexibility for bird strike resistance","Scratching","Discoloration"],"c":1,"x":"Electric elements keep glass warm and flexible enough to absorb bird impacts without shattering."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Max cabin differential pressure is limited by:","o":["Engine power","Fuselage structural strength \u2014 typically 8-9 PSI on modern transports","Fuel capacity","Passenger count"],"c":1,"x":"Fuselage is a pressure vessel. Safety/relief valves prevent exceeding design limits."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"The dump valve:","o":["Adds cabin air","Rapidly depressurizes cabin in emergency or on ground","Controls temperature","Manages O2"],"c":1,"x":"Opens on ground (prevents taxi pressurization) and in emergency (smoke removal, emergency descent)."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Vapor cycle AC uses:","o":["Hot bleed air","Refrigerant with compressor, condenser, expansion valve, evaporator","Ram air only","Electric heaters"],"c":1,"x":"Same as household AC. Common on light/medium aircraft. R-134a refrigerant typical."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A voltage regulator maintains:","o":["Constant RPM","Constant output voltage regardless of load or RPM","Constant current","Constant frequency"],"c":1,"x":"Adjusts field current to maintain 28V DC or 115V AC. Without it, voltage fluctuates and damages equipment."},{"e":"AF","t":"Electrical Systems","d":4,"q":"Split-bus system bus tie purpose:","o":["Always keep buses connected","Connect buses when needed (generator failure) and isolate for fault protection","Provide ground path","Convert AC/DC"],"c":1,"x":"Normal: each generator feeds own bus. Generator fails: bus tie connects remaining generator to all essential loads. Opens for fault isolation."},{"e":"AF","t":"Landing Gear","d":3,"q":"Brake fade occurs when:","o":["Brakes are cold","Excessive heat reduces friction coefficient between pads and disc","Fluid leaks","Tire pressure high"],"c":1,"x":"Heavy braking = extreme heat = material loses friction. More pedal force for same deceleration. Need cooling period."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A hydraulic fuse:","o":["Protects against electrical overload","Shuts off flow if line ruptures to prevent total fluid loss","Filters contaminants","Regulates pressure"],"c":1,"x":"Senses abnormally high flow rate from rupture. Closes to preserve fluid for other systems. Like an electrical fuse for hydraulic flow."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"A selector valve:","o":["Relieves pressure","Directs fluid to actuator ports for directional control","Filters fluid","Stores energy"],"c":1,"x":"Routes pressure to extend/retract gear, flaps, controls. Position determines which port gets pressure vs return."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A dual or independent inspection is required after:","o":["Any maintenance on the aircraft","Only engine overhauls","Any work that disturbs engine or flight controls","Annual inspections only"],"c":2,"x":"Per CAR 571.10: dual inspection after work disturbing engine or flight controls. A second qualified person must independently verify the work. Critical safety requirement."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"During a dual inspection, the second person must:","o":["Watch the first person work","Independently verify the work without knowledge of who performed it","Just sign the paperwork","Only check torque values"],"c":1,"x":"Independent verification means the second inspector checks the work on its own merits. They shouldn't just assume it was done correctly because a qualified person did it."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Under CARs, a 'small aeroplane' has a maximum takeoff weight of:","o":["2,730 kg or less","5,700 kg or less","12,566 kg or less","15,000 kg or less"],"c":1,"x":"5,700 kg (12,566 lbs) is the dividing line between small and large aeroplanes in CARs. This affects which maintenance standards, equipment requirements, and operating rules apply."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"General provisions of the CARs are found in:","o":["AWM Chapter 571","CAR Part III","AWM Chapter 507","CAR Part I"],"c":3,"x":"Part I = General Provisions (definitions, interpretation). Part II = Aircraft Identification. Part III = Personnel Licensing. Part IV = Airworthiness. Part V = Airworthiness (maintenance). Part VI = Operating Rules. Part VII = Commercial Air Services."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"The US aviation regulations are called:","o":["JARs","CARs","PMAs","FARs (Federal Aviation Regulations)"],"c":3,"x":"Canada = CARs, USA = FARs (now called 14 CFR), Europe = EASA regulations (formerly JARs). Know the difference \u2014 TC exams reference foreign regulatory systems."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"MELs are developed from:","o":["The aircraft manufacturer's recommendation only","A Master MEL (MMEL) published by regulatory authority in consultation with manufacturer and industry","The operator's experience only","The Maintenance Review Board"],"c":1,"x":"MMEL is the starting point. The operator tailors it to their specific aircraft configuration and operations, then submits to TC for approval. The MEL can be more restrictive than the MMEL, never less."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Once an MEL is approved, the operator must:","o":["Consider the MEL conditions optional","Operate under the conditions specified in the MEL","Transfer it to other operators of the same type","Ignore it if it conflicts with the maintenance schedule"],"c":1,"x":"MEL conditions are binding once approved. Deviating from MEL conditions = operating in violation of the certificate."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"An item deferred under the MEL with a 'B' rectification interval must be repaired within:","o":["Before next flight","3 consecutive calendar days","10 consecutive calendar days","120 calendar days"],"c":1,"x":"MEL intervals: A = as specified (e.g., before next flight), B = 3 days, C = 10 days, D = 120 days. These are maximum times \u2014 repair sooner if possible."},{"e":"REGS","t":"Parts & Records","d":3,"q":"If a reportable Service Difficulty Report (SDR) of the same nature occurs again on the same product:","o":["No further reporting needed","It must be reported again each time","Only the first occurrence is reported","Report only if it causes an accident"],"c":1,"x":"EVERY occurrence must be reported, even if the same defect was previously reported. Recurring defects are a safety trend that TC needs to track."},{"e":"REGS","t":"Parts & Records","d":2,"q":"Defects that could affect flight safety must be reported to TC via:","o":["A phone call only","A Service Difficulty Report (SDR)","Email to the manufacturer","A letter to the pilot"],"c":1,"x":"SDRs are mandatory for defects affecting safety. They feed into TC's surveillance database to identify systemic problems across the fleet."},{"e":"REGS","t":"Other Standards","d":3,"q":"A person holding a Shop Certification Authority (SCA) is:","o":["Equivalent to a full AME","Authorized in the AMO's MPM to certify maintenance on aircraft PARTS only","Authorized to sign maintenance releases on aircraft","A TC inspector"],"c":1,"x":"SCA = parts/components only in the shop, NOT whole aircraft. Authorized by the AMO's MPM. Different from AME who can sign releases on the whole aircraft."},{"e":"REGS","t":"AME Licensing","d":3,"q":"Maximum AME licence experience credits are:","o":["Unlimited","150 hours/month or 1,800 hours/year","200 hours/month","Based on employer's letter only"],"c":1,"x":"Max 150 hrs/month or 1,800 hrs/year can be credited toward the 48-month experience requirement. Must be documented."},{"e":"REGS","t":"AME Licensing","d":3,"q":"When an AME signs a task in an apprentice's logbook, the AME certifies:","o":["The task was merely completed","The apprentice can perform that task without supervision","The apprentice only observed the task","Nothing \u2014 it's just a formality"],"c":1,"x":"The AME's signature means the apprentice demonstrated competency to perform that specific task independently. It's a professional certification of the apprentice's ability, not just attendance."},{"e":"REGS","t":"AME Licensing","d":2,"q":"AME licence renewal (not expired) requires:","o":["Meeting initial requirements again","Submitting form 24-0083 and paying the appropriate fee","Passing all four technical exams again","A flight test"],"c":1,"x":"Unexpired licence: submit form + pay fee = renewed. Expired over 1 year: may need to meet initial issue requirements including CARs exam. Keep your licence current!"},{"e":"REGS","t":"AME Licensing","d":3,"q":"S and E ratings differ from M1/M2 in that S and E are:","o":["More prestigious","Specific to types of WORK rather than types of aircraft","Only for military","Less difficult to obtain"],"c":1,"x":"M1/M2 = aircraft categories (small/large). S = Structures work. E = Electronics/avionics work. S and E are work-type specific regardless of aircraft category."},{"e":"REGS","t":"Parts & Records","d":3,"q":"The TC Form One (24-0078 Authorized Release Certificate) is:","o":["Only recognized in Canada","An international document recognized worldwide","Only recognized in the USA","A manufacturer's warranty card"],"c":1,"x":"Form One is recognized internationally and in Canada. It certifies that maintenance/manufacturing was performed to approved standards. Similar to FAA 8130-3 and EASA Form 1."},{"e":"REGS","t":"Parts & Records","d":2,"q":"A part without documentation (no Form One, 8130-3, or equivalent) is:","o":["Acceptable if it looks new","A 'bogus part' \u2014 cannot be installed on any aircraft","Fine for non-critical components","Acceptable with visual inspection"],"c":1,"x":"Undocumented parts are legally and practically unusable. Installing bogus parts is a criminal offense and a severe safety hazard. ALWAYS verify part documentation."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"An AMO's MPM is amended by:","o":["The QA department at will","The PRM on the anniversary date","Proposed amendments sent to TC for approval by the certificate holder","TC amends it automatically"],"c":2,"x":"The AMO proposes changes, TC reviews and approves before implementation. MPM amendments must follow the same approval process as the original document."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Who controls authorization for elementary work?","o":["Any AME","The aircraft manufacturer specifies in the maintenance manual","The owner using the tasks listed in CAR 625 Appendix A","The pilot"],"c":2,"x":"CARs Appendix A lists the specific tasks. Owners/operators can perform ONLY those listed tasks using manufacturer's instructions. Anything beyond that list requires an AME."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"An ELT may be tested:","o":["At any time for any duration","During the first five minutes of any hour for five seconds maximum","Only in a shielded room","Only by TC inspectors"],"c":1,"x":"Testing is limited to first 5 minutes of the hour, max 5 seconds, to minimize false alerts. 406 MHz ELTs have specific test procedures that don't transmit a real alert."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"Before a test flight after maintenance, the aircraft must:","o":["Have a fresh coat of paint","Have a conditional maintenance release signed by the AME","Have full passengers aboard","Have a special flight permit in all cases"],"c":1,"x":"A conditional maintenance release allows a test flight to verify that maintenance was done correctly. The conditions and limitations must be specified."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"A maintenance release must include:","o":["Only the AME's signature","A statement that work was done IAW applicable standards, description of work, date, signature, and licence number","Just the date and signature","A description of the aircraft's color"],"c":1,"x":"Per CARs: description of work performed, reference to approved data, date, signature, and AME licence number (or AMO certificate number). Incomplete documentation = no valid release."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"A maintenance release signed by an AME employed by an AMO:","o":["Is more valid than one by an independent AME","Has the same legal weight as any maintenance release","Must also be countersigned by TC","Is only valid for 30 days"],"c":1,"x":"All maintenance releases carry the same legal weight regardless of who signs them. The AME's personal licence is on the line either way."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Where are overhaul intervals for variable pitch propellers found?","o":["In the journey log","In the manufacturer's maintenance manual or type certificate data","In the pilot operating handbook","In the AMO's MPM"],"c":1,"x":"Propeller overhaul intervals are set by the manufacturer and listed in the maintenance manual or TCDS. Not to be exceeded without specific TC approval."},{"e":"REGS","t":"Parts & Records","d":3,"q":"The maximum allowable calendar time between overhauls is determined by:","o":["The operator's preference","The manufacturer's recommendations as approved by TC","The AME's judgment","There is no maximum calendar time"],"c":1,"x":"Manufacturer sets TBO (Time Between Overhauls) in hours AND calendar time. Whichever limit is reached first triggers the overhaul requirement."},{"e":"REGS","t":"Other Standards","d":2,"q":"An amendment to an aircraft's weight and balance report must be made:","o":["Only at annual inspection","Whenever equipment is added, removed, or relocated that affects W&B","Only when the aircraft is sold","Every 5 years"],"c":1,"x":"Any change affecting weight or CG (equipment installation/removal, modifications, repaint) requires W&B amendment. Must be current and accurate."},{"e":"REGS","t":"Other Standards","d":3,"q":"Who is responsible for ensuring the aircraft weight and balance report is current?","o":["The pilot","The registered owner","The AME who last worked on it","Transport Canada"],"c":1,"x":"The owner must ensure W&B records are current. AMEs must amend the W&B when they perform work that affects it (installing/removing equipment)."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A flight permit may be issued for which of the following purposes?","o":["Normal revenue flying","Ferry flight, demonstration, test flight after maintenance, or experimental purposes","Unlimited private flying","International commercial operations"],"c":1,"x":"Flight permits cover specific non-standard situations: ferry to maintenance base, flight test, demonstration, aerial survey, experimental. Each type has specific requirements and limitations."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An aircraft damaged beyond type design conformity but still structurally sound may be issued:","o":["A standard C of A","A special C of A","A flight permit for the purpose of flying to a repair facility","No authorization to fly"],"c":2,"x":"A flight permit allows ferry to a repair base when the aircraft doesn't conform to type design but can still fly safely under specified conditions. Restrictions on route, altitude, passengers, etc."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"Repairing or modifying an aeronautical product may include:","o":["Making of replacement parts per approved data","Any creative solution the AME devises","Only installing manufacturer-supplied parts","Waiting for TC to do the repair"],"c":0,"x":"AMEs can fabricate replacement parts during repair IF using approved data (drawings, SRM specs). Not free-hand engineering \u2014 must have approved technical backing."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Which of the following are forms of approved data for major repairs?","o":["Internet forums and YouTube videos","SRM, engineering orders, STCs, and TC-approved repair schemes","Only the original manufacturer's manual","The AME's personal notes"],"c":1,"x":"Approved data: Structural Repair Manual, Engineering Orders, Supplemental Type Certificates, TC-approved schemes, manufacturer's service bulletins when referenced by an AD. Never use unverified internet sources."},{"e":"REGS","t":"Parts & Records","d":3,"q":"What constitutes the complete technical records for an aircraft?","o":["Just the journey log","Journey log, aircraft technical log, engine log, propeller log, component records, AD/SB compliance, and W&B report","Only the most recent inspection report","The manufacturer's type certificate"],"c":1,"x":"Complete tech records = total history of the aircraft from manufacture to present. Missing records can ground the aircraft and severely reduce its value."},{"e":"REGS","t":"Parts & Records","d":3,"q":"How long must technical records (other than the journey log) be retained?","o":["1 year after the work","Until the next annual inspection","For the life of the product to which they relate","90 days"],"c":2,"x":"Tech records = permanent for the life of aircraft/engine/propeller/component. Journey log entries transferred to tech log. Historical records establish airworthiness pedigree."},{"e":"REGS","t":"Parts & Records","d":2,"q":"When can an inspection sheet forming part of the tech records be disposed of?","o":["When a new inspection is performed","When the aircraft is sold","It cannot be disposed of \u2014 it must be retained for the life of the aircraft","After 2 years"],"c":2,"x":"Inspection records form part of the permanent technical records. They prove the aircraft was maintained per schedule. Disposing of them breaks the airworthiness record chain."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Commercial air operators' maintenance standards are found in:","o":["CARs Part I only","CARs Part IV (small operators) and Part VII (airlines)","Only manufacturer manuals","Airport regulations"],"c":1,"x":"Part IV = commuter/air taxi. Part VII = domestic/international airlines. Both have more stringent maintenance requirements than Part V (private aircraft)."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"A Maintenance Control Manual (MCM) for a commercial operator must be:","o":["Optional reference material","Approved by TC and detail the operator's complete maintenance program","Written by the pilot-in-command","A copy of the manufacturer's manual"],"c":1,"x":"MCM details: scheduling, procedures, tracking, recording, personnel qualifications, training, subcontracting, quality assurance. TC approves it and audits compliance."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"The minimum height of registration marks on a heavier-than-air aircraft is:","o":["6 inches","12 inches","30 centimetres (approximately 12 inches)","50 centimetres"],"c":2,"x":"Per CAR 222.01: marks must be at least 30 cm high for heavier-than-air aircraft. Must be visible, permanent, and in a contrasting color to the background."},{"e":"REGS","t":"Airworthiness","d":2,"q":"A Certificate of Airworthiness is issued based on the aircraft meeting:","o":["Pilot qualifications","Type design standards and being in a condition for safe operation","Insurance requirements","Registration requirements only"],"c":1,"x":"C of A requires: conformity to type design + safe operating condition. Both conditions must be demonstrated to TC through documentation and/or inspection."},{"e":"REGS","t":"Airworthiness","d":3,"q":"When an aircraft is damaged and no longer conforms to type design but is still structurally flyable, it may be classified as:","o":["Airworthy with restrictions","Unairworthy \u2014 requiring either repair to type design conformity or a flight permit","Fully airworthy","Permanently grounded"],"c":1,"x":"Non-conformity to type design = not airworthy under standard C of A. Options: repair to conformity, or get a flight permit to ferry to a repair facility."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Magnetic compasses must generally be recalibrated:","o":["Every flight","After any maintenance that could affect the magnetic field near the compass","Only at annual inspection","Never once installed"],"c":1,"x":"Any maintenance affecting the magnetic environment (avionics work, structural repair near compass, electrical changes) requires compass swing and recalibration."},{"e":"REGS","t":"Other Standards","d":2,"q":"Approximately what percentage of aviation accidents involve human error?","o":["25-30%","50-60%","75-80%","95-100%"],"c":2,"x":"~75-80% of aviation accidents involve human error. Of those, ~12% are maintenance-related. TC requires Human Factors training as part of AME/AMO programs."},{"e":"REGS","t":"Other Standards","d":3,"q":"Maintenance organizations are required to have Human Factors training because:","o":["It's optional but recommended","TC mandates it to reduce the ~12% of accidents caused by maintenance errors","It's only for pilots","It's a manufacturer requirement"],"c":1,"x":"Human Factors training addresses the Dirty Dozen error-producing conditions. TC requires it as part of AMO quality assurance and AME initial/recurrent training."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"An AME discovers during maintenance that an AD was not complied with at the required interval. The aircraft has been flying past the AD deadline. The AME must:","o":["Ignore it and complete the current maintenance","Record the non-compliance, ensure the AD is complied with before release, and report the situation to the operator/owner","Comply with the AD but not report the prior non-compliance","Only comply if asked by the operator"],"c":1,"x":"AD non-compliance = the aircraft was unairworthy during those flights. AME must: 1) comply with the AD now, 2) record the finding, 3) notify the operator of the non-compliance. The operator may need to notify TC depending on the nature of the AD."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"A pilot reports a vibration in flight. After landing, the AME inspects and finds nothing wrong. The correct action is:","o":["Erase the pilot's defect entry","Enter in the journey log that the defect was investigated and no fault was found, then sign a maintenance release","Tell the pilot verbally that it's fine","Do nothing since no defect was found"],"c":1,"x":"ALL reported defects must be addressed in writing. Even if no fault is found, document the investigation and findings. The maintenance release clears the defect entry. Never erase or ignore pilot reports."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An aircraft on a private maintenance schedule has reached its annual inspection date. The owner wants to fly to a shop 200 nm away for the inspection. Can they?","o":["Yes, the aircraft can fly until the inspection is overdue by 10%","No, the aircraft cannot fly once inspection is due \u2014 must either inspect locally or get a flight permit","Yes, there is no restriction on flying to an inspection facility","Only if the pilot is also an AME"],"c":1,"x":"Once an inspection is due, the aircraft is no longer airworthy for normal operations. Options: perform inspection where it is, or apply for a flight permit to ferry to a maintenance facility. Cannot simply fly 'over' the inspection due date."},{"e":"REGS","t":"Other Standards","d":4,"q":"If an AME's licence is suspended by TC, the AME:","o":["Can continue signing releases until the appeal is heard","Must immediately cease exercising any licence privileges","Can sign releases under supervision","Can still perform maintenance, just not sign releases"],"c":1,"x":"Suspension = immediate cessation of ALL licence privileges. Cannot sign releases, cannot perform maintenance requiring AME authority. The appeal process doesn't restore privileges during suspension."},{"e":"REGS","t":"Parts & Records","d":4,"q":"A part with a valid Form One from a foreign country with which Canada has a bilateral airworthiness agreement:","o":["Cannot be installed on a Canadian aircraft","May be installed if the bilateral agreement covers that type of part/maintenance","Must be re-inspected and re-certified in Canada regardless","Needs TC approval for each individual installation"],"c":1,"x":"Bilateral agreements (like with FAA/EASA) may allow mutual acceptance of release certificates. BUT the scope of the agreement matters \u2014 not all work under all agreements is automatically accepted. The AME must verify the agreement covers the specific situation."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A Technical Standard Order (TSO) is issued by:","o":["Aircraft manufacturers","The FAA Administrator (or equivalent authority)","Individual AMEs","Airlines"],"c":1,"x":"TSO is a minimum performance standard for specified articles. Issued by the authority (FAA issues TSOs, TC may accept them). A TSO article must meet the stated design and performance standards."},{"e":"REGS","t":"Other Standards","d":3,"q":"The pilot does NOT have access to the aircraft's full technical records. They only see:","o":["The complete maintenance history","The journey log","The manufacturer's manuals","Nothing \u2014 pilots have full access"],"c":1,"x":"Pilots work from the journey log, which travels with the aircraft. Full technical records (maintenance logs, component tracking, AD records) are kept by the owner/operator at the maintenance base. The pilot checks the journey log for defects and releases before each flight."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"A person employed by an AMO may sign a maintenance release if:","o":["They hold any certification at all","They are authorized in the AMO's MPM \u2014 either as an AME, or under an SCA/RCA for specific tasks","They are an apprentice under supervision","They have been employed for at least 5 years"],"c":1,"x":"AMO authorization comes through the MPM. AMEs sign for aircraft. SCA holders sign for parts/shop work. RCA holders sign for specific authorized tasks. All must be listed in the AMO's MPM."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"What type of bearings are generally used for connecting rods and camshafts?","o":["Ball bearings","Roller bearings","Plain (sleeve) bearings","Needle bearings"],"c":2,"x":"[FAA AMP Q1] Plain bearings (sleeve/journal type) are used where loads are heavy and rotational speed is moderate \u2014 connecting rods and camshafts."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"The five events of a four-stroke cycle in order are:","o":["Intake, ignition, compression, power, exhaust","Intake, compression, power, ignition, exhaust","Intake, compression, ignition, power, exhaust"],"c":2,"x":"[FAA AMP Q2] Intake, Compression, IGNITION (spark), Power (expansion), Exhaust. Note ignition starts the power stroke. TC uses 4 options; added one."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Operating a recip engine at high power before proper warmup is likely to cause:","o":["Oil starvation of bearings","Excessive oil pressure","Thermal shock of cylinders","Flooded spark plugs"],"c":2,"x":"[FAA AMP Q3] Cold cylinders subjected to sudden high heat = thermal shock = cracking. Always warm up gradually."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Some cylinder barrels are hardened by:","o":["Nitriding","Honing","Quenching","Annealing"],"c":0,"x":"[FAA AMP Q6] Nitriding diffuses nitrogen into the steel surface, creating an extremely hard wear-resistant layer. Common on cylinder barrels."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Two or more valve springs per valve are used to:","o":["Equalize side pressure on the stem","Eliminate valve spring vibration or surging","Help equalize valve face loading","Increase valve lift"],"c":1,"x":"[FAA AMP Q7] Multiple springs of different natural frequencies prevent harmonic resonance (surging) that could cause valve float at certain RPMs."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Cylinder volume is 70 cu in at BDC and 10 cu in at TDC. Compression ratio is:","o":["10:7","10:1","7:1","6:1"],"c":2,"x":"[FAA AMP Q8] CR = total volume / clearance volume = 70/10 = 7:1. This is the exact format TC uses for compression ratio questions."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"The position of cowl flaps during normal cruise is:","o":["Closed","Open","Neutral","Trail position"],"c":0,"x":"[FAA AMP Q66] Cowl flaps closed in cruise for streamlining. Open during climb/ground ops for max cooling. Neutral/trail not standard terminology."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Cracks in cooling fins that do NOT extend into the cylinder head:","o":["Require immediate cylinder replacement","May be repaired by removing affected area and contour filing within limits","Must be left alone","Require welding repair"],"c":1,"x":"[FAA AMP Q67] Small cracks in fins (not reaching the head) can be filed smooth within manufacturer's limits. Reduces cooling slightly but is airworthy."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"What carburetor component limits maximum airflow at full throttle?","o":["Throttle valve","Venturi","Main metering jet","Float"],"c":1,"x":"[FAA AMP Q54] The venturi is the narrowest point and limits max airflow. The throttle valve is fully open at full throttle, so it's not the limiting factor."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"What ensures fuel delivery during rapid engine acceleration?","o":["Accelerator pump","Engine-driven fuel pump","Power enrichment unit","Idle cutoff"],"c":0,"x":"[FAA AMP Q55] The accelerator pump squirts extra fuel during rapid throttle opening to prevent a lean stumble. Spring or diaphragm operated."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"Fuel leaking from the carburetor with engine not running is likely caused by:","o":["Float needle valve not seating properly","Float level too low","Main air bleed clogged","Mixture too rich"],"c":0,"x":"[FAA AMP Q56] Leaking needle valve can't stop fuel flow when float rises. Fuel overflows from the discharge nozzle. Requires valve replacement."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"The function of an automatic mixture control (AMC) is to:","o":["Compensate for air density changes due to temperature and altitude","Compensate for air pressure above the float chamber","Compensate for venturi pressure only","Adjust idle RPM"],"c":0,"x":"[FAA AMP Q59] AMC automatically leans the mixture as altitude increases and air density decreases. Maintains proper fuel-air ratio without pilot input."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"A method commonly used to prevent carburetor icing is:","o":["Preheating the intake air","Mixing alcohol with fuel","Electrically heating the throttle valve","Adding anti-ice fluid to fuel"],"c":0,"x":"[FAA AMP Q64] Carb heat diverts heated air (from exhaust manifold) to the carburetor intake. Raises temp above freezing point of moisture."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"Where is the main fuel strainer located?","o":["At the highest point in the fuel system","At the lowest point in the fuel system","At the inlet of the carburetor","In the fuel tank"],"c":1,"x":"[FAA AMP Q62] Lowest point collects water and sediment by gravity. Drain valve at the bottom allows contaminant removal during preflight/maintenance."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Switching from BOTH to one magneto during ground check should show:","o":["Increase in manifold pressure","Slight RPM drop","Drop in torquemeter pressure","No change at all"],"c":1,"x":"[FAA AMP Q5] Single magneto = one plug per cylinder = slightly less efficient combustion = slight RPM drop. Normal. Excessive drop = problem. No drop = P-lead issue."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"The three distinct circuits of a high-tension magneto are:","o":["Magnetic, primary, and secondary","Magnetic, E-gap, and P-lead","Primary, P-lead, and secondary","Input, process, and output"],"c":0,"x":"[FAA AMP Q42] Magnetic circuit (rotating magnet + pole shoes). Primary circuit (coil, points, capacitor). Secondary circuit (secondary coil, distributor, spark plugs)."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Dual ignition advantages include backup, increased power, and:","o":["Use of lower grade fuels","Increased spark intensity at each plug","Increased power output from more complete combustion","Reduced fuel consumption"],"c":2,"x":"[FAA AMP Q43] Two flame fronts per cylinder = faster, more complete combustion = more power. Plus redundancy if one system fails."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Defective spark plugs cause the engine to run rough:","o":["Only during run up","Only during cruise","At all speeds","Only at idle"],"c":2,"x":"[FAA AMP Q44] Bad plugs affect combustion at every RPM. May be more noticeable at certain speeds but the misfire is always present."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"The primary advantage of pneumatic (air turbine) starters over electric starters for turbines is:","o":["Lack of commutator wear","It doesn't disengage until idle","High power-to-weight ratio","Lower cost"],"c":2,"x":"[FAA AMP Q45] Air turbine starters deliver enormous starting torque in a very light, compact package. Essential for large turbines needing high cranking power."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"A shift in magneto internal timing is probably caused by:","o":["Rotating magnet losing magnetism","Distributor gear wear","Cam follower and/or breaker point wear","Capacitor failure"],"c":2,"x":"[FAA AMP Q51] Wear on the cam follower rubbing block changes the point at which points open, shifting timing. Points also wear, changing the gap and timing."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"The magnetic core of a magneto is made of:","o":["Hard steel","Soft iron","Electrical steel","Copper"],"c":1,"x":"[FAA AMP Q52] Soft iron is highly permeable to magnetic flux and doesn't retain magnetism \u2014 essential for the rapidly changing fields in a magneto."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Capacitor-type ignition on turbine engines is used primarily for its high voltage and:","o":["Low amperage","Long life","High heat intensity","Fast repetition rate"],"c":2,"x":"[FAA AMP Q48] Capacitor discharge produces extremely hot spark needed to ignite atomized jet fuel. High energy in a very short pulse."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Igniter plugs in turbine engines have long service life because they:","o":["Have a high intensity spark","Operate continuously with lower spark","Do not require continuous operation","Are cooled by fuel flow"],"c":2,"x":"[FAA AMP Q50] Igniters only fire during start and relight. Once combustion is self-sustaining, they shut off. No continuous wear."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Viscosity of a liquid measures its:","o":["Resistance to flow","Rate of change","Weight or density","Boiling point"],"c":0,"x":"[FAA AMP Q34] Viscosity = internal friction resisting flow. Critical oil property. Temperature dependent \u2014 thinner hot, thicker cold."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Which has the greatest effect on lubricating oil viscosity?","o":["Temperature","Engine RPM","Oil pressure","Oil quantity"],"c":0,"x":"[FAA AMP Q37] Temperature is the dominant factor. Hot oil flows easily (low viscosity). Cold oil is thick (high viscosity). That's why multi-grade oils exist."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"If an oil filter becomes completely clogged:","o":["Oil flow to engine is restricted","Oil is bypassed back to tank","Bypass valve opens supplying unfiltered oil to engine","Engine shuts down automatically"],"c":2,"x":"[FAA AMP Q41] The bypass valve protects against oil starvation. Unfiltered oil is better than NO oil. That's why filter changes on schedule are critical."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"What prevents oil from entering the accessory case when engine is not running?","o":["Pressure valve","Hydraulic fuse","Check valve","Oil cooler"],"c":2,"x":"[FAA AMP Q39] Check valve blocks gravity oil flow when pump isn't running. Prevents oil pooling in the accessory case and potential hydraulic lock on start."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"Fire detection systems commonly used in engine nacelles:","o":["Fire detection control unit","Thermocouple detector","Kidde continuous-loop","Smoke detector"],"c":2,"x":"[FAA AMP Q27] Continuous-loop (Kidde or Fenwal) is standard for engine nacelles. Provides zone-wide coverage with a single sensing element around the engine."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"The blowout indicator disk on a fixed fire extinguishing system \u2014 when the yellow disk is missing, it means:","o":["System is charged and ready","System has been normally discharged","System may have discharged due to overpressure","System needs maintenance"],"c":1,"x":"[FAA AMP Q25] Yellow = normal discharge. Red = thermal (overpressure) discharge. Green = charged (on some systems). Know the color codes."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"If a fire starts in the induction system during engine start:","o":["Turn off fuel pump switches","Continue cranking the engine","Turn off magneto switches","Evacuate immediately"],"c":1,"x":"[FAA AMP Q65] Continue cranking \u2014 engine airflow draws fire into the engine and extinguishes it. Same answer for both FAA and TC exams."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"EGT thermocouples in turbine engines are constructed of:","o":["Iron and constantan","Copper and constantan","Chromel and alumel","Platinum and rhodium"],"c":2,"x":"[FAA AMP Q22] Chromel-alumel (Type K thermocouple) for EGT/TGT. Accurate at high temperatures. Iron-constantan is for lower temp applications like CHT."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"A malfunctioning fuel nozzle in a turbine engine is best indicated during exhaust inspection by:","o":["Buckling of the combustion liner","Hot spots on the tail cone","Carbon buildup in the exhaust","Even discoloration"],"c":1,"x":"[FAA AMP Q23] A bad nozzle creates an uneven flame pattern \u2192 localized overheating \u2192 hot spots visible on the tail cone. Classic troubleshooting indicator."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"An electronic engine control (EEC) receives operating information and:","o":["Adjusts a standard hydromechanical FCU for optimal operation","Develops commands to actuators to control engine parameters","Controls based on ambient conditions only","Only monitors \u2014 doesn't control"],"c":1,"x":"[FAA AMP Q60] Modern EEC/FADEC: takes sensor inputs, computes optimal settings, sends commands to fuel metering, variable geometry, bleeds, etc."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Before engine trimming, you should:","o":["Call tower for barometric pressure and temperature","Observe the aircraft OAT gauge","Obtain a true temperature reading comparable to air entering the engine","Use standard day values"],"c":2,"x":"[FAA AMP Q61] Engine trimming adjusts idle and max thrust. Must use actual inlet conditions \u2014 not cockpit OAT (which may be heat-affected) or tower data (which is at ground level)."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"The pressure between turbocharger and throttle valve is called:","o":["Turbocharger boost pressure","Induction manifold pressure","Upper deck pressure","Compressor discharge pressure"],"c":2,"x":"[FAA AMP Q72] Upper deck pressure = the pressurized air between turbo output and throttle. Monitored to prevent over-boost."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"The differential pressure controller on a turbocharger:","o":["Limits max manifold pressure at full throttle","Controls waste gate at all positions except fully open","Controls waste gate position after critical altitude","Adjusts fuel mixture"],"c":2,"x":"[FAA AMP Q63] Above critical altitude, the differential pressure controller modulates the waste gate to maintain constant upper deck pressure as ambient drops."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"Rearward thrust with reverser deployed is:","o":["Less than forward capability","Greater than forward","Equal to forward","Zero"],"c":0,"x":"[FAA AMP Q69] Reverse thrust is always LESS than forward \u2014 typically 40-50% of forward thrust. Used to supplement wheel brakes, not replace them."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Thrust reverser systems must be:","o":["Lightweight only","Able to withstand high temps, mechanically strong, light, and reliable","Operated only in pairs","Manually controlled"],"c":1,"x":"[FAA AMP Q70] Reversers operate in extreme heat near the exhaust, must be strong enough to redirect thrust forces, light for performance, and reliable for safety."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Dislodged muffler baffles on a recip engine may cause:","o":["Excessive exhaust back pressure","Engine overspeed","High oil consumption","No effect"],"c":0,"x":"[FAA AMP Q71] Loose baffles restrict exhaust flow = back pressure = reduced power, rough running, and possible exhaust system damage. Inspect during maintenance."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Who establishes the recommended TBO for a turbine engine?","o":["Engine manufacturer","TBO doesn't apply to turbines","Aircraft manufacturer","The operator"],"c":0,"x":"[FAA AMP Q10] Engine manufacturer sets TBO based on testing and service experience. For certified engines, TC may make it mandatory."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Who establishes mandatory replacement times for critical turbine components?","o":["Aircraft manufacturer","Component manufacturer","Engine manufacturer","The operator"],"c":2,"x":"[FAA AMP Q12] Engine manufacturer determines life limits for discs, shafts, and other critical rotating parts. These are mandatory \u2014 no extensions."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Turbine engine components exposed to high temperatures may only be marked with:","o":["Grease or wax pencil","Layout dye","Graphite lead pencil","Felt-tip marker"],"c":2,"x":"[FAA AMP Q11] Only graphite pencil! Other marking materials contain chemicals that cause intergranular corrosion or stress cracking at high temperatures. Classic exam question."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"The first engine instrument indication of a successful turbine start is:","o":["Rise in engine RPM","Rise in oil temperature","Rise in exhaust gas temperature","Rise in fuel flow"],"c":2,"x":"[FAA AMP Q13] EGT/ITT rises first as fuel ignites. RPM then increases as the turbine extracts energy. If EGT rises but RPM doesn't follow \u2014 hung start."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Turbine blades are more susceptible to damage than compressor blades because of:","o":["High probability of carbon deposits","Exposure to high temperatures","Less exposure to cleaning solution","Higher rotational speed"],"c":1,"x":"[FAA AMP Q15] Turbine blades operate in extreme heat causing creep, thermal fatigue, oxidation, and erosion. Compressor blades run cooler but face FOD risk."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"Stator vanes in a turbine engine are:","o":["Rotating airfoils on the compressor disc","Non-rotating airfoils that direct airflow between rotor stages","Part of the combustion chamber","Exhaust nozzle components"],"c":1,"x":"[FAA AMP Q16] Stators (vanes) are fixed. They redirect airflow at the correct angle into the next rotor stage. Also act as diffusers, converting velocity to pressure."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Stators in a turbine engine act as diffusers by converting:","o":["Pressure to velocity","Velocity to pressure","Heat to pressure","Pressure to heat"],"c":1,"x":"[FAA AMP Q18] Stator passages are divergent \u2014 air slows down and pressure increases. This is the core of how an axial compressor builds pressure stage by stage."},{"e":"PP","t":"Propellers","d":2,"q":"Propellers exposed to salt spray should be flushed with:","o":["Engine oil","Fresh water","Soapy water","Solvent"],"c":1,"x":"[FAA AMP Q73] Salt is highly corrosive. Flush with fresh water ASAP after salt exposure. Then dry and apply protective treatment per manufacturer instructions."},{"e":"PP","t":"Propellers","d":2,"q":"Dye penetrant inspection of aluminum prop blades detects:","o":["Fatigue failure (cracks)","Material debond","Warpage","Internal voids"],"c":0,"x":"[FAA AMP Q74] DPI finds surface-breaking cracks from fatigue. Aluminum props are especially susceptible to fatigue at blade root and bolt holes."},{"e":"PP","t":"Propellers","d":2,"q":"Propeller blade station numbers increase from:","o":["Hub centerline to tip","Tip to hub","Blade shank butt to tip","Leading edge to trailing edge"],"c":0,"x":"[FAA AMP Q75] Station numbers increase outward from the hub center. Used for measuring blade angle, tracking repairs, and specifying inspection zones."},{"e":"PP","t":"Propellers","d":2,"q":"Ice formation on a propeller blade will:","o":["Produce unbalance and vibration","Increase thrust and drag","Cause a change in blade angle","Have no noticeable effect"],"c":0,"x":"[FAA AMP Q77] Uneven ice = asymmetric mass = vibration. Also changes airfoil shape reducing efficiency. That's why prop de-ice systems exist."},{"e":"PP","t":"Pr
