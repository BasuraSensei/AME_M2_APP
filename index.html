odynamics","d":2,"q":"The vertical stabilizer provides:","o":["Lift","Directional (yaw) stability \u2014 keeps the aircraft pointed into the relative wind","Roll stability","Pitch stability"],"c":1,"x":"Vertical fin acts like a weathervane. If the aircraft yaws, the fin generates side force to return the nose to the direction of flight. Rudder provides directional control."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Load factor in a level 45\u00b0 banked turn is approximately:","o":["1.0G","1.41G","2.0G","3.0G"],"c":1,"x":"LF = 1/cos(bank). At 45\u00b0: 1/cos(45) = 1/0.707 = 1.41G. Stall speed increases by \u221aLF = \u221a1.41 = 1.19 (19% higher). At 60\u00b0 it's 2G."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Pack valve in an air conditioning system:","o":["Opens the fuel tank","Controls the flow of bleed air to the air cycle machine (ACM)","Adjusts seat position","Controls oxygen flow"],"c":1,"x":"Pack valve = shutoff valve for bleed air supply to each AC pack. Closes during engine start, opens for normal cooling. Pack failure may require descending to lower altitude."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"An air cycle machine (ACM) cools bleed air by:","o":["Electrical refrigeration","Expanding compressed air through a turbine \u2014 expansion causes cooling","Adding ice","Using liquid nitrogen"],"c":1,"x":"Bootstrap ACM: compressor + turbine on same shaft. Hot bleed air is cooled in heat exchanger, compressed, cooled again, then expanded through turbine (rapid cooling). No refrigerant needed."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"A cabin altitude warning activates when cabin altitude reaches:","o":["Sea level","Approximately 10,000 feet \u2014 alerting crew to a pressurization problem","Maximum cruise altitude","Any altitude above 5,000 feet"],"c":1,"x":"At 10,000 ft cabin altitude, passengers begin experiencing hypoxia effects. Warning horn and/or master caution alerts crew to take action (descend and/or fix pressurization)."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Emergency oxygen masks in the cabin deploy at:","o":["Any turbulence","Approximately 14,000 feet cabin altitude \u2014 automatically dropping from overhead panels","Only when manually activated","At takeoff"],"c":1,"x":"Chemical oxygen generators activate when the mask is pulled down. Provide approximately 12-22 minutes of oxygen depending on aircraft type. The chemical reaction makes the generator HOT \u2014 normal."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Cabin air is recirculated through HEPA filters to:","o":["Save fuel by reducing bleed air demand","Remove particles, bacteria, and viruses while reducing the amount of engine bleed air needed","Just for smell control","Only for temperature control"],"c":1,"x":"Recirculation: ~50% fresh bleed air + ~50% filtered recirculated air. HEPA filters capture 99.97% of particles. Reduces engine bleed demand = better fuel efficiency."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"A negative pressure relief valve prevents:","o":["Excessive positive pressure","External pressure from exceeding cabin pressure (which would collapse inward-opening doors/structure)","Oxygen leaks","Fuel venting"],"c":1,"x":"During rapid descent, outside pressure could exceed cabin pressure. Negative relief valve opens to equalize, preventing structural damage. Separate from the positive relief valve."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"The gaseous oxygen system stores oxygen at:","o":["Atmospheric pressure","High pressure \u2014 typically 1,800-2,200 PSI in steel or composite bottles","Liquid temperature","Low pressure in bladders"],"c":1,"x":"High-pressure bottles in crew and passenger areas. Pressure gauge checked during maintenance. Bottle must be hydrostatically tested periodically."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"A combustion heater in a small aircraft:","o":["Uses cabin air directly through a flame","Burns fuel in a sealed combustion chamber; cabin air passes over the hot chamber without contacting combustion gases","Is electrically powered","Uses engine exhaust only"],"c":1,"x":"Combustion heater: fuel burns inside sealed chamber. Cabin air flows AROUND the outside (heat exchanger). Combustion gases exhaust overboard. A cracked chamber = CO in cabin = lethal."},{"e":"AF","t":"Cabin & Atmospheric","d":4,"q":"A pressurized aircraft door seal that leaks will cause:","o":["No noticeable effect","Whistling noise, difficulty maintaining cabin altitude, and possible fog/mist near the leak","Only cosmetic damage","Improved ventilation"],"c":1,"x":"Door seal leaks = can't maintain pressure differential. Pressure controller compensates by increasing inflow, but if leak exceeds capacity, cabin altitude rises. Inspect seals regularly."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"The outflow valve is typically located:","o":["On the nose","On the lower aft fuselage","On the wing","On the vertical stabilizer"],"c":1,"x":"Lower aft fuselage is standard. This location ensures pressurized air flows through the entire cabin before exiting. Some aircraft have forward and aft outflow valves."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"A VOR receiver provides:","o":["Distance information","Bearing TO or FROM a ground-based VOR station","Altitude data","Ground speed"],"c":1,"x":"VHF Omnidirectional Range: radials from the station. CDI shows course deviation. Used for en-route navigation and instrument approaches. Being supplemented by GPS."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"A radio altimeter measures:","o":["Barometric altitude","Actual height above the ground using radar signals","Cabin altitude","Pressure altitude"],"c":1,"x":"Radar altimeter: transmits signal to ground, measures return time. Shows actual height AGL. Critical for instrument approaches (decision height) and GPWS."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"GPWS (Ground Proximity Warning System) alerts include:","o":["Only stall warning","Excessive descent rate, terrain closure, altitude loss after takeoff, glideslope deviation, and windshear","Only engine fire","Only gear warnings"],"c":1,"x":"GPWS modes: sink rate, terrain closure, altitude loss after TO/GA, gear not down, below glideslope, windshear. Enhanced GPWS (EGPWS) adds terrain database with look-ahead capability."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"An aircraft transponder operates in modes:","o":["Only Mode A","Mode A (identification), Mode C (altitude), and Mode S (data link/TCAS)","Only Mode C","AM and FM"],"c":1,"x":"Mode A: squawk code. Mode C: pressure altitude. Mode S: selective address, data exchange, TCAS support. ADS-B Out uses Mode S extended squitter for broadcast position."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"TCAS II provides:","o":["Only traffic advisories","Both Traffic Advisories (TA) and Resolution Advisories (RA) with vertical escape commands","Weather data","Navigation guidance"],"c":1,"x":"TCAS I: TAs only (awareness). TCAS II: TAs + RAs (climb/descend commands). RAs coordinate between aircraft so they don't both maneuver the same way."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"ADS-B transmits:","o":["Only voice communications","Aircraft position, altitude, speed, and identification automatically to ground stations and other aircraft","Only radar returns","Engine data"],"c":1,"x":"Automatic Dependent Surveillance-Broadcast: GPS position broadcast every second. ADS-B Out = transmit. ADS-B In = receive traffic and weather. Mandatory in many airspaces."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"A Flight Management System (FMS) integrates:","o":["Only fuel monitoring","Navigation, performance, and fuel management into one system \u2014 computes optimal routes, speeds, and altitudes","Only autopilot control","Only radio tuning"],"c":1,"x":"FMS = the brain of modern navigation. Inputs: aircraft performance data, route, weather, fuel. Outputs: guidance to autopilot, recommended speeds and altitudes. Reduces pilot workload significantly."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"HF radio is used for:","o":["Short-range communication only","Long-range communication over oceans and remote areas where VHF doesn't reach","Only ground-to-ground","Only military"],"c":1,"x":"HF (2-30 MHz): signals bounce off the ionosphere for long range. Lower quality than VHF but essential for oceanic and remote operations where no VHF stations exist."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Aircraft AC power is typically:","o":["28V single phase","115V/200V 400Hz three-phase","240V 60Hz","12V DC"],"c":1,"x":"Aircraft AC: 115V (single phase) or 200V (3 phase) at 400 Hz (not 60Hz like household). Higher frequency = smaller/lighter transformers and motors. Generated by engine-driven alternators."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A constant-speed drive (CSD) maintains:","o":["Constant aircraft speed","Constant generator RPM regardless of engine speed \u2014 ensuring stable 400Hz output","Constant fuel flow","Constant cabin temperature"],"c":1,"x":"CSD = a hydraulic transmission between the engine accessory drive and the generator. Variable engine RPM in \u2192 constant RPM out \u2192 stable 400Hz AC. IDG (Integrated Drive Generator) combines CSD + generator."},{"e":"AF","t":"Electrical Systems","d":2,"q":"The battery bus provides power to:","o":["Everything on the aircraft","Essential equipment that must be powered when generators are offline (emergency instruments, radios, lighting)","Only battery charging","Only engine starting"],"c":1,"x":"Battery bus = last resort power. Limited capacity. Powers only the most critical equipment. Battery endurance is typically 30-60 minutes depending on load."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Current limiters differ from circuit breakers in that:","o":["They are identical","Current limiters are designed to carry overloads for a longer time before opening \u2014 used on feeder/bus circuits","Current limiters are faster","Current limiters can be reset"],"c":1,"x":"Current limiters protect heavy-gauge feeder wires. They allow brief overloads (motor starting surges) but open for sustained overloads. Cannot be reset \u2014 must be replaced. Like very slow-blow fuses."},{"e":"AF","t":"Electrical Systems","d":2,"q":"An inverter converts:","o":["AC to DC","DC to AC \u2014 providing 115V 400Hz AC from the DC bus","High voltage to low","Low voltage to high"],"c":1,"x":"Inverter: DC\u2192AC. TRU: AC\u2192DC. Know the difference. Some instruments and equipment require AC power; inverters provide it from the DC system on aircraft with DC generators."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A generator control unit (GCU) protects against:","o":["Only overvoltage","Overvoltage, undervoltage, overexcitation, and differential fault conditions","Only ground faults","Nothing \u2014 it just regulates"],"c":1,"x":"GCU is the generator's brain and bodyguard. Regulates voltage AND protects: overvoltage protection trips the generator off the bus, differential protection detects internal faults."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Static wicks (dischargers) on trailing edges:","o":["Are decorative","Dissipate static charge to prevent radio interference from precipitation static (P-static)","Generate electrical power","Measure static pressure"],"c":1,"x":"Flying through precipitation builds static charge. Without wicks, charge discharges in bursts causing radio noise. Wicks provide a controlled, low-noise discharge path. Check condition regularly."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Electrical load shedding during an emergency:","o":["Adds more loads","Automatically disconnects non-essential loads to preserve power for essential equipment","Shuts down all power","Only affects lighting"],"c":1,"x":"With a generator failure, remaining generator(s) may be overloaded. Load shedding (automatic or manual) drops non-essential loads (galleys, entertainment, non-essential heating) to protect essential systems."},{"e":"AF","t":"Electrical Systems","d":2,"q":"A ground power unit (GPU) provides:","o":["Fuel","External electrical power for aircraft maintenance and starting without running engines or draining the battery","Hydraulic pressure","Pneumatic air"],"c":1,"x":"GPU supplies 28V DC or 115V 400Hz AC via an external power receptacle. Must match aircraft voltage/frequency. External power relay prevents backfeed. Check voltage before connecting."},{"e":"AF","t":"Electrical Systems","d":4,"q":"If a generator fails on a twin-engine aircraft with split bus, the bus tie:","o":["Opens to isolate the fault","Closes to connect the live generator to both buses, powering all essential equipment","Shuts down both generators","Has no function"],"c":1,"x":"Bus tie closes = remaining generator feeds both buses (with load shedding of non-essentials). If the failed generator has an internal fault, the bus tie may open to protect the good generator."},{"e":"AF","t":"Fire Protection","d":2,"q":"Fire zones on an aircraft typically include:","o":["The cabin only","Engine nacelles, APU compartment, and wheel wells on some aircraft","Only the cockpit","Only cargo areas"],"c":1,"x":"Fire zones = areas where flammable fluids/gases exist near potential ignition sources. Required to have detection and suppression systems, firewall containment, and ventilation."},{"e":"AF","t":"Fire Protection","d":3,"q":"A firewall in an engine nacelle is:","o":["Decorative","A fire-resistant barrier that contains fire within the engine compartment for a specified time","An engine mount","A heat shield only"],"c":1,"x":"Firewall: stainless steel or titanium barrier. Must contain a fire for at least 15 minutes. All penetrations (wiring, hoses, cables) must be fire-sealed. Critical structural safety element."},{"e":"AF","t":"Fire Protection","d":2,"q":"Smoke detectors in cargo compartments use:","o":["Heat sensing only","Photoelectric sensors that detect visible smoke particles","Flame detection","Manual pilot observation"],"c":1,"x":"Cargo holds can't be visually monitored. Smoke detectors provide early warning. Class C cargo: detection + suppression. Class D cargo: detection only (starve fire of oxygen by sealing)."},{"e":"AF","t":"Fire Protection","d":3,"q":"A built-in fire extinguishing system typically provides:","o":["Unlimited shots","Two shots of agent per engine \u2014 primary discharge and reserve","One shot only forever","Continuous flow"],"c":1,"x":"Two bottles per engine (sometimes crossfeed capable). First shot = primary. Wait 30-60 seconds. If fire persists, second shot = reserve. After both shots, no more onboard suppression."},{"e":"AF","t":"Fire Protection","d":3,"q":"Lavatory smoke detectors and automatic fire extinguishers are required because:","o":["They're optional equipment","Lavatory fires (often from smoking violations) can go undetected and spread rapidly in an enclosed space","Only for comfort","Regulations don't require them"],"c":1,"x":"Multiple fatal accidents from lavatory fires led to mandatory detection and suppression. Extinguisher activates automatically if temperature exceeds threshold in the waste bin area."},{"e":"AF","t":"Fire Protection","d":2,"q":"After a fire warning in flight, the flight crew first:","o":["Ignores it","Confirms the warning (check other indications), then executes the fire checklist \u2014 shut down engine, discharge extinguisher","Declares emergency immediately without verification","Dumps fuel"],"c":1,"x":"Verify before acting \u2014 false warnings exist. But don't delay long. Fire checklist: retard throttle, pull fire handle (shuts off fuel/hydraulics/bleed/electrics), discharge agent, monitor."},{"e":"AF","t":"Fire Protection","d":3,"q":"APU fire protection typically includes:","o":["No protection needed","A fire detection loop and extinguisher bottle \u2014 automatic shutdown on fire detection","Only manual detection","Only the cabin fire extinguisher"],"c":1,"x":"APU has its own detection loop and extinguisher (often shared with engine system). On many aircraft, APU auto-shuts-down on fire detection. Some auto-discharge the extinguisher."},{"e":"AF","t":"Fire Protection","d":2,"q":"Portable fire extinguishers in the cockpit and cabin are:","o":["Optional equipment","Required \u2014 Halon 1211 or equivalent for cockpit, water/Halon for cabin","Only for ground use","Decorative"],"c":1,"x":"Cockpit: Halon/HFC type (effective on electrical fires). Cabin: water (for seat/fabric fires) and Halon (for galley/trash fires). Crew must know locations and operation. Checked at regular intervals."},{"e":"AF","t":"Fire Protection","d":3,"q":"Firex bottles are checked during maintenance for:","o":["Color only","Pressure (against temp chart), discharge disk condition, squib continuity, and bottle hydrostatic date","Weight only","Shape only"],"c":1,"x":"Multiple checks: 1) Pressure within range for current temp, 2) Discharge disks intact, 3) Squib electrical continuity, 4) Hydrostatic test date not exceeded, 5) Physical condition."},{"e":"AF","t":"Fire Protection","d":4,"q":"A fire detection loop that tests OK on the ground but gives false warnings in flight may have:","o":["No problem","Intermittent chafing damage that opens/shorts under vibration or thermal expansion in flight","A perfectly good sensing element","Software issues"],"c":1,"x":"Vibration and thermal cycling in flight create conditions that don't exist on the ground. Chafed insulation may contact structure intermittently. Routing inspection and continuity testing under simulated conditions needed."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Primary flight controls are:","o":["Flaps, slats, and spoilers","Ailerons, elevator (or stabilator), and rudder","Trim tabs only","Landing gear and brakes"],"c":1,"x":"Primary controls provide pitch, roll, and yaw. Secondary controls (flaps, slats, spoilers, trim) augment primary controls for specific flight conditions."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Hydraulic power-assisted flight controls:","o":["Eliminate all pilot effort","Reduce pilot control forces using hydraulic actuators while maintaining direct mechanical connection as backup","Replace all cables","Are only on small aircraft"],"c":1,"x":"Power-assist: hydraulics augment pilot force. If hydraulics fail, pilot can still move controls (with much higher effort). Different from fly-by-wire where there's no mechanical connection."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Fly-by-wire systems:","o":["Use cables and pulleys","Replace mechanical connections with electronic signals from cockpit to actuators via flight computers","Are experimental only","Have no redundancy"],"c":1,"x":"Pilot inputs \u2192 computers interpret \u2192 send commands to hydraulic actuators. Multiple redundant channels (3-4 computers). Allows flight envelope protection (prevents stall, overspeed, excessive G)."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"A stabilator (all-moving tailplane) differs from a conventional elevator in that:","o":["It doesn't move","The entire horizontal stabilizer pivots for pitch control \u2014 no separate fixed stabilizer and hinged elevator","Only the tab moves","It's only on helicopters"],"c":1,"x":"Stabilator: entire surface moves. More effective per degree of deflection than a conventional elevator. Common on T-tail aircraft and fighters. Anti-servo tab provides feel and trim."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Leading edge devices (slats and Krueger flaps):","o":["Reduce lift","Increase the wing's effective camber and delay leading-edge stall at high AOA","Only work at cruise speed","Are purely structural"],"c":1,"x":"Slats create a slot for boundary layer energization. Krueger flaps extend from the lower leading edge. Both lower stall speed for takeoff and landing."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Control surface flutter can be:","o":["Beneficial for performance","Destructive vibration that can tear the surface off within seconds if not prevented","Only annoying noise","Easily stopped by the pilot"],"c":1,"x":"Flutter = aeroelastic coupling between surface mass and air loads. Can escalate to catastrophic failure in 2-3 seconds. Prevented by mass balancing, stiffness design, and proper rigging."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Ground-adjustable trim tabs are set by:","o":["The pilot in flight","Bending the tab to a set angle on the ground per maintenance manual","Hydraulic actuators","Electric motors"],"c":1,"x":"Fixed metal tab bent to the desired angle during maintenance. Used on aircraft without in-flight trim. Check deflection with a protractor or template. Secure with locknut."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Aileron droop is a system where ailerons:","o":["Are locked in the up position","Deflect downward along with the flaps when flaps are extended to increase lift at low speeds","Move up only","Are disconnected during landing"],"c":1,"x":"Flap-aileron interconnect: when flaps extend, both ailerons droop (lower) to act as additional flap area. Differential aileron control is maintained for roll."},{"e":"AF","t":"Fixed-Wing Controls","d":4,"q":"During a control rigging check, if the control surface travel exceeds the maximum limit, the correct action is:","o":["It's acceptable if close to the limit","Adjust the stop bolts or control linkage per the maintenance manual to bring travel within limits","Add weight to the surface","Ignore it if the aircraft flies OK"],"c":1,"x":"Over-travel = possible flutter risk and structural overload of the surface. Under-travel = insufficient control authority. Both are non-airworthy. Adjust per AMM rigging procedures."},{"e":"AF","t":"Fuel Systems","d":2,"q":"A fuel selector valve allows the pilot to:","o":["Change fuel type","Select which fuel tank feeds the engine or shut off fuel entirely","Adjust mixture","Control fuel temperature"],"c":1,"x":"Tank selectors route fuel from left, right, both, or off. Critical for fuel management (balancing wing tanks) and emergency shutoff. Verify position during preflight."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Bladder fuel tanks are:","o":["Integral to the structure","Flexible rubber or reinforced cells that fit inside a cavity in the aircraft structure","External drop tanks","Only for helicopters"],"c":1,"x":"Bladder (flexible) cells: removable, damage-tolerant (self-sealing types available). Fit inside structural bays. Easier to inspect and replace than integral tanks. Common on military and some GA aircraft."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Fuel quantity indicating systems must accurately show:","o":["Total tank capacity","Usable fuel quantity \u2014 the fuel actually available to the engine","Total volume including unusable","Only full/empty status"],"c":1,"x":"Gauges must read usable fuel. Unusable fuel (trapped in tank low points) can't feed the engine. The difference matters \u2014 running a tank 'empty' means usable is gone, some unusable remains."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Fuel system microbial contamination is caused by:","o":["Fuel additives","Bacteria and fungi that grow at the fuel-water interface at the bottom of tanks","Cold temperatures","UV light"],"c":1,"x":"Microbes need water and fuel to grow. They create slimy deposits that block filters, corrode tanks (sulfuric acid byproduct), and damage fuel quantity probes. Prevention: keep water out, use biocide."},{"e":"AF","t":"Fuel Systems","d":2,"q":"A defueling procedure requires:","o":["No special precautions","Proper grounding/bonding, fire safety equipment standing by, and approved fuel handling procedures","Only a bucket","Any pump will work"],"c":1,"x":"Same fire/static risks as fueling. Ground aircraft + fuel truck + ground point. Have fire extinguisher ready. Use approved pumps and hoses. Never defuel into unapproved containers."},{"e":"AF","t":"Fuel Systems","d":3,"q":"A surge tank (expansion space) in a fuel system:","o":["Stores extra fuel","Provides space for fuel expansion due to temperature increase and collects fuel vent overflow","Boosts fuel pressure","Filters fuel"],"c":1,"x":"Fuel expands with temperature. Without expansion space, fuel overflows out the vent. Surge tanks (typically outboard wing) collect overflow and gravity-drain it back to the main tank."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Fuel tank vent flame arrestors prevent:","o":["Water entry","An external flame from entering the fuel tank through the vent","Fuel evaporation","Ice formation"],"c":1,"x":"Mesh screen in the vent line. Flame front is cooled below ignition temperature as it passes through the fine mesh. Prevents external fire/lightning from igniting tank vapors."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Capacitance fuel quantity systems measure fuel quantity by:","o":["Float position","Measuring the change in capacitance between probes as fuel level changes \u2014 fuel has different dielectric constant than air","Weighing the tank","Flow rate integration"],"c":1,"x":"Capacitor probe in the tank: fuel (dielectric constant ~2) vs air (1). More fuel = higher capacitance = higher indicated quantity. Compensates for fuel density. More accurate than float systems."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Single-point refueling (pressure refueling) advantages:","o":["Cheaper equipment","Faster, reduces contamination risk, minimizes static discharge exposure, and reduces spillage compared to overwing","Only for military","Only for small aircraft"],"c":1,"x":"One connection point on the aircraft. Fuel is pumped under pressure. Automatic shutoff valves prevent overfilling. Standard on transport category aircraft. Faster turnaround times."},{"e":"AF","t":"Fuel Systems","d":4,"q":"A fuel system with an engine-driven pump failure still operates because:","o":["Gravity always works","The electric boost pump provides backup fuel pressure to the engine","Fuel pressure isn't needed","The APU takes over"],"c":1,"x":"Boost pump provides positive fuel pressure as backup. This is why boost pumps are turned ON during critical phases of flight (takeoff, landing). Loss of both pumps = engine fuel starvation."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"A typical aircraft hydraulic system operates at:","o":["100 PSI","1,500-3,000 PSI (or up to 5,000 PSI on some modern aircraft)","50 PSI","10,000 PSI"],"c":1,"x":"GA aircraft: ~1,500 PSI. Transport: 3,000 PSI standard. Modern aircraft (787, A350): 5,000 PSI for smaller, lighter components. You work with these pressures daily."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A hydraulic power transfer unit (PTU) allows:","o":["Fluid mixing between systems","One hydraulic system to power another system's pump without mixing fluids","Gravity fluid transfer","Pressurizing both systems equally"],"c":1,"x":"PTU: a hydraulic motor on System A drives a hydraulic pump on System B. Transfers power, not fluid. Used when one engine-driven pump fails \u2014 the other system's pressure helps."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Hydraulic reservoirs are typically:","o":["Open to atmosphere","Pressurized (by bleed air or bootstrap) to ensure positive pump inlet pressure at all altitudes and attitudes","Sealed vacuum","Not pressurized"],"c":1,"x":"Pressurized reservoir prevents pump cavitation at altitude where atmospheric pressure is low. Bootstrap: system pressure acts on a small piston to pressurize the reservoir. Bleed air pressurization on some aircraft."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A hydraulic system return filter is placed:","o":["Before the pump","In the return line after actuators and before the reservoir","At the pump outlet","In the pressure line"],"c":1,"x":"Return filter catches contaminants generated by actuators and valves before fluid returns to the reservoir and is recirculated. Pressure filters (after pump) protect downstream components."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"A priority valve ensures:","o":["All systems get equal pressure","Critical systems (flight controls) receive hydraulic pressure before less critical systems (utility) during low-flow conditions","The pump runs at priority speed","Equal flow to all actuators"],"c":1,"x":"When pump output is reduced (low RPM, partial failure), priority valve restricts flow to utility systems while maintaining full pressure to flight controls. Safety hierarchy."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"An aircraft pneumatic system using engine bleed air provides:","o":["Only cabin pressurization","Power for brakes, door operation, de-ice boots, and emergency gear extension on various aircraft types","Hydraulic pressure","Fuel pressure"],"c":1,"x":"Pneumatic power: no fluid to leak (lighter, cleaner). Used where hydraulic systems aren't practical. Lower force output than hydraulic but acceptable for many applications."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Hydraulic system fluid level should be checked with:","o":["System fully pressurized","System depressurized and all actuators in the specified position per the maintenance manual","Any condition","Engines running"],"c":1,"x":"Actuator position affects how much fluid is in the reservoir vs. in the actuators. AMM specifies: gear down, flaps up (or whatever the standard position is). Overfilling = thermal expansion overflow."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"Hydraulic system contamination is controlled by:","o":["Ignoring it","Filtration, clean servicing practices, sealed system design, and regular fluid sampling/analysis","Adding more fluid","Heating the fluid"],"c":1,"x":"Contamination sources: wear particles, external dirt during servicing, degraded seals, water. Prevention: filter maintenance, clean fluid handling, proper filler/breather caps, patch test analysis."},{"e":"AF","t":"Hydraulics & Pneumatics","d":4,"q":"An accumulator pre-charge pressure that is too low will cause:","o":["No effect","System pressure fluctuations, pump cycling, and sluggish actuator response","System overpressure","Pump failure"],"c":1,"x":"Low pre-charge: accumulator doesn't absorb surges properly, releases stored energy too slowly. System pressure drops momentarily during demand peaks. Pump cycles rapidly (short life). Check pre-charge with system depressurized."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Sequence valves ensure:","o":["Random operation","Actuators operate in the correct order (e.g., gear doors open BEFORE gear extends)","Equal pressure distribution","System shutdown sequence"],"c":1,"x":"Gear retraction example: sequence valve holds gear UP hydraulic pressure until the door actuator fully opens. Then gear extends. Prevents gear hitting closed doors. Your daily bread at Mecaer."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Ice detector probes work by:","o":["Visual indication only","Sensing ice accretion on a vibrating or heated probe and alerting the crew","Temperature measurement only","Pilot observation"],"c":1,"x":"Vibrating probe: ice changes the resonant frequency. Heated probe: ice accretion rate measured by power needed to keep it clear. Triggers advisory lights and can auto-activate anti-ice."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Bleed air anti-ice systems operate continuously when activated because:","o":["They use very little air","Anti-ice PREVENTS formation \u2014 it must run continuously to keep surfaces above freezing","They cycle automatically","They only run for 30 seconds"],"c":1,"x":"Anti-ice = continuous prevention. De-ice = cyclic removal. Bleed air anti-ice keeps leading edges hot enough that ice never forms. Uses significant engine bleed air = performance penalty."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Prop heat is typically activated:","o":["Only after ice is visible","Before entering known or forecast icing conditions","Only on the ground","Only above 20,000 feet"],"c":1,"x":"Prop anti-ice: prevent ice before it forms. Once ice is on the blades, vibration and performance loss occur. Electrical elements heat the leading edge. Power via slip rings."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Icing conditions exist when:","o":["Only below -40\u00b0C","Visible moisture is present and OAT is between +10\u00b0C and -20\u00b0C (approximately)","Only in clouds above 30,000 feet","Only during winter"],"c":1,"x":"Ice forms when liquid water droplets contact a surface below 0\u00b0C. Most severe: -2\u00b0C to -15\u00b0C with large water droplets. Supercooled large drops (SLD) are extremely hazardous."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Windshield alcohol spray prevents:","o":["Cracks","Ice formation on the windshield by lowering the freezing point of water on the surface","Bugs","Bird strikes"],"c":1,"x":"Isopropyl alcohol sprayed on windshield exterior. Mixes with water and lowers freezing point. Limited supply \u2014 used as needed. Some aircraft use electric heating instead."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Clear ice vs rime ice:","o":["They are identical","Clear ice is smooth, hard, and dense (forms in large drops); rime is rough, milky, and brittle (forms in small drops)","Rime is more dangerous","Clear ice is softer"],"c":1,"x":"Clear ice: hardest to remove, conforms to surface, adds significant weight. Rime: rough but easier to remove. Mixed ice: combination of both. All types degrade aircraft performance."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"De-ice boots should NOT be activated:","o":["Ever","With only a thin layer of ice \u2014 wait for adequate buildup so the boots can crack it effectively","When ice is thick","During any icing encounter"],"c":1,"x":"Premature activation = ice bridges over the inflated boot shape. Subsequent cycles can't break this shell. Wait for manufacturer-specified accumulation before first activation."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Tail plane icing is particularly dangerous because:","o":["It's easy to detect","It can cause a tailplane stall when flaps are lowered, resulting in an unrecoverable pitch-down","It only adds weight","It only affects directional stability"],"c":1,"x":"Ice on the horizontal stabilizer changes its airfoil. When flaps are extended (changing downwash), the iced tailplane can stall = sudden uncontrollable pitch-down. Recognize and respond immediately."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Windshield wipers on aircraft are:","o":["Identical to car wipers","Specifically designed for high-speed operation with precise pressure control to maintain contact at all speeds","Not required","Only for ground use"],"c":1,"x":"Aircraft wipers operate at much higher speeds than automotive. Must maintain contact at 250+ knots. Electric or hydraulic powered. Some aircraft have rain repellent instead of or in addition to wipers."},{"e":"AF","t":"Ice & Rain Protection","d":4,"q":"After an icing encounter, maintenance should inspect:","o":["Nothing \u2014 ice is only a flight issue","All anti/de-ice systems, pitot/static systems, control surfaces for residual ice or damage, and engine inlets","Only the windshield","Only the pitot tubes"],"c":1,"x":"Post-icing inspection: check boot condition, bleed air ducting for leaks, pitot heat operation, control surface freedom of movement, engine inlet for ice ingestion damage, and propeller de-ice elements."},{"e":"AF","t":"Instruments","d":3,"q":"EFIS (Electronic Flight Instrument System) replaces:","o":["Only the compass","Traditional mechanical gyro instruments with electronic displays (PFD and ND)","Only engine instruments","Only weather radar display"],"c":1,"x":"PFD (Primary Flight Display) = attitude, airspeed, altitude, heading, VSI on one screen. ND (Navigation Display) = map, weather, traffic, waypoints. Glass cockpit = EFIS-equipped."},{"e":"AF","t":"Instruments","d":2,"q":"A tachometer measures:","o":["Temperature","Engine RPM \u2014 crankshaft speed on recips, N1 or N2 spool speed on turbines","Fuel flow","Oil pressure"],"c":1,"x":"Recip tach: mechanical or electric, reads in RPM. Turbine: reads in %RPM (N1 and N2 separately). Primary engine parameter for recips; secondary for turbines (EGT/torque are primary)."},{"e":"AF","t":"Instruments","d":3,"q":"A synchroscope shows:","o":["Fuel synchronization","The relative RPM difference between engines \u2014 used to synchronize propellers","Oil pressure comparison","Temperature comparison"],"c":1,"x":"Pointer rotates in the direction of the faster engine. When synched, pointer stops. Pilot adjusts slower engine to match. Reduces noise and vibration from prop beat."},{"e":"AF","t":"Instruments","d":2,"q":"Manifold pressure gauge reads:","o":["Cabin pressure","Absolute pressure in the intake manifold \u2014 indicates engine power on recip engines","Exhaust back pressure","Oil pressure"],"c":1,"x":"MAP indicates how much air/fuel charge is entering the cylinders. Higher MAP = more power. At idle: low MAP. Full throttle: high MAP. Turbocharged: can exceed atmospheric pressure."},{"e":"AF","t":"Instruments","d":3,"q":"A fuel flow meter indicates:","o":["Tank quantity","Rate of fuel consumption in gallons per hour or pounds per hour","Fuel pressure","Fuel temperature"],"c":1,"x":"Fuel flow tells pilot: 1) engine is getting fuel, 2) how much it's burning (economy), 3) time remaining at current burn rate. Essential for range/endurance calculations and engine monitoring."},{"e":"AF","t":"Instruments","d":2,"q":"Instrument range markings use:","o":["Random colors","Green arc = normal range, yellow arc = caution range, red line = maximum/minimum limit","Blue for danger","No standard colors"],"c":1,"x":"Standard color coding: green = normal operating. Yellow = caution (short-term OK). Red line = never exceed/never go below. White arc on airspeed = flap operating range."},{"e":"AF","t":"Instruments","d":3,"q":"Altimeter errors can be caused by:","o":["Only instrument failure","Non-standard temperature, non-standard pressure (not corrected), and instrument/static system errors","Only humidity","Only turbulence"],"c":1,"x":"Cold weather: altimeter reads HIGHER than actual (dangerous in mountains). Non-standard pressure: set current altimeter setting. Static system blockage: frozen reading. Multiple error sources."},{"e":"AF","t":"Instruments","d":2,"q":"An engine pressure ratio (EPR) gauge indicates:","o":["Oil pressure","The ratio of turbine exhaust pressure to engine inlet pressure \u2014 primary thrust indicator on some turbofans","Cabin vs. ambient pressure","Hydraulic system pressure ratio"],"c":1,"x":"EPR = Pt7/Pt2. Higher ratio = more thrust. Used as the primary thrust setting parameter on some engines (JT8D, JT9D). Other engines use N1 fan speed instead."},{"e":"AF","t":"Instruments","d":4,"q":"If the static port becomes blocked during a climb, the altimeter will:","o":["Continue normally","Freeze at the altitude where the blockage occurred","Read higher than actual","Oscillate rapidly"],"c":0,"x":"Blocked static = trapped pressure in the case. Altimeter, VSI, and airspeed indicator all affected. Altimeter freezes. VSI reads zero. Airspeed becomes inaccurate. Use alternate static source."},{"e":"AF","t":"Landing Gear","d":2,"q":"A squat switch prevents:","o":["Tire blowout","Inadvertent gear retraction on the ground by sensing weight-on-wheels","Nose wheel shimmy","Brake fade"],"c":1,"x":"WOW switch: compressed strut = on ground = retraction circuit locked out. Extended strut = in air = retraction allowed. Also controls spoiler arming, thrust reversers, and more."},{"e":"AF","t":"Landing Gear","d":3,"q":"Tire creep marks (slippage marks) on a wheel indicate:","o":["Normal condition","The tire may have slipped on the wheel rim \u2014 check for tube damage and reinflate per manual","Only cosmetic wear","The wheel needs painting"],"c":1,"x":"Creep = tire rotated relative to wheel. If slippage is significant, the tube's valve stem could be pulled, causing sudden deflation. Paint marks (tire-to-wheel) must stay aligned."},{"e":"AF","t":"Landing Gear","d":2,"q":"Nose wheel steering on transport aircraft is typically:","o":["Direct mechanical linkage from rudder pedals","Hydraulically powered with electronic control, providing up to \u00b170\u00b0 steering angle","Cable operated","Not steerable \u2014 differential braking only"],"c":1,"x":"Hydraulic steering actuator controlled by a tiller (large angles for taxi) and rudder pedals (small angles for takeoff/landing). Disconnect for towing. Your steering manifold work at Mecaer relates directly."},{"e":"AF","t":"Landing Gear","d":3,"q":"Brake hydraulic system maintenance includes checking for:","o":["Paint condition only","Fluid leaks, worn pads/linings, disc condition, proper pedal travel, and anti-skid operation","Only tire pressure","Only brake temperature"],"c":1,"x":"Complete brake inspection: fluid leaks at calipers/lines, pad/lining thickness (wear pins or visual), disc for cracks/heat discoloration, pedal feel/travel, anti-skid operational test."},{"e":"AF","t":"Landing Gear","d":2,"q":"An emergency gear extension system uses:","o":["Electrical power only","Gravity, nitrogen bottles, or hand pumps to extend gear when normal hydraulics fail","Engine thrust","Parachute deployment"],"c":1,"x":"Backup methods: free-fall (gravity + uplock release), nitrogen bottle (blows gear down), hand pump (manual hydraulic). Pilots must know the procedure; AMEs must know the system and test it."},{"e":"AF","t":"Landing Gear","d":3,"q":"Oleo strut servicing requires checking:","o":["Only fluid level","Both fluid level AND nitrogen pre-charge pressure \u2014 measured by exposed piston extension (strut extension)","Only tire pressure","Only brake pads"],"c":1,"x":"Strut extension = measure of internal fluid + gas charge. Too low = insufficient damping (bottoming out). Too high = harsh ride, possible damage. Service per AMM: correct fluid type + N\u2082 pressure."},{"e":"AF","t":"Landing Gear","d":4,"q":"After a hard landing or heavy braking incident, wheel and brake inspection must include:","o":["Only visual check of tires","Fusible plug inspection, wheel for cracks (NDT may be required), brake disc for damage, tire for flat spots, and axle inspection","Only brake pad check","Nothing special"],"c":1,"x":"Hard landings/heavy braking generate extreme forces and heat. All components stressed: fusible plugs (heat), wheels (impact cracks), brakes (thermal damage), tires (flat spots/blowout), axles (bending). Thorough inspection mandatory."},{"e":"AF","t":"Structures","d":2,"q":"Fail-safe structure design means:","o":["It cannot fail","If one structural element fails, remaining structure can carry the load until detected and repaired","Only one load path exists","Unlimited life"],"c":1,"x":"Multiple load paths: if one cracks, others carry the load safely. Design philosophy for transport aircraft. Regular inspection finds the damage before secondary failure. Damage-tolerant design."},{"e":"AF","t":"Structures","d":3,"q":"Fatigue cracking in aircraft structure is caused by:","o":["Single overload","Repeated cyclic loading below the material's ultimate strength \u2014 accumulating microscopic damage over time","Only corrosion","Only impact damage"],"c":1,"x":"Every pressurization cycle, every gust, every landing = one fatigue cycle. Cracks start at stress concentrators (rivet holes, notches, scratches). Grow slowly then rapidly. Inspection intervals are designed to catch them."},{"e":"AF","t":"Structures","d":2,"q":"A fuselage station number of 400 means:","o":["400 feet from the nose","400 inches from the datum reference point","Frame number 400","400 rivets"],"c":1,"x":"Station numbers are in INCHES from the datum (usually ahead of the nose). STA 400 = 400 inches aft of the datum. Used for locating repairs, components, and structural members."},{"e":"AF","t":"Structures","d":2,"q":"Buttock line (BL) and waterline (WL) are:","o":["Only nautical terms","Lateral (left/right from centerline) and vertical (above reference) measurement references","Fuel line designations","Electrical wire numbers"],"c":1,"x":"BL = left/right distance from fuselage centerline. WL = height above a horizontal reference. Together with station numbers, they create a 3D coordinate system for locating anything on the aircraft."},{"e":"AF","t":"Structures","d":3,"q":"Stress risers in aircraft structure include:","o":["Smooth surfaces","Sharp corners, scratches, tool marks, corrosion pits, and abrupt section changes","Properly radiused edges","Polished areas"],"c":1,"x":"Any discontinuity concentrates stress = potential fatigue crack initiation site. Proper edge radius, no tool marks, remove scratches/corrosion. Even a light scratch can start a fatigue crack over thousands of cycles."},{"e":"AF","t":"Structures","d":2,"q":"The four types of structural stress are:","o":["Only tension","Tension, compression, shear, and bending (which combines tension and compression)","Only shear","Only torsion"],"c":1,"x":"Tension = pulling apart. Compression = pushing together. Shear = sliding. Bending = tension on one side, compression on the other. Torsion (twisting) is also important. All act on aircraft structure simultaneously."},{"e":"AF","t":"Structures","d":3,"q":"A repair doubler must overlap the damaged area by sufficient edge distance to allow:","o":["Paint coverage","Adequate rivet rows to transfer the load around the damaged area","Visual identification","Weight balance"],"c":1,"x":"The doubler carries the load that the damaged skin can't. Rivet rows transfer that load from skin to doubler. More rows = more rivets = more load transfer capability. SRM specifies exactly how many rows."},{"e":"AF","t":"Structures","d":2,"q":"Pressurized fuselage skin repairs are critical because:","o":["Paint must match","The repair must withstand the repeated pressurization/depressurization cycle loads (fatigue) in addition to flight loads","Only appearance matters","Repairs aren't allowed"],"c":1,"x":"Pressurized skin sees hoop stress (every pressurization = one fatigue cycle). Repairs must be fatigue-rated. Improper repairs can crack and lead to explosive decompression."},{"e":"AF","t":"Structures","d":4,"q":"Corrosion found during structural inspection beyond the manufacturer's allowable limits requires:","o":["Blending out and repainting","Structural repair or component replacement per approved data \u2014 the corroded area no longer meets design strength","Only monitoring at next inspection","Rejuvenator application"],"c":1,"x":"Beyond-limit corrosion = material loss beyond what the designer allowed for. The part is structurally inadequate. Must be repaired (doubler), replaced, or get engineering disposition. Cannot just clean and paint."},{"e":"AF","t":"Fabric Covering","d":2,"q":"STC'd synthetic fabric systems like Poly-Fiber or Ceconite use:","o":["Dope as adhesive","Specific proprietary coatings \u2014 NOT interchangeable between systems","Standard automotive paint","Epoxy primer only"],"c":1,"x":"Each system (Poly-Fiber, Ceconite/Randolph, Superflite) has its own specific materials. Mixing systems = coating failures, peeling, or non-airworthy covering. Follow ONE system completely."},{"e":"AF","t":"Fabric Covering","d":3,"q":"The minimum fabric strength for continued airworthiness of most aircraft is:","o":["25 lbs","46 lbs (or 56 lbs for higher speed aircraft) \u2014 tested with a fabric punch tester","80 lbs","100 lbs"],"c":1,"x":"New Grade A cotton tests at ~80 lbs. Minimum for continued airworthiness depends on aircraft type: 46 lbs for slower aircraft, 56 lbs for faster. Below minimum = recover."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Drainage grommets in fabric covering:","o":["Are decorative","Prevent moisture accumulation inside the structure by allowing water to drain out","Provide ventilation only","Attach the fabric to the frame"],"c":1,"x":"Water trapped inside fabric-covered structure causes corrosion and rot. Grommets at low points let water drain. Must be installed per the STC/manual \u2014 specific locations matter."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Inspection rings on fabric covering allow:","o":["Better appearance","Visual inspection of the internal structure without removing the fabric","Fuel sampling","Vent air passage"],"c":1,"x":"Clear doped or framed openings let inspectors look inside at the framework, control cables, and structure without stripping the fabric. Required at specified locations per SRM."},{"e":"AF","t":"Fabric Covering","d":2,"q":"When a fabric repair exceeds a certain size, the entire panel must be:","o":["Left alone","Recovered \u2014 the repair would be larger than practical and the surrounding fabric is likely deteriorated too","Doubled","Painted over"],"c":1,"x":"The SRM/STC specifies maximum repair size for each panel location. Beyond that, the whole panel (rib-to-rib or bay) must be recovered. If the fabric failed in one area, adjacent areas are likely deteriorating."},{"e":"AF","t":"Fabric Covering","d":3,"q":"UV damage to fabric covering is prevented by:","o":["Clear dope only","Pigmented dope or UV-blocking topcoats \u2014 clear coatings alone don't block UV","Storing indoors 100% of the time","Waxing the surface"],"c":1,"x":"UV degrades both cotton and polyester fabric. Pigmented coatings block UV. Without UV protection, fabric loses strength rapidly. Sun-exposed upper surfaces degrade faster than lower surfaces."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Cotton fabric has these disadvantages compared to synthetic:","o":["None \u2014 cotton is superior","Cotton is heavier, absorbs moisture, is susceptible to mildew and rot, and has a shorter service life","Cotton is too strong","Cotton is more expensive"],"c":1,"x":"Cotton: natural fiber, absorbs water, supports fungal growth, weakens faster. Polyester: resists moisture, no rot/mildew, longer life, lighter. Synthetics have largely replaced cotton."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Machine sewing of fabric seams on aircraft uses:","o":["Any household stitch","A lock stitch or baseball stitch with specific thread type and stitches per inch per the STC/manual","Staples","Hot glue"],"c":1,"x":"Structural seams must use approved stitching. Lock stitch (machine) for seams. Hand stitching for rib lacing. Thread type (cotton, polyester, nylon) must match the fabric system used."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Tautening of synthetic fabric is accomplished by:","o":["Dope shrinkage only","Heat application with a calibrated iron \u2014 heat shrinks the polyester to the specified tautness","Pulling it tight mechanically","Water spray"],"c":1,"x":"Poly-Fiber/Ceconite: iron set to specific temperature (250-350\u00b0F depending on system). Heat shrinks the polyester fabric. Over-heating damages it. Under-heating = saggy covering."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Surface tape is applied over:","o":["Nothing specific","All rib locations, leading/trailing edges, seams, and any structural member under the fabric","Only wing tips","Only control surfaces"],"c":1,"x":"Surface tape protects fabric at stress points where underlying structure can chafe through. Applied with dope or the system's specific adhesive. Width per manual specs."},{"e":"AF","t":"Fabric Covering","d":4,"q":"An aircraft with fabric covering that shows cracks in the dope finish:","o":["Is normal aging","Should be evaluated \u2014 cracking indicates dope is becoming brittle and may no longer protect the fabric from UV","Needs only new paint","Is still airworthy if fabric tests OK"],"c":1,"x":"Cracked finish = UV penetrating to fabric. Rejuvenator may help if fabric is still strong. If fabric tests below minimum, recovering is required. Cracking is an early warning sign."},{"e":"AF","t":"Fabric Covering","d":2,"q":"When recovering a control surface, the balance must be:","o":["Ignored \u2014 fabric doesn't affect balance","Rechecked and adjusted after recovering \u2014 fabric weight changes can alter the mass balance","Only checked on ailerons","Permanently fixed by the manufacturer"],"c":1,"x":"Any weight change on a control surface affects mass balance. Recovering changes the surface weight. Must re-balance per maintenance manual to prevent flutter. Critical airworthiness requirement."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Ceconite fabric is:","o":["A cotton product","A polyester fabric that is heat-shrunk and coated with specific Randolph products","A fiberglass product","A composite material"],"c":1,"x":"Ceconite = polyester fabric used with Randolph coatings (dopes, primers, topcoats). Complete system \u2014 don't mix with Poly-Fiber products. Follow Ceconite system manual exactly."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Anti-tear strips are placed:","o":["Randomly","Under the rib lacing cord between the rib and the fabric to prevent the cord from cutting through","Over the paint","Inside the wing tank"],"c":1,"x":"Reinforcing tape under the rib stitch cord distributes the lacing load over a wider fabric area. Without it, the cord can cut through the fabric during flight loads."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Inspection of a fabric-covered aircraft includes checking for:","o":["Only color fading","Fabric strength (punch test), coating condition, UV damage, tears, loose lacing, drainage, and internal structure (through rings)","Only cleanliness","Only rib stitching"],"c":1,"x":"Comprehensive inspection: strength, coating integrity, attachment security, drainage paths clear, internal structure visible and intact. Document all findings. Schedule re-covering when approaching limits."},{"e":"AF","t":"Fabric Covering","d":4,"q":"A fabric repair over a flight control surface must not:","o":["Be smooth","Add significant weight to one side, as this would affect mass balance and could cause flutter","Use approved materials","Overlap the original fabric"],"c":1,"x":"Asymmetric weight on a control surface changes its CG relative to the hinge line. Even a small patch can affect balance. Re-balance after any repair. Flutter from imbalance can destroy the aircraft."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"The correct sequence for painting metal aircraft skin is:","o":["Topcoat then primer","Clean, chemical treat, prime, then topcoat","Only topcoat directly on metal","Sand and paint"],"c":1,"x":"Surface prep is 90% of a good paint job. Each step builds on the previous: clean (remove contaminants) \u2192 treat (promote adhesion) \u2192 prime (corrosion protection) \u2192 topcoat (UV/weather protection)."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Alodine (chromate conversion coating) on aluminum:","o":["Adds structural strength","Creates a chemical film for corrosion resistance and excellent paint adhesion","Is purely cosmetic","Is only for steel"],"c":1,"x":"Gold/iridescent color on treated aluminum. Provides corrosion protection and a surface that primer bonds to chemically. Applied by brush, spray, or immersion. Required before priming bare aluminum."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Epoxy primers are replacing zinc chromate because:","o":["They're the same thing","Epoxy provides excellent adhesion and corrosion resistance without the health hazards of hexavalent chromium","Epoxy is cheaper","Zinc chromate is too effective"],"c":1,"x":"Zinc chromate contains hexavalent chromium (carcinogen). Epoxy primers are safer, provide excellent adhesion and corrosion protection. Most new aircraft use epoxy-based primers."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Polyurethane topcoats are preferred on aircraft because:","o":["They're cheapest","They provide excellent gloss, UV resistance, flexibility, and chemical resistance","They dry fastest","They never need repainting"],"c":1,"x":"Two-part polyurethane (isocyanate catalyst) = industry standard for aircraft topcoat. Hard, glossy, UV stable. CAUTION: isocyanate vapors are toxic \u2014 use proper respiratory protection."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"When sanding between coats of aircraft paint:","o":["Use coarse sandpaper","Use fine grit (320-400) to provide tooth for the next coat without cutting through","Use a wire brush","Don't sand between coats"],"c":1,"x":"Light scuffing creates mechanical bond for next coat. Too coarse = cuts through. Too fine = no tooth. Follow manufacturer's paint system data sheet for grit and technique."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Masking during aircraft painting is used to:","o":["Save paint","Protect areas that should not be painted (windows, sensors, placards, antennas, pitot tubes)","Create straight lines only","Speed up drying"],"c":1,"x":"Critical: pitot tubes, static ports, AOA vanes, sensors, antennas, exhaust vents MUST be masked. Paint on a sensor = false reading. Paint in a pitot tube = no airspeed indication."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Aircraft paint adds approximately how much weight to a large transport aircraft:","o":["Negligible","500-1,000+ lbs (200-500+ kg) depending on aircraft size","Less than 1 lb","10,000 lbs"],"c":1,"x":"A B747 paint scheme weighs ~500-600 lbs. Some airlines leave fuselage polished (saves weight and maintenance) with only markings painted. Every pound counts in airline economics."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Before painting, the surface must be thoroughly degreased because:","o":["Grease improves adhesion","Oil and grease prevent primer and paint from adhering properly \u2014 causing peeling and blistering","Grease is flammable only","Grease attracts dust"],"c":1,"x":"Fingerprints, hydraulic fluid, fuel residue, and silicone contamination all prevent proper paint adhesion. Clean with approved solvent (MEK, acetone, or manufacturer-specified cleaner)."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Touch-up painting of damaged areas requires:","o":["Just spraying over the damage","Feathering the edges of existing paint, treating bare metal, priming, then building up topcoat to match","Stripping the entire panel","Only clear coat"],"c":1,"x":"Feathering = tapering the paint edge so the repair blends smoothly. Bare metal must be treated (Alodine) and primed before topcoat. Multiple light coats build up to match surrounding paint level."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Placards and markings on an aircraft:","o":["Are optional decorations","Are required and must be maintained legible and in correct position per the type certificate","Only matter for registration marks","Can be any color"],"c":1,"x":"Required markings: registration, fuel type, door operation instructions, emergency exits, weight limitations, no-step areas. Missing or illegible markings = airworthiness issue. Replace per TC/manufacturer requirements."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Paint applied to composite surfaces requires:","o":["Standard metal preparation","Specific procedures \u2014 composites are sensitive to chemical strippers and aggressive sanding","No special care","Thicker coats than on metal"],"c":1,"x":"Chemical paint strippers can damage composite matrix. Plastic media blasting or careful sanding only. Follow composite manufacturer's paint system recommendations specifically."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Enamel vs lacquer aircraft paint:","o":["They're the same","Enamel dries by chemical curing (harder, more durable); lacquer dries by solvent evaporation (easier to touch up)","Lacquer is stronger","Enamel dries faster"],"c":1,"x":"Traditional distinction. Modern aircraft mostly use two-part polyurethane (catalyzed enamel type). Lacquer used on vintage/fabric aircraft. Don't apply lacquer over enamel without proper preparation."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Wash primers (etch primers) are used on:","o":["Only fabric","Bare aluminum to etch the surface and provide an anchor for the primer coat","Only steel","Only over old paint"],"c":1,"x":"Wash primer = phosphoric acid + polyvinyl butyral. Etches the aluminum surface microscopically for mechanical bonding. Very thin coat. Then standard primer over it. Alternative to Alodine treatment."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"When stripping paint from an aircraft, environmental regulations require:","o":["No special handling","Proper containment and disposal of stripped material as hazardous waste (especially chromate-containing primers)","Dumping in regular trash","Burning the waste"],"c":1,"x":"Chromate primers and lead-based paints are hazardous waste. Containment: plastic sheeting under aircraft. Proper disposal per local environmental regulations. PPE: respiratory protection, gloves, suits."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"High-visibility paint on propeller tips and spinners:","o":["Is purely aesthetic","Makes the propeller arc visible to ground personnel when spinning \u2014 critical safety marking","Increases prop efficiency","Reduces vibration"],"c":1,"x":"Black and yellow/white stripes on spinner and yellow/white prop tip stripes make the rotating prop visible. Prevents people from walking into an invisible spinning propeller."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Corrosion Preventive Compounds (CPC) are applied:","o":["Only during manufacturing","To interior surfaces, lap joints, and hidden areas during maintenance to protect against corrosion between inspections","Only to the exterior","Only to engines"],"c":1,"x":"CPC (like ACF-50, LPS-3, or Boeshield): sprayed or brushed into bilge areas, lap joints, and enclosed cavities. Displaces moisture and leaves a protective film. Major part of preventive maintenance programs."},{"e":"AF","t":"Painting & Finishing","d":4,"q":"After a full aircraft strip and repaint, the weight and balance:","o":["Is unaffected","Must be recalculated \u2014 paint weight and distribution change can shift the CG","Only needs noting in the log","Is the pilot's concern"],"c":1,"x":"New paint may differ in weight/distribution from old. Must amend W&B report. On small aircraft, paint weight change can significantly affect CG. On large aircraft, the effect is smaller but still documented."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Electrostatic spray painting:","o":["Uses magnets","Electrically charges paint particles so they're attracted to the grounded aircraft surface \u2014 reduces waste and improves coverage","Only works on fabric","Is illegal in aviation"],"c":1,"x":"Paint particles attracted to the grounded surface = less overspray, more uniform coverage, better wrap-around edges. Used in factory and some MRO facilities. Requires proper grounding and equipment."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Self-priming topcoats (SPT):","o":["Replace all preparation steps","Combine primer and topcoat properties for certain applications \u2014 but are NOT a substitute for proper surface preparation","Are always better than primer+topcoat","Don't exist"],"c":1,"x":"SPT provides convenience for touch-ups and small areas. For full repaints, separate primer + topcoat gives better long-term performance. Always prep the surface regardless of paint type."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Proper paint mixing requires:","o":["Guessing the ratio","Exact ratio of base to catalyst/hardener by weight or volume per manufacturer data sheet","Just stirring the can","Adding thinner until it sprays well"],"c":1,"x":"Wrong catalyst ratio = soft finish (too little catalyst) or brittle/orange peel (too much). Induction time (time after mixing before spraying) must be observed. Pot life limits the working time."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Oxy-acetylene welding uses a neutral flame that is:","o":["All blue","A clearly defined inner cone surrounded by an outer envelope \u2014 equal mix of oxygen and acetylene","All yellow","Smoky and sooty"],"c":1,"x":"Neutral flame: balanced O\u2082/C\u2082H\u2082. Oxidizing (excess O\u2082) = bad for steel. Carburizing (excess C\u2082H\u2082) = adds carbon. Neutral is standard for aircraft steel welding."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"TIG (GTAW) welding uses:","o":["A consumable electrode","A non-consumable tungsten electrode with separate filler rod, shielded by inert gas (argon/helium)","No shielding gas","Flux-coated rod"],"c":1,"x":"TIG = highest quality aircraft weld. Tungsten electrode creates the arc. Argon gas shields the weld pool from atmospheric contamination. Separate filler rod added as needed. Used for aluminum, stainless, titanium."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"The most common aircraft structural steel alloy is:","o":["Mild steel (1020)","4130 chromium-molybdenum (chrome-moly)","Stainless steel (304)","Tool steel"],"c":1,"x":"4130 CrMo: excellent strength-to-weight, weldable, heat-treatable. Standard for engine mounts, fuselage trusses, landing gear struts. Know the alloy designation."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Weld porosity is caused by:","o":["Perfect welding technique","Gas trapped in the weld pool during solidification \u2014 from contamination, moisture, or improper shielding","Too much filler material","Using the correct gas"],"c":1,"x":"Porosity = tiny gas bubbles frozen in the weld. Weakens the joint. Causes: dirty base metal, damp filler, insufficient shielding gas, wrong gas flow. Prevention: clean everything, dry materials, proper gas coverage."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Undercut on a weld is:","o":["Acceptable","A groove melted into the base metal at the toe of the weld \u2014 a stress riser that weakens the joint","Decorative","Extra strong"],"c":1,"x":"Undercut = base metal melted away at the weld edge, creating a notch. Stress concentrator \u2192 fatigue crack initiation point. Caused by excessive heat or wrong torch angle. Reject if beyond limits."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Weld cracks are:","o":["Sometimes acceptable","Always a rejection criterion \u2014 no cracks of any size are acceptable in aircraft welds","Only a concern on large welds","Easily repaired by painting"],"c":1,"x":"Zero tolerance for cracks. Hot cracks (during cooling) or cold cracks (hydrogen-induced, later). Any crack = repair by grinding out + re-welding, or replacing the part. No exceptions."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Before welding aircraft tubing, the inside of the tube should be:","o":["Filled with fuel","Purged with inert gas (argon or nitrogen) to prevent internal oxidation and scale formation","Left alone","Filled with water"],"c":1,"x":"Weld heat oxidizes the inside surface. Scale weakens the tube and can break loose causing downstream problems. Back-purging with inert gas prevents internal oxidation. Extra step but critical for quality."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"A welded tubular repair using a splice tube requires minimum overlap of:","o":["1 tube diameter","2 tube diameters (or as specified in approved data)","6 inches always","No minimum"],"c":1,"x":"Overlap allows adequate weld length to transfer structural loads. Minimum 2\u00d7 tube OD (or longer per SRM). The splice tube must be the same material and wall thickness as the original."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Spot welding is used for:","o":["Thick structural members","Joining thin sheet metal pieces using electrical resistance heat at specific points","Only pipe welding","Only aluminum"],"c":1,"x":"Two electrodes clamp the sheets together. Current flows through, resistance heats the interface, creating a weld nugget. Used for non-structural and semi-structural sheet metal joints."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Post-weld heat treatment of 4130 steel may include:","o":["Quenching in water","Normalizing (heating to 1600\u00b0F then air cooling) to relieve stress and refine grain structure","Immediate cold water quench","No treatment needed ever"],"c":1,"x":"Normalizing relieves residual stresses from welding, refines the grain structure, and restores uniform properties. Required for tubing over certain wall thicknesses per approved data."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Brazing differs from welding in that brazing:","o":["Uses higher temperatures","Joins metals using a filler that melts below the base metal's melting point \u2014 base metal doesn't melt","Is stronger than welding","Is the same as welding"],"c":1,"x":"Brazing: filler (silver alloy, brass) flows by capillary action between closely fitted parts. Base metal stays solid. Used for joining dissimilar metals and thin parts where fusion welding would burn through."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"An aircraft exhaust system is typically made of:","o":["Aluminum","Stainless steel or Inconel \u2014 materials that resist high temperature oxidation and corrosion","Copper","Mild steel"],"c":1,"x":"Exhaust gas temperatures exceed what regular steel can handle. Stainless and nickel alloys (Inconel) resist oxidation and fatigue at high temperatures. Inspect for cracks, especially at welds and bends."},{"e":"AF","t":"Welding & Tubular","d":4,"q":"A cluster weld (where 3+ tubes meet at one point) requires special attention because:","o":["It looks complicated","Complex stress patterns, multiple heat-affected zones, and difficulty achieving full penetration at the joint intersection","It's purely cosmetic","It's simpler than single tube joints"],"c":1,"x":"Multiple tubes converging = complex geometry, overlapping HAZs, difficult torch access, risk of burn-through on thin tubes. These joints are the most critical and most failure-prone in tubular structures."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"A heat-affected zone (HAZ) is:","o":["The weld bead itself","The area of base metal adjacent to the weld that was heated enough to change its properties but didn't melt","The flame of the torch","The entire workpiece"],"c":1,"x":"HAZ: metallurgical properties changed by welding heat. May be softer or harder than the original, depending on the alloy. Can be the weakest link in the joint. Post-weld heat treatment addresses this."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"When inspecting an aircraft exhaust system for cracks:","o":["Visual is sufficient","Use dye penetrant on suspect areas \u2014 especially weld joints, bends, and mounting points","X-ray every flight","Only inspect when leaks are noticed"],"c":1,"x":"Exhaust leaks = CO in cabin (deadly) or fire risk. Visual first (soot stains indicate leaks). PT on welds and high-stress areas. Entire system must be inspected per maintenance schedule."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Engine mount inspection focuses on:","o":["Paint condition","Cracks (especially at welds), corrosion, deformation, rubber mount condition, and bolt/hardware security","Only the rubber mounts","Only bolt torque"],"c":1,"x":"Engine mount carries engine weight, thrust, torque, and vibration. Cracks typically start at weld joints or bolt holes. Rubber shock mounts deteriorate with age, oil, and heat. NDT may be required per schedule."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Welding aluminum requires:","o":["Same technique as steel","Special precautions: AC TIG process, very clean surfaces, and aluminum-specific filler rod \u2014 aluminum's high conductivity dissipates heat rapidly","Oxy-acetylene only","No special technique"],"c":1,"x":"Aluminum challenges: oxide layer (melts at much higher temp than the metal), high thermal conductivity (heat dissipates fast), no color change before melting. AC TIG breaks up oxide layer. Requires practice and skill."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Dye penetrant inspection of welds detects:","o":["Subsurface porosity only","Surface-breaking cracks, porosity, and incomplete fusion that are open to the surface","Internal voids","HAZ width"],"c":1,"x":"PT is standard first-level weld inspection for surface defects. For internal defects (porosity, lack of fusion), radiography or ultrasonic inspection is needed."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"A fish-mouth joint in tubular repair:","o":["Is a cutting pattern","Is created by cutting the end of a tube to closely fit against the surface of another tube (like a saddle)","Is a type of rivet","Is only used in sheet metal"],"c":1,"x":"Fish-mouth: the tube end is shaped to follow the curvature of the tube it's being joined to. Provides maximum contact area for the weld. The better the fit-up, the better the weld quality."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"Vortex ring state (settling with power) occurs when:","o":["Flying fast forward","A helicopter descends through its own downwash at low airspeed \u2014 recirculating air creates a toroidal vortex around the rotor","Hovering in ground effect","Climbing at max power"],"c":1,"x":"Descent rate >300 fpm + low airspeed + power applied. Rotor recirculates its own downwash. More power = worse situation. Recovery: lower collective and fly forward to escape the vortex. Critical knowledge for rotary-wing maintenance discussions."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Poly-Fiber system uses what as the initial coat on polyester fabric?","o":["Butyrate dope","Poly-Brush (a vinyl coating that bonds to the polyester) \u2014 NOT dope","Epoxy primer","Latex paint"],"c":1,"x":"Poly-Fiber system: Poly-Brush bonds to polyester. Then Poly-Spray (filler/UV blocker). Then Poly-Tone or Aerothane topcoat. Each product is specific to the system."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"A fire loop test is performed to verify:","o":["Engine thrust","The detection circuit integrity \u2014 ensuring the loop will trigger an alarm if heated","Oil pressure","Fuel flow"],"c":1,"x":"Loop test: applies a signal simulating heat. Verifies the full detection circuit works: sensing element \u2192 control unit \u2192 warning light/bell. Part of preflight and maintenance checks."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"A single-loop fire detection system vs dual-loop:","o":["They're identical","Dual-loop requires BOTH loops to signal before triggering a warning \u2014 reduces false alarms","Single-loop is more reliable","Dual-loop is simpler"],"c":1,"x":"Dual-loop AND logic: both loops must detect heat = real fire warning. Single loop failure = no false alarm but reduced detection (switches to single loop mode with OR logic on some aircraft)."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"Engine nacelle ventilation during fire:","o":["Is sealed completely","Cowl flaps and nacelle openings allow airflow to dilute combustible vapors and help extinguishing agent distribution","Are opened fully","Are only for cooling"],"c":1,"x":"Some ventilation helps agent reach all areas and prevents re-ignition from trapped vapors. But excessive airflow can fan the fire. System design balances these factors."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"HFC-227ea (FM-200) replaced Halon 1301 because:","o":["It's more toxic","It has zero ozone depletion potential while providing equivalent fire suppression capability","It's cheaper","It's less effective"],"c":1,"x":"Halon 1301 was excellent but destroys ozone. HFC-227ea (FM-200) is environmentally acceptable and equally effective. Transition required replacing bottles and distribution systems."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"If a fire warning persists after BOTH extinguisher shots, the crew should:","o":["Attempt engine restart","Continue to monitor, maintain engine shutdown, plan for emergency landing \u2014 no more onboard suppression available","Reset and try again","Ignore it"],"c":1,"x":"No more agent available. Fuel and ignition sources are already shut off (fire handle pulled). The fire may burn out or may continue feeding on residual fuel/oil. Emergency landing at nearest suitable airport."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"Firewall shutoff valves close when the fire handle is pulled to:","o":["Increase engine power","Stop fuel, oil, hydraulic fluid, and bleed air from feeding the fire","Reduce cabin noise","Activate the autopilot"],"c":1,"x":"Fire handle pull = shuts off ALL flammable fluid supplies to that engine zone. Fuel shutoff, hydraulic shutoff, bleed air shutoff, generator disconnected. Removes the fire's fuel source."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"APU fire detection is typically:","o":["By pilot observation only","Automatic \u2014 fire detection triggers auto-shutdown and may auto-discharge the extinguisher","Manual only","Not required"],"c":1,"x":"APU fires can occur unmonitored (APU running during ground ops with crew away). Auto-shutdown and auto-discharge protect the aircraft. Fire warning light alerts ground crew."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"A thermal discharge indicator (red disk) missing from a fire bottle means:","o":["Normal discharge occurred","The bottle may have discharged due to excessive heat (thermal relief) \u2014 NOT a commanded discharge","The system is charged","Maintenance is overdue"],"c":1,"x":"Red = thermal/overpressure discharge. Yellow = normal commanded discharge. Missing red disk = investigate what caused the heat (nearby fire, environmental). Check agent weight to verify discharge."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Fire bottle crossfeed capability means:","o":["Bottles can be refilled from the other engine","Either bottle can discharge into either engine nacelle \u2014 providing two shots per engine if needed","Bottles are shared with cabin extinguishers","No crossfeed exists"],"c":1,"x":"Crossfeed: two bottles, two engines, any combination. Engine 1 fire: Bottle 1 first shot. If fire persists: Bottle 2 via crossfeed = second shot. Maximizes suppression options."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"During engine fire testing on the ground, a real fire extinguisher discharge is:","o":["Required every test","Never performed during routine testing \u2014 test switches simulate the system; actual discharge is only for real fires","Done weekly","Part of every preflight"],"c":1,"x":"Ground tests verify the detection circuit, warning lights, and squib continuity WITHOUT actually firing the bottle. Actual discharge = bottle needs recharging ($$$) and refill time. Only discharged for real fires or periodic hydrostatic test cycles."},{"e":"PP","t":"Propellers","d":3,"q":"A counterweight propeller uses centrifugal force on counterweights to:","o":["Decrease pitch","Move blades toward high pitch (increase pitch) \u2014 oil pressure opposes to decrease pitch","Stop the propeller","Balance the propeller"],"c":1,"x":"Counterweights are attached so centrifugal force twists the blade toward high/feather pitch. Oil pressure from the governor opposes this to reduce pitch. Loss of oil pressure = auto-feather."},{"e":"PP","t":"Propellers","d":2,"q":"Propeller balancing reduces:","o":["Engine power","Vibration caused by unequal blade weight distribution","Blade pitch","Blade angle"],"c":1,"x":"Static balance: hang prop on a mandrel, check for heavy side, add/remove weight. Dynamic balance: electronic analyzer measures vibration in operation, weights added to spinner to correct. Reduces wear on engine mounts and bearings."},{"e":"PP","t":"Propellers","d":3,"q":"A propeller reduction gearbox is needed on turbine engines because:","o":["Turbines run too slowly","Turbine output shaft RPM is far too high for efficient propeller operation \u2014 gears reduce RPM while increasing torque","Gears increase RPM","It's purely for noise"],"c":1,"x":"Turbine: optimal 20,000-40,000 RPM. Propeller: optimal 1,200-2,200 RPM. Reduction gear ratios of 10:1 to 15:1 typical. Multiplies torque proportionally. Gearbox is a critical, inspected component."},{"e":"PP","t":"Propellers","d":2,"q":"Blade angle is measured from:","o":["The l
