opellers","d":3,"q":"A transverse crack of any size on an aluminum propeller blade:","o":["Can be filed smooth and returned to service","Requires NDT before decision","Renders the propeller unrepairable","Can be stop-drilled"],"c":2,"x":"[FAA AMP Q83] Transverse cracks (across the blade) are instant rejection. They indicate fatigue that will propagate rapidly under centrifugal loads. No repair possible."},{"e":"PP","t":"Propellers","d":2,"q":"Fuel is normally supplied to an APU from:","o":["An independent APU fuel tank","The aircraft's header tank","The aircraft's main fuel tank","A ground cart"],"c":2,"x":"[FAA AMP Q86] APU feeds from main tank(s) through its own fuel line. No separate tank needed. Allows APU operation for ground power and engine starting."},{"e":"AF","t":"Structures","d":2,"q":"Which fuselage structural members prevent bending?","o":["Ribs and formers","Longerons and stringers","Bulkheads and skin","Frames only"],"c":1,"x":"[FAA AMA Q7] Longerons (heavy) and stringers (lighter) run lengthwise and carry bending loads. Formers/frames give cross-sectional shape."},{"e":"AF","t":"Structures","d":2,"q":"A tap test on composite giving a dull thud indicates:","o":["Sound material","Delamination or void underneath","Proper cure","Excess resin only"],"c":1,"x":"[FAA AMA Q8] Sharp ringing = good. Dull thud = problem (delamination, disbond, void). Simple but effective first inspection method."},{"e":"AF","t":"Structures","d":3,"q":"The advantage of Hi-Lok fasteners is:","o":["Shorter transition area between shank and thread","External counterbore at the base","They cannot be over-torqued","They are lighter than rivets"],"c":2,"x":"[FAA AMA Q10] Hi-Lok collar shears off at a predetermined torque. Impossible to over-torque. Widely used in modern aircraft structure."},{"e":"AF","t":"Structures","d":2,"q":"Repairing advanced composites with fiberglass techniques results in:","o":["Restored strength","Slightly stronger repair","An unairworthy repair","Identical results"],"c":2,"x":"[FAA AMA Q13] Advanced composites (carbon, kevlar) need specific materials and methods. Fiberglass techniques don't restore structural properties = unairworthy."},{"e":"AF","t":"Structures","d":2,"q":"The catalyzed resin's workable time is called:","o":["Shelf life","Pot life","Cure time","Storage limit"],"c":1,"x":"[FAA AMA Q9] Pot life = time after mixing before the resin becomes too thick to use. Varies by resin type and temperature. Exceeding it = bad layup."},{"e":"AF","t":"Fire Protection","d":3,"q":"An engine fire extinguisher yellow indicator disk missing means:","o":["System charged and ready","System normally discharged","System discharged from overpressure","System needs refill only"],"c":1,"x":"[FAA AMP Q25] Yellow = normal discharge. Red = thermal/overpressure discharge. These indicators are checked during walkaround."},{"e":"AF","t":"Fire Protection","d":2,"q":"Continuous-loop fire detection in an engine nacelle uses:","o":["Smoke density sensors","Kidde continuous-loop thermal sensors","UV flame detectors only","Carbon monoxide sensors"],"c":1,"x":"[FAA AMP Q27] Single sensing element routed around the engine zone. Resistance drops with temperature at any point along the loop = alarm."},{"e":"AF","t":"Fire Protection","d":2,"q":"In gas welding, heat applied is controlled by:","o":["Oxygen-acetylene regulator pressure","Size of the torch tip opening","Cutting oxygen valve lever","Distance from the work"],"c":1,"x":"[FAA AMA Q14] Tip size determines flame size and heat output. Larger tip = more heat for thicker material. Regulator sets the gas pressure, tip controls application."},{"e":"AF","t":"Fire Protection","d":3,"q":"Full penetration in a butt weld means penetration should be:","o":["50% of base metal thickness","100% of base metal thickness","75% of base metal thickness","25% minimum"],"c":1,"x":"[FAA AMA Q15] 100% penetration required for structural butt welds. Visible as smooth, even bead on the back side. Incomplete = weak joint."},{"e":"AF","t":"Fire Protection","d":2,"q":"Magnesium welding characteristics include:","o":["Low thermal conductivity so distortion/cracking rarely occurs","It requires larger beads and slower speed","It can use the same joints as aluminum welding","It cannot be welded"],"c":2,"x":"[FAA AMA Q16] Magnesium welds similarly to aluminum \u2014 same joint types, gas tungsten arc (TIG) process. But very flammable in powder/chip form."},{"e":"AF","t":"Fuel Systems","d":3,"q":"A fuel temperature indicator in the cockpit of turbine aircraft monitors:","o":["Fuel flow during ice crystal formation","Fuel temperature at altitude where water in fuel may freeze","Fuel quantity when ice forms in tanks","Fuel grade"],"c":1,"x":"[FAA AMA Q63] Water in jet fuel freezes at altitude and blocks filters. Temp indicator warns crew when approaching freezing point."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Integral fuel tanks are:","o":["Easily removed for service","Made of plastic or fiberglass","Supported by the aircraft structure itself (wing/fuselage is the tank)","Bladder type"],"c":2,"x":"[FAA AMA Q61] Integral = the sealed structure IS the tank. Wing skin, ribs, and spars form the tank boundaries. Sealed with polysulfide sealant."},{"e":"AF","t":"Fuel Systems","d":2,"q":"The electrical fuel quantity system uses a float that:","o":["Moves a connecting arm to a variable resistor in the tank","Attaches to a rod in a calibrated cylinder","Operates with AC and constant resistance driving a ratiometer","Measures fuel temperature"],"c":0,"x":"[FAA AMA Q65] Float position changes resistance \u2192 gauge in cockpit shows fuel level. Simple, reliable. Capacitance-type systems used on larger aircraft."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Fuel filler cover markings must include:","o":["The word Avgas, minimum grade, and total capacity","The word Avgas, minimum grade, and usable capacity","The word Avgas and minimum grade only","Only the fuel type"],"c":1,"x":"[FAA AMA Q64] Markings: fuel type + minimum grade + USABLE capacity. Usable (not total) because unusable fuel cannot be delivered to the engine."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"The most common anti-icing systems in use are:","o":["Only electrical","Thermal pneumatic, thermal electric, and chemical","Only chemical (glycol)","Only rubber boots"],"c":1,"x":"Three types: bleed air (thermal pneumatic), electric elements (thermal electric), and weeping TKS (chemical). Each has different applications on different aircraft."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Wing slats help prevent stall by:","o":["Reducing drag at cruise","Creating a slot that re-energizes boundary layer airflow at high AOA","Adding weight to the leading edge","Deflecting ice"],"c":1,"x":"[FAA AMA Q19] Slats extend at high AOA, creating a slot. High-energy air flows through the slot onto the upper surface, delaying boundary layer separation = lower stall speed."},{"e":"AF","t":"Instruments","d":2,"q":"A hydraulic pressure gauge uses a:","o":["Bourdon tube","Pressure diaphragm","Evacuated bellows","Digital transducer only"],"c":0,"x":"[FAA AMA Q50] Bourdon tube: curved tube straightens under pressure, moving a pointer. Used for hydraulic, oil, and fuel pressure gauges. You see these daily."},{"e":"AF","t":"Instruments","d":2,"q":"Sea level standard atmospheric pressure is:","o":["29.92 inches Hg","29.92 millibars","1013.25 inches Hg","14.7 inches Hg"],"c":0,"x":"[FAA AMA Q51] 29.92\" Hg = 1013.25 hPa/mb = 14.7 PSI. The reference for altimeter calibration."},{"e":"AF","t":"Instruments","d":2,"q":"Compass deviation can be compensated by:","o":["An AME using the compensator screws on the compass","Only the manufacturer","Only a certified instrument shop","It cannot be compensated"],"c":0,"x":"[FAA AMA Q52] Deviation from aircraft magnetic fields is correctable via compensator screws. Variation (geographic) and dip errors cannot be mechanically compensated."},{"e":"AF","t":"Instruments","d":3,"q":"When installing instruments, proper markings are the responsibility of:","o":["The aircraft owner","The mechanic installing the instrument","The instrument manufacturer","Transport Canada"],"c":1,"x":"[FAA AMA Q48] The installing mechanic must verify and apply all required range markings, placards, and limitations per the approved data."},{"e":"AF","t":"Instruments","d":2,"q":"A certified mechanic with airframe rating may perform:","o":["Minor internal instrument repairs","Major instrument repairs","Inspections and function checks on aircraft instruments","Instrument calibration"],"c":2,"x":"[FAA AMA Q49] AMEs can inspect and function-check instruments. Repairs require specialized instrument shop certification. Know the scope of your licence."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Wires passing through bulkheads must be protected by:","o":["Aerodynamic tape","A suitable grommet to prevent chafing","Plastic spiral wrap","Nothing if properly routed"],"c":1,"x":"[FAA AMA Q70] Grommets prevent insulation wear at sharp edges. Chafing = bare wire = short circuit = fire. Critical installation practice."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Circuit-protective devices in aircraft include:","o":["Circuit breakers, relays, current limiters","Circuit breakers, fuses, current limiters","Circuit breakers, capacitors, current limiters","Fuses only"],"c":1,"x":"[FAA AMA Q71] CBs (resettable), fuses (replaceable), and current limiters protect wiring. Relays are switching devices, not protection."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Multiple splices in a wire bundle should be:","o":["Grouped together","Staggered along the bundle length","Never permitted","At the termination only"],"c":1,"x":"[FAA AMA Q77] Staggering prevents a bulge that could cause chafing, overheating, or difficulty routing through clamps."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Aircraft junction boxes in fire zones are constructed of:","o":["Aluminum","Carbon steel","Stainless steel","Plastic"],"c":2,"x":"[FAA AMA Q74] Stainless steel resists fire damage in engine compartments and other fire zones. Aluminum would melt; carbon steel would corrode."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Pre-insulated terminal lugs are installed by:","o":["Using a crimping tool","Soldering the lug to the wire","Soldering wire then crimping","Twisting and taping"],"c":0,"x":"[FAA AMA Q75] Crimp only \u2014 no solder. Solder creates a rigid point that cracks under vibration. Proper crimping creates a gas-tight mechanical connection."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"The primary purpose of an autopilot is:","o":["To relieve the pilot during long flight periods","For more precise courses in turbulence","To replace the pilot","To reduce fuel consumption"],"c":0,"x":"[FAA AMA Q56] Autopilot reduces workload during cruise, allowing attention to navigation, monitoring, and communications. Not a pilot replacement."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"The preferred ELT location is:","o":["As far forward as possible","At the lowest fuselage point","As far aft as possible but forward of the empennage","On the wing"],"c":2,"x":"[FAA AMA Q57] Aft fuselage = most survivable crash area. Forward of empennage to avoid crushing. Must transmit after impact."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"A DME antenna should be aligned with:","o":["The VOR antenna","The chord line","The aircraft centerline","The horizontal stabilizer"],"c":2,"x":"[FAA AMA Q54] Centerline installation (usually belly) ensures signal reception regardless of bank angle during turns."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"Aircraft antennas must be grounded to:","o":["The airframe","The wing spar specifically","The bus bar","An external ground rod"],"c":0,"x":"[FAA AMA Q55] Antennas ground to the airframe for proper electrical bonding, static discharge, and signal reference. Poor grounding = poor reception/transmission."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"Coaxial cable should be routed:","o":["Parallel to stringers/ribs","Perpendicular to stringers/ribs","As directly as possible","In tight bends for space saving"],"c":2,"x":"[FAA AMA Q68] Direct routing minimizes signal loss. Avoid sharp bends (damages the cable), keep away from power wiring (interference), and secure properly."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"A circuit breaker advantage over a fuse:","o":["Easily replaced","Controls current flow","It is resettable and reusable","Lower cost"],"c":2,"x":"[FAA AMA Q69] CBs can be reset without replacement. Fuses must be replaced with exact same rating. CBs also serve as switches in many aircraft."},{"e":"AF","t":"Landing Gear","d":2,"q":"A flexible hydraulic hose stripe running its length indicates:","o":["Installed without excessive twisting","For high pressure use","Suitable for wide temperature range","Needs replacement"],"c":0,"x":"[FAA AMA Q24] The stripe is a twist indicator. If the stripe spirals, the hose was installed with twist = premature failure. Must run straight."},{"e":"AF","t":"Landing Gear","d":3,"q":"A fusible plug core showing deformation requires:","o":["Replacing only affected plugs","Replacing ALL fusible plugs in that wheel","A new wheel assembly","No action if not fully melted"],"c":1,"x":"[FAA AMA Q25] Any deformation = heat exposure. Replace ALL plugs \u2014 if one was affected, others saw the same heat. Indicates overheated brakes."},{"e":"AF","t":"Landing Gear","d":2,"q":"A continuous horn in the cockpit warns when:","o":["Throttle retarded and gear NOT down and locked","Throttle advanced and gear down","Throttle retarded and gear down","On ground with parking brake off"],"c":0,"x":"[FAA AMA Q26] Gear warning: power reduced for landing + gear not locked down = horn. Prevents gear-up landings."},{"e":"AF","t":"Landing Gear","d":2,"q":"Excessive center tread wear on a tire indicates:","o":["Misalignment","Underinflation","Overinflation","Normal wear"],"c":2,"x":"[FAA AMA Q27] Overinflation: center bulges out and carries more load = center wear. Underinflation: edges carry load = edge wear."},{"e":"AF","t":"Landing Gear","d":3,"q":"Maintenance affecting landing gear performance requires:","o":["A test flight","Visual inspection by IA","Aircraft on jacks for retraction test","No special action"],"c":2,"x":"[FAA AMA Q30] After landing gear work, jack the aircraft and perform a full retraction test. NEVER test retraction on the ground without jacks."},{"e":"AF","t":"Landing Gear","d":2,"q":"Antiskid braking is classified as:","o":["Hydraulic system","Electrohydraulic system","Electrical system","Pneumatic system"],"c":1,"x":"[FAA AMA Q80] Electrical sensors (wheel speed) + hydraulic modulation (brake pressure) = electrohydraulic. Standard exam classification question."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Which valve allows flow in one direction only?","o":["Check valve","Sequence valve","Relief valve","Selector valve"],"c":0,"x":"[FAA AMA Q33] Check valve = hydraulic diode. Prevents reverse flow. You install these regularly in landing gear and hydraulic systems."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"The most common seal preventing leakage in both directions:","o":["O-ring","V-ring","U-ring","Lip seal"],"c":0,"x":"[FAA AMA Q34] O-rings are the universal hydraulic seal. Used in static and dynamic applications. You handle these every day at Mecaer."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"To protect seals when installing over threads:","o":["Coat threads with heavy grease","Cover threads with tape","Cover with a suitable sleeve","Push seal through quickly"],"c":2,"x":"[FAA AMA Q35] Sleeve protects seal lip from catching on sharp thread edges. Tape can leave adhesive residue. Grease alone doesn't prevent mechanical damage."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Phosphate ester hydraulic fluid is susceptible to contamination from:","o":["Rapid temperature changes","Water in the atmosphere","Icing conditions","UV radiation"],"c":1,"x":"[FAA AMA Q37] Skydrol absorbs moisture from air (hygroscopic). Water causes corrosion and degrades fluid properties. Keep containers sealed."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Cabin pressure is maintained by controlling:","o":["Rate of air flowing IN","Rate of air flowing OUT via the outflow valve","Inflating door seals","Engine bleed air temperature"],"c":1,"x":"[FAA AMA Q41] Outflow valve modulates exit airflow. More open = less pressure. Controller adjusts automatically for desired cabin altitude."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Which oxygen system delivers only when the user inhales?","o":["Continuous-flow","Emergency-flow","Demand-flow","Pressure-demand"],"c":2,"x":"[FAA AMA Q42] Demand-flow conserves oxygen by delivering only during inhalation. Diluter-demand mixes with cabin air at lower altitudes."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"The main cause of contamination in a gaseous oxygen system:","o":["Moisture","Dust","Nitrogen","Carbon monoxide"],"c":0,"x":"[FAA AMA Q45] Moisture freezes at altitude blocking valves/regulators. Also causes internal corrosion. Keep O2 systems completely dry."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"The purpose of pressurization is:","o":["Flight in thunderstorms","Proper system operation","Safe human flight in the hostile upper atmosphere","Increased airspeed"],"c":2,"x":"[FAA AMA Q44] Above ~10,000 ft humans need supplemental O2. Pressurization maintains 6,000-8,000 ft cabin while flying at 30,000+ ft."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"A steady stream of bubbles in the sight glass when servicing a vapor cycle AC means:","o":["System overcharged","System properly charged","System undercharged","Compressor failure"],"c":2,"x":"[FAA AMA Q47] Steady bubbles = not enough refrigerant. Properly charged = clear liquid (no bubbles). Intermittent bubbles = borderline."},{"e":"AF","t":"Aerodynamics","d":2,"q":"Wing slats reduce stalling speed by:","o":["Adding weight","Creating a slot that energizes airflow over the wing at high AOA","Reducing wing area","Increasing drag"],"c":1,"x":"[FAA AMA Q19] Slats re-energize the boundary layer, delaying separation to a higher AOA = lower stall speed. Critical for takeoff and landing."},{"e":"AF","t":"Aerodynamics","d":2,"q":"Fretting corrosion between rivets and skin appears as:","o":["Green deposits","White powder","Black smoky residue streaming from the rivets","Red rust"],"c":2,"x":"[FAA AMA Q4] Black residue = aluminum oxide from microscopic movement between rivet and skin. Indicates the joint is working loose under load."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Which part of the aluminum alloy designation 2024-T3 indicates temper?","o":["2024","20","T3","24"],"c":2,"x":"[FAA AMA Q2] First four digits = alloy. T3 = temper (heat treatment condition). T3 = solution heat treated + cold worked. Know T3, T4, T6 designations."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Control cable inspection for broken strands is done by:","o":["Visual only","Running a cloth along the cable and checking for snags","X-ray inspection","Ultrasonic testing"],"c":1,"x":"[FAA AMA Q20] Cloth test: wrap cloth around cable and slide. Broken strands snag the fabric. Also visual with magnification. Replace any cable with broken strands."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Rigging checks should position the aircraft with:","o":["Tail into wind","Left wing into wind","Nose into wind","Any direction is acceptable"],"c":2,"x":"[FAA AMA Q21] Nose into wind prevents wind from loading control surfaces asymmetrically, which would give false rigging readings."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A dual or independent inspection is required after:","o":["Any maintenance whatsoever","Only engine overhauls","Any work that disturbs engine or flight controls","Annual inspections only"],"c":2,"x":"[CARs Practice Test Q1] After disturbing engine or flight controls, a second qualified person must independently verify. Safety-critical requirement."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"The US aviation regulations are called:","o":["JARs","CARs","PMAs","FARs"],"c":3,"x":"[CARs Practice Test Q2] Canada=CARs, USA=FARs (14 CFR), Europe=EASA regs. Know the international regulatory landscape."},{"e":"REGS","t":"Parts & Records","d":3,"q":"No person shall install a part on an aircraft unless:","o":["It is inspected and documentation verified","It has an AI-99 tag","It is an authorized PMA part","The installer is a rated AME"],"c":0,"x":"[CARs Practice Test Q3] Part must be inspected AND documentation verified before installation. The documentation trail is as important as the physical inspection."},{"e":"REGS","t":"Airworthiness","d":3,"q":"ADs are mandatory when issued by:","o":["Transport Canada only","Only against Canadian aircraft","Only when marked mandatory","TC or a foreign authority with jurisdiction over the type design"],"c":3,"x":"[CARs Practice Test Q4] ADs from TC AND from the state of design (e.g., FAA for US-designed aircraft) are mandatory. Both authorities have jurisdiction."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"A 'small aeroplane' under CARs has a MTOW of:","o":["2,730 kg or less","5,700 kg or less","12,566 kg or less","15,000 kg or less"],"c":1,"x":"[CARs Practice Test Q5] 5,700 kg divides small from large aeroplanes. Affects maintenance requirements, equipment rules, and operating standards."},{"e":"REGS","t":"Other Standards","d":3,"q":"A Shop Certification Authority (SCA) holder is authorized to:","o":["Certify maintenance on aircraft","Certify maintenance on aircraft PARTS as authorized in AMO's MPM","Exercise same privileges as an AME","Inspect aircraft for TC"],"c":1,"x":"[CARs Practice Test Q6] SCA = shop/parts only, not whole aircraft. Authorized by and listed in the AMO's MPM."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Once an MEL is approved, the operator must:","o":["Treat MEL conditions as optional","Operate under the conditions specified in the MEL","Transfer it to other operators","Ignore it if it conflicts with maintenance schedule"],"c":1,"x":"[CARs Practice Test Q7] MEL conditions are legally binding. Deviation = violation of the operating certificate."},{"e":"REGS","t":"Parts & Records","d":3,"q":"If a reportable SDR recurs on the same product type:","o":["No further reporting needed","It must be reported again each occurrence","Only first occurrence matters","Report only if it causes an accident"],"c":1,"x":"[CARs Practice Test Q8] EVERY occurrence must be reported. TC tracks recurring defects to identify fleet-wide safety trends."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"General provisions of CARs are found in:","o":["AWM Chapter 571","CAR Part III","AWM Chapter 507","CAR Part I"],"c":3,"x":"[CARs Practice Test Q9] Part I = General Provisions and definitions. Know the CARs structure: Parts I through VII."},{"e":"REGS","t":"AME Licensing","d":3,"q":"Maximum AME licence experience credits are:","o":["Unlimited","150 hours/month or 1,800 hours/year","200 hours/month","Based on employer letter only"],"c":1,"x":"[CARs Practice Test 2 Q5] Max 150 hrs/month or 1,800 hrs/year credited toward the 48-month requirement. Must be documented."},{"e":"REGS","t":"AME Licensing","d":3,"q":"When an AME signs a task in an apprentice logbook, they certify:","o":["Task was merely completed","Apprentice can perform that task without supervision","Apprentice only observed","It's just a formality"],"c":1,"x":"[CARs Practice Test 2 Q7] The AME's signature = professional certification of the apprentice's demonstrated competency to perform that task independently."},{"e":"REGS","t":"AME Licensing","d":2,"q":"AME licence renewal (not expired) requires:","o":["Meeting initial requirements again","Form 24-0083 and payment","Passing all exams again","A flight test"],"c":1,"x":"[CARs Practice Test 2 Q9] Unexpired: form + fee. Expired >1 year: may need to meet initial issue requirements. Keep your licence current!"},{"e":"REGS","t":"AME Licensing","d":3,"q":"S and E ratings are specific to:","o":["Aircraft types","Types of WORK rather than aircraft types","Military aircraft","Training organizations"],"c":1,"x":"[CARs Practice Test 2 Q12] M1/M2 = aircraft categories. S = Structures work. E = Electronics work. S and E are work-type specific regardless of aircraft."},{"e":"REGS","t":"Parts & Records","d":3,"q":"The TC Form One (24-0078) is recognized:","o":["Only in Canada","Internationally and in Canada","Only in the USA","Only within the issuing AMO"],"c":1,"x":"[CARs Practice Test 2 Q8] Form One is an international release certificate. Recognized by ICAO contracting states with bilateral agreements."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"The AMO's MPM is amended by:","o":["QA department at will","PRM on anniversary date","Proposed amendments sent to TC for approval by the certificate holder","TC amends automatically"],"c":2,"x":"[CARs Practice Test 2 Q11] AMO proposes \u2192 TC reviews and approves \u2192 then implement. Same process as original approval."},{"e":"REGS","t":"Other Standards","d":2,"q":"Who is responsible for keeping aircraft technical records?","o":["The AME doing maintenance","The aircraft owner","The person doing the work","The AMO"],"c":1,"x":"[CARs Practice Test 2 Q4] Owner is legally responsible. Even when maintenance is delegated to AMOs, record-keeping responsibility stays with the owner."},{"e":"REGS","t":"AME Licensing","d":3,"q":"An AME licence expired more than one year is renewed by:","o":["Form + fee only","Meeting initial issue requirements including CARs exam","Just a CARs exam","Employer endorsement"],"c":1,"x":"[CARs Practice Test 2 Q3] Expired >1 year = essentially starting over. Must demonstrate current knowledge through examination."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"MELs are developed from:","o":["Manufacturer recommendation only","A Master MEL published by regulatory authority with manufacturer and industry input","Operator experience only","The Maintenance Review Board"],"c":1,"x":"[CARs Practice Test 2 Q6] MMEL = regulatory starting point. Operator customizes \u2192 TC approves. Can be more restrictive than MMEL, never less."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Who controls Out of Phase task completion on commercial aircraft?","o":["The owner or delegated person responsible for the maintenance control system","The AMO","The certifying AME","Out of Phase doesn't apply to commercial aircraft"],"c":0,"x":"[CARs Practice Test 2 Q10] Owner/operator (via PRM and maintenance control system) must track and ensure out-of-phase items are completed on time."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A Technical Standard Order (TSO) is issued by:","o":["Aircraft manufacturers","The regulatory authority (FAA Administrator or equivalent)","Individual AMEs","Airlines"],"c":1,"x":"TSO = minimum performance standard for specific articles. Issued by the authority. A TSO'd part must meet stated design and performance requirements."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Aircraft wire size is determined using a:","o":["Ohmmeter","Wire gauge","Dial caliper","Micrometer"],"c":1,"x":"[FAA AMG Q32] Wire gauge (AWG standard) measures wire diameter. Proper gauge ensures current capacity and acceptable voltage drop."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Wing and stabilizer frames are located using:","o":["Dimension numbers","Station numbers","Scale numbers","Reference marks"],"c":1,"x":"[FAA AMG Q32] Station numbers identify positions along fuselage, wing, and stabilizer. Essential for locating repair zones and components."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"What indicates a surface must be machine finished on a drawing?","o":["Text annotation","Leader lines","Finish marks (check symbol)","Color coding"],"c":2,"x":"[FAA AMG Q33] Finish marks specify required surface smoothness. Number indicates roughness in microinches. Critical for sealing surfaces."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"In a sectional view, which sections show particular parts removed from the main view?","o":["Removed sections","Revolved sections","Half sections","Full sections"],"c":0,"x":"[FAA AMG Q34] Removed sections are drawn separately from the main view for clarity. Revolved sections are rotated in place on the view."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Which leveling device provides the greatest accuracy for aircraft leveling?","o":["Electronic load cells","Spirit level","Plumb bob and chalk line","Carpenter's level"],"c":0,"x":"[FAA AMG Q26] Electronic load cells under jack points provide the most precise weight readings and leveling reference. Spirit levels are secondary."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"The best tool for cutting soft aluminum tubing is:","o":["Hand-operated wheel-type tubing cutter","Hacksaw with 32 TPI","Angle grinder","Band saw"],"c":0,"x":"[FAA AMG Q28] Wheel cutter gives clean, burr-free cuts without chips that could contaminate hydraulic systems. Hacksaw leaves debris."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"Flattening in tube bends must not reduce the diameter below:","o":["50% of original OD","65% of original OD","75% of original OD","90% of original OD"],"c":2,"x":"[FAA AMG Q29] 75% minimum. Below this restricts flow and weakens the tube structurally. Reject and re-bend or replace."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"A voltmeter properly connected across a CLOSED switch reads:","o":["System voltage","Component voltage drop","Zero voltage","Half voltage"],"c":2,"x":"[FAA AMG Q31] Closed switch = no resistance = no voltage drop = 0V. A voltage reading across a closed switch = bad connection/resistance."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Self-locking nuts may be used provided:","o":["Bolt head is safety wired","Lock washer also installed","Bolt or nut is not subject to rotation during operation","They're replaced after each removal"],"c":2,"x":"[FAA AMG Q54] Self-locking nuts lose grip if the bolt rotates in service. Static applications only. Not for control surface hinges or engine mounts."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"What determines if a moment is positive or negative?","o":["Location of weight relative to the datum","Location of datum relative to CG","Moment of tail components","Whether weight is added or removed"],"c":0,"x":"[FAA AMG Q10] Ahead of datum = negative arm/moment. Aft of datum = positive. Weight \u00d7 arm = moment. Sign depends on position relative to datum."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Helicopter weight and balance differs from airplanes because:","o":["Lateral CG is not a factor","Tail-mounted component moments are subject to constant change","Same procedures apply as airplanes","Helicopters don't need W&B"],"c":1,"x":"[FAA AMG Q11] Tail boom length means small weight changes (fuel, passengers, cargo) create large moment changes. Both longitudinal AND lateral CG matter in helicopters."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"If CG is at '24 percent MAC', this is the distance from:","o":["TEMAC (trailing edge of MAC)","LEMAC (leading edge of MAC)","The datum","The main landing gear"],"c":1,"x":"[FAA AMG Q25] CG percent MAC is measured from the Leading Edge of the Mean Aerodynamic Chord. 24% means 24% of the way back from LEMAC."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"What may cause erroneous scale readings during weighing?","o":["Wheel chocks removed","Parking brakes set","Low tire pressure","Open fuel caps"],"c":1,"x":"[FAA AMG Q24] Set parking brakes create friction that holds weight = incorrect readings. Brakes must be released. Also: level surface, no wind, correct fuel state."},{"e":"SPM","t":"General Servicing","d":2,"q":"What is 'residual fuel'?","o":["Known amount left in tanks, lines, and engine","Fuel remaining after draining (that can't be removed)","Fuel remaining before draining","Fuel in the bowser"],"c":1,"x":"[FAA AMG Q51] Residual fuel is trapped fuel that cannot be drained. Important for W&B calculations \u2014 it's part of the aircraft empty weight."},{"e":"SPM","t":"General Servicing","d":2,"q":"14 CFR Part 65 contains regulations regarding certification of:","o":["Pilots and flight instructors","Airmen other than flight crew (mechanics, dispatchers, etc.)","Flight crew other than pilots","Air traffic controllers only"],"c":1,"x":"[FAA AMG Q52] Part 65 covers non-flight crew: mechanics (AMEs), repairmen, dispatchers, parachute riggers. Equivalent in Canada = CAR Part III."},{"e":"SPM","t":"General Servicing","d":2,"q":"Examples of US conventional measurement units include:","o":["Inch, meter, gram","Inch, kilo, liter","Inch, ounce, pound","Centimeter, kilogram, liter"],"c":2,"x":"[FAA AMG Q53] US/Imperial: inch, foot, ounce, pound. Metric: meter, gram, kilogram, liter. Aircraft use both systems \u2014 know conversions."},{"e":"SPM","t":"General Servicing","d":3,"q":"Newton's First Law (Law of Inertia) states:","o":["To every action there is an equal and opposite reaction","Force equals mass times acceleration","Objects at rest tend to stay at rest, objects in motion tend to stay in motion unless acted on by external force","Energy cannot be created or destroyed"],"c":2,"x":"[FAA AMG Q36] Inertia: things keep doing what they're doing unless a force changes them. Relevant to understanding gyroscopic instruments and flight dynamics."},{"e":"SPM","t":"General Servicing","d":3,"q":"The binary number 00001111 converts to:","o":["31","15","8","16"],"c":1,"x":"[FAA AMG Q37] (0+0+0+0+8+4+2+1) = 15. Digital avionics use binary. TC exams test binary-to-decimal conversion."},{"e":"SPM","t":"General Servicing","d":3,"q":"When thinking about aviation safety, human error is:","o":["The starting point for investigation","The ending point","The intervention point","Irrelevant"],"c":0,"x":"[FAA AMG Q45] Modern safety philosophy: human error is the STARTING point, not the conclusion. Investigate WHY the error occurred \u2014 systemic factors, not just blame."},{"e":"SPM","t":"NDT","d":2,"q":"Dye penetrant inspection detects:","o":["Only subsurface cracks","Surface-breaking discontinuities only","Internal porosity","Delamination"],"c":1,"x":"Penetrant enters surface-breaking cracks by capillary action. Developer draws it out making the indication visible. Cannot find closed or subsurface defects."},{"e":"SPM","t":"NDT","d":3,"q":"Radiographic (X-ray) inspection can detect:","o":["Only surface cracks","Internal defects including cracks, voids, porosity, and inclusions","Only magnetic anomalies","Only in ferrous metals"],"c":1,"x":"X-rays pass through material \u2014 defects show as density differences on film/digital detector. Works on any material. Detects internal flaws invisible to other methods."},{"e":"SPM","t":"NDT","d":2,"q":"Liquid penetrant inspection requires the surface to be:","o":["Painted","Thoroughly cleaned before application","Wet with water","Heated above 200\u00b0F"],"c":1,"x":"Surface must be clean and dry. Contaminants in cracks prevent penetrant entry = missed defects. Cleaning is the most critical step in PT inspection."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Fretting corrosion appears as:","o":["Green deposits","White powder","Black residue from microscopic surface movement between tight-fitting parts","Red rust"],"c":2,"x":"[FAA AMA Q4] Riveted joints, bolted fittings \u2014 microscopic movement grinds surfaces producing black aluminum oxide. Indicates looseness under load."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Clad aluminum alloys resist corrosion because:","o":["They're naturally resistant","Pure aluminum layers bonded to the core sacrifice to protect it","Oxide film forms on contact with air","They contain chromium"],"c":1,"x":"[FAA AMA Q6] Alclad: thin pure aluminum layers bonded to high-strength core alloy. Pure aluminum corrodes preferentially, protecting the structural core."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Filiform corrosion appears as:","o":["Large pits","Worm-like threads under paint or plating","Black powder","Green crystals"],"c":1,"x":"Filiform corrosion: thread-like filaments growing under surface coatings (paint, plating). Caused by moisture penetration. Treat by stripping coating, removing corrosion, recoating."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"The T6 temper designation means:","o":["Annealed","Solution heat treated and cold worked","Solution heat treated and artificially aged","Strain hardened"],"c":2,"x":"T6 = solution heat treated + artificially aged. Produces high strength. Compare: T3 = solution HT + cold worked. T4 = solution HT + naturally aged. Know these for the exam."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"A sectional view drawing shows internal features by:","o":["Transparent view","Imaginary cut through the object with cross-hatching on solid material","Exploded arrangement","Shadow projection"],"c":1,"x":"Sectional views reveal what's inside. Cross-hatching (angled lines) indicates solid material that was 'cut through.' Essential for understanding complex assemblies."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"An orthographic projection uses:","o":["3D perspective views","Multiple flat 2D views (front, top, side) without distortion","Only isometric views","Only sectional views"],"c":1,"x":"Orthographic = flat 2D views from perpendicular directions. Most common type in aircraft maintenance drawings. Top + front + right side = standard arrangement."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"A bill of materials lists:","o":["Employee names","All parts, quantities, and specifications needed for the assembly","Paint colors only","Inspection dates"],"c":1,"x":"BOM = master parts list. Part numbers, descriptions, quantities, material specs. Essential for ordering correct parts and verifying completeness of an assembly."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"Zone numbers on large drawings help:","o":["Determine paint color","Locate specific areas using a grid system","Calculate weight","Identify manufacturer"],"c":1,"x":"Large drawings divided into grid zones (like map coordinates). 'See zone C-4' directs you to the right area on a complex multi-sheet drawing."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"A cutting plane line on a drawing shows:","o":["Where to cut during fabrication","Where the imaginary cut is made to create a sectional view","A hidden edge","The dimension reference"],"c":1,"x":"Heavy line with arrows showing viewing direction for the associated sectional view. The arrows point toward the section you're looking at."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"Dimension lines terminate with:","o":["Circles","Arrowheads at extension lines showing the measurement","Dashes","Nothing"],"c":1,"x":"Arrowheads touch extension lines. The number between them is the measurement. Always verify drawing dimensions against the actual part."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"Phantom lines (long-short-short-long dashes) show:","o":["Hidden edges","Adjacent parts, alternate positions, or repeated details not part of the current view","Center lines","Cutting planes"],"c":1,"x":"Phantom lines indicate related but not-present features: adjacent assemblies, range of motion, or repeated patterns. Thinner than object lines."},{"e":"AF","t":"Aerodynamics","d":2,"q":"The four forces acting on an aircraft in flight are:","o":["Lift, weight, thrust, drag","Lift, gravity, power, friction","Push, pull, up, down","Thrust, drag, torque, lift"],"c":0,"x":"Lift opposes weight, thrust opposes drag. In straight-and-level unaccelerated flight, these four forces are in equilibrium."},{"e":"AF","t":"Aerodynamics","d":3,"q":"As airspeed increases, parasite drag:","o":["Decreases","Increases proportional to the square of airspeed","Stays constant","Increases linearly"],"c":1,"x":"Parasite drag \u221d V\u00b2. Double the speed = four times the parasite drag. Induced drag decreases with speed. Total drag is minimum where the two curves cross."},{"e":"AF","t":"Aerodynamics","d":2,"q":"Dihedral (upward wing angle) provides:","o":["Longitudinal stability","Lateral (roll) stability","Directional (yaw) stability","Increased speed"],"c":1,"x":"When the aircraft rolls, the lower wing meets air at a higher effective AOA producing more lift, rolling the aircraft back to level. Automatic roll correction."},{"e":"AF","t":"Aerodynamics","d":2,"q":"The angle of attack is measured between:","o":["The chord line and the horizon","The chord line and the relative wind","The wing and the fuselage","The thrust line and the horizon"],"c":1,"x":"AOA = chord line vs relative wind (the air the wing is actually flying through). NOT relative to the horizon. A wing can stall at any aircraft pitch attitude."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Washout (decreased angle of incidence at the wingtip) ensures:","o":["The tip stalls first","The root stalls before the tip, preserving aileron control","Increased tip speed","Reduced weight"],"c":1,"x":"Root stalls first while tips (with ailerons) still have airflow and control authority. Gives the pilot stall warning and roll control during the stall."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Aspect ratio is the ratio of:","o":["Chord to thickness","Wing span to average chord","Lift to drag","Weight to thrust"],"c":1,"x":"High aspect ratio (long, narrow wings like gliders) = less induced drag, more efficient. Low AR (short, wide wings like fighters) = better roll rate, stronger structure."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"The cabin altitude on a pressurized aircraft is typically maintained at:","o":["Sea level (0 ft)","6,000-8,000 ft even when cruising at 35,000+ ft","Same as aircraft altitude","15,000 ft"],"c":1,"x":"Cabin altitude kept at 6,000-8,000 ft for comfort and safety. Maximum differential pressure (8-9 PSI) limits how low the cabin altitude can be at high cruise altitudes."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"The safety relief valve in a pressurization system:","o":["Adds air to the cabin","Opens to prevent cabin pressure from exceeding the maximum differential","Controls temperature","Manages oxygen flow"],"c":1,"x":"If outflow valve fails closed, cabin pressure could exceed structural limits. Safety relief valve opens automatically at maximum differential pressure to protect the fuselage."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Bleed air for cabin pressurization comes from:","o":["Ram air only","Engine compressor section","Hydraulic system","Battery power"],"c":1,"x":"Hot compressed air bled from the engine compressor section. Cooled by air cycle machine or heat exchangers before entering the cabin. Primary source of pressurization air on turbine aircraft."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"A transponder transmits:","o":["Voice communications","A coded reply when interrogated by radar, providing identification and altitude","Navigation signals","Weather data"],"c":1,"x":"Mode A = identification code. Mode C = altitude. Mode S = enhanced data including TCAS. Required for controlled airspace operations."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"The CVR must retain the last:","o":["30 minutes","2 hours of cockpit audio","25 hours of audio","72 hours"],"c":1,"x":"CVR = 2 hours of cockpit audio on a continuous loop. FDR = 25 hours of flight parameters. Both are crash-survivable and are critical for accident investigation."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"GPS provides aircraft with:","o":["Attitude reference","Precise three-dimensional position using satellite signals","Engine monitoring","Communication capability"],"c":1,"x":"GPS uses satellite constellation signals to determine precise lat/long/altitude position. Now primary navigation on most aircraft. WAAS enhances accuracy for approaches."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"An ILS (Instrument Landing System) provides:","o":["Only lateral guidance","Lateral (localizer) and vertical (glideslope) guidance for precision approaches","Weather information","Traffic avoidance"],"c":1,"x":"Localizer = left/right of centerline. Glideslope = above/below the proper descent angle (typically 3\u00b0). Together they guide the aircraft to the runway in low visibility."},{"e":"AF","t":"Electrical Systems","d":2,"q":"The essential bus powers:","o":["Non-critical equipment only","Equipment required for safe flight and landing","Only entertainment systems","Cargo heating"],"c":1,"x":"Essential bus = flight instruments, radios, fuel pumps, fire detection. Powered even if main generator fails \u2014 via battery or emergency generator. Know bus priority hierarchy."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A TRU (Transformer-Rectifier Unit) converts:","o":["DC to AC","AC to DC for systems requiring direct current","Low voltage to high voltage only","Radio signals"],"c":1,"x":"Aircraft generators produce AC. Many systems need DC. TRU converts AC to DC. Combines transformer (voltage change) and rectifier (AC\u2192DC) in one unit."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Electrical bonding on aircraft ensures:","o":["Paint adhesion","All metal parts are at the same electrical potential to prevent static discharge and interference","Structural strength","Corrosion protection only"],"c":1,"x":"Bonding straps/jumpers connect all metal parts electrically. Prevents static buildup, reduces radio interference, ensures fault current has a return path. Critical safety measure."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A nickel-cadmium battery advantage over lead-acid:","o":["Lower cost","Higher discharge rate, longer life, and better performance in extreme cold","Lighter weight always","No maintenance needed"],"c":1,"x":"NiCd: high discharge capability (good for engine starting), works well in cold, long cycle life. But: thermal runaway risk, requires dedicated charging, more expensive. Most turbine aircraft use NiCd."},{"e":"AF","t":"Fire Protection","d":2,"q":"Class A fires involve:","o":["Flammable liquids","Ordinary combustibles (wood, paper, fabric)","Electrical equipment","Combustible metals"],"c":1,"x":"A = Ordinary combustibles. B = Flammable liquids. C = Electrical. D = Metals. Use the correct extinguisher type \u2014 wrong agent can make the fire worse."},{"e":"AF","t":"Fire Protection","d":2,"q":"Class B fires involve:","o":["Ordinary combustibles","Flammable liquids (fuel, oil, grease)","Electrical equipment","Combustible metals"],"c":1,"x":"Aviation fuel, hydraulic fluid, oil fires are Class B. Use CO2, dry chemical, or Halon. NEVER use water on a fuel fire \u2014 it spreads the burning liquid."},{"e":"AF","t":"Fire Protection","d":2,"q":"Smoke detectors in cargo compartments detect:","o":["Heat only","Visible or invisible smoke particles in the air","Flame wavelength","Carbon monoxide only"],"c":1,"x":"Smoke detectors (photoelectric or ionization type) provide early warning of fire in areas not directly visible. Required in cargo compartments of transport aircraft."},{"e":"AF","t":"Fire Protection","d":3,"q":"A fire zone is defined as:","o":["The cockpit area","Any area of the aircraft where a fire could reasonably be expected to occur requiring fire protection","The cabin only","External surfaces"],"c":1,"x":"Engine nacelles, APU compartments, wheel wells (on some aircraft), and combustion heater areas are designated fire zones. Each requires detection and/or suppression systems."},{"e":"AF","t":"Fire Protection","d":2,"q":"Halon fire extinguishing agent works by:","o":["Cooling the fire","Chemically interrupting the combustion chain reaction","Smothering with foam","Diluting fuel"],"c":1,"x":"Halon breaks the chemical chain reaction of combustion. Very effective, leaves no residue. Being phased out (ozone depleting) and replaced by HFC agents."},{"e":"AF","t":"Fire Protection","d":3,"q":"Thermal switch fire detectors activate at:","o":["A specific rate of temperature rise","A preset temperature","Both rate-of-rise and preset temperature, depending on type","Smoke density"],"c":2,"x":"Spot detectors: rate-of-rise type triggers on rapid temp increase, fixed-temp type triggers at a set temperature. Some are combination units using both methods."},{"e":"AF","t":"Fire Protection","d":2,"q":"After a fire extinguisher has been discharged, it must be:","o":["Tested and refilled","Replaced or recharged before the aircraft returns to service","Left empty until next scheduled maintenance","Inspected visually only"],"c":1,"x":"An empty extinguisher provides no protection. Must be recharged (or replaced) and the system checked before the aircraft is released for flight."},{"e":"AF","t":"Fire Protection","d":3,"q":"Engine fire extinguisher containers are pressure-checked against:","o":["A fixed value","A temperature-pressure chart \u2014 acceptable pressure varies with ambient temperature","Only at room temperature","Never \u2014 they're sealed for life"],"c":1,"x":"Agent pressure changes with temperature. The maintenance manual provides a chart showing acceptable pressure range at each temperature. Check during walkaround and maintenance."},{"e":"AF","t":"Fire Protection","d":4,"q":"A fire detection loop showing a fault indication with no fire present likely has:","o":["An actual fire in an uninspected area","A short circuit, damaged sensing element, or moisture in the connector","Nothing wrong \u2014 reset and ignore","Low hydraulic pressure"],"c":1,"x":"False fire warnings are taken very seriously. Causes: chafed sensing element, connector moisture, wire damage. Must be investigated and resolved \u2014 never ignored. An intermittent false warning could mask a real fire."},{"e":"AF","t":"Fixed-Wing Controls","d":1,"q":"Ailerons control movement about the:","o":["Longitudinal axis (roll)","Lateral axis (pitch)","Vertical axis (yaw)","All three axes"],"c":0,"x":"Ailerons on wings = roll (bank). Elevator on tail = pitch (nose up/down). Rudder on fin = yaw (nose left/right). Know the three axes and their controls."},{"e":"AF","t":"Fixed-Wing Controls","d":1,"q":"The elevator controls pitch about the:","o":["Longitudinal axis","Lateral axis","Vertical axis","Thrust axis"],"c":1,"x":"Lateral axis runs wingtip to wingtip. Elevator deflection rotates the aircraft nose up or down around this axis."},{"e":"AF","t":"Fixed-Wing Controls","d":1,"q":"The rudder controls yaw about the:","o":["Longitudinal axis","Lateral axis","Vertical axis","All axes equally"],"c":2,"x":"Vertical axis runs top to bottom through CG. Rudder deflection swings the nose left or right. Used with ailerons for coordinated turns."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Trim tabs reduce:","o":["Aircraft weight","Constant control force the pilot must hold during flight","Airspeed","Structural stress"],"c":1,"x":"Trim tabs are small surfaces on the trailing edge of control surfaces. Deflected to aerodynamically hold the control surface in position, eliminating sustained pilot effort."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Flaps primarily increase:","o":["Speed","Lift at low speeds (and drag) for takeoff and landing","Directional stability","Roll rate"],"c":1,"x":"Flaps change the wing's camber and sometimes area. More lift at lower speeds = slower approach/landing speed. Also increase drag, steepening the approach."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Spoilers on a wing:","o":["Increase lift","Disrupt airflow to reduce lift and increase drag","Provide yaw control","Protect against icing"],"c":1,"x":"Spoilers 'spoil' lift on that wing. Used as: speed brakes (both sides), roll control (one side = asymmetric lift), ground spoilers (dump lift after touchdown for braking effectiveness)."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Control cable tension is affected by:","o":["Only age of the cable","Temperature \u2014 cables expand when hot (lower tension) and contract when cold (higher tension)","Altitude only","Humidity"],"c":1,"x":"Steel cables change length with temperature. Use temperature-corrected tension values from the rigging chart. Check tension at ambient temperature."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"A servo tab differs from a trim tab in that:","o":["They are identical","A servo tab is mechanically linked to the control system and moves the main surface aerodynamically","A servo tab is fixed","A servo tab is only on the rudder"],"c":1,"x":"Servo tab is driven by the control column through a linkage. Tab deflection creates aerodynamic force that moves the main surface. Used on large aircraft where direct control force would be too high."},{"e":"AF","t":"Fuel Systems","d":2,"q":"A fuel boost pump is typically:","o":["Gravity-powered","An electrically driven centrifugal pump in the fuel tank","Driven by the engine only","Manual hand pump only"],"c":1,"x":"Electric boost pumps provide positive fuel pressure to the engine-driven pump. Prevents vapor lock at altitude and provides fuel pressure for engine start, crossfeed, and emergency backup."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Fuel filters protect against:","o":["Water contamination only","Particulate contamination that could damage fuel system components and engine","Fuel evaporation","Incorrect fuel grade"],"c":1,"x":"Filters trap dirt, debris, and microorganisms. Contamination damages fuel metering components, injectors, and combustion section. Filter changes per schedule are critical."},{"e":"AF","t":"Fuel Systems","d":3,"q":"A fuel jettison (dump) system allows:","o":["Refueling in flight","Rapidly reducing aircraft weight to maximum landing weight in an emergency","Transferring fuel between tanks","Defueling on the ground only"],"c":1,"x":"If an emergency requires landing shortly after takeoff, the aircraft may be over max landing weight. Fuel dump reduces weight to protect the landing gear and structure."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Water in aircraft fuel is dangerous because:","o":["It improves combustion","It can freeze and block fuel lines/filters at altitude, and supports microbial growth","It increases fuel efficiency","It has no effect"],"c":1,"x":"Water freezes at altitude blocking filters. Also supports bacteria/fungus growth that creates sludge. Regular sumping (draining low points) removes water."},{"e":"AF","t":"Fuel Systems","d":2,"q":"The purpose of a fuel tank baffle is to:","o":["Seal the tank","Reduce fuel sloshing and provide structural support within the tank","Filter the fuel","Measure fuel quantity"],"c":1,"x":"Baffles reduce fuel movement during maneuvers (which affects CG and fuel pickup). Also add structural rigidity to the tank. Check valves in baffles allow fuel transfer."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Fuel tank sealant (polysulfide) must be:","o":["Compatible with the specific fuel type and applied per manufacturer procedures","Any general-purpose sealant","Silicone-based for all tanks","Applied only by the manufacturer"],"c":0,"x":"Wrong sealant dissolves in fuel or doesn't cure properly. Polysulfide is standard for integral fuel tanks. Follow exact manufacturer procedures for mixing, application, and cure time."},{"e":"AF","t":"Ice & Rain Protection","d":1,"q":"Anti-icing prevents ice from forming. De-icing:","o":["Also prevents formation","Removes ice after it has formed","Only applies to windshields","Is not used on aircraft"],"c":1,"x":"Anti-ice = continuous prevention (heated surfaces). De-ice = cyclic removal (boots, chemicals). Know the distinction \u2014 TC tests this terminology."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Pitot heat prevents:","o":["Pitot tube corrosion","Ice blocking the pitot tube which would affect airspeed indication","Fuel icing","Windshield fogging"],"c":1,"x":"Ice blocking the pitot tube = erroneous airspeed readings. Pitot heat is an electric heating element. Usually turned ON before entering icing conditions. Some aircraft have it on continuously."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Structural icing on an aircraft is dangerous because it:","o":["Only affects appearance","Adds weight, changes airfoil shape, and increases drag while reducing lift","Improves aerodynamics","Only affects propellers"],"c":1,"x":"Ice changes the wing shape = reduced lift + increased drag + added weight. Even a thin layer of rough ice significantly degrades performance. Can make the aircraft unflyable."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"The TKS (weeping wing) anti-ice system works by:","o":["Heating the leading edge","Pumping glycol-based fluid through porous panels on the leading edge","Inflating rubber boots","Vibrating the surface"],"c":1,"x":"TKS fluid weeps through a laser-drilled titanium panel on the leading edge, coating the surface and preventing ice adhesion. Fluid quantity is limited \u2014 manage usage."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Carburetor heat should be applied:","o":["Only when ice is visible","When conditions favor carb icing (humid air, 10\u00b0C to 25\u00b0C OAT)","Only on the ground","Continuously during all flight"],"c":1,"x":"Carb ice can form even on warm days. Apply heat when conditions favor icing or at first sign of RPM drop. Full hot \u2014 partial heat can make icing worse."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Rain repellent on windshields works by:","o":["Heating the rain away","Applying a chemical that causes water to bead and blow off","Wipers only","Compressed air blast"],"c":1,"x":"Chemical rain repellent creates a hydrophobic surface. Water beads and blows off at speed. Used in conjunction with wipers. Don't use on dry windshield \u2014 damages surface."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Engine inlet anti-ice on a turbine engine prevents:","o":["Compressor stall only","Ice forming on the inlet lip and guide vanes which could break off and cause FOD/compressor damage","Fuel icing","Oil icing"],"c":1,"x":"Ice on the inlet breaks off in chunks \u2192 FOD into the compressor. Also restricts airflow. Engine anti-ice uses hot bleed air routed through the inlet lip and guide vanes."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Windshield anti-ice on transport aircraft typically uses:","o":["Chemical spray only","Electrically heated elements embedded in the windshield layers","Hot bleed air","Manual wipers only"],"c":1,"x":"Electric heating: wire grid or transparent conductive film between windshield layers. Maintains visibility and keeps outer layer flexible for bird strike resistance."},{"e":"AF","t":"Ice & Rain Protection","d":4,"q":"Activating pneumatic de-ice boots too early (with only a thin layer of ice) risks:","o":["Nothing \u2014 earlier is always better","Ice bridging: ice forms a shell over the inflated boot shape that the boots can't remove","Boot overheating","Loss of cabin pressure"],"c":1,"x":"If boots inflate with only a thin skim of ice, the ice flexes with the boot and reforms around the inflated shape. Subsequent boot cycles can't crack this 'bridge.' Wait for adequate ice buildup before first activation."},{"e":"AF","t":"Instruments","d":2,"q":"The attitude indicator (artificial horizon) operates on the principle of:","o":["Magnetism","Gyroscopic rigidity in space","Barometric pressure","Pitot-static pressure"],"c":1,"x":"A spinning gyroscope maintains its orientation in space (rigidity). The aircraft moves around the gyro, showing the aircraft's attitude relative to the horizon."},{"e":"AF","t":"Instruments","d":2,"q":"The turn coordinator indicates:","o":["Airspeed","Rate and direction of turn and coordination (slip/skid)","Altitude","Heading"],"c":1,"x":"Uses a gyro canted 30\u00b0 to sense both roll rate and yaw rate. The ball (inclinometer) shows coordination. Centered ball = coordinated turn."},{"e":"AF","t":"Instruments","d":2,"q":"The heading indicator (directional gyro) must be periodically set to the magnetic compass because:","o":["It runs on battery power","Gyroscopic precession causes it to drift over time","It only works in straight flight","The compass is more accurate in turns"],"c":1,"x":"Precession causes the DG to slowly drift from the correct heading. Re-align with the magnetic compass every 15 minutes or as required. Usually vacuum or electrically driven."},{"e":"AF","t":"Instruments","d":3,"q":"The VSI (Vertical Speed Indicator) works by measuring:","o":["Airspeed changes","The rate of change of static pressure through a calibrated leak","Pitot pressure","Gyroscope precession"],"c":1,"x":"Static pressure feeds both a diaphragm and the case (through a restricted opening). During altitude changes, pressure in the diaphragm changes faster than the case = pointer deflection showing rate."},{"e":"AF","t":"Instruments","d":3,"q":"An altimeter reads HIGHER than actual altitude when flying from high pressure to low pressure because:","o":["The instrument is faulty","The altimeter senses lower pressure and interprets it as higher altitude","Temperature affects the reading","The pilot didn't set the altimeter"],"c":1,"x":"High to low, look out below. Flying into lower pressure without resetting the altimeter = altimeter reads higher than actual. Dangerous in mountainous terrain."},{"e":"AF","t":"Instruments","d":2,"q":"Engine instruments typically include:","o":["Altimeter and airspeed","Tachometer, oil pressure, oil temperature, EGT/CHT, fuel flow, manifold pressure","Attitude indicator only","Compass and turn coordinator"],"c":1,"x":"Engine instruments monitor powerplant health: RPM (tach), oil pressure/temp, cylinder or exhaust gas temperature, fuel flow/quantity, manifold pressure (recip). All critical for safe operation."},{"e":"AF","t":"Structures","d":2,"q":"Monocoque fuselage construction relies on:","o":["Internal framework for all loads","The outer skin carrying all structural loads","Longerons and stringers only","Truss framework"],"c":1,"x":"Pure monocoque: skin carries all loads (like an eggshell). No internal framework. Very weight-efficient but difficult to maintain if damaged. Rare in modern aircraft \u2014 semi-monocoque is standard."},{"e":"AF","t":"Structures","d":3,"q":"A doubler plate is used in sheet metal repair to:","o":["Replace the damaged skin entirely","Reinforce the repair area by distributing loads around the damage","Add weight for balance","Improve appearance only"],"c":1,"x":"Doubler goes over the damaged area (after cleanup) and is riveted to the surrounding structure. Restores load-carrying capability. Size and rivet pattern per approved data (SRM)."},{"e":"AF","t":"Structures","d":2,"q":"Rivet spacing (pitch) should be at least:","o":["1\u00d7 rivet diameter","2\u00d7 rivet diameter","3\u00d7 rivet diameter center to center","6\u00d7 rivet diameter"],"c":2,"x":"Minimum pitch = 3D center to center. Edge distance = 2D minimum from center to sheet edge. Closer spacing = risk of cracking between holes. These numbers are tested on every exam."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"The wastegate on a turbocharged engine controls:","o":["Fuel flow","Amount of exhaust gas routed to the turbocharger turbine","Intake air temperature","Oil pressure"],"c":1,"x":"Wastegate diverts exhaust away from the turbo. Open = less boost. Closed = all exhaust through turbo = max boost. Controlled by the differential pressure controller or manually."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"Primer systems inject fuel directly into:","o":["The carburetor float chamber","The intake manifold or cylinders for cold engine starting","The exhaust system","The oil system"],"c":1,"x":"Primer bypasses the carburetor, delivering fuel directly where needed for combustion during cold starts when the carburetor can't vaporize fuel effectively."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Spark plug fouling from lead deposits is reduced by:","o":["Leaning the mixture during ground operations","Using 100LL instead of 100","Flying at max power always","Operating magnetos independently"],"c":0,"x":"Lead from TEL in avgas deposits on plugs during ground ops and low power. Leaning on the ground reduces unburned fuel and lead deposits. 100LL has less lead than 100."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Increasing bearing clearance from normal wear causes oil pressure to:","o":["Increase","Decrease as oil flows more easily through larger clearances","Stay the same","Fluctuate randomly"],"c":1,"x":"[FAA AMP Q38] Larger clearances = less restriction = oil flows through faster = pressure drops. The relief valve compensates partially, but excess clearance overwhelms it."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"The proper grade of oil for an engine is determined by:","o":["Aircraft age","Operating speeds of bearings and expected temperature range","Fuel type","Pilot preference"],"c":1,"x":"[FAA AMP Q35] Oil grade matches bearing speeds and ambient temperature range. Multi-grade oils (like 15W-50) cover a wider temperature range than single-grade."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Specific gravity compares a substance's weight to:","o":["Oil at specific temperature","Distilled water at specific temperature","Mercury at specific temperature","Air at sea level"],"c":1,"x":"[FAA AMP Q36] SG referenced to distilled water at 4\u00b0C (max density). Used for fuel identification, oil analysis, and hydraulic fluid checks."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"What is used to polish commutators or slip rings?","o":["Double-0 (00) sandpaper","Stiff bristle brushes","Emery cloth","Steel wool"],"c":0,"x":"[FAA AMP Q28] Only 00 sandpaper. NEVER emery cloth \u2014 it's conductive and embeds particles causing shorts. This is a classic trick question on both FAA and TC exams."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"When installing electrical wiring parallel to a fuel line, the wiring should be:","o":["Below the fuel line","Beside the fuel line","Above the fuel line","It doesn't matter"],"c":2,"x":"[FAA AMP Q29] Wiring ABOVE fuel lines. If the wire chafes and sparks, fuel doesn't drip onto the arc. If the fuel line leaks, fuel doesn't drip onto wiring. Gravity separation."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Starter brushes should be replaced when worn to:","o":["One-half original length","Three-quarters original length","One-quarter original length","Any visible wear"],"c":0,"x":"[FAA AMP Q33] Replace at half. Too short = poor contact = arcing = damaged commutator. Inspect brush springs too \u2014 weak springs cause the same problems."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Three types of turbine blades are:","o":["Impulse, converging, and impulse-converging","Impulse, reaction, and impulse-reaction","Impulse, diverging, and impulse-diverging","Axial, centrifugal, and mixed"],"c":1,"x":"[FAA AMP Q9] Impulse: energy from velocity change. Reaction: energy from pressure change. Most modern turbines use impulse-reaction combination blades."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"A turbine hot section is most susceptible to:","o":["Erosion","Cracking from thermal stress","Elongation (creep)","All of these \u2014 but cracking is the primary concern"],"c":1,"x":"[FAA AMP Q17] Thermal cycling (heat up/cool down) causes thermal fatigue cracking. Combined with creep and oxidation, cracking is the main life-limiting mode."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"A good indication of a malfunctioning fuel nozzle during exhaust inspection is:","o":["Combustion liner buckling","Hot spots on the tail cone","Carbon buildup in exhaust","Uniform discoloration"],"c":1,"x":"[FAA AMP Q23] Bad nozzle = uneven flame = localized overheating = visible hot spots on the tail cone. This is a maintenance inspection skill TC tests."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"The main fuel strainer is located at the lowest point because:","o":["It's easier to access","Water and contaminants settle by gravity for easy removal","Fuel pressure is highest there","It reduces pump workload"],"c":1,"x":"[FAA AMP Q62] Water is heavier than fuel \u2014 sinks to the bottom. Low-point strainer with drain allows removal during preflight and maintenance checks."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel discharge nozzle flow range is indicated by:","o":["A letter stamped on the hex of the nozzle body","A number stamped on the hex","Code on the engine data plate","Color marking on the nozzle"],"c":0,"x":"[FAA AMP Q19] Nozzles are flow-rated and marked with a letter code. All nozzles on an engine must be within the same flow range for even combustion."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Fuel is supplied to an APU from:","o":["Dedicated APU fuel tank","Aircraft's header tank","Aircraft's main fuel tank","External ground supply only"],"c":2,"x":"[FAA AMP Q86] APU draws from the main tank through its own fuel line. No separate tank needed."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"FOD prevention on the ramp requires:","o":["Nothing special","Keeping the ramp area clean and inspecting engine inlets before start","Only closing the inlet covers","Posting warning signs only"],"c":1,"x":"FOD walks, clean ramp areas, inlet inspections, secure loose articles. FOD damage costs billions annually. Every person on the ramp is responsible."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Engine nacelle cowling panels provide:","o":["Only aerodynamic shape","Aerodynamic fairing, fire containment, access for maintenance, and noise attenuation","Structural load bearing only","Fuel storage"],"c":1,"x":"Multi-function: streamlined shape, fire protection (firewall), access panels for maintenance, acoustic treatment for noise reduction. Latches must be properly secured \u2014 lost panels are dangerous."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Exhaust nozzle area on a turbine engine affects:","o":["Only noise level","Engine thrust and operating temperatures \u2014 smaller nozzle = higher velocity = more thrust but higher EGT","Only fuel consumption","Nothing \u2014 it's fixed"],"c":1,"x":"Nozzle area is critical. Variable nozzles on some military engines. Fixed nozzles on civil engines are carefully sized. Damage to the nozzle (dents, warping) affects engine performance."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Oil seals in a turbine engine (labyrinth or carbon seals) prevent:","o":["Fuel leaks","Oil from leaking out of bearing compartments into the gas path","Air leaks only","Vibration"],"c":1,"x":"Bearing compartments are sealed to keep oil in and hot gas out. Labyrinth seals use air pressure differential. Carbon seals provide contact sealing. Seal failure = oil in the gas path = smoke/fire risk."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Turbine engine oil operating temperature is typically:","o":["Same as recip engines","Higher than recip engines \u2014 designed for extreme heat near bearings","Lower than recip engines","Room temperature"],"c":1,"x":"Turbine oils (synthetic) withstand much higher temperatures than recip mineral oils. Bearing areas near the combustor can exceed 300\u00b0C. Oil also acts as a coolant for these bearings."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Synthetic oil is used in turbine engines because:","o":["It's cheaper","It withstands much higher temperatures than mineral oil without breaking down","It's lighter","It doesn't need changing"],"c":1,"x":"Synthetic oils maintain their properties at extreme temperatures that would destroy mineral oils. Required for turbine engine bearing environments. NOT interchangeable with mineral oil used in recip engines."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"An oil-to-fuel heat exchanger serves the dual purpose of:","o":["Heating oil and cooling fuel","Cooling the oil AND heating the fuel to prevent ice crystal formation","Mixing oil with fuel for combustion","Pressurizing the oil system"],"c":1,"x":"Fuel absorbs heat from the oil, cooling the oil. The warmed fuel is less likely to form ice crystals that block filters at altitude. Elegant dual-purpose design."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"A sudden drop in turbine engine oil pressure with rising oil temperature indicates:","o":["Normal operation at high power","Possible bearing failure, oil leak, or pump failure \u2014 shutdown may be required","A clogged filter only","Low fuel pressure"],"c":1,"x":"Pressure drop + temp rise = oil not circulating properly. Could be bearing seizure, broken oil line, or failed pump. This is an emergency \u2014 may require shutdown to prevent catastrophic failure."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"A title block on a drawing contains:","o":["Only the part name","Part name/number, drawing number, scale, material, tolerances, approval signatures","Just the date","Employee names only"],"c":1,"x":"Title block = critical information: what the drawing shows, who made it, what revision, material specs, tolerances, approvals. Always check the title block first."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"Revision blocks track:","o":["Employee attendance","All changes made to the drawing since original issue","Paint colors","Parts on order"],"c":1,"x":"Every change to a drawing is logged in the revision block with date, description, and authority. Always work from the latest revision. Outdated drawings = wrong parts/dimensions."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"Third-angle projection (standard in North America) places views so:","o":["Top view is below the front view","Top view is above the front view, right side view is to the right","Views are randomly arranged","Only one view is shown"],"c":1,"x":"Third-angle: views are placed as if you're looking AT the object from outside. Top view on top, right view on right. First-angle (European) is opposite. Symbol in title block tells which system."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"AN bolts are identified by a marking on the bolt head \u2014 an 'X' means:","o":["Close tolerance bolt","Standard AN bolt","Drilled head for safety wire","NAS bolt"],"c":0,"x":"X on head = close tolerance (for reamed holes). Dash = standard. Triangle = NAS. Raised or recessed markings. Know the head markings for the exam."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Cotter pins are used with castle nuts to:","o":["Increase clamping force","Prevent the nut from backing off due to vibration","Align the nut precisely","Replace safety wire"],"c":1,"x":"After torquing the castle nut and aligning the slots with the bolt hole, the cotter pin locks the nut in position. Positive locking \u2014 can't vibrate loose."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Turnbuckle safety wire requires:","o":["Single wrap in one direction","A minimum of 4 turns of safety wire on each end","Just one loop through the barrel","No safety wire if locknuts are installed"],"c":1,"x":"4 turns minimum on each terminal. Wire wraps prevent the barrel from turning and loosening. Double wrap method or clip method per the maintenance manual."},{"e":"SPM","t":"General Servicing","d":2,"q":"WHMIS in Canada requires:","o":["Nothing in aviation","Labels and Safety Data Sheets for hazardous materials in the workplace","Only fire extinguishers","Annual medical exams"],"c":1,"x":"Workplace Hazardous Materials Information System. All hazardous products (solvents, sealants, Skydrol) must have proper labels and SDSs available. You deal with these chemicals daily."},{"e":"SPM","t":"General Servicing","d":3,"q":"When servicing aircraft with oxygen, smoking and open flames must be prohibited within:","o":["5 feet","At least 50 feet (or as specified)","The cockpit only","No restriction if system is closed"],"c":1,"x":"Oxygen-enriched environments are extremely flammable. Minimum distance varies by regulation \u2014 typically 50 feet. Oil/grease on O2 fittings can spontaneously ignite."},{"e":"SPM","t":"General Servicing","d":2,"q":"Aircraft should be grounded/bonded during fueling to prevent:","o":["Theft","Static electricity discharge that could ignite fuel vapors","Electrical interference","Corrosion"],"c":1,"x":"Fuel flowing through hoses generates static charge. Without bonding, a spark between nozzle and aircraft could ignite vapors. Ground wire from aircraft to fuel truck to earth ground."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Anodizing of aluminum:","o":["Removes the oxide layer","Creates a controlled, thick oxide layer for corrosion resistance and paint adhesion","Weakens the metal","Only works on steel"],"c":1,"x":"Electrolytic process grows a hard, porous oxide coating. Provides excellent corrosion protection and a good base for primer/paint. Common on aluminum aircraft parts."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Heat treatment of aluminum alloys includes:","o":["Only annealing","Solution heat treating, precipitation hardening (aging), and annealing","Only quenching","Carburizing"],"c":1,"x":"Solution HT: dissolve alloying elements at high temp, quench. Aging: allow precipitates to form (natural or artificial) for strength. Annealing: soften for forming. Different tempers for different needs."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Pitting corrosion appears as:","o":["Uniform surface thinning","Small, localized cavities or holes in the metal surface","Thread-like filaments","White powder everywhere"],"c":1,"x":"Pitting: concentrated attack at specific points. Depth can be much greater than visible surface opening. Dangerous because it concentrates stress and is hard to detect under paint."},{"e":"SPM","t":"NDT","d":2,"q":"Visual inspection is:","o":["Not considered NDT","The most basic and most frequently used NDT method","Only for composites","Unreliable"],"c":1,"x":"Visual inspection (VT) is the first and most common NDT method. Detects surface damage, corrosion, leaks, missing hardware, wear. Use proper lighting, magnification as needed."},{"e":"SPM","t":"NDT","d":3,"q":"MPI can only be used on:","o":["Any material","Ferromagnetic materials (steel, iron, nickel alloys)","Aluminum and titanium","Composites only"],"c":1,"x":"Magnetic particle inspection requires the material to be magnetizable. Aluminum, titanium, stainless steel (austenitic) are NOT ferromagnetic. Use other methods for those."},{"e":"SPM","t":"NDT","d":3,"q":"In eddy current testing, a crack in the material will:","o":["Have no effect","Change the impedance of the test coil, which is displayed on the instrument","Increase material conductivity","Create a magnetic field"],"c":1,"x":"Eddy currents flowing in the material are disrupted by cracks. This changes the coil impedance. The instrument displays this change as a signal. Depth/size analysis requires skill."},{"e":"SPM","t":"NDT","d":4,"q":"Which NDT method can detect subsurface defects in non-ferromagnetic materials?","o":["Magnetic particle inspection","Dye penetrant","Ultrasonic testing or radiography","Visual inspection"],"c":2,"x":"Non-ferromagnetic = no MPI. Penetrant = surface only. For subsurface in aluminum, titanium, composites: ultrasonic or X-ray. This is the classic TC/FAA NDT selection question."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"The minimum number of rivets in a repair is:","o":["1","2","3 \u2014 to prevent rotation of the patch","As many as possible"],"c":2,"x":"Minimum 3 rivets to prevent the patch from rotating around a single point. Actual number determined by strength calculations per SRM."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Dimpling is used on thin sheet metal to:","o":["Increase strength","Create a countersunk hole for flush rivets where the material is too thin for machine countersinking","Reduce weight","Mark the surface"],"c":1,"x":"Machine countersinking rem
