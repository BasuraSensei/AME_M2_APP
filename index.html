"t":"Water Injection","d":3,"q":"Water injection fluid must be demineralized because:","o":["Taste requirements","Minerals deposit on hot compressor and turbine components \u2014 reducing efficiency and potentially causing corrosion","Minerals improve performance","Only for appearance"],"c":1,"x":"Water evaporates in the engine, minerals stay behind. Scale deposits on compressor blades reduce efficiency. Mineral corrosion on hot-section components causes pitting. Demineralized/distilled water only."},{"e":"PP","t":"Water Injection","d":3,"q":"Methanol in the water-methanol mixture serves to:","o":["Increase water pressure","Prevent freezing and provide supplementary fuel energy \u2014 methanol is both an anti-freeze and a combustible fuel","Only improve taste","Only change the color"],"c":1,"x":"Dual purpose: anti-freeze (lowers freezing point well below 0\u00b0C for high-altitude tank storage) and fuel (methanol burns, contributing some energy). Mixture ratio specified by engine manufacturer."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection tank location is usually:","o":["In the wing","In the fuselage, centrally located to minimize CG shift as water is consumed during use","On the tail","External pod always"],"c":1,"x":"Central fuselage: CG change is minimized as 200-500 lbs of water is consumed during a 2-5 minute takeoff roll. Eccentric tank location = significant CG shift during use."},{"e":"PP","t":"Water Injection","d":4,"q":"If water injection is computed as required for takeoff and the system fails during the takeoff roll:","o":["Continue takeoff normally","Thrust will decrease to dry-rated level \u2014 the crew must assess if remaining runway and climb performance are adequate without augmented thrust","Switch to emergency power","Water isn't needed if the engine is running"],"c":1,"x":"Performance was calculated WITH water injection. Without it: lower thrust, longer takeoff roll, reduced climb gradient. If past V1: must continue. Before V1: may need to reject. Critical decision point."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection is primarily used during:","o":["Cruise for fuel savings","Takeoff only \u2014 when maximum thrust is required for a short duration and water supply is limited","Descent for cooling","Landing for reverse thrust"],"c":1,"x":"Limited water supply = limited duration. Takeoff is the most thrust-demanding phase. Water gives 5-10% extra thrust for the 2-5 minutes needed. After takeoff, climb power is usually within dry capability."},{"e":"PP","t":"Water Injection","d":3,"q":"Modern high-bypass turbofans have mostly eliminated water injection because:","o":["Water is banned","Advanced materials, flat-rated thrust, and FADEC optimization provide adequate performance margins without augmentation","Water injection never worked","It's too expensive"],"c":1,"x":"Modern engines: sufficient thrust margin for hot/high conditions without water. Better turbine materials withstand higher temperatures. FADEC optimizes every parameter. Water injection systems add weight and maintenance complexity with little benefit."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection nozzle maintenance includes:","o":["Nothing between overhauls","Inspection for blockage, flow checking to verify calibrated output, and cleaning if necessary \u2014 blocked nozzles reduce system effectiveness","Only visual check","Replacement every 100 hours"],"c":1,"x":"Nozzles can clog from mineral deposits (if water quality was poor), corrosion, or debris. Blocked nozzles = reduced/uneven water flow = reduced thrust augmentation. Flow test during scheduled maintenance."},{"e":"PP","t":"Water Injection","d":3,"q":"The water injection pump is typically:","o":["Gravity-fed only","An electrically driven pump or engine-accessory-driven pump that delivers water at the required pressure and flow rate to the injection nozzles","Hand-operated","Pneumatic"],"c":1,"x":"Electric pump: independent of engine speed, activated by arming switch. Some systems use engine-driven pumps from the accessory gearbox. Pump must deliver precise flow rate for correct thrust augmentation."},{"e":"PP","t":"Water Injection","d":4,"q":"Compressor wash vs water injection: the key difference:","o":["Same procedure","Wash = cleaning at low RPM on the ground using detergent solution; Injection = power augmentation at full RPM during takeoff using pure demineralized water","Wash is for thrust augmentation","Injection is for cleaning"],"c":1,"x":"Completely different purposes and procedures. Wash: cleaning (motoring RPM, detergent + water, rinse, dry). Injection: thrust boost (takeoff power, demineralized water, methanol mix). Never confuse the two."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection system functional test verifies:","o":["Only tank level","Pump operation, flow rate, valve timing, cockpit indications, and FADEC integration \u2014 complete end-to-end system check","Only the pump","Only the switch"],"c":1,"x":"Ground test: activate system, verify pump pressure, flow through nozzles (measured or indicated), correct FADEC response (thrust target adjusts for wet operation), and all cockpit indications function correctly."},{"e":"PP","t":"Water Injection","d":3,"q":"Anti-icing of the water injection system is provided by:","o":["External heaters","The methanol in the water-methanol mixture lowers the freezing point \u2014 typically to -40\u00b0C or lower depending on the mixture ratio","Heated tank only","The fuel system"],"c":1,"x":"Methanol = anti-freeze. At -40\u00b0C: a 50/50 water-methanol mix won't freeze. The mixture ratio must be correct per the engine manual. Pure water would freeze in the tank and lines during cold weather operations."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection quantity is measured by:","o":["Volume only","Weight or volume \u2014 flight planning uses weight for performance calculations; servicing uses volume for practical fill operations","Pressure only","Temperature only"],"c":1,"x":"Performance charts use water weight (lbs or kg). Tank gauges may show volume (gallons or liters). Conversion requires knowing the mixture's specific gravity. When topping up, verify both quantity and mixture ratio."},{"e":"PP","t":"Water Injection","d":4,"q":"During engine test with water injection, an unexpectedly LOW EGT could indicate:","o":["Perfect engine health","Excessive water flow \u2014 over-cooling the combustion process, which masks true engine performance and could hide deterioration","A stuck nozzle","Fuel system fault"],"c":1,"x":"Too much water = too much cooling = artificially low EGT. The engine APPEARS to have great margins but may actually be deteriorated underneath the cooling effect. Water flow calibration must be verified before accepting test results."},{"e":"REGS","t":"AME Licensing","d":4,"q":"An AME with an M2 licence but NO current ACA can:","o":["Sign maintenance releases on large aircraft at any AMO","Perform maintenance on M2 aircraft but CANNOT sign a maintenance release \u2014 only an AME with ACA issued by their AMO can sign","Do nothing with their licence","Sign releases on M1 aircraft only"],"c":1,"x":"M2 licence + ACA = can sign. M2 licence WITHOUT ACA = can perform work under supervision but cannot certify it. ACA is granted by the AMO for specific aircraft types."},{"e":"REGS","t":"AME Licensing","d":4,"q":"An M1-rated AME wants to work on a turbine-powered helicopter under 12,500 lbs. Can they sign the release?","o":["Yes \u2014 it's under 12,500 lbs so M1 applies","No \u2014 turbine-powered helicopters require M2 regardless of weight (unless M1 + specific engine/airframe courses are held)","Only with supervision","Only for inspections"],"c":1,"x":"TRAP: Weight isn't the only factor. M1 covers small aircraft AND piston helicopters. Turbine helicopters require M2 OR M1 + approved courses on the specific engine and airframe type. Know the exceptions."},{"e":"REGS","t":"AME Licensing","d":3,"q":"An AME's licence was suspended by TC. During the suspension, the AME:","o":["Can still perform maintenance just not sign","Has NO privileges at all \u2014 cannot perform maintenance, cannot sign releases, cannot supervise apprentices","Can supervise only","Can work on their own aircraft"],"c":1,"x":"Suspension = all licence privileges are withdrawn for the suspension period. The AME is effectively unlicensed. Working during suspension = violation of the Aeronautics Act."},{"e":"REGS","t":"AME Licensing","d":3,"q":"Recency requirements: '6 months in the preceding 24 months' means:","o":["6 continuous months recently","A total of 6 months (not necessarily continuous) of maintenance experience within the last 24 months","6 months in the last 6 months","Only the most recent 6 months"],"c":1,"x":"Cumulative, not necessarily consecutive. Can be at different employers. Must be relevant maintenance experience (not just employed at an aviation company). Document it \u2014 if challenged, you need proof."},{"e":"REGS","t":"AME Licensing","d":4,"q":"An apprentice's logbook task entry signed by an AME certifies that:","o":["The task was merely completed","The apprentice demonstrated COMPETENCY to perform that task \u2014 the AME's signature is a professional attestation of the apprentice's ability","The AME did the work themselves","The task wasn't actually performed"],"c":1,"x":"CRITICAL DISTINCTION: The AME signature in an apprentice logbook is NOT just a timestamp. It certifies the apprentice CAN DO that task to standard. Signing fraudulently = professional misconduct."},{"e":"REGS","t":"AME Licensing","d":3,"q":"The difference between M1 and M2 scope:","o":["Only aircraft size","M1: aircraft \u22645,700 kg MTOW + piston helicopters. M2: aircraft >5,700 kg OR turbine helicopters OR aircraft with 10+ pax seats. M2 requires working within an AMO.","Only engine type","Only helicopter vs fixed-wing"],"c":1,"x":"M1 is broader than most people think (covers many aircraft types). M2 specifically covers: heavy aircraft, turbine rotary, and aircraft with 10+ pax seats regardless of weight. The 10-pax rule catches many people."},{"e":"REGS","t":"AME Licensing","d":3,"q":"An AME who has not maintained recency can regain it by:","o":["Just submitting a form","Working under the direct supervision of a current AME for sufficient time to demonstrate competency \u2014 then documenting it","Taking a written exam only","Paying a fee"],"c":1,"x":"Lapsed recency \u2260 lapsed licence. The licence is still valid. But the AME must rebuild competency through supervised work before exercising signing privileges again. Document the supervised work period."},{"e":"REGS","t":"AME Licensing","d":4,"q":"An AME discovers they made an error on a maintenance release they signed yesterday. The correct action:","o":["Ignore it \u2014 the aircraft is flying fine","Immediately contact the operator to ground the aircraft, correct the error, and amend the technical records \u2014 an incorrect release is an airworthiness issue","Wait until the next scheduled maintenance","Only mention it if asked"],"c":1,"x":"Your signature = your certification of airworthiness. If you discover it was incorrect, you have a DUTY to act immediately. The aircraft may be unairworthy. Contact the operator, ground the aircraft if necessary, fix the records."},{"e":"REGS","t":"AME Licensing","d":3,"q":"TC examination validity: after passing all 4 exams, you have how long to apply for the licence?","o":["Unlimited time","12 months \u2014 exam results expire if licence application is not submitted within this window","24 months","6 months"],"c":1,"x":"Pass all 4 exams + have all experience \u2192 apply within 12 months or the exam results expire and you must rewrite. Don't procrastinate on the application after passing."},{"e":"REGS","t":"AME Licensing","d":3,"q":"The AME written exam passing grade for EACH exam is:","o":["50%","60%","70%","80%"],"c":2,"x":"70% on EACH of the four exams (SPM, AF, PP, REGS). Fail one = 30-day wait before rewrite. Fail twice = 6 months. Fail three times = may require additional training before another attempt."},{"e":"REGS","t":"AME Licensing","d":4,"q":"An AME working at an AMO signs a maintenance release using their personal AME licence. Is this correct?","o":["Yes \u2014 any AME can sign","It depends: at an AMO, the AME must have ACA (Aircraft Certification Authority) granted by that AMO \u2014 signing without ACA is a violation even if the AME holds a valid licence","Only if the PRM approves","Never \u2014 AMOs don't use AME signatures"],"c":1,"x":"Inside an AMO: the AMO's certification system applies. The AME must have ACA for that aircraft type from that specific AMO. Personal licence alone is insufficient within the AMO framework. Outside an AMO (M1 aircraft): personal licence suffices."},{"e":"REGS","t":"AME Licensing","d":3,"q":"S-rating AMEs may perform work on:","o":["Any aircraft system","Only structural work \u2014 specifically structures, surfaces, coverings, and associated components as authorized","Only engines","Any mechanical system"],"c":1,"x":"S = Structures only. E = Avionics/electronics only. M = mechanical/general. Each rating has a defined scope. Working outside your rating scope = unauthorized maintenance."},{"e":"REGS","t":"AME Licensing","d":3,"q":"An AME licence includes which personal obligation?","o":["Only to follow employer rules","To maintain competency, stay current with regulatory changes, and refuse to certify work beyond their competence \u2014 professional self-regulation","Only to pay fees","Only to attend courses"],"c":1,"x":"Professional responsibility: YOU decide if you're competent to sign. No employer can force you to sign something you're not competent or comfortable with. Refusing to sign is your right and sometimes your duty."},{"e":"REGS","t":"AME Licensing","d":4,"q":"Experience credits toward an AME licence from approved training programs:","o":["Replace all experience requirements","Reduce the 48-month requirement by the credited amount (e.g., 18 months for BCIT) \u2014 but the remaining experience must still be completed","Eliminate the need for exams","Provide the full 48 months"],"c":1,"x":"BCIT/SAIT/CCAA training = experience credit (up to 18 months). Remaining 30+ months must be actual workplace maintenance experience. Plus Appendix B tasks completed. Training credit reduces time but doesn't replace hands-on experience."},{"e":"REGS","t":"AME Licensing","d":3,"q":"Appendix B of CAR 566 lists:","o":["Study topics","Specific maintenance tasks that must be completed and certified by a supervising AME during the apprenticeship period \u2014 proving practical competency","Only exam dates","Only fee schedules"],"c":1,"x":"Appendix B: mandatory task list. Each task signed off by a supervising AME = proof you've performed that task competently. 70% must be completed. The logbook is your evidence. Incomplete Appendix B = cannot apply for licence."},{"e":"REGS","t":"Airworthiness","d":4,"q":"The difference between a C of A and a Special C of A:","o":["Only the fee","Standard C of A: aircraft meets ALL normal airworthiness standards. Special C of A: aircraft meets SPECIFIC limited standards for restricted purposes (experimental, restricted, provisional) with operating limitations","Special is better","Standard has more limitations"],"c":1,"x":"Standard: full type-certificated aircraft, unrestricted operation (within the type certificate). Special: limited operations specified in the certificate. You CANNOT use a Special C of A aircraft for commercial passenger operations."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A flight permit allows flight of an aircraft that:","o":["Has a normal C of A","Does NOT have a valid C of A or is not in a condition for normal flight \u2014 for specific purposes like ferry, test, or maintenance","Is fully airworthy","Is being exported"],"c":1,"x":"Flight permits: ferry (fly to another location for maintenance), specific purpose (test flight after major repair), or demonstration. Limited conditions: specific route, time, crew qualifications, and limitations."},{"e":"REGS","t":"Airworthiness","d":4,"q":"AD compliance is found to be overdue during a maintenance inspection. Can the AME release the aircraft?","o":["Yes \u2014 AD compliance is the pilot's responsibility","NO \u2014 the aircraft is unairworthy due to AD non-compliance and CANNOT be released until the AD is complied with","Only with a conditional release","Only with TC special permission"],"c":1,"x":"An overdue AD = the aircraft does not conform to its type design = C of A is effectively invalid = unairworthy. The AME MUST NOT release it. Comply with the AD first, then release. Report the lapse per company procedures."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A Service Bulletin (SB) differs from an AD in that:","o":["SBs are mandatory, ADs are optional","SBs are RECOMMENDATIONS from the manufacturer; ADs are MANDATORY from the regulatory authority \u2014 TC can mandate an SB by issuing an AD","They're identical","SBs override ADs"],"c":1,"x":"KEY DISTINCTION: SBs = manufacturer's advice (mandatory, recommended, or optional categories). ADs = regulatory mandate (always mandatory). TC often issues an AD that references an SB as the compliance method."},{"e":"REGS","t":"Airworthiness","d":3,"q":"Continuing airworthiness responsibility for a Canadian-registered aircraft lies with:","o":["Transport Canada","The registered owner or operator \u2014 they must ensure maintenance is performed per approved schedule and standards","The manufacturer","The last AME who worked on it"],"c":1,"x":"The OWNER is ultimately responsible for airworthiness. They can delegate maintenance to AMOs and AMEs, but the responsibility stays with them. If the aircraft is unairworthy, the owner is accountable."},{"e":"REGS","t":"Airworthiness","d":4,"q":"An unapproved modification is discovered on an aircraft. The aircraft's airworthiness status is:","o":["Unaffected if it looks OK","The aircraft does NOT conform to its type design and is therefore NOT airworthy \u2014 the modification must be removed OR approved retroactively via STC","Only affects the modified system","Requires only documentation"],"c":1,"x":"Type design conformity is a fundamental airworthiness requirement. Any departure = non-conformity = not airworthy. Two paths: 1) Remove the mod and restore type design. 2) Get the mod approved (STC process). There is no third option."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A PMA part vs a TSO'd part:","o":["They're identical","PMA: approved as a REPLACEMENT for a specific part on a specific aircraft. TSO: approved to a PERFORMANCE STANDARD for an article type \u2014 may be installed on any aircraft that requires that TSO'd article","PMA is always better","TSO is only for instruments"],"c":1,"x":"PMA = replacement approval (specific to an aircraft type). TSO = article standard approval (specific to the article's performance spec). A TSO'd ELT meets the ELT standard and can go on any aircraft requiring that TSO."},{"e":"REGS","t":"Airworthiness","d":3,"q":"MEL rectification interval categories:","o":["Only one category","A = specified time. B = 3 calendar days. C = 10 calendar days. D = 120 calendar days \u2014 each category has a different maximum time to repair the deferred item","All items have 30 days","There are no time limits"],"c":1,"x":"A: stated in the MEL entry (could be hours or flights). B: 3 calendar days. C: 10 calendar days. D: 120 calendar days. If the item isn't fixed within the interval, the aircraft is grounded until it's repaired."},{"e":"REGS","t":"Airworthiness","d":4,"q":"The difference between a major repair and a major modification:","o":["They're the same thing","Major repair RESTORES the aircraft to its ORIGINAL type design. Major modification CHANGES the type design to something different (new configuration, capability, or function)","Modification is always bigger","Repair is always bigger"],"c":1,"x":"Repair = back to original. Modification = something new/different. Both require approved data. Modifications require an STC or engineering approval. Repairs may be covered by the SRM. The distinction affects documentation and approval requirements."},{"e":"REGS","t":"Airworthiness","d":3,"q":"An Export Certificate of Airworthiness is issued when:","o":["Any aircraft is sold","An aircraft is being exported to another country \u2014 confirms the aircraft meets the airworthiness standards of the exporting state","Only for new aircraft","Only within Canada"],"c":1,"x":"Export C of A: the exporting state (Canada) certifies the aircraft meets Canadian standards. The importing state then inspects and issues their own C of A. Bilateral agreements streamline this process."},{"e":"REGS","t":"Airworthiness","d":3,"q":"Airworthiness Limitations (Section 9 of ICA) are:","o":["Optional guidelines","MANDATORY inspections and component life limits that are part of the type certificate \u2014 they CANNOT be changed without TC approval","Manufacturer recommendations only","Only for commercial aircraft"],"c":1,"x":"Section 9 = part of the TC data. Mandatory for ALL operators (private and commercial). Includes: safe-life items, damage-tolerance inspection requirements, and CMRs (Certification Maintenance Requirements)."},{"e":"REGS","t":"Airworthiness","d":4,"q":"An aircraft's maintenance schedule allows extension of a 100-hour inspection to 110 hours for 'operational reasons.' Is this allowed?","o":["Yes \u2014 10% extension is always permitted","It depends on the specific maintenance schedule: some allow limited extensions, others don't \u2014 check the approved schedule's provisions","Never \u2014 schedules are absolute","Only with TC written approval each time"],"c":1,"x":"Some schedules allow 10% extension for operational reasons (but the NEXT interval starts from the ORIGINAL due point, not the extended point). Other schedules have zero tolerance. KNOW YOUR SPECIFIC SCHEDULE's extension provisions."},{"e":"REGS","t":"Airworthiness","d":3,"q":"Bilateral Airworthiness Agreements between Canada and other countries allow:","o":["Free movement of aircraft","Mutual acceptance of each other's airworthiness certificates, maintenance approvals, and parts documentation \u2014 simplifying international aviation","Only pilot licence exchange","Only traffic rights"],"c":1,"x":"Canada-US, Canada-EU bilateral agreements: accept each other's TC certificates, maintenance releases, and parts documentation. Reduces duplicate inspections and approvals. Makes international maintenance and trade practical."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A TCDS (Type Certificate Data Sheet) contains:","o":["Marketing information","Official specifications: performance limits, weight limits, approved configurations, required equipment, and conditions for the C of A","Only paint schemes","Only price information"],"c":1,"x":"TCDS = the aircraft's birth certificate specifications. Engine types approved, operating limits, fuel types, required placards, equipment list, and any limitations. An AME must reference the TCDS when verifying aircraft conformity."},{"e":"REGS","t":"Airworthiness","d":4,"q":"An owner requests you defer a known defect using the MEL for an item that has NO MEL entry. Can you?","o":["Yes \u2014 all items can be deferred","NO \u2014 if the item is not in the MEL, it cannot be deferred and MUST be repaired before flight. The MEL only covers specifically listed items","Defer it for 3 days","Defer it with a logbook entry only"],"c":1,"x":"MEL is a SPECIFIC list. If the failed component isn't listed in the MEL = no deferral allowed = must be repaired before dispatch. Many items have no MEL relief because they're considered essential for safe flight."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"CARs Part VII applies to:","o":["Private operators","Commercial air services \u2014 airlines, charter operators, and aerial work operations","Only military","Only manufacturing"],"c":1,"x":"Part VII: commercial operations have more stringent maintenance requirements than Part V (private). Mandatory TBOs, approved maintenance schedules, and MEL requirements. The distinction between Part V and VII is heavily tested."},{"e":"REGS","t":"CARs & Registration","d":4,"q":"The difference between CAR Standard 571 and CAR Standard 573:","o":["They're the same standard","571: Maintenance standards for aircraft (what must be done). 573: AMO requirements (who can do it and under what conditions)","571 is for pilots, 573 for mechanics","571 is newer"],"c":1,"x":"571 = HOW maintenance must be performed (standards, procedures, approved data). 573 = the framework for AMOs (certification, MPM, QA requirements). An AME must know both. Tested extensively on the REGS exam."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"Canadian Aviation Regulations are authorized under:","o":["Provincial legislation","The federal Aeronautics Act \u2014 CARs are subordinate legislation with the force of federal law","International agreements only","Municipal bylaws"],"c":1,"x":"The Aeronautics Act: federal legislation that gives TC authority to make regulations (CARs). CARs have the force of law. Standards (referenced by CARs) provide detailed requirements. Know the hierarchy: Act \u2192 Regulations \u2192 Standards."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"An aircraft registered in Canada must display:","o":["Only a registration number","The nationality mark 'C-' followed by the registration letters, displayed per CARs specifications (size, location, font)","Only the owner's name","Only a tail number"],"c":1,"x":"'C-' = Canada. Letters following identify the specific aircraft. Marks on wings and fuselage (or fin). Specific minimum sizes based on aircraft type. Marks must be legible and maintained."},{"e":"REGS","t":"CARs & Registration","d":4,"q":"The AWM Standard 566 specifically covers:","o":["Pilot licensing","AME licensing standards \u2014 examination requirements, experience credits, ratings, recency, and all conditions for licence issuance","Airport operations","Air traffic control"],"c":1,"x":"STD 566 = your licensing bible. Defines: exam subjects, passing grades, experience requirements, Appendix B tasks, recency requirements, renewal procedures, and foreign licence conversion. Study this standard thoroughly."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"An operator's MCM (Maintenance Control Manual) is:","o":["Optional for small operators","A TC-approved document describing how the operator manages their maintenance program \u2014 required for commercial operators under Part VII","Only for AMOs","The same as the AMM"],"c":1,"x":"MCM: describes the operator's maintenance control system. Who does what, how tasks are tracked, how records are kept, how ADs are managed. Different from the AMO's MPM (Maintenance Policy Manual)."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"ATA chapter numbering (ATA 100/iSpec 2200) standardizes:","o":["Paint colors","Technical documentation \u2014 every aircraft system is assigned a chapter number (e.g., ATA 32 = Landing Gear, ATA 72 = Engine) across ALL manufacturers","Only Airbus aircraft","Only Boeing aircraft"],"c":1,"x":"Universal system: ATA 21 = Air Conditioning, ATA 24 = Electrical, ATA 29 = Hydraulic, ATA 32 = Landing Gear, ATA 72 = Engine. The same chapter number means the same system on ANY aircraft. Essential for cross-referencing."},{"e":"REGS","t":"CARs & Registration","d":4,"q":"CAR 571.02 requires maintenance to be performed using:","o":["Any convenient method","Methods, techniques, and practices described in the manufacturer's instructions OR equivalent approved data \u2014 'approved data' is mandatory","The AME's best judgment alone","YouTube tutorials"],"c":1,"x":"Approved data: manufacturer's AMM, SRM, SBs, ADs, or equivalent data approved by TC. 'I've always done it this way' is NOT approved data. Every maintenance action must reference approved data. Document the reference."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"Transport Canada's role in aviation maintenance is:","o":["Performing all maintenance","Regulating, certifying, surveilling, and enforcing \u2014 TC sets the rules, approves organizations, inspects compliance, and takes action against violations","Only issuing licences","Only investigating accidents"],"c":1,"x":"TC: writes CARs, certifies AMOs, issues AME licences, audits compliance, enforces through monetary penalties and licence actions. TSB (Transportation Safety Board) investigates accidents. Different organizations, different roles."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"A Canadian aircraft operated internationally must comply with:","o":["Only Canadian CARs","Canadian CARs AND the regulations of the state being overflown/operated in \u2014 plus ICAO standards for international flights","Only ICAO standards","Only the other country's rules"],"c":1,"x":"Dual compliance: Canadian registration = CARs always apply. Plus: local rules in each country you operate in (e.g., EASA requirements in Europe). ICAO provides the international framework. Know the layers."},{"e":"REGS","t":"CARs & Registration","d":4,"q":"The difference between the PRM (Person Responsible for Maintenance) and the chief AME at an AMO:","o":["Same person always","PRM is the individual named by the operator who is accountable for the maintenance control system. Chief AME/quality manager is part of the AMO's structure. They may be different people.","PRM works for TC","Chief AME works for TC"],"c":1,"x":"PRM = operator's side (ensures maintenance is planned and completed). AMO = maintenance provider's side (performs the work to standard). The PRM monitors the AMO's work quality. They're on different sides of the relationship."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"An amendment to the CARs:","o":["Happens automatically","Goes through a formal regulatory process \u2014 Canada Gazette notice, comment period, TC review, and publication \u2014 providing industry input opportunity","Happens only when the Minister decides","Only Parliament can change CARs"],"c":1,"x":"Regulatory amendment process: TC proposes \u2192 Canada Gazette Part I (draft for comment) \u2192 industry review period \u2192 TC considers comments \u2192 Canada Gazette Part II (final). Process ensures industry input before rules change."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"NOTAM stands for:","o":["Nothing related to maintenance","Notice to Airmen/Air Missions \u2014 official notices about changes to aviation facilities, services, hazards, or procedures that aren't in permanent publications","New Operation Technical Advisory Manual","Notice to AMEs"],"c":1,"x":"NOTAMs can affect maintenance: runway closures (can't test taxi), TFRs (flight test limitations), or airspace changes. Maintenance personnel should check NOTAMs when planning test flights or ferry flights."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"An aircraft's journey log must contain:","o":["Only flight times","Flight times, crew names, defects reported, maintenance actions taken, and release certifications \u2014 a complete operational and maintenance record","Only fuel records","Only pilot comments"],"c":1,"x":"Journey log = the aircraft's daily diary. Every flight, every defect, every maintenance action, every release. Legal document. Must be maintained per CARs. AMEs sign maintenance entries. Pilots sign flight entries."},{"e":"REGS","t":"CARs & Registration","d":4,"q":"CARs Part IV (Personnel Licensing) vs Part III:","o":["Part III = pilots, Part IV = mechanics","Part III = Personnel Licensing (AME licences, pilot licences). Part IV = Personnel Standards (standards referenced by Part III). Know: your AME licence is issued under Part III, per standards in STD 566.","They're identical","Part IV replaced Part III"],"c":1,"x":"TRAP: Part III sets the regulatory requirements. Part IV... actually doesn't exist in the current CARs structure in the way many people think. The standards under Part III define the details. Know the actual CARs structure."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"A dual inspection is required when work disturbs:","o":["Any component","Engine controls or flight controls \u2014 a second qualified person must independently verify the work before the aircraft is released","Only the landing gear","Only the fuel system"],"c":1,"x":"DUAL/INDEPENDENT INSPECTION: after disturbing engine or flight controls, a second person (AME or authorized person) independently verifies the work. Not just a second pair of eyes watching \u2014 they must inspect independently."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"The difference between a maintenance release and a conformity statement:","o":["Same thing","Maintenance release: certifies the work was done and the aircraft is fit for service. Conformity statement: certifies a PART meets its design specifications (used for parts/components, not whole aircraft)","Release is for parts","Conformity is for aircraft"],"c":1,"x":"Release = aircraft level (the whole aircraft is airworthy). Conformity = part level (the individual part meets its specifications). Form One (24-0078) is a conformity/serviceability statement for a part."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An AME finds a crack during a routine inspection that is NOT specifically called out in the inspection procedure. Should they:","o":["Ignore it \u2014 not part of the inspection","Report and address it \u2014 an AME has a general obligation to identify and report any condition that could affect airworthiness, regardless of whether it's a specific inspection item","Only note it for next time","Tell the pilot verbally"],"c":1,"x":"The AME's obligation extends BEYOND the specific checklist items. If you see an unsafe condition during ANY work, you must address it. This is a fundamental professional obligation, not limited to the task at hand."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Approved data for repairs comes from (in order of preference):","o":["Any internet source","1) Manufacturer's SRM/AMM, 2) TC-approved engineering data/DER report, 3) AC43.13 (for small aircraft where specifically referenced as approved)","Any AME's personal experience","Only AC43.13 for all aircraft"],"c":1,"x":"SRM is primary. If the SRM doesn't cover the damage: engineering disposition from manufacturer or DER. AC43.13 is acceptable methods for SOME aircraft types where specifically referenced \u2014 NOT universal approved data for all aircraft."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A conditional release for a test flight specifies:","o":["Nothing \u2014 just fly it","The purpose, conditions, limitations, crew qualifications, and area of the test flight \u2014 and it's valid for that specific flight only","Unlimited test flights","Only the pilot's name"],"c":1,"x":"Conditional release: describes what to test, how to test it, who can fly it, where they can fly, and what limitations apply. Expires after the specified flight(s). If the test reveals problems, the aircraft returns to maintenance."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An STC modifies an aircraft. During subsequent maintenance, the original manufacturer's SRM doesn't cover the modified area. Where does the AME find approved repair data?","o":["The original SRM still applies","The STC holder's data \u2014 the STC includes ICA (Instructions for Continued Airworthiness) covering the modification, including repair and inspection procedures","There is no data available","Use general practices only"],"c":1,"x":"The STC holder must provide ICA per CAR 521.305. This includes inspection procedures, repair data, and parts information for the modification. If ICA is inadequate, contact the STC holder for engineering support."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Elementary work as defined in CARs:","o":["Any simple maintenance","SPECIFIC listed tasks that a pilot or owner can perform WITHOUT an AME licence \u2014 limited to tasks like tire inflation, oil/filter changes (on specific engine types), and minor servicing","Any maintenance under 30 minutes","Any maintenance under $500"],"c":1,"x":"Elementary work: CAR Standard 625 Appendix A lists the EXACT tasks. Only what's on the list. Anything not listed = requires an AME. Doing non-elementary work without a licence = violation."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"When maintenance is contracted to an AMO, the aircraft operator's responsibilities:","o":["End when they hand over the aircraft","Include verifying the AMO is properly certified, the work scope is clear, and receiving/reviewing the maintenance documentation upon completion","Are transferred to the AMO","Are only financial"],"c":1,"x":"The operator CANNOT delegate responsibility \u2014 only the task. They must: verify AMO certification, define the work scope, review the release documentation, and track all work performed. If the AMO makes an error, the operator is still accountable."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"A 'major modification' to a Canadian aircraft requires:","o":["Only a logbook entry","Approved design data (STC or TC-approved engineering), approved implementation procedures, weight and balance update, and amendment to the journey log \u2014 ALL documented","Only the AME's approval","Only the owner's consent"],"c":1,"x":"Major modifications: design approval (STC), manufacturing/installation data, inspection procedures, ICA, W&B update, TCDS conformity assessment, flight test if required, and all documentation in the permanent records. The most documentation-heavy maintenance event."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"An annual inspection found items that are deferred to a later date. These deferred items:","o":["Disappear from the record","Must be tracked, have specific rectification deadlines, and be included in the MEL or maintenance schedule \u2014 they don't vanish","Are permanently acceptable","Only matter if the pilot notices"],"c":1,"x":"Deferred items must be: documented, tracked with a due date, have a specific MEL entry or deferral authority, and be completed on time. Losing track of deferrals = items becoming overdue = aircraft becomes unairworthy."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"Required inspection items (RII) on commercial aircraft:","o":["Are the same as all other maintenance tasks","Are tasks with such safety significance that they require a SECOND authorized person to verify the work \u2014 beyond normal maintenance release","Only apply to engines","Are optional for small operators"],"c":1,"x":"RII: if done incorrectly, could result in failure/malfunction hazarding the aircraft. Requires completion by qualified person PLUS independent inspection by a second authorized person. Similar to dual inspection but specifically regulated for commercial operators."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An AME is pressured by their employer to release an aircraft they believe is not airworthy. The AME should:","o":["Sign the release to keep their job","REFUSE to sign \u2014 the AME's professional obligation to safety OVERRIDES employer pressure. Document the refusal and the reasons. Report to TC if the employer pressures further.","Sign with a note of concern","Ask another AME to sign instead"],"c":1,"x":"Your signature = your licence = your professional reputation = lives at stake. NO employer can legally compel you to sign a false release. Refusing is protected by regulation. If pressured, document everything and contact TC if necessary."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"After a hard landing, the inspection scope is determined by:","o":["The pilot's opinion","The manufacturer's hard-landing inspection procedure \u2014 specific to the aircraft type based on the recorded G-load or exceedance parameters","Only visual check of the tires","The AME's general experience"],"c":1,"x":"Each aircraft type has defined thresholds: landing gear loads, FDR G-exceedances, or visual damage criteria. The AMM specifies exactly what to inspect based on the severity. Not a judgment call \u2014 follow the data."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"An operator's maintenance schedule must be:","o":["Whatever the owner writes","Approved by TC (or compliant with a TC-approved framework like CAR 625 Appendix B/C) \u2014 specifying all inspection tasks, intervals, and standards","Only based on manufacturer recommendations","Only the minimum required by CARs"],"c":1,"x":"The schedule must meet or exceed the manufacturer's recommendations. Commercial operators: TC-approved schedule. Private: may use CAR 625 App B/C or a manufacturer's schedule. The schedule is a living document that can be amended with TC approval."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"A maintenance record entry must include:","o":["Only the AME's signature","Description of work, reference to approved data, date, signature, licence number, and any part/serial numbers of installed components \u2014 complete traceability","Only the date and signature","Only what was replaced"],"c":1,"x":"Complete record: WHAT was done, WHY (reference data), WHEN (date), WHO (signature + licence), and WHAT PARTS (P/N, S/N, documentation). Incomplete records = can't prove the work was done properly = airworthiness in question."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"The distinction between 'elementary work' and 'maintenance':","o":["Only the time required","Elementary work is a specific SHORT list of tasks a non-AME can do. EVERYTHING ELSE is 'maintenance' requiring an AME or supervised apprentice. There is no grey area.","Elementary work covers most simple tasks","Any task under 1 hour is elementary"],"c":1,"x":"CARs define 'elementary work' precisely. Common mistake: people assume simple tasks are elementary. Only tasks SPECIFICALLY LISTED in CAR 625 Appendix A qualify. Tire inflation = elementary. Brake pad change = maintenance (requires AME)."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Approved maintenance data includes:","o":["Only the AMM","AMM, SRM, SBs, ADs, engine/component overhaul manuals, wiring manuals, IPC, and TC-approved engineering data","Only manufacturer publications","Only TC documents"],"c":1,"x":"The full list: manufacturer manuals (AMM, SRM, SB, CMM), TC publications (ADs, AWM), and approved engineering data (STC data, DER approvals). ALL are 'approved data.' Using UNAPPROVED data = violation."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"CAR 571.10 requires that maintenance be performed using adequate facilities. 'Adequate' means:","o":["Any covered space","Facilities appropriate for the work: lighting, cleanliness, temperature control for the materials/processes, tooling, and space sufficient to perform the task properly","Only a heated hangar","Any flat surface"],"c":1,"x":"Doing an engine change in a muddy field without proper equipment \u2260 adequate facilities. The facility must match the task complexity. NDT requires specific conditions. Composite repair requires temperature/humidity control. The AME judges adequacy."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"The purpose of a Maintenance Policy Manual (MPM) at an AMO:","o":["Marketing material","Describes the AMO's policies, procedures, organization, and authorized scope of work \u2014 TC approves this manual as the basis for the AMO's certification","Employee handbook","Financial planning"],"c":1,"x":"MPM = the AMO's operating bible. Describes: QA system, work procedures, personnel qualifications, authorized work scope, subcontracting policies, and tool control. TC audits against the MPM. Deviations from the MPM = findings."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"Human Factors training requirements for AMEs and maintenance organizations:","o":["Optional enrichment only","Mandated by CARs \u2014 initial and recurrent training covering the Dirty Dozen, error management, communication, fatigue management, and organizational factors","Only for pilots","Only for managers"],"c":1,"x":"CAR 573.09 and related standards require HF training for AMO personnel. Not a one-time event \u2014 recurrent training required. Topics include: complacency, communication, fatigue, norms, stress, and assertiveness."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"When a MMEL (Master MEL) allows an item to be inoperative, the operator's MEL:","o":["Can be less restrictive","Can only be EQUAL TO or MORE RESTRICTIVE than the MMEL \u2014 never less restrictive","Must be exactly the same","Can ignore the MMEL"],"c":1,"x":"MMEL = regulatory ceiling. Operator's MEL must be at least as restrictive. Example: if MMEL says 'one autopilot may be inoperative,' the operator's MEL may say 'no autopilots may be inoperative' (more restrictive). Never the reverse."},{"e":"REGS","t":"Maintenance Standards","d":4,"q":"The difference between a 'defect' and a 'malfunction' in CARs terminology:","o":["They're identical terms","A defect is any unserviceable condition. A malfunction is a defect that occurs DURING OPERATION and is reported by the flight crew. Both require maintenance action, but malfunctions may also require SDR reporting.","Defects are worse","Malfunctions are cosmetic only"],"c":1,"x":"Subtle but important: malfunction = defect discovered in service (crew reports it). Defect = any unserviceable condition found during maintenance or inspection. Some reporting requirements (SDR) apply differently to malfunctions vs defects."},{"e":"REGS","t":"Other Standards","d":4,"q":"The Dirty Dozen: 'Norms' refers to:","o":["Normal behavior is always correct","The gradual acceptance of lower standards over time \u2014 'we've always done it this way' becomes an excuse for cutting corners","Company policies","Regulatory requirements"],"c":1,"x":"Norms: accepted practices that may have drifted from the standard. 'Nobody safety-wires that fitting anymore' = a norm. Doesn't make it right. Norms are insidious because everyone participates. Question norms that deviate from approved procedures."},{"e":"REGS","t":"Other Standards","d":3,"q":"SMS (Safety Management System) in an AMO:","o":["Is optional for all AMOs","Is a formal system for identifying hazards, assessing risks, implementing mitigation, and continuously improving safety \u2014 required for commercial operators","Only applies to airlines","Only applies to airports"],"c":1,"x":"SMS framework: hazard identification \u2192 risk assessment \u2192 mitigation \u2192 monitoring \u2192 continuous improvement. Proactive (find problems before accidents) vs reactive (investigate after accidents). Required for commercial organizations."},{"e":"REGS","t":"Other Standards","d":3,"q":"An SDR (Service Difficulty Report) must be submitted when:","o":["Only after an accident","Any defect, malfunction, or failure that could affect airworthiness is discovered \u2014 recurring defects must be reported EVERY occurrence","Only for new aircraft","Only by the manufacturer"],"c":1,"x":"SDR: report to TC whenever you find a condition that could endanger safety. TC compiles these to identify fleet-wide trends. Your report may prevent an accident on another aircraft of the same type."},{"e":"REGS","t":"Other Standards","d":4,"q":"The difference between an AMO's QA (Quality Assurance) and QC (Quality Control):","o":["They're identical","QC = inspecting work as it's done (reactive, catching errors). QA = auditing the entire maintenance system (proactive, preventing errors from occurring)","QA is less important","QC is only for manufacturing"],"c":1,"x":"QC: 'Was this specific job done right?' (inspection). QA: 'Is our system designed to produce good work consistently?' (auditing). Both are essential. QA audits may reveal that QC inspections are being done improperly."},{"e":"REGS","t":"Other Standards","d":3,"q":"Fatigue risk management in maintenance:","o":["Is the employee's personal problem","Is an organizational responsibility \u2014 the employer must manage schedules, overtime, and working conditions to minimize fatigue-related errors","Only applies to pilots","Is managed by taking energy drinks"],"c":1,"x":"Fatigued AMEs make errors. Organizations must: limit consecutive work hours, ensure adequate rest periods, manage shift schedules, and create a culture where reporting fatigue isn't punished."},{"e":"REGS","t":"Other Standards","d":3,"q":"Just Culture in aviation maintenance means:","o":["Accepting all errors without consequence","Distinguishing between honest mistakes (supported with training), at-risk behavior (coached and corrected), and reckless behavior (disciplined) \u2014 NOT blame-free, but fair","Punishing all errors equally","Ignoring all errors"],"c":1,"x":"Just Culture: honest error = system fix + support. At-risk behavior (taking shortcuts knowingly) = coaching + system redesign. Reckless/intentional violation = disciplinary action. The distinction matters for reporting culture."},{"e":"REGS","t":"Other Standards","d":4,"q":"A LOSA/MOSA (Line/Maintenance Operations Safety Audit) differs from a standard audit in that:","o":["It's less rigorous","Trained observers watch normal daily operations non-punitively \u2014 identifying systemic threats and errors in the ACTUAL working environment, not just checklist compliance","It only checks paperwork","It's done by TC only"],"c":1,"x":"Standard audit: check compliance against standards. MOSA: observe what actually happens during real maintenance (shortcuts, communication gaps, tool control issues). Captures the reality that audits may miss. Non-punitive."},{"e":"REGS","t":"Other Standards","d":3,"q":"Tool control (FOD prevention) requires:","o":["Only counting tools at the end","Tool inventory before AND after EVERY job \u2014 every tool accounted for. If a tool is missing, the work area and aircraft must be searched before the aircraft is released.","Only a tool list","Tools don't need tracking"],"c":1,"x":"A forgotten wrench in an engine intake killed people (SAS Dash 8, 2007 \u2014 tool left in engine after maintenance). Tool control: shadow boards, tool lists, pre/post counts. Missing tool = aircraft does NOT move until found."},{"e":"REGS","t":"Other Standards","d":3,"q":"Controlled goods (ITAR/CGP) regulations affect AMEs because:","o":["They don't apply to maintenance","Some aircraft components and technical data are export-controlled \u2014 handling them requires security clearance (Controlled Goods Program registration)","Only customs declarations","Only for manufacturers"],"c":1,"x":"You hold a CGP clearance. Military-origin components, some avionics, and certain technical data require CGP registration. Working on controlled goods without clearance = federal offense. Your clearance must be maintained."},{"e":"REGS","t":"Other Standards","d":3,"q":"Borescope inspection procedures and acceptance criteria are found in:","o":["General knowledge","The engine manufacturer's maintenance manual \u2014 with detailed illustrations showing acceptable vs rejectable conditions for each inspectable area","Any NDT textbook","The AME's experience alone"],"c":1,"x":"Borescope criteria: specific to each engine type. Photographs/drawings show: acceptable nicks, cracks, erosion, burning, coating loss. What's acceptable on one engine may be rejectable on another. Always reference the specific engine manual."},{"e":"REGS","t":"Other Standards","d":4,"q":"When two maintenance standards conflict (e.g., an SB recommends one procedure but the AMM says another):","o":["Follow whichever is easier","The most recent approved data takes precedence \u2014 or contact the manufacturer for clarification before proceeding","Ignore both","Follow the oldest document"],"c":1,"x":"Conflicts in approved data: don't guess. Contact the manufacturer's technical support for clarification. Document the discrepancy and the resolution. Using conflicting data without resolution = potential non-compliance."},{"e":"REGS","t":"Other Standards","d":3,"q":"Cybersecurity in aircraft maintenance is relevant because:","o":["It's not relevant to AMEs","Modern aircraft have networked avionics systems that could be compromised through maintenance laptop connections, software updates, or data loading \u2014 AMEs must follow secure procedures","Only IT departments handle this","Only for military aircraft"],"c":1,"x":"Connected aircraft: EFBs, ACARS, maintenance laptops all interface with aircraft systems. Unauthorized software, corrupted data loads, or compromised maintenance tools could affect flight systems. Follow approved software loading procedures exactly."},{"e":"REGS","t":"Other Standards","d":3,"q":"Occurrence reporting to TSB is MANDATORY for:","o":["Only accidents","Accidents AND reportable incidents \u2014 including engine failures, control system malfunctions, smoke/fire/fumes, and other specified events","Only fatal accidents","Only crashes"],"c":1,"x":"TSB Act: mandatory reporting of accidents and listed incident categories. An engine shutdown in flight = reportable incident. Fire warning in flight = reportable. The list is specific \u2014 know which events require TSB notification."},{"e":"REGS","t":"Other Standards","d":3,"q":"ETOPS (Extended Operations) maintenance requirements:","o":["Are the same as normal maintenance","Include additional pre-departure checks, verification of critical system redundancy, and strict configuration management \u2014 because the aircraft will be far from any diversion airport","Only apply to 4-engine aircraft","Are less strict than normal"],"c":1,"x":"ETOPS maintenance: engine oil consumption tracking, verification of dispatch configuration (MEL restrictions are tighter), pre-departure service check by qualified personnel. One failed system could mean a diversion over open ocean."},{"e":"REGS","t":"Other Standards","d":4,"q":"Technical records retention: how long must maintenance records be kept?","o":["5 years then destroy","For the LIFE of the product they relate to \u2014 aircraft records travel with the aircraft from owner to owner, engine records from shop to shop","1 year after maintenance","Only until the next inspection"],"c":1,"x":"LIFE of the product: aircraft records kept as long as the aircraft exists. Engine records kept with the engine. Component records with the component. Lost records = lost value and potential airworthiness issues. Protect records like the asset they are."},{"e":"REGS","t":"Parts & Records","d":4,"q":"A part arrives with an FAA 8130-3 tag. Can it be installed on a Canadian aircraft?","o":["No \u2014 only Canadian Form One is accepted","Yes, IF a bilateral agreement exists between Canada and the US (it does) \u2014 the 8130-3 is accepted as equivalent to the Canadian Form One 24-0078","Only with TC special approval each time","Only on US-manufactured aircraft"],"c":1,"x":"Canada-US bilateral: FAA 8130-3 = TC Form One. EASA Form 1 is also accepted under bilateral. Without a bilateral agreement, foreign release documents are NOT automatically accepted. Know which countries have agreements."},{"e":"REGS","t":"Parts & Records","d":3,"q":"A 'bogus part' (suspected unapproved part) is:","o":["A used part","Any part that cannot be traced to an approved source or doesn't have proper documentation proving its identity and airworthiness \u2014 it may be counterfeit, substandard, or stolen","A PMA part","A surplus military part"],"c":1,"x":"Bogus/SUP parts: no documentation trail, misidentified parts, counterfeit certifications, or parts from unknown/unauthorized sources. Installing one = federal offense + danger to aircraft occupants. Quarantine and report to TC immediately."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Life-limited parts (LLP) must be:","o":["Tracked informally","Tracked precisely with total time/cycles in service \u2014 replaced at or before the mandatory life limit with no exceptions or extensions","Used until they fail","Tracked only by the AMO"],"c":1,"x":"LLPs: mandatory retirement. Engine discs, some fan blades, landing gear components. Every hour and cycle counts. Records must be accurate and unbroken. Exceeding a life limit = the part is condemned regardless of condition."},{"e":"REGS","t":"Parts & Records","d":4,"q":"A part with no documentation ('untraced' or 'back to birth' records missing) can be:","o":["Installed if it looks good","NOT installed on a type-certificated aircraft \u2014 it must be scrapped, tested/overhauled to establish serviceability, or returned to the manufacturer for identification","Installed with an AME's approval","Used for ground testing only"],"c":1,"x":"No docs = no identity = no proof of airworthiness = cannot install. Options: send to manufacturer for positive identification, subject to full overhaul/inspection to establish serviceability, or scrap. 'It looks fine' is NOT acceptable."},{"e":"REGS","t":"Parts & Records","d":3,"q":"A component maintenance manual (CMM) is:","o":["The same as the AMM","A document specific to a COMPONENT (actuator, valve, generator) \u2014 describes its overhaul, repair, testing, and serviceability criteria","Only for engines","Only for avionics"],"c":1,"x":"CMM: component-level instructions. The AMM tells you to remove and replace the component. The CMM tells the overhaul shop how to disassemble, inspect, repair, test, and reassemble it. Different audiences, different detail levels."},{"e":"REGS","t":"Parts & Records","d":3,"q":"When a part is removed from an aircraft for installation on another aircraft ('borrowing'):","o":["No documentation needed","The part must be inspected, tested if required, and accompanied by a serviceability tag documenting its condition and the authority for the transfer","Just move it over","Only the receiving AME needs to know"],"c":1,"x":"Borrowed parts: CARs Standard 571.11 covers requirements. The part must be serviceable and documented. The donating aircraft becomes unairworthy until the part is replaced. Track both aircraft records."},{"e":"REGS","t":"Parts & Records","d":4,"q":"The difference between 'serviceable' and 'overhauled':","o":["Same condition","Serviceable: meets requirements for continued use (may not have been fully disassembled). Overhauled: completely disassembled, inspected, repaired to new limits, reassembled, and tested \u2014 restored to a specified standard","Overhauled is less work","Serviceable means new"],"c":1,"x":"Serviceable: inspected/tested, meets minimum standards, may have worn-but-acceptable components. Overhauled: every component inspected against new-part limits, worn items replaced. Overhauled parts have a 'reset' time/cycles."},{"e":"REGS","t":"Parts & Records","d":3,"q":"A work order or job card is:","o":["Informal notes","A formal document that describes the task, references approved data, records findings, and becomes part of the permanent maintenance record","A suggestion","Temporary and discardable"],"c":1,"x":"Work orders: legal documents. They document: what was requested, what was done, what was found, what references were used, who did it, and who inspected it. Retain per records retention requirements."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Weight and balance records must be amended when:","o":["Only at annual inspection","Any equipment change, modification, or repair that changes the aircraft's empty weight or CG \u2014 with updated calculations documented","Only when the aircraft is sold","Only at overhaul"],"c":1,"x":"EVERY change that affects weight or CG: add a radio, remove a seat, change an engine, apply a heavy paint scheme. Calculate the change, document it, amend the W&B report. Flying with an incorrect W&B = potentially dangerous."},{"e":"REGS","t":"Parts & Records","d":4,"q":"An AME discovers that a maintenance record from 3 years ago appears to be falsified (a task recorded as completed but evidence suggests it wasn't). The correct action:","o":["Ignore it \u2014 it's old","Report the finding to the operator and TC \u2014 potential fraud affecting airworthiness; the aircraft may have been flying unairworthy for years","Correct the record yourself","Only tell your supervisor"],"c":1,"x":"Falsified records = criminal offense under the Aeronautics Act. The aircraft may need reinspection for all work signed by that person. Report to: your QA manager, the operator, and TC. Document your finding carefully."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Technical dispatch reliability monitoring:","o":["Is only for airlines","Tracks the frequency of aircraft defects to identify fleet-wide trends \u2014 high defect rates on specific systems trigger investigation and corrective action","Is optional for all operators","Only tracks delays"],"c":1,"x":"Reliability monitoring: if a specific system shows increasing defect rates, the maintenance program may need adjustment (shorter inspection intervals, different maintenance tasks). Proactive: fix the system before it causes an accident."},{"e":"REGS","t":"Parts & Records","d":3,"q":"AD compliance records must show:","o":["Only that the AD exists","The AD number, revision, compliance date, method of compliance, who did the work, and next due date (for recurring ADs) \u2014 complete compliance history","Only the AME's signature","Only the date"],"c":1,"x":"Complete AD record: which AD, which revision, how it was complied with (which SB, what work was done), when, by whom, and when the next compliance is due if recurring. Any gap in AD records = airworthiness question."},{"e":"REGS","t":"Parts & Records","d":4,"q":"A part that was 'repaired' (not overhauled) may have:","o":["Unlimited remaining life","Only the specific defect corrected \u2014 other components may still be at their pre-repair condition. The repair does NOT reset the overhaul clock.","Full new-part life","The same status as new"],"c":1,"x":"CRITICAL DISTINCTION: Repair fixes a specific problem. Overhaul restores to a specified standard. A repaired part's time continues from where it was. An overhauled part's time resets (partially or fully depending on the overhaul scope)."},{"e":"REGS","t":"Parts & Records","d":3,"q":"An aircraft technical log must be carried on board:","o":["Only during commercial flights","On EVERY flight \u2014 it's the current record of the aircraft's maintenance and defect status, available to the crew","Only during international flights","Never \u2014 it stays at the maintenance base"],"c":1,"x":"The journey log/tech log travels with the aircraft. The crew reviews it before each flight for: open defects, MEL items, and recent maintenance. It's the real-time airworthiness snapshot."},{"e":"REGS","t":"Parts & Records","d":4,"q":"When transferring a Canadian aircraft to a foreign registry:","o":["Just change the markings","The Canadian C of A is cancelled, an Export C of A may be issued, complete technical records must be transferred, and the receiving state inspects and issues their own C of A","No paperwork needed","Only the owner changes"],"c":1,"x":"De-registration from Canada + export C of A (if requested) + complete records package. The receiving state's authority inspects the aircraft and records before issuing their C of A. Incomplete records = the aircraft may not be accepted."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"A fire warning on engine #1 activates. Engine instruments are all normal. Most likely:","o":["There's definitely a fire","Could be a false alarm (sensor fault, moisture, chafed wire) OR a real fire not yet affecting engine operation \u2014 follow the fire checklist regardless until confirmed","Ignore it \u2014 instruments are normal","Only a sensor fault"],"c":1,"x":"NEVER assume false alarm. Engine instruments may be normal in the early stages of a nacelle fire (the fire hasn't reached engine components yet). Execute the verification/checklist procedure."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Fire detection loop resistance testing:","o":["Uses maximum voltage","Uses an ohmmeter to verify loop continuity and insulation resistance \u2014 low insulation resistance indicates moisture or damage that could cause false alarms","Is done with the engine running","Only at overhaul"],"c":1,"x":"Loop resistance: should be within the manufacturer's specified range. Low insulation resistance = moisture in connectors or chafed sensing element = false alarms. High resistance = open circuit = detection failure."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Dual-loop fire detection systems provide:","o":["Twice the false alarms","AND logic (both loops must signal) for fire warning \u2014 eliminates false alarms from single-loop faults. If one loop fails, system switches to single-loop (OR logic) with reduced false alarm protection","Only single-loop capability","No advantage over single-loop"],"c":1,"x":"AND mode: both loops = real fire. One loop faults \u2192 system goes to OR mode (single loop active). OR mode = more sensitive but also more susceptible to false alarms. FAULT light alerts crew to the degraded state."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Engine fire extinguisher agent HFC-227ea:","o":["Is identical to Halon","Is the environmentally acceptable replacement for Halon 1301 \u2014 zero ozone depletion, equivalent fire suppression effectiveness","Is less effective than Halon","Damages engine components"],"c":1,"x":"HFC-227ea (FM-200): clean agent, no ozone depletion, no residue, effective on hydrocarbon fires. Slightly different pressure/temperature characteristics than Halon. Bottles and distribution systems may need modification during transition."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"After pulling the fire handle and discharging the first bottle, the fire warning clears. Should you restart the engine?","o":["Yes \u2014 fire is out","NO \u2014 fuel, oil, and hydraulic shutoffs are closed (fire handle pulled). Restarting could re-introduce flammable fluid to a hot area. Keep it shut down.","Only at cruise altitude","Only for landing"],"c":1,"x":"The fire handle closed all fluid supplies to that engine zone. If you restart, those fluids flow again into a zone that may still have hot surfaces or ignition sources. The risk of re-ignition is high. Land with it shut down."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Fire zone ventilation serves to:","o":["Fan the flames","Allow some airflow through the nacelle to help distribute extinguishing agent and dilute combustible vapors after the agent is discharged","Cool the engine only","Dry the nacelle"],"c":1,"x":"Some airflow helps: 1) distributes agent throughout the zone, 2) prevents vapor concentration from building up after the fire is out. Too much airflow = fans the fire before agent is discharged. Designed balance."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"The pressure in a fire extinguisher bottle changes with:","o":["Altitude only","Ambient temperature \u2014 colder = lower pressure, hotter = higher. The temp-pressure chart determines acceptable range at each temperature","Time only","It stays constant"],"c":1,"x":"Check the pressure gauge against the temp-pressure chart during every walkaround and maintenance check. Below minimum at current temperature = possible agent leak = recharge. Above maximum = possible overpressure."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"A pneumatic fire detection system (Lindberg type):","o":["Uses electrical sensors","Uses a sealed tube filled with gas \u2014 heat causes gas pressure to increase, closing a pressure switch that triggers the alarm","Uses smoke detection","Uses UV flame detection"],"c":1,"x":"Gas-filled tube: average temperature along the entire tube determines the alarm. Advantage: no electrical connections along the sensing element (more robust). Disadvantage: less sensitive to localized hot spots."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"An AME finds a section of fire detection loop wire rubbing against structure. Even though the loop tests OK currently:","o":["Leave it \u2014 it's fine now","Reroute and secure the wire \u2014 continued chafing will eventually penetrate insulation causing either a false alarm or detection failure depending on which conductor is affected","Only add padding","Check again next inspection"],"c":1,"x":"Chafing = progressive damage. Eventually: inner conductor shorts to ground = false alarm. OR outer sheath shorts to structure = detection failure. Fix it NOW. Reroute per the installation drawing, add clamps/padding."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Engine fire extinguisher system testing includes:","o":["Actually discharging the bottle","Squib continuity check, bottle pressure/weight verification, discharge indicator inspection, and loop integrity test \u2014 WITHOUT actually discharging the bottle","Only visual inspection","Only weighing the bottle"],"c":1,"x":"Complete test: 1) Squib circuit continuity (low-current ohm check). 2) Bottle pressure within limits for temperature. 3) Weight vs data plate. 4) Discharge indicators intact. 5) Distribution tubing inspected. 6) Loop test."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Class D fire extinguisher for combustible metals:","o":["Uses water","Uses special dry powder (Met-L-X, Lith-X) \u2014 water, CO2, and Halon are INEFFECTIVE or DANGEROUS on burning metals like magnesium or titanium","Uses CO2","Uses Halon"],"c":1,"x":"Burning magnesium + water = hydrogen gas + explosion. Burning titanium + CO2 = continued combustion (titanium can burn in CO2). ONLY special dry powder smothers the fire without reacting. Know this for brake/wheel fires on magnesium wheels."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"An overheat warning is a CAUTION while a fire warning is a WARNING because:","o":["They're the same urgency","Overheat = temperature approaching limits (investigate, prepare). Fire = temperature indicates actual fire (execute fire checklist immediately). Different thresholds, different responses.","Overheat is more urgent","Fire is less urgent"],"c":1,"x":"Two detection thresholds on the same loop. Overheat triggers at a lower temperature = time to investigate and prepare. Fire triggers at a higher temperature = EXECUTE. The time between overheat and fire warning may be very short."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"Fire bottle crossfeed: Bottle 1 can discharge into Engine 2's zone and vice versa. When would you use crossfeed?","o":["Always discharge both into the same engine","When the first bottle discharged into the fire zone doesn't extinguish the fire \u2014 crossfeed the second bottle from the other engine's system for a second shot","Only during ground testing","Never \u2014 each bottle is dedicated"],"c":1,"x":"Crossfeed gives maximum flexibility: Engine 1 fire \u2192 Bottle 1 into Engine 1 zone. Fire persists \u2192 Bottle 2 (normally for Engine 2) crossfeed into Engine 1 zone. This gives Engine 1 two shots. But Engine 2 now has zero protection."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Smoke in the cockpit that smells electrical:","o":["Open a window","Execute the QRH electrical smoke/fire procedure: identify and isolate the suspect circuit by systematically shedding electrical loads","Turn everything off immediately","Ignore mild smoke"],"c":1,"x":"Electrical fire procedures: don oxygen masks, ventilate if possible, systematically isolate circuits. DON'T reset tripped breakers (they tripped for a reason). If smoke clears after shedding a specific bus = identified."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Fire protection in an unventilated cargo hold (Class C) includes:","o":["Only smoke detection","Both smoke detection AND fixed fire suppression \u2014 the hold is sealed and the suppression system must maintain an effective agent concentration","Only suppression","Neither \u2014 cargo doesn't need protection"],"c":1,"x":"Class C cargo: liner contains the fire, detection alerts crew, suppression system discharges and maintains concentration until landing. Crew cannot access the hold in flight. The system must work automatically."},{"e":"PP","t":"Propellers","d":3,"q":"A constant-speed prop governor operates on the principle of:","o":["Electrical control","Flyweight-driven pilot valve that directs oil pressure to change blade pitch \u2014 maintaining RPM at the governor setpoint","Fuel control","Air pressure"],"c":1,"x":"Flyweights spin at engine RPM via governor drive. If RPM increases: weights fly out \u2192 pilot valve rises \u2192 oil flows to increase pitch \u2192 load increases \u2192 RPM returns to setpoint. Mechanical feedback loop."},{"e":"PP","t":"Propellers","d":4,"q":"On a single-acting prop (oil to decrease pitch, spring/counterweight to increase), loss of oil pressure causes:","o":["Blade goes to flat pitch","Blade goes toward FEATHER (high pitch) \u2014 the spring/counterweight drives it there without opposing oil pressure. This is a SAFETY feature for engine failure.","No change","Blade stops in current position"],"c":1,"x":"Single-acting design philosophy: oil OPPOSES the feathering force. Loss of oil (engine failure) = automatic movement toward feather = minimum drag. The engine fails, the prop feathers itself. Elegant fail-safe design."},{"e":"PP","t":"Propellers","d":3,"q":"Checking propeller blade angle:","o":["By eye","Using a universal propeller protractor at a specified blade station (typically 30\" or 42\" from hub center)","By measuring RPM","By measuring thrust"],"c":1,"x":"Protractor placed on the blade at the reference station. Blade angle read against a reference (the propeller hub face or a fixture). Must match the specified angle within tolerance. Checked during installation and periodic maintenance."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller de-icing boot resistance should be checked to verify:","o":["Color matching","Circuit integrity \u2014 the correct resistance confirms the heating element is intact and the slip ring connections are functional","Boot flexibility","Balance"],"c":1,"x":"Each boot section has a specified resistance range. Out of range = broken element (open circuit = high resistance) or shorted turn (low resistance). Check with an ohmmeter at the slip ring terminals."},{"e":"PP","t":"Propellers","d":3,"q":"A prop that has been feathered in flight for an engine failure can be unfeathered:","o":["By any means","Using the accumulator (stored oil pressure) to move blades out of feather to a start position \u2014 then restart the engine","Only on the ground","It cannot be unfeathered"],"c":1,"x":"Unfeathering accumulator: stores enough oil pressure for one unfeather attempt. Blade moves to start position, windmilling spins the engine. Engine restart procedure follows. If the accumulator has leaked down, unfeathering may not be possible."},{"e":"PP","t":"Propellers","d":4,"q":"After a propeller strike, the inspection must include the ENGINE because:","o":["The engine wasn't involved","The sudden stoppage transmits shock loads through the prop hub, flange, crankshaft, crankshaft gear, and into the engine bearings and reduction gear \u2014 any of these can be damaged","Only the prop needs inspection","Only the spinner"],"c":1,"x":"Sudden stoppage: enormous deceleration forces. Crankshaft can bend. Counterweights can crack. Reduction gear teeth can break. Bearings can be damaged. Internal engine inspection per the manufacturer's sudden-stoppage procedure is MANDATORY."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller static balance is checked by:","o":["Spinning it at high RPM","Mounting the prop on a precision mandrel/balancing stand and checking for a heavy side at rest","Only during manufacturing","It doesn't need checking"],"c":1,"x":"Static balance: prop on a balanced mandrel. If one blade is heavier, that side drops. Add weight to the light blade or remove from the heavy. Must be within tolerance. Imbalance = vibration at all RPMs."},{"e":"PP","t":"Propellers","d":3,"q":"Beta range operation is only enabled when:","o":["In flight at any altitude","The aircraft is on the ground \u2014 a squat switch or weight-on-wheels sensor enables reverse/beta range to prevent inadvertent in-flight reverse","At any time with any setting","During takeoff only"],"c":1,"x":"Beta range (ground idle, reverse): only on the ground. In flight: the flat-pitch stop prevents blades from going below the flight-idle angle. The squat switch removes the stop on the ground. If the switch fails, beta may not be available."},{"e":"PP","t":"Propellers","d":4,"q":"A composite propeller blade repair must use:","o":["Any fiberglass patch","ONLY the repair materials and procedures specified by the propeller manufacturer \u2014 composite prop blades are precisely engineered and generic repairs are NOT acceptable","Standard sheet metal techniques","Any epoxy resin"],"c":1,"x":"Composite prop blades: specific fiber layup, specific resin, specific cure cycle. Generic repairs don't restore the structural, aerodynamic, or balance properties. Follow the propeller manufacturer's repair manual EXACTLY. Many repairs require return to the manufacturer."},{"e":"PP","t":"Propellers","d":3,"q":"Synchrophaser failure on a multi-engine aircraft results in:","o":["Engine failure","Increased cabin noise and vibration from prop beat \u2014 not a safety issue but a comfort issue. MEL may allow continued operation without synchrophaser","Loss of thrust","Complete loss of RPM control"],"c":1,"x":"Synchrophaser optimizes the phase angle for minimum noise. Without it: basic synchronization (same RPM) still works. Passengers notice the 'beating' sound. Pilots can manually synchronize using the synchroscope."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller overspeed governor (backup):","o":["Replaces the primary governor","Activates ONLY if the primary governor fails and RPM exceeds the overspeed limit \u2014 drives blades toward high pitch to slow the prop","Is always active","Is only on turboprops"],"c":1,"x":"Backup protection: primary governor fails \u2192 RPM rises \u2192 overspeed governor engages \u2192 blades go to high/feather pitch \u2192 RPM decreases. Independent system from the primary governor. Tests during maintenance verify proper trip RPM."},{"e":"PP","t":"Propellers","d":3,"q":"Leading-edge erosion protection on aluminum prop blades:","o":["Is not needed on aluminum","Polyurethane tape or electroplated nickel/stainless sheath protects the soft aluminum from rain, sand, and debris erosion at high tip speeds","Only paint protects","Only clear coat"],"c":1,"x":"Aluminum is soft \u2014 erodes quickly at tip speeds of 500+ mph. Erosion changes the airfoil shape and creates stress risers. Leading-edge protection is consumable \u2014 inspect and replace when worn through."},{"e":"PP","t":"Propellers","d":3,"q":"Counterweight propeller system: counterweights are positioned to create:","o":["Minimum centrifugal force","A centrifugal twisting moment that drives blades toward HIGH PITCH (feather) \u2014 oil pressure from the governor opposes this to maintain the set RPM","Maximum forward thrust","Minimum vibration"],"c":1,"x":"Counterweights on the blade root, positioned so centrifugal force twists toward feather. Oil pressure = toward low pitch. Equilibrium at set RPM. Loss of oil = counterweights win = feather. Safety design."},{"e":"PP","t":"Propellers","d":4,"q":"After disassembling a constant-speed propeller hub, reassembly requires:","o":["Hand-tight assembly","Precise torque on all hub components, correct o-ring installation, proper lubrication with specified grease, and operational test verifying governor response","Only visual alignment","Any convenient torque"],
