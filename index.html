"c":1,"x":"Hub assembly: precision work. Wrong torque = blade retention issues. Wrong O-rings = oil leaks = loss of pitch control. Wrong grease = accelerated wear. Full operational test: verify pitch change response, governor operation, feather and unfeather function."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller rotational vibration survey (dynamic balance):","o":["Is only for manufacturing","Uses an electronic analyzer with an accelerometer and phase sensor to identify the exact amount and location of imbalance while the engine runs at operational RPM","Is the same as static balance","Doesn't improve anything"],"c":1,"x":"Dynamic balance: add small weights to the spinner at the calculated angle to correct the vibration. Achieves much smoother operation than static balance alone. Reduces wear on engine mounts, bearings, and instruments."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"The difference between a shower-of-sparks and impulse coupling:","o":["They're the same system","Both provide reliable starting spark, but impulse is mechanical (spring-loaded snap advance) while shower-of-sparks is electrical (vibrator provides continuous sparking during start)","Impulse is electrical","Shower is mechanical"],"c":1,"x":"Impulse coupling: spring-loaded mechanism snaps the magnet through quickly = one hot spark + retarded timing. Shower of sparks: external vibrator rapidly makes and breaks the primary circuit = continuous stream of sparks during cranking."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"A magneto with worn cam follower will:","o":["Have no effect on timing","Shift timing LATE (retard) because the follower reaches the cam peak later \u2014 resulting in reduced power and possible afterfiring through the exhaust","Shift timing early","Increase spark intensity"],"c":1,"x":"Worn follower = shorter effective length = delays point opening relative to cam rotation. Points open later = spark occurs later in the cycle = RETARDED timing. Engine runs hot, loses power. Replace the cam follower."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Spark plug heat range selection:","o":["All plugs are the same","Hot plugs (long insulator nose) for cold/low-power engines; cold plugs (short nose) for hot/high-power engines \u2014 maintaining the plug tip in the self-cleaning temperature range","Only the manufacturer decides","Color determines heat range"],"c":1,"x":"Plug tip must be 500-850\u00b0C: hot enough to burn off deposits (self-cleaning), cool enough to avoid pre-ignition. Hot plug retains more heat (for cold engines). Cold plug dissipates more heat (for hot engines). Wrong range = fouling or pre-ignition."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Capacitor discharge ignition (CDI) on turbine engines:","o":["Uses breaker points","Stores energy in a capacitor, then discharges it through a transformer to produce a high-energy spark \u2014 much hotter than magneto-type systems","Uses a rotating magnet","Runs continuously in flight"],"c":1,"x":"CDI: capacitor charged to ~2,000V. Triggered by a thyristor (SCR). Energy dumps through a transformer \u2192 20,000V+ output. Very hot spark needed to ignite atomized jet fuel at altitude. Fires only during start sequence."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Ignition harness pressurization prevents:","o":["Water entry only","Flashover at altitude \u2014 at high altitude, lower air pressure reduces the dielectric strength of air, allowing high voltage to arc across gaps rather than reaching the plug","Overheating only","Corrosion only"],"c":1,"x":"At altitude: thinner air = easier for HV to arc. Pressurized harness maintains sea-level air density around the leads. Checked with a manometer during maintenance. A leaking harness = potential crossfire at altitude."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"During an ignition harness test, high voltage should NOT arc to ground below:","o":["5,000 volts","The specified breakdown voltage for the harness type \u2014 typically 14,000-18,000 volts. Below this = insulation breakdown = possible misfire in flight","1,000 volts","50,000 volts"],"c":1,"x":"Harness tester applies increasing voltage until breakdown. If it arcs below specification: insulation compromised. Usually caused by moisture, chafing, or age-related insulation degradation. Replace the affected lead or entire harness."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"A direct-drive starter motor risks:","o":["Nothing","Over-torquing the engine if the Bendix/clutch mechanism doesn't disengage promptly after the engine starts \u2014 the starter must disconnect or the engine drives the starter to destruction","Only noise","Only sparking"],"c":1,"x":"Once the engine catches and exceeds starter speed, the starter must disconnect. Bendix/sprag clutch/overrunning clutch mechanisms handle this. If they stick = engine drives the starter at engine RPM = starter disintegration."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Magneto rotation direction is:","o":["Always clockwise","Specific to the engine \u2014 determined by the engine's direction of rotation and magneto drive gearing. Installing a magneto with wrong rotation = no spark or wrong timing","Always counterclockwise","Doesn't matter"],"c":1,"x":"Left and right magnetos may rotate in opposite directions depending on the engine model. Installing the wrong magneto = cam spins backward = no proper point break = no spark. Always verify magneto designation matches the engine."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"A '500-hour magneto inspection' typically includes:","o":["Only a visual check","Points inspection/replacement, cam follower check, capacitor test, timing verification, distributor block inspection, and wear measurement per maintenance manual","Only oil change","Only external cleaning"],"c":1,"x":"500-hour mag inspection: open the mag, inspect points (pitting, burning, gap), check cam follower wear, test capacitor (leakage and capacity), inspect distributor (carbon tracking), check bearings, and verify internal timing."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"A starter solenoid:","o":["Generates the spark","Is a heavy-duty electrical relay that connects battery power to the starter motor when the pilot engages the start switch \u2014 handles very high current","Controls fuel flow","Adjusts timing"],"c":1,"x":"Starter solenoid: the start switch carries only a small current to energize the solenoid coil. The solenoid then closes heavy contacts that connect the battery (200-400 amps) to the starter motor. Inspect contacts for pitting and burning."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"When checking magneto timing with a timing light:","o":["The light should be steady","The light should illuminate at the EXACT moment the points OPEN (break) \u2014 verified at the specified piston BTDC position","The light should flash randomly","The light indicates combustion"],"c":1,"x":"Timing light in series with the points: when points close = light off (current flowing). When points open = light on (current broken). At the BTDC timing mark, the light should JUST illuminate = correct timing."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"A 'dead magneto' (produces no spark) could be caused by:","o":["Only broken points","Internal ground (shorted P-lead or primary circuit), broken condenser, no residual magnetism, or a broken rotating magnet","Only low battery","Only bad plugs"],"c":1,"x":"Magnetos don't need a battery (self-generating). Dead magneto: check P-lead (externally grounded?), internal wiring (broken?), condenser (shorted?), rotor magnetism (demagnetized?), and points (stuck closed?). Systematic troubleshooting."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Spark plug torque is specified to prevent:","o":["Only cross-threading","Over-torque (cracks the plug or strips the cylinder threads) AND under-torque (combustion gas leaks past the plug, overheating the plug and eroding the threads)","Only plug breakage","Nothing \u2014 hand tight is fine"],"c":1,"x":"Correct torque: gas-tight seal without damage. Over-torque: cracked plug body, stripped cylinder bushing. Under-torque: hot gas leaks past gasket, overheats the plug shell, erodes threads. Use a torque wrench. Always."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"The distributor in a magneto:","o":["Amplifies voltage","Routes the high-voltage secondary output to each spark plug in the correct firing order \u2014 via a rotor spinning inside a distributor block with individual outlets to each plug lead","Generates power","Controls timing"],"c":1,"x":"Rotor: rotating electrode connected to the secondary coil. Block: fixed electrodes connected to plug leads. As the rotor spins, it aligns with each outlet in sequence = spark to the correct cylinder. Gap between rotor and block must be correct."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"An engine 'afterfire' through the exhaust is caused by:","o":["Normal combustion","Unburned fuel mixture igniting in the hot exhaust system \u2014 typically from late timing, lean misfire, or an open exhaust valve","Pre-ignition","Detonation"],"c":1,"x":"Late timing: combustion isn't complete when the exhaust valve opens \u2192 unburned mixture enters the hot exhaust \u2192 ignites \u2192 pop/bang. Also from lean misfire (incomplete combustion). Different from backfire (intake side)."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"The function of piston ring end gap:","o":["Manufacturing defect","Allows for thermal expansion \u2014 without the gap, the ring would expand and seize in the cylinder when hot","Reduces compression","Allows oil passage"],"c":1,"x":"Cold ring: gap present. Hot ring: metal expands, gap closes to near-zero (tight seal). If gap is too small cold = ring binds hot = broken ring = engine damage. If gap too large = blow-by and power loss."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"An oil analysis showing increasing silicon content suggests:","o":["Normal operation","Dirt/sand ingestion through the induction system or a deteriorating air filter \u2014 silicon indicates abrasive contamination entering the engine","Oil additive depletion","Bearing wear"],"c":1,"x":"Silicon = sand/dirt. Enters through: leaking induction system, damaged/missing air filter, or contaminated oil during servicing. Abrasive damage to cylinder walls, bearings, and rings follows. Fix the source immediately."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Cylinder cooling on a horizontally-opposed aircraft engine relies on:","o":["Liquid coolant","Forced air directed by baffles over the cylinder fins \u2014 ram air or prop blast provides the airflow, baffles direct it","Oil cooling only","Natural convection only"],"c":1,"x":"Air-cooled: aluminum fins on the cylinders dissipate heat to the passing airflow. Baffles and seals direct air OVER the fins, not around them. Damaged baffles = bypass air = localized overheating."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil temperature gauge reads in the RED arc on a hot day during taxi. First action:","o":["Shut down immediately","Open cowl flaps, reduce power, position aircraft nose into wind if possible \u2014 maximize cooling airflow before considering shutdown","Continue taxiing \u2014 it's normal in summer","Add more oil"],"c":1,"x":"Ground operations: no ram air, only prop blast. Hot day makes it worse. Open cowl flaps, face into wind, minimize ground time. If temperature doesn't respond to cooling measures, shut down and investigate."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"An engine running on only one magneto consumes more oil because:","o":["Magnetos have nothing to do with oil consumption","Single-magneto combustion is less complete \u2014 more unburned fuel washes oil from cylinder walls, reducing the oil film and increasing oil passing the rings into the combustion chamber","It runs hotter","It runs cooler"],"c":1,"x":"Subtle but real: single ignition = slower burn = incomplete combustion = fuel contamination on cylinder walls = oil dilution and wash-down. Proper dual ignition = cleaner burn = better oil film preservation."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil pressure fluctuations (surging) at idle could indicate:","o":["Normal operation","Low oil level, air in the oil pump suction, or a sticky pressure relief valve","High oil level","Only gauge malfunction"],"c":1,"x":"Surging: pump alternately draws oil and air. Common cause: oil level low enough that the pickup alternately submerges and uncovers during oil sloshing. Also: suction line fitting loose (draws air). Check level first."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil squeezes out between the cylinder base and crankcase. This 'weeping' indicates:","o":["Normal on air-cooled engines","Possible cylinder base O-ring deterioration \u2014 monitor the rate; excessive weeping requires O-ring replacement","Catastrophic failure","Only cosmetic issue"],"c":1,"x":"Slight weeping may be acceptable on some engine types. Excessive weeping = O-ring deterioration = potential for sudden loss of oil seal. The maintenance manual specifies acceptable limits. Clean, monitor, and track the rate."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"The oil system on a turbocharged engine runs hotter because:","o":["Oil lubricates the turbo bearing","The turbocharger bearing runs at very high temperature and the oil passing through absorbs significant additional heat compared to a naturally aspirated engine","It uses different oil","The filter is larger"],"c":1,"x":"Turbo center bearing: oil cools and lubricates it. Turbo housing can exceed 1,000\u00b0F. Oil picks up enormous heat from the bearing. This extra heat load means the oil cooler works harder and oil temperature runs higher."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"After a complete oil system overhaul including new bearings, the engine should be:","o":["Run at full power immediately","Pre-oiled before first start (pressurize the oil system externally) and then monitored carefully during initial run-up for proper pressure and temperature","Started normally with no special procedures","Run at idle for 10 hours"],"c":1,"x":"New bearings + dry oil system = first rotation has NO oil film. Pre-oiling: use an external pump to fill the oil passages before cranking. This prevents 'dry start' bearing damage. Monitor pressure immediately on first start."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Anti-foaming additives in aircraft oil:","o":["Create foam","Reduce the tendency of oil to foam when agitated by engine internals \u2014 foam doesn't lubricate and can cause oil pressure indications to be inaccurate","Only change color","Are not used in aircraft oil"],"c":1,"x":"Crankshaft, gears, and oil return systems whip air into the oil. Foam reduces effective lubrication and causes erratic oil pressure readings. Anti-foam agents break bubbles quickly. Degraded additives = more foaming."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Engine oil grades: the 'W' in 15W-50 stands for:","o":["Weight","Winter \u2014 indicating the cold-temperature viscosity rating. The second number (50) is the hot-temperature rating. Multi-grade oils perform across a wide temperature range","Width","Watts"],"c":1,"x":"15W = flows like a 15-grade oil at cold temperatures. 50 = maintains a 50-grade film strength at hot operating temperatures. Single-grade (W100) is thick cold and thin hot. Multi-grade is the modern standard."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Spectrometric Oil Analysis Program (SOAP) detects metals in concentrations of:","o":["Grams","Parts per million (PPM) \u2014 extremely sensitive, detecting wear metals before they're visible in the oil","Percent","Kilograms"],"c":1,"x":"SOAP: burn a sample in a spectrometer. Each metal has a unique emission spectrum. Measured in PPM. Trending PPM values over time reveals which components are wearing and how fast. Catches problems long before chip detectors."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"Oil consumption suddenly doubles between two consecutive oil changes. Most likely cause:","o":["Normal variation","A specific component has failed: stuck-open crankcase breather, failed oil seal, cracked piston, or broken piston ring \u2014 investigate immediately","Different oil brand","Hotter weather"],"c":1,"x":"Sudden change (not gradual trend) = something broke or failed. Not a slow wear item. Investigate: check breather output (excessive oil mist?), look for external leaks, perform compression test, analyze the oil for wear metals."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil filter inspection during oil change:","o":["Just replace and discard the old one","Cut open the filter element and inspect for metallic debris \u2014 this is the most valuable inspection opportunity for early detection of internal engine problems","Only check the bypass indicator","Only note the filter brand"],"c":1,"x":"Cut-open inspection: spread debris on a white cloth. Identify: steel (dark), aluminum (silver), copper (gold), carbon (black). Types of debris point to specific failing components. This 5-minute inspection saves engines."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"The crankcase breather prevents:","o":["Oil leaks only","Internal crankcase pressure buildup from blow-by gases \u2014 excess pressure would blow out oil seals and gaskets","External contamination","Only venting at altitude"],"c":1,"x":"Combustion gases leak past piston rings (blow-by) into the crankcase. Without venting, pressure builds. Breather allows gases to escape (usually through a separator that recovers oil mist). Excessive blow-by = worn rings."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"A fire detection loop tests satisfactory on the ground but gives intermittent false warnings in flight. The MOST likely cause is:","o":["Faulty cockpit warning light","Sensing element chafing that only contacts grounded structure under flight vibration and thermal expansion","Low hydraulic pressure","A real fire that self-extinguishes"],"c":1,"x":"TC trap: ground test doesn't replicate flight conditions (vibration, heat). Chafed insulation makes intermittent contact with airframe = false alarm. Requires routing inspection under simulated conditions."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"After pulling the fire handle, which of these is NOT isolated from the engine?","o":["Fuel supply","Hydraulic supply","Engine-driven fuel pump (it stops when the engine stops, not from the fire handle)","Generator"],"c":2,"x":"TC distinction: the fire handle shuts off fuel supply valve, hydraulic shutoff, bleed air, and disconnects the generator. The engine-driven fuel pump stops because the ENGINE stops \u2014 not because the fire handle directly controls it."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"A Kidde system differs from a Fenwal system in that Kidde uses:","o":["Smoke detection","Two wires with a thermistor element \u2014 resistance DECREASES with temperature; Fenwal uses a single wire in a eutectic salt tube","UV flame detection","Thermocouple junctions"],"c":1,"x":"TC tests system distinctions. Kidde: dual-wire, thermistor (resistance drops with heat). Fenwal: single-wire in eutectic salt (salt melts, resistance drops). Both are continuous-loop but different operating principles."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"The fire handle on most transport aircraft performs ALL of the following EXCEPT:","o":["Closes the fuel shutoff valve","Arms the fire extinguisher discharge switch","Automatically discharges the fire extinguisher","Disconnects the generator from the bus"],"c":2,"x":"TC trap: pulling the fire handle does NOT discharge the extinguisher \u2014 it only ARMS the discharge switch. The pilot must then PRESS the discharge button separately. Two deliberate actions prevent accidental discharge."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"An engine fire bottle that shows correct pressure on its gauge but has passed its hydrostatic test due date:","o":["Is still serviceable if pressure is good","Is NOT serviceable \u2014 both pressure AND hydrostatic test currency are required for airworthiness","Only needs re-weighing","Can fly until next scheduled maintenance"],"c":1,"x":"TC regulatory trap: correct pressure alone is insufficient. The bottle's structural integrity (verified by hydrostatic test) must also be current. An overdue bottle may have weakened \u2014 could rupture under discharge pressure."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Thermal plug (fusible plug) on a fire extinguisher bottle:","o":["Is the discharge nozzle","Melts at a specific temperature to safely relieve bottle pressure if exposed to fire \u2014 preventing explosive rupture","Is the fill port","Is the pressure gauge"],"c":1,"x":"If the bottle itself is in a fire zone, heat builds internal pressure. Without the fusible plug, the bottle could explode. The plug melts at a set temperature, venting the agent safely. Red disc indicates thermal discharge."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"A fire detection system FAULT light (not fire warning) indicates:","o":["A confirmed fire","An open or short circuit in the detection loop \u2014 the system cannot detect a fire in its current state","Normal operation","Low extinguisher pressure"],"c":1,"x":"FAULT = the detection system is broken, NOT that there's a fire. Critically dangerous: you now have NO fire detection in that zone. Requires investigation and repair before dispatch (unless MEL permits with limitations)."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"Dual-loop fire detection in AND configuration vs OR configuration:","o":["Same thing","AND = both loops must signal (reduces false alarms); OR = either loop triggers alarm (maximum sensitivity but more false alarms)","AND is less reliable","OR prevents all false alarms"],"c":1,"x":"TC tests this distinction. Normal: AND logic (both loops agree = real fire). If one loop fails: system switches to OR logic on remaining loop (single loop = any signal triggers warning). Automatically degrades gracefully."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"The minimum time an engine nacelle firewall must withstand a fire is:","o":["5 minutes","15 minutes at 2,000\u00b0F \u2014 providing time for fire suppression and emergency procedures","30 minutes","1 hour"],"c":1,"x":"15 minutes is the standard. Firewall material: stainless steel or titanium. All penetrations (wiring, hoses, cables) must be sealed with fire-resistant grommets. Any compromise to the firewall is a major airworthiness concern."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"After a fire extinguisher discharge, the FIRST maintenance action is:","o":["Recharge the bottle immediately","Investigate the cause of the fire \u2014 determine what burned and why before simply recharging and returning to service","Repaint the nacelle","Test the detection loop"],"c":1,"x":"Recharging without investigating = the fire source may still exist. Find the fuel source (leak), ignition source (hot spot, electrical), and fix both. Then: inspect for fire damage, recharge bottles, test systems, and release."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"A fire warning that occurs only during engine start and clears after start may indicate:","o":["A real fire every start","Hot gas impingement on the detection loop from a bleed leak or misdirected exhaust \u2014 not necessarily a fire but requires investigation","Normal operation","Faulty fuel nozzle"],"c":1,"x":"During start, abnormal hot gas flow (cracked bleed duct, misaligned exhaust) can heat the detection loop without actual fire. It's NOT normal. The heat source must be found and fixed \u2014 it could become a real fire source."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Engine fire extinguishing agents work by:","o":["Cooling only","Chemically interrupting the combustion chain reaction AND displacing oxygen \u2014 Halon/HFC agents do both simultaneously","Only smothering","Only diluting fuel"],"c":1,"x":"Halon/HFC: dual action. Chemical inhibition of the free-radical chain reaction (primary) + oxygen displacement (secondary). More effective per weight than CO2 (which only displaces O2). That's why Halon replaced CO2 in aircraft."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"The agent distribution system ensures:","o":["Agent stays in the bottle","Agent reaches all areas of the fire zone through a network of perforated tubes \u2014 coverage of the entire zone is critical","Agent goes to only one spot","Agent is recycled"],"c":1,"x":"Distribution tubes route agent throughout the nacelle. Perforations are sized and positioned to spray all areas. Damaged or blocked distribution tubes = poor coverage = fire may not be suppressed. Inspect during maintenance."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"On an aircraft with crossfeed capability, if Engine 1 has a fire and Bottle 1 is discharged but the fire persists, the pilot can:","o":["Only wait and hope","Discharge Bottle 2 into Engine 1 nacelle via the crossfeed valve \u2014 providing a second shot from the other engine's bottle","Restart Engine 1","Discharge Bottle 2 into Engine 2"],"c":1,"x":"Crossfeed allows any bottle to discharge into any nacelle. With fire persisting in Engine 1: Bottle 2 crossfed to Engine 1 = second shot. This leaves Engine 2 with NO fire protection \u2014 a considered risk in an emergency."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Fire detection loop resistance at room temperature should be:","o":["Zero ohms","Within the manufacturer's specified range \u2014 typically several thousand ohms for thermistor type; varies by system","Infinite","Exactly 100 ohms"],"c":1,"x":"Each system has a specific resistance range at room temp. Too low = possible short (false alarm). Too high or infinite = open circuit (no detection). Measured with a megohmmeter during maintenance. Compare to maintenance manual values."},{"e":"PP","t":"Propellers","d":4,"q":"A constant-speed propeller governor maintains RPM by:","o":["Changing engine power","Adjusting blade pitch \u2014 increasing pitch to absorb more power when RPM rises, decreasing pitch when RPM drops","Changing fuel flow","Adjusting ignition timing"],"c":1,"x":"Governor senses RPM via flyweights. Overspeed: directs oil to increase pitch (absorb more power = RPM drops). Underspeed: releases oil to decrease pitch (absorb less power = RPM rises). The engine/prop system self-regulates."},{"e":"PP","t":"Propellers","d":4,"q":"On a single-acting propeller (oil pressure to decrease pitch, counterweights/spring to increase), loss of oil pressure causes:","o":["Blade pitch to decrease (flat)","Blade pitch to increase toward feather \u2014 a SAFETY feature that prevents overspeed if the governor fails","No change","Blade pitch to oscillate"],"c":1,"x":"TC LOVES this question. Single-acting: oil opposes feather. No oil = counterweights/spring/aerodynamic twisting drive to feather. This is INTENTIONAL \u2014 loss of governor oil = propeller feathers = engine doesn't overspeed."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller blade erosion is most severe at the:","o":["Hub","Outer 1/3 of the blade (tip area) where the linear velocity is highest \u2014 rain, sand, and debris impact hardest here","Inner 1/3","Blade root"],"c":1,"x":"Tip speed can exceed 600 mph. Rain and sand impact at those speeds causes leading edge erosion. Erosion strips (nickel or stainless) protect the leading edge. Inspect and replace when worn through."},{"e":"PP","t":"Propellers","d":4,"q":"The difference between feathered and flat (fine) pitch:","o":["Same thing","Feathered = blade edge into the wind (minimum drag, no thrust \u2014 for engine-out); flat = blade face into the wind (maximum RPM, used for starting/ground)","Feathered produces thrust","Flat reduces drag"],"c":1,"x":"TC tests this distinction constantly. Feather \u2248 90\u00b0 blade angle (edge to wind). Flat \u2248 0\u00b0 (face to wind). Feather = shut down engine without drag. Flat = easy starting. Reverse = past flat, face slightly past perpendicular."},{"e":"PP","t":"Propellers","d":3,"q":"Beta range on a turboprop propeller is:","o":["Normal flight range","Ground operating range where blade pitch is directly controlled by the power lever rather than the governor \u2014 includes flat pitch and reverse","High-altitude cruise only","Emergency range only"],"c":1,"x":"Beta mode: governor disengaged, pilot directly controls pitch through the power lever. Used for ground idle, reverse thrust for braking, and taxi. Transition from alpha (flight) to beta occurs at a specific power lever position."},{"e":"PP","t":"Propellers","d":3,"q":"A propeller that will not feather may be caused by:","o":["Normal operation","Low oil pressure, stuck pitch change mechanism, malfunctioning feather valve, or mechanical obstruction in the hub","High oil pressure","Correct governor operation"],"c":1,"x":"Feather failure = the propeller continues windmilling with the engine stopped = massive drag = asymmetric thrust on multi-engine = control difficulty. Emergency procedure: attempt multiple feather attempts, reduce speed to minimize windmilling."},{"e":"PP","t":"Propellers","d":4,"q":"Synchrophasing differs from propeller synchronizing in that:","o":["They're identical","Synchronizing matches RPM; synchrophasing also matches blade ANGULAR POSITION to minimize cabin noise and vibration","Synchrophasing only matches RPM","Synchronizing matches blade angle"],"c":1,"x":"Sync: same RPM (eliminates beat frequency). Synchrophase: same RPM + specific blade-to-blade angular relationship that minimizes noise inside the cabin. More sophisticated system. TC tests the distinction."},{"e":"PP","t":"Propellers","d":3,"q":"A propeller de-ice system uses:","o":["Hot bleed air ducted through the blades","Electrically heated elements (boots or embedded heaters) on the blade leading edges, powered through slip rings or brush blocks","Chemical spray from the blade tips","No de-ice exists for propellers"],"c":1,"x":"Electric elements cycled ON/OFF to each blade sequentially. Power transferred from stationary airframe to rotating prop via slip rings/brush blocks. Timer cycles heat between blades. Inspect brushes, slip rings, and heating elements."},{"e":"PP","t":"Propellers","d":3,"q":"Static RPM check on a fixed-pitch propeller verifies:","o":["Nothing useful","That the engine develops the correct RPM at full throttle on the ground \u2014 confirms engine power and propeller pitch are correct","Only propeller balance","Only governor operation"],"c":1,"x":"Full throttle on the ground: should reach manufacturer's specified static RPM (\u00b125 RPM typically). Too high = prop pitch too flat. Too low = pitch too coarse, engine worn, or obstruction. Basic powerplant performance check."},{"e":"PP","t":"Propellers","d":4,"q":"After a prop strike, the engine crankshaft must be inspected because:","o":["Only the prop was affected","The sudden deceleration transmits enormous torsional shock through the prop flange to the crankshaft \u2014 potentially bending or cracking it internally","The crank is protected by the hub","Only the prop hub needs checking"],"c":1,"x":"TC emphasizes: prop strike = mandatory engine teardown inspection on most engines. Even a minor strike. Internal crankshaft damage may be invisible externally. Manufacturer's SB or AD specifies the required inspection."},{"e":"PP","t":"Propellers","d":3,"q":"A propeller spinner inspection includes:","o":["Only appearance","Cracks (especially around screw holes and mounting flange), security of attachment, dents, and condition of the front and rear bulkheads","Only paint condition","Only one screw check"],"c":1,"x":"Spinner failure at high RPM = uncontained projectile. Cracks propagate rapidly under centrifugal and vibration loads. Inspect all fastener holes (stress concentrators), flanges, and bulkheads. Any crack = replace."},{"e":"PP","t":"Propellers","d":3,"q":"When installing a propeller, the blade track must be checked to ensure:","o":["Blades are different colors","All blade tips pass through the same plane of rotation \u2014 out of track = vibration","Blades are at different angles","The spinner fits tightly"],"c":1,"x":"Tracking: hold a reference point near the blade tip, rotate prop by hand, each tip should pass within 1/16\" of the reference (or per manual). Out of track: check blade angle, hub components, and blade straightness."},{"e":"PP","t":"Propellers","d":4,"q":"A propeller blade with a nick on the leading edge near the tip must be:","o":["Left as-is if small","Assessed against manufacturer's allowable damage chart \u2014 small nicks can be filed smooth within limits, larger nicks may require blade replacement","Always replaced","Filled with epoxy"],"c":1,"x":"Manufacturers publish allowable damage charts: location, depth, and size limits. Within limits: blend smooth using fine file, minimum 10:1 taper ratio. Beyond limits: blade may be unrepairable. Near the tip = high stress area = strict limits."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller slip is:","o":["A defect","The difference between geometric pitch (theoretical advance per revolution) and effective pitch (actual advance) \u2014 caused by the blade's angle of attack producing lift rather than 100% forward motion","A maintenance error","Zero in normal operation"],"c":1,"x":"Like a screw in soft wood vs hard wood. Geometric pitch = what the blade angle says it should advance. Effective pitch = what it actually does. Difference = slip. More slip at low speed (takeoff), less at cruise."},{"e":"PP","t":"Propellers","d":3,"q":"Oil used in a propeller hub must be:","o":["Any engine oil","The specific type and grade specified by the propeller manufacturer \u2014 wrong oil affects pitch change speed and low-temperature operation","Only synthetic","Only mineral"],"c":1,"x":"Propeller oil: must flow at low temperatures (cold start feathering), maintain viscosity at high temperatures, and be compatible with hub seals. Manufacturer specifies the exact oil. Wrong oil = sluggish pitch changes in cold weather."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"During a magneto ground check, NO RPM drop on either magneto indicates:","o":["Both magnetos are perfect","A PROBLEM \u2014 likely both P-leads are disconnected (magnetos always hot) or the switch is faulty \u2014 this is a DANGEROUS condition","Only one magneto is working","Normal for a new engine"],"c":1,"x":"TC's FAVORITE trap question. No drop = magneto is NOT being grounded by the switch. Both mags fire regardless of switch position = 'hot prop' hazard. Moving the prop by hand could start the engine. Investigate immediately."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"E-gap on a magneto is:","o":["The spark plug gap","The position of the rotating magnet where the primary circuit current change is most rapid \u2014 the optimal point for breaker point opening","The distributor gap","The rotor clearance"],"c":1,"x":"E-gap (Efficiency gap): the magnetic position where flux change through the coil is maximum = maximum induced voltage = strongest spark. Internal timing aligns the points to open at exactly this position. Mis-set = weak spark."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"A magneto's capacitor (condenser) serves two purposes:","o":["It generates the spark and powers the starter","It prevents arcing at the breaker points AND helps the magnetic field collapse rapidly in the primary coil for maximum secondary voltage","It stores fuel and filters air","It regulates voltage and frequency"],"c":1,"x":"Without the capacitor: points arc badly (rapid wear) and the magnetic field collapses slowly (weak spark). The capacitor absorbs the current when points open (preventing arc) and allows rapid field collapse (strong spark)."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Spark plug reach refers to:","o":["How far the spark jumps","The length of the threaded portion that extends into the combustion chamber \u2014 wrong reach means the electrodes are in the wrong position","The gap distance","The wire length"],"c":1,"x":"Too long reach: electrodes protrude too far, overheat, may contact piston = pre-ignition/damage. Too short: electrodes recessed in the plug well, poor ignition, fouling. MUST match the engine's specification exactly."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Massive-electrode spark plugs vs fine-wire plugs:","o":["Identical performance","Fine-wire (iridium/platinum) plugs fire more reliably at lower voltage and last longer, but cost more; massive-electrode are cheaper but wear faster","Fine-wire are weaker","Massive last longer"],"c":1,"x":"Fine-wire: small center electrode concentrates the electric field = fires at lower voltage = more reliable at altitude/lean conditions. Longer life. Massive-electrode: cheaper, adequate for most applications but higher maintenance."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"If spark plugs are installed with the wrong torque:","o":["No effect","Under-torque: combustion gases leak past the gasket causing overheating and power loss; over-torque: distorts the plug shell, damages cylinder threads, and may crack the insulator","Only affects appearance","Only affects removal ease"],"c":1,"x":"TC tests torque consequences. Under-torque: hot gas erosion of threads, plug loosening. Over-torque: stripped aluminum cylinder threads (EXPENSIVE), cracked plug ceramic, distorted internal geometry. Use a torque wrench, always."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Magneto timing using a timing light:","o":["Is done with the engine running","Is done with the engine stopped, slowly rotating the crankshaft until the timing mark aligns and verifying the light indicates points opening at that exact position","Only at full power","Only during flight"],"c":1,"x":"Static timing: rotate crank to specified degrees BTDC on #1 compression stroke. The timing light/indicator must show the points opening at that exact position. Adjust if not. This is a precision procedure \u2014 1\u00b0 error affects performance."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Starter adapter clutch allows:","o":["Continuous starter engagement","The starter to disengage from the engine once the engine is running faster than the starter \u2014 preventing starter damage from overspeed","Reverse rotation","Manual engagement only"],"c":1,"x":"Overrunning clutch: transmits torque when starter is faster than engine. Once engine fires and accelerates past starter speed, clutch disengages. Without it: engine drives the starter at high RPM = starter destruction."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"An ignition harness with degraded insulation in a high-altitude environment will:","o":["Work normally","Misfire \u2014 thinner air at altitude reduces the insulation's ability to prevent flashover, and degraded insulation makes it worse","Only affect ground operations","Only affect one cylinder"],"c":1,"x":"At altitude: lower air pressure = electricity arcs more easily through air. Degraded lead insulation that works fine at sea level may flashover at altitude = misfires, rough running, power loss. Why harness condition is critical."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"When removing spark plugs, the engine must be:","o":["Running","Cold, with magneto switches OFF and the mixture in idle cutoff \u2014 preventing accidental firing","Hot for easier removal","At full power"],"c":1,"x":"Safety: ensure engine CANNOT fire during plug removal. Mags OFF (grounded), mixture cutoff, P-leads verified grounded. Use correct deep socket. Avoid cross-threading on reinstallation."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"The ignition switch on a recip engine is 'ON' when the P-lead is:","o":["Grounded","DISCONNECTED from ground \u2014 allowing the magneto to produce spark (opposite of household circuits where ON = connected)","Connected to the battery","Short-circuited"],"c":1,"x":"TC trap: aircraft ignition is 'backwards' from intuition. Switch OFF = P-lead grounded = magneto killed. Switch ON = P-lead open = magneto fires. Understanding this is CRITICAL for hot-prop safety."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"A hot start on a turbine engine (EGT exceeds limits during start) is caused by:","o":["Too much airflow","Insufficient airflow through the engine during start \u2014 fuel burns but combustion gases aren't swept through fast enough, causing temperature to spike","Too little fuel","Normal starting variation"],"c":1,"x":"Low airflow causes: engine not rotating fast enough (weak starter, low battery), compressor stall during start, or tailwind. Fuel ignites but hot gases stagnate = EGT skyrockets. Abort the start immediately if limits are exceeded."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Dual ignition on each cylinder provides:","o":["Only redundancy","Redundancy (backup if one system fails), faster/more complete combustion (two flame fronts), and approximately 3-5% more power","Double the spark plug life","Only fuel savings"],"c":1,"x":"Two benefits: safety (redundancy) AND performance (faster burn = more power, better efficiency). TC tests both benefits. The RPM drop during single-mag check shows the power loss from losing one plug per cylinder."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Excessive RPM drop on one magneto during ground check indicates:","o":["Normal operation","A problem on that magneto system \u2014 fouled plugs, incorrect timing, worn points, or defective leads","Both magnetos are failing","The engine needs overhaul"],"c":1,"x":"Normal drop: 50-75 RPM typically. Excessive drop (>150 RPM or as specified): problem on that side. Max RPM difference between left and right: usually 50 RPM. Troubleshoot: fouled plug first (most common), then timing, then harness, then magneto."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"A hung start on a turbine engine means:","o":["The engine started normally","The engine lights off but fails to accelerate to idle RPM \u2014 stabilizes at a sub-idle speed; caused by insufficient starter power or fuel control problem","The engine won't light","EGT exceeded limits"],"c":1,"x":"Hung start: ignition occurs (EGT rises, RPM increases slightly) but the engine stalls at sub-idle. Motor it (continue cranking without fuel) to cool, then retry. Causes: weak battery, fuel scheduling error, bleed valve stuck."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"Oil pressure is normal but oil temperature is steadily rising. The most likely cause is:","o":["Normal operation","Blocked or bypassed oil cooler \u2014 oil is circulating (pressure OK) but not being cooled","Low oil level (which would drop pressure first)","Stuck relief valve"],"c":1,"x":"TC diagnostic trap. Normal pressure = oil is flowing. Rising temp = heat isn't being removed. The oil cooler is either blocked (external airflow restricted \u2014 check cowl flaps, baffles) or bypassed (thermostat stuck)."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"The difference between a wet-sump and dry-sump oil system:","o":["Only the oil quantity","Wet-sump: oil stored in the engine crankcase. Dry-sump: oil stored in a separate tank, scavenged from the engine by pumps","Wet-sump has no pump","Dry-sump has no filter"],"c":1,"x":"Wet-sump: simpler (GA engines). Dry-sump: allows aerobatic flight (oil stays in tank regardless of attitude), better cooling (larger external tank surface), and lower engine profile. Most high-performance and turbine engines = dry-sump."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Multi-grade oil (like 15W-50) vs single-grade (like SAE 50):","o":["Identical performance","Multi-grade flows better when cold (15W) and maintains adequate viscosity when hot (50) \u2014 better cold-start protection and all-temperature operation","Single-grade is always better","Multi-grade wears engines faster"],"c":1,"x":"Multi-grade: VI improvers allow wider operating temperature range. Cold start: flows quickly to bearings (15W). Hot operation: maintains film strength (50 weight). Recommended by most engine manufacturers for most conditions."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"After engine overhaul, mineral oil (not ashless dispersant) is used during break-in because:","o":["It's cheaper","Mineral oil allows controlled ring wear to seat rings against cylinder walls; AD oil's detergent additives prevent the necessary wear pattern from forming","It lasts longer","It has better viscosity"],"c":1,"x":"TC break-in knowledge. Rings must wear to match the cylinder bore microscopically. AD oil keeps surfaces too clean \u2014 rings don't seat, oil consumption remains high. Switch to AD oil after break-in (50-100 hours typically)."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Metallic particles found on an oil screen indicate:","o":["Normal for new engines","Internal component wear \u2014 the type of metal identifies the source: steel=gears/cams, bronze=bushings, aluminum=pistons/case, chrome=rings/cylinders","Only filter replacement needed","No concern"],"c":1,"x":"SOAP in a screen: coarse analysis. Fine fuzz = normal wear. Chips/flakes = accelerated wear. Large pieces = imminent failure. Identify the metal type \u2192 identify the failing component \u2192 take appropriate action before catastrophic failure."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Engine baffles direct cooling air:","o":["Away from the cylinders","Over and around the cylinders in the correct flow pattern \u2014 missing or damaged baffles cause uneven cooling and hot spots","Only around the oil cooler","Only through the carburetor"],"c":1,"x":"Baffles create a high-pressure area above the cylinders and a low-pressure area below. Air is forced through the cooling fins. Gaps, cracks, or missing baffles = air shortcuts = some cylinders run hot. Check baffle condition every inspection."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"Oil consumption suddenly doubles over 10 flight hours. The MOST concerning cause is:","o":["Different oil brand","Possible piston ring failure, valve guide wear breakthrough, or crankcase crack \u2014 requires investigation before continued operation","Normal seasonal variation","Measurement error"],"c":1,"x":"Gradual increase = normal aging. SUDDEN doubling = something broke or failed. Could be: broken ring, scored cylinder, worn valve guide letting oil past, or external leak. Don't assume it's benign \u2014 investigate immediately."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"The oil pressure relief valve is set to:","o":["Maximum possible pressure","A specific pressure that protects the system \u2014 opens to bypass excess oil back to the inlet when pressure exceeds the set point","Minimum pressure","Zero pressure"],"c":1,"x":"Relief valve: spring-loaded. System pressure exceeds spring setting \u2192 valve opens \u2192 oil bypasses back to pump inlet or tank. Adjustable on some engines (careful: too low = poor lubrication; too high = blown seals/gaskets)."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil that turns dark quickly after an oil change may indicate:","o":["Bad oil","Normal \u2014 ashless dispersant oil suspends contaminants (soot, carbon) keeping them in suspension rather than letting them deposit on surfaces","Engine failure","Wrong oil grade"],"c":1,"x":"AD oil DESIGNED to turn dark \u2014 it's doing its job (holding contaminants in suspension for removal at the next change). Clear oil after many hours might actually be WORSE (not dispersing contaminants). Don't judge oil quality by color alone."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"If oil pressure drops during a go-around at full power:","o":["Normal at high power","Investigate immediately \u2014 oil pressure should INCREASE at high RPM; a drop could indicate pump failure, bearing clearance widening, or relief valve malfunction","Wait until cruise to check","Ignore if temperature is normal"],"c":1,"x":"TC diagnostic scenario. High RPM = more pump output = higher pressure. If pressure DROPS at high RPM, something is very wrong: worn pump, excessive bearing clearance, relief valve stuck open, or oil system failure."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"The oil temperature bulb/sender is typically located in the:","o":["Oil tank only","Oil return (scavenge) line or engine sump \u2014 where it reads the hottest oil temperature","Oil cooler inlet","Oil filter housing"],"c":1,"x":"Return oil has absorbed heat from the engine. Reading the hottest oil gives the worst-case temperature. Some aircraft read oil inlet temperature (to the engine) \u2014 this shows the oil's condition before it lubricates."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Hopper-type oil cooler vs tubular oil cooler:","o":["Identical","Both transfer heat from oil to air, but hopper (honeycomb/plate-fin) offers more surface area in compact space; tubular is simpler and more repairable","Hopper cools faster","Tubular is more efficient"],"c":1,"x":"Both do the same job. Hopper/plate-fin: more efficient per volume (modern). Tubular: simpler construction, individual tubes can be plugged if leaking (repairable). Selection depends on engine installation and manufacturer."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Cylinder head temperature (CHT) is primarily controlled by:","o":["Oil temperature","Mixture richness and cooling airflow \u2014 the pilot controls CHT through mixture adjustment, cowl flaps, and power settings","Ignition timing only","Fuel pressure"],"c":1,"x":"Rich mixture = cooler (excess fuel absorbs heat). Lean mixture = hotter. Open cowl flaps = more cooling air. Reduce power = less heat generated. The pilot manages CHT through all three. AME ensures the cooling system works properly."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"Spectrometric Oil Analysis Program (SOAP) trend shows iron increasing over three samples while all other metals are stable. This suggests:","o":["Normal wear","Accelerated wear of a ferrous component \u2014 likely camshaft, crankshaft journals, or gear teeth \u2014 requiring closer monitoring and possibly a borescope inspection","Aluminum piston damage","Copper bearing failure"],"c":1,"x":"Iron sources: camshaft lobes, crankshaft journals, cylinder barrels, gear teeth. Trending UP while others stable = specific ferrous component deteriorating. Next steps: increase sampling frequency, magnetic plug inspection, possible borescope. This is EXACTLY how TC expects you to interpret SOAP data."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Correct oil level is critical because too much oil causes:","o":["Only increased weight","Excessive crankcase pressure, oil foaming (aeration), and potential for oil blowing past seals or out the breather \u2014 as harmful as too little oil","Better lubrication","Cooler engine operation"],"c":1,"x":"Overfilling: crank/counterweights churn through the oil = foaming = air bubbles in oil = reduced lubrication + increased temperature. Oil blown out the breather = messy and wasteful. Keep oil level in the specified range."}];
const K="ame_final";let S;
const EM={SPM:{n:"Standard Practices",s:"SPM",cl:"var(--spm)",ic:"🔧",eq:90},AF:{n:"Airframe",s:"AF",cl:"var(--af)",ic:"🛩️",eq:90},PP:{n:"Powerplant",s:"PP",cl:"var(--pp)",ic:"⚙️",eq:90},REGS:{n:"Regulatory",s:"REGS",cl:"var(--regs)",ic:"📋",eq:50}};
const DL={1:"Easy",2:"Medium",3:"Hard",4:"Final"};const DC={1:"d1",2:"d2",3:"d3",4:"d4"};
function qid(q){return q.e+"|"+q.q.substring(0,45)}
function flt(e,t,d){return Q.filter(q=>(!e||q.e===e)&&(!t||q.t===t)&&(!d||q.d===d))}
function tops(e){return[...new Set(Q.filter(q=>q.e===e).map(q=>q.t))]}
function dn(e,t){return Q.filter(q=>(!e||q.e===e)&&(!t||q.t===t)&&S.ans[qid(q)]!==undefined).length}
function cr(e,t){return Q.filter(q=>(!e||q.e===e)&&(!t||q.t===t)&&S.ans[qid(q)]===true).length}
function pk(e,t,d){const p=flt(e,t,d);if(!p.length)return Q[0];const u=p.filter(q=>S.ans[qid(q)]===undefined);if(u.length)return u[0|Math.random()*u.length];const w=p.filter(q=>S.ans[qid(q)]===false);if(w.length)return w[0|Math.random()*w.length];return p[0|Math.random()*p.length]}
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function ld(){try{const d=JSON.parse(localStorage.getItem(K));if(d&&d.v===5)return d}catch(e){}return null}
function mk(){return{v:13,ans:{},str:0,bst:0,tc:0,ta:0,ld:null,dd:0}}
function init(){const s=ld();S=s?{...mk(),...s,v:13}:mk();S.pg="home";S.ex=null;S.tp=null;S.qi=null;S.sel=null;S.rev=false;S.df=0;S.mock=null;S.mr=null}
function sv(){const d={v:13,ans:S.ans,str:S.str,bst:S.bst,tc:S.tc,ta:S.ta,ld:S.ld,dd:S.dd};localStorage.setItem(K,JSON.stringify(d))}
function ck(){const t=new Date().toDateString();if(S.ld!==t){S.dd=0;S.ld=t;sv()}}
init();ck();

const R=document.getElementById("R");
function h(t,c,a){const e=document.createElement(t);if(c)e.className=c;if(a)for(const[k,v]of Object.entries(a)){if(k==="txt")e.textContent=v;else if(k==="htm")e.innerHTML=v;else if(k.startsWith("on"))e.addEventListener(k.slice(2),v);else e.setAttribute(k,v)}return e}
function $(p,...c){for(const x of c.flat())if(x)p.appendChild(typeof x==="string"?document.createTextNode(x):x);return p}

function go(){R.innerHTML="";ck();
const hd=h("div","hdr");$(hd,h("div","hi",{txt:"✈️"}));
const ht=h("div","");$(ht,h("h1","",{txt:"AME M2 Companion"}),h("small","",{txt:Q.length+" questions · TP 14038 · CARs · "+Q.filter(q=>q.e==='REGS').length+" REGS"}));$(hd,ht);
const hr=h("div","hdr-r");if(S.str>=3)$(hr,h("div","pill",{htm:"🔥 "+S.str,style:"color:var(--ac)"}));$(hd,hr);$(R,hd);
if(S.mock)return rMk();
switch(S.pg){case"home":rH();break;case"exam":rE();break;case"quiz":rQ();break;case"result":rR();break;case"reset":rReset();break}
if(S.pg==="quiz"&&S.rev)setTimeout(()=>R.scrollTop=R.scrollHeight,50);else R.scrollTop=0}

function rH(){
const sr=h("div","srow an");
[{n:S.tc,l:"Correct",c:"var(--ok)"},{n:S.ta,l:"Answered"},{n:S.ta?Math.round(S.tc/S.ta*100)+"%":"—",l:"Accuracy",c:"var(--ac)"},{n:S.bst,l:"Best Streak",c:"var(--ac)"}].forEach(s=>{
const b=h("div","sb");$(b,h("div","n",{txt:""+s.n,style:s.c?"color:"+s.c:""}),h("div","l",{txt:s.l}));$(sr,b)});$(R,sr);
const dc=h("div","an a1",{style:"background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:10px"});
$(dc,h("div","",{htm:`<div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-size:12px;font-weight:600">📅 Daily Goal</span><span style="font-size:11px;color:var(--t2);font-family:var(--m)">${S.dd}/10</span></div>`}));
const pb=h("div","pbar");const pi=document.createElement("i");pi.style.width=Math.min(100,S.dd/10*100)+"%";pb.appendChild(pi);$(dc,pb);
if(S.dd>=10)$(dc,h("div","",{htm:'<div style="text-align:center;font-size:11px;color:var(--ok);font-weight:700;margin-top:4px">✅ Daily goal complete!</div>'}));$(R,dc);
$(R,h("button","btn ba bw bl an a2",{txt:"⚡ Quick Study — Random Mix",onclick(){const q=Q[0|Math.random()*Q.length];S.pg="quiz";S.ex=q.e;S.qi=Q.indexOf(q);S.sel=null;S.rev=false;go()}}));
$(R,h("div","",{style:"height:8px"}));
$(R,h("button","btn bg bw bl an a3",{txt:"🎯 CARs Exam Simulator — 50 Qs, 75 min",onclick(){startMk('REGS',50,75)}}));
$(R,h("div","",{style:"height:14px"}));
$(R,h("div","lbl an a3",{txt:"Choose an Exam"}));
const eg=h("div","egrid an a4");
for(const[ek,em]of Object.entries(EM)){const tot=flt(ek).length,d=dn(ek);
const ec=h("button","ec",{style:"--clr:"+em.cl,onclick(){S.ex=ek;S.pg="exam";go()}});
$(ec,h("h3","",{txt:em.ic+" "+em.n,style:"color:"+em.cl}));$(ec,h("div","su",{txt:tot+" Qs · "+d+" done"}));
const pr=h("div","pr");const p2=document.createElement("i");p2.style.width=(d/tot*100)+"%";p2.style.background=em.cl;pr.appendChild(p2);$(ec,pr);$(eg,ec)}$(R,eg);
$(R,h("button","btn bd bw an",{txt:"🔄 Reset All Progress",style:"font-size:12px;margin-top:4px",onclick(){S.pg="reset";go()}}))
}

function rE(){
const em=EM[S.ex],tot=flt(S.ex).length,d=dn(S.ex),c=cr(S.ex);
const th=h("div","",{style:"display:flex;align-items:center;gap:8px;margin-bottom:12px"});
$(th,h("button","btn bb",{txt:"← Home",onclick(){S.pg="home";go()}}));
$(th,h("h2","",{htm:'<span style="color:'+em.cl+'">'+em.ic+" "+em.n+"</span>",style:"font-size:16px;font-weight:700"}));$(R,th);
const sr=h("div","srow an");const pct=d?Math.round(c/d*100):0;
[{n:tot,l:"Questions"},{n:d,l:"Answered"},{n:c,l:"Correct",c:"var(--ok)"},{n:pct+"%",l:"Score",c:"var(--ac)"}].forEach(s=>{
const b=h("div","sb");$(b,h("div","n",{txt:""+s.n,style:s.c?"color:"+s.c:""}),h("div","l",{txt:s.l}));$(sr,b)});$(R,sr);
const pb=h("div","pbar an");const pi=document.createElement("i");pi.style.width=(d/tot*100)+"%";pb.appendChild(pi);$(R,pb);
$(R,h("div","lbl",{txt:"Difficulty"}));
const db=h("div","dbar an");
[{v:0,l:"All"},{v:1,l:"🟢 Easy"},{v:2,l:"🟡 Medium"},{v:3,l:"🔴 Hard"},{v:4,l:"💀 Final"}].forEach(d=>{
$(db,h("button","df"+(S.df===d.v?" on":""),{txt:d.l,onclick(){S.df=d.v;go()}}))});$(R,db);
$(R,h("button","btn ba bw an",{txt:"⚡ Study All "+em.n,style:"margin-bottom:8px",onclick(){const q=pk(S.ex,null,S.df||undefined);S.qi=Q.indexOf(q);S.sel=null;S.rev=false;S.tp=null;S.pg="quiz";go()}}));
const mkLen=Math.min(flt(S.ex,null,S.df||undefined).length,em.eq);
$(R,h("button","btn bg bw an",{txt:"🎯 Mock "+em.s+" Exam — "+mkLen+" Qs",style:"margin-bottom:12px",onclick(){startMk(S.ex,mkLen,Math.ceil(mkLen*1.5))}}));
$(R,h("div","lbl",{txt:"Topics"}));
const tl=h("div","tl an");
tops(S.ex).forEach(t=>{const tqs=flt(S.ex,t,S.df||undefined),tot2=tqs.length;
const d2=tqs.filter(q=>S.ans[qid(q)]!==undefined).length;
const c2=tqs.filter(q=>S.ans[qid(q)]===true).length;
const dc2=c2===tot2&&tot2>0?"var(--ok)":d2>0?"var(--ac)":"var(--c4)";
const tb=h("button","ti",{onclick(){const q=pk(S.ex,t,S.df||undefined);S.qi=Q.indexOf(q);S.tp=t;S.sel=null;S.rev=false;S.pg="quiz";go()}});
$(tb,h("div","dt",{style:"background:"+dc2}),h("span","",{txt:t}),h("span","ct",{txt:d2+"/"+tot2}));$(tl,tb)});$(R,tl)}

function rQ(){
const q=Q[S.qi],em=EM[q.e],lt=["A","B","C","D"];
const qt=h("div","qt an");$(qt,h("button","btn bb",{txt:"←",onclick(){S.pg=S.ex?"exam":"home";S.tp=null;go()}}));
$(qt,h("span","tag",{txt:em.ic+" "+em.s,style:"color:"+em.cl}));$(qt,h("span","tag",{txt:q.t}));
$(qt,h("span","dtag "+DC[q.d],{txt:DL[q.d]}));$(R,qt);
$(R,h("div","qc an",{txt:q.q}));
const opts=h("div","opts an");
q.o.forEach((a,i)=>{let cls="opt";
if(S.rev){if(i===q.c)cls+=" ok";else if(i===S.sel)cls+=" wr";else cls+=" dm"}
else if(i===S.sel)cls+=" sel";
const btn=h("button",cls,{onclick(){if(!S.rev){S.sel=i;go()}}});
$(btn,h("span","lt",{txt:lt[i]}),h("span","",{txt:a}));$(opts,btn)});$(R,opts);
if(!S.rev){const cb=h("button","btn ba bw bl",{txt:"Check Answer",onclick(){
if(S.sel===null)return;S.rev=true;const ok=S.sel===q.c;S.ans[qid(q)]=ok;S.ta++;S.dd++;
if(ok){S.tc++;S.str++;if(S.str>S.bst)S.bst=S.str}else S.str=0;sv();go()}});
if(S.sel===null)cb.setAttribute("disabled","");$(R,cb)}
if(S.rev){const ok=S.sel===q.c;
$(R,h("div","rbn pop "+(ok?"ok":"no"),{txt:ok?"✅ Correct!":"❌ Incorrect — Answer: "+lt[q.c]}));
if(S.str>=3&&ok)$(R,h("div","",{htm:'<div style="text-align:center;font-size:12px;color:var(--ac);margin-bottom:8px;font-weight:700">🔥 '+S.str+" streak!</div>"}));
$(R,h("div","expl an",{htm:"<b>Why?</b> "+q.x}));
const ac=h("div","acts an");
$(ac,h("button","btn ba",{txt:"Next →",onclick(){const nq=pk(S.ex||q.e,S.tp,S.df||undefined);S.qi=Q.indexOf(nq);S.sel=null;S.rev=false;go()}}));
$(ac,h("button","btn bs",{txt:"Back",onclick(){S.pg=S.ex?"exam":"home";S.tp=null;go()}}));$(R,ac)}}

function startMk(exam,num,mins){
let pool=exam?flt(exam):Q;pool=shuf(pool).slice(0,num);
S.mock={qs:pool.map(q=>Q.indexOf(q)),cur:0,ans:new Array(num).fill(null),sel:null,start:Date.now(),dur:mins*60*1000,exam:exam};go()}

function rMk(){
const m=S.mock,qi=m.qs[m.cur],q=Q[qi],lt=["A","B","C","D"];
const elapsed=Date.now()-m.start;const rem=Math.max(0,m.dur-elapsed);
if(rem<=0&&m.ans[m.cur]===null){finMk();return}
const mins=Math.floor(rem/60000);const secs=Math.floor(rem%60000/1000);
const bar=h("div","mbar an");$(bar,h("span","qc2",{txt:"Q "+(m.cur+1)+" / "+m.qs.length}));
$(bar,h("span","tmr"+(rem<300000?" pulse":""),{txt:mins+":"+String(secs).padStart(2,"0")}));$(R,bar);
const pips=h("div","pips an");for(let i=0;i<m.qs.length;i++){
let pc="p";if(i===m.cur)pc+=" cu";else if(m.ans[i]!==null)pc+=m.ans[i]===Q[m.qs[i]].c?" dn":" wg";
$(pips,h("div",pc))}$(R,pips);
$(R,h("div","qc an",{txt:q.q}));
const opts=h("div","opts an");q.o.forEach((a,i)=>{
let cls="opt";if(i===m.sel)cls+=" sel";
const btn=h("button",cls,{onclick(){m.sel=i;go()}});
$(btn,h("span","lt",{txt:lt[i]}),h("span","",{txt:a}));$(opts,btn)});$(R,opts);
const ac=h("div","acts an");
if(m.cur>0)$(ac,h("button","btn bs",{txt:"← Prev",onclick(){m.ans[m.cur]=m.sel;m.cur--;m.sel=m.ans[m.cur];go()}}));
if(m.cur<m.qs.length-1)$(ac,h("button","btn ba",{txt:"Next →",onclick(){m.ans[m.cur]=m.sel;m.cur++;m.sel=m.ans[m.cur];go()}}));
else $(ac,h("button","btn bg",{txt:"✓ Finish Exam",onclick(){m.ans[m.cur]=m.sel;finMk()}}));$(R,ac);
if(rem>0)setTimeout(()=>{if(S.mock)go()},1000)}

function finMk(){const m=S.mock;let correct=0;
m.qs.forEach((qi,i)=>{if(m.ans[i]===Q[qi].c)correct++});
S.mr={total:m.qs.length,correct,qs:m.qs,ans:m.ans,exam:m.exam};S.mock=null;S.pg="result";go()}

function rR(){

const lt=["A","B","C","D"];const title=r.exam?EM[r.exam].n+" Mock Exam":"Mixed Mock Exam";
$(R,h("div","",{htm:'<div style="text-align:center;margin:16px 0"><div style="font-size:12px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:1px">'+title+" Results</div></div>"}));
$(R,h("div","rc pop "+(pass?"pa":"fa"),{txt:pct+"%"}));
$(R,h("div","",{htm:'<div style="text-align:center;margin:10px 0 20px"><div style="font-size:18px;font-weight:800;color:'+(pass?"var(--ok)":"var(--no)")+'">'+(pass?"PASSED ✈️":"FAILED")+'</div><div style="font-size:12px;color:var(--t2);margin-top:4px">'+r.correct+"/"+r.total+" correct · 70% required</div></div>"}));
$(R,h("div","lbl",{txt:"Review All Answers"}));
const rl=h("div","tl");
r.qs.forEach((qi,i)=>{const q=Q[qi],ok=r.ans[i]===q.c;
const ti=h("div","",{style:"background:var(--c1);border:1px solid var(--bd);border-left:3px solid "+(ok?"var(--ok)":"var(--no)")+";border-radius:var(--r);padding:12px;margin-bottom:6px"});
$(ti,h("div","",{htm:'<div style="font-size:11px;color:var(--t3);margin-bottom:3px">Q'+(i+1)+" · "+q.t+'</div><div style="font-size:13px;margin-bottom:6px;line-height:1.5">'+q.q+'</div><div style="font-size:12px;color:'+(ok?"var(--ok)":"var(--no)")+';font-weight:600">'+(ok?"✓ Correct":"✗ You: "+(r.ans[i]!==null?lt[r.ans[i]]:"—")+" · Answer: "+lt[q.c])+'</div><div style="font-size:11px;color:var(--t2);margin-top:4px;line-height:1.5">'+q.x+"</div>"}));
$(rl,ti)});$(R,rl);
$(R,h("button","btn ba bw bl",{txt:"Back to Home",style:"margin-top:14px",onclick(){S.pg="home";S.mr=null;go()}}))}

function rReset(){
$(R,h("div","",{htm:'<div style="text-align:center;padding:40px 0 20px"><div style="font-size:48px;margin-bottom:16px">⚠️</div><h2 style="font-size:20px;font-weight:800;margin-bottom:8px">Reset All Progress?</h2><div style="font-size:14px;color:var(--t2);line-height:1.6;margin-bottom:24px">This will erase all your scores, streaks,<br>and answered questions.<br><br>This cannot be undone.</div></div>'}));
$(R,h("button","btn bd bw bl",{txt:"🗑️ Yes, Reset Everything",style:"margin-bottom:10px",onclick(){localStorage.removeItem(K);S=mk();S.pg="home";go()}}));
$(R,h("button","btn bs bw bl",{txt:"← No, Go Back",onclick(){S.pg="home";go()}}));
}

go();
</script>
