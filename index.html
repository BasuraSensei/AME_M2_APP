<!DOCTYPE html>
<html lang="en">
<head>

<title>AME M2 — Transport Canada Exam Prep</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0d13;--c1:#11151e;--c2:#181e2c;--c3:#222a3d;--c4:#2d3752;--bd:#2a3349;
--tx:#eaeff8;--t2:#8d99b4;--t3:#5a6680;
--ac:#e8a530;--acH:#ffc245;--acBg:rgba(232,165,48,.1);--acBd:rgba(232,165,48,.3);
--ok:#34d399;--okBg:rgba(52,211,153,.08);--okBd:rgba(52,211,153,.28);
--no:#f87171;--noBg:rgba(248,113,113,.08);--noBd:rgba(248,113,113,.28);
--spm:#5b9cf5;--af:#34d399;--pp:#f87171;--regs:#a78bfa;
--r:14px;--st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
--f:'Outfit',system-ui,sans-serif;--m:'JetBrains Mono',monospace}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--f);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
#R{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:calc(12px + var(--st)) 16px calc(28px + var(--sb));max-width:560px;margin:0 auto}
#R::-webkit-scrollbar{width:3px}#R::-webkit-scrollbar-thumb{background:var(--c4);border-radius:2px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 25% 15%,rgba(91,156,245,.06) 0%,transparent 55%),radial-gradient(ellipse at 75% 85%,rgba(167,139,250,.04) 0%,transparent 55%);z-index:-1;pointer-events:none}

.hdr{display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--bd);margin-bottom:16px}
.hi{width:40px;height:40px;background:linear-gradient(135deg,var(--ac),#c87a10);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;box-shadow:0 2px 12px rgba(232,165,48,.2),inset 0 1px 0 rgba(255,255,255,.15)}
.hdr h1{font-size:16px;font-weight:800;letter-spacing:-.4px}
.hdr small{display:block;font-size:9.5px;color:var(--t3);font-weight:500;margin-top:1px}
.hdr-r{margin-left:auto;display:flex;gap:6px;align-items:center}
.pill{background:var(--c2);border:1px solid var(--bd);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:4px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:10px;border:none;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;-webkit-appearance:none;position:relative;overflow:hidden;transition:transform .1s,box-shadow .2s}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08) 0%,transparent 60%);pointer-events:none;border-radius:inherit}
.btn:active{transform:scale(.96)}.btn:disabled{opacity:.3;pointer-events:none}
.ba{background:linear-gradient(180deg,var(--ac),#c8880e);color:#111;box-shadow:0 2px 10px rgba(232,165,48,.25)}
.bg{background:linear-gradient(180deg,var(--ok),#1ea06e);color:#111;box-shadow:0 2px 10px rgba(52,211,153,.2)}
.bs{background:var(--c2);color:var(--tx);border:1px solid var(--bd)}
.bd{background:var(--noBg);color:var(--no);border:1px solid var(--noBd)}
.bb{background:transparent;border:1px solid var(--bd);color:var(--t2);padding:5px 12px;font-size:11px;border-radius:7px}
.bw{width:100%}.bl{padding:14px 20px;font-size:15px;border-radius:12px}
.lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.srow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px}
.sb{background:var(--c1);border:1px solid var(--bd);border-radius:10px;padding:10px 4px;text-align:center}
.sb .n{font-size:19px;font-weight:800;line-height:1}.sb .l{font-size:8px;color:var(--t3);margin-top:3px;text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.pbar{height:4px;background:var(--c3);border-radius:3px;overflow:hidden;margin-bottom:14px}
.pbar i{display:block;height:100%;border-radius:3px;background:linear-gradient(90deg,var(--ac),var(--acH));transition:width .4s ease}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ec{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:15px 14px;cursor:pointer;position:relative;overflow:hidden;text-align:left;font-family:var(--f);color:var(--tx);width:100%;-webkit-appearance:none;transition:all .15s}
.ec::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--clr);opacity:.4;transition:opacity .2s}
.ec:active{transform:scale(.97);border-color:var(--clr)}.ec:active::before{opacity:1}
.ec h3{font-size:13px;font-weight:700}.ec .su{font-size:10px;color:var(--t3);margin-top:3px}
.ec .pr{margin-top:8px;height:3px;background:var(--c3);border-radius:2px;overflow:hidden}.ec .pr i{display:block;height:100%;border-radius:2px;transition:width .3s}
.tl{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.ti{background:var(--c1);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;text-align:left;color:var(--tx);font-family:var(--f);font-size:13px;font-weight:500;cursor:pointer;width:100%;display:flex;align-items:center;gap:10px;-webkit-appearance:none;transition:all .12s}
.ti:active{background:var(--c2);border-color:var(--ac);transform:scale(.98)}
.ti .dt{width:8px;height:8px;border-radius:50%;flex-shrink:0}.ti .ct{margin-left:auto;font-size:10px;color:var(--t3);font-weight:600;font-family:var(--m)}
.dbar{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.df{padding:5px 12px;border-radius:16px;border:1px solid var(--bd);background:var(--c1);color:var(--t2);font-size:10px;font-weight:700;cursor:pointer;font-family:var(--f);-webkit-appearance:none;transition:all .12s;text-transform:uppercase;letter-spacing:.3px}
.df:active{transform:scale(.95)}.df.on{background:var(--ac);color:#111;border-color:var(--ac);box-shadow:0 2px 8px rgba(232,165,48,.2)}
.qt{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:700;padding:3px 9px;border-radius:8px;background:var(--c2);border:1px solid var(--bd);text-transform:uppercase;letter-spacing:.3px}
.dtag{font-size:9px;font-weight:800;padding:3px 8px;border-radius:8px;margin-left:auto;text-transform:uppercase;letter-spacing:.3px}
.d1{background:rgba(52,211,153,.1);color:var(--ok);border:1px solid var(--okBd)}
.d2{background:var(--acBg);color:var(--ac);border:1px solid var(--acBd)}
.d3{background:var(--noBg);color:var(--no);border:1px solid var(--noBd)}
.d4{background:rgba(167,139,250,.1);color:var(--regs);border:1px solid rgba(167,139,250,.3)}
.qc{background:var(--c1);border:1px solid var(--bd);border-radius:var(--r);padding:18px;font-size:14px;line-height:1.75;margin-bottom:12px}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.opt{background:var(--c1);border:2px solid var(--c3);border-radius:11px;padding:13px 14px;cursor:pointer;font-family:var(--f);font-size:13px;color:var(--tx);text-align:left;width:100%;display:flex;gap:10px;align-items:flex-start;-webkit-appearance:none;transition:all .12s;line-height:1.55;position:relative;overflow:hidden}
.opt::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.03) 0%,transparent 50%);pointer-events:none}
.opt:active{transform:scale(.98)}.opt .lt{font-weight:800;flex-shrink:0;width:20px;font-family:var(--m);font-size:13px}
.opt.sel{border-color:var(--ac);background:var(--acBg)}.opt.sel .lt{color:var(--ac)}
.opt.ok{border-color:var(--ok);background:var(--okBg);color:var(--ok)}.opt.ok .lt{color:var(--ok)}
.opt.wr{border-color:var(--no);background:var(--noBg);color:var(--no)}.opt.wr .lt{color:var(--no)}
.opt.dm{opacity:.25;pointer-events:none}
.rbn{text-align:center;padding:14px;border-radius:12px;margin-bottom:12px;font-weight:800;font-size:16px;letter-spacing:-.2px}
.rbn.ok{background:var(--okBg);color:var(--ok);border:1px solid var(--okBd)}.rbn.no{background:var(--noBg);color:var(--no);border:1px solid var(--noBd)}
.expl{background:var(--c1);border:1px solid var(--bd);border-left:3px solid var(--ac);border-radius:var(--r);padding:14px 16px;font-size:13px;line-height:1.75;margin-bottom:14px;color:var(--t2)}.expl b{color:var(--tx);font-weight:600}
.acts{display:flex;gap:8px}.acts .btn{flex:1}
.mbar{background:linear-gradient(135deg,var(--c1),var(--c2));border:1px solid var(--bd);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.mbar .qc2{font-size:12px;color:var(--t2);font-weight:600}.mbar .tmr{font-family:var(--m);font-weight:700;font-size:16px;color:var(--ac)}
.pips{display:flex;gap:3px;margin-bottom:14px;flex-wrap:wrap}
.pips .p{width:7px;height:7px;border-radius:50%;background:var(--c3);transition:background .2s;flex-shrink:0}
.pips .p.dn{background:var(--ok)}.pips .p.wg{background:var(--no)}.pips .p.cu{background:var(--ac);box-shadow:0 0 6px var(--acBd)}
.rc{width:120px;height:120px;border-radius:50%;margin:20px auto;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;font-family:var(--m);border:4px solid;position:relative}
.rc.pa{border-color:var(--ok);color:var(--ok);background:var(--okBg)}.rc.fa{border-color:var(--no);color:var(--no);background:var(--noBg)}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.8)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.an{animation:su .25s ease both}.a1{animation-delay:.05s}.a2{animation-delay:.1s}.a3{animation-delay:.15s}.a4{animation-delay:.2s}
.pop{animation:pop .3s ease}.pulse{animation:pulse 1.5s ease infinite}

/* Full-screen PWA enhancements */
html{height:100%;height:-webkit-fill-available;touch-action:manipulation}
body{min-height:100vh;min-height:-webkit-fill-available;position:fixed;width:100%;
user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
*{-webkit-tap-highlight-color:transparent}
button{touch-action:manipulation;user-select:none;-webkit-user-select:none}
/* Prevent pull-to-refresh and overscroll bounce */
body{overscroll-behavior-y:contain}
#R{overscroll-behavior-y:contain}
/* Larger touch targets for mobile */
.opt{min-height:48px}
.btn{min-height:44px}
.ti{min-height:44px}
.ec{min-height:60px}
.df{min-height:36px}
.pips .p{width:9px;height:9px}
/* Status bar area for notch phones */
@supports(padding-top:env(safe-area-inset-top)){
  .hdr{padding-top:env(safe-area-inset-top)}
}
</style>
</head>

<script>
const Q=[{"e":"SPM","t":"Math & Physics","d":1,"q":"What is the SI unit of force?","o":["Watt","Newton","Joule","Pascal"],"c":1,"x":"Newton (N) measures force. 1N accelerates 1kg at 1 m/s\u00b2."},{"e":"SPM","t":"Math & Physics","d":1,"q":"Boyle's Law applies to gas at constant temperature. It states that:","o":["Pressure and volume are directly proportional","Pressure and volume are inversely proportional","Pressure and temperature are inversely proportional","Volume and temperature are directly proportional"],"c":1,"x":"P\u2081V\u2081 = P\u2082V\u2082. As pressure increases, volume decreases. Like compressing gas in a hydraulic accumulator."},{"e":"SPM","t":"Math & Physics","d":2,"q":"A lever has an effort arm of 18 inches and a resistance arm of 6 inches. The mechanical advantage is:","o":["3:1","6:1","12:1","108:1"],"c":0,"x":"MA = Effort Arm \u00f7 Resistance Arm = 18/6 = 3:1. Longer effort arm = less force needed."},{"e":"SPM","t":"Math & Physics","d":2,"q":"When temperature of a confined gas increases at constant volume, pressure will:","o":["Increase","Decrease","Stay the same","First increase then decrease"],"c":0,"x":"Gay-Lussac's Law: P directly proportional to T at constant V. Why accumulator pre-charge changes with temperature."},{"e":"SPM","t":"Math & Physics","d":3,"q":"A hydraulic piston with 5 sq in area at 3,000 PSI produces what force?","o":["600 lbs","3,005 lbs","15,000 lbs","8,000 lbs"],"c":2,"x":"F = P \u00d7 A = 3,000 \u00d7 5 = 15,000 lbs. Pascal's Law \u2014 foundational hydraulics."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Specific gravity compares a substance's density to:","o":["Air at sea level","Water","Hydraulic fluid","Aluminum"],"c":1,"x":"SG of water = 1.0. Hydraulic fluid \u2248 0.87. Used for fluid identification and weight calculations."},{"e":"SPM","t":"Math & Physics","d":4,"q":"An aircraft tire inflated to 180 PSI at 20\u00b0C sits on a ramp at 50\u00b0C. Approximate new pressure:","o":["180 PSI","189 PSI","198 PSI","210 PSI"],"c":2,"x":"Gay-Lussac's: P\u2082 = P\u2081 \u00d7 T\u2082/T\u2081 = 180 \u00d7 323/293 \u2248 198 PSI. Must use Kelvin! This is why tires are checked at ambient temp."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Charles's Law relates:","o":["Pressure and volume at constant temperature","Volume and temperature at constant pressure","Pressure and temperature at constant volume","Density and pressure at constant temperature"],"c":1,"x":"V\u2081/T\u2081 = V\u2082/T\u2082 at constant pressure. Volume directly proportional to absolute temperature."},{"e":"SPM","t":"Math & Physics","d":1,"q":"Stress is defined as:","o":["Total force applied","Force per unit area","Deformation per unit length","Energy stored in a spring"],"c":1,"x":"Stress = Force/Area (PSI or Pa). Same concept as hydraulic pressure."},{"e":"SPM","t":"Math & Physics","d":2,"q":"The total piston displacement of a reciprocating engine is:","o":["Volume displaced by one piston during half crankshaft revolution","Volume displaced by all pistons during one revolution","Volume displaced by all pistons during two revolutions","The cylinder bore times the stroke"],"c":1,"x":"Total displacement = volume displaced by ALL pistons during ONE crankshaft revolution (360\u00b0). Each cylinder fires once per two revolutions in a 4-stroke."},{"e":"SPM","t":"Math & Physics","d":3,"q":"What is the speed ratio of an input gear with 36 teeth meshed to a gear with 20 teeth?","o":["9:5","1:0.56","1:1.8","5:9"],"c":2,"x":"Speed ratio = driven/driving = 36/20 = 1.8. The smaller gear turns 1.8 times for every turn of the larger gear."},{"e":"SPM","t":"Math & Physics","d":4,"q":"A rectangular fuel tank measures 37.5\" \u00d7 14\" \u00d7 8.25\". Its volume in cubic inches is approximately:","o":["59.75","433.13","4,331.25","2,165.63"],"c":2,"x":"V = L\u00d7W\u00d7H = 37.5 \u00d7 14 \u00d7 8.25 = 4,331.25 cu in. At 231 cu in/gallon, that's about 18.75 gallons."},{"e":"SPM","t":"Electricity & Electronics","d":1,"q":"The unit of electrical resistance is:","o":["Volt","Ampere","Ohm","Watt"],"c":2,"x":"Resistance in Ohms (\u03a9). Think of it as a restriction in a hydraulic line."},{"e":"SPM","t":"Electricity & Electronics","d":1,"q":"Voltage in a hydraulic analogy is most like:","o":["Flow rate","Pressure","Pipe diameter","Viscosity"],"c":1,"x":"Voltage = Pressure, Current = Flow, Resistance = Restriction. Key analogy for hydraulic technicians."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"28V circuit, 4\u03a9 resistance. Current is:","o":["7 amps","112 amps","32 amps","0.14 amps"],"c":0,"x":"Ohm's Law: I = V/R = 28/4 = 7A. THE most important electrical formula."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"A capacitor in a circuit is most analogous to which hydraulic component?","o":["Pump","Accumulator","Relief valve","Check valve"],"c":1,"x":"Both store energy under pressure and release when needed. Both dampen surges."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"In a parallel circuit, total resistance is:","o":["Sum of all resistances","Greater than the largest","Less than the smallest individual resistance","Equal to the average"],"c":2,"x":"Parallel: more paths = less total opposition. Like parallel hydraulic return lines reducing back pressure."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"A diode allows current to flow:","o":["In both directions","In one direction only","Only when heated","In pulsing cycles"],"c":1,"x":"Electrical check valve. Forward bias = flow. Reverse bias = blocked."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"The binary number 00001111 equals what decimal number?","o":["31","15","8","16"],"c":1,"x":"(0+0+0+0+8+4+2+1) = 15. Digital avionics use binary extensively."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Total power in a 28V DC circuit drawing 5 amps:","o":["5.6W","33W","140W","23W"],"c":2,"x":"P = V \u00d7 I = 28 \u00d7 5 = 140W. Essential for electrical load analysis."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"A transistor is primarily used to:","o":["Store energy","Convert AC to DC","Amplify or switch electronic signals","Measure resistance"],"c":2,"x":"Building block of all digital electronics. Amplifies weak signals or switches circuits on/off."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Three 6-ohm resistors in series gives total resistance of:","o":["2\u03a9","6\u03a9","18\u03a9","36\u03a9"],"c":2,"x":"Series: Rt = R1+R2+R3 = 6+6+6 = 18\u03a9. Series adds; parallel reduces."},{"e":"SPM","t":"Electricity & Electronics","d":4,"q":"A 24V battery powers a 12\u03a9 and 24\u03a9 resistor in parallel. Total current draw:","o":["1A","2A","3A","4A"],"c":2,"x":"Parallel R = 1/(1/12+1/24) = 8\u03a9. I = V/R = 24/8 = 3A. Branch currents: 2A + 1A = 3A."},{"e":"SPM","t":"Electricity & Electronics","d":4,"q":"A 5A circuit breaker in a 28V DC system protects a maximum load of:","o":["5.6W","28W","140W","560W"],"c":2,"x":"P = V \u00d7 I = 28 \u00d7 5 = 140W. CB trips above 5A to protect wiring from overheating."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"Which device is commonly used as a rectifier in electrical circuits?","o":["Anodes","Cathodes","Diodes","Resistors"],"c":2,"x":"Diodes convert AC to DC (rectification). They pass current in one direction only."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"The opposition to AC flow produced by a magnetic field with generated back-EMF is called:","o":["Impedance","Reluctance","Inductive reactance","Capacitive reactance"],"c":2,"x":"Inductive reactance (XL) opposes AC current changes in a coil. XL = 2\u03c0fL. Increases with frequency and inductance."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"Through which material do magnetic lines of force pass most readily?","o":["Copper","Iron","Aluminum","Plastic"],"c":1,"x":"Iron is highly permeable to magnetic flux. This is why transformer cores and magneto pole shoes are made of iron/steel."},{"e":"SPM","t":"Electricity & Electronics","d":4,"q":"In a parallel circuit with four 6\u03a9 resistors across 24V, the voltage across the third resistor is:","o":["6V","18V","24V","8V"],"c":2,"x":"In parallel, voltage is the SAME across all branches. Each resistor sees full source voltage of 24V. Only current divides."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"What does the letter Q symbolize when measuring electrical charge?","o":["Farad","Electron","Coulomb","Ohm"],"c":2,"x":"Q = charge in Coulombs. One Coulomb = 6.24 \u00d7 10\u00b9\u2078 electrons. Current (I) = Q/time."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"What will a voltmeter read if properly connected across a CLOSED switch in a powered circuit?","o":["System voltage","Voltage drop of connected component","Zero voltage","Half system voltage"],"c":2,"x":"A closed (good) switch has no resistance = no voltage drop across it = reads 0V. A voltage reading across a closed switch indicates a bad connection."},{"e":"SPM","t":"Electricity & Electronics","d":2,"q":"Servicing nickel-cadmium and lead-acid batteries in the same area risks:","o":["No issue \u2014 electrolytes are the same","Only the NiCd would be affected","Contamination of both battery types","Only the lead-acid would be affected"],"c":2,"x":"NiCd uses potassium hydroxide, lead-acid uses sulfuric acid. Cross-contamination destroys both. Separate service areas required."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"AN bolt dash number 5 indicates a diameter of:","o":["5/8\"","5/32\"","5/16\"","5 mm"],"c":2,"x":"AN dash = diameter in 1/16\". AN5 = 5/16\". Length is the second number."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"DD (2024-T) rivets are used for:","o":["Non-structural general work","Structural repairs on aluminum alloy","Copper sheet work only","Temporary fastening"],"c":1,"x":"DD for structural. AD for general purpose. DD requires ice-box storage and driving within time limits after removal."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"When a castle nut doesn't align with the cotter pin hole within torque range:","o":["Back off to nearest hole","Continue tightening to next hole","Change nut or washer and try again","Use a larger cotter pin"],"c":1,"x":"Never back off \u2014 reduces clamping force. Advance to next alignment. Per FAA/TC standards."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"MS flareless fittings are identified by:","o":["A blue stripe","A flat on the sleeve","A groove on the nut","Red color coding"],"c":1,"x":"Flat on sleeve distinguishes MS flareless from AN flared fittings. Never interchange."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Torque values for aircraft bolts normally consider the threads to be:","o":["Clean and dry","Lubricated with oil","Coated with anti-seize compound","Slightly corroded"],"c":0,"x":"Standard torque values assume clean, dry threads. Lubrication changes friction and requires adjusted values (usually lower)."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Safety wire must be installed so tension tends to:","o":["Loosen the fastener for easy removal","Tighten the fastener","Pull the wire taut","Have no effect on the fastener"],"c":1,"x":"Safety wire pull direction must tighten, not loosen. Critical for vibration-prone aircraft hardware."},{"e":"SPM","t":"Aircraft Hardware","d":4,"q":"Self-locking nuts may be used on aircraft provided that:","o":["The bolt head is safety wired","A lock washer is also installed","The bolt or nut is not subject to rotation during operation","They are replaced after each removal"],"c":2,"x":"Self-locking nuts lose grip if the bolt rotates in service. They're for static applications only. Control surface hinges, engine mounts = no self-locking nuts."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"If a flared tube coupling nut is overtightened, the tube is most likely weakened at:","o":["Along the entire sleeve interface","At the edge of the sleeve and straight portion of tube","At the sleeve, fitting nut, or tube flare","Only at the flare itself"],"c":2,"x":"Overtightening damages the flare, cuts into the sleeve area, or cracks the nut. Proper torque with flared fittings is critical."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"What tool is best for cutting soft aluminum tubing?","o":["Hand-operated wheel-type tubing cutter","Angle grinder with cut-off wheel","Hacksaw with 32 TPI blade","Circular saw with abrasive wheel"],"c":0,"x":"Wheel-type cutter gives clean, burr-free cuts. Hacksaws leave burrs and chips that contaminate systems. Never use abrasive cutting on soft tubing."},{"e":"SPM","t":"Aircraft Hardware","d":4,"q":"Flattening of tubing in bends must not reduce the diameter below what percentage of the original OD?","o":["50%","65%","75%","90%"],"c":2,"x":"The small diameter of the flattened portion must not be less than 75% of the original OD. Below this restricts flow and weakens the tube."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"Hidden edges in a drawing are shown by:","o":["Medium weight short dashes evenly spaced","Solid thin lines","Alternating long and short dashes","Dotted lines with arrows"],"c":0,"x":"Hidden lines = short dashes. Center lines = alternating long-short. Visible edges = solid lines."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"Wing and stabilizer frames are located using:","o":["Dimension numbers","Station numbers","Scale numbers","Reference marks"],"c":1,"x":"Station numbers identify positions along the fuselage, wing, and stabilizer. Essential for locating repairs and components."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"What type of line alternates long and short dashes?","o":["Dimension line","Center line","Hidden line","Cutting plane line"],"c":1,"x":"Center lines use alternating long-short dashes. They show the center of circular features, bolt patterns, and symmetry axes."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Total weight 3,000 lbs, moment 150,000 in-lbs. CG is at:","o":["Station 50","Station 150","Station 500","Station 45"],"c":0,"x":"CG = Moment/Weight = 150,000/3,000 = Station 50."},{"e":"SPM","t":"Weight & Balance","d":1,"q":"The datum is:","o":["Always at the firewall","An imaginary reference plane for all measurements","The CG location","The main gear position"],"c":1,"x":"Manufacturer's arbitrary reference point. All arm measurements originate here."},{"e":"SPM","t":"Weight & Balance","d":4,"q":"Adding 100 lbs at station 80 to an aircraft weighing 2,000 lbs at CG station 50 moves CG to approximately:","o":["Station 51.4","Station 54.3","Station 65","Station 50"],"c":0,"x":"New CG = (2000\u00d750 + 100\u00d780)/2100 = 108000/2100 \u2248 51.4. Small weight far from CG moves it noticeably."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"What may cause erroneous scale readings during aircraft weighing?","o":["Wheel chocks removed","Parking brakes set","Low tire pressure","Open fuel caps"],"c":1,"x":"Set parking brakes = friction holds weight = scales read wrong. Brakes must be released. Also ensure level surface, no wind, full/empty fuel as specified."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"When calculating CG, the operating CG range is found in:","o":["The data plate","The Type Certificate Data Sheets","The pilot's personal logbook","The aircraft registration"],"c":1,"x":"TCDS contains CG limits, weights, configuration data. The TCDS is the authoritative document for CG range."},{"e":"SPM","t":"Metallurgy & Corrosion","d":1,"q":"Galvanic corrosion occurs between:","o":["Identical metals","Two dissimilar metals in contact","Only ferrous metals","Only when submerged"],"c":1,"x":"Dissimilar metals + electrolyte (moisture) = more anodic metal corrodes. Why we use barrier compounds between aluminum and steel."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"A black smoky residue streaming from rivets indicates:","o":["Filiform corrosion","Intergranular corrosion","Fretting corrosion","Galvanic corrosion"],"c":2,"x":"Fretting corrosion: microscopic movement between tightly fitted surfaces (rivet-to-skin) generates fine oxide particles. The black residue is aluminum oxide."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Intergranular corrosion attacks:","o":["Surface only","Grain boundaries of the alloy","Between rivet heads","Only ferrous metals"],"c":1,"x":"Invisible on surface while severely weakening structure internally. Very dangerous. Heat-treated aluminum alloys are especially susceptible."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"2024-T3 aluminum \u2014 the T3 indicates:","o":["Annealed","Solution heat treated then cold worked","Strain hardened only","Artificially aged"],"c":1,"x":"T3 = solution heat treated + cold worked. T6 = solution heat treated + artificially aged. Know temper designations."},{"e":"SPM","t":"Metallurgy & Corrosion","d":4,"q":"Stress corrosion cracking requires the simultaneous presence of:","o":["Water and salt only","Tensile stress, corrosive environment, and susceptible alloy","Any two dissimilar metals","UV radiation and moisture"],"c":1,"x":"All THREE must exist: sustained tensile stress + corrosive environment + susceptible material. Remove any one and SCC stops."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Clad aluminum alloys resist corrosion because:","o":["They are naturally corrosion resistant","Pure aluminum layers bonded to the core inhibit corrosion","An oxide film forms on contact with air","They contain chromium like stainless steel"],"c":1,"x":"Alclad has thin layers of commercially pure aluminum bonded to the high-strength core alloy. The pure aluminum sacrificially protects the core."},{"e":"SPM","t":"NDT","d":2,"q":"Magnetic particle inspection can detect:","o":["Only surface cracks","Surface AND near-subsurface cracks in ferromagnetic materials","Cracks in aluminum","Internal voids in composites"],"c":1,"x":"MPI for ferromagnetic metals only. Detects surface + shallow subsurface defects."},{"e":"SPM","t":"NDT","d":2,"q":"Eddy current inspection is used for:","o":["Internal engine wear","Surface/near-surface cracks in any conductive material","Composite delamination only","Fastener torque verification"],"c":1,"x":"Works on ANY conductive material (aluminum, titanium, steel). Common for landing gear bolt hole inspections."},{"e":"SPM","t":"NDT","d":3,"q":"Ultrasonic inspection detects flaws by:","o":["X-ray imaging","Measuring sound wave reflections from discontinuities","Magnetic fields","Chemical reactions"],"c":1,"x":"High-frequency sound reflects off internal flaws. Also measures thickness and finds composite delamination."},{"e":"SPM","t":"NDT","d":4,"q":"A titanium landing gear fitting needs subsurface crack inspection. Best NDT method:","o":["Dye penetrant","Visual with 10x magnification","Ultrasonic or radiographic inspection","Magnetic particle"],"c":2,"x":"Titanium is non-ferromagnetic (no MPI). PT only finds surface cracks. Subsurface = ultrasonic or radiographic. Classic TC trick question."},{"e":"SPM","t":"NDT","d":2,"q":"Dye penetrant inspection can ONLY detect:","o":["Subsurface cracks","Surface-breaking discontinuities","Internal porosity","Delamination"],"c":1,"x":"PT requires the crack to be open to the surface so the penetrant can enter by capillary action. Cannot find subsurface or closed cracks."},{"e":"SPM","t":"General Servicing","d":1,"q":"Class D fires involve:","o":["Ordinary combustibles","Flammable liquids","Electrical equipment","Combustible metals"],"c":3,"x":"D = metals (magnesium, titanium). A=ordinary, B=liquids, C=electrical. NEVER use water on metal fires."},{"e":"SPM","t":"General Servicing","d":2,"q":"Before jacking an aircraft, first:","o":["Raise rapidly to save time","Secure aircraft against movement and verify jack placement","Remove wheel chocks immediately","Deflate all tires"],"c":1,"x":"Safety first. Position jacks at certified points. Secure against wind. Raise slowly and evenly. Never work under aircraft supported only by jacks without safety stands."},{"e":"SPM","t":"General Servicing","d":4,"q":"When defueling aircraft, the critical safety requirement is:","o":["Perform inside hangar with fire suppression","Properly ground and bond aircraft to prevent static discharge","Run on external power","Pressurize the cabin"],"c":1,"x":"Static discharge during fueling/defueling can cause catastrophic fire. Grounding/bonding between aircraft, fuel truck, and ground is mandatory."},{"e":"SPM","t":"General Servicing","d":2,"q":"If a fire develops in an engine during starting, the correct action is:","o":["Shut off fuel immediately","Continue cranking to start engine and blow out fire","Abandon the aircraft","Apply halon to the intake"],"c":1,"x":"Continue cranking \u2014 the engine's airflow will draw the fire into the engine and extinguish it. Shutting off fuel while the starter is cranking also works. Stopping cranking traps the fire."},{"e":"SPM","t":"Tools & Measuring","d":1,"q":"0.375 inches equals:","o":["3/8\"","3/16\"","7/16\"","5/16\""],"c":0,"x":"Know decimal conversions: .125=1/8, .250=1/4, .375=3/8, .500=1/2, .625=5/8, .750=3/4."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Torque wrench should be stored at:","o":["Maximum setting","Lowest setting or zero","Midrange","Last used setting"],"c":1,"x":"Constant spring compression = permanent set = calibration drift. Always return to lowest/zero."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"A tap test on composite panel producing a dull thud indicates:","o":["Sound material","Delamination or disbond","Proper cure","Excess resin"],"c":1,"x":"Sharp ringing = good bond. Dull thud = delamination, void, or disbond underneath. Simple but effective first-line inspection."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Bend allowance depends on:","o":["Thickness only","Bend radius and thickness","Rivet spacing","Brake type"],"c":1,"x":"BA = f(thickness, bend radius, bend angle). Accounts for stretching outside and compression inside."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"The pot life of catalyzed resin refers to:","o":["Shelf life before mixing","Time the mixed resin remains workable","Cure time after layup","Storage temperature limit"],"c":1,"x":"Pot life = working time after catalyst is mixed in. Once exceeded, the resin is too viscous to use properly and must be discarded."},{"e":"SPM","t":"Sheet Metal & Composites","d":4,"q":"When drilling through composite laminate, the recommended technique is:","o":["High speed, high feed rate","Standard metal drilling at high RPM","Controlled speed with sharp bit and backing plate to prevent exit delamination","Punch a pilot hole then ream to size"],"c":2,"x":"Composites need special drilling: sharp bits, controlled feed, backing plates to prevent fiber breakout and delamination on exit. Standard metal techniques cause damage."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Using fiberglass repair techniques on advanced composites (carbon/kevlar) will likely result in:","o":["Restored strength","Slightly stronger repair","An unairworthy repair","Identical results"],"c":2,"x":"Advanced composites require specific materials and techniques. Fiberglass methods don't restore strength \u2014 the repair would be structurally inadequate and unairworthy."},{"e":"AF","t":"Aerodynamics","d":1,"q":"Lift is primarily created by:","o":["Engine thrust alone","Lower pressure above wing, higher below","Higher pressure above wing","Weight of aircraft"],"c":1,"x":"Bernoulli's principle: faster air over curved upper surface = lower pressure = net upward force (lift)."},{"e":"AF","t":"Aerodynamics","d":2,"q":"A stall occurs when:","o":["Engine quits","Angle of attack exceeds the critical angle","Airspeed drops to zero","Maximum altitude reached"],"c":1,"x":"Beyond critical AOA (\u224815-18\u00b0), airflow separates from upper surface. Can happen at ANY airspeed."},{"e":"AF","t":"Aerodynamics","d":2,"q":"Parasite drag consists of:","o":["Only induced drag","Form drag, skin friction, and interference drag","Only skin friction","Lift-related drag only"],"c":1,"x":"Form (shape) + skin friction (surface roughness) + interference (where components meet). Increases with speed\u00b2."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Induced drag is caused by:","o":["Surface roughness","Wingtip vortices from pressure differential","Engine exhaust","Ice accumulation"],"c":1,"x":"High pressure below spills around wingtip to low pressure above, creating vortices and induced drag. Decreases with speed."},{"e":"AF","t":"Aerodynamics","d":4,"q":"An aircraft in a 60\u00b0 bank turn experiences a load factor of approximately:","o":["1.2G","1.5G","2.0G","3.0G"],"c":2,"x":"Load factor = 1/cos(bank angle) = 1/cos(60\u00b0) = 2G. Stall speed increases by \u221aload factor. At 2G, stall speed increases 41%."},{"e":"AF","t":"Aerodynamics","d":2,"q":"The purpose of wing slats is to:","o":["Reduce stalling speed","Decrease drag at cruise","Reduce lift for descent","Increase structural strength"],"c":0,"x":"Slats extend from the leading edge at high AOA, creating a slot that energizes boundary layer airflow, delaying stall to a higher AOA = lower stall speed."},{"e":"AF","t":"Structures","d":2,"q":"On a semi-monocoque fuselage, bending loads are primarily carried by:","o":["Ribs and formers","Longerons and stringers","Bulkheads and skin","Frames only"],"c":1,"x":"Longerons and stringers carry bending (tension/compression) loads. Skin carries shear and torsion. Formers give shape."},{"e":"AF","t":"Structures","d":2,"q":"Minimum rivet edge distance is:","o":["2\u00d7 rivet diameter","3\u00d7 rivet diameter","1.5\u00d7 rivet diameter","4\u00d7 rivet diameter"],"c":0,"x":"2D from center of rivet to sheet edge. Less = risk of cracking or pullthrough. Rivet pitch (spacing) = typically 3D minimum."},{"e":"AF","t":"Structures","d":2,"q":"Honeycomb sandwich construction saves weight because:","o":["It uses less adhesive","Face sheets carry bending while lightweight core resists shear","Core carries all loads alone","It eliminates the need for fasteners"],"c":1,"x":"Faces handle tension/compression. Core handles shear and separates faces. Excellent strength-to-weight ratio."},{"e":"AF","t":"Structures","d":3,"q":"Standard repair for composite laminates is:","o":["Welding","Riveting a metal doubler","Step-cut or scarf repair with layup patches","Filling with structural putty"],"c":2,"x":"Scarf/step repairs taper damaged plies and rebuild with new material matching original layup. Maintains structural integrity and aerodynamic smoothness."},{"e":"AF","t":"Structures","d":4,"q":"A stop-drilled crack in aircraft skin is:","o":["A permanent repair","A temporary measure to arrest crack propagation pending permanent repair","An STC modification","Not acceptable practice"],"c":1,"x":"Stop-drilling relieves stress at crack tip to temporarily halt growth. It is NOT permanent \u2014 approved permanent repair must follow."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Differential ailerons: the up-going aileron deflects:","o":["Same as down","MORE than down-going","LESS than down-going","Not at all"],"c":1,"x":"Up deflects more to compensate for adverse yaw from the down aileron's extra drag."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Cable tension varies with temperature because:","o":["Cables expand when hot, lowering tension","Temperature has no effect","Only pulleys are affected","Cables shrink when hot"],"c":0,"x":"Hot = expand = lower tension. Cold = contract = higher tension. Use temperature-corrected rigging charts."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"A balance tab moves:","o":["Same direction as surface","Opposite to surface to reduce pilot effort","Only with autopilot","Only at high speed"],"c":1,"x":"Balance tabs use aerodynamic force opposite to surface movement to assist the pilot. Reduces stick forces."},{"e":"AF","t":"Fixed-Wing Controls","d":4,"q":"A mass balance on a control surface prevents:","o":["Overcontrol by the pilot","Flutter from aerodynamic-inertial coupling","Cable stretching","Hydraulic boost failure"],"c":1,"x":"Mass balance moves surface CG forward to hinge line, preventing destructive flutter. Removal or damage = serious airworthiness issue. Potential for catastrophic structural failure."},{"e":"AF","t":"Fixed-Wing Controls","d":2,"q":"Rigging alignment checks should position the aircraft with:","o":["Tail into wind","Left wing into wind","Nose into wind","In any direction"],"c":2,"x":"Nose into wind prevents false readings from crosswind loading on control surfaces during rigging checks."},{"e":"AF","t":"Rotary-Wing","d":1,"q":"Anti-torque in a conventional helicopter is provided by:","o":["Main rotor","Tail rotor","Engine","Landing gear"],"c":1,"x":"Tail rotor produces sideways thrust to counteract main rotor torque reaction on the fuselage."},{"e":"AF","t":"Rotary-Wing","d":1,"q":"The collective pitch control changes:","o":["All blade pitches simultaneously","Each blade individually per revolution","Tail rotor only","Engine RPM only"],"c":0,"x":"Collective = all blades equally and simultaneously. Raising = more pitch = more lift."},{"e":"AF","t":"Rotary-Wing","d":1,"q":"The cyclic pitch control:","o":["Changes all blades equally","Varies each blade's pitch as it rotates to tilt the disc","Controls tail rotor","Adjusts engine RPM"],"c":1,"x":"Cyclic varies pitch per revolution \u2014 more pitch on one side tilts disc for directional flight."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"Autorotation occurs when:","o":["Engine at max power","Air flows UP through rotor disc during descent after engine failure","Tail rotor fails","Collective is fully raised"],"c":1,"x":"Descent forces air upward through disc, spinning blades like a windmill. Pilot lowers collective immediately to maintain RPM."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"Dissymmetry of lift refers to:","o":["Unequal lift between advancing and retreating blades","Main vs tail rotor difference","Unequal weight distribution","Altitude-related lift variation"],"c":0,"x":"Advancing blade = higher airspeed = more lift. Retreating = lower airspeed = less lift. Compensated by flapping/feathering."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"In a fully articulated rotor, each blade can:","o":["Only flap","Flap, lead-lag, and feather","Only feather","Flap and lead-lag only"],"c":1,"x":"3 axes: flap (up/down), lead-lag (fore/aft), feather (pitch change). Each blade has separate hinges."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"Translational lift occurs at approximately:","o":["0-5 knots","15-24 knots","50+ knots","Only in hover"],"c":1,"x":"At ETL (15-24 kts), helicopter moves into clean air, rotor efficiency jumps. Feel a surge and slight vibration."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"Ground effect increases rotor efficiency because:","o":["Air is denser near ground","Tip vortices are disrupted, reducing induced drag","Fuselage provides extra lift","Ground pushes air upward"],"c":1,"x":"Ground disrupts tip vortices = less induced drag = more efficient hover. IGE requires less power than OGE."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"A semi-rigid (teetering) rotor has:","o":["Individual hinges per blade","A single teetering hinge for two rigidly connected blades","No hinges at all","Only feathering bearings"],"c":1,"x":"Two blades rigidly connected, pivoting on one teetering hinge. Simple, light, limited to 2 blades. Bell 206, R22/R44."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Retreating blade stall occurs when:","o":["All blades stall together","Retreating blade exceeds critical AOA at high forward speed","Advancing blade produces too much lift","Helicopter is hovering"],"c":1,"x":"At high speed, retreating blade airspeed is very low \u2014 AOA increases until stall. This limits helicopter max forward speed."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"Lead-lag (drag) hinges compensate for:","o":["Blade pitch changes","Coriolis effect as blades flap up and down","Ground resonance only","Collective input"],"c":1,"x":"Flapping up = blade radius shortens = blade speeds up (Coriolis). Lead-lag hinges allow fore/aft movement. Dampers prevent ground resonance."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Ground resonance is caused by:","o":["Strong crosswinds","Blade lead-lag oscillation coupling with helicopter rocking on landing gear","Excessive rotor RPM","Tail rotor failure"],"c":1,"x":"Destructive self-reinforcing oscillation. Fix: increase RPM to fly OR decrease to stop rotor. Lead-lag dampers prevent it."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"Blade tracking ensures:","o":["All blades at same RPM","All blade tips follow the same tip-path plane","Tail rotor alignment","Engine vibration reduction"],"c":1,"x":"Out-of-track blades cause vibration at 1/rev frequency. Adjusted by changing pitch link rod end length."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"The freewheeling unit (overrunning clutch) allows:","o":["Variable engine speed","Rotor to continue turning when engine fails or is at lower RPM","Transmission gear shifting","Independent tail rotor operation"],"c":1,"x":"Automatically disconnects engine from rotor for autorotation. Like bicycle freewheel \u2014 pedals stop, wheel keeps going."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"Coning of rotor blades is caused by:","o":["Excessive speed","Combined lift (up) and centrifugal force (outward)","Engine vibration","Blade imbalance"],"c":1,"x":"Lift pulls up, centrifugal pulls outward = cone angle. Excessive coning = overloading or dangerously low RPM."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Loss of Tail Rotor Effectiveness (LTE) is most dangerous during:","o":["High-speed cruise","Low-speed flight, hover, or hover turns","Autorotation","High altitude cruise"],"c":1,"x":"At low speed, vertical fin can't help. Certain wind directions reduce tail rotor authority. Can result in uncontrollable yaw."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"The swashplate consists of:","o":["A single rotating disc","A stationary plate and rotating plate connected by bearings","Engine mounting plate","Transmission housing"],"c":1,"x":"Translates non-rotating pilot inputs to rotating blade pitch changes via pitch links."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"The tail rotor provides:","o":["Altitude control","Torque compensation and directional control","Forward thrust","Lift augmentation"],"c":1,"x":"Tail rotor counteracts main rotor torque AND provides yaw (directional) control via pedals."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"The three main rotor system types are:","o":["Fully articulated, semi-rigid, and rigid (hingeless)","Small, medium, and large","Two-blade, three-blade, and four-blade","Clockwise, counterclockwise, and dual rotation"],"c":0,"x":"Fully articulated (3 hinges per blade), semi-rigid (teetering), rigid/hingeless (flexibility replaces hinges). Know characteristics of each."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"During a hovering autorotation, the pilot must:","o":["Apply full collective immediately","Apply aft cyclic and increase collective just before touchdown to cushion landing","Maintain collective position","Push cyclic forward and add power"],"c":1,"x":"In hovering auto: RPM decays fast. Use stored RPM energy by pulling collective at last moment to cushion. Timing is everything."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"Mast bumping in a semi-rigid rotor occurs when:","o":["RPM is too high","Low or negative G conditions allow rotor hub to contact mast stop","Main blade strikes tail boom","Engine torque exceeds limits"],"c":1,"x":"Semi-rigid: low/negative G \u2192 excessive flapping \u2192 hub contacts mast \u2192 can sever mast. FATAL. Prevent by maintaining positive G always."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"Dynamic rollover can occur when:","o":["Flying at high altitude","One skid/wheel is the pivot point and lateral force tips helicopter past critical roll angle","Autorotating","During cruise flight"],"c":1,"x":"With one skid as pivot, if roll rate exceeds pilot's correction ability, helicopter rolls over. Common during slope ops and crosswind takeoffs."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Vibration at one-per-revolution (1/rev) frequency in a helicopter usually indicates:","o":["Engine problem","Main rotor blade tracking or balance issue","Tail rotor problem","Transmission bearing failure"],"c":1,"x":"1/rev = once per main rotor revolution = main rotor issue (tracking, balance, pitch link). 2/rev on a 2-blade helicopter can indicate a different issue. Tail rotor is higher frequency."},{"e":"AF","t":"Rotary-Wing","d":2,"q":"The helicopter anti-torque pedals control:","o":["Main rotor pitch","Tail rotor blade pitch for yaw control","Cyclic input","Collective pitch"],"c":1,"x":"Pedals change tail rotor pitch: more pitch = more anti-torque. Used for yaw (directional) control and to maintain heading in hover."},{"e":"AF","t":"Hydraulics & Pneumatics","d":1,"q":"An accumulator's primary purpose:","o":["Filter fluid","Store energy and dampen pressure surges","Increase pressure above pump output","Cool fluid"],"c":1,"x":"Stores energy, dampens surges, provides emergency pressure for critical systems."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"A relief valve opens at 3,000 PSI. At 3,100 PSI it:","o":["Stays closed","Routes excess fluid to reservoir","Locks permanently open","Shuts down pump"],"c":1,"x":"Routes excess fluid to reservoir. Closes when pressure drops. Automatic overpressure protection."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Cavitation in a hydraulic pump is caused by:","o":["Excess pressure","Air on suction side or insufficient fluid supply","Contamination alone","Overtightened mounting"],"c":1,"x":"Vapor bubbles collapse violently and damage pump internals. Caused by restricted suction, low reservoir, air leaks."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Skydrol (phosphate ester) fluid is:","o":["Red","Purple/violet and fire-resistant","Green","Clear"],"c":1,"x":"Purple = Skydrol = fire resistant. Red = MIL-H-5606/83282. NEVER mix \u2014 chemically incompatible, destroys seals."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"Which component allows fluid flow in one direction only?","o":["Check valve","Sequence valve","Relief valve","Selector valve"],"c":0,"x":"Check valve = one-way flow. Like a diode in electricity. Prevents reverse flow in hydraulic circuits."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"The most common hydraulic seal type for preventing leakage in both directions is:","o":["O-ring","V-ring","U-ring","Lip seal"],"c":0,"x":"O-rings are the most versatile and common seal in hydraulic systems. Used for static and dynamic applications."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"Phosphate ester hydraulic fluid is susceptible to contamination from:","o":["Rapid temperature changes","Water in the atmosphere","Icing conditions","UV radiation"],"c":1,"x":"Skydrol absorbs moisture from air. Water contamination degrades fluid and causes corrosion of internal components. Keep containers sealed."},{"e":"AF","t":"Hydraulics & Pneumatics","d":4,"q":"A hydraulic pressure line filter has its differential pressure indicator (red button) popped. This means:","o":["System operating normally","Filter element contaminated \u2014 flow approaching bypass condition","Fluid level is low","Pump is failing"],"c":1,"x":"Delta-P indicator shows filter is clogging. At threshold, bypass valve opens allowing unfiltered fluid through. Filter change required immediately."},{"e":"AF","t":"Hydraulics & Pneumatics","d":2,"q":"The internal resistance of a fluid that tends to prevent it from flowing is called:","o":["Volatility","Viscosity","Stability","Density"],"c":1,"x":"Viscosity = fluid's resistance to flow. Critical hydraulic property. Changes with temperature \u2014 thinner when hot, thicker when cold."},{"e":"AF","t":"Landing Gear","d":1,"q":"An oleo strut uses:","o":["Compressed air only","Hydraulic fluid only","Nitrogen gas and hydraulic fluid together","Spring steel"],"c":2,"x":"N\u2082 gas provides spring action. Fluid forced through orifice provides damping. You've serviced hundreds of these."},{"e":"AF","t":"Landing Gear","d":2,"q":"Shimmy dampers prevent:","o":["Landing shock","Rapid side-to-side nose wheel oscillation","Gear retraction","Steering angle limits"],"c":1,"x":"Hydraulic or friction type. Failed shimmy damper = dangerous vibration during taxi and ground operations."},{"e":"AF","t":"Landing Gear","d":2,"q":"Antiskid brake systems prevent:","o":["In-flight braking","Wheel lockup during landing rollout","Gear retraction on ground","Nose wheel shimmy"],"c":1,"x":"Detects impending lockup \u2192 momentarily releases brake pressure. Similar to automotive ABS but more sophisticated."},{"e":"AF","t":"Landing Gear","d":2,"q":"Excessive wear in the CENTER of a tire tread indicates:","o":["Misalignment","Underinflation","Overinflation","Normal wear"],"c":2,"x":"Center wear = overinflation (center bulges, carries more load). Edge wear = underinflation. Even wear = correct pressure."},{"e":"AF","t":"Landing Gear","d":3,"q":"When servicing an empty oleo strut, it should be fully compressed and extended several times to:","o":["Lubricate piston rod","Force out excess fluid","Ensure proper seal seating and removal of air bubbles","Check for leaks"],"c":2,"x":"Cycling removes trapped air and seats the packing rings properly. Trapped air causes spongy or bouncy action."},{"e":"AF","t":"Landing Gear","d":3,"q":"A fusible plug in a wheel assembly that shows core deformation requires:","o":["Only affected plugs replaced","All fusible plugs replaced","New wheel assembly","No action if not fully melted"],"c":1,"x":"Any deformation means the plug experienced excessive heat. Replace ALL plugs \u2014 if one deformed, others were also heat-stressed. Overheated brakes are the usual cause."},{"e":"AF","t":"Landing Gear","d":4,"q":"A squat switch (WOW sensor) provides air/ground logic for:","o":["Only landing gear retraction lockout","Multiple systems: gear retraction lockout, spoiler arming, thrust reverser enable, pressurization mode, and more","Only the landing gear indicator lights","Only the brake system"],"c":1,"x":"WOW sensors feed many aircraft systems. Understanding air/ground logic is critical for troubleshooting multiple system interactions."},{"e":"AF","t":"Landing Gear","d":2,"q":"The landing gear warning horn sounds when:","o":["Gear locked down and throttle retarded","Gear locked down and throttle advanced","Gear NOT locked down and throttle retarded for landing","Gear extended during cruise"],"c":2,"x":"Warning alerts pilot that gear isn't down and locked when power is reduced for landing. Prevents gear-up landings."},{"e":"AF","t":"Landing Gear","d":2,"q":"Landing gear retraction tests should be performed:","o":["During a test flight","With aircraft on jacks","During taxi","With engines running only"],"c":1,"x":"Aircraft on jacks for retraction testing. NEVER retract on the ground without proper jacking. Verify all safety interlocks."},{"e":"AF","t":"Landing Gear","d":2,"q":"An anti-skid braking system is classified as:","o":["A purely hydraulic system","An electrohydraulic system","A purely electrical system","A pneumatic system"],"c":1,"x":"Antiskid combines electrical sensors (wheel speed) with hydraulic modulation (brake pressure). Electrohydraulic system."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Thermal anti-ice works by:","o":["Vibrating surfaces","Continuously heating leading edges to prevent ice formation","Chemical application","Inflating rubber boots"],"c":1,"x":"Anti-ice = prevention (continuous heat). De-ice = removal (cyclic). Thermal uses bleed air or electric heaters."},{"e":"AF","t":"Ice & Rain Protection","d":2,"q":"Pneumatic de-ice boots:","o":["Inflate continuously","Cyclically inflate and deflate to crack and shed ice","Heat the surface","Apply glycol"],"c":1,"x":"Cyclic inflation cracks ice. Don't activate too early \u2014 ice bridges over the inflated boot shape and becomes harder to remove."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"The most common aircraft anti-icing systems are:","o":["Only electrical heating","Thermal pneumatic, thermal electric, and chemical","Only chemical (glycol)","Only rubber boots"],"c":1,"x":"Three types: thermal pneumatic (bleed air), thermal electric (heating elements), and chemical (glycol/TKS). Each has different applications."},{"e":"AF","t":"Fuel Systems","d":2,"q":"Fuel tank vents prevent:","o":["Evaporation","Vacuum formation as fuel is consumed","Pressure increase","Water ingestion"],"c":1,"x":"Consumed fuel must be replaced by air. Without venting = vacuum = stops flow or collapses tank."},{"e":"AF","t":"Fuel Systems","d":2,"q":"The purpose of a fuel boost pump:","o":["Increase octane","Provide positive pressure and prevent vapor lock","Transfer between tanks only","Filter fuel"],"c":1,"x":"Positive pressure to engine-driven pump prevents vapor lock at altitude. Also used for start, transfer, and backup."},{"e":"AF","t":"Fuel Systems","d":2,"q":"The primary purpose of a crossfeed system is:","o":["It allows any tank to supply any engine","It bypasses the shutoff valve","It divides fuel to injectors","It measures fuel quantity"],"c":0,"x":"Crossfeed enables fuel management between tanks for CG balance and single-engine emergencies."},{"e":"AF","t":"Fuel Systems","d":2,"q":"The fuel tank sump provides:","o":["A way to shut off fuel","A place for water and contaminants to settle with a drain valve","A way to manually operate valves","Fuel quantity indication"],"c":1,"x":"Water is heavier than fuel and settles to the bottom. Sumps collect it for draining during preflight and maintenance."},{"e":"AF","t":"Fuel Systems","d":4,"q":"Some turbine aircraft have a fuel temperature indicator because:","o":["To monitor flow during ice crystal formation","To monitor fuel temperature at altitude where water in fuel may freeze","To measure fuel quantity when ice forms","To determine fuel grade"],"c":1,"x":"Water in jet fuel freezes at altitude and blocks fuel filters. The temperature indicator warns when fuel approaches freezing point."},{"e":"AF","t":"Fire Protection","d":2,"q":"Continuous-loop fire detection works by:","o":["Smoke density sensing","Resistance decrease as temperature rises","UV detection","CO detection"],"c":1,"x":"Sensing element resistance drops with heat \u2192 fire warning triggers. Any hot spot along the loop activates it."},{"e":"AF","t":"Electrical Systems","d":2,"q":"A bus bar serves as:","o":["AC/DC converter","Common power distribution point for multiple circuits","Circuit protection device","Energy storage"],"c":1,"x":"Main bus, essential bus, emergency bus \u2014 different buses serve different priority levels of equipment."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Circuit-protective devices in aircraft include:","o":["Circuit breakers, relays, and current limiters","Circuit breakers, fuses, and current limiters","Circuit breakers, capacitors, and current limiters","Fuses, diodes, and transformers"],"c":1,"x":"CBs, fuses, and current limiters protect wiring from overcurrent damage. CBs are resettable; fuses must be replaced."},{"e":"AF","t":"Electrical Systems","d":2,"q":"Wires passing through bulkheads should be protected by:","o":["Aerodynamic tape","A suitable grommet","Plastic spiral wrap","Nothing if properly routed"],"c":1,"x":"Grommets prevent chafing where wires pass through holes in bulkheads, firewalls, and ribs. Chafing = insulation damage = short circuits = fire risk."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Multiple splices in a wire bundle should be:","o":["Grouped together for inspection","Staggered along the bundle length","Splicing in bundles is not permitted","Located at wire termination only"],"c":1,"x":"Staggering prevents a bulge in the bundle that could cause chafing, overheating, or difficulty routing through clamps."},{"e":"AF","t":"Instruments","d":2,"q":"Pitot-static system provides data for:","o":["Altimeter, airspeed, and VSI","Compass and turn coordinator","Engine instruments","Attitude indicator"],"c":0,"x":"Pitot = dynamic pressure (airspeed). Static = atmospheric pressure (altimeter, VSI). Three instruments from two sources."},{"e":"AF","t":"Instruments","d":3,"q":"Blocked static port during climb causes altimeter to:","o":["Freeze at altitude when blockage occurred","Continue correctly","Read higher than actual","Fluctuate randomly"],"c":0,"x":"Trapped pressure = frozen indication. VSI reads zero. Airspeed indicator becomes inaccurate."},{"e":"AF","t":"Instruments","d":2,"q":"At sea level, standard atmospheric pressure is:","o":["29.92\" Hg","29.92 millibars","1013.25\" Hg","14.7\" Hg"],"c":0,"x":"29.92\" Hg = 1013.25 hPa = 14.7 PSI at standard sea level. The altimeter setting reference."},{"e":"AF","t":"Instruments","d":2,"q":"A magnetic compass can be compensated for:","o":["Deviation","Variation","Current","Dip error"],"c":0,"x":"Deviation (caused by aircraft magnetic fields) can be compensated using the compensator screws. Variation (magnetic vs true north) and dip cannot."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"TCAS provides:","o":["Weather data","Traffic alerts and resolution advisories for collision avoidance","Navigation guidance","Engine monitoring"],"c":1,"x":"Interrogates transponders. TAs (alert) and RAs (climb/descend commands). Independent of ATC."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"The FDR must retain data for the last:","o":["30 minutes","2 hours","25 hours","72 hours"],"c":2,"x":"FDR = 25 hours of hundreds of parameters. CVR = last 2 hours of audio. Both are crash-survivable."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"A DME antenna should be installed:","o":["Not blanked by the wing during banks","Not blanked by the vertical stabilizer","Aligned with the centerline","Near the VOR antenna"],"c":2,"x":"DME antenna on aircraft centerline (usually belly) ensures signal reception regardless of bank angle."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"The preferred location for an ELT is:","o":["As far forward as possible","At the lowest point in fuselage","As far aft as possible but forward of the empennage","On the wing"],"c":2,"x":"Far aft = most survivable area in a crash. Forward of empennage to avoid crushing. Must survive impact and transmit distress signal."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"The primary purpose of an autopilot is:","o":["To relieve the pilot during long flights","To allow more precise flying in turbulence","To replace the pilot entirely","To reduce fuel consumption"],"c":0,"x":"Autopilot reduces pilot workload during cruise, allowing attention to navigation, systems monitoring, and communications."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"Cabin pressure is controlled by:","o":["Air entering the cabin","The outflow valve regulating air leaving the cabin","Engine bleed air temperature","Emergency oxygen flow"],"c":1,"x":"Outflow valve modulates exit airflow. More open = less pressure. Controller adjusts for desired cabin altitude."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"The purpose of aircraft pressurization is:","o":["To permit flight in thunderstorms","To allow systems to operate properly","To make human flight possible in the hostile upper atmosphere","To increase airspeed"],"c":2,"x":"Above ~10,000 ft, humans need supplemental oxygen. Pressurization maintains a comfortable cabin altitude (typically 6,000-8,000 ft) while aircraft cruises at 30,000+ ft."},{"e":"AF","t":"Cabin & Atmospheric","d":2,"q":"A demand-flow oxygen system:","o":["Flows oxygen continuously","Delivers oxygen only when the user inhales","Only activates during decompression","Provides oxygen during engine start"],"c":1,"x":"Demand-flow conserves oxygen by delivering only during inhalation. Diluter-demand mixes with ambient air at lower altitudes."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"The main cause of contamination in a gaseous oxygen system is:","o":["Moisture","Dust","Nitrogen","Fuel vapor"],"c":0,"x":"Moisture in oxygen systems can freeze and block valves/regulators at altitude. Also promotes corrosion. Keep systems dry."},{"e":"PP","t":"Reciprocating Engines","d":1,"q":"The four-stroke cycle order is:","o":["Intake, compression, power, exhaust","Start, run, stop, restart","Fuel, air, spark, exhaust","Intake, power, compression, exhaust"],"c":0,"x":"Suck, Squeeze, Bang, Blow. Each stroke = 180\u00b0 of crank rotation. Full cycle = 720\u00b0."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Detonation is:","o":["Normal combustion too slowly","Spontaneous explosion of unburned mixture ahead of flame front","Excessive fuel","Low cylinder temperature"],"c":1,"x":"Uncontrolled explosion creates extreme pressure spikes. Causes: high manifold pressure, lean mixture, low octane, high CHT."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Compression ratio is:","o":["BHP / FHP","Cylinder volume at BDC / volume at TDC","Intake / exhaust ratio","Fuel / air ratio"],"c":1,"x":"Higher ratio = more power/efficiency but more detonation risk. Aircraft: typically 6:1 to 8.5:1."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"Pre-ignition differs from detonation in that pre-ignition is:","o":["The same thing as detonation","Ignition BEFORE the spark, caused by a hot spot in the combustion chamber","Only occurs at altitude","Less damaging than detonation"],"c":1,"x":"Detonation = normal spark then unburned charge explodes. Pre-ignition = hot spot ignites mixture BEFORE spark. Both destructive; pre-ignition often worse."},{"e":"PP","t":"Reciprocating Engines","d":2,"q":"Engine trend monitoring detects:","o":["Idle RPM drift","Gradual deterioration by comparing to baseline data","Instrument calibration issues","Fuel quality changes"],"c":1,"x":"Trending EGT, oil pressure, consumption over time catches developing problems before failure."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"The offset between crankshaft throws determines the engine's:","o":["Compression ratio","Firing order and smoothness of power delivery","Oil consumption","Maximum RPM"],"c":1,"x":"Crank throws are offset to distribute power impulses evenly. Firing order ensures consecutive cylinders don't fire in sequence to balance loads."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"Carburetor icing most likely when:","o":["Very hot, low humidity","OAT -10\u00b0C to +25\u00b0C with high humidity","Below -30\u00b0C","Only in winter"],"c":1,"x":"Can form even on warm days! Venturi + fuel evaporation = 30-40\u00b0C temperature drop."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"Fuel injection vs carburetor provides:","o":["Simpler construction","More uniform fuel distribution to all cylinders","Higher fuel consumption","Greater icing susceptibility"],"c":1,"x":"Direct metering to each cylinder = even distribution. No venturi = no carb icing risk."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"A turbocharger maintains power at altitude by:","o":["Increasing engine RPM","Compressing intake air using exhaust-driven compressor","Reducing fuel consumption","Cooling exhaust gases"],"c":1,"x":"Exhaust drives turbine \u2192 spins compressor \u2192 pressurizes intake air. Wastegate controls boost pressure."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Magneto ignition is independent of the electrical system because:","o":["It's cheaper","Ignition continues with total electrical failure","Magnetos produce DC","Battery can't make enough spark"],"c":1,"x":"Magnetos generate own electricity mechanically. Ignition continues with total battery/alternator failure. Critical safety."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"During magneto check, excessive RPM drop on one magneto indicates:","o":["Normal operation","A problem with that magneto, wiring, or spark plugs","The other magneto is faulty","Engine is over-boosted"],"c":1,"x":"Each magneto fires one set of plugs. Excessive drop = that system failing. NO drop is also bad \u2014 may mean P-lead disconnected (magneto always hot = fire hazard)."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"The E-gap on a magneto is:","o":["Spark plug electrode gap","Angular position where primary circuit interrupts for maximum spark","Clearance between magneto and engine","Distributor contact gap"],"c":1,"x":"E-gap = exact position where points open when magnetic field change rate is maximum = strongest spark."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"SOAP (Spectrometric Oil Analysis) detects:","o":["Oil viscosity","Metal wear particles indicating developing internal problems","Oil pressure","Filter condition"],"c":1,"x":"Trace metals in oil identify specific wearing components. Trending catches problems long before failure."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Excessive CHT can be caused by:","o":["Rich mixture","Lean mixture or blocked cooling fins","Low oil temperature","High RPM at low altitude"],"c":1,"x":"Lean = burns hotter. Blocked fins = restricted cooling airflow. Both cause high CHT \u2192 detonation \u2192 damage."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil filters on aircraft engines are typically one of these types:","o":["Screen, Cuno, canister, or spin-on","Only spin-on","Only screen type","Only centrifugal"],"c":0,"x":"Four main types. Screen is simplest. Cuno (edge-type) can be cleaned. Canister and spin-on contain disposable media elements."},{"e":"PP","t":"Turbine Engines","d":1,"q":"Three main turbine engine sections:","o":["Fan, combustion, nozzle","Compressor, combustion chamber, turbine","Inlet, fan, exhaust","Gearbox, combustion, propeller"],"c":1,"x":"Compressor (squeeze air), Combustion (add fuel + ignite), Turbine (extract energy to drive compressor and accessories)."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Bypass ratio in a turbofan is:","o":["Fuel / air ratio","Fan duct air / core air","Compressor / turbine stages","Thrust / fuel consumption"],"c":1,"x":"High bypass (6-12:1) = quieter, more efficient. Most thrust from fan, not hot exhaust."},{"e":"PP","t":"Turbine Engines","d":2,"q":"A compressor stall is caused by:","o":["Excessive fuel flow","Disrupted airflow causing blade AOA issues","Low EGT","Normal deceleration"],"c":1,"x":"Blade airflow separation \u2014 like a wing stall. Causes: rapid throttle movement, FOD, inlet distortion. Like cavitation in hydraulics."},{"e":"PP","t":"Turbine Engines","d":2,"q":"The hot section includes:","o":["Fan and inlet","Compressor","Combustion chamber and turbine section","Exhaust nozzle only"],"c":2,"x":"Temps exceed 1,700\u00b0C. Life-limited components due to thermal fatigue and creep."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Compressor bleed air is used for:","o":["Combustion cooling","Cabin pressurization, anti-ice, pneumatics, and stall prevention","Increasing thrust","Fuel cooling"],"c":1,"x":"Powers cabin air, anti-ice, hydraulic reservoir pressurization, starting. Some stabilizes compressor at low speeds."},{"e":"PP","t":"Turbine Engines","d":3,"q":"A hung start means:","o":["Normal acceleration","Light-off occurs but engine stays below idle RPM with rising EGT","No light-off","Engine over-speed"],"c":1,"x":"Insufficient energy to reach self-sustaining speed. EGT keeps rising. Abort to prevent turbine damage."},{"e":"PP","t":"Turbine Engines","d":3,"q":"A hot start means:","o":["EGT exceeds limits during start sequence","Engine starts faster than normal","Starter overheats","Oil temperature too high"],"c":0,"x":"Too much fuel or insufficient airflow during start. Abort immediately. Continued operation destroys turbine blades."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Thrust equals:","o":["RPM only","Mass airflow \u00d7 change in velocity","EGT only","Compressor ratio only"],"c":1,"x":"F = \u1e41 \u00d7 \u0394V. More air at higher velocity change = more thrust. Newton's Third Law."},{"e":"PP","t":"Turbine Engines","d":4,"q":"A wet start (no light-off, then delayed ignition of accumulated fuel) is dangerous because:","o":["It wastes fuel","It can cause severe over-temperature or tailpipe fire from sudden ignition of pooled fuel","It reduces engine life slightly","It is actually normal procedure"],"c":1,"x":"Pooled fuel ignites all at once \u2192 massive EGT spike or tailpipe fire. Procedures specify light-off time limits and motoring to clear fuel before retry."},{"e":"PP","t":"Turbine Engines","d":4,"q":"During trend monitoring, gradual EGT increase at constant power setting indicates:","o":["Normal operation","Engine deterioration \u2014 compressor or turbine degradation","EGT gauge needs calibration","Improved fuel quality"],"c":1,"x":"Higher EGT at same power = engine working harder = degradation. Could be compressor fouling, turbine erosion, seal wear. This is exactly what trending catches."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Many large turbofan engines use what type of fuel control?","o":["Simple carburetor","FADEC (Full Authority Digital Engine Control)","Mechanical governor only","Manual fuel valve"],"c":1,"x":"FADEC manages all engine parameters digitally. No manual backup needed. Optimizes performance and prevents over-limits."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Fuel heaters prevent:","o":["Combustion efficiency loss","Fuel icing by heating above water's freezing point","Viscosity reduction","Engine warmup delays"],"c":1,"x":"Water in jet fuel freezes at altitude, blocks filters. Fuel-oil heat exchangers warm fuel AND cool oil \u2014 dual purpose."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"Thrust reversers work by:","o":["Reversing engine rotation","Redirecting exhaust airflow forward to create braking force","Stopping the fan","Applying turbine brakes"],"c":1,"x":"Blocker doors, cascades, or clamshells redirect exhaust forward. Engine rotation continues normally."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"FOD most likely damages:","o":["Exhaust only","Compressor blades first","Combustion chamber","Turbine blades"],"c":1,"x":"Compressor hit first. Nicks/dents/cracks = imbalance + reduced efficiency + fatigue initiation."},{"e":"PP","t":"Propellers","d":2,"q":"A constant-speed propeller maintains RPM by:","o":["Changing fuel flow","Adjusting blade pitch via hydraulic governor","Varying ignition timing","Adjusting throttle"],"c":1,"x":"Governor senses RPM, uses oil pressure to change blade angle. High pitch = more load = prevents overspeed. Hydraulic application!"},{"e":"PP","t":"Propellers","d":2,"q":"Feathering rotates blades to:","o":["Minimum pitch","\u224890\u00b0 parallel to airflow to minimize drag","Reverse pitch","Cruise lock"],"c":1,"x":"Edge-on to airflow after engine failure. Prevents windmilling drag and further engine damage."},{"e":"PP","t":"Propellers","d":1,"q":"Blade angle is measured between:","o":["Chord line and plane of rotation","Leading and trailing edge","Tip and hub","Thrust and drag lines"],"c":0,"x":"Angle varies from hub to tip (twist) to maintain optimal AOA along entire blade."},{"e":"PP","t":"Propellers","d":4,"q":"If a constant-speed prop governor fails with blade in fixed position:","o":["Engine shuts down","Engine behaves as fixed-pitch \u2014 RPM varies directly with throttle","Prop overspeeds uncontrollably","Prop feathers automatically"],"c":1,"x":"Without governor, prop is fixed pitch. Pilot must manage RPM manually with throttle. No automatic protection against overspeed."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"EGT measures:","o":["Compressor inlet temp","Gas temperature leaving turbine section","Ambient temp","Oil temperature"],"c":1,"x":"THE primary engine operating limit indicator. Exceeding limits = turbine blade damage. Monitor constantly."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"Engine vibration monitoring detects:","o":["Fuel quality issues","Bearing wear, blade damage, or rotor imbalance before failure","Thrust output","Only ground operation issues"],"c":1,"x":"Vibration trends catch mechanical problems early. Like monitoring hydraulic pump vibration for bearing wear."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"Engine fire detection systems are typically:","o":["Smoke detectors only","Continuous-loop thermal sensors around the engine nacelle","UV flame detectors only","Manual pilot observation"],"c":1,"x":"Same continuous-loop technology as airframe fire detection. Sensing element around the engine changes resistance with temperature."},{"e":"REGS","t":"CARs & Registration","d":1,"q":"Canadian aircraft registration prefix:","o":["N","G","C-","F-"],"c":2,"x":"Canada = C- (e.g. C-GABC). US = N. UK = G. ICAO nationality marks."},{"e":"REGS","t":"CARs & Registration","d":1,"q":"Certificate of Registration must be:","o":["Carried aboard during flight","At operator's base only","Filed with TC only","On aircraft exterior"],"c":0,"x":"Must be aboard whenever operating. Along with C of A, journey log, flight manual."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"When a Canadian aircraft is sold domestically, the C of A:","o":["Must be surrendered to TC","Becomes invalid until new owner applies","Is transferred with the aircraft","Must be re-issued by manufacturer"],"c":2,"x":"The C of A transfers with the aircraft at time of sale. The new owner must register the aircraft in their name."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"AME must report address change within:","o":["7 days","30 days","90 days","No requirement"],"c":1,"x":"30 days per CARs. FAA is also 30 days. Keep TC updated."},{"e":"REGS","t":"AME Licensing","d":2,"q":"AME recency requires:","o":["12 months in 5 years","6 months maintenance in preceding 24 months","24 months continuous","No requirement"],"c":1,"x":"6 months in last 24 months. Lapsed = demonstrate competency before signing maintenance releases."},{"e":"REGS","t":"AME Licensing","d":2,"q":"AME licence validity:","o":["5 years","Lifetime","Up to 10 years","2 years"],"c":2,"x":"Max 10 years (calculated from birthday). Must renew before expiry."},{"e":"REGS","t":"AME Licensing","d":2,"q":"M2 rating covers:","o":["Small non-turbojet only","All aircraft NOT in M1, excluding balloons","Electronics only","Structures only"],"c":1,"x":"M2 = large aircraft, turbojets, large helicopters. M1+M2 combined gives E and S privileges too."},{"e":"REGS","t":"AME Licensing","d":3,"q":"AME can exercise privileges only when:","o":["Employed by airline","Valid licence + recency + competence on type","Under another AME's supervision","After 5 years experience"],"c":1,"x":"All THREE: valid licence, current recency, AND competent on the specific type. Cannot sign off unfamiliar aircraft."},{"e":"REGS","t":"AME Licensing","d":1,"q":"Minimum age for AME licence:","o":["18","19","21","25"],"c":2,"x":"Per CAR 403.03. Can train earlier but licence issued at 21."},{"e":"REGS","t":"AME Licensing","d":4,"q":"An AME's licence has been expired for 3 years. To regain privileges:","o":["Simply renew by paying the fee","Must meet conditions for initial licence issuance under current standards","Write the regulatory exam only","Get employer endorsement"],"c":1,"x":"Expired licences cannot simply be renewed. The holder must meet current initial issuance requirements. This may mean re-examination."},{"e":"REGS","t":"Airworthiness","d":1,"q":"An Airworthiness Directive (AD) is:","o":["Optional recommendation","Mandatory instruction to correct an unsafe condition","Manufacturer's service bulletin","Pilot training requirement"],"c":1,"x":"ADs are LAW. Non-compliance = unairworthy. Always verify AD status during maintenance."},{"e":"REGS","t":"Airworthiness","d":2,"q":"An STC is required for:","o":["Routine maintenance","Major modifications to type-certificated aircraft","Repainting","Minor repairs"],"c":1,"x":"Supplemental Type Certificate proves a major modification meets airworthiness standards."},{"e":"REGS","t":"Air
