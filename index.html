he aircraft to safe parameters","Autopilot engagement","Any pilot input"],"c":1,"x":"FBW computers: pilot commands are requests, not direct links. Computer ensures the aircraft stays within safe limits even if the pilot pulls full back stick. Alpha protection prevents stall; speed protection prevents overspeed/underspeed."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"A bob-weight in the elevator control system:","o":["Adds unnecessary weight","Provides artificial 'G-feel' by adding a force proportional to load factor \u2014 heavier pull as G increases","Trims the elevator","Prevents flutter"],"c":1,"x":"In power-assisted systems, the pilot doesn't feel aerodynamic loads directly. Bob-weight hangs on the elevator linkage. In a pull-up (positive G), the weight pulls the column forward = the pilot must pull harder. Simulates natural feel."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"A gust lock prevents:","o":["Bird strikes","Wind from slamming control surfaces to their stops while parked \u2014 which could damage hinges, actuators, and linkages","Rain damage","UV damage"],"c":1,"x":"Parked aircraft: wind can slam surfaces. Gust locks (internal or external) hold surfaces neutral. CRITICAL: remove ALL gust locks before flight. Several fatal accidents from forgotten gust locks. Warning systems verify removal."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Powered flight controls that lose hydraulic pressure revert to:","o":["No control at all","Manual reversion (heavy forces but still controllable) on power-assisted systems; some fly-by-wire have backup hydraulics or electric actuators","Autopilot only","Trim tab control only"],"c":1,"x":"Power-assisted: mechanical connection still exists \u2014 just very heavy. Fully powered (no mechanical backup): must have redundant hydraulic or electric actuators. FBW: multiple redundant channels. System architecture varies by aircraft."},{"e":"AF","t":"Fixed-Wing Controls","d":4,"q":"After a control rigging adjustment, a functional check must verify:","o":["Only surface travel","Correct direction of movement, correct total travel, proper neutral position, no binding, correct control force, and no interference throughout full range","Only neutral position","Only cable tension"],"c":1,"x":"Complete functional check: controls free and correct in ALL directions, full travel to stops, no fouling on structure, trim functions correctly, and control continuity is good. Document all values and compare to AMM tolerances."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"The purpose of a feel computer in a hydraulic flight control system:","o":["Calculates fuel economy","Provides artificial control force feedback proportional to airspeed and control deflection \u2014 heavier feel at high speed","Controls cabin temperature","Manages navigation"],"c":1,"x":"Without feel: hydraulic controls would feel the same at all speeds (dangerous \u2014 too easy to overcontrol at high speed). Feel computer: adjusts spring/hydraulic resistance based on airspeed. Simulates natural aerodynamic feel."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Dissymmetry of lift in forward flight means:","o":["Both blades produce equal lift","The advancing blade produces more lift than the retreating blade \u2014 due to their different relative airspeeds","The retreating blade produces more lift","Only the tail rotor is affected"],"c":1,"x":"Advancing blade: aircraft speed + rotation speed = high airspeed = more lift. Retreating blade: rotation speed - aircraft speed = less airspeed = less lift. Would cause the helicopter to roll if not corrected."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Flapping hinges on a fully articulated rotor allow blades to:","o":["Change pitch only","Move up and down to equalize lift between advancing and retreating blades \u2014 the advancing blade flaps up, retreating flaps down","Rotate on the mast","Disconnect from the hub"],"c":1,"x":"Flapping equalizes lift: advancing blade flaps up (reducing effective AOA = less lift). Retreating blade flaps down (increasing effective AOA = more lift). Automatic correction for dissymmetry."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"Lead-lag hinges (drag hinges) compensate for:","o":["Drag from the fuselage","Coriolis effect \u2014 as a blade flaps up (shorter effective radius), it accelerates forward; flapping down, it decelerates","Only vibration","Wind gusts"],"c":1,"x":"Like a figure skater pulling arms in (speeds up) or extending (slows down). Blade flapping changes its effective radius from the mast. Lead-lag hinges absorb these acceleration/deceleration forces."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Tail rotor failure in forward flight:","o":["Has no effect","Loss of anti-torque \u2014 aircraft yaws in the direction of main rotor torque; maintain speed and use autorotation if needed","Causes immediate crash","Improves handling"],"c":1,"x":"In forward flight, the vertical stabilizer provides some directional stability. Slow to hover = loss of yaw control. Emergency: maintain airspeed, use rudder (if available), fly to nearest landing site, autorotative approach."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Ground resonance occurs when:","o":["The engine is too loud","Rotor blade lead-lag oscillation couples with the landing gear natural frequency \u2014 rapid buildup of lateral oscillation on the ground","Flying in ground effect","Hovering over water"],"c":1,"x":"Self-excited vibration. If one blade moves forward and another back, the rotor CG shifts. This rocks the aircraft on its landing gear, which feeds back into blade movement. Can destroy the helicopter in seconds. Fix: lift off immediately or shut down."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"The freewheeling unit (sprag clutch) allows:","o":["Engine to drive rotor only","The rotor to turn freely when the engine stops or slows \u2014 essential for autorotation entry","Reverse rotor rotation","Both directions equally"],"c":1,"x":"If the engine fails, the rotor must disconnect from the engine drive train to autorotate. The freewheeling unit automatically disengages. Without it, engine drag would stop the rotor."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"Mast bumping can occur on semi-rigid (teetering) rotor systems when:","o":["Flying normally","Low-G or negative-G conditions allow the rotor to flap excessively and the static stop contacts the mast \u2014 potentially severing the mast","Hovering in ground effect","During normal autorotation"],"c":1,"x":"Teetering rotor: limited flapping range. Low/negative G (pushover) = blade flaps to its limit, stop hits mast. Repeated contact can crack or sever the mast = catastrophic. NEVER push over aggressively in a semi-rigid rotor helicopter."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Retreating blade stall limits the helicopter's:","o":["Hovering ability","Maximum forward speed \u2014 the retreating blade reaches such a low effective airspeed that it stalls despite maximum pitch","Climb rate","Autorotation ability"],"c":1,"x":"Retreating blade: rotation speed minus forward speed. At high forward speed, this blade's relative wind approaches zero \u2192 stall despite high pitch angle. Sets the VNE (never exceed speed) for the helicopter."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Collective pitch control changes pitch on:","o":["Only one blade","All blades simultaneously and equally \u2014 increasing or decreasing total rotor thrust","Each blade differently","Only the tail rotor"],"c":1,"x":"Collective up = all blades increase pitch simultaneously = more total lift = climb. Collective down = less pitch = less lift = descend. Requires coordinated throttle (more pitch needs more engine power)."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Cyclic pitch control changes pitch:","o":["All blades equally","Each blade individually as it rotates \u2014 maximum pitch at one point, minimum at the opposite, tilting the rotor disc","Only the tail rotor","All blades together"],"c":1,"x":"Cyclic tilts the rotor disc. To fly forward: increase pitch as blade passes over the tail, decrease over the nose. Due to gyroscopic precession, input is applied 90\u00b0 before the desired effect."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"Coriolis force on the AW139 (which you work on) affects the rotor system through:","o":["Nothing \u2014 it doesn't apply","Lead-lag blade motion that must be absorbed by either hinges, elastomeric bearings, or flexible hub elements","Only the tail boom","Only during hover"],"c":1,"x":"Every time a blade flaps (changes effective radius), conservation of angular momentum changes its rotation speed. The AW139's lead-lag bearings absorb this. Dampers prevent resonance. This is your direct expertise."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Autorotation RPM must be maintained within limits because:","o":["It doesn't matter","Too low = loss of stored energy and rotor authority; too high = structural overload of blades and hub","Only low RPM is dangerous","Only high RPM is dangerous"],"c":1,"x":"Low NR: not enough energy for flare = hard landing. High NR: centrifugal force exceeds blade and hub design limits. The pilot manages NR through collective pitch and airspeed. The AME ensures all autorotation mechanisms function."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Helicopter vibration analysis distinguishes frequencies as:","o":["All the same","1-per-rev (balance/track), 2-per-rev (2-bladed), or higher harmonics \u2014 each frequency points to a specific cause","Random noise only","Not measurable"],"c":1,"x":"1/rev lateral: blade out of track or balance. 2/rev: common on 2-blade rotors, also blade lead-lag. Higher harmonics: blade pitch control, bearings, driveshafts. Electronic analyzers identify and locate the source."},{"e":"AF","t":"Rotary-Wing","d":3,"q":"Helicopter rotor blade tracking ensures:","o":["All blades are the same color","All blades follow the same tip path plane \u2014 untracked blades cause vibration and uneven lift distribution","The RPM is correct","The engine is balanced"],"c":1,"x":"Tracking: flag/strobe/electronic methods check that all blade tips pass through the same point. Out-of-track = vibration. Corrected by adjusting pitch links or trim tabs. Your daily work at Mecaer on AW139 rotors."},{"e":"AF","t":"Rotary-Wing","d":4,"q":"Dynamic Component TBOs on helicopters (main rotor, tail rotor, transmission) are:","o":["Optional guidelines","Mandatory life limits \u2014 these components operate under extreme cyclic loading and MUST be replaced at the specified time regardless of condition","Only recommendations","Replaceable by condition monitoring"],"c":1,"x":"Unlike fixed-wing where some inspections can be extended, helicopter dynamic component life limits are hard times. The components accumulate fatigue damage with every hour. Zero tolerance. Track time precisely. Your maintenance releases certify these."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"Pascal's Law applied to hydraulics states:","o":["Pressure acts on the top only","Pressure applied to a confined fluid is transmitted equally in all directions throughout the fluid","Fluids compress easily","Pressure decreases with distance"],"c":1,"x":"The foundation of all hydraulic systems. A 100 PSI pressure at the pump is 100 PSI everywhere in the system. Force amplification comes from different piston areas. F\u2081/A\u2081 = F\u2082/A\u2082."},{"e":"AF","t":"Hydraulics & Pneumatics","d":4,"q":"An accumulator pre-charge of nitrogen at 1,000 PSI in a 3,000 PSI system serves to:","o":["Just take up space","Store energy for emergency use, dampen pressure surges, and supplement pump flow during peak demands","Increase maximum pressure","Cool the fluid"],"c":1,"x":"Pre-charge holds the bladder/piston in the extended position. System pressure compresses the nitrogen, storing energy. During demand surges (gear retraction), stored energy supplements pump output. Also dampens pressure spikes."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A selector valve directs:","o":["Fluid to the reservoir only","Fluid flow to the desired port of an actuator, determining direction of piston movement","Only return fluid","Only pressure fluid"],"c":1,"x":"Selector valve: pilot moves cockpit control \u2192 valve routes pressure to one side of actuator and return from the other. Reverse = opposite actuator movement. The core of directional control."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"Internal hydraulic leakage (past a piston seal) causes:","o":["External puddle","Actuator creep (slow movement under load), sluggish response, and temperature rise in the fluid","No symptoms whatsoever","Immediate total failure"],"c":1,"x":"Fluid bypasses the piston through worn seals. Actuator drifts under load, takes longer to move, and the fluid heats up (leakage converts hydraulic energy to heat). External leakage = puddle; internal = performance loss."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A thermal relief valve in a hydraulic system protects against:","o":["Cold temperatures","Pressure buildup from fluid expansion when the system is shut down and exposed to heat \u2014 prevents hose/fitting failures","Pump overspeed","Low fluid level"],"c":1,"x":"Parked aircraft in the sun: hydraulic fluid expands. No pump running = no relief valve active. Thermal relief valve opens at a set pressure to prevent component damage. Typically relieves back to the reservoir."},{"e":"AF","t":"Hydraulics & Pneumatics","d":4,"q":"When troubleshooting a hydraulic system that cycles frequently (pump unloads then reloads rapidly):","o":["The pump is too powerful","Likely internal leakage past an actuator seal, a leaking check valve, or low accumulator pre-charge","Normal operation","The reservoir is too large"],"c":1,"x":"Frequent cycling: pressure drops to the system's cut-in pressure faster than normal. Causes: internal leakage (bypassing fluid), air in system (compressible), low accumulator pre-charge (insufficient stored energy). Systematic troubleshooting needed."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"Hydraulic fluid sampling and analysis checks for:","o":["Color only","Particle count, water content, acidity, and viscosity \u2014 identifying contamination and degradation before component damage","Temperature only","Nothing useful"],"c":1,"x":"Patch test: filter a sample and count/classify particles. Water: Karl Fischer test. Acid number: degradation indicator. Viscosity: fluid condition. Regular sampling catches problems early = preventive maintenance."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A restrictor (orifice) in a hydraulic line:","o":["Blocks all flow","Limits flow rate to control actuator speed \u2014 slows movement for smooth, controlled operation","Increases flow rate","Filters the fluid"],"c":1,"x":"Without restrictors, actuators would slam to their stops. Restrictors limit flow = controlled speed. Variable restrictors allow adjustment. Used in landing gear retraction, flight control actuators, and door mechanisms."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A shuttle valve allows:","o":["Fluid mixing","Two different pressure sources to supply one actuator \u2014 the higher pressure automatically shifts the shuttle, isolating the lower source","Reverse flow","Fluid sampling"],"c":1,"x":"Emergency systems: if normal hydraulic pressure is lost, an alternate source (hand pump, emergency accumulator) connects to the actuator through the shuttle valve. Higher pressure wins = automatic switchover."},{"e":"AF","t":"Hydraulics & Pneumatics","d":4,"q":"When bleeding air from a hydraulic system, the procedure is critical because trapped air:","o":["Helps the system","Causes spongy actuator response, pressure fluctuations, overheating (adiabatic compression), and potential seal/component damage","Improves lubrication","Has no effect"],"c":1,"x":"Air is compressible; fluid is not. Air bubbles: absorb pressure input (spongy controls), heat up under compression (diesel effect \u2192 seal damage), and cause erratic actuator behavior. Bleed per AMM procedure."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"The Skydrol family (phosphate ester fluids) is used on transport aircraft because:","o":["It's cheapest","It has excellent fire resistance compared to mineral-based fluids \u2014 critical for pressurized aircraft with hydraulic lines near hot engines","Better lubrication","It's less toxic"],"c":1,"x":"Skydrol: self-extinguishing, high auto-ignition temperature. Trade-offs: attacks paint and certain plastics, requires specific seal materials, skin/eye irritant. But fire safety outweighs the drawbacks for transport aircraft."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"Pneumatic systems compared to hydraulic:","o":["Generate more force","Use compressible gas (air), so they're less precise but acceptable for brakes, door actuators, and de-ice boots; lighter with no return lines needed","Are always superior","Use incompressible fluid"],"c":1,"x":"Pneumatic: compressible (spongy), lower force, but no return lines (exhaust to atmosphere), no fluid to leak (clean), lighter. Good for: parking brakes, emergency gear, door seals, de-ice boots."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"A hydraulic fuse stops flow when:","o":["Pressure drops","Flow rate exceeds a predetermined amount \u2014 indicating a downstream line rupture \u2014 isolates the ruptured line to preserve system fluid","Pressure increases","Temperature rises"],"c":1,"x":"If a line bursts, fluid rushes out at high flow rate. The fuse senses this excessive flow and closes, isolating the break. Preserves remaining fluid for other critical actuators. Like an electrical fuse but for hydraulic flow."},{"e":"AF","t":"Hydraulics & Pneumatics","d":4,"q":"When servicing an accumulator, the nitrogen pre-charge must be checked with:","o":["System pressurized","System DEPRESSURIZED \u2014 hydraulic pressure compressed the nitrogen, so the gauge would read system pressure, not the true pre-charge","Engine running","Any condition"],"c":1,"x":"Pressurized system: nitrogen is compressed by hydraulic fluid. Reading would show something between pre-charge and system pressure. MUST depressurize first so the nitrogen expands to its true pre-charge value."},{"e":"AF","t":"Hydraulics & Pneumatics","d":3,"q":"Hand pump in a hydraulic system provides:","o":["Normal system pressure","Emergency backup pressure for critical systems (gear extension, brakes) when engine-driven pumps are not available","Fluid transfer only","System bleeding only"],"c":1,"x":"Manual operation: limited flow rate but generates enough pressure for emergency gear extension or brake application. Physical effort required. Part of emergency procedures training."},{"e":"AF","t":"Landing Gear","d":3,"q":"Shimmy dampers on nose gear prevent:","o":["Vertical bouncing","Rapid left-right oscillation of the nose wheel at certain speeds \u2014 caused by dynamic imbalance or worn components","Gear retraction","Brake application"],"c":1,"x":"Shimmy: self-excited lateral oscillation. Damper (piston in hydraulic fluid) resists rapid oscillation. Worn torque links, flat-spotted tires, and low strut pressure all contribute to shimmy."},{"e":"AF","t":"Landing Gear","d":4,"q":"Gear swing test after maintenance must verify:","o":["Only that it retracts","Full extension, full retraction, proper door sequence, all position indications (up/down/transit), and emergency extension operation","Only gear lights","Only door operation"],"c":1,"x":"Complete test: normal retract \u2192 verify up indication \u2192 normal extend \u2192 verify down-and-locked \u2192 emergency extend \u2192 verify. Check door sequence, clearances, and hydraulic leaks throughout. Aircraft on jacks."},{"e":"AF","t":"Landing Gear","d":3,"q":"Brake stack inspection includes checking discs for:","o":["Color only","Wear (minimum thickness), warping, heat damage (discoloration), cracks, and condition of the disc drive keys","Only thickness","Only the pads"],"c":1,"x":"Disc wear measured with a gauge. Below minimum = replace. Warped/cracked = replace. Heat discoloration (blue/purple) = possible property changes. Wear pin indicators on some types give quick visual check."},{"e":"AF","t":"Landing Gear","d":3,"q":"Power brake valve (brake metering valve) functions by:","o":["Providing constant pressure","Converting varying pedal force to proportional hydraulic pressure to the brakes \u2014 progressive braking control","Only on/off braking","Disconnecting brakes"],"c":1,"x":"Pilot pushes pedal \u2192 metering valve sends proportional pressure. Light pedal = light braking. Hard pedal = maximum braking. Provides the variable feel. Debooster valves may reduce pressure to wheels for precise control."},{"e":"AF","t":"Landing Gear","d":3,"q":"Anti-skid works by:","o":["Locking the brakes","Automatically releasing brake pressure momentarily when a wheel decelerates too rapidly (impending skid), then reapplying","Increasing brake pressure","Only on wet runways"],"c":1,"x":"Wheel speed sensors detect deceleration rate. If one wheel slows too fast (skid beginning), the anti-skid valve releases pressure to that wheel. Wheel spins up, pressure reapplied. Cycles many times per second."},{"e":"AF","t":"Landing Gear","d":4,"q":"Autobrake system:","o":["Replaces anti-skid","Applies a preset deceleration rate automatically after touchdown \u2014 the pilot selects the desired braking level before landing","Only works in emergencies","Is purely manual"],"c":1,"x":"Autobrake: LOW/MED/HIGH/MAX settings. Squat switch arms it. Applies consistent braking without pilot modulation. Anti-skid still active underneath. Pilot can override with pedal force greater than autobrake setting."},{"e":"AF","t":"Landing Gear","d":3,"q":"Tire speed rating must not be exceeded because:","o":["The tire gets louder","At excessive speed, centrifugal force can cause tire blowout \u2014 the carcass can't contain the internal pressure at those RPMs","The tire wears faster only","Regulations only"],"c":1,"x":"Tire rated speed relates to the centrifugal force the carcass can withstand. V1 (decision speed) should never exceed the tire speed rating. Ground speed, not airspeed, is what matters for tire limits."},{"e":"AF","t":"Landing Gear","d":3,"q":"When servicing a tire/wheel assembly, the deflector (guide) plates must align correctly to:","o":["Look professional","Ensure the brake disc drive keys engage properly with the wheel \u2014 misalignment damages keys and causes uneven braking","Reduce weight","Improve appearance"],"c":1,"x":"Drive keys transmit braking torque from disc to wheel. Misalignment: keys don't engage, or engage partially = concentrated loads = key damage = potential brake failure."},{"e":"AF","t":"Landing Gear","d":3,"q":"Nitrogen is used in aircraft tires instead of air because:","o":["It's cheaper","Nitrogen is inert (prevents combustion from hot brakes), contains less moisture (prevents pressure variation), and doesn't support tire carcass degradation","It weighs less","It's readily available everywhere"],"c":1,"x":"Hot brakes on a tire with air: oxygen supports combustion, moisture expands = unpredictable pressure rise. Nitrogen: inert, dry, predictable. An overheated nitrogen-filled tire is far less likely to explode than one with air."},{"e":"AF","t":"Landing Gear","d":4,"q":"After a gear-up landing, the aircraft requires:","o":["Just cosmetic repair","Extensive structural inspection \u2014 belly skins, frames, longerons, wing/fuselage attachment, engine mounts, and all gear components per manufacturer's SB or TC directive","Only gear replacement","Only engine inspection"],"c":1,"x":"Gear-up landing loads are entirely different from design loads. Structure absorbs impact not designed for it. Every structural element that contacted the ground needs NDT inspection. Major repair/rebuild likely needed."},{"e":"AF","t":"Landing Gear","d":3,"q":"Trunnion bearings on a retractable landing gear:","o":["Are decorative","Are the pivot point for gear retraction/extension and carry enormous loads \u2014 regular inspection and lubrication are critical","Only support weight on the ground","Are only on nose gear"],"c":1,"x":"Trunnion: pivot pin that the gear rotates around during retraction. Carries weight + side loads + retraction forces. Worn bearings = sloppy gear = unsafe. Inspect per maintenance schedule, lubricate per AMM."},{"e":"AF","t":"Landing Gear","d":3,"q":"Overcooling of brakes with water after hot braking:","o":["Is recommended","Can cause thermal shock \u2014 cracking the discs \u2014 and should be avoided. Allow natural cooling unless fire is present","Improves disc life","Has no effect"],"c":1,"x":"Hot brake discs (over 500\u00b0C): water application = massive thermal shock = cracking. Wait for natural cool-down. If fire: extinguish with appropriate agent, accept the disc damage. Better cracked discs than a burned aircraft."},{"e":"AF","t":"Landing Gear","d":3,"q":"Gear position indicating systems show:","o":["Only up or down","Three states: UP (retracted), DOWN AND LOCKED (safe for landing), and IN TRANSIT (intermediate \u2014 not safe in either position)","Only locked","Only moving"],"c":1,"x":"Green = down and locked. Red/no light = up and locked. Red = in transit or unsafe. A gear warning horn supplements the lights. Disagreement between left and right gear = investigation required."},{"e":"AF","t":"Landing Gear","d":3,"q":"Free-fall (gravity) emergency gear extension works by:","o":["Electric backup","Releasing the uplocks and allowing gravity and aerodynamic drag to pull the gear down and into the locked position","Reversing the hydraulic pump","Using the APU"],"c":1,"x":"Uplock release: manual lever in cockpit. Gear falls by gravity, aided by airslip. Down-lock springs snap the lock in place. May require reduced speed or maneuvers (yawing) to help gear fall into position."},{"e":"AF","t":"Landing Gear","d":4,"q":"The landing gear rigging pin is:","o":["A permanent component","A safety device inserted during maintenance to prevent accidental retraction while working on the gear \u2014 must be removed before flight","A structural fastener","A brake component"],"c":1,"x":"Ground safety pins/flags: inserted through the gear mechanism to physically prevent retraction. Bright red 'REMOVE BEFORE FLIGHT' flags. Forgetting to remove = gear may not retract (best case) or jam in an unsafe position (worst case)."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Supercooled large droplets (SLD) are extremely dangerous because:","o":["They're not dangerous","They freeze instantly on contact, run back beyond protected areas, and can overwhelm anti-ice/de-ice systems","They only form at very high altitude","They only affect propellers"],"c":1,"x":"SLD: water drops that remain liquid well below 0\u00b0C. On contact, they spread and freeze beyond the normal protected leading edge area. The ice forms aft of boots/anti-ice protection where it can't be removed."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Heated pitot tubes must be checked operationally because:","o":["Heat isn't necessary","A failed pitot heater in icing = blocked pitot = erroneous airspeed reading = potential loss of control","They only affect temperature readings","They're optional equipment"],"c":1,"x":"Multiple fatal accidents from unreliable airspeed due to pitot icing. Pitot heat: check during preflight (tube should get warm). Some aircraft have pitot heat on continuously when airborne. ALWAYS verify operation."},{"e":"AF","t":"Ice & Rain Protection","d":4,"q":"After an icing event, residual ice on control surfaces can:","o":["Be left to melt naturally","Change the aerodynamic balance and stall characteristics \u2014 must be removed before further flight","Improve lift","Have no effect on performance"],"c":1,"x":"Even thin residual ice changes the airfoil shape, adds weight asymmetrically, and can jam control surface gaps. All ice must be removed before departure. In cold weather, ice may not melt and must be physically removed or de-iced."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Pneumatic de-ice boots are checked for:","o":["Color only","Proper inflation/deflation sequence, no holes or delamination, clean surface (contamination degrades rubber), and correct tube connections","Only inflation","Only appearance"],"c":1,"x":"Boot inspection: visual for cuts/cracks/delamination. Inflation test: verify each section inflates in correct sequence at correct pressure and deflates fully. Contaminated surface (oil, hydraulic fluid) degrades the rubber."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Type I de-icing fluid on the ground:","o":["Provides long-term protection","Removes existing ice/snow/frost but has SHORT holdover time \u2014 the aircraft must take off quickly after application","Is for anti-icing only","Is only for engines"],"c":1,"x":"Type I (orange): heated, low viscosity, washes off contamination. Short holdover. Type IV (green): thickened, clings to surface, shears off during takeoff roll. Long holdover. Know the types and their purposes."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Frost on a wing before takeoff:","o":["Is not a concern if thin","Must be completely removed \u2014 even a thin layer of frost can reduce lift by 30% or more and increase drag significantly","Only needs to be removed from the leading edge","Will blow off during takeoff roll"],"c":1,"x":"'Clean wing' concept: ZERO contamination on lifting surfaces. Frost roughens the surface = earlier boundary layer transition = reduced lift + increased drag. Stall speed increases. Fatal accidents have resulted from frost-contaminated takeoffs."},{"e":"AF","t":"Ice & Rain Protection","d":4,"q":"An ice protection system annunciator shows a failure. The correct action per MEL/CDL:","o":["Fly normally","Check the MEL \u2014 many ice protection system failures prohibit flight into known icing conditions until repaired","Ignore it unless icing is visible","Turn it off and reset"],"c":1,"x":"Most MEL entries for ice protection: 'may not dispatch into known or forecast icing conditions.' Some components have no MEL relief at all (inoperative = grounded). Always check the specific MEL entry."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Engine anti-ice on turbines uses bleed air to heat:","o":["The entire engine","The inlet lip and inlet guide vanes \u2014 preventing ice formation that could break off and FOD the compressor","Only the fan blades","The fuel lines"],"c":1,"x":"Hot bleed air circulates through passages in the inlet lip/nosecone and guide vanes. Keeps surfaces above freezing. Uses significant bleed air = reduce in available thrust. Only activate when needed (icing conditions)."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Heated windshields on transport aircraft use:","o":["External heater mats","Transparent conductive film or fine wire grid embedded between windshield layers \u2014 provides anti-ice and keeps outer layer flexible for bird strike","Only chemical spray","Only wipers"],"c":1,"x":"Windshield heating: temperature controlled to maintain flexibility and prevent ice. Also provides structural benefit: warm outer ply is more flexible and resistant to bird strikes. Overheat protection prevents damage."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"The probe anti-ice system heats:","o":["Only the pitot tube","Pitot tubes, static ports, AOA vanes, and TAT probes \u2014 all sensors that could be blocked or affected by ice","Only the windshield","Only the wings"],"c":1,"x":"Every external sensor that affects flight instruments needs ice protection. Blocked pitot = wrong airspeed. Blocked static = wrong altitude. Iced AOA = wrong stall warning. All heated electrically."},{"e":"AF","t":"Ice & Rain Protection","d":4,"q":"A helicopter operating in icing conditions faces unique risks because:","o":["Helicopters don't fly in icing","Rotor blades accumulate ice unevenly causing severe vibration, main rotor stall, and loss of tail rotor effectiveness","Only the windshield is affected","Helicopters are immune to icing"],"c":1,"x":"Rotor blades: ice changes airfoil, adds weight asymmetrically, can shed unevenly causing massive vibration. Limited anti-ice options on helicopters compared to fixed-wing. Most helicopters must avoid icing conditions entirely."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Rain repellent systems use:","o":["Only wipers","Chemical repellent applied to the windshield that makes water bead and blow off at speed \u2014 used in conjunction with wipers","Only heated windshields","Compressed air blast"],"c":1,"x":"Chemical repellent (hydrophobic coating): applied from a reservoir through a dispenser. Water beads on the treated surface. At speed, beads blow off. Don't apply to dry windshield \u2014 damages surface. Limited supply."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"Ice detection systems use which principle:","o":["Only visual observation","Vibrating probe (frequency change), magnetostrictive probe, or optical (light refraction) sensors that detect ice accretion","Only temperature measurement","Only radar"],"c":1,"x":"Vibrating probe: ice accumulation changes the resonant frequency \u2192 alarm. Resets by heating. Provides automatic cycle timing for de-ice boots. Advisory: alerts crew. Some systems auto-activate anti-ice."},{"e":"AF","t":"Ice & Rain Protection","d":3,"q":"After de-icing fluid application, the holdover time table considers:","o":["Only time","Temperature, type of precipitation (snow/freezing rain/drizzle), and fluid type \u2014 the combination determines how long protection lasts","Only fluid type","Only wind speed"],"c":1,"x":"Holdover time varies dramatically: Type IV in light snow at -3\u00b0C might give 80 minutes. Same fluid in freezing rain might give only 15 minutes. Pilots must know the table and communicate with de-icing crews."},{"e":"AF","t":"Ice & Rain Protection","d":4,"q":"An uncommanded engine power increase in icing conditions may indicate:","o":["Normal operation","Ice breaking off the inlet and being ingested \u2014 compressor damage is occurring, causing performance changes","Better engine efficiency","Fuel system malfunction"],"c":1,"x":"Ice shedding from the inlet enters the compressor = FOD. Blade damage changes compressor efficiency and mass flow. May manifest as EGT increase, vibration increase, or power fluctuations. Report and inspect after landing."},{"e":"AF","t":"Fuel Systems","d":3,"q":"A fuel tank sump drain is located at:","o":["The top of the tank","The lowest point of each tank to allow water and sediment removal by gravity","The middle of the tank","At the filler cap"],"c":1,"x":"Water is heavier than fuel \u2014 sinks to the bottom. Sump drain at the lowest point catches it. Drain into a clear container to visually check for water (clear layer below fuel) and sediment."},{"e":"AF","t":"Fuel Systems","d":4,"q":"Cross-feed valve in a multi-engine aircraft allows:","o":["Mixing different fuel types","Either engine to draw fuel from any tank \u2014 critical if a tank or fuel pump fails on one side","Only fuel balancing","Only defueling"],"c":1,"x":"Cross-feed: feed left engine from right tank (or vice versa). Essential when: one boost pump fails, one tank is damaged/leaking, or fuel balancing is needed. Mismanaging cross-feed has caused accidents."},{"e":"AF","t":"Fuel Systems","d":3,"q":"A float-type fuel transmitter works by:","o":["Measuring fuel pressure","A float that rises/falls with fuel level, moving a wiper on a resistor to change resistance sent to the cockpit gauge","Measuring fuel temperature","Counting fuel molecules"],"c":1,"x":"Simple, reliable. Float rides the surface. As level changes, the resistance changes, moving the cockpit gauge needle. Limitations: affected by aircraft attitude and fuel sloshing. Used on GA aircraft."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Fuel tank inerting systems on modern transport aircraft:","o":["Add oxygen to the tank","Fill the ullage (space above fuel) with nitrogen-enriched air to reduce oxygen concentration below combustion-supporting levels","Heat the fuel","Cool the fuel"],"c":1,"x":"OBIGGS (On-Board Inert Gas Generating System): uses air separation modules to produce nitrogen-enriched air. Reduces ullage O\u2082 below 12% (combustion needs ~12%). Prevents fuel tank explosions. Mandated after TWA 800."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Fuel temperature in jet aircraft is monitored because:","o":["It affects color","Cold fuel can form wax crystals that block filters, and hot fuel can vapor-lock or exceed tank structural limits","It only affects taste","It affects octane rating"],"c":1,"x":"Jet-A freeze point: ~-40\u00b0C. At high altitude with long exposure, fuel temperature drops. If near freeze point, fuel heaters activate or the crew descends to warmer air. Hot fuel: thermal expansion can overflow the tank."},{"e":"AF","t":"Fuel Systems","d":4,"q":"A pressurized fuel system's relief valve opens to:","o":["Add pressure","Prevent tank or line overpressure from thermal expansion, pump deadheading, or system malfunction","Reduce fuel flow","Control mixture"],"c":1,"x":"Thermal expansion (parked in sun), deadheaded pump (all valves closed), or malfunction can over-pressure the system. Relief valve protects against burst lines and damaged components. Relief output goes to tank or overboard."},{"e":"AF","t":"Fuel Systems","d":3,"q":"The float in a carburetor fuel inlet controls:","o":["Mixture ratio","Fuel level in the bowl by opening/closing the needle valve \u2014 maintaining a constant head of fuel at the discharge nozzle","Air intake volume","Engine RPM"],"c":1,"x":"Float rises with fuel level \u2192 pushes needle valve closed \u2192 stops fuel flow. Fuel consumed \u2192 level drops \u2192 float drops \u2192 valve opens \u2192 fuel refills. Constant level = consistent fuel metering."},{"e":"AF","t":"Fuel Systems","d":3,"q":"A fuel quantity totalizer calculates remaining fuel from:","o":["Tank level only","Fuel flow measurement integrated over time, subtracted from the known initial quantity","Fuel pressure","Fuel temperature"],"c":1,"x":"Totalizer: measures flow rate continuously, integrates over time = total burned. Starting quantity (measured or entered) minus burned = remaining. More accurate than tank gauges during maneuvering. Both systems cross-checked."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Fuel leak classification: a 'seep' vs a 'running leak':","o":["Same thing","Seep = slow wet area, no drip. Running leak = visible flow/drip \u2014 each has different maintenance action criteria per the AMM","Both require immediate grounding","Neither is a concern"],"c":1,"x":"AMM classifies: seep (wet but not dropping), heavy seep (slow drip), running leak (steady drip/flow). Each classification has specific allowable limits and maintenance actions. A running leak is typically a no-go item."},{"e":"AF","t":"Fuel Systems","d":4,"q":"When replacing fuel tank sealant (polysulfide), the curing time must be:","o":["Ignored \u2014 fly immediately","Fully respected per manufacturer data \u2014 uncured sealant dissolves in fuel, contaminating the fuel system and causing engine failure","Only 1 hour","It cures instantly"],"c":1,"x":"Polysulfide sealant: chemical cure takes 24-72 hours depending on type and temperature. Uncured sealant + fuel = sealant dissolves, clogs filters and fuel nozzles. Aircraft CANNOT have fuel in the tank until sealant is fully cured."},{"e":"AF","t":"Fuel Systems","d":3,"q":"A fuel transfer pump moves fuel between tanks to:","o":["Mix fuel types","Maintain aircraft CG within limits during flight as fuel is consumed and to keep feed tanks full","Only for ground operations","Heat the fuel"],"c":1,"x":"As fuel burns, CG shifts. Transfer pumps move fuel between tanks to keep CG within limits. On some aircraft, automatic fuel management systems handle transfers. On others, the pilot/engineer manages it manually."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Jet A vs Jet A-1 fuel: the main difference is:","o":["Color","Freeze point: Jet A freezes at -40\u00b0C, Jet A-1 at -47\u00b0C \u2014 Jet A-1 is required for long high-altitude flights in cold regions","Octane rating","Flash point"],"c":1,"x":"Jet A (North American standard) vs Jet A-1 (international standard). Jet A-1's lower freeze point makes it safer for long polar routes. Jet B: wide-cut, lower freeze point but more volatile (less safe to handle)."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Fuel system electrical bonding is critical because:","o":["It improves fuel flow","Fuel flowing through lines generates static electricity \u2014 bonding provides a safe discharge path preventing sparks in fuel vapor areas","It's purely regulatory","It reduces noise"],"c":1,"x":"Fuel flowing through hoses and filters generates significant static charge. Without bonding, a spark could ignite fuel vapors (especially in the ullage space). Bond every component in the fuel path."},{"e":"AF","t":"Fuel Systems","d":3,"q":"Boost pump check valves prevent:","o":["Forward flow","Reverse flow through a failed pump \u2014 ensuring the operative pump's output doesn't backflow through the dead pump","Overpressure","Air entry"],"c":1,"x":"If one boost pump fails, the check valve prevents the other pump's output from backflowing through the dead pump and back to the tank. Without check valves, a failed pump acts as a short circuit for fuel pressure."},{"e":"AF","t":"Fuel Systems","d":4,"q":"In a gravity-feed fuel system, minimum fuel head (height above the engine) must be maintained because:","o":["It helps with weight distribution","Without sufficient head pressure, the engine may be fuel-starved during certain flight attitudes (climb, descent, maneuvers)","It's purely theoretical","It doesn't matter with fuel pumps"],"c":1,"x":"Gravity-feed: no pump \u2014 fuel flows by gravity alone. Negative-G, steep climb, or wrong tank selection can interrupt flow. Minimum head ensures adequate pressure at the carburetor in all normal flight attitudes."},{"e":"AF","t":"Fire Protection","d":3,"q":"A rate-of-rise fire detector triggers when temperature:","o":["Reaches a fixed point","Increases faster than a predetermined rate \u2014 indicating a rapidly developing fire rather than normal temperature rise","Decreases rapidly","Stays constant"],"c":1,"x":"Rate-of-rise: sensitive to fast temperature increases (fire) but not slow increases (normal engine operation). Some detectors combine rate-of-rise AND fixed-temperature for both fast and slow-developing fires."},{"e":"AF","t":"Fire Protection","d":3,"q":"Pneumatic fire detection (Systron-Donner type) uses:","o":["Electrical resistance","A sealed tube containing gas that expands with heat, increasing pressure and closing a switch","UV sensors","Smoke detectors"],"c":1,"x":"Gas-filled tube: average temperature increase along the entire tube length causes gas to expand. Enough pressure rise = diaphragm closes a switch = alarm. Averages temperature over the whole zone."},{"e":"AF","t":"Fire Protection","d":4,"q":"A fire that re-ignites after the first extinguisher discharge suggests:","o":["Agent was ineffective","A persistent fuel source (leak) is feeding the fire \u2014 the shutoff valve may not have fully closed or a fuel line is damaged","Normal extinguisher behavior","The bottle was empty"],"c":1,"x":"First shot knocks down the fire. If it re-ignites, fuel is still reaching the fire zone. Fire handle pulled should have closed the shutoff valve. Persistent fire = possible valve failure or structural fuel line damage."},{"e":"AF","t":"Fire Protection","d":3,"q":"UV/IR flame detectors differ from thermal detectors in that:","o":["They're the same","UV/IR detect actual flame radiation (electromagnetic) while thermal detect temperature \u2014 UV/IR respond faster","UV/IR are slower","UV/IR only detect heat"],"c":1,"x":"UV/IR flame detectors: respond to flame radiation in milliseconds. Used in areas where fast response is critical and where thermal detectors would be too slow (fuel spills, cargo areas). Optical window must be kept clean."},{"e":"AF","t":"Fire Protection","d":3,"q":"Cargo compartment fire protection classification \u2014 Class C requires:","o":["No protection","Both smoke/fire detection AND a built-in fire suppression system","Detection only","Suppression only"],"c":1,"x":"Class C: detection + suppression (most common on transport aircraft). Class D: detection only, sealed to starve fire of oxygen. Class E: eliminated. Class B: accessible in flight. Classification determines the required protection level."},{"e":"AF","t":"Fire Protection","d":3,"q":"The two-shot fire extinguishing system means:","o":["Two bottles discharge simultaneously","Two separate bottles: first shot (primary) discharged individually; if fire persists, second shot (reserve) available","One bottle shoots twice","The crew can only try twice"],"c":1,"x":"Sequential discharge: first bottle \u2192 wait \u2192 assess. If fire continues \u2192 second bottle. On some aircraft, either bottle can discharge into either engine (crossfeed). After both shots, no onboard suppression remains."},{"e":"AF","t":"Fire Protection","d":3,"q":"Fire bottle hydrostatic testing is required at:","o":["Every inspection","Intervals specified by the bottle manufacturer or regulation \u2014 typically every 5 years to verify structural integrity","Only when discharged","Only when damaged"],"c":1,"x":"Hydrostatic test: pressurize the bottle with water to 5/3 of working pressure (or as specified). Check for expansion and leaks. Failed test = replace the bottle. Date stamped on the bottle."},{"e":"AF","t":"Fire Protection","d":4,"q":"An engine fire loop continuity test checks:","o":["Only the warning light","The entire detection circuit: sensing element, wiring, control unit, and warning light/bell \u2014 end-to-end integrity","Only the squib","Only the controller"],"c":1,"x":"Press the test button: simulates a fire signal through the entire loop. Warning light and bell should activate. If not: open circuit somewhere \u2014 sensing element, connector, wire, controller, or bulb. Troubleshoot each segment."},{"e":"AF","t":"Fire Protection","d":3,"q":"Squib (cartridge) continuity is checked with:","o":["A high-voltage tester","A low-current ohmmeter that won't accidentally fire the squib \u2014 typically the aircraft's built-in test circuit","A car battery","Maximum current"],"c":1,"x":"Squibs are electrically fired explosive cartridges. Too much current = it fires = bottle discharges. Built-in test circuits use safe low current to verify the squib's bridgewire is intact without firing it."},{"e":"AF","t":"Fire Protection","d":3,"q":"A firewall must resist:","o":["Only rain","Fire penetration for a minimum specified time (typically 15 minutes) at 2,000\u00b0F \u2014 allowing time for emergency action","Only vibration","Only corrosion"],"c":1,"x":"Firewall materials: stainless steel, titanium, or approved fire-resistant composites. All penetrations (wires, hoses, cables) sealed with fire-resistant grommets and sealant. Any damage to the firewall is a serious airworthiness concern."},{"e":"AF","t":"Fire Protection","d":3,"q":"Hand-held fire extinguishers in the cabin must be:","o":["Hidden from passengers","Easily accessible to crew, mounted in approved brackets, charged per gauge, and inspected at specified intervals","Available only in the cockpit","Only in the galley"],"c":1,"x":"Required locations: cockpit (Halon/HFC type), cabin forward and aft (water + Halon types). Crew must know locations without looking. Checked: pressure gauge, weight, condition, access not blocked. Discharged or expired = replace."},{"e":"AF","t":"Fire Protection","d":4,"q":"An overheat warning vs a fire warning on the same engine:","o":["They're the same alarm","Overheat = caution (temperature approaching limit) with a lower threshold; Fire = warning (fire temperature reached) with a higher threshold \u2014 different urgency levels","Overheat is worse than fire","Only fire matters"],"c":1,"x":"Two thresholds on the same sensing loop. Overheat: 'investigate, prepare for fire checklist.' Fire: 'execute fire checklist immediately.' Some aircraft have overheat \u2192 amber; fire \u2192 red. Different actions for each."},{"e":"AF","t":"Fire Protection","d":3,"q":"After any fire (even if extinguished), the aircraft:","o":["Can continue flying normally","Must be thoroughly inspected per the manufacturer's post-fire inspection procedures before further flight","Only needs a visual check","Can fly to a maintenance base"],"c":1,"x":"Fire causes hidden damage: wiring, hoses, seals, structural weakening. Post-fire inspection per AMM: specific areas to check based on fire location. Some fires may require engine removal for internal inspection."},{"e":"AF","t":"Fire Protection","d":3,"q":"Flame detector optical lenses must be:","o":["Painted over","Kept clean \u2014 contamination (oil film, soot, dust) blocks the sensor and prevents fire detection","Never touched","Only cleaned at overhaul"],"c":1,"x":"UV/IR detectors look through a window/lens. Contamination = reduced sensitivity = delayed or missed fire detection. Clean during scheduled maintenance. Some systems have built-in contamination monitoring."},{"e":"AF","t":"Fire Protection","d":3,"q":"A fire extinguisher gauge in the yellow arc means:","o":["Fully charged","Pressure is borderline \u2014 may be acceptable depending on ambient temperature (check against temp-pressure chart)","Completely empty","Overcharged"],"c":1,"x":"Extinguisher gauges have green/yellow/red zones. Yellow = marginal. Must check the temp-pressure chart: what's yellow at 20\u00b0C might actually be acceptable at 0\u00b0C. If in doubt, recharge."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Cabin rate of climb/descent is limited to prevent:","o":["Noise","Passenger ear discomfort and potential barotrauma \u2014 typically limited to 300-500 ft/min cabin altitude change","Engine damage","Structural overload"],"c":1,"x":"Rapid cabin altitude changes = painful pressure on eardrums. The pressurization controller limits cabin altitude rate of change. Descent: cabin 'climbs' to equalize with lower outside pressure."},{"e":"AF","t":"Cabin & Atmospheric","d":4,"q":"Rapid decompression at cruise altitude requires:","o":["Slow descent","Emergency descent to below 10,000 ft cabin altitude \u2014 crew dons oxygen masks immediately, passenger masks deploy automatically","Only mask deployment","No action needed"],"c":1,"x":"Time of useful consciousness at 35,000 ft: ~30-60 seconds. Crew masks FIRST (you can't help passengers if you're unconscious). Emergency descent. Passenger masks deploy automatically above ~14,000 ft cabin altitude."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"The dump valve allows:","o":["Fuel dumping","Rapid intentional depressurization of the cabin \u2014 used during emergency descent or if the outflow valve malfunctions","Oil dumping","Water dumping"],"c":1,"x":"Dump valve: large opening that rapidly equalizes cabin and ambient pressure. Used before emergency exits are opened on the ground, during ditching, or to regain control of a malfunctioning pressurization system."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Portable oxygen bottles for crew use:","o":["Contain chemical oxygen only","Provide supplemental/protective breathing oxygen from small pressurized bottles carried at crew stations","Are for passengers only","Are not required"],"c":1,"x":"Portable O\u2082: quick-don masks for cabin crew to fight fires or assist passengers while breathing. Different from the cockpit fixed supply. Checked for pressure, mask condition, and flow during each preflight."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Chemical oxygen generators in passenger masks:","o":["Use compressed gas bottles","Produce oxygen through an exothermic chemical reaction (sodium chlorate) when activated by pulling the mask","Are battery powered","Use liquid oxygen"],"c":1,"x":"Pulling the mask activates a percussion cap \u2192 ignites the chemical \u2192 oxygen released. Exothermic = generator gets HOT (200\u00b0C). Produces O\u2082 for ~12-22 minutes. Cannot be turned off once activated."},{"e":"AF","t":"Cabin & Atmospheric","d":4,"q":"Bleed air contamination entering the cabin (fume event) can be caused by:","o":["Normal operation","Engine oil seal leakage allowing oil into the bleed air duct \u2014 producing toxic fumes (TCP) in the cabin air supply","Fuel contamination only","Only at high altitude"],"c":1,"x":"Oil leaking past bearing seals enters the compressor bleed \u2192 cabin air supply. Organophosphates (TCP) in jet engine oil are neurotoxic. Fume events require investigation: identify the leaking seal, check bearing condition."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"A gasper (individual air outlet above each passenger seat) provides:","o":["Pressurization","Individually controllable airflow from the air conditioning system for passenger comfort","Oxygen","Entertainment"],"c":1,"x":"Gasper air comes from the conditioned air system. Each outlet is individually adjustable. Separate from the oxygen system. The air distribution ducting connects the packs to gaspers, overhead vents, and floor outlets."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Vapor cycle air conditioning (used on some GA and business aircraft):","o":["Uses bleed air","Works like a refrigerator \u2014 compressor, condenser, expansion valve, and evaporator using refrigerant (R-134a or similar)","Uses ice blocks","Uses chemical reaction"],"c":1,"x":"Smaller aircraft without bleed air capacity use vapor cycle. Electric or belt-driven compressor. Same principle as home AC. Refrigerant must be handled per environmental regulations. Sight glass shows system charge level."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"The recirculation fan in a pressurized aircraft:","o":["Pressurizes the cabin alone","Mixes filtered cabin air back into the supply to reduce the bleed air demand from engines \u2014 improving fuel efficiency","Only circulates during emergencies","Cools the avionics bay only"],"c":1,"x":"Typically 50% fresh bleed air + 50% HEPA-filtered recirculated air. Reduces engine bleed extraction = better fuel economy. Filters remove 99.97% of particles. Recirculation does NOT reduce oxygen content."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"When servicing a gaseous oxygen system, tools and fittings must be:","o":["Lubricated with oil","Oxygen-clean \u2014 absolutely free of oil, grease, and organic contaminants which could spontaneously ignite in high-pressure O\u2082","Standard tools are fine","Slightly oiled for easy assembly"],"c":1,"x":"NEVER introduce oil/grease/organic material into an O\u2082 system. Spontaneous ignition under pressure. Use only oxygen-clean components, handled with lint-free gloves. Dedicated O\u2082 tools kept separate from other tools."},{"e":"AF","t":"Cabin & Atmospheric","d":4,"q":"The cabin pressure controller automatically schedules:","o":["A constant cabin altitude","A cabin altitude that climbs gradually during ascent from a low value (near field elevation) to a maximum cabin altitude at cruise, then descends during descent to match the destination field elevation","Random pressurization","Only manual control"],"c":1,"x":"Controller is programmed with departure/destination field elevations and cruise altitude. It creates a smooth cabin altitude 'flight profile' within the aircraft's differential pressure limits. Automatic mode does this seamlessly."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Emergency pressurization mode:","o":["Shuts down all packs","Fully closes the outflow valve to maintain maximum cabin pressure in case of a pack failure","Opens the outflow valve","Only activates at sea level"],"c":1,"x":"If normal automatic pressurization fails, emergency/manual mode gives direct control of the outflow valve. Crew can manually maintain cabin pressure. Some aircraft have a 'ditching' button that closes all outflow openings."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"Water separator in the pneumatic/bleed air system removes:","o":["Fuel from the air","Moisture condensed from the cooled bleed air \u2014 preventing water from entering the cabin as mist or from freezing in downstream ducting","Oil from fuel","Dirt from the cabin"],"c":1,"x":"Hot bleed air \u2192 cooled in heat exchangers \u2192 moisture condenses. Water separator captures this before it enters the cabin distribution system. Drain must be functional or water accumulates."},{"e":"AF","t":"Cabin & Atmospheric","d":3,"q":"LOX (liquid oxygen) systems:","o":["Are obsolete","Store oxygen as cryogenic liquid (-183\u00b0C) in insulated dewars \u2014 provides large O\u2082 capacity in compact space, primarily on military/older aircraft","Are more common than gaseous","Only used for medical purposes"],"c":1,"x":"LOX: high capacity per volume but requires special handling (cryogenic burns, O\u2082 enrichment risks). Must be replenished from LOX supply carts. Being replaced by OBOGS (On-Board Oxygen Generating Systems) on modern military aircraft."},{"e":"AF","t":"Cabin & Atmospheric","d":4,"q":"Differential pressure on a pressurized aircraft fuselage is:","o":["Always zero","The difference between cabin pressure and ambient pressure \u2014 the fuselage skin must withstand this outward force like a balloon","Always constant","Only measured at sea level"],"c":1,"x":"At FL350: cabin ~8,000 ft (10.9 PSI) vs outside ~3.5 PSI = ~7.4 PSI differential. Over the fuselage surface area, this creates enormous outward force. The fuselage is designed for this but NOT for exceeding the maximum differential."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"VHF radio range is limited to:","o":["Worldwide","Line-of-sight \u2014 approximately 200 NM at cruise altitude, much less at low altitude","Only 10 NM","Unlimited with repeaters"],"c":1,"x":"VHF (118-136 MHz): line-of-sight propagation. Higher altitude = farther horizon = greater range. At low altitude, terrain blocks signals. That's why HF or satellite communication is needed over oceans."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"The ELT (Emergency Locator Transmitter) transmits on:","o":["Only 121.5 MHz","121.5 MHz (civil emergency) and 406 MHz (satellite detection with GPS coordinates)","Only VHF voice","Only HF"],"c":1,"x":"Modern ELTs: 406 MHz for satellite detection (COSPAS-SARSAT \u2014 position within 5 km in minutes). 121.5 MHz for local homing by SAR aircraft. GPS-equipped ELTs transmit precise coordinates. Battery check: verify charge date."},{"e":"AF","t":"Comms/Nav/Autopilot","d":4,"q":"RVSM (Reduced Vertical Separation Minimum) requires:","o":["Standard altimeters","Two independent altimeter systems with proven accuracy to maintain 1,000 ft separation above FL290 instead of 2,000 ft","Only one altimeter","Only GPS"],"c":1,"x":"RVSM allows 1,000 ft vertical separation (FL290-FL410) instead of 2,000 ft. Requires: two independent altimeters accurate to \u00b165 ft, altitude alerting system, automatic altitude-hold. Aircraft must be RVSM-approved."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"A radome (nose cone housing weather radar) must be:","o":["Opaque to radar","Transparent to radar frequencies while maintaining aerodynamic shape and structural integrity","Metallic","Painted with metallic paint"],"c":1,"x":"Radome: fiberglass or composite construction that passes radar energy with minimal attenuation. Must be inspected for moisture absorption, delamination, and erosion. Damage or moisture = degraded radar performance."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"Static discharge wicks must be checked for:","o":["Color only","Proper attachment, tip condition (not broken or contaminated), and correct quantity installed \u2014 missing wicks = P-static interference","Only during painting","Length only"],"c":1,"x":"Missing or damaged wicks = charge buildup = radio static/noise during precipitation. Check all trailing edge locations per aircraft diagram. Wicks are consumable items \u2014 replace when tips erode or break."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"An IRS (Inertial Reference System) provides:","o":["Only heading","Attitude, heading, and position by sensing acceleration without any external signals \u2014 works anywhere including over oceans and poles","Only navigation","Only airspeed"],"c":1,"x":"IRS uses accelerometers and gyroscopes (ring laser or fiber optic). Self-contained \u2014 no external signals needed. Drifts slowly over time. Updated by GPS on modern aircraft. Must be aligned before flight."},{"e":"AF","t":"Comms/Nav/Autopilot","d":4,"q":"ADS-B Out is mandatory because:","o":["It improves entertainment","It provides air traffic control with precise, real-time aircraft position, altitude, and identification \u2014 improving safety and allowing more efficient routing","It's only a recommendation","It reduces fuel burn"],"c":1,"x":"ADS-B replaces secondary radar dependency. ATC sees precise GPS position in real time. Benefits: better separation, more efficient routes, surface movement monitoring. Mandatory in most controlled airspace."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"Autopilot servo actuators must have:","o":["No override capability","Manual override capability \u2014 the pilot must be able to overpower the servo in an emergency by applying sufficient force","Permanent engagement","Lock-out only"],"c":1,"x":"If the autopilot malfunctions and commands a dangerous maneuver, the pilot must be able to disconnect and physically overpower the servos. Quick-disconnect switches on the control column plus force override capability."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"After avionics installation or modification, a ground functional test verifies:","o":["Only power supply","System operation, correct displays, proper antenna patterns, no interference with existing systems, and compliance with the installation data","Only antenna mounting","Only weight"],"c":1,"x":"Complete test: system functions per manufacturer specs, no cross-interference with other avionics, correct frequency/channel selection, displays accurate, remote sensors connected, and paperwork complete."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"An audio integrating system:","o":["Plays music","Combines and routes audio from multiple sources (radios, intercom, nav receivers, warning systems) to crew headsets with priority management","Only amplifies sound","Only records audio"],"c":1,"x":"Audio panel: pilot selects which radios to transmit on and which to listen to. Priority: fire warning and GPWS override everything. Intercom for crew coordination. Passengers get PA announcements."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"Lightning protection for avionics includes:","o":["Nothing \u2014 lightning can't damage avionics","Shielding, surge suppressors, bonding, and proper grounding \u2014 protecting sensitive electronics from lightning-induced transients","Only fuses","Only painting"],"c":1,"x":"Lightning induces massive voltage spikes in wiring. Protection: shielded cables, surge protection devices, bonded enclosures, proper grounding. Even a nearby strike (not direct hit) can damage unprotected avionics."},{"e":"AF","t":"Comms/Nav/Autopilot","d":4,"q":"SATCOM provides:","o":["Only emergency communication","Voice and data communication via satellite \u2014 enabling worldwide coverage including oceanic, polar, and remote areas where no ground stations exist","Only position reporting","Only weather data"],"c":1,"x":"SATCOM: communication anywhere on Earth. Voice calls, ACARS data, CPDLC (text communication with ATC), and position reporting. Essential for oceanic operations. Inmarsat and Iridium are the main aviation satellite networks."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"ACARS (Aircraft Communications Addressing and Reporting System):","o":["Is purely manual","Automatically sends and receives data messages between the aircraft and ground \u2014 including position, performance, maintenance data, and company messages","Only receives weather","Only sends distress calls"],"c":1,"x":"ACARS: data link. Auto-sends: engine parameters, position reports, delays. Receives: weather updates, clearances, gate info. Reduces voice communication workload. Maintenance: automatically reports faults to the ground."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"When installing an antenna, the location must consider:","o":["Only appearance","Ground plane requirements, radiation pattern, interference with other antennas, structural load, and pressurization (if penetrating the pressure shell)","Only weight","Only aerodynamics"],"c":1,"x":"Antenna installation: approved location per STC/installation data. Adequate ground plane (metal surface). No interference with other antennas (minimum spacing). Structural: doubler if needed. Pressure: sealed if through fuselage."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"Compass swinging adjusts for:","o":["Magnetic variation","Deviation \u2014 errors caused by the aircraft's own magnetic fields from electrical systems, engines, and structure","Dip error","Acceleration error"],"c":1,"x":"Variation: geographic (can't be adjusted). Deviation: aircraft-specific magnetic interference (CAN be adjusted). Swing: position aircraft on each cardinal/intercardinal heading, compare compass to known magnetic heading, adjust compensators."},{"e":"AF","t":"Electrical Systems","d":3,"q":"The RAT (Ram Air Turbine) provides:","o":["Only ventilation","Emergency electrical and/or hydraulic power by deploying a small turbine into the airstream when all engines fail","Engine starting","Normal power"],"c":1,"x":"RAT: last-resort power source. Deploys automatically (or manually) when all other power is lost. Provides limited electrical and hydraulic power for essential flight controls and instruments. Not enough for all systems."},{"e":"AF","t":"Electrical Systems","d":4,"q":"EWIS (Electrical Wiring Interconnection System) regulations require:","o":["No special attention to wiring","Specific design, installation, maintenance, and inspection standards for aircraft wiring \u2014 treating wiring as a system, not just connections between components","Only annual visual checks","Only replacing old wire"],"c":1,"x":"Post-Swissair 111/TWA 800: EWIS regulations treat wiring as a critical system. Mandatory inspections, protection from contamination/chafing, separation requirements, and no unauthorized modifications. Wiring degrades with age."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Wire bundle clamping must prevent:","o":["Easy access","Chafing against structure, excessive sagging, and contact with moving parts or high-temperature surfaces","Wire identification","Current flow"],"c":1,"x":"Clamps: proper type (cushioned for wire, plain for rigid conduit), correct size (not too tight or loose), correct spacing, routed away from heat/moving parts/fluid lines. Loose clamps = chafing = fire."},{"e":"AF","t":"Electrical Systems","d":3,"q":"An APU generator differs from a main engine generator in:","o":["Nothing \u2014 they're identical","Size and capacity \u2014 APU generator is typically smaller, providing power for ground operations and emergency backup in flight","Only voltage","Only frequency"],"c":1,"x":"APU generator: powers the aircraft on the ground (no engines running). In flight: emergency backup if both engine generators fail. Typically same voltage/frequency as main generators but lower power rating."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A split bus system isolates left and right buses to:","o":["Reduce wire count","Prevent a fault on one generator from affecting both buses \u2014 each engine powers its own bus independently","Save weight","Improve lighting"],"c":1,"x":"Split bus: left engine \u2192 left bus, right engine \u2192 right bus. Generator fault = only one bus affected. Bus tie contactor can connect them (with protection) for single-generator operation. Redundancy through isolation."},{"e":"AF","t":"Electrical Systems","d":4,"q":"HIRF (High-Intensity Radiated Fields) protection ensures:","o":["Better radio reception","Aircraft electronic systems continue functioning near powerful radio transmitters, radar installations, and electromagnetic sources","Only paint protection","Only fuel system protection"],"c":1,"x":"HIRF: external electromagnetic fields can interfere with aircraft electronics. Protection: shielding, filtering, bonding, and design testing to specific field strength levels. Certification requirement for all modern aircraft."},{"e":"AF","t":"Electrical Systems","d":3,"q":"When splicing aircraft wire, the splice must:","o":["Be anywhere convenient","Be staggered within a bundle, use approved splice connectors, and maintain the wire's original current-carrying capacity and insulation integrity","Use household wire nuts","Be soldered"],"c":1,"x":"No solder (cracks from vibration). Crimp-type splice connectors. Stagger to prevent bundle bulge. Insulate with heat-shrink tubing. Minimum wire lengths between splices. Maximum number of splices per wire run."},{"e":"AF","t":"Electrical Systems","d":3,"q":"The purpose of a reverse current relay (cutout) on a DC generator:","o":["Reverses the generator output","Disconnects the generator from the bus when generator voltage falls below battery voltage \u2014 preventing the battery from motoring the generator","Increases output voltage","Only connects at high RPM"],"c":1,"x":"If the generator slows (engine failure/idle), its voltage drops below battery voltage. Without cutout, the battery would drive current backward through the generator (motoring it). Cutout relay opens, isolating the generator."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A GCB (Generator Circuit Breaker) vs a GCR (Generator Control Relay):","o":["Same device","GCB can interrupt high fault current; GCR handles normal switching current only \u2014 GCB is used for generator protection on larger aircraft","GCR is more robust","They're interchangeable"],"c":1,"x":"Large generators can produce massive fault currents. A GCB can interrupt these high currents safely. Smaller aircraft use GCRs for normal load switching. The distinction matters for troubleshooting and replacement."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Electrical system load analysis determines:","o":["Wire colors","Whether the generating capacity can support all connected loads simultaneously \u2014 ensures generators aren't overloaded","Only battery size","Only CB sizing"],"c":1,"x":"List every electrical load, its current draw, and duty cycle (continuous, intermittent). Sum maximum possible loads. Must not exceed generator continuous rating. If it does: load shedding or larger generator needed."},{"e":"AF","t":"Electrical Systems","d":4,"q":"An arc fault circuit breaker (AFCB) differs from standard CBs in that:","o":["It's the same thing","AFCBs detect dangerous arcing (damaged wire) even if the current is below the standard CB trip threshold \u2014 preventing fire from arc faults","They trip faster only","They're only for DC"],"c":1,"x":"Standard CB: trips on overcurrent. AFCB: also detects characteristic electrical signatures of arcing (intermittent current, high-frequency noise). Arc faults from damaged wiring can start fires below the CB trip current."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Battery temperature monitoring is critical on NiCd batteries because:","o":["It extends battery life marginally","NiCd batteries can enter thermal runaway \u2014 temperature rises, internal resistance drops, more current flows, more heat \u2014 a self-accelerating cycle that can cause fire","It only affects charge rate","It doesn't matter"],"c":1,"x":"Thermal runaway: battery temperature exceeds ~70\u00b0C and accelerates. Can result in battery explosion and fire. Temperature sensors trigger the battery charger to disconnect. If not caught, the battery must be cooled externally."},{"e":"AF","t":"Electrical Systems","d":3,"q":"Smoke, fire, and fumes in the cockpit often traced to electrical system:","o":["Is never electrical","Can indicate a wiring arc fault, overheated component, or overloaded circuit \u2014 immediate troubleshooting per QRH: isolate suspect circuit","Is always from engines","Should be ignored if mild"],"c":1,"x":"Electrical smell/smoke in the cockpit: take seriously. QRH procedures: identify suspect circuit (by switching off systems one at a time), remove power from that bus if identified, ventilate. Do NOT reset a tripped CB that has tripped on its own."},{"e":"AF","t":"Electrical Systems","d":3,"q":"When installing avionics in a composite aircraft, the challenge is:","o":["Nothing special","Composite doesn't provide a natural ground plane or EMI shielding like metal \u2014 bonding provisions and shielding must be specifically designed","Composites are heavier","Composites block signals completely"],"c":1,"x":"Metal fuselage = natural Faraday cage (EMI shield) and ground plane. Composite: neither. Solutions: copper mesh/foil for ground plane, additional shielding for EMI, specific bonding straps, and lightning protection provisions."},{"e":"AF","t":"Electrical Systems","d":3,"q":"A voltage regulator on a generator:","o":["Changes frequency","Maintains constant output voltage regardless of load changes and RPM variations by controlling the field current","Controls fuel flow","Changes phase angle"],"c":1,"x":"Generator output voltage varies with RPM and load. The voltage regulator senses output voltage and adjusts field excitation current to maintain the target voltage (28V DC or 115V AC). Part of the GCU on modern aircraft."},{"e":"AF","t":"Instruments","d":3,"q":"Pitot tube measures:","o":["Static pressure","Total (pitot) pressure = static + dynamic \u2014 the difference between pitot and static gives indicated airspeed","Altitude","Temperature"],"c":1,"x":"Pitot = total pressure (ram air). Static = ambient pressure. Airspeed indicator diaphragm: pitot inside, static outside. Difference = dynamic pressure = airspeed. Both sources must be unblocked."},{"e":"AF","t":"Instruments","d":4,"q":"If pitot tube is blocked but static port is open, during a climb the airspeed indicator:","o":["Reads correctly","Under-reads \u2014 decreasing static pressure in the case makes the trapped pitot pressure appear relatively higher initially, but overall the reading becomes unreliable","Over-reads","Reads zero immediately"],"c":1,"x":"Complex failure: trapped pitot pressure + changing static pressure = unreliable readings. Airspeed may increase or decrease depending on conditions. The pilot cannot trust the ASI. Alternate pitot/static or GPS groundspeed used."},{"e":"AF","t":"Instruments","d":3,"q":"Gyroscopic precession means:","o":["The gyro stops spinning","A force applied to a spinning gyroscope results in movement 90\u00b0 later in the direction of rotation \u2014 not where the force was applied","The gyro speeds up","The gyro reverses"],"c":1,"x":"Precession: push the top of a spinning gyro forward \u2192 it tilts to the right (90\u00b0 in rotation direction). This is why helicopter cyclic inputs are applied 90\u00b0 before the desired effect."},{"e":"AF","t":"Instruments","d":3,"q":"A encoding altimeter sends:","o":["Only cockpit display","Altitude information in digitally coded form to the transponder for Mode C/S altitude reporting to ATC","Only analog readings","Only to the FDR"],"c":1,"x":"Encoding altimeter: separate output to transponder. Always reads pressure altitude (29.92\" Hg setting) regardless of what the pilot sets in the Kollsman window. This ensures all aircraft report altitude on the same reference."},{"e":"AF","t":"Instruments","d":3,"q":"An accelerometer (G-meter) measures:","o":["Speed","Load factor (G forces) on the aircraft \u2014 positive and negative \u2014 recording the maximum experienced","Altitude","Turn rate"],"c":1,"x":"Records maximum positive and negative G experienced. After turbulence or a hard maneuver, check the G-meter. Exceeding structural limits (positive or negative) requires structural inspection per maintenance manual."},{"e":"AF","t":"Instruments","d":4,"q":"The difference between indicated airspeed (IAS) and true airspeed (TAS):","o":["They're always the same","TAS = IAS corrected for altitude (air density) \u2014 at high altitude, TAS is significantly higher than IAS because air is less dense","IAS is always higher","They differ only on the ground"],"c":1,"x":"IAS decreases with altitude for the same TAS (less dense air = less dynamic pressure). At FL350, TAS is approximately 1.7\u00d7 IAS. A 300 KIAS indication = ~510 KTAS. Know the relationship \u2014 affects navigation and performance calculations."},{"e":"AF","t":"Instruments","d":3,"q":"A compass correction card shows:","o":["How to repair the compass","The deviation on each heading \u2014 the difference between the compass reading and the actual magnetic heading after the compass swing","Only magnetic variation","Only dip error"],"c":1,"x":"Card lists: 'For N, steer 002. For E, steer 088.' etc. Deviation is different on each heading due to the aircraft's magnetic field. Card is placed near the compass. Must be updated after compass swing or significant equipment changes."},{"e":"AF","t":"Instruments","d":3,"q":"A remote-sensing compass (flux valve) advantages over a direct-reading compass:","o":["No advantages","Installed away from magnetic interference, provides electronic heading signal to HSI/EFIS, no turning errors","Cheaper only","Lighter only"],"c":1,"x":"Flux valve: installed in a magnetically clean area (wingtip, tail). Senses Earth's magnetic field. Sends electrical signal to cockpit instruments. No dip/turning errors. More accurate than a direct-reading compass."},{"e":"AF","t":"Instruments","d":3,"q":"A standby instrument must be:","o":["Identical to primary","Independent from the primary system \u2014 separate power source, separate pitot/static \u2014 available if primary EFIS fails","On the same bus","Connected to the same sensors"],"c":1,"x":"Standby: independent attitude, airspeed, and altitude. Separate power (battery backed). Separate pitot/static. If the glass cockpit goes dark, standby instruments keep the pilot flying. Required by regulations."},{"e":"AF","t":"Instruments","d":3,"q":"A fuel flow meter that suddenly reads zero with the engine running normally:","o":["Engine is about to quit","Likely a transmitter or wiring fault \u2014 NOT an actual zero fuel flow (engine would quit if fuel actually stopped)","Normal indication at idle","Fuel is exhausted"],"c":1,"x":"Engine running = fuel IS flowing. Zero indication = sensor/wiring fault. Cross-check with other engine parameters (EGT, RPM normal = fuel is flowing). Don't shut down a running engine based on one faulty gauge."},{"e":"AF","t":"Instruments","d":4,"q":"A TCAS RA (Resolution Advisory) commands 'CLIMB CLIMB.' The pilot must:","o":["Follow ATC instructions instead","Immediately comply with the RA \u2014 TCAS RA takes precedence over ATC instructions","Ignore it","Descend instead"],"c":1,"x":"TCAS RA: mandatory compliance. The other aircraft is receiving the complementary RA. Following ATC instead of the RA has caused mid-air collisions (\u00dcberlingen 2002). Inform ATC: 'TCAS RA' but follow the TCAS."},{"e":"AF","t":"Instruments","d":3,"q":"Instrument checks before flight include verifying:","o":["Only altimeter setting","All instruments reading correctly for current conditions: altimeter \u00b175 ft, VSI \u2248 zero, heading within limits, engine instruments in range, flags not showing","Only fuel gauge","Only oil pressure"],"c":1,"x":"Preflight instrument check: altimeter set to current ba
