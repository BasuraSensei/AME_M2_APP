oves material \u2014 too much on thin skin creates a knife edge. Dimpling presses the skin into a countersink shape without removing material."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"A joggle in sheet metal is:","o":["A crack","An offset bend that allows one sheet to overlap another at the same level","A type of rivet","A reinforcement"],"c":1,"x":"Joggle creates a step so overlapping sheets lie flush. Used at skin joints, stringer-to-skin junctions. Made with a joggle tool or forming block."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Proper rivet bucking requires the bucking bar to be held:","o":["At an angle","Firmly and squarely against the rivet shank","Loosely to allow the rivet to spread","Away from the skin"],"c":1,"x":"Square contact ensures even upset (shop head formation). Angled bar = tilted head = weak rivet = rejected. The bucker must feel the rivet forming and maintain alignment."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"After driving a rivet, the shop head diameter should be approximately:","o":["Same as hole diameter","1.5\u00d7 the shank diameter","3\u00d7 the shank diameter","Any size"],"c":1,"x":"Shop head: 1.5D diameter and 0.5D height. Too large = rivet driven too far (over-driven). Too small = not enough clinch (under-driven). Both are rejection criteria."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Empty weight of an aircraft includes:","o":["Only the structure","Airframe, engines, all fixed equipment, unusable fuel, and full operating fluids","Only airframe and engines","Structure plus passengers"],"c":1,"x":"Empty weight = everything permanently installed + unusable fuel + full oil (for most aircraft). Does NOT include usable fuel, crew, passengers, or cargo."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Arm is the distance from:","o":["Wing to tail","The datum to the CG of an item","The nose to the tail","The wing root to the wingtip"],"c":1,"x":"Arm = horizontal distance from the datum to the item's CG, measured in inches or centimeters. Arm \u00d7 weight = moment. Positive aft of datum, negative forward (usually)."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"If the CG is too far aft, the aircraft becomes:","o":["More stable","Unstable in pitch \u2014 possible unrecoverable nose-up condition","Faster","More fuel efficient"],"c":1,"x":"Aft CG = reduced stability. Extreme aft CG = the pilot may not have enough elevator authority to prevent nose-up pitch = unrecoverable stall. This is why CG limits exist."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Ballast is added to an aircraft to:","o":["Increase speed","Bring the CG within allowable limits when it cannot be corrected by loading","Improve fuel efficiency","Reduce maintenance"],"c":1,"x":"Ballast (usually lead) is a last resort when CG can't be corrected by equipment placement or loading. Permanent ballast must be documented on the W&B report."},{"e":"REGS","t":"Airworthiness","d":2,"q":"An aircraft must have a valid Certificate of Airworthiness to:","o":["Be parked at an airport","Be operated in flight","Be displayed at an air show only","Be sold"],"c":1,"x":"No C of A = no flying (except under a flight permit for specific purposes). The C of A confirms the aircraft meets airworthiness standards."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A Special Certificate of Airworthiness may be issued for:","o":["Normal commercial operations","Specific purposes: experimental, restricted, provisional","Any flying the owner wants","Training flights only"],"c":1,"x":"Special C of A: limited operations. Experimental (homebuilt, research), Restricted (aerial work), Provisional (new type pending full certification). Each has specific operating limitations."},{"e":"REGS","t":"Airworthiness","d":3,"q":"If an aircraft does not conform to its type design due to an unapproved modification:","o":["It is still airworthy","It is NOT airworthy \u2014 the C of A is effectively invalid","Only the modification is affected","It needs a new paint scheme"],"c":1,"x":"C of A requires type design conformity. Unapproved mods = non-conformity = not airworthy. Must either get the mod approved (STC) or remove it and restore type design."},{"e":"REGS","t":"Airworthiness","d":4,"q":"An AME discovers during maintenance that a previous repair was done without approved data. The correct action:","o":["Ignore it if the repair looks good","Document the finding, assess the repair against approved data, and either approve or require re-repair before release","Report the previous AME to TC immediately","Cover it with a new inspection stamp"],"c":1,"x":"Unapproved repairs must be addressed. The AME cannot release an aircraft with a known unapproved repair. Either validate it against approved data or redo it properly. Document everything."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"A fire extinguisher squib is:","o":["A testing device","An electrically fired cartridge that punctures the bottle to release agent","A pressure gauge","A temperature sensor"],"c":1,"x":"Squib is fired electrically from the cockpit fire handle. Punctures the frangible disc on the bottle. Agent flows through distribution lines to spray nozzles in the fire zone."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"A Fenwal continuous-loop system detects fire by:","o":["Smoke detection","Average temperature change along the sensing element causing resistance drop","Single-point temperature only","UV flame detection"],"c":1,"x":"Fenwal: single wire in a tube filled with eutectic salt. Heat anywhere along the element melts the salt, dropping resistance. Provides continuous zone coverage."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"Class C fires involve:","o":["Ordinary combustibles","Flammable liquids","Energized electrical equipment","Combustible metals"],"c":2,"x":"Class C = electrical. De-energize first if possible, then use non-conductive agent (CO2, Halon, dry chemical). NEVER water on live electrical fire."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Overheat detection differs from fire detection in that overheat:","o":["Is the same thing","Warns of high temperature BEFORE it reaches the fire threshold","Only works on the ground","Detects smoke"],"c":1,"x":"Overheat = caution (approaching limits). Fire = warning (fire temperature reached). Two separate circuits/thresholds on the same sensing loop."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"After a fire bottle discharge, the fire handle should remain pulled because:","o":["It looks better","It keeps fuel, hydraulic, bleed air, and electrical systems isolated from the affected engine","It recharges the bottle","It activates backup cooling"],"c":1,"x":"Fire handle pulls shut off fuel, hydraulic supply, bleed air, and electrical generation to the affected engine. Prevents re-ignition. Do not push back in until fire is confirmed out."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"An oil pressure relief valve returns excess oil to:","o":["The engine bearings","The pump inlet or oil tank to maintain system pressure within limits","The filter","Overboard"],"c":1,"x":"Relief valve prevents overpressure by diverting excess oil back to the inlet side. Opens at a set pressure and closes when pressure drops. Adjustable on some engines."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil consumption trending higher over time indicates:","o":["Better engine performance","Possible worn piston rings, valve guides, or seal deterioration","Normal break-in","The oil is too thin"],"c":1,"x":"Trending is key. Gradual increase in oil consumption = internal wear progressing. Sudden increase = possible seal failure or crack. Track consumption at every oil service."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Flashing the field of a generator restores:","o":["Proper capacitor operation","Residual magnetism to the field frame","Brush contact pressure","Output frequency"],"c":1,"x":"[FAA AMP Q30] Generators need residual magnetism to start producing voltage. Momentary DC current through the field coil re-magnetizes the poles. Required after generator sits unused."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"Fuel flow is typically measured by:","o":["A fuel pressure gauge","A vane or mass flow transmitter in the fuel line","The fuel quantity gauge","Visual observation"],"c":1,"x":"Fuel flow meters measure actual consumption rate (gallons or pounds per hour). Essential for range calculations and engine health monitoring. Vane type or mass flow type common."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel nozzle patterns must produce:","o":["A solid stream","A fine atomized cone-shaped spray for efficient combustion","A wide flat fan","Large droplets for slow burning"],"c":1,"x":"Fine atomization = more surface area = faster, more complete combustion = higher efficiency and lower emissions. Clogged or worn nozzles = poor spray pattern = hot spots."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Fuel system water drains should be checked:","o":["Only at annual inspection","During preflight and regular maintenance \u2014 drain and check for water/contaminants","Only when fuel quantity is low","Only after refueling"],"c":1,"x":"Water settles to the lowest points in the fuel system. Regular draining catches water before it reaches the engine. More critical in humid climates and after temperature changes that cause condensation."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"An inlet particle separator on a turbine engine:","o":["Increases thrust","Removes sand, dust, and debris from intake air before it reaches the compressor","Cools the intake air","Adds moisture to intake"],"c":1,"x":"Common on helicopters and turboprops operating in dusty/sandy environments. Centrifugal or inertial separator deflects particles away. Reduces compressor erosion."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Exhaust gas temperature spread between cylinders on a recip engine should be:","o":["As wide as possible","Within the manufacturer's specified limit \u2014 excessive spread indicates uneven fuel distribution or ignition problems","Exactly zero","Not monitored"],"c":1,"x":"EGT spread check: all cylinders should read within a specified range. Wide spread = fuel injector issue, ignition problem, or intake leak on one cylinder. Troubleshooting tool."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"A last-chance oil filter (screen) at each bearing:","o":["Is the primary filtration","Catches debris that bypassed the main filter to protect that specific bearing","Replaces the main filter","Is only on recip engines"],"c":1,"x":"Last-chance screens are final protection at each bearing. If they trap debris, it indicates upstream contamination. Found during teardown inspections \u2014 important diagnostic tool."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Oil temperature gauges in turbine engines measure temperature at:","o":["The oil tank only","The oil supply to the engine or return from the engine","The fuel system","Ambient air"],"c":1,"x":"Oil temp measured at supply (to engine) or scavenge return (from bearings). Return temp is higher and more indicative of bearing health. Trending temperature changes catches developing problems."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"Tolerances on a drawing specify:","o":["The exact dimension only","The acceptable range of variation from the nominal dimension","The material type","The part color"],"c":1,"x":"No part can be made perfectly. Tolerances define the acceptable + and - variation. Tighter tolerance = more precision required = higher manufacturing cost."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"An isometric drawing shows an object in:","o":["Flat 2D views","A 3D pictorial view with three axes at 120\u00b0 to each other","Sectional view only","Exploded view only"],"c":1,"x":"Isometric gives a 3D appearance. All three axes equally foreshortened. Good for visualization but not for taking precise measurements. Used for assembly illustrations and parts catalogs."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Bernoulli's principle states that as fluid velocity increases:","o":["Pressure increases","Pressure decreases","Temperature increases","Density increases"],"c":1,"x":"Faster fluid = lower pressure. This is how wings generate lift (faster over top = lower pressure = net upward force) and how a venturi works in a carburetor."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Torque is measured in:","o":["Pounds per square inch","Foot-pounds or Newton-meters","Gallons per minute","Degrees Fahrenheit"],"c":1,"x":"Torque = rotational force = Force \u00d7 distance. Foot-pounds (imperial) or Newton-meters (metric). Critical for bolt tightening specifications in aircraft maintenance."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Work is defined as:","o":["Force only","Force applied over a distance (W = F \u00d7 D)","Speed times time","Pressure times area"],"c":1,"x":"No distance = no work (holding a heavy box stationary = no work in physics). Power = work/time. These relationships are fundamental to understanding hydraulic and mechanical systems."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Cadmium plating on aircraft hardware provides:","o":["Increased strength","Sacrificial corrosion protection for steel parts","Better appearance only","Electrical insulation"],"c":1,"x":"Cadmium is more anodic than steel \u2014 it corrodes first, protecting the steel underneath (sacrificial protection). Common on fasteners. Being replaced by zinc-nickel plating due to toxicity concerns."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Exfoliation corrosion in aluminum appears as:","o":["Surface pitting","Lifting or flaking of surface layers like pages of a book","Thread-like lines","Uniform thinning"],"c":1,"x":"Exfoliation: corrosion products along grain boundaries force metal layers apart. Common in thick aluminum extrusions. Looks like delaminating layers. Serious structural concern."},{"e":"SPM","t":"NDT","d":3,"q":"A fluorescent penetrant inspection uses:","o":["Normal visible light only","Ultraviolet (black) light to make indications fluoresce brightly","X-ray imaging","Magnetic fields"],"c":1,"x":"Fluorescent penetrant glows under UV light, making tiny cracks much more visible than visible-dye methods. More sensitive. Used in darkened inspection areas."},{"e":"SPM","t":"NDT","d":2,"q":"The developer in a penetrant inspection:","o":["Cleans the surface","Draws penetrant out of defects to the surface making indications visible","Fixes the penetrant permanently","Removes excess penetrant"],"c":1,"x":"Developer (powder or liquid) acts as a blotter \u2014 capillary action pulls trapped penetrant back to the surface. The indication bleeds out and becomes visible. Interpretation requires training."},{"e":"SPM","t":"NDT","d":3,"q":"Ultrasonic inspection can also measure:","o":["Paint thickness only","Material thickness (important for corrosion assessment)","Temperature","Electrical conductivity"],"c":1,"x":"UT thickness gauging: measures remaining wall thickness on skins, tubes, and fittings. Detects hidden corrosion thinning. Essential for aging aircraft inspection programs."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Bucking bar weight should be:","o":["As light as possible","Approximately 1.5\u00d7 the weight of the rivet gun for proper energy transfer","Exactly the same as the gun","As heavy as available"],"c":1,"x":"Proper mass ratio ensures the rivet upsets correctly. Too light = bar bounces, poor shop head. Too heavy = hard to control, rivet driven too fast. Match bar to rivet size."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"A micrometer measures:","o":["Length in feet","Precise dimensions to 0.001 inch or 0.01 mm","Only bolt diameter","Torque values"],"c":1,"x":"Micrometers provide precision measurement for checking bearing journals, shaft diameters, and sheet thickness. Read the thimble and sleeve scales carefully."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A dial indicator measures:","o":["Temperature","Small linear movements \u2014 used for checking runout, end play, and surface variation","Voltage","Air pressure"],"c":1,"x":"Mount the dial indicator on a fixed point, touch the plunger to the rotating surface. Measures total indicated runout (TIR). Essential for checking propeller track, shaft runout, and brake disc warp."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Calibration of precision tools must be:","o":["Never needed","Performed at regular intervals traceable to national standards","Done only when they break","At the operator's discretion"],"c":1,"x":"Torque wrenches, micrometers, calipers, test equipment \u2014 all require periodic calibration. Records must show calibration date, due date, and standard used. Using uncalibrated tools = invalid measurements."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"When using a torque wrench, pull:","o":["Quickly for best accuracy","Smoothly and steadily, reading at the click or indicated value","With jerky motions","Past the required value then back off"],"c":1,"x":"Smooth, steady pull ensures accurate reading. Jerking gives false readings. Never use a torque wrench to loosen \u2014 only for tightening. Store at zero/lowest setting."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"An aircraft loaded beyond the aft CG limit is dangerous because:","o":["It flies faster","It becomes increasingly unstable in pitch and may become uncontrollable","It uses less fuel","It climbs better"],"c":1,"x":"Aft CG = reduced longitudinal stability. Extreme aft CG = elevator may not have enough authority to prevent nose-up divergence. Can lead to unrecoverable stall."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Forward CG limit is set by:","o":["Fuel capacity","The maximum elevator authority needed for rotation and flare during landing","Engine power","Wing strength"],"c":1,"x":"Too far forward = nose heavy = need full elevator to flare for landing. If not enough elevator authority, the aircraft can't round out properly = hard/nose-first landing."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"A fuel-oil heat exchanger uses fuel to cool engine oil and simultaneously:","o":["Heats the fuel to prevent ice crystal formation at altitude","Cools the fuel","Mixes fuel with oil","Has no effect on fuel"],"c":0,"x":"Dual-purpose: oil is cooled, fuel is warmed. Warmer fuel is less likely to form ice crystals that block filters. Elegant engineering."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"The fuel manifold distributes fuel from the FCU to:","o":["The oil tank","Individual fuel nozzles in the combustion section","The APU only","The fuel tanks"],"c":1,"x":"Manifold (fuel ring) ensures even fuel distribution to all nozzles around the combustion chamber. Blockage or leak in the manifold = uneven combustion = hot spots."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"A fuel nozzle that produces a poor spray pattern will cause:","o":["No noticeable effect","Localized hot streaks in the combustion chamber, potentially damaging turbine blades","Improved combustion","Lower fuel consumption"],"c":1,"x":"Poor atomization = fuel burns unevenly = hot spots visible on the combustion liner and tail cone. One bad nozzle can damage downstream turbine blades. Nozzle flow checks are part of scheduled maintenance."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"Engine bleed air is tapped from the compressor section for:","o":["Combustion only","Cabin pressurization, anti-ice, pneumatic systems, and engine stall prevention","Lubrication","Fuel heating"],"c":1,"x":"Compressor bleed air powers multiple aircraft systems. Taking too much bleed reduces engine performance. FADEC/EEC accounts for bleed demands in thrust calculations."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"An engine inlet anti-ice system typically uses:","o":["Electric heaters only","Hot compressor bleed air routed through the inlet lip","Chemical spray","No anti-ice is needed for turbines"],"c":1,"x":"Hot bleed air circulates through passages in the inlet lip and nose cone. Prevents ice formation that could break off and FOD the compressor. Activated before entering icing conditions."},{"e":"PP","t":"Turbine Induction & Exhaust","d":4,"q":"A turbine engine running with a partially blocked inlet will experience:","o":["Increased thrust","Reduced airflow causing higher EGT, possible compressor stall, and reduced thrust","No effect","Improved fuel efficiency"],"c":1,"x":"Blocked inlet = less air = compressor works harder = higher EGT at same power setting = reduced stall margin. Causes: ice, bird strike damage, FOD screen blockage, inlet duct damage."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"The purpose of an exhaust mixer on a turbofan is to:","o":["Reverse thrust","Mix hot core exhaust with cool bypass air to reduce noise and improve efficiency","Filter exhaust particles","Cool the turbine"],"c":1,"x":"Mixing reduces the velocity difference between core and bypass flows. Lower velocity difference = less noise (shear layer noise). Also recovers some energy for slightly better efficiency."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Turbine engine oil analysis should include checking for:","o":["Color only","Metal particles (type and quantity), acidity, viscosity, and water content","Smell only","Nothing between changes"],"c":1,"x":"Comprehensive oil analysis: spectrometric (metal content by type), acidity (TAN), viscosity (degradation), water (contamination). Trending results catches bearing/gear wear early."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"The oil breather/vent system on a turbine engine:","o":["Adds oil to the system","Allows air to escape from the oil tank and bearing compartments while retaining oil mist","Provides pressurized oil","Cools the oil"],"c":1,"x":"As oil returns to the tank, it's aerated. The breather vents air while a de-aerator or centrifugal separator captures oil mist before it exits overboard. Oil mist discharge is normal in small amounts."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"If a magnetic chip detector shows large metallic flakes rather than fine fuzz, this indicates:","o":["Normal wear","Significant internal damage \u2014 possible bearing or gear failure requiring engine removal","The detector needs cleaning","Oil contamination from fueling"],"c":1,"x":"Fine fuzz = normal wear. Large flakes or chunks = accelerated or catastrophic wear. Engine may need to be removed for inspection. This finding typically grounds the aircraft until investigated."},{"e":"AF","t":"Fabric Covering","d":2,"q":"The two main types of aircraft covering fabric are:","o":["Nylon and polyester","Cotton (Grade A) and synthetic (Poly-Fiber, Ceconite)","Fiberglass and Kevlar","Silk and linen"],"c":1,"x":"[TP14038 18.1] Grade A cotton was original standard. Modern synthetics (polyester like Poly-Fiber/Ceconite) are stronger, lighter, and resist rot. Both are still tested."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Fabric airworthiness is tested using:","o":["Visual inspection only","A fabric punch tester that measures force to penetrate","Weighing the fabric","Measuring thickness with a micrometer"],"c":1,"x":"[TP14038 18.2] Punch tester measures minimum tensile strength. New Grade A cotton \u2248 80 lbs. Minimum airworthy typically 46 lbs (56 lbs for some aircraft). Below = recover."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Dope on fabric-covered aircraft serves to:","o":["Add weight for CG","Tighten, waterproof, and protect the fabric; provide a smooth paintable surface","Lubricate control cables","Prevent static discharge"],"c":1,"x":"[TP14038 18.3] Clear dope shrinks and seals. Pigmented dope adds UV protection and color. Multiple coats applied with brush or spray."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Rejuvenator is applied to doped fabric to:","o":["Remove the fabric","Restore flexibility and adhesion to aging dope that has become brittle","Change the color","Increase fire resistance"],"c":1,"x":"[TP14038 18.3] Dope becomes brittle with age and UV exposure. Rejuvenator (a plasticizer) restores flexibility. Extends covering life before re-covering is needed."},{"e":"AF","t":"Fabric Covering","d":2,"q":"A fabric patch repair must extend beyond the damaged area by at least:","o":["1 inch","2 inches in all directions (or as specified by SRM)","6 inches","The full panel width"],"c":1,"x":"[TP14038 18.2] Overlap allows adequate bonding area. Doped-on patches use multiple coats of dope as adhesive. Sewn patches used for larger repairs on certain aircraft."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Rib stitching (rib lacing) attaches fabric to:","o":["The fuselage frame","Wing ribs using reinforcing tape and a rib stitch cord at specified spacing","The control surfaces","The engine cowling"],"c":1,"x":"[TP14038 18.2] Rib lacing prevents fabric from ballooning away from ribs under air loads. Stitch spacing decreases toward the wingtip (higher aerodynamic loads). Critical structural attachment."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Butyrate dope differs from nitrate dope in that butyrate:","o":["Is more flammable","Is less flammable and more flexible than nitrate","Cannot be applied over nitrate","Is only used on metal aircraft"],"c":1,"x":"[TP14038 18.3] Butyrate (CAB) = safer, more flexible, better UV resistance. Can be applied over properly prepared nitrate. Never apply nitrate over butyrate \u2014 it attacks the butyrate."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Reinforcing tape is applied over fabric:","o":["For decoration only","At all rib locations and along edges where fabric is attached to structure","Only on the leading edge","Only on control surfaces"],"c":1,"x":"[TP14038 18.2] Tape reinforces the fabric at stress points \u2014 over ribs, along trailing edges, and at attachment points. Prevents rib lacing cord from pulling through the fabric."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"The most common welding process for aircraft steel tube structures is:","o":["Stick (SMAW)","Gas welding (oxy-acetylene) and TIG (GTAW)","MIG (GMAW)","Spot welding only"],"c":1,"x":"[TP14038 19.1] Oxy-acetylene for 4130 chrome-moly steel tubing. TIG for stainless, titanium, aluminum. Both produce high-quality, controllable welds for aircraft work."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"A good aircraft weld should have:","o":["A wide, flat bead with undercut","Uniform width, smooth ripples, complete penetration, and no porosity or cracks","Maximum height for strength","Visible slag inclusions"],"c":1,"x":"[TP14038 19.1] Good weld: uniform bead, smooth ripples, full penetration (visible on back), no cracks/porosity/undercut/overlap. Inspect visually + NDT if required."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"4130 chrome-moly steel tubing is used in aircraft because:","o":["It's the cheapest","It has excellent strength-to-weight ratio, is weldable, and can be heat treated","It doesn't corrode","It's lighter than aluminum"],"c":1,"x":"[TP14038 19.2] 4130 = the standard aircraft steel alloy. Strong, weldable, heat-treatable. Used for engine mounts, fuselage trusses, and landing gear components."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"When inspecting a welded tubular structure, special attention is given to:","o":["Paint adhesion","Cluster joints (where multiple tubes meet) because stress concentration is highest","Only straight sections","Only non-welded areas"],"c":1,"x":"[TP14038 19.1] Cluster joints (multiple tubes welded together) have complex stress patterns. Cracks often start here. Inspect with magnification, dye penetrant, or other NDT."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Rosette welds are used on tubular structures to:","o":["Join tubes end-to-end","Attach gussets or plates to tubes through a hole in the outer tube","Repair cracks only","Join dissimilar metals"],"c":1,"x":"[TP14038 19.2] A hole is drilled in the outer tube, and the inner fitting is welded through it. Creates a strong attachment point without cutting the tube."},{"e":"AF","t":"Welding & Tubular","d":4,"q":"After welding 4130 steel tubing thicker than 0.093 inches, stress relief heat treatment may be required because:","o":["It improves appearance","Welding creates a heat-affected zone with residual stresses that could lead to cracking","It's never required","Only for aluminum"],"c":1,"x":"[TP14038 19.2] Thicker tubing retains more residual stress from welding. Stress relief (heating to specified temp, slow cool) reduces cracking risk. Required per manufacturer's data."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"The primary purpose of aircraft paint/finish is:","o":["Appearance only","Corrosion protection and identification, with aerodynamic smoothness as secondary benefit","Weight reduction","Structural reinforcement"],"c":1,"x":"[TP14038 20.1] Protection from corrosion, UV, and weather is primary. Markings for identification. Smooth finish reduces drag slightly. Appearance is a bonus."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Before painting bare aluminum, the surface must be:","o":["Left untreated","Cleaned, chemically treated (alodine/conversion coating), then primed","Only wiped with solvent","Sanded with coarse grit"],"c":1,"x":"[TP14038 20.1] Surface prep is 90% of a good paint job: clean \u2192 chemical treatment (Alodine creates bonding surface) \u2192 prime (epoxy or zinc chromate) \u2192 topcoat."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Zinc chromate primer is used on aircraft because:","o":["It's the cheapest","It provides excellent corrosion inhibition on aluminum and steel","It's the final coat","It's decorative only"],"c":1,"x":"[TP14038 20.1] Zinc chromate (yellow-green) is the classic aircraft primer. Being replaced by epoxy primers in many applications due to health/environmental concerns."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"When stripping paint from an aircraft, chemical strippers must be:","o":["Left on indefinitely","Applied carefully, monitored, and removed per instructions \u2014 never used on plexiglass, composites, or fabric without checking compatibility","Applied with a wire brush","Heated to improve effectiveness"],"c":1,"x":"[TP14038 20.1] Chemical strippers can damage composites, plexiglass, sealants, and some metals. Always mask sensitive areas. Follow time limits strictly."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Finishing materials for fabric aircraft include:","o":["Only automotive paint","Dope (nitrate/butyrate), primers, and UV-protective topcoats","Only powder coating","Anodizing"],"c":1,"x":"[TP14038 20.2] Fabric finish system: clear dope \u2192 pigmented dope \u2192 optional UV-resistant topcoat. Each coat must dry before the next. Proper application prevents fabric damage."},{"e":"PP","t":"Water Injection","d":3,"q":"Water-methanol injection in a reciprocating engine:","o":["Reduces power","Increases power by cooling the charge and allowing higher manifold pressure without detonation","Is only used for cooling","Replaces fuel"],"c":1,"x":"[TP14038 41.1] Water cools the intake charge \u2192 denser charge + detonation suppression \u2192 higher allowable manifold pressure \u2192 more power. Methanol prevents freezing and adds some fuel."},{"e":"PP","t":"Water Injection","d":3,"q":"In turbine engines, water injection increases thrust by:","o":["Burning the water","Increasing the mass flow through the engine and cooling the compressor discharge air","Reducing fuel flow","Lubricating the turbine"],"c":1,"x":"[TP14038 41.1] Water adds mass flow (more mass \u00d7 velocity = more thrust). Cooling effect on compressor discharge allows more fuel to be burned without exceeding EGT limits."},{"e":"PP","t":"Water Injection","d":2,"q":"Water injection systems are typically used during:","o":["Cruise only","Takeoff for maximum power when needed (hot day, high altitude, heavy aircraft)","Landing only","All phases of flight"],"c":1,"x":"[TP14038 41.1] Primarily for takeoff power augmentation. Limited water supply means it's used only when needed \u2014 hot/high conditions or maximum gross weight takeoffs."},{"e":"PP","t":"Water Injection","d":4,"q":"If a water injection system fails to operate during a takeoff that requires it:","o":["Continue takeoff normally","The takeoff must be rejected if the runway length requires augmented thrust","Add more fuel instead","Switch to emergency power"],"c":1,"x":"[TP14038 41.1] If performance calculations require water injection thrust and it fails, the aircraft may not achieve required climb gradient. Reject the takeoff if conditions require it."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Under CARs, a 'defect' that must be reported includes:","o":["Any cosmetic damage","Any condition that has caused or is likely to cause an unsafe condition","Minor paint scratches","Normal wear items"],"c":1,"x":"[TP14038 REGS 12.0] Reportable defects: conditions affecting airworthiness, unexpected failures, uncontained failures, significant deterioration. Report via SDR within specified timeframes."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Under CARs, 'maintenance' includes:","o":["Only repair work","Overhaul, repair, inspection, replacement, modification, and defect rectification","Only scheduled inspections","Only manufacturer work"],"c":1,"x":"[TP14038 REGS 18.0] Broad definition. Any work maintaining or restoring airworthiness = maintenance under CARs. Even cleaning can be maintenance if it affects airworthiness."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Performance of maintenance work requires:","o":["Only good intentions","Use of proper tools, approved data, qualified personnel, and adequate facilities","Any convenient location","Just an AME signature"],"c":1,"x":"[TP14038 REGS 26.0] CARs specify: right tools, right data, right people, right environment. Cutting corners on any of these = non-compliant maintenance."},{"e":"REGS","t":"Other Standards","d":3,"q":"A person holding an RCA (Restricted Certification Authority) may sign releases for:","o":["Any aircraft type","Only the specific types and tasks authorized in the certificate","All maintenance","Only inspections"],"c":1,"x":"[TP14038 REGS 28.0] RCA is limited scope \u2014 specific aircraft types, specific tasks, as defined in the authorization. More restrictive than full AME privileges."},{"e":"REGS","t":"AME Licensing","d":2,"q":"To sign a maintenance release, an AME must have:","o":["Only a valid licence","Valid licence PLUS recency PLUS competence on the specific aircraft type","Only recency","Only employer authorization"],"c":1,"x":"[TP14038 REGS 9.0] ALL THREE: valid licence + recency (6 months in 24) + competency on type. Missing any one = cannot legally sign the release."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"A synchro system transmits:","o":["Audio signals","Angular position data electrically from one location to another","Hydraulic pressure","Fuel flow"],"c":1,"x":"[TP14038 2.15] Synchros convert mechanical shaft position to electrical signals. Used for flap position indicators, throttle position, and other remote indication systems."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Boolean logic: an AND gate outputs TRUE only when:","o":["Any input is TRUE","ALL inputs are TRUE","No inputs are TRUE","Inputs are alternating"],"c":1,"x":"[TP14038 2.10] AND gate: all inputs must be 1 for output 1. OR gate: any input 1 = output 1. NOT gate: inverts. Used in aircraft logic systems."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Hexadecimal number system uses base:","o":["2","8","10","16"],"c":3,"x":"[TP14038 2.19] Hex uses 0-9 plus A-F (A=10, B=11... F=15). Used in avionics memory addresses and fault codes. F in hex = 15 in decimal = 1111 in binary."},{"e":"AF","t":"Structures","d":2,"q":"Windows and doors on pressurized aircraft are critical because:","o":["They let in light","They must withstand the cabin differential pressure while maintaining seal integrity","They are decorative","They only affect noise"],"c":1,"x":"[TP14038 12.3] Pressurized cabin windows carry significant structural loads. Door seals must maintain pressure. Cracked windows or damaged seals = depressurization risk."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"A symmetry check on an aircraft verifies:","o":["Paint symmetry","That the aircraft structure and control surfaces are aligned symmetrically per manufacturer specifications","Engine mounting angle","Fuel distribution"],"c":1,"x":"[TP14038 13.2] Symmetry check measures wing incidence, dihedral, sweep, and control surface alignment. Asymmetry = roll/yaw tendencies in flight. Done after structural repair or heavy maintenance."},{"e":"AF","t":"Landing Gear","d":2,"q":"Skid-type landing gear on helicopters is inspected for:","o":["Paint condition","Cracks, deformation, wear at crosstubes, and proper ground clearance","Only cleanliness","Tire pressure"],"c":1,"x":"[TP14038 23.3] Skid tubes wear at ground contact points. Crosstube attachments carry landing loads and are fatigue-prone. Hard landings require detailed inspection per maintenance manual."},{"e":"AF","t":"Instruments","d":3,"q":"An Air Data Computer (ADC) receives inputs from:","o":["Only the compass","Pitot and static sources, temperature probes, and AOA sensors to compute airspeed, altitude, vertical speed, and Mach number","Engine instruments","GPS only"],"c":1,"x":"[TP14038 28.4] ADC digitally computes what separate analog instruments used to do individually. Feeds data to EFIS displays, autopilot, FMS, and other systems."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"Weather radar on aircraft:","o":["Detects all weather equally","Detects precipitation (rain, hail) and turbulence by analyzing radar returns \u2014 helps pilots avoid hazardous weather","Replaces visual observation","Only works on the ground"],"c":1,"x":"[TP14038 29.3] Radar antenna in the nose radome transmits and receives. Different colors (green/yellow/red) indicate precipitation intensity. Tilt control allows scanning at different altitudes."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"Emergency frequencies include:","o":["Only 121.5 MHz","121.5 MHz (civil emergency) and 243.0 MHz (military emergency)","Only the local tower frequency","There are no dedicated emergency frequencies"],"c":1,"x":"[TP14038 29.6] 121.5 MHz is monitored by all ATC facilities. 243.0 MHz is the military equivalent. ELTs transmit on 121.5 and 406 MHz (satellite detection)."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Accessory drives on a turbine engine are powered by:","o":["Separate electric motors","The accessory gearbox driven by the engine through a tower shaft from the HP spool","External hydraulic power","Ground power unit"],"c":1,"x":"[TP14038 36.3] The accessory gearbox (AGB) mounts on the engine and is gear-driven. It drives: fuel pump, oil pump, hydraulic pump, generator, starter. Tower shaft connects to HP compressor."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Engine mounts on a turbine engine must:","o":["Only support the weight","Support the engine weight, absorb thrust loads, and isolate vibration from the airframe","Be welded to the wing","Be made of aluminum"],"c":1,"x":"[TP14038 36.4] Mounts transmit thrust and weight while isolating vibration. Typically use vibration-dampening elements. Inspect for cracks, corrosion, and mounting hardware condition."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Built-In Test Equipment (BITE) on modern engines:","o":["Replaces all manual inspections","Provides automated self-testing and fault detection, storing fault codes for maintenance troubleshooting","Only works during flight","Is only on military engines"],"c":1,"x":"[TP14038 40.4] BITE continuously monitors engine systems, records faults, and displays codes for maintenance. Reduces troubleshooting time. Download fault history during maintenance."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Engine vibration monitoring systems measure vibration in:","o":["Only one axis","Multiple axes (typically radial and axial) at different engine locations","Only during start","Only at idle"],"c":1,"x":"[TP14038 40.3] Accelerometers at specific locations track vibration levels and frequencies. Each frequency signature corresponds to specific components (fan, HP rotor, bearings). Trending catches problems early."}];

tops(S.ex).forEach(t=>{const tqs=flt(S.ex,t,S.df||undefined),tot2=tqs.length;

function startMk(exam,num,mins){

const elapsed=Date.now()-m.start;const rem=Math.max(0,m.dur-elapsed);
if(rem<=0&&m.ans[m.cur]===null){finMk();return}
const mins=Math.floor(rem/60000);const secs=Math.floor(rem%60000/1000);

else $(ac,h("button","btn bg",{txt:"✓ Finish Exam",onclick(){m.ans[m.cur]=m.sel;finMk()}}));$(R,ac);

S.mr={total:m.qs.length,correct,qs:m.qs,ans:m.ans,exam:m.exam};S.mock=null;S.pg="result";go()}
