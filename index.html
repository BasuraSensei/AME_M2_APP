eading edge","The plane of rotation to the blade chord line at a specific station (usually 30\" or 42\")","The hub to the tip","The direction of flight"],"c":1,"x":"Measured at a specified station (distance from center) because blade angle varies from hub (high) to tip (low). This twist optimizes the AOA along the entire blade. Use a protractor and gauge block."},{"e":"PP","t":"Propellers","d":3,"q":"A wood propeller is inspected for:","o":["Only paint condition","Delamination (tap test), cracks, scars, worm holes, crush-in of bolt holes, and tip damage","Only balance","Only tracking"],"c":1,"x":"[FAA AMP Q84] Delamination = glue failure between laminations (detect by tap test). Cracks along grain are serious. Bolt hole elongation from prop flange hammering. Leading edge erosion. All are airworthiness concerns."},{"e":"PP","t":"Propellers","d":4,"q":"A prop strike (blade contacts ground or object) requires:","o":["Only visual inspection","Complete teardown inspection of propeller AND engine, as sudden stoppage may have damaged crankshaft, bearings, and gears","Just polishing the nick","Blade replacement only"],"c":1,"x":"Sudden stoppage transmits enormous shock loads through the prop to the crankshaft, bearings, counterweights, and gears. Even a minor strike may have bent the crank or damaged internal components. Full inspection mandatory."},{"e":"PP","t":"Propellers","d":2,"q":"An unfeathering accumulator on a turboprop stores:","o":["Fuel","Oil pressure to restart a feathered propeller \u2014 since the engine-driven pump can't build pressure with a windmilling prop","Nitrogen gas only","Hydraulic fluid only"],"c":1,"x":"After feathering (engine shutdown), the engine-driven prop pump has no pressure. The accumulator stores enough oil pressure to unfeather the blade to a start position so the engine can be restarted."},{"e":"PP","t":"Propellers","d":3,"q":"Propeller overspeed is prevented by:","o":["Pilot vigilance only","The governor, plus an overspeed governor (backup) that drives the prop to high pitch if primary governor fails","Structural blade limits","Fuel cutoff"],"c":1,"x":"Primary governor maintains set RPM. If it fails and prop goes toward flat pitch (overspeed), a separate overspeed governor takes over and drives blades toward high pitch. Prevents destructive overspeed."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"A fuel/air mixture that is too rich in a recip engine causes:","o":["Detonation","Reduced power, fouled plugs, high fuel consumption, and black exhaust smoke","Increased efficiency","Higher CHT"],"c":1,"x":"Excess fuel: not all burns = wasted fuel, carbon deposits on plugs, rough running. Black smoke = unburned carbon. Engine runs cooler (fuel has a cooling effect) but wastes fuel."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"A fuel/air mixture that is too lean causes:","o":["Black smoke","Higher CHT, rough running, detonation risk, and engine damage","Lower CHT","Fouled plugs"],"c":1,"x":"Lean mixture burns hotter and slower. Excessive CHT \u2192 detonation \u2192 piston and cylinder damage. Lean misfire = rough running at very lean settings. Never operate lean of peak at high power."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"An economizer valve in a carburetor:","o":["Saves money","Provides additional fuel (enrichment) at high power settings to prevent detonation and cool the engine","Reduces fuel flow always","Is used only at idle"],"c":1,"x":"At cruise: economizer keeps mixture lean for efficiency. At high power: spring-loaded valve opens, adding fuel. Rich mixture at high power prevents detonation and reduces CHT. Automatic enrichment."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"A turbocharger wastegate that is stuck closed will cause:","o":["No boost","Overboosting \u2014 manifold pressure exceeds limits, risking detonation and engine damage","Normal operation","Low fuel pressure"],"c":1,"x":"Stuck closed = all exhaust through turbo = maximum boost at all times. MAP exceeds redline. Detonation risk is extreme. Emergency: retard throttle to control MAP manually. Requires immediate repair."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"Carburetor heat enriches the mixture because:","o":["It adds fuel","Heated air is less dense \u2014 same volume contains less oxygen, making the existing fuel proportion richer","It removes air","It changes fuel pressure"],"c":1,"x":"Hot air = less dense = less oxygen per volume. Same fuel flow + less air = richer mixture. RPM may drop slightly when carb heat is applied (hot air = less power). This is normal."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"A fuel injection system's main advantage over a carburetor for engine power:","o":["Simpler design","More precise fuel metering to each cylinder for better power balance, efficiency, and no carb icing susceptibility","Lower cost","Easier to maintain"],"c":1,"x":"Injection = measured dose to each cylinder individually. No venturi icing. Better fuel distribution = more even EGTs across cylinders = more total power and smoother operation."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"The idle mixture is adjusted until:","o":["The engine stops","A slight RPM rise is noted just before the engine dies during idle cutoff \u2014 indicates correct idle mixture","Maximum RPM is achieved","The exhaust is black"],"c":1,"x":"Idle cutoff test: pull mixture to idle cutoff. A slight RPM rise (25-50 RPM) before engine quits = correct. No rise = too lean. Large rise = too rich. Classic maintenance adjustment."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Vapor lock in a fuel system is caused by:","o":["Excessive fuel pressure","Fuel vaporizing in the lines due to heat or low pressure \u2014 interrupting fuel flow to the engine","Cold fuel","Water in fuel"],"c":1,"x":"Heat (engine compartment) or low pressure (altitude, suction) causes fuel to boil in the lines. Vapor bubbles block liquid flow. Prevention: boost pumps maintain positive pressure, proper line routing away from heat sources."},{"e":"PP","t":"Recip Fuel & Control","d":4,"q":"During a magneto check, if the engine runs smoother on one magneto than on BOTH, this indicates:","o":["Normal operation","One spark plug may be fouled or misfiring \u2014 it fires incorrectly on BOTH but doesn't fire on the good magneto check","Both magnetos are fine","The engine is overpowered"],"c":1,"x":"On BOTH: both plugs fire, including the bad one (misfiring). On single mag: only the good plug fires per cylinder = smoother. The bad plug is on the mag that shows the bigger drop. Troubleshoot by checking plugs."},{"e":"PP","t":"Recip Fuel & Control","d":2,"q":"An alternate air door on a fuel-injected engine:","o":["Provides air conditioning","Opens to provide unfiltered air if the primary air filter becomes blocked \u2014 prevents engine air starvation","Adjusts mixture","Controls exhaust"],"c":1,"x":"If the filter ices over or becomes clogged (bird nest, debris), the alternate air door provides a secondary air path. Usually automatic (spring-loaded) or manual. Bypasses the filter \u2014 unfiltered but better than no air."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Spark plug gap affects:","o":["Fuel flow","Spark intensity and ability to ignite the mixture \u2014 too wide or narrow causes misfire","Engine mounting","Oil consumption"],"c":1,"x":"Correct gap = reliable spark. Too wide = spark can't jump (misfire at high altitude/pressure). Too narrow = weak spark, fouling. Set with feeler/wire gauge per engine manual."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Impulse coupling on a magneto:","o":["Increases engine RPM","Provides a late, hot spark during cranking \u2014 retards timing and speeds up magnet rotation for reliable starting","Reduces fuel flow","Disengages the magneto"],"c":1,"x":"At cranking speed, the magneto produces a weak spark. Impulse coupling: spring holds the magnet, then snaps it forward = fast rotation = hot spark. Also retards timing to prevent kickback."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Spark plug lead routing must avoid:","o":["Cylinder heads","Contact with exhaust stacks and other heat sources that could damage the insulation","The firewall","The air filter"],"c":1,"x":"High-voltage leads near hot exhaust can have insulation breakdown = crossfire or misfire. Proper routing, clamps, and heat shields are essential. Inspect for chafing and heat damage."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"A 'hot magneto' (one that can fire with the switch OFF) is dangerous because:","o":["It wastes fuel","The engine can fire and start if the propeller is moved even slightly \u2014 serious injury/death risk","It overheats","It's too loud"],"c":1,"x":"P-lead grounds the magneto to prevent sparking. Open/disconnected P-lead = magneto always live. Always treat a propeller as if it could fire. Verify P-lead integrity during maintenance."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"Shower of sparks ignition system provides:","o":["Constant sparking","A continuous stream of sparks during start (from a vibrator) for reliable ignition \u2014 used with retarded timing","A single spark per revolution","Sparks only during cruise"],"c":1,"x":"Vibrator buzzes the primary circuit rapidly = continuous sparks at the plugs during cranking. Combined with a retard breaker for safe timing during start. Common on Continental and Lycoming engines."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Magneto internal timing sets:","o":["Fuel mixture","The exact point where the breaker points open relative to the rotating magnet position for maximum spark","Engine idle RPM","Oil pressure"],"c":1,"x":"Points must open at the E-gap (Efficiency gap) position \u2014 where the magnetic field change rate is maximum = strongest spark. Internal timing is set with a timing light or pin during magneto maintenance."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"An aircraft starter motor is typically:","o":["A small gasoline engine","A high-torque DC electric motor or pneumatic starter","A hydraulic motor only","A hand crank"],"c":1,"x":"Recip aircraft: electric starter (12V or 24V, high-current DC motor). Turbines: pneumatic (air turbine), electric starter-generators, or air turbine starters. Must disengage after start."},{"e":"PP","t":"Recip Ignition & Starting","d":3,"q":"Starter duty cycle limits exist because:","o":["Starters are designed for continuous use","Starters overheat quickly \u2014 cranking time limits and cool-down periods prevent damage","Pilots get impatient","Fuel flow is limited"],"c":1,"x":"Typical: crank 10 seconds, rest 20 seconds, repeat max 3 cycles then wait 30+ minutes. Continuous cranking overheats the motor/solenoid/ring gear. Follow engine manual limits exactly."},{"e":"PP","t":"Recip Ignition & Starting","d":4,"q":"During magneto timing to the engine, the magneto must fire at:","o":["TDC exactly","The specified number of degrees Before Top Dead Center (BTDC) on the compression stroke of #1 cylinder","BDC","Any point in the cycle"],"c":1,"x":"Engine timing: typically 20-25\u00b0 BTDC depending on engine model. Ensures peak combustion pressure occurs just after TDC for maximum power. Verified with a timing indicator/light. Wrong timing = power loss, detonation, or backfire."},{"e":"PP","t":"Recip Ignition & Starting","d":2,"q":"The P-lead on a magneto:","o":["Provides power to the magneto","Grounds the magneto to stop it from firing \u2014 switch OPEN = magneto grounded = no spark","Is the primary output lead","Connects to the battery"],"c":1,"x":"P-lead = Primary lead. Switch OFF = P-lead grounds the primary circuit = no spark. Switch ON = P-lead disconnected = magneto fires. Backwards from what you'd expect! That's why broken P-lead = hot magneto."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Full-flow oil filtration means:","o":["Oil bypasses the filter","ALL oil passes through the filter before reaching the engine bearings","Only some oil is filtered","Filter is removed during operation"],"c":1,"x":"Full-flow: 100% of oil goes through the filter. Bypass: only a portion. Most modern aircraft engines use full-flow with a bypass valve for when the filter clogs (ensures oil flow even if filter blocks)."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil pressure that is too high may be caused by:","o":["Normal warm operation","Cold thick oil, stuck-closed relief valve, or restricted oil passage","Low oil level","Worn bearings"],"c":1,"x":"High pressure at startup (cold oil) is normal \u2014 decreases as oil warms. Sustained high pressure: stuck relief valve or blockage. Can blow seals or burst oil cooler. Reduce power and investigate."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Oil temperature that is too high indicates:","o":["Normal operation","Possible low oil level, blocked cooler, defective thermostat, or insufficient airflow over the cooler","Excess oil","Cold weather"],"c":1,"x":"High oil temp = oil breaking down, reduced lubrication, increased wear. Causes: low oil (less thermal mass), blocked cooler, missing/damaged baffles, prolonged high-power operation."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Cylinder cooling fins that are broken or missing reduce:","o":["Engine weight only","Heat dissipation from that cylinder \u2014 potentially causing local overheating and CHT exceedance","Nothing significant","Only cosmetic appearance"],"c":1,"x":"Each fin adds surface area for heat rejection. Missing fins = that area retains heat. SRM/manual specifies maximum missing fin area. Beyond limits = cylinder replacement."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"Engine cowl flaps are opened during:","o":["Cruise only","Climb and ground operations when engine cooling needs are highest","Descent only","Taxi only"],"c":1,"x":"Open: max cooling (climb, ground). Closed: reduce drag at cruise (sufficient cooling from ram air). On the ground: no ram air, rely on prop blast + cowl flap opening."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil dilution (adding fuel to the oil) was used on older aircraft to:","o":["Improve lubrication","Thin the oil for easier cold-weather starting \u2014 fuel evaporates as engine warms up","Increase fuel capacity","Reduce oil consumption"],"c":1,"x":"Pre-multigrade oil era: thick cold oil prevented cranking. Diluting with fuel thinned it for starting. Fuel burned off as oil heated. Modern multi-grade oils eliminate this need, but the concept is still tested."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"SOAP analysis identifies specific metals to pinpoint:","o":["Fuel quality","Which internal components are wearing \u2014 each component type contains specific metals","Oil brand","Filter condition"],"c":1,"x":"Iron = cylinders/gears. Copper = bearings/bushings. Chrome = piston rings/cylinder walls. Silver = bearing overlay. Aluminum = pistons/cases. Trending specific metals = pinpoint the wearing component."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"A vernatherm (thermostatic valve) in the oil system:","o":["Measures oil temperature","Routes oil through or around the oil cooler based on temperature \u2014 maintains optimal oil temp","Is the oil pressure regulator","Controls fuel temperature"],"c":1,"x":"Cold oil: valve bypasses the cooler (fast warmup). Warm oil: valve routes through cooler (maintains operating temp). Automatic temperature regulation. Same principle as an automotive thermostat."},{"e":"PP","t":"Recip Lube & Cooling","d":4,"q":"If oil pressure drops suddenly and oil temperature rises rapidly:","o":["Normal operation","Possible oil pump failure, bearing seizure, or oil line rupture \u2014 immediate power reduction and possible shutdown required","Add more oil and continue","Check at next scheduled stop"],"c":1,"x":"This is an emergency. Low pressure + high temp = oil not circulating. Continued operation = catastrophic bearing failure and possible engine fire. Reduce power, land ASAP, or shut down if conditions worsen."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"The oil screen/suction strainer protects the:","o":["Oil tank","Oil pump from large debris at the pump inlet","Bearings","Filter"],"c":1,"x":"Coarse screen at the pump inlet catches large debris that could damage pump gears/elements. Finer filtration is downstream. Check suction screen during oil changes \u2014 debris found here indicates internal problems."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"A manifold pressure gauge is critical for recip engines because:","o":["It shows exhaust pressure","It indicates the pressure of air/fuel entering the cylinders \u2014 directly relates to engine power output","It measures oil pressure","It shows altitude"],"c":1,"x":"MAP + RPM = power setting for recip engines. Higher MAP = more charge = more power. With turbo, MAP can exceed ambient pressure. Monitor MAP to prevent overboosting."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"A CHT (Cylinder Head Temperature) gauge monitors:","o":["Only exhaust temperature","The temperature of the hottest cylinder \u2014 exceeding limits indicates cooling problems or improper operation","Oil temperature","Ambient temperature"],"c":1,"x":"CHT probe in the hottest cylinder (usually the #3 or #4 on some engines). High CHT = risk of detonation and thermal damage. Reduce power, enrich mixture, open cowl flaps. Max CHT varies by engine."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"An oil pressure gauge reads abnormally low. First check:","o":["The oil cap color","Oil level on the dipstick or sight gauge","Engine RPM","Fuel flow"],"c":1,"x":"Low pressure could be: low level (most common), worn bearings, weak pump, stuck relief valve, gauge/sender failure. Check level first \u2014 it's the simplest and most likely cause."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Engine trend monitoring on turbine engines plots parameters against:","o":["Random data","A baseline (the engine's performance when new/overhauled) at standardized conditions","Other aircraft data","Manufacturer averages only"],"c":1,"x":"Trending compares current performance to the engine's own baseline. Gradual degradation from baseline = wear/deterioration. Sudden shift = fault developing. Most valuable for predicting failures."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"Fuel pressure gauge too low may indicate:","o":["Normal operation","Clogged fuel filter, failing pump, or vapor lock","Full fuel tanks","Cold weather operation"],"c":1,"x":"Low fuel pressure = risk of fuel starvation, especially at high power. Check: fuel selector position, boost pump operation, filter condition. Immediate attention required in flight."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Vibration monitoring on turbine engines can identify:","o":["Only fan blade damage","Specific component issues based on vibration frequency \u2014 fan, compressor, turbine, bearings all have unique signatures","Only gearbox issues","Nothing useful"],"c":1,"x":"Each rotating component has a characteristic frequency. Fan vibration = 1\u00d7N1 frequency. HP rotor = 1\u00d7N2. Bearings have specific defect frequencies. Spectrum analysis identifies which component is failing."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"An ammeter shows:","o":["Voltage","Current flow to/from the battery \u2014 positive (charging) or negative (discharging)","Resistance","Frequency"],"c":1,"x":"Ammeter monitors battery charge state. Normal: slight positive (charging) after start. Zero or negative after start = generator/alternator failure. Important for monitoring electrical system health."},{"e":"PP","t":"Recording & Indicating","d":4,"q":"Exceedance recording on FADEC-equipped engines logs:","o":["Only normal data","Any parameter that exceeds operational limits \u2014 EGT overtemp, overspeed, over-torque events with time and severity","Only fuel data","Nothing"],"c":1,"x":"FADEC records every limit exceedance with timestamp, duration, and magnitude. Downloaded during maintenance. Exceedances may require inspection, reduced life, or immediate action per engine maintenance manual."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Fuel filters in a turbine system include:","o":["Only one filter","Low-pressure (tank outlet), high-pressure (after pump), and last-chance filters at fuel nozzles","No filters needed","Only a screen at the tank"],"c":1,"x":"Multiple filtration stages protect progressively more sensitive components. LP filter: coarse (protects pump). HP filter: fine (protects FCU/nozzles). Last-chance: screens at nozzle inlets."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"A fuel flow divider in a turbine engine:","o":["Splits fuel 50/50 to two tanks","Distributes fuel evenly to all nozzles and may provide primary/secondary fuel scheduling for different power ranges","Mixes fuel with oil","Only operates during starting"],"c":1,"x":"At low fuel flows (idle): only primary nozzle orifices active. Higher flows: valve opens to supply secondary orifices too. This ensures proper atomization across the full operating range."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Fuel drains in a turbine engine combustion section:","o":["Are decorative","Allow unburned fuel to drain after a failed start, preventing a pool fire or hot start on the next attempt","Only drain during flight","Collect condensation"],"c":1,"x":"After a failed start, fuel collects in the combustion chamber. Without draining = hot start on next attempt (pooled fuel ignites all at once). Drain valves open when engine is not running."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel specific gravity affects engine operation because:","o":["It doesn't matter","FADEC/FCU must account for fuel density to calculate correct fuel flow by mass, not just volume","Gravity has no effect on fuel","Only the pilot needs to know"],"c":1,"x":"Thrust depends on fuel mass flow, not volume. Cold dense fuel = more mass per gallon = more energy. FADEC sensors measure fuel temperature/density and adjust flow accordingly."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"If the FADEC fails completely on a dual-channel FADEC system:","o":["Nothing happens \u2014 there's always one channel remaining","The backup channel takes over \u2014 most FADEC systems have at least two independent channels for redundancy","The engine shuts down","Manual fuel control takes over"],"c":1,"x":"Dual-channel FADEC: Channel A fails \u2192 Channel B takes over seamlessly. If BOTH fail (extremely rare), some aircraft have hydromechanical backup. Complete FADEC failure = possible engine loss. Redundancy is critical."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Engine trimming adjusts:","o":["Physical size of the engine","Fuel flow at idle and maximum thrust to ensure the engine meets performance specifications","Oil pressure","Blade pitch"],"c":1,"x":"Trimming: fine-tune the FCU so the engine produces correct idle RPM and maximum rated thrust (or torque). Done after FCU replacement, engine change, or when performance has drifted from specifications."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"A hydromechanical fuel control unit (HMU) schedules fuel using:","o":["Electronics only","Mechanical cams, levers, and hydraulic servos that respond to multiple engine parameters","Pilot judgment only","A fixed flow rate"],"c":1,"x":"HMU: no electronics. 3D cam schedules fuel based on throttle position, N2, inlet temperature, compressor pressure. Mechanical genius \u2014 but less precise than FADEC. Still used as backup on some engines."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"An engine-driven fuel pump is typically a:","o":["Centrifugal pump only","Gear-type or piston-type positive displacement pump providing high pressure to the FCU","Hand pump","Electric only"],"c":1,"x":"Positive displacement pump: output proportional to RPM. High pressure (500-1500 PSI) to supply the FCU and fuel nozzles. Driven by the accessory gearbox."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"The acceleration limiter in a fuel control prevents:","o":["Engine from reaching full power","Rich blowout and compressor stall during rapid throttle advancement by limiting fuel flow rate of increase","Engine from starting","Over-temperature at cruise"],"c":1,"x":"Rapid throttle slam = too much fuel too fast = rich blowout or compressor stall. The accel schedule limits how quickly fuel increases, keeping the engine within safe operating boundaries during transient operations."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"A fuel nozzle coking problem is indicated by:","o":["Perfectly even EGT spread","Uneven EGT spread \u2014 the affected nozzle produces a hot or cold streak in the combustion section","Better fuel economy","Lower oil temperature"],"c":1,"x":"Carbon deposits (coke) partially block the nozzle, altering spray pattern. Result: uneven combustion \u2192 EGT spread increases \u2192 hot spots on liners and turbine blades. Nozzle cleaning/flow check required."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"The engine inlet on a subsonic aircraft is designed as a:","o":["Nozzle to accelerate air","Diffuser \u2014 slowing air and converting velocity to pressure before the compressor","A sharp-edged opening","A filter system"],"c":1,"x":"Inlet = diffuser. Air decelerates = pressure increases = compressor starts at higher pressure. Good inlet design recovers as much ram pressure as possible at all flight conditions."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Engine inlet icing is detected by:","o":["Pilot observation only","EPR/N1 changes, vibration increase, or dedicated ice detection probes","Oil temperature","Cabin pressure changes"],"c":1,"x":"Ice on inlet or guide vanes reduces airflow = power changes + possible compressor stall. EPR drops unexpectedly, or ice detector probe triggers. Activate engine anti-ice before entering icing conditions."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"A tailpipe inspection includes checking for:","o":["Paint quality","Cracks, hot spots, warping, FOD damage, erosion, and signs of nozzle guide vane deterioration","Only external condition","Noise levels"],"c":1,"x":"Tailpipe tells the story of combustion health. Hot spots = fuel nozzle problems. Cracks = thermal fatigue. Erosion = high temps or contamination. Borescope and visual inspection."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Cascade-type thrust reversers work by:","o":["Reversing engine rotation","Blocking the fan duct and redirecting fan air forward through cascade vanes","Stopping the fan","Reversing exhaust through the core"],"c":1,"x":"Blocker doors close off the normal fan duct. Air forced out through fixed cascade vanes angled forward. Only redirects fan/bypass air (not core exhaust on most designs). Actuated by hydraulics or pneumatics."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"A clamshell-type thrust reverser works by:","o":["Cascading air","Two bucket halves deploy behind the nozzle to redirect exhaust forward","Blocking the inlet","Reversing the compressor"],"c":1,"x":"Clamshell (target/bucket): two halves rotate to redirect the entire exhaust flow forward. Used on low-bypass and some older turbofan engines. Simpler mechanism than cascade type."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"An exhaust augmenter (ejector) on a turboprop:","o":["Increases fuel flow","Uses exhaust velocity to draw cooling air over the engine, and may augment thrust slightly","Reduces exhaust noise only","Has no functional purpose"],"c":1,"x":"Ejector effect: high-velocity exhaust entrains additional ambient air. Cools the engine compartment and provides some additional thrust from the accelerated ambient air. Common on PT6 installations."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"Engine cowling access panels must be:","o":["Left open for ventilation","Properly latched and secured after maintenance \u2014 lost cowl panels can damage the aircraft or other aircraft","Painted bright colors","Removed during all inspections"],"c":1,"x":"Lost cowl panels: FOD to following aircraft, damage to horizontal stabilizer, loss of fire containment. Several incidents from improperly latched panels. Verify latches during walk-around."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"A bellmouth inlet on a turbine engine:","o":["Is a standard flight inlet","Is used for ground test cells \u2014 smooth, radiused inlet provides undisturbed airflow for accurate performance testing","Reduces thrust","Is for supersonic flight"],"c":1,"x":"Bellmouth: near-perfect airflow for engine testing. Provides a known, consistent inlet condition. Flight inlets have compromises (ice protection, FOD screens, shape constraints) that affect performance measurement."},{"e":"PP","t":"Turbine Induction & Exhaust","d":4,"q":"An engine with foreign object damage to the first-stage compressor blades may show:","o":["No symptoms","Increased vibration, reduced performance (lower N1 at given fuel flow), and higher EGT due to reduced compressor efficiency","Better performance","Lower EGT"],"c":1,"x":"Nicked/bent blades = airflow disruption = reduced compression = engine works harder = higher EGT for same thrust. Vibration increases from imbalance. May require blend repair or blade replacement."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"An inlet FOD screen (guard) on a turboprop or turboshaft:","o":["Is never used","Prevents debris ingestion during ground operations \u2014 especially important for helicopters and turboprops in unpaved areas","Increases engine power","Is only for military"],"c":1,"x":"Wire mesh screen over the inlet catches stones, ice, and debris. Causes slight pressure drop (reduced performance). Removed for flight on some installations. Essential for ground ops in harsh environments."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Turbine engine oil is typically changed:","o":["Only when dirty","At intervals specified by the engine manufacturer \u2014 often every 200-600 hours or calendar time","Only during overhaul","When the pilot requests it"],"c":1,"x":"Oil change intervals are maintenance manual requirements. Oil degrades from heat, absorbs moisture and acids, and accumulates contaminants. Regular changes and analysis prevent problems."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Bearing seals in a turbine engine prevent:","o":["Fuel leaks only","Hot gas ingestion into bearing compartments and oil leakage into the gas path","Air leaks","Vibration"],"c":1,"x":"Labyrinth seals + pressurized air cavity = keep hot gas out and oil in. Seal failure: oil enters combustion section \u2192 smoke/fumes in cabin bleed air, or external oil leak. Serious maintenance issue."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Oil quantity is checked:","o":["Only when the low-oil light illuminates","Per maintenance manual \u2014 typically with the engine shut down for a specified period to allow oil to drain back to the tank","While the engine is running","Only during overhaul"],"c":1,"x":"Hot oil distributed throughout the engine takes time to drain back. Most manuals specify a wait time (5-30 minutes) after shutdown before checking level. Checking too soon = false low reading."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"A bearing compartment sump scavenge pump must have greater capacity than the pressure pump to:","o":["Create backflow","Ensure the bearing compartment stays relatively empty \u2014 oil is removed faster than it's delivered, preventing buildup and leakage","Increase oil pressure","Reduce oil temperature"],"c":1,"x":"If scavenge capacity < pressure supply, oil accumulates in the bearing area. Rising oil level contacts the rotating shaft \u2192 foaming, overheating, and potential seal blow-through. Scavenge ratio is typically 2:1 to 3:1."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"An oil-to-air heat exchanger (air-oil cooler):","o":["Heats the oil","Uses ram air or fan air flowing over fins to cool the oil","Mixes oil with air","Pressurizes the oil"],"c":1,"x":"Oil flows through finned tubes, air flows over the fins. Heat transfers from oil to air. Controlled by a bypass valve (cold oil bypasses the cooler). Located in the fan duct or engine cowl."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Oil system venting is necessary because:","o":["Oil tanks need to be open to atmosphere","Air enters the bearing compartments through labyrinth seals and must be vented out \u2014 along with oil mist that is separated and returned","It reduces oil consumption","It increases pressure"],"c":1,"x":"Air ingested past seals pressurizes bearing compartments. Vent system removes this air. De-oiling (centrifugal separator/coalescer) recovers oil from the air before venting overboard."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"If the oil scavenge temperature rises significantly while oil pressure remains normal, this may indicate:","o":["Normal operation at high power","A bearing is running hot due to inadequate lubrication or early-stage bearing distress \u2014 investigate immediately","The oil is too thick","Cold weather operation"],"c":1,"x":"Normal pressure + high scavenge temp = oil is circulating but being heated excessively at one bearing. The bearing itself may be deteriorating. Early sign of impending failure. Ground the aircraft, investigate."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Turbine engine oil consumption is tracked because:","o":["It's required for accounting","Increased consumption may indicate bearing seal deterioration, internal leaks, or bearing wear","It affects fuel consumption","It doesn't matter"],"c":1,"x":"Track oil added at each service. Rising trend = seal wear or bearing issue. Sudden increase = possible seal failure. Oil consumption trending is part of engine health monitoring."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Synthetic turbine engine oil must never be mixed with mineral oil because:","o":["It's the same thing","They are chemically incompatible \u2014 mixing causes sludging, seal damage, and loss of lubrication properties","Mineral oil is better","Synthetic is cheaper"],"c":1,"x":"Completely different chemical bases. Mixing creates gummy deposits, attacks seals, loses load-carrying ability. Separate storage, separate handling, dedicated servicing equipment. If contaminated, flush entire system."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"An oil filter bypass indicator (pop-out button) indicates:","o":["Filter is new","Filter element is approaching clogged condition \u2014 oil is bypassing the filter to maintain flow","Oil level is low","Engine is overheating"],"c":1,"x":"Same as hydraulic filter delta-P indicator. Bypass ensures oil flow continues even with a clogged filter \u2014 but it's UNFILTERED. The indicator warns that the filter needs changing NOW. Check during every walkaround/service."},{"e":"PP","t":"Water Injection","d":2,"q":"Water injection for recip engine power augmentation:","o":["Replaces fuel","Supplements fuel by cooling the intake charge, allowing higher manifold pressure without detonation","Increases octane rating of fuel","Lubricates the engine"],"c":1,"x":"Water absorbs heat from compression = cooler, denser charge. Anti-detonation effect allows more boost. Methanol prevents freezing and provides supplementary fuel. Used for takeoff power."},{"e":"PP","t":"Water Injection","d":3,"q":"Water-methanol mixture ratio is typically:","o":["100% water","50/50 water-methanol or as specified by the engine manufacturer","100% methanol","75% fuel, 25% water"],"c":1,"x":"Ratio varies by engine type: typically 40-70% water, balance methanol. Methanol prevents freezing to approximately -40\u00b0F and provides some fuel energy. Must use the correct mix \u2014 wrong ratio reduces effectiveness."},{"e":"PP","t":"Water Injection","d":2,"q":"On turbine engines, water injection is used when:","o":["At all times","During takeoff in hot/high conditions when engine is temperature-limited (EGT limited)","During cruise only","During descent only"],"c":1,"x":"Hot day: air is less dense, engine reaches EGT limit before producing rated thrust. Water injection cools the air = more mass flow + lower EGT = achieve rated thrust. Only used when needed (limited water supply)."},{"e":"PP","t":"Water Injection","d":3,"q":"The water injection system on a turbine engine typically injects water:","o":["Into the exhaust","At the compressor inlet or into the combustion chamber, depending on the system design","Into the oil system","Into the fuel tank"],"c":1,"x":"Compressor inlet injection: cools/densifies intake air. Combustion chamber injection: directly cools combustion gases. Both methods allow higher thrust by keeping EGT below limits while increasing mass flow."},{"e":"PP","t":"Water Injection","d":2,"q":"If the water injection tank runs dry during a takeoff roll that requires it:","o":["Nothing changes","EGT will rise and thrust will decrease \u2014 the pilot must be prepared to manage this power change","Engine will shut down","Fuel flow stops"],"c":1,"x":"Water depletion = loss of cooling effect = EGT jumps up, thrust drops. On some aircraft, FADEC automatically adjusts. On older systems, the pilot must manage the power transition."},{"e":"PP","t":"Water Injection","d":3,"q":"The water used in aircraft water injection must be:","o":["Any available water","Demineralized/distilled water \u2014 minerals cause deposits on compressor blades and combustor components","Seawater","Tap water"],"c":1,"x":"Minerals in water create deposits on hot engine components (compressor blades, combustion liners) \u2014 reducing efficiency and potentially causing damage. Distilled or demineralized water only."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection system components typically include:","o":["Just a bucket and hose","Water tank, pump, control valve, flow regulator, nozzles, and associated cockpit controls/indicators","Only a spray bottle","Only a tank"],"c":1,"x":"Complete system: tank (usually fuselage-mounted), electric or engine-driven pump, solenoid control valve, metering/flow regulation, spray nozzles at the injection point, quantity indicator, and arming switch."},{"e":"PP","t":"Water Injection","d":2,"q":"Water injection increases thrust on a turbofan by approximately:","o":["1-2%","5-10% depending on the engine and ambient conditions","50%","100%"],"c":1,"x":"Typically 5-10% thrust increase. Significant for takeoff on hot days or at high altitude airports. The difference between making or not making the required takeoff performance."},{"e":"PP","t":"Water Injection","d":4,"q":"Water injection into the combustor (rather than compressor inlet) is used to:","o":["Cool compressor blades","Cool combustion gases directly, allowing more fuel to be burned without exceeding turbine temperature limits","Increase compressor efficiency","Reduce noise"],"c":1,"x":"Combustor injection: water evaporates in the combustion zone, absorbing heat from the gas flow. Turbine inlet temperature drops \u2192 the FCU can add more fuel \u2192 more thrust while staying within EGT limits."},{"e":"PP","t":"Water Injection","d":3,"q":"Modern high-bypass turbofans have mostly eliminated the need for water injection because:","o":["Water is too expensive","Their higher bypass ratios and advanced materials provide adequate thrust margins without augmentation","Water injection was never effective","Environmental regulations ban it"],"c":1,"x":"Modern engines have flat-rated thrust well above sea-level requirements, improved turbine materials withstanding higher temps, and FADEC optimization. Water injection systems add weight and complexity with little benefit."},{"e":"PP","t":"Water Injection","d":2,"q":"After a water injection system is used, maintenance should:","o":["Nothing needed","Check nozzles for blockage, system for leaks, tank for adequate quantity, and flush the system if required by the manual","Replace the engine","Overhaul the pump"],"c":1,"x":"Post-use inspection: nozzle condition, line leaks, pump operation, tank level. Some manuals require flushing to prevent mineral buildup. Record usage for engine trend monitoring."},{"e":"PP","t":"Water Injection","d":3,"q":"If water injection nozzles are partially blocked:","o":["No effect","Reduced water flow = reduced cooling effect = less power augmentation and uneven temperature distribution","Better atomization","Improved engine efficiency"],"c":1,"x":"Blocked nozzles: uneven water distribution = hot spots in areas not receiving water + cold spots where water concentrates. Reduced overall effectiveness. Regular nozzle inspection and cleaning required."},{"e":"PP","t":"Water Injection","d":2,"q":"Water injection is activated by the pilot:","o":["Automatically at all times","By arming the system and advancing the throttle to the water-injection-rated thrust setting","By pressing a button during cruise","It's fully automatic with no pilot input"],"c":1,"x":"Typical: arm the system, advance throttle past dry-rated to wet-rated detent. Water flow begins at the higher power setting. On some aircraft, a separate water injection switch is used."},{"e":"PP","t":"Water Injection","d":3,"q":"Anti-icing the water injection system prevents:","o":["Nothing \u2014 water can't freeze in the system","Water freezing in the tank, lines, and nozzles during cold weather or at altitude \u2014 methanol provides anti-freeze protection","Engine overheating","Fuel contamination"],"c":1,"x":"Pure water freezes at 0\u00b0C. At altitude or in cold weather, the water-methanol mix must maintain a freezing point well below expected conditions. Methanol concentration is specified for this reason."},{"e":"PP","t":"Water Injection","d":4,"q":"A turbine engine test cell run with water injection shows lower EGT than expected. This could indicate:","o":["Normal operation","Excessive water flow rate \u2014 the FCU may be adding less fuel because EGT margin is artificially large, masking actual engine condition","Engine is in perfect condition","Water nozzles are blocked"],"c":1,"x":"Too much water = too much cooling = EGT artificially suppressed. The engine APPEARS healthy but may actually be deteriorating. Water injection flow rate must be calibrated correctly for accurate performance assessment."},{"e":"PP","t":"Water Injection","d":2,"q":"Water injection fluid quantity is typically:","o":["Unlimited","Limited to a tank holding enough for the takeoff phase only \u2014 typically a few hundred pounds/gallons","Enough for the entire flight","Refilled automatically in flight"],"c":1,"x":"Tank sized for takeoff duration (typically 2-5 minutes). Once empty, it's gone for that flight. Must be refilled between flights if required for the next departure."},{"e":"REGS","t":"AME Licensing","d":2,"q":"AME licence categories include:","o":["Only M","M1, M2, E, S, and B (Balloon)","Only Airframe and Powerplant","Only M and E"],"c":1,"x":"M1=small aircraft, M2=large/turbine, E=avionics, S=structures, B=balloons. M1+M2 together give E and S privileges for those aircraft categories."},{"e":"REGS","t":"AME Licensing","d":3,"q":"To maintain recency, an AME must have:","o":["No recency requirement exists","6 months of maintenance experience in the preceding 24 months","12 months continuous employment","Annual flight time"],"c":1,"x":"6 in 24 months. Lapsed recency = must demonstrate competency before signing releases. Can regain through supervised maintenance work and assessment."},{"e":"REGS","t":"AME Licensing","d":2,"q":"The AME personal logbook records:","o":["Only flight time","Maintenance experience, training, and tasks completed \u2014 evidence for licence application and recency","Only formal courses","Only hours at work"],"c":1,"x":"Your logbook is YOUR career record. Tasks signed by supervising AMEs prove your experience for licensing. Keep it current, detailed, and secured. It's as important as the aircraft's tech records."},{"e":"REGS","t":"AME Licensing","d":3,"q":"To sign a maintenance release on a specific aircraft type, the AME must:","o":["Just hold any valid licence","Have competence on that specific type in addition to a valid licence and current recency","Have worked on that type at least once","Ask permission from TC"],"c":1,"x":"Valid licence + recency + competence on type. Competence = training, experience, and familiarity with that specific aircraft. Can't sign off a B747 if you've only worked on Cessnas."},{"e":"REGS","t":"AME Licensing","d":4,"q":"If an AME knowingly signs a false maintenance release:","o":["Nothing happens","They face licence suspension/revocation, fines, and potential criminal charges under the Aeronautics Act","Just a verbal warning","Only a small fine"],"c":1,"x":"Fraudulent maintenance release = serious federal offense. Penalties: licence action (suspension/revocation), monetary fines, and criminal prosecution. People have been killed by falsely released aircraft. Your signature matters."},{"e":"REGS","t":"AME Licensing","d":2,"q":"AME licence examination passing grade is:","o":["50%","60%","70%","80%"],"c":2,"x":"70% on each of the four TC exams (SPM, AF, PP, REGS). Fail once = 30-day wait. Fail twice = 6-month wait. Examination approval valid for 12 months."},{"e":"REGS","t":"AME Licensing","d":3,"q":"The AME experience requirement for an M2 licence is:","o":["24 months total","48 months total, including 12 months M2 specialty and 6 months civil aviation","36 months total","12 months total"],"c":1,"x":"48 months total maintenance experience. 12 months must be M2-specific (large aircraft/turbine). 6 months must be civil aviation. Plus 70% of Appendix B tasks completed and certified."},{"e":"REGS","t":"AME Licensing","d":2,"q":"An AME licence is valid for a maximum of:","o":["1 year","5 years","10 years from date of issue (calculated from birthday)","Lifetime"],"c":2,"x":"Max 10 years. Renew before expiry with form + fee. After expiry, increasingly difficult to renew. Keep it current \u2014 expired licence = no privileges."},{"e":"REGS","t":"AME Licensing","d":3,"q":"ACA (Aircraft Certification Authority) is required for M2-rated AMEs working at:","o":["Any location","An Approved Maintenance Organization (AMO) \u2014 the AMO grants ACA to its AMEs for specific aircraft types","Their home workshop","Non-aviation employers"],"c":1,"x":"M2 = big aircraft = must work within an AMO framework. The AMO authorizes specific AMEs to sign releases on specific types (ACA). M1 AMEs can sign independently for M1 aircraft."},{"e":"REGS","t":"Airworthiness","d":2,"q":"A standard Certificate of Airworthiness means the aircraft:","o":["Was once airworthy","Currently conforms to its type design and is in a condition for safe operation","Will always be airworthy","Only needs registration"],"c":1,"x":"C of A = type design conformity + safe condition. Both must be continuously maintained through approved maintenance. The C of A itself doesn't expire but depends on ongoing airworthiness."},{"e":"REGS","t":"Airworthiness","d":3,"q":"An AD can require:","o":["Only inspection","Inspection, modification, replacement, or operational limitation \u2014 whatever is needed to address the unsafe condition","Only reporting","Only monitoring"],"c":1,"x":"ADs range from one-time inspections to repetitive inspections to mandatory modifications with hard deadlines. Non-compliance = aircraft is not airworthy. Period."},{"e":"REGS","t":"Airworthiness","d":2,"q":"A Type Certificate is issued when:","o":["Any aircraft is built","A new aircraft design meets all applicable airworthiness standards and is approved by TC","The owner registers the aircraft","The pilot gets a licence"],"c":1,"x":"TC = proof that the design meets safety standards. Manufacturing then produces aircraft conforming to that certified design. Each individual aircraft gets a C of A confirming it matches the TC."},{"e":"REGS","t":"Airworthiness","d":3,"q":"An STC (Supplemental Type Certificate) is required for:","o":["Any repair","Major modifications that change the type design \u2014 proving the modification meets airworthiness standards","Minor repairs","Oil changes"],"c":1,"x":"STC = an amendment to the original TC. Proves the modification (new avionics, engine change, structural modification) is safe and compatible with the original design."},{"e":"REGS","t":"Airworthiness","d":2,"q":"An airworthiness limitation is:","o":["Optional guidance","A mandatory maintenance requirement specified in the type certificate \u2014 usually life limits or mandatory inspections","A suggestion only","Only for commercial aircraft"],"c":1,"x":"Airworthiness limitations are part of the TC and are mandatory. Examples: structural inspection intervals, component life limits. Cannot be extended without TC approval."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A Canadian aircraft operating with a foreign-issued AD that applies to its type design:","o":["Can ignore foreign ADs","Must comply with the AD if it's from the state of design (e.g., FAA AD for US-designed aircraft)","Only complies with TC ADs","Complies only if the operator wants to"],"c":1,"x":"ADs from the state of design authority have legal standing in Canada. An FAA AD on a Cessna applies to Canadian-registered Cessnas. TC may also issue its own AD for additional Canadian-specific requirements."},{"e":"REGS","t":"Airworthiness","d":4,"q":"An aircraft with an expired or non-existent maintenance schedule:","o":["Can still fly normally","Is not airworthy \u2014 maintenance must be performed per an approved schedule for the C of A to remain valid","Only needs registration","Can fly under VFR only"],"c":1,"x":"No approved maintenance schedule = no way to demonstrate ongoing airworthiness = C of A is effectively invalid. Must establish or renew an approved maintenance schedule before flying."},{"e":"REGS","t":"Airworthiness","d":2,"q":"PMA (Parts Manufacturer Approval) parts:","o":["Are counterfeit","Are approved replacement parts manufactured under FAA/TC approval \u2014 legal for installation on type-certificated aircraft","Are lower quality","Cannot be used on Canadian aircraft"],"c":1,"x":"PMA parts meet the same standards as OEM parts. They're designed, tested, and approved specifically for the aircraft/engine they're replacing parts on. Must have proper documentation."},{"e":"REGS","t":"Airworthiness","d":3,"q":"The Maintenance Review Board (MRB) report for a new aircraft type establishes:","o":["Repair procedures","The initial maintenance program \u2014 including task intervals and inspection requirements approved by the regulatory authority","Paint specifications","Pilot training requirements"],"c":1,"x":"MRB: joint industry/authority effort to establish the initial scheduled maintenance program for a new aircraft type. Based on MSG-3 logic (reliability-centered maintenance). Operators build their programs from this."},{"e":"REGS","t":"Airworthiness","d":2,"q":"A C of A is transferred when:","o":["Never","The aircraft is sold domestically \u2014 the C of A goes with the aircraft, but the new owner must register it in their name","Only when TC reissues it","Only for export"],"c":1,"x":"C of A stays with the aircraft during domestic transfer. New owner registers it. For export: the exporting state issues an Export C of A; the importing state issues their own C of A."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"The CARs are organized into numbered Parts. Part V deals with:","o":["Personnel Licensing","Airworthiness (maintenance standards for private aircraft)","Commercial Air Services","General Provisions"],"c":1,"x":"Part I = General. Part II = Aircraft Identification. Part III = Personnel Licensing. Part IV = Personnel. Part V = Airworthiness. Part VI = Operating Rules. Part VII = Commercial Air Services. Know the structure."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"An aircraft registration mark change is required when:","o":["The aircraft is repainted","Ownership changes or the aircraft moves to a different state of registry","The annual inspection is due","The pilot's licence expires"],"c":1,"x":"New owner must register the aircraft in their name. The marks (C-GXXX) may stay the same with a new owner or may be changed. Transfer of ownership = mandatory re-registration."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"Canadian aviation regulations have the force of:","o":["Guidelines only","Law \u2014 they are legally binding regulations under the Aeronautics Act","Industry suggestions","Manufacturer recommendations"],"c":1,"x":"CARs are federal law. Violation can result in fines, licence suspension/revocation, and criminal prosecution. They're not suggestions \u2014 they're legal requirements."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"The AWM (Airworthiness Manual) contains:","o":["Only pilot information","Standards referenced by the CARs \u2014 detailed requirements for maintenance, manufacturing, and continuing airworthiness","Marketing material","Only registration procedures"],"c":1,"x":"AWM chapters expand on CARs requirements. AWM 566 = AME licensing standard. AWM 571 = maintenance standards. AWM 573 = AMO requirements. The 'how to' behind the CARs' 'what to do.'"},{"e":"REGS","t":"CARs & Registration","d":2,"q":"An aircraft's nationality and registration mark must be:","o":["Only on the wings","Displayed on the aircraft as prescribed \u2014 typically on wings, fuselage, and/or fin in specific sizes and fonts","Anywhere convenient","Only inside the cockpit"],"c":1,"x":"Marks must be permanent, visible, and meet size/placement requirements. C- prefix identifies Canadian aircraft. Specific rules for mark placement by aircraft type (fixed-wing, rotary, lighter-than-air)."},{"e":"REGS","t":"CARs & Registration","d":3,"q":"The ICAO Annex 8 addresses:","o":["Air traffic control","Airworthiness of aircraft \u2014 international standards that Canadian CARs must meet or exceed","Pilot training","Airport design"],"c":1,"x":"ICAO Annex 8: international airworthiness standards. Canada (as an ICAO contracting state) must comply. CARs meet or exceed Annex 8 requirements. International operations require compliance."},{"e":"REGS","t":"CARs & Registration","d":4,"q":"Penalties under the Aeronautics Act for CARs violations can include:","o":["Only verbal warnings","Monetary fines, licence suspension or revocation, and imprisonment for serious offences","Only a letter of concern","No enforcement mechanism exists"],"c":1,"x":"The Act provides graduated enforcement: counseling letters \u2192 monetary penalties \u2192 licence action \u2192 criminal prosecution. Serious offences (falsifying records, operating an unairworthy aircraft knowingly) can result in imprisonment."},{"e":"REGS","t":"CARs & Registration","d":2,"q":"An aircraft data plate contains:","o":["Only the paint code","Manufacturer, model, serial number, TC basis, and other identification information required by regulations","Only the weight","Only the engine type"],"c":1,"x":"Data plate = aircraft's birth certificate. Permanently attached, must match the C of R and TCDS. Alteration or removal is a serious offence. Contains info needed for parts ordering and regulatory compliance."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"An annual inspection on a private aircraft includes:","o":["Only an oil change","A complete inspection of the aircraft per the applicable maintenance schedule and CARs requirements","Only a visual walkaround","Only the engine"],"c":1,"x":"Annual inspection = comprehensive review of the entire aircraft: structure, systems, engine, propeller, instruments, avionics, documentation, AD compliance. Per CARs Appendix B/C or approved schedule."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A progressive inspection program:","o":["Does everything at once annually","Divides the annual inspection into smaller segments performed at regular intervals throughout the year","Only inspects when something breaks","Is only for airlines"],"c":1,"x":"Instead of one big annual event, the same total inspection is split into 4-6 phases throughout the year. Each phase covers a section of the aircraft. Keeps the aircraft in service more. Must be TC-approved."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"After any maintenance, the AME must:","o":["Just walk away","Sign a maintenance release certifying the work was done IAW applicable standards and the aircraft is fit for return to service","Call TC for approval","Wait 24 hours"],"c":1,"x":"The maintenance release = legal certification of airworthiness. Without it, the aircraft cannot fly. Content: description of work, reference to approved data, date, signature, licence number."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A conditional maintenance release is used when:","o":["Normal maintenance is complete","A test flight is needed to verify that maintenance was done correctly \u2014 specifies conditions and limitations","The aircraft is grounded","The owner requests it"],"c":1,"x":"After some maintenance (control rigging, engine change, etc.), a test flight verifies correct operation. The conditional release specifies: who can fly it, what to check, and limitations."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"When performing a major repair, the AME must use:","o":["Any method that seems right","Approved data \u2014 SRM, manufacturer's instructions, or TC-approved repair scheme","YouTube tutorials","General knowledge only"],"c":1,"x":"Major repairs: MUST use approved data. The data source must be cited in the maintenance record. 'I thought it would work' is not approved data and is not a legal basis for a repair."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A minor repair differs from a major repair in that a minor repair:","o":["Requires no documentation","Does not appreciably affect weight, balance, structural strength, performance, or airworthiness qualities","Can be done by anyone","Doesn't need approved data"],"c":1,"x":"Minor = doesn't significantly affect airworthiness. Still requires proper documentation and workmanship. The distinction determines approval requirements (not whether documentation is needed)."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An AME performing maintenance discovers corrosion beyond the SRM allowable limits on a wing spar. No approved repair exists. The correct action is:","o":["Blend it out and move on","Ground the aircraft, document the defect, and contact the manufacturer or a DER for an engineering disposition/approved repair","Paint over it","Monitor at next inspection"],"c":1,"x":"Beyond-limits damage with no existing approved repair = need engineering support. A Designated Engineering Representative (DER) or the manufacturer's engineering department can develop an approved repair. The aircraft stays grounded until resolved."},{"e":"REGS","t":"Inspections & Modifications","d":2,"q":"All maintenance performed on an aircraft must be recorded in:","o":["The pilot's personal logbook","The aircraft's technical records (journey log and/or technical logbook)","A separate notebook","The AME's memory"],"c":1,"x":"Every maintenance action: recorded in tech records with description, date, data reference, signature, and licence number. No record = no proof = potential airworthiness issue."},{"e":"REGS","t":"Inspections & Modifications","d":3,"q":"A snag sheet or work order used during an inspection:","o":["Replaces the journey log","Documents all findings and becomes part of the permanent technical records","Is thrown away after work is done","Is only for the AMO's files"],"c":1,"x":"Inspection findings recorded on snag sheets are part of the permanent record. They document what was found, what was corrected, and what was deferred. Trace the aircraft's maintenance history."},{"e":"REGS","t":"Inspections & Modifications","d":4,"q":"An operator discovers their aircraft has been flying for 50 hours past a mandatory AD compliance interval. The correct action:","o":["Continue flying until convenient to comply","Ground the aircraft immediately, comply with the AD, investigate how it was missed, and report the non-compliance","Backdate the compliance","Ignore it since no incident occurred"],"c":1,"x":"The aircraft was unairworthy for those 50 hours. Ground immediately. Comply with AD. Investigate the tracking system failure. Depending on the AD, TC notification may be required. Fix the tracking system to prevent recurrence."},{"e":"REGS","t":"Other Standards","d":2,"q":"Human Factors training is required because:","o":["TC mandates it","Approximately 80% of aviation accidents involve human error \u2014 including 12% from maintenance errors","It's optional enrichment","Only pilots need it"],"c":1,"x":"The Dirty Dozen (12 human factors): lack of communication, complacency, lack of knowledge, distraction, teamwork failure, fatigue, lack of resources, pressure, assertiveness deficit, stress, awareness gaps, norms. TC requires this training."},{"e":"REGS","t":"Other Standards","d":3,"q":"The Dirty Dozen in aviation maintenance are:","o":["12 common parts that fail","12 human factors that cause most maintenance errors \u2014 identified through accident investigation","12 aircraft types","12 inspection items"],"c":1,"x":"Communication, complacency, knowledge, distraction, teamwork, fatigue, resources, pressure, assertiveness, stress, awareness, norms. Knowing these helps you recognize error-producing conditions in yourself and others."},{"e":"REGS","t":"Other Standards","d":2,"q":"An AME who is fatigued:","o":["Should push through","Is at higher risk of making errors and should either rest or have their work independently inspected","Performs better under pressure","Is protected by regulations"],"c":1,"x":"Fatigue: reduced attention, slowed thinking, poor judgment. CARs and Human Factors programs require awareness. If you're fatigued, say something. Your licence and lives depend on clear thinking."},{"e":"REGS","t":"Other Standards","d":3,"q":"Error management in aviation maintenance means:","o":["Preventing all errors (impossible)","Accepting that errors will occur but building systems to catch, trap, and mitigate them before they cause harm","Blaming individuals for every error","Ignoring minor errors"],"c":1,"x":"Modern safety culture: errors are expected. Build defenses: dual inspections, checklists, peer review, reporting systems. Punish intentional violations, not honest mistakes. Learn from events to improve the system."},{"e":"REGS","t":"Other Standards","d":2,"q":"A safety reporting system (like SECURITAS or internal reporting) encourages:","o":["Only accident reporting","Voluntary reporting of safety concerns, near-misses, and hazards WITHOUT fear of punitive action for honest disclosures","Only reporting to police","Only reporting by managers"],"c":1,"x":"Non-punitive reporting: people report hazards and near-misses openly. These reports identify systemic problems before accidents occur. Punishing reporters = people stop reporting = hidden hazards = accidents."},{"e":"REGS","t":"Other Standards","d":3,"q":"Quality Assurance in an AMO ensures:","o":["Only part quality","All maintenance meets standards through: auditing, surveillance, corrective action, and continuous improvement of the maintenance system","Only customer satisfaction","Only financial performance"],"c":1,"x":"QA = independent verification that the AMO's work meets CARs standards. Internal audits, procedure compliance, training verification, corrective actions for findings. TC audits the QA system during surveillance."},{"e":"REGS","t":"Other Standards","d":4,"q":"An AME notices a coworker about to install a part without verifying its documentation. The correct action per Human Factors principles is:","o":["Ignore it \u2014 not your aircraft","Speak up assertively to prevent a potential safety issue \u2014 lack of assertiveness is one of the Dirty Dozen","Report them to TC immediately","Wait until the work is done then mention it"],"c":1,"x":"Lack of assertiveness = one of the 12 human factors. Speak up BEFORE the part is installed. It's not about blame \u2014 it's about preventing an undocumented part from going on an aircraft. Could save lives."},{"e":"REGS","t":"Parts & Records","d":3,"q":"A part removed from a scrapped aircraft:","o":["Can be freely installed on any aircraft","Cannot be installed unless it can be proven serviceable with proper documentation \u2014 traceability must be established","Is always airworthy","Never needs documentation"],"c":1,"x":"Salvaged parts: must have identity (P/N, S/N), condition established (inspection/overhaul), and conformity to type design documented. Undocumented salvaged parts = bogus parts."},{"e":"REGS","t":"Parts & Records","d":2,"q":"A rejected part must be:","o":["Put back in stock","Clearly identified as unserviceable, segregated from serviceable parts, and either repaired or disposed of","Hidden from inspectors","Sold to another operator"],"c":1,"x":"Rejected parts: tag as unserviceable, physically separate from serviceable stock, record the reason for rejection. Prevent accidental installation. Disposal: destroy or mutilate if scrapped."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Parts traceability means:","o":["Knowing the paint color","Being able to trace a part's complete history from manufacture through all maintenance actions to the current installation","Knowing the supplier name only","Only tracking serial number"],"c":1,"x":"Complete traceability: manufacturer \u2192 distribution \u2192 installation \u2192 maintenance history \u2192 current status. Any break in the chain raises airworthiness questions. That's why documentation is critical at every step."},{"e":"REGS","t":"Parts & Records","d":4,"q":"Suspected Unapproved Parts (SUP) must be:","o":["Installed if they fit","Quarantined, reported to TC, and investigated \u2014 installing a known or suspected unapproved part is a serious violation","Used for non-critical applications","Returned to the seller quietly"],"c":1,"x":"SUP = potential counterfeit or uncertified parts. Quarantine immediately, report to TC (Airworthiness Directive system), notify the supplier, and document everything. Installing known SUP = criminal liability."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection flow rate is controlled by:","o":["Pilot manual adjustment","A calibrated control valve sized to deliver the correct flow at the rated power setting","Guesswork","The fuel control unit only"],"c":1,"x":"Flow rate must match engine requirements precisely. Too little = insufficient power augmentation. Too much = overcooling, combustor flameout risk. Calibrated orifice or control valve meters the flow."},{"e":"PP","t":"Water Injection","d":2,"q":"The water injection tank is typically located:","o":["In the wing","In the fuselage \u2014 centrally located to minimize CG shift as water is consumed","On the tail","External pod"],"c":1,"x":"Central fuselage location minimizes CG change during water consumption. Tank is usually conformal (fits available space). Weight of full tank is included in takeoff weight calculations."},{"e":"PP","t":"Water Injection","d":3,"q":"Turbine engine compressor washing uses water but differs from water injection in that:","o":["They're the same system","Compressor wash is done at low RPM on the ground to clean deposits; water injection is at high power for thrust augmentation","Washing uses hot water","Injection uses seawater"],"c":1,"x":"Compressor wash: cleaning solution + water sprayed into a motoring engine to dissolve salt/dirt deposits. Water injection: clean demineralized water injected during takeoff for power boost. Different purpose, different system, different water."},{"e":"PP","t":"Water Injection","d":4,"q":"On an older turbojet with water injection, failure of the water injection system during a maximum-weight takeoff on a hot day means:","o":["Normal takeoff continues","Rated thrust CANNOT be achieved \u2014 the takeoff may need to be rejected or continued with reduced performance margins","The engine will shut down","Switch to emergency power"],"c":1,"x":"If the takeoff was calculated requiring water-injected thrust and the system fails, the engine is EGT-limited at a lower thrust. The pilot must immediately assess: can the takeoff be completed safely, or must it be rejected?"},{"e":"PP","t":"Water Injection","d":2,"q":"Water injection system maintenance includes periodic:","o":["Nothing between overhauls","Inspection of tank, lines, pump, valves, nozzles, and functional testing per the maintenance schedule","Only tank refilling","Only pump replacement"],"c":1,"x":"Regular inspection: tank condition/leaks, line integrity, pump operation, valve function, nozzle condition (clogging), and system functional test. Serviceable system = available when needed on a hot day."},{"e":"SPM","t":"Math & Physics","d":3,"q":"If pressure in a hydraulic system doubles and piston area stays the same, the output force:","o":["Stays the same","Doubles","Quadruples","Halves"],"c":1,"x":"F=P\u00d7A. Double P with same A = double F. Direct proportionality. This is Pascal's Law in its simplest form."},{"e":"SPM","t":"Math & Physics","d":4,"q":"A 3,200 PSI hydraulic system acts on a 4 sq in actuator. The actuator must overcome a 10,000 lb load. Can it?","o":["No \u2014 only produces 800 lbs","No \u2014 only produces 3,200 lbs","Yes \u2014 produces 12,800 lbs","Exactly \u2014 produces 10,000 lbs"],"c":2,"x":"F=P\u00d7A = 3200\u00d74 = 12,800 lbs > 10,000. Yes, with 2,800 lbs margin. Real-world exam calculation."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Converting 100\u00b0F to Celsius:","o":["212\u00b0C","37.8\u00b0C","50\u00b0C","100\u00b0C"],"c":1,"x":"\u00b0C = (\u00b0F-32)\u00d75/9 = (100-32)\u00d75/9 = 68\u00d75/9 = 37.8\u00b0C. Know this formula cold \u2014 TC tests temperature conversions."},{"e":"SPM","t":"Math & Physics","d":3,"q":"An aircraft flying at 250 knots. In feet per second that is approximately:","o":["250 ft/s","422 ft/s","375 ft/s","500 ft/s"],"c":1,"x":"1 knot \u2248 1.688 ft/s. 250 \u00d7 1.688 = 422 ft/s. Useful for understanding reaction times and distances in aviation scenarios."},{"e":"SPM","t":"Math & Physics","d":4,"q":"A gas at 2,000 PSI in a 5-gallon container is transferred to a 10-gallon container at the same temperature. New pressure:","o":["4,000 PSI","2,000 PSI","1,000 PSI","500 PSI"],"c":2,"x":"Boyle's Law: P\u2081V\u2081=P\u2082V\u2082. 2000\u00d75=P\u2082\u00d710. P\u2082=1,000 PSI. Volume doubled, pressure halved. Classic accumulator pre-charge question."},{"e":"SPM","t":"Math & Physics","d":3,"q":"The second-class lever has the:","o":["Fulcrum between effort and load","Load between fulcrum and effort","Effort between fulcrum and load","No mechanical advantage"],"c":1,"x":"Class 1: fulcrum in middle (seesaw). Class 2: load in middle (wheelbarrow). Class 3: effort in middle (tongs). Class 2 always has MA>1."},{"e":"SPM","t":"Math & Physics","d":3,"q":"The unit of electrical power is:","o":["Volt","Ampere","Watt","Ohm"],"c":2,"x":"P=V\u00d7I. Measured in Watts. 746W = 1HP. Essential for electrical load analysis on aircraft systems."},{"e":"SPM","t":"Math & Physics","d":4,"q":"A wheel and axle has a wheel diameter of 12 inches and axle diameter of 3 inches. Mechanical advantage:","o":["3:1","4:1","12:1","36:1"],"c":1,"x":"MA = wheel diameter / axle diameter = 12/3 = 4:1. Same principle as a larger wrench giving more torque."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Pressure at sea level in PSI is approximately:","o":["29.92 PSI","1013.25 PSI","14.7 PSI","100 PSI"],"c":2,"x":"14.7 PSI = 29.92\"Hg = 1013.25 hPa. Three ways to express the same thing. Know all three for the exam."},{"e":"SPM","t":"Math & Physics","d":3,"q":"If velocity of airflow through a venturi doubles, the dynamic pressure:","o":["Doubles","Quadruples","Halves","Stays the same"],"c":1,"x":"Dynamic pressure = \u00bd\u03c1V\u00b2. Velocity doubled \u2192 V\u00b2=4 \u2192 dynamic pressure quadruples. Why carburetors and pitot tubes are so sensitive to airspeed changes."},{"e":"SPM","t":"Math & Physics","d":4,"q":"A gear train: input 20 teeth at 1,000 RPM drives output 60 teeth. Output speed:","o":["3,000 RPM","1,000 RPM","333 RPM","60 RPM"],"c":2,"x":"Speed ratio = input teeth / output teeth = 20/60 = 1/3. Output = 1000/3 = 333 RPM. Larger gear turns slower. Torque increases proportionally."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Viscosity index of oil indicates:","o":["Oil weight","How much viscosity changes with temperature \u2014 higher index = more stable viscosity across temperature range","Oil color","Oil age"],"c":1,"x":"High VI = viscosity changes little with temperature (desirable). Low VI = gets very thin when hot and very thick when cold. Multi-grade oils have high VI."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Thermal expansion means aircraft structures:","o":["Never change size","Grow in hot conditions and shrink in cold \u2014 requiring expansion joints and floating attachments in some designs","Only contract","Change shape but not size"],"c":1,"x":"Aluminum expands ~0.0013 inches per inch per 100\u00b0F. On a 100-foot fuselage that's significant. Control cables change tension. Clearances change. Design accounts for this."},{"e":"SPM","t":"Math & Physics","d":4,"q":"A 28V system with 5\u03a9 load. If a 0.5\u03a9 wire resistance is added in series, current drops to:","o":["5.6A to 5.09A","5.6A stays the same","5.6A to 4.67A","5.6A to 10A"],"c":0,"x":"Original: I=28/5=5.6A. With wire resistance: I=28/5.5=5.09A. Wire resistance causes voltage drop AND current reduction. Why proper wire gauge matters."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Sound travels faster in:","o":["Vacuum","Solids (denser medium) than in air","Air than in water","All media at equal speed"],"c":1,"x":"Sound needs a medium. Denser medium = faster propagation. Solids > liquids > gases. Relevant for understanding ultrasonic NDT (sound in metal vs air)."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"The grip length of a bolt should equal:","o":["The nut height","Total thickness of materials being joined \u2014 no threads in the shear area","Twice the diameter","The washer thickness"],"c":1,"x":"Threads in the bearing area weaken the joint. The smooth shank carries shear loads. At least one full thread must extend past the nut for proper clamping."},{"e":"SPM","t":"Aircraft Hardware","d":4,"q":"An AN3-5A bolt: the '3' means diameter, '5' means length, 'A' means:","o":["Aluminum alloy","Undrilled shank (no cotter pin hole)","Drilled shank","Close tolerance"],"c":1,"x":"No letter = drilled shank. 'A' = undrilled shank. AN3 = 3/16\" diameter. -5 = 5/8\" grip. Know the AN bolt coding system completely."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"NAS1149 washers under bolt heads serve to:","o":["Look professional","Distribute load, prevent surface damage, and provide a smooth bearing surface for the nut","Increase weight","Seal the hole"],"c":1,"x":"AN960 washers standard. Under both head and nut in most applications. Prevent galling and damage to the structure surface. One thin washer may be used for alignment."},{"e":"SPM","t":"Aircraft Hardware","d":4,"q":"When a rivet hole becomes elongated from load:","o":["Install the same size rivet","Drill to the next oversize and install an oversize rivet per SRM","Fill with sealant","Leave it if less than 10% elongated"],"c":1,"x":"Elongated holes indicate the rivet was undersized or overloaded. Drill out, ream to next oversize (1/32\" increments), install oversize rivet. The SRM specifies maximum oversize allowed."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"MS20470 rivet (universal head) replaced which older designation?","o":["AN426","AN470 (now MS20470)","AN430","AN456"],"c":1,"x":"AN470 = old designation for universal head. MS20470 = new designation. Same rivet. AN426 = countersunk head. Know both old and new designations \u2014 manuals use both."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Cherry (blind) rivets are used when:","o":["Maximum strength is needed","Access to only one side of the work is available \u2014 'blind' means you can't reach the back","The structure is composite","On control surfaces only"],"c":1,"x":"Blind rivets installed from one side using a special gun. Stem pulls through, expanding the blind end. Lower shear strength than solid rivets. Used where access is limited."},{"e":"SPM","t":"Aircraft Hardware","d":4,"q":"A Huck bolt (lockbolt) differs from a standard bolt in that:","o":["It uses a standard nut","The collar is swaged onto the pin \u2014 creating a permanent, vibration-proof fastener with no torque required","It's temporary","It's weaker"],"c":1,"x":"Lockbolts: pin inserted, collar swaged onto grooves with a special gun. No torque setting \u2014 the swage creates the clamp-up. Cannot loosen from vibration. Common in modern aircraft structure."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Turnbuckle barrel must have:","o":["No visible threads","No more than 3 threads exposed beyond the barrel on each end \u2014 verified through inspection hole","All threads visible","Exactly 10 threads showing"],"c":1,"x":"Inspection hole/slot in the barrel must show threads (proving adequate engagement). Max 3 threads visible beyond barrel. Safety wire after adjustment. Critical for control cable rigging."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"O-ring seal groove dimensions are critical because:","o":["Appearance only","Too tight compresses the O-ring excessively (premature failure); too loose allows leakage and extrusion","They affect weight","Color coding depends on it"],"c":1,"x":"Groove depth and width per manufacturer specs. O-ring must have room to compress (squeeze) but not extrude into clearance gaps. Wrong size groove = premature seal failure."},{"e":"SPM","t":"Aircraft Hardware","d":4,"q":"When replacing an MS fitting with an AN fitting (or vice versa):","o":["They're always interchangeable","NEVER substitute unless the IPC (Illustrated Parts Catalog) lists both as acceptable \u2014 they may have different specifications","Always use the newer standard","Use whichever is available"],"c":1,"x":"MS and AN may look similar but can differ in material, strength, dimensions, or finish. Always verify interchangeability in the IPC or maintenance manual. Installing the wrong fitting = potential failure."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Aluminum AD rivets (2117-T) are driven:","o":["Only when heated","In the 'as received' condition \u2014 no heat treatment or refrigeration required","After ice-box storage only","Only after annealing"],"c":1,"x":"AD rivets (2117-T4) are soft enough to drive as-received. DD rivets (2024-T4) must be stored in dry ice and driven within time limits. E rivets (7050) same as DD. Know the rivet material properties."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Aircraft control cable preformed construction means:","o":["The cable stretches easily","Wires and strands are pre-shaped to the helical form \u2014 cable doesn't spring open when cut","The cable is rigid","The cable is braided"],"c":1,"x":"Preformed cable: wires shaped before assembly. Cuts cleanly, easier to handle, less fatigue stress. Non-preformed (older): wires straight, cable unravels when cut. Most modern aircraft use preformed."},{"e":"SPM","t":"Aircraft Hardware","d":4,"q":"Nicopress (swage) sleeves on cable terminals require:","o":["One swage per sleeve","The correct number of swages (usually 3) applied in the correct sequence with the correct die","Hand tightening only","One crimp anywhere on the sleeve"],"c":1,"x":"Specific number of swages (typically 3), in a specif
