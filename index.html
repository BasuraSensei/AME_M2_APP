ic order (center first, then ends), with calibrated dies. Each swage checked with go/no-go gauge. Wrong technique = cable slipping out under load = control failure."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"A Dzus fastener is used for:","o":["Structural joints","Quick-release cowling and access panel fasteners \u2014 quarter-turn lock/unlock","Permanent installations","High-stress applications"],"c":1,"x":"Dzus (quarter-turn), Camloc, and Airloc are common quick-release panel fasteners. Maintain proper spring tension. Worn or damaged fasteners can allow panels to depart in flight."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"When installing a flexible hydraulic hose, it must have:","o":["Zero slack","Sufficient slack (5-8%) to allow for flexing, pressure expansion, and vibration without strain on the fittings","Maximum tension","Tight bends at the fittings"],"c":1,"x":"Hose flexes with pressure pulses and aircraft movement. Too short = pulls on fittings = leaks/failure. Too long = chafes on structure. No twisting. The layline stripe must run straight. Your daily work at Mecaer."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A break line on a drawing indicates:","o":["A crack in the part","The object continues but is not fully shown \u2014 used to save space on long parts","A hidden feature","A weld location"],"c":1,"x":"Long break line (zigzag) or short break line (freehand) shows that a portion has been removed for clarity. The part is actually longer than drawn."},{"e":"SPM","t":"Aircraft Drawing","d":4,"q":"A drawing notation 'INTERPRET DIMENSIONS AND TOLERANCES PER ASME Y14.5' means:","o":["Use metric system","Apply Geometric Dimensioning and Tolerancing (GD&T) standards for position, form, and orientation tolerances","Use only basic dimensions","Ignore tolerances"],"c":1,"x":"GD&T: advanced dimensioning system using feature control frames, datum references, and geometric tolerances. More precise than basic \u00b1tolerances for controlling part geometry. Increasingly used in aviation."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A ground symbol (inverted triangle with lines) on a drawing indicates:","o":["The part touches the ground","A surface finish requirement \u2014 the number specifies roughness in microinches","An electrical ground","A mounting point"],"c":1,"x":"Surface finish symbol: V-shape or check with roughness value. 125\u03bcin = rough machine. 63\u03bcin = standard machine. 32\u03bcin = fine. 16\u03bcin or less = polished. Critical for sealing and bearing surfaces."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"The difference between 1st angle and 3rd angle projection is:","o":["Number of views","In 3rd angle (North American standard), the top view is above the front view; in 1st angle (European) it's below","Scale factor","Paper size"],"c":1,"x":"3rd angle: views placed as if looking at the object from outside a glass box. Intuitive for North Americans. 1st angle: views placed as if projected through the object. Symbol in title block tells you which."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"An auxiliary view on a drawing shows:","o":["The back of the object","A true-shape view of a surface that appears foreshortened in standard views \u2014 seen at an angle to standard planes","An enlarged detail","A wiring diagram"],"c":1,"x":"Inclined surfaces appear distorted in top/front/side views. An auxiliary view is projected perpendicular to the inclined surface to show its true shape and dimensions. Common for angled flanges and ribs."},{"e":"SPM","t":"Aircraft Drawing","d":4,"q":"A wire diagram shows wire W243-20-N. The '20' likely indicates:","o":["Wire length","Wire gauge (AWG 20)","Wire color","Circuit number"],"c":1,"x":"Wire coding typically: circuit identifier-gauge-color or modifier. W243=circuit, 20=AWG gauge, N=color code (N often = brown). Systems vary by manufacturer but gauge is critical for current capacity verification."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A leader line on a drawing:","o":["Shows dimensions","Points from a note or callout to the specific feature it references \u2014 ending in an arrowhead or dot","Indicates a center axis","Shows hidden edges"],"c":1,"x":"Leaders connect notes, dimensions, part numbers, and symbols to specific features. Arrowhead = touches surface. Dot = touches within an outline. Essential for understanding drawing callouts."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"An installation drawing shows:","o":["How to manufacture a part","How a component or assembly is installed in the aircraft \u2014 routing, mounting, clearances, and connections","Theoretical stress analysis","Performance data"],"c":1,"x":"Installation drawings show: mounting hardware, torque values, clearances from surrounding structure, routing of hoses/wires, and connection points. The AME's primary reference during installation."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"Zone designation 'C4' on a large aircraft drawing means:","o":["C revision, drawing 4","Row C, Column 4 of the drawing grid \u2014 used to locate specific details quickly","Class 4 tolerance","4th copy"],"c":1,"x":"Like map grid references. Large aircraft drawings can be multiple sheets. 'See zone C4 on sheet 3' directs you to the exact location. Saves enormous time vs searching the entire drawing."},{"e":"SPM","t":"Aircraft Drawing","d":4,"q":"An effectivity block on a drawing specifies:","o":["Drawing expiration date","Which aircraft serial numbers or models the drawing applies to \u2014 a drawing may not apply to all aircraft of that type","The drawing creator","Paper size"],"c":1,"x":"Critical for maintenance: verify effectivity before using any drawing. An SB or modification may apply to S/N 001-250 but not 251+. Wrong effectivity = wrong parts or procedures applied to the wrong aircraft."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A hydraulic schematic uses a circle with a triangle inside to represent:","o":["A filter","A pump (triangle indicates direction of flow)","A valve","A reservoir"],"c":1,"x":"Standard hydraulic symbols: pump=circle+triangle. Motor=circle+triangle(reversed). Actuator=rectangle+arrow. Valve=squares. Filter=diamond. Relief valve=arrow+spring. Know the symbols for troubleshooting."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"An IPC (Illustrated Parts Catalog) is used to:","o":["Show assembly procedures","Identify every part by number, name, and position for ordering replacement parts","Show repair procedures","List maintenance intervals"],"c":1,"x":"IPC = parts identification bible. Exploded views with numbered callouts referencing a parts list. Part number, nomenclature, quantity, applicability. Essential for ordering the correct replacement part."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A blueprint change that is 'redlined' means:","o":["The drawing is cancelled","A temporary marked-up change that hasn't been formally incorporated into the drawing revision yet","Only cosmetic changes","A rejected drawing"],"c":1,"x":"Redline = urgent field change marked in red. Must eventually be incorporated into a formal revision. Working from redlined drawings requires extra attention to ensure the changes are captured correctly."},{"e":"SPM","t":"Aircraft Drawing","d":4,"q":"The difference between a SRM and an AMM is:","o":["They're the same","SRM covers structural repair procedures; AMM covers all maintenance procedures including removal, installation, and servicing","SRM is for engines only","AMM is optional"],"c":1,"x":"AMM (Aircraft Maintenance Manual) = comprehensive: systems, components, servicing. SRM (Structural Repair Manual) = specifically for structural damage assessment and repair. Both are approved data. Know which to reference."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A parts list callout 'NAS1097AD3-4' decodes as:","o":["A bolt","A NAS standard solid rivet, AD material (2117-T), 3/32\" diameter, 4/16\" (1/4\") length","A Hi-Lok fastener","A cable terminal"],"c":1,"x":"NAS1097 = countersunk rivet. AD = 2117-T alloy. 3 = 3/32\" dia. 4 = 4/16\" grip. Being able to decode part numbers from the IPC saves enormous time. Know rivet coding: dash number = diameter in 32nds, length in 16ths."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"In a series circuit, if one bulb burns out:","o":["Other bulbs get brighter","The entire circuit opens \u2014 all bulbs go out because there is only one current path","Other bulbs are unaffected","Current increases to compensate"],"c":1,"x":"Series: one path. Break anywhere = entire circuit dead. Parallel: multiple paths. One break = only that branch affected. Critical for understanding aircraft lighting and circuit design."},{"e":"SPM","t":"Electricity & Electronics","d":4,"q":"A 28V DC system with a 15A circuit breaker. Maximum safe wire gauge for a 25-foot run is determined by:","o":["The cheapest wire available","Current capacity AND voltage drop calculations \u2014 both must be within limits for that wire length","Only current rating","Only voltage drop"],"c":1,"x":"Two independent requirements: 1) Wire gauge must handle 15A without overheating. 2) Voltage drop over 25 feet must not exceed limits (~1V for 28V system). Longer runs need larger wire to limit voltage drop."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"A relay in an aircraft circuit allows:","o":["A small control current to switch a large power circuit \u2014 isolating the switch from high current","Voltage regulation","Frequency conversion","Power generation"],"c":1,"x":"Relay: small current through coil creates magnetic field \u2192 pulls contacts closed \u2192 large current flows to the load. The cockpit switch only carries relay coil current (small), not the load current (large)."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"The purpose of a zener diode in a circuit:","o":["Rectify AC to DC","Provide a stable reference voltage (voltage regulation) by conducting in reverse at a specific breakdown voltage","Amplify signals","Store energy"],"c":1,"x":"Zener: reverse-biased at a specific voltage. Below that = blocks. At that voltage = conducts, maintaining the voltage constant. Used in voltage regulators and protection circuits."},{"e":"SPM","t":"Electricity & Electronics","d":4,"q":"In AC circuits, power factor indicates:","o":["Total power consumed","The ratio of real power (doing work) to apparent power \u2014 how efficiently the circuit uses power","Frequency stability","Voltage level"],"c":1,"x":"PF = cos(phase angle between V and I). PF=1 = purely resistive (ideal). PF<1 = reactive components waste some power as heat in transmission. Relevant for generator sizing on aircraft."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"An OR logic gate outputs TRUE when:","o":["All inputs are TRUE","ANY input is TRUE (one or more)","No inputs are TRUE","Inputs alternate"],"c":1,"x":"OR: any 1 input = output 1. AND: all inputs must be 1. XOR: exactly one input is 1. NAND/NOR: inversions of AND/OR. Digital logic controls many aircraft systems."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Hexadecimal 'FF' equals decimal:","o":["15","16","255","256"],"c":2,"x":"F=15. FF = 15\u00d716 + 15 = 240+15 = 255. FF in binary = 11111111 (8 bits all 1). Maximum value of one byte. Appears in avionics fault codes and addresses."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"A shorted capacitor in a circuit will:","o":["Store charge normally","Act as a direct connection (zero resistance), allowing excessive current \u2014 may blow the fuse/breaker","Open the circuit","Have no effect"],"c":1,"x":"Shorted cap = wire = excess current = fuse blows. Open cap = break in AC coupling = signal loss. Capacitor failures are common troubleshooting scenarios."},{"e":"SPM","t":"Electricity & Electronics","d":4,"q":"In a 3-phase AC aircraft system, the phase relationship between each phase is:","o":["0 degrees","120 degrees apart","180 degrees apart","90 degrees apart"],"c":1,"x":"3 phases, each 120\u00b0 apart = smooth, constant power delivery. More efficient than single-phase for heavy loads (motors, heaters). Standard aircraft AC = 115V 400Hz 3-phase."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"When measuring resistance with an ohmmeter, the circuit must be:","o":["Powered on","De-energized \u2014 applying voltage to an ohmmeter damages the meter","At full voltage","Under load"],"c":1,"x":"Ohmmeter uses its own internal battery. External voltage will damage it. ALWAYS disconnect power before measuring resistance. Also disconnect the component from the circuit to avoid parallel path readings."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"An electromagnetic interference (EMI) filter on avionics equipment:","o":["Increases signal strength","Blocks high-frequency electrical noise from entering or leaving the equipment \u2014 preventing cross-talk between systems","Changes frequency","Amplifies power"],"c":1,"x":"EMI/RFI filters: capacitors and inductors block noise while passing desired signals. Essential for avionics functioning correctly near high-power transmitters and switching circuits."},{"e":"SPM","t":"Electricity & Electronics","d":4,"q":"In a 28V DC system, a 40-watt landing light draws:","o":["1.43A","28A","0.71A","40A"],"c":0,"x":"I=P/V = 40/28 = 1.43A. Know P=V\u00d7I, I=P/V, V=P/I inside out. These calculations determine wire gauge and CB sizing. Classic exam calculation."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"A DPDT (Double Pole Double Throw) switch controls:","o":["One circuit, one position","Two separate circuits, each switchable between two positions","Only DC circuits","Only lighting"],"c":1,"x":"DPDT: two independent circuits, each with two positions. Like two SPDT switches ganged together. Used for reversing motor direction, switching between systems, etc."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"An autotransformer differs from a standard transformer because it:","o":["Has two separate windings","Uses a single tapped winding for both primary and secondary \u2014 lighter but provides no electrical isolation","Only works with DC","Is self-regulating"],"c":1,"x":"Single winding, multiple taps. Lighter and cheaper than dual-winding transformers. Used for small voltage changes. Disadvantage: no electrical isolation between primary and secondary."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Bonding resistance between aircraft components should not exceed:","o":["100 ohms","0.003 ohms (3 milliohms) for most structural bonds","1 ohm","10 ohms"],"c":1,"x":"Very low resistance required: typically <0.003\u03a9 for structural bonds, <0.01\u03a9 for equipment. Tested with a milliohmmeter. High bonding resistance = static buildup, lightning damage risk, and radio interference."},{"e":"SPM","t":"General Servicing","d":3,"q":"When fueling an aircraft, the difference between overwing and single-point (pressure) refueling:","o":["None","Overwing: open cap, gravity fill. Single-point: closed coupling, fuel pumped under pressure into all tanks simultaneously","Overwing is faster","Single-point is gravity-fed"],"c":1,"x":"Single-point: faster, less contamination risk, less static exposure, automatic shutoff. Overwing: simple, used on smaller aircraft. Both require grounding/bonding. Know the differences."},{"e":"SPM","t":"General Servicing","d":4,"q":"Misfueling a turbine aircraft with avgas will:","o":["Work fine","Cause lead deposits on turbine blades, may block fuel nozzles, and the TEL will damage catalytic converters if equipped","Increase power","Improve economy"],"c":1,"x":"Avgas in a turbine: lead deposits on hot-section components, may clog fine fuel nozzles. Not immediately catastrophic but causes long-term damage. Jet fuel in a recip = CATASTROPHIC (detonation, failure)."},{"e":"SPM","t":"General Servicing","d":3,"q":"When leveling an aircraft for weighing, you use:","o":["A carpenter's level anywhere on the floor","The aircraft's specific leveling points and methods described in the maintenance manual","Just eyeballing it","Only the wing tip level"],"c":1,"x":"Each aircraft type has specific leveling points (usually on the fuselage floor or door frame) and prescribed method (spirit level, plumb bob, digital level). Incorrect leveling = incorrect weight distribution readings."},{"e":"SPM","t":"General Servicing","d":3,"q":"WHMIS 2015 replaces the older WHMIS system with:","o":["Less information","GHS-aligned hazard symbols (pictograms), signal words, and Safety Data Sheets replacing the old MSDS format","No change","Verbal warnings only"],"c":1,"x":"GHS = Globally Harmonized System. Red-bordered diamond pictograms (flame, skull, exclamation, etc.). SDS has 16 standardized sections. You work with Skydrol, MEK, sealants \u2014 know the hazards."},{"e":"SPM","t":"General Servicing","d":4,"q":"An aircraft nitrogen servicing cart shows 1,800 PSI. The aircraft oleo strut requires 200 PSI. You must:","o":["Connect directly","Use a pressure regulator to step down to 200 PSI \u2014 direct connection could explosively over-pressurize the strut","Fill slowly by feel","Bleed from a different strut"],"c":1,"x":"1,800 PSI direct to a 200 PSI strut = potential catastrophic failure. ALWAYS use a calibrated regulator. Verify gauge accuracy. Fill slowly and check strut extension. Overpressurization has caused fatalities."},{"e":"SPM","t":"General Servicing","d":3,"q":"Fire classes and CORRECT extinguisher matches:","o":["A=CO2, B=water, C=dry chemical","A=water, B=CO2/dry chem/Halon, C=CO2/dry chem/Halon, D=special dry powder","All fires use water","Only Halon for everything"],"c":1,"x":"A(ordinary)=water OK. B(liquid)=CO2/chem/Halon. C(electrical)=CO2/chem/Halon (non-conductive). D(metal)=special powder ONLY. Wrong agent on wrong class = danger."},{"e":"SPM","t":"General Servicing","d":3,"q":"Before performing a cold engine run-up, you must verify:","o":["Nothing special","Chocks in place, area clear, fire guard posted, sufficient fuel, oil level correct, and all cowlings secured","Only fuel level","Only oil level"],"c":1,"x":"Complete pre-run checklist: chocks, brakes, clear prop area, fire extinguisher ready, communications established, instruments monitored. Engine runs without proper preparation = risk."},{"e":"SPM","t":"General Servicing","d":3,"q":"The main danger when servicing high-pressure oxygen systems is:","o":["Oxygen is flammable","Oxygen supports rapid combustion \u2014 any oil, grease, or organic material near O2 under pressure can spontaneously ignite","Oxygen is toxic","Oxygen is inert"],"c":1,"x":"O2 isn't flammable itself but makes everything around it burn violently. A tiny drop of oil on an O2 fitting under 2,000 PSI can flash-ignite. Use only O2-clean tools and components. No petroleum-based lubricants."},{"e":"SPM","t":"General Servicing","d":4,"q":"An aircraft battery overheats during charging and starts venting gas. The correct immediate action is:","o":["Continue charging at reduced rate","Disconnect charging source, ventilate the area (H\u2082 gas is explosive), do NOT create sparks, and allow to cool","Add water to cool it","Ignore it \u2014 this is normal"],"c":1,"x":"Hydrogen gas from battery venting is explosive. Disconnect charger (use insulated tools, no sparking). Ventilate area. NiCd thermal runaway requires specialized response \u2014 cool externally, monitor until safe."},{"e":"SPM","t":"General Servicing","d":3,"q":"When towing an aircraft, the bypass pin:","o":["Locks the nosewheel straight","Disconnects the steering system from the nosewheel so it can castoring freely to follow the towbar","Activates the brakes","Engages the parking brake"],"c":1,"x":"Without the bypass pin, the steering mechanism resists nosewheel turning, potentially damaging the steering system. Pin in \u2192 free castering \u2192 safe towing. REMOVE pin before flight (steering needed!)."},{"e":"SPM","t":"General Servicing","d":3,"q":"De-icing fluid applied to an aircraft on the ground has a limited holdover time because:","o":["It evaporates instantly","The fluid loses effectiveness over time as it becomes diluted by continuing precipitation \u2014 re-application may be needed","It damages the paint","It only works at certain temperatures"],"c":1,"x":"Type I fluid: short holdover (minutes). Type IV: longer holdover (up to ~80 min depending on conditions). If holdover time expires before takeoff, the aircraft must return for re-treatment."},{"e":"SPM","t":"General Servicing","d":3,"q":"When performing a compass swing, the aircraft should be positioned:","o":["Anywhere convenient","On a compass rose/swinging area away from magnetic interference (steel buildings, underground cables, other aircraft)","Inside the hangar","Near the fuel farm"],"c":1,"x":"Magnetic interference corrupts the compass calibration. Designated compass swing areas are surveyed for magnetic cleanliness. Remove tools and magnetic items from the aircraft before the swing."},{"e":"SPM","t":"General Servicing","d":4,"q":"Cross-contamination between MIL-H-5606 (mineral) and Skydrol (phosphate ester) in a hydraulic system requires:","o":["Just drain and refill","Complete system flush, replacement of ALL seals (materials are incompatible), and replacement of all contaminated fluid","Adding a neutralizer","Nothing \u2014 they're compatible"],"c":1,"x":"Mineral oil destroys Skydrol seals. Skydrol attacks mineral-oil seals. Cross-contamination = every seal in the system swells, shrinks, or dissolves. COMPLETE teardown and rebuild. Extremely expensive mistake."},{"e":"SPM","t":"General Servicing","d":3,"q":"When jacking an aircraft, tail stands or supports are used to:","o":["Add weight","Prevent the aircraft from tipping tail-down as the CG shifts during jacking","Improve access to the tail","Hold tools"],"c":1,"x":"As the aircraft is raised, CG may shift. Without tail support, the aircraft can tip backward off the jacks. Tail stand positioned per manual before raising main jacks. Some aircraft require nose ballast."},{"e":"SPM","t":"General Servicing","d":3,"q":"A fuel sumping procedure involves:","o":["Adding fuel","Draining a small sample from the lowest points to check for water and contamination","Measuring fuel temperature","Testing octane rating"],"c":1,"x":"Water (clear layer below fuel), sediment, and microbial contamination collect at low points. Sumping catches these before they reach the engine. Part of every preflight and maintenance fuel system check."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"The difference between ferrous and non-ferrous metals:","o":["Color only","Ferrous contains iron (magnetic, rusts); non-ferrous does not (aluminum, copper, titanium)","Weight only","Cost only"],"c":1,"x":"Ferrous: iron-based, magnetic, susceptible to rust (iron oxide). Non-ferrous: no iron, generally lighter and more corrosion resistant. The distinction determines which NDT methods can be used (MPI = ferrous only)."},{"e":"SPM","t":"Metallurgy & Corrosion","d":4,"q":"Solution heat treatment of 2024 aluminum involves:","o":["Heating and slow cooling","Heating to ~920\u00b0F, soaking, then rapidly quenching in cold water to trap alloying elements in solution","Heating and air cooling","Freezing the metal"],"c":1,"x":"Solution HT: high temp dissolves precipitates \u2192 rapid quench traps them in supersaturated solution \u2192 material is soft (W temper). Then natural aging (T4) or artificial aging (T6) develops full strength."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Dezincification is a form of corrosion that affects:","o":["Steel","Brass (copper-zinc alloy) \u2014 the zinc is selectively leached out leaving weak, porous copper","Aluminum","Titanium"],"c":1,"x":"Selective leaching: one element of an alloy dissolves preferentially. Dezincification weakens brass fittings. Appears as reddish copper-colored areas on normally yellow brass. Replace affected fittings."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Conversion coatings (Alodine) protect aluminum by:","o":["Adding a paint layer","Creating a chemical film that inhibits corrosion and provides a bonding surface for primer","Making it thicker","Adding a metal plating"],"c":1,"x":"Alodine (chromate conversion): chemical reaction creates a thin protective film. Gold/iridescent color. Not as durable as anodizing but doesn't require immersion tanks \u2014 can be brush-applied in the field."},{"e":"SPM","t":"Metallurgy & Corrosion","d":4,"q":"An aluminum part shows white powdery deposits. This is most likely:","o":["Normal aluminum color","Aluminum oxide from corrosion \u2014 the white powder is the corrosion product","Paint residue","Manufacturing residue"],"c":1,"x":"Aluminum corrosion product = white to gray powder (Al\u2082O\u2083). Unlike iron rust (which is porous and accelerates corrosion), aluminum oxide is somewhat self-limiting. But it still indicates active corrosion requiring treatment."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Stress relieving is a heat treatment performed to:","o":["Increase hardness","Reduce residual internal stresses from manufacturing or welding without significantly changing material properties","Make the metal softer for forming","Increase tensile strength"],"c":1,"x":"Residual stresses from forming, welding, or machining can cause distortion and fatigue cracking. Stress relieving: heat to moderate temperature, soak, slow cool. Doesn't change the temper designation."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"The purpose of a sacrificial anode (like zinc) on an aircraft:","o":["Structural reinforcement","It corrodes preferentially, protecting the surrounding structure (cathodic protection)","Electrical grounding","Weight addition for balance"],"c":1,"x":"Zinc or magnesium anodes dissolve instead of the aircraft structure. Used on seaplanes, helicopter floats, and fuel tanks. When anodes are consumed, replace them \u2014 that's their job."},{"e":"SPM","t":"Metallurgy & Corrosion","d":4,"q":"Aluminum alloy 7075-T6 is more susceptible to stress corrosion cracking than 2024-T3 because:","o":["It's thinner","7075 has higher zinc content and develops higher residual stresses in the T6 temper \u2014 especially in thick sections oriented in the short-transverse grain direction","It's painted differently","2024 is harder"],"c":1,"x":"7075-T6 in thick sections: SCC susceptibility in short-transverse direction. That's why some critical parts use 7075-T73 or 7050-T74 (overaged tempers that sacrifice some strength for dramatically better SCC resistance)."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Fretting corrosion prevention includes:","o":["Nothing can prevent it","Proper fit-up (no relative movement), use of anti-fretting compounds, and adequate clamping force","Only painting","Only lubrication"],"c":1,"x":"Fretting occurs from microscopic movement between tight-fitting surfaces. Prevention: tight rivets, anti-fretting sealant (like polysulfide) between faying surfaces, proper bolt torque. Movement = wear = oxide particles."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Corrosion treatment on aluminum includes:","o":["Wire brush then paint","Mechanical removal (Scotch-Brite/aluminum wool), chemical treatment (Alodine), prime, and paint","Sandblasting only","Acid wash only"],"c":1,"x":"Complete treatment: 1) Remove corrosion mechanically (no steel tools). 2) Measure remaining material thickness. 3) Chemical treatment. 4) Prime with epoxy/zinc chromate. 5) Topcoat. Document the depth of material removed."},{"e":"SPM","t":"Metallurgy & Corrosion","d":4,"q":"Microbiologically Influenced Corrosion (MIC) in fuel tanks is caused by:","o":["UV light","Bacteria and fungi that live at the fuel-water interface, producing acidic byproducts that attack the tank structure","Cold temperatures","High altitude"],"c":1,"x":"Microbes: Hormoconis resinae (fuel fungus) and sulfate-reducing bacteria. Produce sulfuric acid \u2192 pitting of aluminum tank skins. Prevention: remove water, use biocide (Biobor). Severe MIC can require tank panel replacement."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Precipitation hardening (aging) of aluminum alloys:","o":["Weakens the metal","Develops strength by allowing alloying elements to form fine precipitates within the crystal structure over time or with heat","Only affects surface hardness","Changes the color"],"c":1,"x":"After solution HT + quench: natural aging (room temperature, T4) or artificial aging (elevated temperature, T6). Precipitates impede dislocation movement = increased strength. The core of aluminum alloy heat treatment."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"The galvanic series rates metals from most anodic (active) to most cathodic (noble). In contact, which corrodes?","o":["The more noble metal","The more anodic (active) metal \u2014 it sacrifices itself to protect the cathodic metal","Both equally","Neither"],"c":1,"x":"Anodic = active = corrodes. Cathodic = noble = protected. Magnesium (most anodic) \u2192 zinc \u2192 aluminum \u2192 steel \u2192 stainless \u2192 copper \u2192 gold (most cathodic). Farther apart = worse corrosion."},{"e":"SPM","t":"Metallurgy & Corrosion","d":4,"q":"An aluminum part that was improperly heat treated (over-heated or under-quenched) may appear normal but:","o":["Is actually stronger","Has reduced strength and corrosion resistance \u2014 and the defect is NOT detectable by visual or standard NDT methods","Weighs more","Changes color"],"c":1,"x":"Improper heat treatment doesn't show visually or on standard NDT. Only hardness testing or conductivity testing (eddy current) can detect it. That's why heat treatment must be performed by qualified personnel with calibrated equipment."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Shot peening of metal surfaces:","o":["Damages the surface","Introduces beneficial compressive residual stress that resists fatigue crack initiation","Only cleans the surface","Removes material"],"c":1,"x":"Tiny shot impacts compress the surface layer. Cracks grow under tension \u2014 compressive stress opposes this. Shot peening extends fatigue life of springs, gears, and structural fittings significantly."},{"e":"SPM","t":"NDT","d":3,"q":"The dwell time for penetrant must be sufficient because:","o":["The color needs to develop","The penetrant needs time to enter fine cracks by capillary action \u2014 rushing this step means missed defects","The surface needs to dry","The part needs to cool"],"c":1,"x":"Typical dwell: 10-30 minutes depending on penetrant type and defect type sought. Temperature affects dwell time. Too short = penetrant doesn't reach the bottom of tight cracks = false negative."},{"e":"SPM","t":"NDT","d":4,"q":"When performing MPI, both longitudinal and circular magnetization are needed because:","o":["One is backup for the other","Cracks are only detectable when they are roughly perpendicular to the magnetic field lines \u2014 two directions ensure all crack orientations are found","It doubles the strength","It's faster"],"c":1,"x":"A crack parallel to the magnetic field won't disrupt it = invisible. Longitudinal magnetization finds transverse cracks. Circular finds longitudinal cracks. Both needed for complete coverage. Classic exam question."},{"e":"SPM","t":"NDT","d":3,"q":"Radiographic inspection sensitivity is affected by:","o":["Only film type","Source energy, exposure time, film-to-source distance, film type, and development process","Only development","Only distance"],"c":1,"x":"Multiple variables: too much energy = over-exposure. Too little = under-exposure. Wrong distance = geometric unsharpness. Wrong film = insufficient contrast. All must be controlled per the RT procedure."},{"e":"SPM","t":"NDT","d":3,"q":"A reference standard (calibration block) in ultrasonic testing is used to:","o":["Replace the test part","Calibrate the instrument's sensitivity and distance range before inspecting the actual part","Decorate the workbench","Test the couplant only"],"c":1,"x":"Reference standards contain known holes, notches, or flat-bottom reflectors at known depths. Calibrate the instrument so you know what signal amplitude corresponds to what flaw size. Without calibration, results are meaningless."},{"e":"SPM","t":"NDT","d":4,"q":"The most reliable NDT method for detecting fatigue cracks in thick aluminum wing fittings is:","o":["Visual alone","Eddy current for surface cracks; ultrasonic for deep cracks \u2014 often both methods are used together","Tap testing","MPI (it works on aluminum)"],"c":1,"x":"Aluminum = non-ferromagnetic so no MPI. ET finds surface/near-surface. UT finds deep cracks. For critical fittings, both may be required by the inspection program. The combination provides maximum detection capability."},{"e":"SPM","t":"NDT","d":3,"q":"Fluorescent penetrant is more sensitive than visible dye penetrant because:","o":["It costs more","Fluorescent indications glow brightly under UV light against a dark background \u2014 much higher contrast ratio","It penetrates deeper","It dries faster"],"c":1,"x":"Higher contrast = smaller indications visible. Visible dye: red on white developer. Fluorescent: bright yellow-green on dark purple. Fluorescent detects finer cracks. Used in darkened inspection booths."},{"e":"SPM","t":"NDT","d":3,"q":"After eddy current inspection, the results depend heavily on:","o":["The color of the part","The operator's skill in interpreting signals \u2014 ET is highly operator-dependent and requires certification","The ambient temperature","The time of day"],"c":1,"x":"ET signals are complex: lift-off, material variations, geometry changes all create signals that can mask or mimic defects. Certified operators (Level II minimum) interpret by recognizing signal patterns. Training-intensive."},{"e":"SPM","t":"NDT","d":4,"q":"A crack that is filled with tightly compressed corrosion product may NOT be detected by:","o":["Any method","Liquid penetrant \u2014 because the penetrant can't enter the crack if it's blocked by corrosion product","Ultrasonic","Radiography"],"c":1,"x":"PT requires an open path for capillary action. Corrosion-filled cracks are 'closed' to penetrant. Eddy current or ultrasonic can still detect the crack regardless of what fills it. This is why multiple NDT methods may be specified."},{"e":"SPM","t":"NDT","d":3,"q":"NDT personnel certification levels: Level I can:","o":["Interpret and accept/reject","Perform the inspection under Level II supervision but NOT interpret or accept/reject results","Sign off the inspection independently","Train other inspectors"],"c":1,"x":"Level I: perform test per written instructions. Level II: set up, interpret, accept/reject, write procedures. Level III: develop techniques, approve procedures, certify Level I/II. Know the certification hierarchy."},{"e":"SPM","t":"NDT","d":3,"q":"Thermography NDT detects:","o":["Chemical composition","Subsurface defects by detecting temperature differences on the surface \u2014 voids and delaminations block heat flow","Magnetic anomalies","Electrical resistance"],"c":1,"x":"Infrared camera detects surface temperature patterns. Defects (voids, disbonds, water ingress) alter heat conduction = hot/cold spots. Non-contact, rapid, good for large composite areas."},{"e":"SPM","t":"NDT","d":3,"q":"Couplant in ultrasonic testing serves to:","o":["Clean the surface","Eliminate the air gap between the transducer and test surface \u2014 air reflects nearly all ultrasonic energy","Cool the probe","Mark the test area"],"c":1,"x":"Without couplant (gel, oil, water), the air gap reflects ~99.9% of the sound. Couplant fills the microscopic gap. Must be compatible with the test material (some couplants can cause corrosion on certain alloys)."},{"e":"SPM","t":"NDT","d":4,"q":"Proof testing (static load test) differs from NDT in that:","o":["They're the same","Proof testing applies actual loads to verify structural integrity but risks damaging the structure if it's already weakened","Proof testing is non-destructive","NDT applies loads"],"c":1,"x":"Proof test: apply a percentage of design load and check for deformation/failure. It CAN cause damage (extending existing cracks). NDT detects flaws without loading. Both have roles \u2014 NDT is generally preferred."},{"e":"SPM","t":"NDT","d":3,"q":"The term 'indication' in NDT means:","o":["A confirmed defect","A signal or response that requires interpretation \u2014 may be a defect (relevant), geometry (non-relevant), or false","A pass result","Equipment malfunction"],"c":1,"x":"Indication = something was detected. Relevant = actual defect. Non-relevant = geometry, surface condition, or material variation. False = equipment or technique error. The inspector interprets which it is."},{"e":"SPM","t":"NDT","d":3,"q":"Magnetic particle inspection wet method vs dry method:","o":["Identical results","Wet (particles suspended in liquid) is more sensitive for fine cracks; dry is better for detecting subsurface defects in rough surfaces","Dry is always better","Wet is for aluminum only"],"c":1,"x":"Wet: fine particles in liquid carrier flow easily into surface indications = higher sensitivity. Dry: larger particles stay on rough surfaces better and give stronger indications of subsurface flaws."},{"e":"SPM","t":"NDT","d":4,"q":"For inspecting a titanium turbine disc for subsurface fatigue cracks at bolt holes, the best NDT method is:","o":["MPI (titanium is magnetic)","Dye penetrant (always works)","Ultrasonic inspection or specialized bolt-hole eddy current","Visual with magnification only"],"c":2,"x":"Titanium is non-ferromagnetic (no MPI). PT = surface only. Subsurface fatigue at bolt holes = ultrasonic or specialized rotating bolt-hole ET probes. This type of question tests your understanding of NDT method selection for specific materials and defect types."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"The K-factor in bend calculations accounts for:","o":["Knife-edge sharpness","The position of the neutral axis (which shifts from center toward the inside of the bend) in the bent material","Kleco fastener size","Temperature coefficient"],"c":1,"x":"Neutral axis: where material neither stretches nor compresses. In a bend, it shifts toward the inside. K-factor = ratio of neutral axis position to material thickness. Used for precise bend allowance calculations."},{"e":"SPM","t":"Sheet Metal & Composites","d":4,"q":"When countersinking for flush rivets, the maximum allowable knife-edge condition is:","o":["Any amount","The countersink must NOT extend to or beyond the sheet thickness on the back side \u2014 this creates a 'knife edge' with no clamping area","50% of thickness","There is no limit"],"c":1,"x":"Knife edge = countersink hole cut all the way through = no material left to clamp against rivet head = rivet pulls through. If material is too thin to countersink, dimple instead."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Stop-drilling a crack in sheet metal:","o":["Eliminates the crack permanently","Temporarily arrests crack growth by replacing the sharp crack tip with a round hole (stress relief) \u2014 NOT a permanent repair","Makes the crack worse","Is never done on aircraft"],"c":1,"x":"Round hole at crack tip reduces stress concentration from infinite (sharp crack) to manageable. TEMPORARY ONLY. Permanent repair (patch, replacement) must follow per approved data."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"The minimum bend radius for 2024-T3 aluminum sheet:","o":["Zero (can be folded flat)","Depends on thickness and grain direction \u2014 bending across the grain allows tighter radius than with the grain","1 inch always","Same for all alloys"],"c":1,"x":"Bend radius varies by: alloy, temper, thickness, and grain direction. 2024-T3: minimum radius \u2248 2-3\u00d7 thickness across grain. Tighter bends require annealing first, then re-heat treating after forming."},{"e":"SPM","t":"Sheet Metal & Composites","d":4,"q":"Composite repair curing at elevated temperature is critical because:","o":["Higher is always better","The resin must reach the correct temperature for the correct time to fully cross-link \u2014 under-cure = weak repair, over-cure = brittle","Temperature doesn't matter","Only room temperature is acceptable"],"c":1,"x":"Each resin system has a specific cure cycle: ramp rate, cure temperature, dwell time, and cool-down rate. Thermocouple monitoring ensures the PART (not just the oven) reaches the required temperature throughout the layup."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"A driven rivet's shop head should be inspected for:","o":["Color only","Diameter (1.5D), height (0.5D), concentricity, cracks, and proper filling of the hole","Sound when tapped","Magnetic properties"],"c":1,"x":"Visual inspection: size, shape, cracks, centering. Loose rivet = ring when tapped vs solid thud. Cracked heads, offset heads, and under/over driven rivets are all rejection criteria."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Moisture absorption in composite structures causes:","o":["Increased strength","Reduced strength, reduced glass transition temperature, and potential for delamination during rapid heating (moisture turns to steam)","No effect","Better flexibility"],"c":1,"x":"Moisture weakens the matrix and fiber-matrix bond. During rapid heating (lightning strike, de-ice heat), trapped moisture vaporizes = internal steam pressure = delamination/blistering. Why composites must be kept dry."},{"e":"SPM","t":"Sheet Metal & Composites","d":4,"q":"Interference fit fasteners in fatigue-critical structure:","o":["Weaken the structure","Improve fatigue life by inducing compressive stress around the hole \u2014 the hole is stretched slightly, compressing surrounding material","Are outdated","Only for aluminum"],"c":1,"x":"Slight interference = hole expansion = residual compressive stress around the hole. Fatigue cracks grow under tension \u2014 compression counteracts this. Used in wing splice joints and other fatigue-critical areas."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"When drilling Kevlar composites, the main challenge is:","o":["It's too hard","Kevlar fibers are extremely tough and tend to fuzz/delaminate rather than cut cleanly \u2014 special drill bits (dagger or brad-point) are required","It's too soft","It's identical to drilling aluminum"],"c":1,"x":"Kevlar doesn't cut \u2014 it tears. Regular drill bits create fuzzy, delaminated holes. Use dagger-point or sharp brad-point bits. Slow speed, support the back side. Carbon fiber is different \u2014 cuts cleanly but is abrasive on tools."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Galvanic corrosion between carbon fiber composite and aluminum can occur because:","o":["They're the same material","Carbon fiber is electrically conductive and more cathodic (noble) than aluminum \u2014 creating a galvanic cell with moisture","Carbon fiber is non-conductive","Aluminum is non-metallic"],"c":1,"x":"Carbon fiber + aluminum + moisture = galvanic cell. Aluminum corrodes aggressively. Prevention: isolating layer (fiberglass, sealant) between carbon and aluminum. Very important in modern mixed-material aircraft."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Fiberglass repair using wet layup:","o":["Is the weakest repair method","Involves saturating dry cloth with mixed resin and applying plies by hand \u2014 adequate for many repairs when done properly","Is stronger than pre-preg","Requires an autoclave always"],"c":1,"x":"Wet layup: hand-mixed resin applied to dry cloth. Simpler than pre-preg (no freezer storage needed). Vacuum bagging improves quality. Pre-preg gives better consistency but requires freezer storage and controlled cure."},{"e":"SPM","t":"Sheet Metal & Composites","d":4,"q":"A repair to a lightning strike protection zone on a composite aircraft requires:","o":["Only cosmetic repair","Restoring the conductive lightning protection mesh/foil in addition to the structural composite repair \u2014 or the area is vulnerable to strike damage","Only structural repair","No repair needed \u2014 composites are lightning-proof"],"c":1,"x":"Composites don't conduct electricity like aluminum. Lightning protection: metal mesh, expanded foil, or conductive coating over the composite. If damaged, the protection layer MUST be restored in addition to the structural repair."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Pre-preg composite material must be stored:","o":["At room temperature","In a freezer at specified temperature (typically -18\u00b0C/0\u00b0F) to prevent premature curing \u2014 with tracked out-life and shelf-life","In direct sunlight","In a warm oven"],"c":1,"x":"Pre-preg resin slowly cures even at room temperature. Freezer storage pauses the cure. Out-life (time at room temp) is limited and tracked. Expired pre-preg = unpredictable cure = rejected repair."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Edge distance for a rivet in a repair patch means:","o":["Distance between rivets","Distance from rivet center to the nearest edge of the sheet \u2014 minimum 2D to prevent edge cracking","Patch overlap distance","Sheet thickness at the edge"],"c":1,"x":"< 2D edge distance: the rivet can pull out through the edge under load (edge tear-out). The SRM specifies minimum edge distance for each rivet size. Measure from hole center to edge."},{"e":"SPM","t":"Sheet Metal & Composites","d":4,"q":"A repair to a pressurized fuselage skin using a flush external doubler must account for:","o":["Only shear loads","Hoop stress from pressurization, shear from flight loads, fatigue from cyclic pressurization, and maintaining aerodynamic smoothness","Only appearance","Only weight"],"c":1,"x":"Pressurized skin repair: rivet pattern must handle hoop stress (pressure) + longitudinal stress + shear. Fatigue rated = enough rivets to prevent crack initiation over tens of thousands of pressurization cycles. Flush for aerodynamics."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"When using a crowfoot wrench on a torque wrench, the torque reading must be:","o":["Used as-is","Corrected for the additional length \u2014 the formula accounts for the effective lever arm change","Doubled","Halved"],"c":1,"x":"Crowfoot adds length to the torque wrench arm. Actual torque at the fastener differs from the reading. Correction formula: Setting = Desired \u00d7 (L/(L+A)) where L=wrench length, A=adapter offset."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A snap gauge (go/no-go) checks:","o":["Material composition","Whether a dimension falls within tolerance \u2014 if the 'go' end fits and the 'no-go' end doesn't, the part is within limits","Surface roughness","Color matching"],"c":1,"x":"Go end = minimum acceptable size. No-go end = maximum. Part must pass go (not too small) but reject no-go (not too big). Fast pass/fail check for production and maintenance."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"Reamers are used in aircraft work to:","o":["Cut new holes","Enlarge and smooth existing holes to a precise diameter with fine surface finish","Remove rivets","Measure hole depth"],"c":1,"x":"Reaming produces accurately sized holes for close-tolerance bolts and bushings. Start with a slightly undersize drill hole, then ream to final size. Never force a reamer \u2014 let it cut."},{"e":"SPM","t":"Tools & Measuring","d":4,"q":"When torquing a bolt into aluminum, the correct technique is:","o":["Use maximum force immediately","Apply torque in gradual increments using a calibrated wrench \u2014 aluminum is soft and easily stripped or damaged by sudden loading","Hammer it tight","Use an impact wrench"],"c":1,"x":"Aluminum strips easily. Gradual tightening: snug, then 1/2 of target, then 3/4, then final. Lubricate threads if specified. Over-torque into aluminum = stripped hole = helicoil insert needed = expensive repair."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A telescoping gauge is used with a micrometer to measure:","o":["Outside dimensions","Inside dimensions (bore diameters, slot widths) that can't be measured directly with calipers","Depth","Angles"],"c":1,"x":"Telescoping gauge: spring-loaded plungers expand to fit inside a bore. Lock, remove, measure the gauge with a micrometer. Indirect measurement technique for internal dimensions."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"Pneumatic tools in aircraft maintenance require:","o":["No special care","Clean, dry, regulated air supply and proper maintenance (lubrication, inspection of hoses and fittings)","Maximum pressure at all times","Only electric power"],"c":1,"x":"Moisture in air lines causes tool damage and corrosion. Water trap/filter required. Regulate pressure to tool rating. Lubricate per manufacturer. Inspect hoses for damage. Use whip checks on connections."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A hole finder (center punch locator) is used to:","o":["Find lost tools","Transfer hole locations from an existing part to a new part by centering in existing holes","Measure depth","Check alignment"],"c":1,"x":"Centering pin fits in the existing hole. The outer sleeve marks the center on the new part. Ensures new holes line up exactly with existing holes. Essential for accurate rivet and bolt hole transfer."},{"e":"SPM","t":"Tools & Measuring","d":4,"q":"Calibration of a torque wrench to a national standard means:","o":["The factory setting is permanent","The wrench has been verified against a reference standard traceable to NRC/NIST \u2014 with a certificate showing date, values, and next due date","It was cleaned","It was used recently"],"c":1,"x":"Traceability chain: your wrench \u2192 calibration standard \u2192 national standard. Certificate must show: serial number, as-found/as-left values, date, due date, standard used. Using an uncalibrated wrench = unreliable torque = potentially unsafe."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"When using a micrometer, the thimble should be turned using:","o":["The barrel","The ratchet stop \u2014 which prevents over-tightening and ensures consistent measuring force","Just fingers on the thimble","A wrench"],"c":1,"x":"Ratchet stop: clicks at a set force. Ensures repeatable measurements regardless of who uses it. Over-tightening squeezes soft materials and gives false readings. Professional technique."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"Thread chasers and taps differ in that:","o":["They're identical","Taps cut new threads; chasers clean/restore existing threads without removing material","Chasers cut new threads","Taps only measure threads"],"c":1,"x":"Damaged threads: use a chaser to restore the form without cutting deeper. A tap would cut new threads (oversize), destroying the fastener hole. Know the difference \u2014 using a tap where a chaser is needed ruins the hole."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"When using test equipment (multimeter, oscilloscope), the technician should first:","o":["Measure the most convenient point","Verify the test equipment is calibrated and functioning correctly before trusting any readings","Trust the first reading","Replace the equipment"],"c":1,"x":"A faulty meter gives faulty readings. Check calibration sticker (current?). Verify on a known source. Zero the meter. Select correct range. All basic but critical \u2014 a bad reading leads to wrong diagnosis."},{"e":"SPM","t":"Tools & Measuring","d":4,"q":"Depth micrometers measure:","o":["Surface roughness","The depth of slots, holes, steps, and recesses from a reference surface to precision of 0.001\"","Wire gauge","Thread pitch"],"c":1,"x":"Base sits on the reference surface. Rod extends into the feature being measured. Read the same as a standard micrometer. Used for counterbore depth, step height, and keyway depth measurements."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"When reaming a close-tolerance bolt hole, the reamer should be:","o":["Turned backwards to finish","Turned only in the cutting direction \u2014 never reverse the rotation or the cutting edges will be damaged","Hammered in","Heated before use"],"c":1,"x":"Reversing a reamer breaks cutting edges and damages the hole surface. Turn only forward (clockwise). Use cutting fluid. Remove cleanly (still turning forward if possible). Deburr the hole edges after reaming."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A precision straight edge is used to check:","o":["Color matching","Surface flatness and straightness \u2014 any gaps between the straight edge and surface indicate warpage or irregularity","Thread pitch","Electrical continuity"],"c":1,"x":"Hold straight edge against the surface. Use a feeler gauge to measure any gaps. Used for checking propeller blade straightness, control surface fairness, and skin panel flatness."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"The most important safety rule when using any tool in aircraft maintenance:","o":["Work as fast as possible","Use the right tool for the job \u2014 improvised or wrong tools damage hardware, create FOD, and risk injury","Any tool will do in a pinch","Speed is more important than precision"],"c":1,"x":"Wrong tool: rounds fastener heads (now it's a bigger problem), slips (injury), creates chips/debris (FOD), damages calibrated hardware. Take the extra minute to get the right tool. Tool control: account for every tool after the job."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Useful load equals:","o":["Maximum gross weight","Maximum gross weight minus basic empty weight \u2014 the weight available for crew, fuel, passengers, and cargo","Payload only","Fuel only"],"c":1,"x":"Useful load = everything you can add: people, bags, fuel. If useful load is 1,200 lbs and full fuel weighs 400 lbs, you have 800 lbs for people and cargo. Exceeding useful load = over gross weight."},{"e":"SPM","t":"Weight & Balance","d":4,"q":"An aircraft weighs 1,800 lbs at CG Stn 78. You add 200 lbs at Stn 95 and remove 50 lbs from Stn 40. New CG:","o":["Stn 78","Stn 80.5","Stn 82.3","Stn 75"],"c":1,"x":"New weight: 1800+200-50=1950. New moment: (1800\u00d778)+(200\u00d795)-(50\u00d740)=140400+19000-2000=157400. CG=157400/1950=80.7. Practice multi-step W&B calculations \u2014 they appear on every exam."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Why is the CG range specified as forward and aft limits?","o":["Aerodynamic efficiency only","Forward limit: limited by elevator authority for landing. Aft limit: limited by stability \u2014 beyond aft limit aircraft may become uncontrollable","Fuel consumption","Ground handling only"],"c":1,"x":"Forward CG = nose heavy = need lots of up elevator to flare = if not enough, can't land safely. Aft CG = tail heavy = reduced stability = possible unrecoverable pitch-up. Both limits are safety boundaries."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Zero fuel weight (ZFW) is:","o":["Weight with empty tanks","Maximum weight of the loaded aircraft without any usable fuel \u2014 limits structural wing bending loads","Weight at landing","Empty weight"],"c":1,"x":"Wing fuel supports the wing's weight. Without fuel, all weight is supported at the wing root = maximum bending moment. ZFW limit prevents structural overload of the wing root in the no-fuel condition."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"When equipment is installed in an aircraft, the W&B must be updated if:","o":["The equipment is under 1 lb","The installation changes the empty weight or CG beyond tolerances","Only during annual","Only if the pilot notices"],"c":1,"x":"ANY equipment change that affects weight or CG: new avionics, seats, fuel tanks, modifications. Document: old weight, weight change, arm, new weight, new CG. Amend the W&B report."},{"e":"SPM","t":"Weight & Balance","d":4,"q":"Shifting weight within the aircraft: moving 100 lbs from Stn 30 to Stn 130 in a 2,000 lb aircraft. CG shift:","o":["0 inches","5 inches aft","50 inches aft","100 inches aft"],"c":1,"x":"CG shift = (weight moved \u00d7 distance moved) \u00f7 total weight = (100 \u00d7 100) \u00f7 2000 = 5 inches aft. This formula is GOLD for the exam. Weight didn't change, just its position."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"The equipment list in the TCDS specifies:","o":["Optional items only","Required and optional equipment with weight and arm for each item \u2014 essential for accurate W&B","Paint colors","Fuel types"],"c":1,"x":"Equipment list is part of W&B data. Adding/removing listed equipment: adjust weight and moment accordingly. Compare aircraft's actual equipment against the list to calculate current W&B."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Weighing an aircraft requires:","o":["Only two scales","Three scales (one for each landing gear point on tricycle), accurate and calibrated, aircraft level, in a closed hangar","One large scale","No scales needed"],"c":1,"x":"Three point weighing: nose + left main + right main. Sum = gross weight. Moments calculated from scale readings \u00d7 arms. Must be in closed hangar (no wind), level, correct fuel state per manual."},{"e":"SPM","t":"Weight & Balance","d":4,"q":"If the datum is ahead of the nose, all arms are:","o":["Negative","Positive (because everything on the aircraft is aft of the datum)","Zero","Both positive and negative"],"c":1,"x":"Datum ahead of nose = all aircraft stations are positive. This simplifies calculations (no negative numbers). Some aircraft use firewall or leading edge as datum \u2014 then items forward of it have negative arms."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"After a major modification (engine change, avionics upgrade), the aircraft must be:","o":["Flown to check handling","Re-weighed to establish accurate new empty weight and CG \u2014 or weight change calculated precisely from modification records","Only inspected visually","Nothing special for W&B"],"c":1,"x":"Option 1: physically re-weigh. Option 2: calculate new W&B from accurately documented weight changes. Option 2 is acceptable if all weight changes are precisely known (from manufacturer data)."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"The CG envelope (loading graph) allows:","o":["Any loading","Visual verification that a specific loading falls within the approved CG range at that weight \u2014 both weight AND CG must be within limits","Only weight checking","Only CG checking"],"c":1,"x":"Plot your calculated weight on the vertical axis and CG on the horizontal. If the point falls inside the envelope = legal loading. Outside = not safe to fly. Check at takeoff weight AND at estimated landing weight."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Taxi fuel must be accounted for in W&B because:","o":["It doesn't matter","Fuel burned during taxi reduces the takeoff weight below the ramp weight \u2014 must still be within limits for takeoff","It adds weight","It changes CG dramatically"],"c":1,"x":"Ramp weight can exceed MTOW by taxi fuel amount. After taxi, weight must be \u2264 MTOW. CG also shifts as fuel burns. Smart operators check W&B at multiple points: ramp, takeoff, landing."},{"e":"SPM","t":"Weight & Balance","d":4,"q":"A helicopter CG is especially critical because:","o":["Helicopters are heavier","The allowable CG range is very small AND both longitudinal AND lateral CG must be within limits","Only longitudinal matters","CG doesn't matter in hover"],"c":1,"x":"Helicopter CG ranges are tiny compared to fixed-wing. Lateral CG matters too (asymmetric loading tilts the disc). Out-of-CG helicopter = flight control limits reached = possible loss of control."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"The purpose of weighing an aircraft in a level attitude is:","o":["Appearance","To ensure the scale readings accurately represent the distribution of weight between the gear \u2014 an unlevel aircraft shifts weight between nose and mains","Standard procedure only","It's not necessary"],"c":1,"x":"Tilted aircraft: weight shifts to downhill gear = wrong CG calculation. Level is verified using the aircraft's specific leveling points (door frame, fuselage floor). Even small errors = significant CG error."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"After adding ballast to an aircraft to correct CG, the ballast:","o":["Can be removed anytime","Must be permanently installed, documented on the W&B report, and placarded with its weight and purpose","Is temporary always","Doesn't need documentation"],"c":1,"x":"Permanent ballast: bolted in place, documented on W&B report, placarded 'BALLAST XX LBS - DO NOT REMOVE WITHOUT W&B RECALCULATION.' Removing it shifts CG back out of limits."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Induced drag is greatest at:","o":["High speed","Low speed and high angle of attack \u2014 when wingtip vortices are strongest","Cruise speed","Mach 1"],"c":1,"x":"Low speed = high AOA = strong vortices = high induced drag. High speed = low AOA = weak vortices = low induced drag. Parasite drag is opposite. Total drag minimized where both curves cross."},{"e":"AF","t":"Aerodynamics","d":4,"q":"An aircraft's critical angle of attack (stall) is:","o":["Different at every altitude","Always the same regardless of weight, speed, or configuration \u2014 the wing stalls at the same AOA","Higher at altitude","Lower with flaps"],"c":1,"x":"The critical AOA is a fixed aerodynamic property of the wing design (~15-20\u00b0 for most). The SPEED at which it stalls changes with weight/config/G-load, but the angle doesn't. Classic trap question."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Dutch roll is an oscillation involving:","o":["Only pitch","Combined yawing and rolling motion \u2014 directional and lateral stability interaction","Only roll","Only yaw"],"c":1,"x":"Dutch roll: aircraft yaws and rolls simultaneously in an oscillating pattern. Common on swept-wing aircraft. Yaw dampers suppress it automatically. Annoying and can be dangerous if undamped."},{"e":"AF","t":"Aerodynamics","d":3,"q":"The purpose of vortex generators on a wing:","o":["Generate lift","Re-energize the boundary layer by mixing high-energy air into the slow boundary layer, delaying flow separation","Reduce speed","Create drag"],"c":1,"x":"Small metal tabs on the wing surface. Create tiny vortices that bring fast air down to the surface. Delays stall, improves aileron effectiveness at low speed. Common on business jets and modified aircraft."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Wing fences (stall strips) cause:","o":["Increased speed","A controlled, predictable stall progression by forcing the root to stall before the tips","Reduced drag","Better roll rate"],"c":1,"x":"Stall strips on the inboard leading edge trip the airflow early. Root stalls first \u2192 buffet warning + ailerons still effective. Without them, the tip could stall first \u2192 sudden wing drop."},{"e":"AF","t":"Aerodynamics","d":4,"q":"In a coordinated turn, the load factor depends ONLY on:","o":["Airspeed","Bank angle \u2014 steeper bank = higher load factor regardless of speed or weight","Weight","Altitude"],"c":1,"x":"LF = 1/cos(bank). 30\u00b0=1.15G, 45\u00b0=1.41G, 60\u00b0=2G, 75\u00b0=3.86G. Independent of speed/weight/altitude. Stall speed increases by \u221aLF. At 60\u00b0 bank, stall speed is 41% higher than in level flight."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Compressibility effects (shock waves) begin at approximately:","o":["Mach 0.5","Mach 0.72-0.80 (critical Mach number) depending on wing design","Mach 1.0 exactly","Mach 2.0"],"c":1,"x":"Local airflow over the wing reaches Mach 1 before the aircraft does (critical Mach). Shock waves form causing buffet, drag rise, and pitch changes. Swept wings delay critical Mach."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Winglets reduce induced drag by:","o":["Adding weight","Reducing the strength of wingtip vortices \u2014 blocking the high-pressure air from curling around the wingtip","Increasing wing area","Acting as ailerons"],"c":1,"x":"Wingtip vortices waste energy. Winglets act as an end plate, weakening vortices. 3-5% fuel saving on jets. That's millions in fuel costs annually for airlines. Common retrofit modification."},{"e":"AF","t":"Aerodynamics","d":3,"q":"P-factor (asymmetric thrust) on a propeller aircraft causes yaw to the:","o":["Right","Left on a clockwise-rotating prop (pilot's view) because the descending blade has a higher AOA and produces more thrust","Neither direction","Both directions equally"],"c":1,"x":"At high AOA, the descending blade (right side, clockwise prop) meets air at a higher angle = more thrust on the right = yaws nose left. Most noticeable during takeoff and low-speed climb."},{"e":"AF","t":"Aerodynamics","d":4,"q":"Longitudinal stability requires the CG to be:","o":["Behind the center of pressure","Ahead of the center of pressure (aerodynamic center) with the horizontal tail providing a balancing down force","At the wing tips","Doesn't matter for stability"],"c":1,"x":"CG ahead of CP: if nose pitches up, the moment arm restores it. CG behind CP: pitch-up increases, no restoration = divergent (unstable). The tail provides the restoring force for longitudinal stability."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Wake turbulence from a heavy aircraft is most severe:","o":["At high speed","At low speed, heavy weight, and clean configuration \u2014 when wingtip vortices are strongest","At cruise altitude","During descent only"],"c":1,"x":"Heavy, slow, clean = maximum vortex generation. Vortices descend and spread. Following aircraft must maintain separation. Especially dangerous for small aircraft following heavies on approach."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Sweeping the wing backward:","o":["Increases low-speed performance","Delays critical Mach number (higher cruise speed before compressibility effects) at the expense of low-speed handling","Increases lift at all speeds","Reduces wing weight"],"c":1,"x":"Effective airflow component perpendicular to the leading edge is slower = higher critical Mach. Penalty: reduced lift at low speed, tendency to tip stall, Dutch roll. Why swept-wing aircraft have slats and complex high-lift devices."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Aileron reversal at high speed occurs when:","o":["The pilot moves the stick wrong","Aileron deflection twists the wing in the opposite direction \u2014 the wing twist effect overpowers the aileron","Controls jam","Hydraulics fail"],"c":1,"x":"High dynamic pressure: aileron deflection creates a torsional force on the thin outboard wing. Wing twists opposite to intended roll. Solved by: stiffer wings, inboard ailerons at high speed, or spoiler roll control."},{"e":"AF","t":"Aerodynamics","d":4,"q":"A supercritical airfoil is designed to:","o":["Fly only supersonic","Allow higher cruise speed before drag divergence by flattening the upper surface and using a cambered trailing edge","Stall at lower speed","Increase maximum lift"],"c":1,"x":"Flat upper surface = weaker shock wave at transonic speeds = less wave drag. Aft camber recovers lift lost from the flat top. Used on modern transports (A320, B777). Allows higher cruise Mach without the drag penalty."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Propeller slipstream affects the vertical stabilizer by:","o":["Having no effect","Creating a side force that causes yaw \u2014 especially at high power and low speed, requiring rudder trim","Only cooling the tail","Increasing tail lift"],"c":1,"x":"Rotating slipstream hits the vertical fin at an angle, creating a side force. On a clockwise prop, the spiraling air pushes the left side of the fin = yaws nose left. Offset fin or rudder trim compensates."},{"e":"AF","t":"Structures","d":3,"q":"A crack stop hole must be drilled:","o":["Anywhere near the crack","At the exact tip of the crack \u2014 verified by magnification or NDT \u2014 with the hole centered on the crack tip","Behind the crack","In front of the crack"],"c":1,"x":"If the hole doesn't capture the true crack tip, the crack continues past it. Verify the tip location with dye penetrant or 10\u00d7 magnification before drilling. Hole size per SRM."},{"e":"AF","t":"Structures","d":3,"q":"Damage tolerance design philosophy assumes:","o":["No cracks will ever exist","Cracks WILL exist and grow \u2014 structure is designed so cracks are detected before they reach critical size","Structure is indestructible","Only new aircraft are safe"],"c":1,"x":"Modern transport aircraft: designed to fly safely with cracks up to a certain size. Inspection intervals catch cracks before they grow to critical length. This is why inspections are non-negotiable."},{"e":"AF","t":"Structures","d":4,"q":"The difference between WBL, STA, and BL in aircraft structural coordinates:","o":["They're interchangeable","STA = lengthwise from datum, BL = lateral from centerline, WBL = same as BL but specifically on the wing","STA is for wings only","BL is vertical"],"c":1,"x":"STA (station) = fuselage longitudinal. BL (buttock line) = fuselage lateral. WBL (wing buttock line) = wing spanwise. WL (waterline) = vertical. Together they form the 3D coordinate system."},{"e":"AF","t":"Structures","d":3,"q":"Bonded (adhesive) repairs on metal structure:","o":["Are always stronger than riveted","Transfer load through adhesive shear \u2014 require precise surface prep, controlled cure, and are sensitive to temperature and moisture","Are identical to riveted","Cannot be used on aircraft"],"c":1,"x":"Bonded repairs: continuous load transfer (no stress concentration at rivet holes). But: surface prep is critical, cure must be controlled, and bonds degrade with moisture/heat over time. Requires specialized training."},{"e":"AF","t":"Structures","d":3,"q":"A doubler used in a repair must be the same material and temper as the original skin OR:","o":["Any stronger material","A material approved in the SRM as an acceptable substitute \u2014 dissimilar metals require galvanic protection","Any aluminum alloy","Only titanium"],"c":1,"x":"Material compatibility: same alloy/temper preferred. SRM may list alternatives. Using stronger alloy can actually cause problems (stiffness mismatch, galvanic corrosion). Always follow approved data."},{"e":"AF","t":"Structures","d":4,"q":"Widespread Fatigue Damage (WFD) is:","o":["One large crack","Simultaneous presence of multiple fatigue cracks throughout the structure that could interact and fail catastrophically before any single crack is detected","Only in rivets","Only in composite aircraft"],"c":1,"x":"WFD: many small cracks growing simultaneously. Individual cracks may be below detection threshold but their combined effect weakens the structure. Led to mandatory Limit of Validity (LOV) for aging aircraft."},{"e":"AF","t":"Structures","d":3,"q":"The SRM classifies damage into categories:","o":["Only repairable or not","Negligible (allowable), repairable (with SRM procedures), or requiring manufacturer engineering disposition","Minor and major only","By color code"],"c":1,"x":"Three tiers: 1) Within allowable limits = blend/clean, no repair. 2) Beyond allowable but within SRM repair capability = use SRM repair. 3) Beyond SRM scope = need engineering from the manufacturer/DER."},{"e":"AF","t":"Structures","d":3,"q":"Neutral axis of a beam under bending:","o":["Is the outer surface","Is the line through the cross-section where there is zero stress \u2014 compression above, tension below (or vice versa)","Carries the most stress","Doesn't exist in aircraft"],"c":1,"x":"In a bending beam: outer fibers carry maximum stress (tension on one side, compression on the other). The neutral axis (center in symmetric beams) has zero bending stress. Why I-beams have material at the top and bottom."},{"e":"AF","t":"Structures","d":3,"q":"Joggle in a structural repair allows:","o":["Higher stress concentration","The doubler to sit flush against the skin surface by stepping over an underlying stiffener or frame","Better appearance only","Easier riveting"],"c":1,"x":"Without joggle, the doubler bridges over the stiffener leaving a gap (no clamping). Joggle forms an offset in the doubler to follow the skin contour. Made with joggle dies or forming block."},{"e":"AF","t":"Structures","d":4,"q":"When assessing lightning strike damage on a composite aircraft, the concern is:","o":["Only paint damage","Internal delamination and fiber damage that may be invisible on the surface \u2014 requiring ultrasonic inspection beyond the visible damage area","Only metal mesh damage","No concern needed"],"c":1,"x":"Lightning can blow off paint but also cause invisible internal delamination spreading well beyond the visible burn mark. UT inspection must extend at least 6 inches beyond visible damage (or per SRM)."},{"e":"AF","t":"Structures","d":3,"q":"Shear ties (shear clips) connect:","o":["Wings to engines","Fuselage skin to frames/formers \u2014 transferring shear loads from the skin into the internal structure","Control cables","Fuel lines"],"c":1,"x":"Shear clips are small angles riveted to both skin and frame. They transfer skin shear loads into the frame, maintaining the structural integrity of the semi-monocoque fuselage. Inspect for cracks at rivet holes."},{"e":"AF","t":"Structures","d":3,"q":"A scarf repair on composite:","o":["Uses overlapping patches","Tapers the damaged area at a shallow angle (typically 1:20 to 1:50) and fills with tapered repair plies for flush, high-strength restoration","Is only for metal","Is purely cosmetic"],"c":1,"x":"Scarf: material is sanded away in a gradual taper. New plies replace removed material at matching angles. Strongest composite repair method \u2014 restores near-original strength. Time-consuming but necessary for primary structure."},{"e":"AF","t":"Structures","d":4,"q":"Limit load vs ultimate load for an aircraft structure:","o":["They're the same","Limit load = maximum expected in service; ultimate load = 1.5\u00d7 limit load (safety factor) \u2014 structure must not break at ultimate","Limit is always higher","Ultimate is 2\u00d7 limit"],"c":1,"x":"Limit load: no permanent deformation allowed. Ultimate load (1.5\u00d7 limit): structure must hold for 3 seconds without failure. This 1.5 safety factor is the foundation of all aircraft structural design."},{"e":"AF","t":"Structures","d":3,"q":"Corrosion found at a faying surface (lap joint) is particularly serious because:","o":["It's easily visible","It's hidden between the layers, hard to detect, can be extensive before discovered, and compromises the joint fasteners","It's purely cosmetic","It only affects paint"],"c":1,"x":"Faying surface corrosion: trapped moisture between overlapping skins. Grows unseen until pillowing (skin bulging) or fastener failure. Prevention: proper sealant between faying surfaces during assembly, regular inspection."},{"e":"AF","t":"Structures","d":3,"q":"A repair to a wing spar must be treated as:","o":["A minor repair","A major repair \u2014 spars are primary structure carrying the main flight loads (bending, shear, torsion)","A standard patch","Optional maintenance"],"c":1,"x":"Spars = the backbone of the wing. Any spar repair is major. Requires engineering-approved data, specific materials, and may require NDT inspection. SRM may cover some standardized spar repairs."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"A balance tab moves in the OPPOSITE direction to the control surface to:","o":["Increase pilot effort","Reduce pilot effort by aerodynamically assisting the main surface movement","Trim the aircraft","Prevent flutter"],"c":1,"x":"Balance tab: linked so it deflects opposite to the surface. Creates an aerodynamic force that helps move the main surface. Reduces hinge moment = less pilot effort. Different from trim tab (set independently)."},{"e":"AF","t":"Fixed-Wing Controls","d":4,"q":"Anti-balance tabs move in the SAME direction as the control surface to:","o":["Reduce pilot effort","INCREASE control force feel \u2014 used on all-moving tailplanes (stabilators) to prevent oversensitive controls","Balance the surface","Trim the aircraft"],"c":1,"x":"Anti-servo/anti-balance tab: prevents the pilot from overcontrolling. On stabilators, without it the controls would be too light and the pilot could easily overstress the aircraft. Provides 'feel.'"},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Control surface mass balance prevents:","o":["Corrosion","Flutter \u2014 by keeping the surface CG at or ahead of the hinge line so aerodynamic forces can't drive oscillation","Wear","Overcontrol"],"c":1,"x":"Flutter: aerodynamic + inertial forces couple into destructive oscillation. If CG is behind hinge = inertial force reinforces aerodynamic oscillation = divergent flutter. Mass balance moves CG forward. CRITICAL safety item."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Cable tension rigging should be checked at:","o":["Any temperature","A known ambient temperature and corrected using the temperature chart \u2014 cable tension changes with temperature","Only in summer","Only at exactly 20\u00b0C"],"c":1,"x":"Steel cables expand when hot (lower tension) and contract when cold (higher tension). The rigging chart shows required tension at each temperature. Measure temp \u2192 look up tension \u2192 adjust. Document temperature on the work order."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Differential ailerons deflect more UP than DOWN to:","o":["Look asymmetric","Reduce adverse yaw \u2014 the up-going aileron creates less drag than the down-going aileron","Increase roll rate","Reduce flutter"],"c":1,"x":"Down aileron: increases both lift AND drag. Up aileron: decreases lift and drag. More up than down = drag difference is reduced = less adverse yaw. Designed into the bellcrank geometry."},{"e":"AF","t":"Fixed-Wing Controls","d":4,"q":"A jammed flight control in a dual-control aircraft requires:","o":["Both pilots pulling harder","The shear pin/breakout mechanism to allow the operable control column to separate from the jammed one","Shutting down the engine","Activating the autopilot"],"c":1,"x":"Breakout/shear mechanism: if something jams one control column, the other pilot can apply enough force to break the interconnection and regain control on their side. Required on transport aircraft."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Spring tabs become effective only at:","o":["All speeds","Higher speeds when aerodynamic loads are high enough to resist the spring \u2014 at low speed the tab doesn't deflect","Idle only","During landing only"],"c":1,"x":"At low speed: pilot force directly moves the surface, spring doesn't compress enough to deflect tab. At high speed: aerodynamic resistance compresses the spring, deflecting the tab, which helps move the surface."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Frise ailerons reduce adverse yaw by:","o":["Moving together","Having the up-going aileron's leading edge protrude below the wing, creating drag on that side to balance the down aileron's higher drag","Being shorter","Being lighter"],"c":1,"x":"When the aileron goes up, the leading edge extends below the wing surface into the airstream, creating parasitic drag on the UP side. This equalizes drag between the two ailerons = less adverse yaw."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"Roll spoilers function by:","o":["Increasing lift on one wing","Disrupting lift on one wing \u2014 the wing with the raised spoiler drops, rolling the aircraft toward that wing","Generating yaw","Adjusting trim"],"c":1,"x":"Spoiler up = lift destroyed on that wing = that wing drops = aircraft rolls toward the spoiler. Used alone or with ailerons. At high speed, spoilers may be primary roll control (ailerons locked out to prevent reversal)."},{"e":"AF","t":"Fixed-Wing Controls","d":4,"q":"Fly-by-wire flight envelope protection prevents:","o":["Normal flight","Pilot inputs from exceeding structural limits, stall AOA, maximum bank angle, or overspeed \u2014 computers limit t
