ro, reads field elevation \u00b175 ft. VSI reads zero. Heading matches known reference. No flags or warning indicators. All normal ranges for ground conditions."},{"e":"AF","t":"Instruments","d":3,"q":"A torque meter on a turboprop indicates:","o":["Engine RPM","Output shaft torque \u2014 the primary indicator of power being delivered to the propeller","Fuel flow","EGT"],"c":1,"x":"Turboprop power: set by torque (not RPM, since the prop governor holds RPM constant). Higher torque = more power. Limited by torque redline and EGT. You'll see torque gauges on the AW139 (main rotor torque)."},{"e":"AF","t":"Instruments","d":3,"q":"When an instrument is marked with a yellow triangle:","o":["It's new","It has been tested and found to meet instrument standards for that specific aircraft installation","It's rejected","It needs calibration"],"c":1,"x":"Yellow triangle = instrument meets the range, accuracy, and performance standards for that particular aircraft installation. Placed by the installing AME after functional check."},{"e":"AF","t":"Instruments","d":4,"q":"An EICAS (Engine Indication and Crew Alerting System) provides:","o":["Only engine data","Primary engine parameters, aircraft system status, and alert messages (caution/warning/advisory) all on electronic displays \u2014 replaces dozens of analog gauges","Only crew schedules","Only maintenance data"],"c":1,"x":"EICAS: upper display = primary engine parameters. Lower display = secondary engine data + alert messages. Messages color-coded: red (warning), amber (caution), white/cyan (advisory). Reduces pilot workload by prioritizing information."},{"e":"AF","t":"Fabric Covering","d":3,"q":"The 'ring test' on fabric-covered aircraft:","o":["Tests metal quality","An informal check where you tap the fabric and listen \u2014 a taut drumlike ring indicates good tension; a dull thud may indicate deterioration","Tests bolt torque","Tests compass accuracy"],"c":1,"x":"Quick field assessment: healthy fabric has good tension and resonates. Deteriorated or slack fabric sounds dull. Not a substitute for punch testing, but a useful first indicator during walkaround."},{"e":"AF","t":"Fabric Covering","d":3,"q":"When re-covering a wing, the fabric must be applied with the:","o":["Warp (stronger) threads running spanwise \u2014 along the length of the wing","Warp threads running chordwise","Any orientation","Bias (45\u00b0) orientation"],"c":1,"x":"Warp (lengthwise in the roll) is stronger than fill (crosswise). Running warp spanwise provides maximum strength where the flight loads (ballooning) act. Orientation matters for structural integrity."},{"e":"AF","t":"Fabric Covering","d":4,"q":"Rib stitch spacing on a fabric-covered wing is closer near the:","o":["Root","Wingtip \u2014 where aerodynamic loads are highest relative to the rib spacing and where the fabric tends to balloon more","Center of the wing","Leading edge"],"c":1,"x":"Aerodynamic pressure on fabric increases toward the tips on some designs. The STC/AMM specifies exact stitch spacing that decreases (closer spacing) at higher-speed areas. Follow the spacing chart exactly."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Poly-Brush and Poly-Spray in the Poly-Fiber system serve different purposes:","o":["They're the same","Poly-Brush bonds to polyester and seals the fabric; Poly-Spray fills the weave and provides a smooth base for paint","Both are topcoats","Both are primers for metal"],"c":1,"x":"Poly-Brush: first coat, bonds chemically to polyester. UV protection starts here. Poly-Spray: wet-sanded between coats to build a smooth, filled surface. Then Poly-Tone (color topcoat) or Aerothane (urethane topcoat)."},{"e":"AF","t":"Fabric Covering","d":3,"q":"A sewed seam on aircraft fabric must be:","o":["Single stitched","A specific stitch type (usually lock stitch) with minimum stitches per inch and minimum seam width per the STC/AMM","Glued only","Stapled"],"c":1,"x":"Machine-sewn seams: lock stitch, typically 8-10 stitches per inch, minimum 1/4\" to 1/2\" seam width. Thread must match the covering system. Hand sewing for repair patches uses baseball stitch or modified seine stitch."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Finishing tape width and placement are specified because:","o":["Appearance only","Tape reinforces the fabric at structural contact points and must be wide enough to prevent rib lacing from pulling through","It reduces drag","It identifies the manufacturer"],"c":1,"x":"Surface tape: 2\" to 4\" wide typically. Applied over all ribs, spars, leading edge, trailing edge, and seams. Doped on with at least 3 coats of dope extending beyond the tape edges."},{"e":"AF","t":"Fabric Covering","d":4,"q":"If a punch test shows fabric at 48 lbs on an aircraft requiring 46 lbs minimum:","o":["Fabric needs immediate replacement","Fabric is MARGINALLY airworthy \u2014 just 2 lbs above minimum \u2014 monitor closely, plan for re-covering soon, and increase inspection frequency","Fabric is as good as new","Fabric is well above minimum"],"c":1,"x":"Only 2 lbs above rejection. Fabric continues to deteriorate. UV exposure, moisture, and age all reduce strength. May pass today but fail at next inspection. Responsible maintenance: plan for re-covering rather than waiting for failure."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Dope-proofing tape (anti-chafe tape) is applied:","o":["Over the topcoat","Under the fabric where it contacts sharp or rough structural members \u2014 prevents the structure from wearing through the fabric","Over the ribs only","Nowhere \u2014 it's not used"],"c":1,"x":"Sharp edges, bolt heads, and rough surfaces under the fabric will abrade through the covering during flight vibration. Anti-chafe tape or padding protects the fabric at these contact points."},{"e":"AF","t":"Fabric Covering","d":3,"q":"The Superflite system differs from Poly-Fiber in:","o":["Nothing \u2014 same system","Different proprietary coatings and application sequence \u2014 systems are NOT interchangeable","Only the name","Only the price"],"c":1,"x":"Each STC'd system (Poly-Fiber, Superflite, Ceconite/Randolph) has unique chemical formulations. Mixing systems = coating failures, peeling, and non-airworthy covering. Choose one system and follow it completely."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Drain grommets on fabric covering must be:","o":["Sealed closed to prevent leaks","Open and unobstructed \u2014 blocked drains trap water inside causing corrosion of internal structure and rot","Painted over","Only at the leading edge"],"c":1,"x":"Check drain grommets at every inspection. Paint, debris, or sealant can block them. Blocked drain = trapped water = hidden internal corrosion = structural failure. A 5-second check that prevents major problems."},{"e":"AF","t":"Fabric Covering","d":3,"q":"When inspecting doped fabric, checking for:","o":["Only color fading","Brittleness (flex a hem or pinch the fabric \u2014 if dope cracks, it's deteriorating), adhesion (tape test), UV damage, and overall condition","Only cleanliness","Only tears"],"c":1,"x":"Comprehensive check: flexibility (brittle dope = failing protection), adhesion (tape pull test shows if dope is separating), color (fading = UV penetration), and fabric strength (punch test). All must be assessed together."},{"e":"AF","t":"Fabric Covering","d":4,"q":"An aircraft that's been stored outside uncovered for years will likely need:","o":["Only a wash","Complete re-covering \u2014 UV, moisture, temperature cycling, and biological attack (mildew, insect damage) all degrade fabric severely in outdoor storage","Only dope rejuvenation","Only a paint touch-up"],"c":1,"x":"Outdoor storage is devastating to fabric: UV breaks down fibers, moisture enters through coating cracks, mildew grows in humid conditions, insects nest. Internal structure may also have corrosion from trapped moisture. Thorough inspection before any recovery."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Covering over inspection openings:","o":["Is permanent","Uses framed inspection openings or zip-access panels that allow internal structure inspection without destroying the covering","Eliminates the need for inspection","Is not required if structure is aluminum"],"c":1,"x":"Inspection openings are required at specific locations per the type certificate. Access panels allow visual and hands-in inspection of internal wood/metal structure, cables, and fittings. Their location and size are mandated."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Nitrate dope on vintage aircraft:","o":["Is the modern standard","Was the original covering finish \u2014 more flammable than butyrate and requires proper fire precautions during application","Is banned worldwide","Is identical to butyrate"],"c":1,"x":"Nitrate: original aircraft dope. Advantages: good adhesion. Disadvantages: more flammable, less flexible with age, less UV resistant. Butyrate replaced it for most applications. Never apply nitrate OVER butyrate (attacks it)."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Before fabric punch testing, the AME should:","o":["Punch through paint and dope","Ensure the tester is calibrated, and test in the most exposed/weakest area (upper surfaces, sun-exposed panels)","Test only hidden areas","Test only the strongest areas"],"c":1,"x":"Test the WORST areas: upper wing surfaces (most UV), areas near exhaust (heat), and any visually suspicious areas. Testing only good areas gives a false sense of security. Document test locations and results."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Preheating steel before welding:","o":["Is never necessary","Reduces thermal shock, slows cooling rate, and prevents hydrogen cracking in thicker or high-carbon steels","Weakens the metal","Is only for aluminum"],"c":1,"x":"Thick or high-carbon steel: rapid cooling = hard, brittle HAZ = cracking risk. Preheat slows the cooling rate, allowing a more ductile microstructure. Temperature depends on material and thickness per welding code."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Weld overlap (cold lap) occurs when:","o":["The weld is perfect","Filler metal flows onto the base metal but doesn't fuse with it \u2014 appears as a raised edge that is NOT bonded to the base","The weld is too hot","The weld is too deep"],"c":1,"x":"Overlap: insufficient heat at the toe of the weld. The filler sits ON the base metal instead of FUSING with it. Stress riser and potential crack initiation point. Caused by wrong torch angle, too much filler, or too little heat."},{"e":"AF","t":"Welding & Tubular","d":4,"q":"Inspecting a welded exhaust system for cracks is critical because:","o":["Exhaust leaks are just noisy","Carbon monoxide from leaks can enter the cabin through the firewall/heat exchanger \u2014 potentially incapacitating or killing the crew and passengers","Leaks only reduce power","Leaks only affect appearance"],"c":1,"x":"CO is odorless, colorless, and lethal. Exhaust system cracks near the cabin heater shroud allow CO directly into the cabin air supply. Fatal accidents have resulted from undetected exhaust leaks. Inspect every maintenance event."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"MIG (GMAW) welding in aircraft:","o":["Is the primary method","Has limited aircraft use \u2014 TIG and oxy-acetylene produce higher quality welds; MIG may be used for non-structural applications where approved","Is always preferred","Is never used"],"c":1,"x":"MIG: fast, easy to learn, but spatter and porosity concerns. TIG: slower but superior quality and control for aircraft work. Oxy-acetylene: traditional for steel tube. Any welding on aircraft must use the method specified in approved data."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"A gusset or reinforcing plate welded to a tubular joint:","o":["Weakens the joint","Distributes loads over a larger area and reinforces stress-concentration points at the joint","Is purely cosmetic","Adds unnecessary weight"],"c":1,"x":"Gussets at cluster joints and high-stress areas spread the load. Shape, size, and attachment per approved repair data. Often required when adding equipment or strengthening weakened areas."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"A properly prepared weld joint must be:","o":["Painted","Clean, properly fit-up (correct gap), beveled if required, and free of oil, rust, paint, and contaminants","Wet with flux","Coated with primer"],"c":1,"x":"Contamination in the weld = porosity, inclusions, and weak bonds. Proper fit-up = correct gap for full penetration. Bevel edges on thick material. Clean with approved solvent. The quality of the prep determines the quality of the weld."},{"e":"AF","t":"Welding & Tubular","d":4,"q":"When replacing a section of 4130 steel tubing in a fuselage:","o":["Cut anywhere convenient","Use a scarfed or fish-mouth joint with proper overlap, same material and wall thickness, and approved splice dimensions per the SRM","Weld end-to-end with no overlap","Use any steel available"],"c":1,"x":"Spliced repair: new tube must be same alloy, same or greater wall thickness. Joint design (fish-mouth, inner sleeve, outer sleeve) per approved data. Minimum overlap = 2\u00d7 outer diameter. Weld all around. NDT inspect."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"After welding, all flux residue must be:","o":["Left in place to protect the weld","Completely removed \u2014 flux residue is corrosive and will attack the base metal and weld over time","Painted over","Ignored"],"c":1,"x":"Flux residue is acidic/caustic. Left in place = corrosion under the flux layer, invisible until damage is severe. Remove with wire brush, hot water, or approved cleaning solution immediately after welding."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Gas welding regulators reduce:","o":["Gas temperature","Cylinder pressure (2,000-3,000 PSI) to working pressure (5-15 PSI for acetylene, 10-40 PSI for oxygen)","Flame temperature","Gas flow only"],"c":1,"x":"Two-stage regulators: high-pressure gauge (cylinder) and low-pressure gauge (working). Acetylene: NEVER exceed 15 PSI working pressure (becomes unstable above that). Oxygen: higher working pressures acceptable."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Silver soldering (silver brazing) in aircraft is used for:","o":["Structural fuselage joints","Non-structural or lightly loaded joints where lower temperature bonding is needed \u2014 instrument lines, electrical fittings","Only plumbing","It's prohibited in aviation"],"c":1,"x":"Silver brazing: lower temperature than welding, less distortion. Used for: instrument tube connections, electrical bus bar connections, and small non-structural assemblies. Requires proper flux and temperature control."},{"e":"AF","t":"Welding & Tubular","d":4,"q":"A weld repair to a chrome-moly tube that has been previously heat treated (normalized):","o":["The previous heat treatment is irrelevant","Must account for the fact that welding alters the heat treatment in the HAZ \u2014 post-weld normalization may be required to restore properties","Can use any welding method","Is simple and routine"],"c":1,"x":"Welding changes the metallurgy of the HAZ. If the original tube was normalized, the weld area is now different (potentially harder, more brittle). Post-weld normalization restores uniform properties. The SRM or engineering disposition specifies requirements."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Tack welding is used to:","o":["Complete the joint","Temporarily hold parts in alignment before the final continuous weld \u2014 tack welds are small points that prevent distortion during welding","Test weld quality","Mark the weld location"],"c":1,"x":"Small tacks at intervals hold the joint in position. Final welding melts through the tacks. Without tacking, thermal distortion can pull parts out of alignment as the weld progresses."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"Weld symbols on drawings use a horizontal reference line with:","o":["Only written notes","Specific symbols indicating joint type, weld type, size, and finish \u2014 arrow side (below line) vs other side (above line)","Random markings","Color codes only"],"c":1,"x":"AWS A2.4 welding symbols: arrow points to the joint. Symbol below reference line = weld on arrow side. Above = other side. Additional marks: backing, field weld, groove angle, root opening. Learn to read these symbols."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"An acetylene cylinder must always be stored and used:","o":["Horizontally","Upright \u2014 acetylene is dissolved in acetone; laying the cylinder down can allow acetone to enter the regulator","Upside down","At any angle"],"c":1,"x":"Acetylene dissolved in acetone in a porous filler. Horizontal/inverted = acetone reaches the valve = damages regulator, contaminates the flame, and creates fire risk. If a cylinder has been horizontal, stand it upright for 30 minutes before use."},{"e":"AF","t":"Welding & Tubular","d":4,"q":"A flashback arrestor on welding equipment:","o":["Is optional","Prevents a flame from traveling back through the hose into the gas cylinder \u2014 critical safety device that prevents a potentially catastrophic explosion","Only protects the regulator","Is only on the acetylene side"],"c":1,"x":"Flashback: flame travels backward through the torch, into the hose, potentially into the cylinder. Arrestors on BOTH oxygen and acetylene sides contain a sintered filter and check valve. Non-negotiable safety equipment."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Orange peel texture in a paint finish is caused by:","o":["Normal application","Improper spray technique \u2014 paint atomization too coarse, wrong spray distance, incorrect air pressure, or wrong thinner ratio","Only in primer","Only on composites"],"c":1,"x":"Paint droplets hitting the surface too dry or too large. Fix: adjust gun settings, spray distance (6-8 inches typically), air pressure per data sheet, correct thinner ratio. Can be sanded and recoated if caught."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Runs and sags in a paint finish are caused by:","o":["Correct technique","Applying too much paint in one pass \u2014 excess paint flows downward under gravity before it can cure","Too little paint","Wrong color"],"c":1,"x":"Runs: too heavy a coat, too slow a pass, or too close to the surface. Prevention: multiple light coats rather than one heavy coat. Repair: let cure, sand smooth, recoat. On vertical surfaces, work top-to-bottom."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Adhesion of paint to a surface can be tested by:","o":["Visual only","Cross-hatch tape test \u2014 cut an X-pattern through the paint, apply and remove tape, and evaluate how much paint lifts off","Rubbing with a finger","Spraying with water"],"c":1,"x":"Cross-hatch test: ASTM D3359. Cut grid pattern through paint to substrate. Apply pressure-sensitive tape. Pull off sharply. Rate the amount of paint removed on a 0-5 scale. 4B-5B = excellent adhesion."},{"e":"AF","t":"Painting & Finishing","d":4,"q":"When stripping and repainting a transport aircraft, the window over masking must:","o":["Just cover the window","Be removed immediately after painting to prevent the sealant between masking and paint from interfering with window seal integrity","Stay on permanently","Be applied wet"],"c":1,"x":"Paint buildup at masking edges can affect window seal fit. Some aircraft have specific masking procedures to maintain seal areas clear. Windows, seals, and their mating surfaces must remain within tolerance."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Primer thickness is controlled because:","o":["Thicker is always better","Too thick = cracking, poor adhesion, and weight; too thin = insufficient corrosion protection","It doesn't matter","Only for appearance"],"c":1,"x":"Each primer has a specified thickness range (typically 0.5-1.0 mil/coat). Thickness measured with a wet film gauge during application and a dry film gauge after curing. Critical for performance."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Anti-chafe compound applied to areas where structure contacts is:","o":["Paint","A protective lubricating compound that prevents metal-to-metal fretting \u2014 not a paint system but an important surface treatment","Primer only","Clearcoat"],"c":1,"x":"Anti-chafe (like PRC-DeSoto or approved equivalents): applied between faying surfaces, under clamps, and at any metal-to-metal contact. Prevents fretting corrosion and wear. Reapply during maintenance when surfaces are exposed."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"The catalyst ratio in two-part polyurethane paint is:","o":["Approximate is fine","Exact per manufacturer data sheet \u2014 wrong ratio causes improper cure, reduced durability, or poor adhesion","Always 1:1","Just add until it looks right"],"c":1,"x":"Catalyst too much: brittle, orange peel, short pot life. Too little: soft, doesn't cure fully, poor chemical resistance. Weigh or measure precisely. Mixing cup markings must be accurate. Pot life starts at mixing \u2014 plan your work."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Low-VOC (volatile organic compound) paint systems are being adopted because:","o":["They're cheaper","Environmental regulations limit solvent emissions \u2014 low-VOC paints use less solvent, reducing air pollution","They dry faster","They're stronger"],"c":1,"x":"Environmental compliance: VOC emissions from aircraft painting contribute to air quality issues. Water-based primers and high-solids topcoats reduce VOC while maintaining performance. Regulatory pressure drives adoption."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Masking pitot tubes and static ports during painting is critical because:","o":["Paint improves their function","Any paint, overspray, or contamination inside these openings causes erroneous flight instrument readings \u2014 potentially fatal","It's only a cleanliness issue","Only for appearance"],"c":1,"x":"Paint in a pitot tube = blocked total pressure = wrong airspeed. Paint on static ports = blocked static pressure = wrong altitude and VSI. Multiple accidents from inadequate masking during painting."},{"e":"AF","t":"Painting & Finishing","d":4,"q":"Paint system compatibility testing before repainting involves:","o":["Nothing \u2014 just paint over the old","Testing a small area to verify the new paint system adheres to and is compatible with the existing paint \u2014 incompatible systems cause wrinkling, lifting, and delamination","Only color matching","Only reading the data sheet"],"c":1,"x":"New paint over old: the solvents in the new system may attack the old paint. Test panel: apply new paint to a small area, wait for cure, test adhesion. Lacquer thinner over enamel = disaster. Always verify compatibility."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Flight control surface painting must maintain:","o":["Any thickness","Minimum weight and uniform distribution \u2014 heavy or uneven paint affects mass balance and can cause flutter","Maximum thickness for protection","Heavy coats on leading edges"],"c":1,"x":"Paint weight on control surfaces adds to the mass aft of the hinge line. Must re-balance after painting. Specify minimum paint thickness. Some manufacturers limit the number of repaint cycles before stripping to bare."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Sanding sealer on a doped fabric surface:","o":["Replaces primer","Fills the fabric weave to create a smooth surface before topcoat \u2014 sanded between coats for progressively smoother finish","Is not used on fabric","Only for metal"],"c":1,"x":"On fabric: multiple coats of pigmented dope or Poly-Spray act as filler/sealer. Each coat is sanded (400+ grit) to level the surface. Building up gradually creates the smooth base needed for a quality topcoat."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"Walkway and non-skid areas on the aircraft:","o":["Are optional","Use specific non-skid coatings that must be maintained \u2014 worn non-skid is a safety hazard for maintenance personnel and crew","Are the same paint as everywhere else","Only for military aircraft"],"c":1,"x":"Designated walkways (wing root, fuselage top for emergency exit access, horizontal stabilizer for deicer boot access) require non-skid coating. Gritty texture provides grip. Worn areas = slip hazard. Repaint during recoating."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"UV-resistant properties of topcoat:","o":["Aren't important","Protect the underlying primer and metal from UV degradation \u2014 UV breaks down primer, allowing corrosion to begin","Only affect color","Only matter in deserts"],"c":1,"x":"UV degrades everything it reaches: paint, primer, sealants, composites. The topcoat's UV blockers are the first line of defense. Faded, chalky paint = failing UV protection = primer degradation = corrosion starting underneath."},{"e":"AF","t":"Painting & Finishing","d":4,"q":"Documentation after a full strip and repaint must include:","o":["Only the color","Paint system used (primer, topcoat, catalysts), application parameters, weight change calculation for W&B update, and any corrosion found during stripping","Only the date","Only the painter's name"],"c":1,"x":"Complete record: what was found underneath (corrosion, damage), all treatments applied, paint system with batch numbers, dry film thickness measurements, weight change for W&B, and any structural repairs performed during the process."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"Detonation is MOST likely under which conditions?","o":["Low power, rich mixture","High MAP, lean mixture, high CHT, and low RPM","High RPM, rich mixture","Cold engine at idle"],"c":1,"x":"High MAP+lean+hot+low RPM = worst case for detonation. Each factor independently increases risk; combined they're extremely dangerous."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Differential compression reading of 40/80 means:","o":["Normal cylinder","50% leakage \u2014 listen at exhaust (exhaust valve leak), intake (intake valve), oil filler (rings), or adjacent cylinder (gasket) to find the cause","Perfect sealing","Minor leakage"],"c":1,"x":"Below 60/80 minimum. The listening test pinpoints the leak source. Exhaust pipe hissing = exhaust valve. Intake = intake valve. Breather = rings. Adjacent cylinder = head gasket."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"A hydraulic lock in a radial engine is caused by:","o":["High oil pressure","Oil pooling in lower cylinders during shutdown \u2014 liquid doesn't compress, so cranking bends the connecting rod","Hydraulic pump failure","Excessive fuel"],"c":1,"x":"ALWAYS pull the prop through by hand before starting a radial. Clear any accumulated oil. Attempting electric start with hydraulic lock = catastrophic damage."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"TBO for recip engines is mandatory for:","o":["All operations","Commercial operations only (per CAR 625 App A) \u2014 recommended but not mandatory for private unless the maintenance schedule adopts it","Private operations only","No operations"],"c":1,"x":"KEY TC EXAM DISTINCTION: Commercial = mandatory TBO. Private = manufacturer's recommendation. Many private maintenance schedules adopt TBO voluntarily. Know which applies to your operation."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"A magneto P-lead check: engine should STOP when both switches go OFF. If it keeps running:","o":["Normal operation","At least one P-lead is broken \u2014 HOT MAGNETO \u2014 engine can fire if prop is moved even slightly. Ground the aircraft","Only a minor issue","Check at next annual"],"c":1,"x":"Both OFF = both mags grounded = no spark = engine stops. If it runs = a P-lead is disconnected. The magneto is LIVE. Prop movement = engine fires. DANGEROUS. Repair before any further operation."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Cylinder barrel choke means:","o":["A restriction in the intake","Barrel is narrower at the top (hot end) when cold \u2014 thermal expansion at operating temp makes it cylindrical","Barrel is wider at the top","A damaged cylinder"],"c":1,"x":"The top runs 300-400\u00b0F hotter than the bottom. Choke compensates so the barrel is truly round at operating temperature. Without choke, the hot top would expand larger = poor ring seal."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Valve overlap serves to:","o":["Waste fuel","Improve scavenging by allowing exhaust gas momentum to help draw fresh charge into the cylinder","Reduce power","Increase drag"],"c":1,"x":"Both valves open briefly at TDC exhaust/intake. Outgoing exhaust creates a low-pressure wake that pulls fresh charge in. Improves volumetric efficiency especially at higher RPMs."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"Engine running rough on LEFT mag, smooth on RIGHT, smooth on BOTH. The bad component is:","o":["Right magneto","A spark plug on the LEFT magneto side \u2014 it misfires on LEFT-only but the right plug compensates when on BOTH","Carburetor","Fuel injector"],"c":1,"x":"BOTH = both plugs fire (good right plug carries combustion). LEFT only = bad left plug misfires alone. RIGHT only = good plug fires normally. Classic troubleshooting logic tested on every PP exam."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Static RPM check verifies:","o":["Idle speed","Full-throttle RPM on the ground \u2014 confirming propeller pitch setting and engine health match specifications","Oil temperature","Fuel flow"],"c":1,"x":"Low static RPM = wrong prop pitch, engine problem, or induction restriction. High = prop pitch too fine. Critical after prop installation, governor adjustment, or engine work."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Engine preservation during storage requires:","o":["Nothing special","Preservation oil, dehydrator plugs, sealed openings \u2014 moisture is the primary enemy of stored engines","Only draining oil","Only covering the exhaust"],"c":1,"x":"Moisture causes rust on cam lobes, cylinder walls, and bearings within days. Full preservation per manufacturer's storage procedure. Periodic rotation of the crankshaft. Dehydrator plugs changed when saturated."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Nitrided cylinder barrels should NOT be:","o":["Inspected","Chrome plated or ground beyond the nitride layer \u2014 the thin hard surface case would be destroyed","Honed lightly","Cleaned"],"c":1,"x":"Nitride case is ~0.010\" deep. Grinding or chrome plating removes/covers it. Only light honing within limits is acceptable. Beyond limits = replace the barrel."},{"e":"PP","t":"Reciprocating Engines","d":3,"q":"Engine break-in after overhaul uses:","o":["Synthetic oil","Mineral oil (no additives) at higher-than-cruise power \u2014 to seat rings before switching to the operator's preferred oil","Any available oil at idle","Synthetic at minimum power"],"c":1,"x":"Additive-rich oils prevent ring seating. Mineral oil allows controlled wear-in. High power settings ensure adequate cylinder pressure for ring-to-wall contact. Monitor oil consumption trend during break-in."},{"e":"PP","t":"Reciprocating Engines","d":4,"q":"Volumetric efficiency exceeding 100% is only possible with:","o":["High-octane fuel alone","Forced induction (supercharger or turbocharger) \u2014 compressing more air into the cylinder than atmospheric pressure allows","Fuel injection","Dual ignition"],"c":1,"x":"Normally aspirated: max ~85-90% VE. Forced induction pressurizes the intake \u2192 more air mass per cycle \u2192 VE can exceed 100% of displacement equivalent. The turbo uses 'free' exhaust energy to do this."},{"e":"PP","t":"Recip Fuel & Control","d":4,"q":"During magneto check: NO RPM drop on one mag means:","o":["That magneto works perfectly","P-lead fault \u2014 the 'off' magneto is still firing because its ground circuit is open = HOT MAGNETO","Both mags are synchronized","Mixture is perfect"],"c":1,"x":"CRITICAL TRAP: A slight drop is NORMAL. NO drop = the mag being tested 'off' isn't actually off. The P-lead isn't grounding it. Aircraft must be grounded for repair. This kills people."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"A float carburetor at altitude tends to run:","o":["Leaner","Richer \u2014 less dense air through venturi but same fuel level = too much fuel per unit of air","At perfect mixture","Only rich above FL200"],"c":1,"x":"Air density drops with altitude. Fuel metering stays constant (float maintains level). Less air + same fuel = rich. Lean the mixture as you climb. AMC does this automatically on some carburetors."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Correct idle mixture during cutoff: expect:","o":["Immediate stoppage","A slight 25-50 RPM RISE just before the engine dies","A 200+ RPM rise","No RPM change at all"],"c":1,"x":"Slight rise = leaning momentarily improves combustion before fuel starvation. No rise = already too lean. Large rise = too rich (significant improvement when leaned). Tested on EVERY PP exam."},{"e":"PP","t":"Recip Fuel & Control","d":4,"q":"Turbocharger boost lost \u2014 engine runs but MAP won't exceed ambient. Cause:","o":["Fuel contamination","Wastegate stuck OPEN \u2014 all exhaust bypasses the turbine","Wastegate stuck closed","Blocked fuel filter"],"c":1,"x":"Stuck OPEN = no exhaust energy to the turbo = compressor doesn't spin = no boost. Engine becomes naturally aspirated. Stuck CLOSED = opposite problem (overboost). Know the distinction."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Carburetor ice can form at OAT as high as:","o":["-10\u00b0C only","25\u00b0C (77\u00b0F) with high humidity","Only below freezing","Only in clouds"],"c":1,"x":"Venturi cooling (~15\u00b0C drop) + fuel vaporization (~15-20\u00b0C drop) = ice forms well above freezing OAT. 70\u00b0F and humid = prime carb ice conditions. Most pilots and AMEs underestimate this."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"EGT gauge for mixture: peak EGT represents:","o":["Maximum power setting","Stoichiometric (chemically perfect) mixture \u2014 lean of peak = economy; rich of peak = power","Minimum fuel flow","Engine overheating"],"c":1,"x":"Rich of peak: more power, cooler CHT, higher fuel consumption. Lean of peak: less power, even cooler CHT, minimum fuel consumption. Both sides are valid operating regimes depending on the phase of flight."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Pressure carburetor advantage over float type:","o":["Simpler design","Not affected by G-forces or aircraft attitude \u2014 fuel delivered under positive pressure regardless of orientation","Cheaper to maintain","Better cold starting"],"c":1,"x":"No float bowl = no attitude sensitivity. Fuel under pressure at all times. Used on aerobatic aircraft and large radials. More complex but far more reliable under varying flight conditions."},{"e":"PP","t":"Recip Fuel & Control","d":4,"q":"An engine running excessively lean shows:","o":["Black exhaust smoke","High CHT, rough running, possible intake manifold backfire, and eventually stops","Low CHT","Fouled plugs"],"c":1,"x":"Lean burn = hot, slow burn. Unburned mixture in the intake can ignite (backfire). Extreme lean = not enough fuel to sustain combustion = misfire then stoppage. The symptoms are OPPOSITE of rich."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Vapor lock is most likely at:","o":["Sea level, cold, full tanks","High altitude, hot day, low fuel \u2014 reduced atmospheric pressure and high temperature vaporize fuel in the lines","Cold day at sea level","Any condition equally"],"c":1,"x":"Hot+high+low fuel = vapor lock recipe. Boost pump ON prevents it by maintaining positive pressure above fuel's vapor pressure."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"The accelerator pump prevents:","o":["Detonation","Lean stumble during rapid throttle opening \u2014 squirts extra fuel to bridge the gap until the metering system catches up","Rich running","Engine overspeeding"],"c":1,"x":"Airflow responds to throttle instantly. Fuel metering lags slightly. Without the accelerator pump shot, the mixture goes lean for a moment = stumble or stall. Spring or diaphragm operated."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Fuel injection vs carburetor: which is MORE susceptible to hot-start problems?","o":["Carburetor","Fuel injection \u2014 fuel vaporizes in hot fuel lines after shutdown, flooding or starving the engine","They're equal","Neither has hot-start issues"],"c":1,"x":"Fuel-injected engines: fuel sits in lines near hot engine components. After shutdown, heat soaks and vaporizes the fuel. Restart requires specific hot-start procedure. Carburetors draw fresh fuel from the float bowl."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Mixture control in a fuel-injected engine:","o":["Varies air flow","Controls fuel flow to the injector nozzles \u2014 from full rich to idle cutoff","Adjusts ignition timing","Controls exhaust valves"],"c":1,"x":"Mixture lever/knob controls fuel flow rate through the servo/controller. Idle cutoff = zero fuel = engine stops. Full rich = maximum fuel for the airflow. The pilot leans for altitude/economy."},{"e":"PP","t":"Recip Fuel & Control","d":4,"q":"A turbocharged engine with carb heat applied: the risk is:","o":["No risk","Excessively hot intake air \u2014 carb heat + turbo compression = temperature could exceed limits causing detonation","Only slight enrichment","Better performance"],"c":1,"x":"Turbo compresses intake air (raises temperature). Adding carb heat raises intake temperature further. Combined = dangerously hot charge. Some turbocharged installations use alternate air instead."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"An engine-driven fuel pump fails in flight. What keeps the engine running?","o":["Nothing \u2014 engine stops immediately","The electric boost pump provides backup fuel pressure if it's ON","Gravity alone at any altitude","The carburetor float"],"c":1,"x":"Boost pump = backup. Standard practice: boost pump ON during takeoff, landing, and any time engine-driven pump failure is suspected. Without either pump, only gravity-feed aircraft can continue (and only in certain attitudes)."},{"e":"PP","t":"Recip Fuel & Control","d":3,"q":"Alternate air source on a fuel-injected engine provides:","o":["Carb heat","Unfiltered air if the primary air filter becomes blocked \u2014 preventing engine air starvation","Pressurized air","Cooled air"],"c":1,"x":"Fuel-injected engines don't have carburetors so they don't need carb heat. But a blocked air filter = no air = engine stops. Alternate air door (usually spring-loaded, opens automatically if filter blocks) provides backup air path."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"N1 indicates what on a turbofan?","o":["Oil pressure","Fan/low-pressure compressor spool speed \u2014 primary thrust indicator on many modern turbofans","Turbine temperature","Fuel flow"],"c":1,"x":"N1 = fan speed (low-pressure spool). N2 = high-pressure compressor speed. On most modern turbofans, N1 is the primary thrust-setting parameter. On some older engines, EPR (pressure ratio) is used instead."},{"e":"PP","t":"Recording & Indicating","d":4,"q":"ITT (Interstage Turbine Temperature) is measured between:","o":["The fan and compressor","The high-pressure turbine and low-pressure turbine stages \u2014 the hottest accessible measurement point in the gas path","The compressor and combustor","Ambient and the inlet"],"c":1,"x":"Directly after combustion is too hot for probes. ITT between HP and LP turbine stages gives the closest practical measurement to TET. Exceeding ITT limits = turbine blade life reduction or immediate damage."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Engine vibration monitoring detects problems by:","o":["Sound alone","Measuring vibration amplitude and frequency \u2014 each rotating component has a unique frequency signature","Visual observation","Oil analysis only"],"c":1,"x":"Fan imbalance = 1\u00d7N1 frequency. HP compressor = 1\u00d7N2. Bearings have specific defect frequencies. Spectrum analysis identifies which component is failing. Trending catches deterioration before failure."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"A torque meter on a turboprop is the PRIMARY power indicator because:","o":["It measures temperature","It measures the actual mechanical power being delivered to the propeller \u2014 RPM is held constant by the governor","It measures fuel flow","It measures exhaust pressure"],"c":1,"x":"Unlike a turbojet (where thrust comes from exhaust velocity), a turboprop's useful power goes through the shaft. More torque at constant RPM = more power = more thrust via the propeller."},{"e":"PP","t":"Recording & Indicating","d":4,"q":"BITE (Built-In Test Equipment) stores fault codes. A 'current' fault vs a 'historical' fault:","o":["They're the same","Current = the fault exists RIGHT NOW; Historical = the fault occurred previously but may have cleared \u2014 both are important for troubleshooting","Historical is more serious","Current faults auto-clear"],"c":1,"x":"Current faults: active problem, fix now. Historical faults: intermittent problems that come and go. Historical faults may indicate developing failures. Download and analyze both during maintenance. Don't just clear the memory."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"An EGT exceedance (overtemp) during start:","o":["Is normal","Must be recorded and may require inspection per the engine manual \u2014 start overtemps reduce hot-section component life","Only matters if prolonged","Doesn't affect the engine"],"c":1,"x":"Hot start: EGT exceeds limits during start (usually from excess fuel or slow acceleration). Even brief overtemps damage turbine blades. Manual specifies: inspect, reduce life, or remove engine depending on severity and duration."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Oil pressure for a turbine engine at idle is typically:","o":["Zero","Lower than at cruise \u2014 oil pump output is proportional to engine RPM; at idle, RPM is low, so oil pressure is lower","Higher than at cruise","Same as at cruise"],"c":1,"x":"Engine-driven oil pump: output proportional to RPM. Idle = low RPM = low pressure (but still within minimum limits). Full power = high RPM = high pressure. Know the normal range for each power setting."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"A fuel flow meter reads in POUNDS per hour (not gallons) because:","o":["It's a Canadian standard","Engine thrust depends on fuel MASS flow (energy content per pound is constant), not volume (which varies with temperature and density)","It's easier to read","It matches the fuel truck"],"c":1,"x":"Cold fuel is denser = more pounds per gallon. Warm fuel = fewer pounds per gallon. Measuring mass flow gives consistent thrust indication regardless of fuel temperature."},{"e":"PP","t":"Recording & Indicating","d":4,"q":"Engine trend monitoring shows N1 increasing by 0.5% over 3 months while all other parameters are stable. This suggests:","o":["Normal variation","Compressor deterioration \u2014 the engine needs slightly more fan speed to produce the same thrust because the compressor is less efficient","Improved engine health","Instrumentation error"],"c":1,"x":"Trending gold: slowly increasing N1 for the same thrust = compressor losing efficiency (erosion, FOD damage, tip clearance increase). The engine works harder to produce the same output. May lead to EGT margin erosion."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Fuel quantity indicating on large aircraft uses:","o":["Only float gauges","Capacitance probes \u2014 measuring the change in capacitance as fuel level changes between two concentric tubes","Only digital gauges","Only visual sight gauges"],"c":1,"x":"Capacitance: fuel (dielectric ~2.1) vs air (1.0). More fuel between the probe tubes = higher capacitance = higher quantity indicated. Temperature compensation accounts for density changes. More accurate than float systems."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"An ammeter showing continuous high discharge after engine start indicates:","o":["Normal battery charging","Generator or alternator failure \u2014 the battery is supplying all electrical loads and will eventually run flat","High electrical demand only","New battery break-in"],"c":1,"x":"After start: ammeter should show positive (charging). Continuous negative = generator not online. Battery duration: 30-60 minutes depending on load. Troubleshoot immediately. Reduce electrical load. May need to divert."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"A tachometer on a recip engine reads in:","o":["Percent N1","RPM (revolutions per minute) \u2014 crankshaft speed","Torque","Manifold pressure"],"c":1,"x":"Recip tach: actual RPM. Turbine tach: %RPM (because actual RPM is too high to display usefully). On a recip: RPM + MAP = power setting. The combination of both determines the power being produced."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"A synchroscope needle rotating clockwise means:","o":["Engines are in sync","The right engine is faster than the left \u2014 adjust the slow engine's RPM to match","The left engine is faster","Both engines are too fast"],"c":1,"x":"Needle rotates toward the faster engine. Clockwise = right is fast. Adjust the LEFT engine to speed up (or right to slow down) until the needle stops. When stopped = synchronized. Then fine-tune with the synchrophaser if equipped."},{"e":"PP","t":"Recording & Indicating","d":4,"q":"EPR (Engine Pressure Ratio) as a thrust indicator: what does a higher ratio mean?","o":["Less thrust","More thrust \u2014 the engine is adding more energy to the airflow, as shown by the higher ratio of exhaust to inlet pressure","Same thrust at different altitudes","Only higher fuel flow"],"c":1,"x":"EPR = Pt7/Pt2 (exhaust total pressure / inlet total pressure). Higher ratio = more energy added = more thrust. Set takeoff thrust by advancing throttle to the computed EPR value for conditions. Some engines use N1 instead of EPR."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"After an engine parameter exceedance, the FDAU/FADEC records:","o":["Nothing","The parameter, peak value, duration, and timestamp \u2014 this data determines what maintenance action is required","Only a warning light","Only in the pilot's logbook"],"c":1,"x":"Digital recording: exact severity and duration. Maintenance manual has tables: e.g., ITT exceeded by 10\u00b0C for 5 seconds = inspect hot section. Exceeded by 50\u00b0C for 2 seconds = engine removal. The data drives the maintenance response."},{"e":"PP","t":"Turbine Engines","d":4,"q":"A compressor stall is caused by:","o":["Too much fuel","Disrupted airflow over the compressor blades (high AOA) \u2014 from rapid throttle advance, damaged blades, inlet distortion, or bleed valve malfunction","Low oil pressure","Bearing failure"],"c":1,"x":"Compressor blades are airfoils. They stall at excessive AOA just like a wing. Causes: too much fuel too fast, inlet icing/distortion, FOD, bleed valve failure. Symptoms: loud bang, EGT surge, possible flameout."},{"e":"PP","t":"Turbine Engines","d":3,"q":"The difference between a turboprop and a turboshaft:","o":["They're identical","Turboprop drives a propeller for thrust; turboshaft drives a shaft for mechanical power (helicopter rotor, generator)","Turboshaft uses propellers","Turboprop is for helicopters"],"c":1,"x":"Turboprop: shaft output drives a prop through a gearbox. Turboshaft: shaft output drives a helicopter rotor or other equipment. Same gas generator principle, different output application. The PT6 can be either depending on installation."},{"e":"PP","t":"Turbine Engines","d":3,"q":"A free turbine (power turbine) is:","o":["Connected to the gas generator","Mechanically INDEPENDENT of the gas generator spool \u2014 it extracts energy from the gas flow without mechanical connection to the compressor","Connected to the compressor","Part of the fan"],"c":1,"x":"Free turbine: not mechanically linked to the gas generator. It spins at whatever speed the load requires. The gas generator provides the gas flow. Common on turboprops (PT6) and turboshafts (your AW139 engines)."},{"e":"PP","t":"Turbine Engines","d":4,"q":"A hung start on a turbine engine means:","o":["The engine started successfully","The engine lights off but stabilizes at a speed BELOW idle \u2014 it won't accelerate to idle RPM on its own","EGT exceeds limits","The starter won't engage"],"c":1,"x":"Hung start: insufficient energy to reach idle. Causes: low battery (weak crank), contaminated fuel, incorrect fuel scheduling, bleed air extraction during start. Action: motor to clear fuel, check battery voltage, retry."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Compressor blade creep is:","o":["Blade erosion","Slow, permanent elongation of turbine blades from prolonged exposure to high temperature and centrifugal force \u2014 grows over the blade's service life","A type of corrosion","Blade vibration"],"c":1,"x":"Creep: metal stretches slowly under stress at high temperature. Turbine blades get slightly longer over thousands of hours. Eventually they contact the casing. Life limits prevent operation beyond safe creep amounts."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Turbine engine compressor washing removes:","o":["Metal debris","Salt, dirt, and deposits from compressor blades \u2014 restoring aerodynamic efficiency and recovering lost performance","Oil from bearings","Carbon from combustion"],"c":1,"x":"Contaminated compressor blades = rougher surface = boundary layer disruption = efficiency loss = higher EGT for same thrust. Wash restores performance. Fresh water + approved detergent, motor engine for wash, dry with motoring."},{"e":"PP","t":"Turbine Engines","d":4,"q":"Blade tip clearance in a turbine engine affects:","o":["Only noise","Efficiency significantly \u2014 larger clearance = gas leaks past the tips without doing useful work on the blades = reduced performance","Only vibration","Only weight"],"c":1,"x":"Tight tip clearance = more efficient (all gas works on the blades). But too tight = blade rub. Active clearance control on modern engines: adjusts casing diameter with cooling air to optimize clearance at different power settings."},{"e":"PP","t":"Turbine Engines","d":3,"q":"The difference between an axial flow and centrifugal flow compressor:","o":["They're identical","Axial: air flows parallel to the shaft (multiple stages, higher efficiency); Centrifugal: air flows outward from center (single/dual stage, rugged, simpler)","Axial is only for recips","Centrifugal is more efficient"],"c":1,"x":"Large turbofans: axial (many stages for high pressure ratio). Small turboprops/turboshafts: often centrifugal (PT6 has both: axial first stages + centrifugal final stage). Know the characteristics of each."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Can-annular combustion chambers:","o":["Are individual cans only","Combine features of both: individual can-shaped liners inside an annular (ring-shaped) outer casing \u2014 used on many medium/large engines","Are fully annular only","Don't exist in aviation"],"c":1,"x":"Can-annular: individual liners (easier to inspect/replace individually) inside a common casing. Crossfire tubes connect them for flame propagation during start. Popular on GE CF6, P&W JT8D."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Turbine blade cooling methods include:","o":["No cooling needed","Internal air passages, film cooling (tiny holes that create a cool air layer on the blade surface), and thermal barrier coatings","Water spray","Oil circulation"],"c":1,"x":"Modern turbine blades operate in gas temperatures ABOVE their melting point. Cooling air (bled from the compressor) flows through internal passages and exits through tiny holes, forming a protective film. Engineering marvel."},{"e":"PP","t":"Turbine Engines","d":4,"q":"EGT margin is:","o":["A safety factor in the exhaust pipe","The difference between the current EGT at a standard condition and the maximum allowable EGT \u2014 indicates remaining engine health/life","Engine ground time","A type of engine mount"],"c":1,"x":"New engine: large EGT margin. As components degrade (compressor erosion, turbine wear): EGT at same power increases = margin decreases. When margin approaches zero = engine needs maintenance/overhaul."},{"e":"PP","t":"Turbine Engines","d":3,"q":"A borescope inspection of the turbine section looks for:","o":["Only cleanliness","Blade cracking, erosion, burning, sulfidation, coating loss, FOD damage, nozzle guide vane damage, and combustion liner distortion","Only blade count","Only paint condition"],"c":1,"x":"Borescope: inserted through inspection ports. Visual assessment of hot-section health without engine removal. Each finding is compared to the engine manual's limits (illustrations showing acceptable vs rejectable conditions)."},{"e":"PP","t":"Turbine Engines","d":3,"q":"N2 speed on a dual-spool turbofan represents:","o":["Fan speed","High-pressure compressor and turbine spool speed \u2014 the 'core' engine speed","Low-pressure spool","Propeller speed"],"c":1,"x":"N1 = fan/LP spool. N2 = HP compressor/turbine spool. N2 relates to the gas generator core performance. Starter drives N2 during start. On a triple-spool (RR Trent), there's also N3."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Anti-stall bleed valves on a compressor:","o":["Increase thrust","Open at low RPM to bleed off air from mid-compressor stages \u2014 preventing rear-stage stall by reducing pressure ratio across them","Reduce fuel flow","Control oil pressure"],"c":1,"x":"At low RPM: rear compressor stages see too much air relative to their speed = stall. Bleed valves dump mid-stage air overboard, reducing the pressure ratio and preventing stall. Close at higher RPM when stall margin is sufficient."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"FADEC failure modes: if both channels fail, what happens?","o":["Engine continues normally","Depends on the aircraft \u2014 some have hydromechanical backup (reduced capability); others have NO backup = engine loss","Nothing changes","Automatic restart"],"c":1,"x":"Dual-channel FADEC: one fails, the other takes over seamlessly. BOTH fail = depends on design. Some engines have a basic hydromechanical backup. Others: complete FADEC failure = uncommanded shutdown. Triple redundancy on some military engines."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel flow scheduling during acceleration must be limited because:","o":["Fuel is expensive","Too much fuel too fast causes rich blowout in the combustor or compressor stall \u2014 the acceleration schedule limits the fuel increase rate","Passengers might notice","It affects cabin pressure"],"c":1,"x":"The accel schedule: a carefully computed limit on how fast fuel can increase vs. N2 speed. Too much fuel at low N2 = not enough air = rich blowout. At mid-range: too fast = compressor surge. FADEC enforces this automatically."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"A deceleration schedule limits how fast fuel DECREASES because:","o":["It doesn't need limiting","Too rapid fuel reduction can cause lean blowout (flameout) \u2014 the combustor needs a minimum fuel-to-air ratio to sustain combustion","Only to save fuel","To protect the fuel pump"],"c":1,"x":"Chop the throttle too fast: fuel drops below the lean extinction limit = flameout. The decel schedule keeps fuel flow above the lean limit during power reduction. Less critical than accel (consequences less severe) but still important."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel heaters in a turbine system prevent:","o":["Fuel from boiling","Wax crystals and ice crystals from forming in cold fuel at altitude \u2014 which would block fuel filters","Fuel from evaporating","Fuel color change"],"c":1,"x":"Jet fuel contains dissolved water and wax. At -40\u00b0C: water freezes and wax precipitates. Both block filters. Fuel heater (oil-to-fuel or bleed-air-to-fuel heat exchanger) warms fuel above the crystallization point."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"A stuck fuel nozzle produces a hot streak visible as:","o":["Uniform exhaust color","Localized hot spot on the tail cone and potential turbine blade damage downstream from that nozzle position","Better fuel economy","More even combustion"],"c":1,"x":"Partially blocked nozzle: poor atomization = uneven combustion = local hot streak through the turbine section. Over time: accelerated creep, oxidation, and thermal fatigue on the affected blades. EGT spread monitoring catches this."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Engine trimming is required after:","o":["Every flight","FCU replacement, engine change, or when the engine no longer produces rated thrust at the expected fuel flow","Oil changes","Compressor washes"],"c":1,"x":"Trim: fine-adjust the FCU so idle and max thrust match specifications. Use actual inlet temperature/pressure conditions (not standard day values). Critical for ensuring the engine delivers rated performance."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel-to-oil heat exchanger failure could result in:","o":["Nothing significant","Fuel contaminated with oil (if oil side leaks) or oil contaminated with fuel (if fuel side leaks) \u2014 both are serious","Only cosmetic issues","Better performance"],"c":1,"x":"Tube failure: high-pressure fuel enters the oil system (dilutes oil = bearing failure risk) or oil enters fuel (contaminates fuel system). Monitor for fuel in oil or oil in fuel during sampling."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Duplex fuel nozzles have primary and secondary flow paths because:","o":["Redundancy only","Primary provides good atomization at low fuel flows (idle); secondary adds flow at higher power \u2014 ensuring proper spray pattern across the entire operating range","It doubles the fuel flow","Only for starting"],"c":1,"x":"Low fuel flow through a large orifice = poor atomization = incomplete combustion = smoke. Primary: small orifice optimized for idle/low power. Secondary: larger flow path for high power. Flow divider valve controls the transition."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"A FADEC-controlled engine shows an EGT exceedance that the pilot didn't command. This could indicate:","o":["Normal operation","FADEC sensor fault giving incorrect data, fuel control malfunction, or compressor deterioration requiring more fuel for the same thrust request","The pilot made an error","Only a gauge problem"],"c":1,"x":"FADEC relies on sensor inputs. A faulty T2 sensor (inlet temp) could make FADEC think it's colder = adds more fuel = overtemp. Faulty N2 sensor = wrong scheduling. Or the engine is actually deteriorated. Download FADEC fault data for diagnosis."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Jet fuel specific gravity matters because:","o":["It determines color","Thrust depends on fuel MASS flow \u2014 the FCU must compensate for density variations due to temperature and fuel type","It only affects weight","It's just for accounting"],"c":1,"x":"Cold fuel = dense = more mass per gallon = more energy. Hot fuel = less dense. FADEC measures fuel temperature and calculates mass flow. Without compensation, cold day = over-fueling, hot day = under-fueling."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel drain valves in the combustion section:","o":["Are decorative","Open when the engine is not running to drain pooled fuel \u2014 preventing a hot start or fire from accumulated fuel on the next start attempt","Only operate in flight","Are manually activated"],"c":1,"x":"After a failed start: fuel pools in the combustor. If not drained before next attempt: pool ignites all at once = massive EGT spike (hot start) or fire. Drain valves open automatically when fuel pressure drops (engine shutdown)."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"The bleed air heating of fuel is preferred over electrical heating because:","o":["It's simpler","The engine already produces hot bleed air \u2014 using it to heat fuel is more weight-efficient than carrying electrical heating elements","Electrical heating is more reliable","Bleed air is cleaner"],"c":1,"x":"Bleed air-to-fuel heat exchanger: simple, lightweight, reliable. Uses 'free' heat from the engine. No electrical power required. Air passes over fuel tubing, warming the fuel. Some aircraft use oil-to-fuel exchange instead."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"A governor in a turboprop fuel control system:","o":["Controls fuel directly","Senses propeller RPM and adjusts fuel flow to maintain the selected RPM regardless of airspeed or power changes","Controls oil pressure","Controls blade angle only"],"c":1,"x":"Turboprop: the governor maintains RPM by adjusting BOTH fuel flow and blade angle. Speed decrease = increase fuel AND decrease blade angle. Speed increase = decrease fuel AND increase blade angle. Constant-speed operation."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"If a fuel filter bypass light illuminates in flight:","o":["Land immediately","The filter differential pressure has exceeded the limit \u2014 fuel is now bypassing the filter (unfiltered). Not immediately dangerous but land as soon as practical and replace the filter","The engine will fail","Reset and continue"],"c":1,"x":"Filter bypass: engine continues running on unfiltered fuel. Not an emergency but unfiltered fuel = contamination reaching FCU and nozzles = potential damage. Land at a suitable airport. Do NOT continue extended operations."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Thrust lever position vs actual thrust: in a FADEC system:","o":["They're always directly proportional","The FADEC computes the required fuel flow based on the thrust lever angle PLUS environmental conditions \u2014 same lever position produces different thrust at different altitudes/temperatures","Lever position is irrelevant","FADEC ignores the thrust lever"],"c":1,"x":"FADEC takes the pilot's thrust REQUEST (lever position) and computes what fuel flow is needed to achieve that thrust given current conditions. At altitude: more fuel needed for the same lever position (to compensate for thin air)."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Engine inlet design for subsonic aircraft uses a divergent duct to:","o":["Accelerate the air","Slow the air down and convert kinetic energy to pressure \u2014 increasing the pressure at the compressor face","Filter the air","Heat the air"],"c":1,"x":"Diffuser inlet: area increases from front to compressor. Air decelerates = pressure rises (Bernoulli). The compressor starts at a higher pressure = more efficient. Good inlet design recovers maximum ram pressure."},{"e":"PP","t":"Turbine Induction & Exhaust","d":4,"q":"FOD damage to a first-stage fan blade requires:","o":["Only a visual check","Assessment per the engine maintenance manual \u2014 blending within limits OR blade replacement depending on damage size, location, and type","Immediate engine replacement","Only balance check"],"c":1,"x":"Fan blade damage limits: detailed in the AMM with drawings showing allowable damage by zone. Leading edge nicks: may be blendable. Mid-chord damage or damage in root area: often requires blade replacement. Beyond limits = condemn."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Cascade thrust reversers redirect:","o":["Core exhaust only","Fan/bypass air forward through fixed cascade vanes while blocker doors close the normal fan duct","All engine airflow","Only turbine exhaust"],"c":1,"x":"On high-bypass turbofans, most thrust comes from the fan. Cascades redirect this fan air forward. The core exhaust (small portion of total thrust) is usually not reversed. Maximum reverse thrust \u2248 40-50% of forward."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"An exhaust nozzle inspection includes checking for:","o":["Paint condition","Cracks, warping, erosion, hot spots, FOD damage, and missing/damaged hardware \u2014 the nozzle operates in extreme heat","Only external appearance","Only bolt torque"],"c":1,"x":"Exhaust nozzles endure extreme thermal cycling. Cracks propagate quickly at these temperatures. Warping changes the nozzle area = affects engine performance. Document and compare to AMM limits."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"An inlet particle separator on a turboprop uses:","o":["A paper filter","Inertial or centrifugal force to separate heavier particles from the intake air \u2014 ejecting debris while clean air enters the engine","A magnetic filter","An electrostatic filter"],"c":1,"x":"Air enters the separator, curves sharply. Heavy particles (sand, dust, FOD) can't follow the curve and are ejected by a blower. Clean air follows the curved path into the engine. Essential for dusty/sandy operations."},{"e":"PP","t":"Turbine Induction & Exhaust","d":4,"q":"A thrust reverser that inadvertently deploys in flight would:","o":["Help the aircraft slow down safely","Create massive asymmetric drag/thrust \u2014 potentially uncontrollable aircraft condition; multiple safeguards prevent this","Have no effect","Improve fuel efficiency"],"c":1,"x":"In-flight deployment: massive drag on one side = violent yaw and roll. Potentially unrecoverable. That's why multiple redundant locks (mechanical, hydraulic, electrical) prevent deployment above a certain speed. ETOPS requires additional protections."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Acoustic treatment in engine nacelles reduces noise by:","o":["Blocking all sound","Absorbing sound energy through perforated panels backed by honeycomb \u2014 converting acoustic energy to heat","Reflecting sound back into the engine","Canceling sound electronically"],"c":1,"x":"Nacelle acoustic liners: perforated face sheet + honeycomb core. Sound waves enter the perforations and are absorbed by the honeycomb. Tuned to specific frequencies. Reduces community noise for noise certification compliance."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Cowl panel latches must be inspected carefully because:","o":["Appearance matters","Lost cowl panels in flight = FOD risk to other aircraft, loss of fire containment, and possible damage to the horizontal stabilizer","They're decorative","Only affects maintenance access"],"c":1,"x":"Multiple incidents: improperly latched cowl panels departing in flight. Some have struck the horizontal stabilizer. Pre-flight: verify all latches and fasteners. After maintenance: double-check all panels secured before taxi."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Engine bleed air is used for multiple aircraft systems including:","o":["Only pressurization","Cabin pressurization, anti-ice, pneumatic starting of other engines, hydraulic reservoir pressurization, and water/waste tank pressurization","Only starting","Only anti-ice"],"c":1,"x":"Bleed air is the engine's 'utility' output. Many systems depend on it. Excessive bleed demand reduces available thrust. FADEC accounts for bleed loads when computing thrust."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"An exhaust augmenter (ejector) on a turboprop:","o":["Increases fuel flow","Uses exhaust velocity to entrain additional air \u2014 providing cooling to the engine compartment and some additional thrust","Only reduces noise","Has no practical purpose"],"c":1,"x":"Augmenters are common on PT6 installations. High-velocity exhaust in the augmenter tube draws ambient air over the engine (cooling) and adds mass flow for a small thrust bonus. Simple passive system."},{"e":"PP","t":"Turbine Induction & Exhaust","d":4,"q":"After a bird strike on a turbine engine, even if the engine runs normally:","o":["No inspection needed if running fine","A borescope inspection of the fan, compressor, and accessible combustion section is required \u2014 internal damage may exist without obvious external symptoms","Only external visual","Just check the vibration monitor"],"c":1,"x":"Bent fan blades, compressor blade nicks, and internal FOD may not cause immediate symptoms. But weakened components can fail under the next heavy load. Borescope inspection per the AMM bird-strike procedure."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Hot section inspection (HSI) is a:","o":["Complete engine overhaul","Scheduled inspection of the combustion, turbine, and exhaust sections \u2014 typically at half the TBO interval \u2014 without full engine disassembly","Only an oil analysis","Only a borescope"],"c":1,"x":"HSI: opens the engine at the hot section split. Inspects combustion liners, turbine nozzles, turbine blades, and shrouds. Replaces worn hot-section parts. Extends the engine to full TBO without complete overhaul."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"The purpose of the exhaust cone (tail cone) in a turbine engine:","o":["Only structural support","Smoothly directs exhaust gas flow from the turbine to the nozzle \u2014 maintaining efficient gas flow and recovering some static pressure","Only for appearance","Only noise reduction"],"c":1,"x":"The tail cone fills the center of the exhaust annulus. Without it, the gas flow would be turbulent and inefficient. The cone's surface also provides mounting for the tail bearing support. Inspect for cracks and hot spots."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Engine inlet anti-ice should be activated BEFORE entering icing conditions because:","o":["It takes 10 minutes to warm up","Once ice forms on the inlet, chunks can break off and FOD the compressor \u2014 prevention is safer than removal","It uses less fuel to prevent than remove","The switch is hard to reach"],"c":1,"x":"Anti-ice = prevention (continuous heat). De-ice = removal (cyclic). For engine inlets, anti-ice is the standard because ice shedding into the engine is too risky. Wing boots can de-ice because shed ice goes overboard, not into an engine."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Bellmouth inlet for engine test cells provides:","o":["Realistic flight conditions","Near-perfect, undisturbed airflow for accurate engine performance measurement \u2014 not representative of actual flight inlet conditions","Restricted airflow","Higher thrust readings"],"c":1,"x":"Bellmouth = smooth, radiused inlet = virtually zero pressure loss. Gives the engine ideal conditions for establishing baseline performance. Flight inlets have losses. Correction factors account for the difference."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Why must scavenge pump capacity exceed pressure pump capacity?","o":["It doesn't need to","The scavenge pump handles oil PLUS air that enters through labyrinth seals \u2014 greater volume requires greater capacity to keep the bearing compartment clear","To increase pressure","To reduce temperature"],"c":1,"x":"Bearing compartment: oil enters via pressure pump, but AIR also enters through labyrinth seals. The scavenge pump must move oil + air (foamy mixture, much greater volume). 2:1 to 3:1 ratio is typical."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"Oil analysis shows iron AND chromium increasing simultaneously. This suggests:","o":["Normal wear","Cylinder wall or piston ring wear (in a recip) or gear tooth wear (in a turbine gearbox) \u2014 both components contain iron and chromium","Only oil degradation","Filter failure"],"c":1,"x":"Iron + chromium together: steel components with chrome plating or chrome-alloy steel. In recips: cylinder walls (chrome) + rings (steel). In turbine: gear teeth or bearing races. Specific metal combinations point to specific components."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"A chip detector warning light in a turbine engine indicates:","o":["Low oil level","Metallic debris on the magnetic chip detector \u2014 potentially indicating bearing, gear, or seal wear requiring investigation","Oil too hot","Oil filter bypass"],"c":1,"x":"Chip detector: magnet in the oil line catches metallic particles. Warning light = enough debris to bridge the gap. Inspect the chip: fuzz = normal wear. Flakes/chunks = serious internal damage. Document and analyze."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Oil breather/vent system pressurization indicates:","o":["Normal operation","Excessive bearing compartment pressure from worn seals or high internal airflow \u2014 may indicate seal deterioration","Oil level is correct","Engine is at idle"],"c":1,"x":"Some pressurization is normal (air through labyrinth seals). Excessive pressure = seal deterioration = more air entering compartment. Also causes increased oil consumption as oil mist exits through the vent. Monitor the trend."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"If an oil-to-fuel heat exchanger develops an internal leak, the most critical concern is:","o":["Oil contaminating the fuel","Fuel entering the oil system \u2014 fuel dilutes the oil, reducing its lubricating properties and potentially causing bearing failure","Neither is critical","Only aesthetic concern"],"c":1,"x":"Fuel pressure is usually higher than oil pressure at the heat exchanger. A leak = fuel enters oil. Diluted oil = reduced viscosity = inadequate lubrication = bearing failure. Detected by: low oil viscosity, fuel smell in oil sample, or rising oil level."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Oil-wetted areas of a turbine engine are limited because:","o":["Oil is expensive","Only the bearings, gears, and accessory drives need lubrication \u2014 the compressor and turbine gas path must remain oil-free","The entire engine is lubricated","Oil would extinguish combustion"],"c":1,"x":"Oil only goes to: main bearings, accessory gearbox gears, and a few specific components. The gas path (compressor, combustor, turbine) must remain oil-free. Seals prevent oil from entering the gas path."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"When oil gets contaminated with water:","o":["It performs better","It forms an emulsion that reduces lubricating ability and promotes corrosion of internal components","It separates cleanly with no harm","It only changes color"],"c":1,"x":"Water + oil = milky emulsion. Water promotes rust on steel components (bearings, gears). Reduces oil film strength. Causes foaming. Source: condensation, leaking seals, improper storage. Detected in oil analysis."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"A de-aerator in the oil system:","o":["Adds air to oil","Removes air from the scavenged oil before it returns to the tank \u2014 air-laden oil doesn't lubricate properly","Heats the oil","Filters the oil"],"c":1,"x":"Scavenged oil is foamy (mixed with air from bearing compartment). De-aerator uses centrifugal force or baffles to separate air from oil. Clean oil returns to tank. Air exits through the breather. Essential for consistent lubrication."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"Turbine oil type I (MIL-PRF-7808) vs type II (MIL-PRF-23699):","o":["They're interchangeable","Type I = 3 centistoke (lighter, older engines); Type II = 5 centistoke (heavier, better for modern high-temp engines) \u2014 NOT interchangeable without engine manufacturer approval","Type I is better","Type II is cheaper"],"c":1,"x":"Different viscosities and thermal properties. Engine manual specifies which type. Using the wrong type = inadequate lubrication at operating conditions. Some engines approve both; others specify one. ALWAYS verify before servicing."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"An oil filter differential pressure indicator (bypass button):","o":["Measures oil temperature","Pops out when the pressure drop across the filter exceeds the limit \u2014 indicating the filter is clogging and oil will soon bypass","Shows oil level","Is a reset button"],"c":1,"x":"As contamination accumulates: filter restriction increases = higher delta-P. At the limit: indicator pops. Oil will bypass (unfiltered but at least flowing). Replace the filter element. Check the indicator every walkaround."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Last-chance screens at each bearing:","o":["Replace the main filter","Catch any final debris that passed the main filter \u2014 protecting that specific bearing; debris found = upstream contamination problem","Are cleaned every flight","Are only on recip engines"],"c":1,"x":"Fine screens just before each bearing's oil supply nozzle. Found during overhaul. If debris is trapped: indicates the main filter is failing or a component upstream is deteriorating. Critical diagnostic tool."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Oil cooler location in the engine:","o":["Inside the combustion chamber","In the fan duct airstream or behind a dedicated air scoop \u2014 using ram/fan air to cool the oil","In the fuel tank","Inside the cabin"],"c":1,"x":"Air-oil cooler: finned tubes in the fan duct. Cool fan air passes over fins, absorbing heat from the oil. Some engines use fuel-oil coolers instead (or in addition). Location depends on engine architecture."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Oil consumption trending upward over several months indicates:","o":["Better lubrication","Probable bearing seal deterioration \u2014 more oil leaking past seals into the gas path or overboard through the vent","Oil is too thin","Need larger oil tank"],"c":1,"x":"Track oil added at every service. Rising trend = seals wearing. Eventually: oil mist in cabin air supply (fume events), external oil leaks, or insufficient oil level. Plan maintenance before it becomes a safety issue."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"A sudden oil pressure loss with simultaneous increase in oil temperature and vibration most likely indicates:","o":["Normal high-power operation","Bearing failure in progress \u2014 the bearing is overheating (no oil film), generating debris (vibration), and the broken-down bearing increases clearance (pressure drop)","Oil grade problem","Gauge malfunction"],"c":1,"x":"Three simultaneous symptoms = bearing failure cascade. This is an EMERGENCY. Immediate power reduction and shutdown may be necessary to prevent catastrophic engine failure and possible uncontained failure."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Labyrinth seals work by:","o":["Physical contact with a mating surface","Creating a series of pressure drops through close-clearance knife edges \u2014 no physical contact means no wear","Magnetic repulsion","Spring pressure"],"c":1,"x":"Non-contacting seal: multiple thin fins create a tortuous path. Pressurized air on one side leaks slowly through (acceptable small loss). No contact = no wear = long life. But higher clearance (from thermal cycling) = more leakage."},{"e":"PP","t":"Water Injection","d":3,"q":"Water injection on a recip engine prevents detonation by:","o":["Diluting the fuel","Absorbing heat from the intake charge through evaporation \u2014 cooler charge = higher detonation threshold = more boost allowed","Increasing octane directly","Lubricating the cylinders"],"c":1,"x":"Water's high latent heat of evaporation absorbs enormous energy from the hot compressed charge. The cooled charge doesn't reach detonation temperature even at higher manifold pressures."},{"e":"PP","t":"Water Injection","d":4,"q":"On a turbofan with water injection: the water increases thrust primarily by:","o":["Burning with the fuel","Increasing the mass flow through the engine AND cooling the compressor discharge air to allow more fuel without exceeding EGT limits","Lubricating the compressor","Reducing drag"],"c":1,"x":"Two mechanisms: 1) Added mass = more mass to accelerate through the nozzle = more thrust. 2) Cooling allows higher fuel flow within EGT limits = more energy added. Both contribute to the 5-10% thrust increase."},{"e":"PP",
