oves material \u2014 too much on thin skin creates a knife edge. Dimpling presses the skin into a countersink shape without removing material."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"A joggle in sheet metal is:","o":["A crack","An offset bend that allows one sheet to overlap another at the same level","A type of rivet","A reinforcement"],"c":1,"x":"Joggle creates a step so overlapping sheets lie flush. Used at skin joints, stringer-to-skin junctions. Made with a joggle tool or forming block."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Proper rivet bucking requires the bucking bar to be held:","o":["At an angle","Firmly and squarely against the rivet shank","Loosely to allow the rivet to spread","Away from the skin"],"c":1,"x":"Square contact ensures even upset (shop head formation). Angled bar = tilted head = weak rivet = rejected. The bucker must feel the rivet forming and maintain alignment."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"After driving a rivet, the shop head diameter should be approximately:","o":["Same as hole diameter","1.5\u00d7 the shank diameter","3\u00d7 the shank diameter","Any size"],"c":1,"x":"Shop head: 1.5D diameter and 0.5D height. Too large = rivet driven too far (over-driven). Too small = not enough clinch (under-driven). Both are rejection criteria."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Empty weight of an aircraft includes:","o":["Only the structure","Airframe, engines, all fixed equipment, unusable fuel, and full operating fluids","Only airframe and engines","Structure plus passengers"],"c":1,"x":"Empty weight = everything permanently installed + unusable fuel + full oil (for most aircraft). Does NOT include usable fuel, crew, passengers, or cargo."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Arm is the distance from:","o":["Wing to tail","The datum to the CG of an item","The nose to the tail","The wing root to the wingtip"],"c":1,"x":"Arm = horizontal distance from the datum to the item's CG, measured in inches or centimeters. Arm \u00d7 weight = moment. Positive aft of datum, negative forward (usually)."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"If the CG is too far aft, the aircraft becomes:","o":["More stable","Unstable in pitch \u2014 possible unrecoverable nose-up condition","Faster","More fuel efficient"],"c":1,"x":"Aft CG = reduced stability. Extreme aft CG = the pilot may not have enough elevator authority to prevent nose-up pitch = unrecoverable stall. This is why CG limits exist."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Ballast is added to an aircraft to:","o":["Increase speed","Bring the CG within allowable limits when it cannot be corrected by loading","Improve fuel efficiency","Reduce maintenance"],"c":1,"x":"Ballast (usually lead) is a last resort when CG can't be corrected by equipment placement or loading. Permanent ballast must be documented on the W&B report."},{"e":"REGS","t":"Airworthiness","d":2,"q":"An aircraft must have a valid Certificate of Airworthiness to:","o":["Be parked at an airport","Be operated in flight","Be displayed at an air show only","Be sold"],"c":1,"x":"No C of A = no flying (except under a flight permit for specific purposes). The C of A confirms the aircraft meets airworthiness standards."},{"e":"REGS","t":"Airworthiness","d":3,"q":"A Special Certificate of Airworthiness may be issued for:","o":["Normal commercial operations","Specific purposes: experimental, restricted, provisional","Any flying the owner wants","Training flights only"],"c":1,"x":"Special C of A: limited operations. Experimental (homebuilt, research), Restricted (aerial work), Provisional (new type pending full certification). Each has specific operating limitations."},{"e":"REGS","t":"Airworthiness","d":3,"q":"If an aircraft does not conform to its type design due to an unapproved modification:","o":["It is still airworthy","It is NOT airworthy \u2014 the C of A is effectively invalid","Only the modification is affected","It needs a new paint scheme"],"c":1,"x":"C of A requires type design conformity. Unapproved mods = non-conformity = not airworthy. Must either get the mod approved (STC) or remove it and restore type design."},{"e":"REGS","t":"Airworthiness","d":4,"q":"An AME discovers during maintenance that a previous repair was done without approved data. The correct action:","o":["Ignore it if the repair looks good","Document the finding, assess the repair against approved data, and either approve or require re-repair before release","Report the previous AME to TC immediately","Cover it with a new inspection stamp"],"c":1,"x":"Unapproved repairs must be addressed. The AME cannot release an aircraft with a known unapproved repair. Either validate it against approved data or redo it properly. Document everything."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"A fire extinguisher squib is:","o":["A testing device","An electrically fired cartridge that punctures the bottle to release agent","A pressure gauge","A temperature sensor"],"c":1,"x":"Squib is fired electrically from the cockpit fire handle. Punctures the frangible disc on the bottle. Agent flows through distribution lines to spray nozzles in the fire zone."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"A Fenwal continuous-loop system detects fire by:","o":["Smoke detection","Average temperature change along the sensing element causing resistance drop","Single-point temperature only","UV flame detection"],"c":1,"x":"Fenwal: single wire in a tube filled with eutectic salt. Heat anywhere along the element melts the salt, dropping resistance. Provides continuous zone coverage."},{"e":"PP","t":"Engine Fire Protection","d":2,"q":"Class C fires involve:","o":["Ordinary combustibles","Flammable liquids","Energized electrical equipment","Combustible metals"],"c":2,"x":"Class C = electrical. De-energize first if possible, then use non-conductive agent (CO2, Halon, dry chemical). NEVER water on live electrical fire."},{"e":"PP","t":"Engine Fire Protection","d":3,"q":"Overheat detection differs from fire detection in that overheat:","o":["Is the same thing","Warns of high temperature BEFORE it reaches the fire threshold","Only works on the ground","Detects smoke"],"c":1,"x":"Overheat = caution (approaching limits). Fire = warning (fire temperature reached). Two separate circuits/thresholds on the same sensing loop."},{"e":"PP","t":"Engine Fire Protection","d":4,"q":"After a fire bottle discharge, the fire handle should remain pulled because:","o":["It looks better","It keeps fuel, hydraulic, bleed air, and electrical systems isolated from the affected engine","It recharges the bottle","It activates backup cooling"],"c":1,"x":"Fire handle pulls shut off fuel, hydraulic supply, bleed air, and electrical generation to the affected engine. Prevents re-ignition. Do not push back in until fire is confirmed out."},{"e":"PP","t":"Recip Lube & Cooling","d":2,"q":"An oil pressure relief valve returns excess oil to:","o":["The engine bearings","The pump inlet or oil tank to maintain system pressure within limits","The filter","Overboard"],"c":1,"x":"Relief valve prevents overpressure by diverting excess oil back to the inlet side. Opens at a set pressure and closes when pressure drops. Adjustable on some engines."},{"e":"PP","t":"Recip Lube & Cooling","d":3,"q":"Oil consumption trending higher over time indicates:","o":["Better engine performance","Possible worn piston rings, valve guides, or seal deterioration","Normal break-in","The oil is too thin"],"c":1,"x":"Trending is key. Gradual increase in oil consumption = internal wear progressing. Sudden increase = possible seal failure or crack. Track consumption at every oil service."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Flashing the field of a generator restores:","o":["Proper capacitor operation","Residual magnetism to the field frame","Brush contact pressure","Output frequency"],"c":1,"x":"[FAA AMP Q30] Generators need residual magnetism to start producing voltage. Momentary DC current through the field coil re-magnetizes the poles. Required after generator sits unused."},{"e":"PP","t":"Recording & Indicating","d":2,"q":"Fuel flow is typically measured by:","o":["A fuel pressure gauge","A vane or mass flow transmitter in the fuel line","The fuel quantity gauge","Visual observation"],"c":1,"x":"Fuel flow meters measure actual consumption rate (gallons or pounds per hour). Essential for range calculations and engine health monitoring. Vane type or mass flow type common."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"Fuel nozzle patterns must produce:","o":["A solid stream","A fine atomized cone-shaped spray for efficient combustion","A wide flat fan","Large droplets for slow burning"],"c":1,"x":"Fine atomization = more surface area = faster, more complete combustion = higher efficiency and lower emissions. Clogged or worn nozzles = poor spray pattern = hot spots."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"Fuel system water drains should be checked:","o":["Only at annual inspection","During preflight and regular maintenance \u2014 drain and check for water/contaminants","Only when fuel quantity is low","Only after refueling"],"c":1,"x":"Water settles to the lowest points in the fuel system. Regular draining catches water before it reaches the engine. More critical in humid climates and after temperature changes that cause condensation."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"An inlet particle separator on a turbine engine:","o":["Increases thrust","Removes sand, dust, and debris from intake air before it reaches the compressor","Cools the intake air","Adds moisture to intake"],"c":1,"x":"Common on helicopters and turboprops operating in dusty/sandy environments. Centrifugal or inertial separator deflects particles away. Reduces compressor erosion."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"Exhaust gas temperature spread between cylinders on a recip engine should be:","o":["As wide as possible","Within the manufacturer's specified limit \u2014 excessive spread indicates uneven fuel distribution or ignition problems","Exactly zero","Not monitored"],"c":1,"x":"EGT spread check: all cylinders should read within a specified range. Wide spread = fuel injector issue, ignition problem, or intake leak on one cylinder. Troubleshooting tool."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"A last-chance oil filter (screen) at each bearing:","o":["Is the primary filtration","Catches debris that bypassed the main filter to protect that specific bearing","Replaces the main filter","Is only on recip engines"],"c":1,"x":"Last-chance screens are final protection at each bearing. If they trap debris, it indicates upstream contamination. Found during teardown inspections \u2014 important diagnostic tool."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"Oil temperature gauges in turbine engines measure temperature at:","o":["The oil tank only","The oil supply to the engine or return from the engine","The fuel system","Ambient air"],"c":1,"x":"Oil temp measured at supply (to engine) or scavenge return (from bearings). Return temp is higher and more indicative of bearing health. Trending temperature changes catches developing problems."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"Tolerances on a drawing specify:","o":["The exact dimension only","The acceptable range of variation from the nominal dimension","The material type","The part color"],"c":1,"x":"No part can be made perfectly. Tolerances define the acceptable + and - variation. Tighter tolerance = more precision required = higher manufacturing cost."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"An isometric drawing shows an object in:","o":["Flat 2D views","A 3D pictorial view with three axes at 120\u00b0 to each other","Sectional view only","Exploded view only"],"c":1,"x":"Isometric gives a 3D appearance. All three axes equally foreshortened. Good for visualization but not for taking precise measurements. Used for assembly illustrations and parts catalogs."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Bernoulli's principle states that as fluid velocity increases:","o":["Pressure increases","Pressure decreases","Temperature increases","Density increases"],"c":1,"x":"Faster fluid = lower pressure. This is how wings generate lift (faster over top = lower pressure = net upward force) and how a venturi works in a carburetor."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Torque is measured in:","o":["Pounds per square inch","Foot-pounds or Newton-meters","Gallons per minute","Degrees Fahrenheit"],"c":1,"x":"Torque = rotational force = Force \u00d7 distance. Foot-pounds (imperial) or Newton-meters (metric). Critical for bolt tightening specifications in aircraft maintenance."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Work is defined as:","o":["Force only","Force applied over a distance (W = F \u00d7 D)","Speed times time","Pressure times area"],"c":1,"x":"No distance = no work (holding a heavy box stationary = no work in physics). Power = work/time. These relationships are fundamental to understanding hydraulic and mechanical systems."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Cadmium plating on aircraft hardware provides:","o":["Increased strength","Sacrificial corrosion protection for steel parts","Better appearance only","Electrical insulation"],"c":1,"x":"Cadmium is more anodic than steel \u2014 it corrodes first, protecting the steel underneath (sacrificial protection). Common on fasteners. Being replaced by zinc-nickel plating due to toxicity concerns."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Exfoliation corrosion in aluminum appears as:","o":["Surface pitting","Lifting or flaking of surface layers like pages of a book","Thread-like lines","Uniform thinning"],"c":1,"x":"Exfoliation: corrosion products along grain boundaries force metal layers apart. Common in thick aluminum extrusions. Looks like delaminating layers. Serious structural concern."},{"e":"SPM","t":"NDT","d":3,"q":"A fluorescent penetrant inspection uses:","o":["Normal visible light only","Ultraviolet (black) light to make indications fluoresce brightly","X-ray imaging","Magnetic fields"],"c":1,"x":"Fluorescent penetrant glows under UV light, making tiny cracks much more visible than visible-dye methods. More sensitive. Used in darkened inspection areas."},{"e":"SPM","t":"NDT","d":2,"q":"The developer in a penetrant inspection:","o":["Cleans the surface","Draws penetrant out of defects to the surface making indications visible","Fixes the penetrant permanently","Removes excess penetrant"],"c":1,"x":"Developer (powder or liquid) acts as a blotter \u2014 capillary action pulls trapped penetrant back to the surface. The indication bleeds out and becomes visible. Interpretation requires training."},{"e":"SPM","t":"NDT","d":3,"q":"Ultrasonic inspection can also measure:","o":["Paint thickness only","Material thickness (important for corrosion assessment)","Temperature","Electrical conductivity"],"c":1,"x":"UT thickness gauging: measures remaining wall thickness on skins, tubes, and fittings. Detects hidden corrosion thinning. Essential for aging aircraft inspection programs."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Bucking bar weight should be:","o":["As light as possible","Approximately 1.5\u00d7 the weight of the rivet gun for proper energy transfer","Exactly the same as the gun","As heavy as available"],"c":1,"x":"Proper mass ratio ensures the rivet upsets correctly. Too light = bar bounces, poor shop head. Too heavy = hard to control, rivet driven too fast. Match bar to rivet size."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"A micrometer measures:","o":["Length in feet","Precise dimensions to 0.001 inch or 0.01 mm","Only bolt diameter","Torque values"],"c":1,"x":"Micrometers provide precision measurement for checking bearing journals, shaft diameters, and sheet thickness. Read the thimble and sleeve scales carefully."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A dial indicator measures:","o":["Temperature","Small linear movements \u2014 used for checking runout, end play, and surface variation","Voltage","Air pressure"],"c":1,"x":"Mount the dial indicator on a fixed point, touch the plunger to the rotating surface. Measures total indicated runout (TIR). Essential for checking propeller track, shaft runout, and brake disc warp."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Calibration of precision tools must be:","o":["Never needed","Performed at regular intervals traceable to national standards","Done only when they break","At the operator's discretion"],"c":1,"x":"Torque wrenches, micrometers, calipers, test equipment \u2014 all require periodic calibration. Records must show calibration date, due date, and standard used. Using uncalibrated tools = invalid measurements."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"When using a torque wrench, pull:","o":["Quickly for best accuracy","Smoothly and steadily, reading at the click or indicated value","With jerky motions","Past the required value then back off"],"c":1,"x":"Smooth, steady pull ensures accurate reading. Jerking gives false readings. Never use a torque wrench to loosen \u2014 only for tightening. Store at zero/lowest setting."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"An aircraft loaded beyond the aft CG limit is dangerous because:","o":["It flies faster","It becomes increasingly unstable in pitch and may become uncontrollable","It uses less fuel","It climbs better"],"c":1,"x":"Aft CG = reduced longitudinal stability. Extreme aft CG = elevator may not have enough authority to prevent nose-up divergence. Can lead to unrecoverable stall."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Forward CG limit is set by:","o":["Fuel capacity","The maximum elevator authority needed for rotation and flare during landing","Engine power","Wing strength"],"c":1,"x":"Too far forward = nose heavy = need full elevator to flare for landing. If not enough elevator authority, the aircraft can't round out properly = hard/nose-first landing."},{"e":"PP","t":"Turbine Fuel & Control","d":3,"q":"A fuel-oil heat exchanger uses fuel to cool engine oil and simultaneously:","o":["Heats the fuel to prevent ice crystal formation at altitude","Cools the fuel","Mixes fuel with oil","Has no effect on fuel"],"c":0,"x":"Dual-purpose: oil is cooled, fuel is warmed. Warmer fuel is less likely to form ice crystals that block filters. Elegant engineering."},{"e":"PP","t":"Turbine Fuel & Control","d":2,"q":"The fuel manifold distributes fuel from the FCU to:","o":["The oil tank","Individual fuel nozzles in the combustion section","The APU only","The fuel tanks"],"c":1,"x":"Manifold (fuel ring) ensures even fuel distribution to all nozzles around the combustion chamber. Blockage or leak in the manifold = uneven combustion = hot spots."},{"e":"PP","t":"Turbine Fuel & Control","d":4,"q":"A fuel nozzle that produces a poor spray pattern will cause:","o":["No noticeable effect","Localized hot streaks in the combustion chamber, potentially damaging turbine blades","Improved combustion","Lower fuel consumption"],"c":1,"x":"Poor atomization = fuel burns unevenly = hot spots visible on the combustion liner and tail cone. One bad nozzle can damage downstream turbine blades. Nozzle flow checks are part of scheduled maintenance."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"Engine bleed air is tapped from the compressor section for:","o":["Combustion only","Cabin pressurization, anti-ice, pneumatic systems, and engine stall prevention","Lubrication","Fuel heating"],"c":1,"x":"Compressor bleed air powers multiple aircraft systems. Taking too much bleed reduces engine performance. FADEC/EEC accounts for bleed demands in thrust calculations."},{"e":"PP","t":"Turbine Induction & Exhaust","d":3,"q":"An engine inlet anti-ice system typically uses:","o":["Electric heaters only","Hot compressor bleed air routed through the inlet lip","Chemical spray","No anti-ice is needed for turbines"],"c":1,"x":"Hot bleed air circulates through passages in the inlet lip and nose cone. Prevents ice formation that could break off and FOD the compressor. Activated before entering icing conditions."},{"e":"PP","t":"Turbine Induction & Exhaust","d":4,"q":"A turbine engine running with a partially blocked inlet will experience:","o":["Increased thrust","Reduced airflow causing higher EGT, possible compressor stall, and reduced thrust","No effect","Improved fuel efficiency"],"c":1,"x":"Blocked inlet = less air = compressor works harder = higher EGT at same power setting = reduced stall margin. Causes: ice, bird strike damage, FOD screen blockage, inlet duct damage."},{"e":"PP","t":"Turbine Induction & Exhaust","d":2,"q":"The purpose of an exhaust mixer on a turbofan is to:","o":["Reverse thrust","Mix hot core exhaust with cool bypass air to reduce noise and improve efficiency","Filter exhaust particles","Cool the turbine"],"c":1,"x":"Mixing reduces the velocity difference between core and bypass flows. Lower velocity difference = less noise (shear layer noise). Also recovers some energy for slightly better efficiency."},{"e":"PP","t":"Turbine Lube & Cooling","d":3,"q":"Turbine engine oil analysis should include checking for:","o":["Color only","Metal particles (type and quantity), acidity, viscosity, and water content","Smell only","Nothing between changes"],"c":1,"x":"Comprehensive oil analysis: spectrometric (metal content by type), acidity (TAN), viscosity (degradation), water (contamination). Trending results catches bearing/gear wear early."},{"e":"PP","t":"Turbine Lube & Cooling","d":2,"q":"The oil breather/vent system on a turbine engine:","o":["Adds oil to the system","Allows air to escape from the oil tank and bearing compartments while retaining oil mist","Provides pressurized oil","Cools the oil"],"c":1,"x":"As oil returns to the tank, it's aerated. The breather vents air while a de-aerator or centrifugal separator captures oil mist before it exits overboard. Oil mist discharge is normal in small amounts."},{"e":"PP","t":"Turbine Lube & Cooling","d":4,"q":"If a magnetic chip detector shows large metallic flakes rather than fine fuzz, this indicates:","o":["Normal wear","Significant internal damage \u2014 possible bearing or gear failure requiring engine removal","The detector needs cleaning","Oil contamination from fueling"],"c":1,"x":"Fine fuzz = normal wear. Large flakes or chunks = accelerated or catastrophic wear. Engine may need to be removed for inspection. This finding typically grounds the aircraft until investigated."},{"e":"AF","t":"Fabric Covering","d":2,"q":"The two main types of aircraft covering fabric are:","o":["Nylon and polyester","Cotton (Grade A) and synthetic (Poly-Fiber, Ceconite)","Fiberglass and Kevlar","Silk and linen"],"c":1,"x":"[TP14038 18.1] Grade A cotton was original standard. Modern synthetics (polyester like Poly-Fiber/Ceconite) are stronger, lighter, and resist rot. Both are still tested."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Fabric airworthiness is tested using:","o":["Visual inspection only","A fabric punch tester that measures force to penetrate","Weighing the fabric","Measuring thickness with a micrometer"],"c":1,"x":"[TP14038 18.2] Punch tester measures minimum tensile strength. New Grade A cotton \u2248 80 lbs. Minimum airworthy typically 46 lbs (56 lbs for some aircraft). Below = recover."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Dope on fabric-covered aircraft serves to:","o":["Add weight for CG","Tighten, waterproof, and protect the fabric; provide a smooth paintable surface","Lubricate control cables","Prevent static discharge"],"c":1,"x":"[TP14038 18.3] Clear dope shrinks and seals. Pigmented dope adds UV protection and color. Multiple coats applied with brush or spray."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Rejuvenator is applied to doped fabric to:","o":["Remove the fabric","Restore flexibility and adhesion to aging dope that has become brittle","Change the color","Increase fire resistance"],"c":1,"x":"[TP14038 18.3] Dope becomes brittle with age and UV exposure. Rejuvenator (a plasticizer) restores flexibility. Extends covering life before re-covering is needed."},{"e":"AF","t":"Fabric Covering","d":2,"q":"A fabric patch repair must extend beyond the damaged area by at least:","o":["1 inch","2 inches in all directions (or as specified by SRM)","6 inches","The full panel width"],"c":1,"x":"[TP14038 18.2] Overlap allows adequate bonding area. Doped-on patches use multiple coats of dope as adhesive. Sewn patches used for larger repairs on certain aircraft."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Rib stitching (rib lacing) attaches fabric to:","o":["The fuselage frame","Wing ribs using reinforcing tape and a rib stitch cord at specified spacing","The control surfaces","The engine cowling"],"c":1,"x":"[TP14038 18.2] Rib lacing prevents fabric from ballooning away from ribs under air loads. Stitch spacing decreases toward the wingtip (higher aerodynamic loads). Critical structural attachment."},{"e":"AF","t":"Fabric Covering","d":3,"q":"Butyrate dope differs from nitrate dope in that butyrate:","o":["Is more flammable","Is less flammable and more flexible than nitrate","Cannot be applied over nitrate","Is only used on metal aircraft"],"c":1,"x":"[TP14038 18.3] Butyrate (CAB) = safer, more flexible, better UV resistance. Can be applied over properly prepared nitrate. Never apply nitrate over butyrate \u2014 it attacks the butyrate."},{"e":"AF","t":"Fabric Covering","d":2,"q":"Reinforcing tape is applied over fabric:","o":["For decoration only","At all rib locations and along edges where fabric is attached to structure","Only on the leading edge","Only on control surfaces"],"c":1,"x":"[TP14038 18.2] Tape reinforces the fabric at stress points \u2014 over ribs, along trailing edges, and at attachment points. Prevents rib lacing cord from pulling through the fabric."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"The most common welding process for aircraft steel tube structures is:","o":["Stick (SMAW)","Gas welding (oxy-acetylene) and TIG (GTAW)","MIG (GMAW)","Spot welding only"],"c":1,"x":"[TP14038 19.1] Oxy-acetylene for 4130 chrome-moly steel tubing. TIG for stainless, titanium, aluminum. Both produce high-quality, controllable welds for aircraft work."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"A good aircraft weld should have:","o":["A wide, flat bead with undercut","Uniform width, smooth ripples, complete penetration, and no porosity or cracks","Maximum height for strength","Visible slag inclusions"],"c":1,"x":"[TP14038 19.1] Good weld: uniform bead, smooth ripples, full penetration (visible on back), no cracks/porosity/undercut/overlap. Inspect visually + NDT if required."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"4130 chrome-moly steel tubing is used in aircraft because:","o":["It's the cheapest","It has excellent strength-to-weight ratio, is weldable, and can be heat treated","It doesn't corrode","It's lighter than aluminum"],"c":1,"x":"[TP14038 19.2] 4130 = the standard aircraft steel alloy. Strong, weldable, heat-treatable. Used for engine mounts, fuselage trusses, and landing gear components."},{"e":"AF","t":"Welding & Tubular","d":3,"q":"When inspecting a welded tubular structure, special attention is given to:","o":["Paint adhesion","Cluster joints (where multiple tubes meet) because stress concentration is highest","Only straight sections","Only non-welded areas"],"c":1,"x":"[TP14038 19.1] Cluster joints (multiple tubes welded together) have complex stress patterns. Cracks often start here. Inspect with magnification, dye penetrant, or other NDT."},{"e":"AF","t":"Welding & Tubular","d":2,"q":"Rosette welds are used on tubular structures to:","o":["Join tubes end-to-end","Attach gussets or plates to tubes through a hole in the outer tube","Repair cracks only","Join dissimilar metals"],"c":1,"x":"[TP14038 19.2] A hole is drilled in the outer tube, and the inner fitting is welded through it. Creates a strong attachment point without cutting the tube."},{"e":"AF","t":"Welding & Tubular","d":4,"q":"After welding 4130 steel tubing thicker than 0.093 inches, stress relief heat treatment may be required because:","o":["It improves appearance","Welding creates a heat-affected zone with residual stresses that could lead to cracking","It's never required","Only for aluminum"],"c":1,"x":"[TP14038 19.2] Thicker tubing retains more residual stress from welding. Stress relief (heating to specified temp, slow cool) reduces cracking risk. Required per manufacturer's data."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"The primary purpose of aircraft paint/finish is:","o":["Appearance only","Corrosion protection and identification, with aerodynamic smoothness as secondary benefit","Weight reduction","Structural reinforcement"],"c":1,"x":"[TP14038 20.1] Protection from corrosion, UV, and weather is primary. Markings for identification. Smooth finish reduces drag slightly. Appearance is a bonus."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Before painting bare aluminum, the surface must be:","o":["Left untreated","Cleaned, chemically treated (alodine/conversion coating), then primed","Only wiped with solvent","Sanded with coarse grit"],"c":1,"x":"[TP14038 20.1] Surface prep is 90% of a good paint job: clean \u2192 chemical treatment (Alodine creates bonding surface) \u2192 prime (epoxy or zinc chromate) \u2192 topcoat."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Zinc chromate primer is used on aircraft because:","o":["It's the cheapest","It provides excellent corrosion inhibition on aluminum and steel","It's the final coat","It's decorative only"],"c":1,"x":"[TP14038 20.1] Zinc chromate (yellow-green) is the classic aircraft primer. Being replaced by epoxy primers in many applications due to health/environmental concerns."},{"e":"AF","t":"Painting & Finishing","d":3,"q":"When stripping paint from an aircraft, chemical strippers must be:","o":["Left on indefinitely","Applied carefully, monitored, and removed per instructions \u2014 never used on plexiglass, composites, or fabric without checking compatibility","Applied with a wire brush","Heated to improve effectiveness"],"c":1,"x":"[TP14038 20.1] Chemical strippers can damage composites, plexiglass, sealants, and some metals. Always mask sensitive areas. Follow time limits strictly."},{"e":"AF","t":"Painting & Finishing","d":2,"q":"Finishing materials for fabric aircraft include:","o":["Only automotive paint","Dope (nitrate/butyrate), primers, and UV-protective topcoats","Only powder coating","Anodizing"],"c":1,"x":"[TP14038 20.2] Fabric finish system: clear dope \u2192 pigmented dope \u2192 optional UV-resistant topcoat. Each coat must dry before the next. Proper application prevents fabric damage."},{"e":"PP","t":"Water Injection","d":3,"q":"Water-methanol injection in a reciprocating engine:","o":["Reduces power","Increases power by cooling the charge and allowing higher manifold pressure without detonation","Is only used for cooling","Replaces fuel"],"c":1,"x":"[TP14038 41.1] Water cools the intake charge \u2192 denser charge + detonation suppression \u2192 higher allowable manifold pressure \u2192 more power. Methanol prevents freezing and adds some fuel."},{"e":"PP","t":"Water Injection","d":3,"q":"In turbine engines, water injection increases thrust by:","o":["Burning the water","Increasing the mass flow through the engine and cooling the compressor discharge air","Reducing fuel flow","Lubricating the turbine"],"c":1,"x":"[TP14038 41.1] Water adds mass flow (more mass \u00d7 velocity = more thrust). Cooling effect on compressor discharge allows more fuel to be burned without exceeding EGT limits."},{"e":"PP","t":"Water Injection","d":2,"q":"Water injection systems are typically used during:","o":["Cruise only","Takeoff for maximum power when needed (hot day, high altitude, heavy aircraft)","Landing only","All phases of flight"],"c":1,"x":"[TP14038 41.1] Primarily for takeoff power augmentation. Limited water supply means it's used only when needed \u2014 hot/high conditions or maximum gross weight takeoffs."},{"e":"PP","t":"Water Injection","d":4,"q":"If a water injection system fails to operate during a takeoff that requires it:","o":["Continue takeoff normally","The takeoff must be rejected if the runway length requires augmented thrust","Add more fuel instead","Switch to emergency power"],"c":1,"x":"[TP14038 41.1] If performance calculations require water injection thrust and it fails, the aircraft may not achieve required climb gradient. Reject the takeoff if conditions require it."},{"e":"REGS","t":"Parts & Records","d":3,"q":"Under CARs, a 'defect' that must be reported includes:","o":["Any cosmetic damage","Any condition that has caused or is likely to cause an unsafe condition","Minor paint scratches","Normal wear items"],"c":1,"x":"[TP14038 REGS 12.0] Reportable defects: conditions affecting airworthiness, unexpected failures, uncontained failures, significant deterioration. Report via SDR within specified timeframes."},{"e":"REGS","t":"Maintenance Standards","d":2,"q":"Under CARs, 'maintenance' includes:","o":["Only repair work","Overhaul, repair, inspection, replacement, modification, and defect rectification","Only scheduled inspections","Only manufacturer work"],"c":1,"x":"[TP14038 REGS 18.0] Broad definition. Any work maintaining or restoring airworthiness = maintenance under CARs. Even cleaning can be maintenance if it affects airworthiness."},{"e":"REGS","t":"Maintenance Standards","d":3,"q":"Performance of maintenance work requires:","o":["Only good intentions","Use of proper tools, approved data, qualified personnel, and adequate facilities","Any convenient location","Just an AME signature"],"c":1,"x":"[TP14038 REGS 26.0] CARs specify: right tools, right data, right people, right environment. Cutting corners on any of these = non-compliant maintenance."},{"e":"REGS","t":"Other Standards","d":3,"q":"A person holding an RCA (Restricted Certification Authority) may sign releases for:","o":["Any aircraft type","Only the specific types and tasks authorized in the certificate","All maintenance","Only inspections"],"c":1,"x":"[TP14038 REGS 28.0] RCA is limited scope \u2014 specific aircraft types, specific tasks, as defined in the authorization. More restrictive than full AME privileges."},{"e":"REGS","t":"AME Licensing","d":2,"q":"To sign a maintenance release, an AME must have:","o":["Only a valid licence","Valid licence PLUS recency PLUS competence on the specific aircraft type","Only recency","Only employer authorization"],"c":1,"x":"[TP14038 REGS 9.0] ALL THREE: valid licence + recency (6 months in 24) + competency on type. Missing any one = cannot legally sign the release."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"A synchro system transmits:","o":["Audio signals","Angular position data electrically from one location to another","Hydraulic pressure","Fuel flow"],"c":1,"x":"[TP14038 2.15] Synchros convert mechanical shaft position to electrical signals. Used for flap position indicators, throttle position, and other remote indication systems."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Boolean logic: an AND gate outputs TRUE only when:","o":["Any input is TRUE","ALL inputs are TRUE","No inputs are TRUE","Inputs are alternating"],"c":1,"x":"[TP14038 2.10] AND gate: all inputs must be 1 for output 1. OR gate: any input 1 = output 1. NOT gate: inverts. Used in aircraft logic systems."},{"e":"SPM","t":"Electricity & Electronics","d":3,"q":"Hexadecimal number system uses base:","o":["2","8","10","16"],"c":3,"x":"[TP14038 2.19] Hex uses 0-9 plus A-F (A=10, B=11... F=15). Used in avionics memory addresses and fault codes. F in hex = 15 in decimal = 1111 in binary."},{"e":"AF","t":"Structures","d":2,"q":"Windows and doors on pressurized aircraft are critical because:","o":["They let in light","They must withstand the cabin differential pressure while maintaining seal integrity","They are decorative","They only affect noise"],"c":1,"x":"[TP14038 12.3] Pressurized cabin windows carry significant structural loads. Door seals must maintain pressure. Cracked windows or damaged seals = depressurization risk."},{"e":"AF","t":"Fixed-Wing Controls","d":3,"q":"A symmetry check on an aircraft verifies:","o":["Paint symmetry","That the aircraft structure and control surfaces are aligned symmetrically per manufacturer specifications","Engine mounting angle","Fuel distribution"],"c":1,"x":"[TP14038 13.2] Symmetry check measures wing incidence, dihedral, sweep, and control surface alignment. Asymmetry = roll/yaw tendencies in flight. Done after structural repair or heavy maintenance."},{"e":"AF","t":"Landing Gear","d":2,"q":"Skid-type landing gear on helicopters is inspected for:","o":["Paint condition","Cracks, deformation, wear at crosstubes, and proper ground clearance","Only cleanliness","Tire pressure"],"c":1,"x":"[TP14038 23.3] Skid tubes wear at ground contact points. Crosstube attachments carry landing loads and are fatigue-prone. Hard landings require detailed inspection per maintenance manual."},{"e":"AF","t":"Instruments","d":3,"q":"An Air Data Computer (ADC) receives inputs from:","o":["Only the compass","Pitot and static sources, temperature probes, and AOA sensors to compute airspeed, altitude, vertical speed, and Mach number","Engine instruments","GPS only"],"c":1,"x":"[TP14038 28.4] ADC digitally computes what separate analog instruments used to do individually. Feeds data to EFIS displays, autopilot, FMS, and other systems."},{"e":"AF","t":"Comms/Nav/Autopilot","d":3,"q":"Weather radar on aircraft:","o":["Detects all weather equally","Detects precipitation (rain, hail) and turbulence by analyzing radar returns \u2014 helps pilots avoid hazardous weather","Replaces visual observation","Only works on the ground"],"c":1,"x":"[TP14038 29.3] Radar antenna in the nose radome transmits and receives. Different colors (green/yellow/red) indicate precipitation intensity. Tilt control allows scanning at different altitudes."},{"e":"AF","t":"Comms/Nav/Autopilot","d":2,"q":"Emergency frequencies include:","o":["Only 121.5 MHz","121.5 MHz (civil emergency) and 243.0 MHz (military emergency)","Only the local tower frequency","There are no dedicated emergency frequencies"],"c":1,"x":"[TP14038 29.6] 121.5 MHz is monitored by all ATC facilities. 243.0 MHz is the military equivalent. ELTs transmit on 121.5 and 406 MHz (satellite detection)."},{"e":"PP","t":"Turbine Engines","d":3,"q":"Accessory drives on a turbine engine are powered by:","o":["Separate electric motors","The accessory gearbox driven by the engine through a tower shaft from the HP spool","External hydraulic power","Ground power unit"],"c":1,"x":"[TP14038 36.3] The accessory gearbox (AGB) mounts on the engine and is gear-driven. It drives: fuel pump, oil pump, hydraulic pump, generator, starter. Tower shaft connects to HP compressor."},{"e":"PP","t":"Turbine Engines","d":2,"q":"Engine mounts on a turbine engine must:","o":["Only support the weight","Support the engine weight, absorb thrust loads, and isolate vibration from the airframe","Be welded to the wing","Be made of aluminum"],"c":1,"x":"[TP14038 36.4] Mounts transmit thrust and weight while isolating vibration. Typically use vibration-dampening elements. Inspect for cracks, corrosion, and mounting hardware condition."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Built-In Test Equipment (BITE) on modern engines:","o":["Replaces all manual inspections","Provides automated self-testing and fault detection, storing fault codes for maintenance troubleshooting","Only works during flight","Is only on military engines"],"c":1,"x":"[TP14038 40.4] BITE continuously monitors engine systems, records faults, and displays codes for maintenance. Reduces troubleshooting time. Download fault history during maintenance."},{"e":"PP","t":"Recording & Indicating","d":3,"q":"Engine vibration monitoring systems measure vibration in:","o":["Only one axis","Multiple axes (typically radial and axial) at different engine locations","Only during start","Only at idle"],"c":1,"x":"[TP14038 40.3] Accelerometers at specific locations track vibration levels and frequencies. Each frequency signature corresponds to specific components (fan, HP rotor, bearings). Trending catches problems early."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Power is defined as:","o":["Force \u00d7 distance","The rate of doing work (Work \u00f7 Time)","Mass \u00d7 acceleration","Pressure \u00d7 area"],"c":1,"x":"P = W/t. Measured in watts or horsepower. 1 HP = 550 ft-lbs/sec = 746 watts."},{"e":"SPM","t":"Math & Physics","d":3,"q":"One horsepower equals:","o":["550 ft-lbs per minute","550 ft-lbs per second","746 watts","Both B and C"],"c":3,"x":"1 HP = 550 ft-lbs/sec = 33,000 ft-lbs/min = 746 watts. Common conversion on TC exams."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Density of a substance is:","o":["Mass per unit volume","Volume per unit mass","Weight only","Temperature dependent only"],"c":0,"x":"Density = mass/volume (kg/m\u00b3 or lbs/ft\u00b3). Air density decreases with altitude \u2014 affects engine performance and aerodynamics."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Heat is transferred by three methods:","o":["Only radiation","Conduction, convection, and radiation","Only conduction","Only convection"],"c":1,"x":"Conduction = through solid contact. Convection = through fluid movement. Radiation = electromagnetic waves. All three occur in aircraft engines."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Standard atmosphere at sea level: temperature is:","o":["25\u00b0C","15\u00b0C (59\u00b0F)","0\u00b0C","20\u00b0C"],"c":1,"x":"ISA: 15\u00b0C, 29.92\"Hg, density 1.225 kg/m\u00b3. Temperature decreases ~2\u00b0C per 1,000 ft (lapse rate). Know ISA conditions for calculations."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Pressure at the bottom of a column of fluid depends on:","o":["Container shape","Height of the column and fluid density","Width of the container","Temperature only"],"c":1,"x":"P = \u03c1gh. Taller column or denser fluid = higher pressure. Why hydraulic systems use incompressible fluid and why fuel tank pressure increases with fuel depth."},{"e":"SPM","t":"Math & Physics","d":3,"q":"In a hydraulic system, if the input piston area is 2 sq in and output is 10 sq in, the force multiplication is:","o":["2:1","5:1","10:1","20:1"],"c":1,"x":"Force multiplication = output area / input area = 10/2 = 5:1. But distance moved decreases proportionally. Pascal's Law in action."},{"e":"SPM","t":"Math & Physics","d":2,"q":"Potential energy is:","o":["Energy of motion","Stored energy due to position or condition","Heat energy","Sound energy"],"c":1,"x":"Potential = stored (elevated weight, compressed spring, charged battery). Kinetic = motion. Total energy is conserved (converted between forms)."},{"e":"SPM","t":"Math & Physics","d":3,"q":"Strain is:","o":["Force per unit area","Deformation per unit length caused by stress","A type of corrosion","Electrical resistance"],"c":1,"x":"Stress = force/area (cause). Strain = deformation/length (effect). Within elastic limit, stress is proportional to strain (Hooke's Law)."},{"e":"SPM","t":"Math & Physics","d":3,"q":"The absolute zero temperature is:","o":["0\u00b0C","0\u00b0F","-273\u00b0C (0 Kelvin)","-100\u00b0C"],"c":2,"x":"Absolute zero = -273.15\u00b0C = 0 K. Gas law calculations MUST use Kelvin. Convert: K = \u00b0C + 273. Critical for accumulator pre-charge and tire pressure calculations."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"AN bolts with an 'H' in the head marking indicate:","o":["High strength","Drilled head (for safety wire)","Heat treated","Hex head"],"c":1,"x":"H = drilled head for safety wire or cotter pin. X = close tolerance. Dash (-) = standard AN. Know head markings \u2014 classic exam question."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Hi-Lok fasteners are tightened until:","o":["A torque wrench clicks","The collar wrenching element shears off at predetermined torque","They feel tight","An inspection hole aligns"],"c":1,"x":"Hi-Lok collar has a hex element that shears off at the correct torque. Cannot be over-torqued. Widely used in modern aircraft structure."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"NAS close-tolerance bolts are used in:","o":["Any application","Reamed holes where precise fit and shear strength are required","Only wood structures","Temporary installations"],"c":1,"x":"Close-tolerance = machined to exact diameter for reamed holes. Carries shear loads through the bolt body (not threads). Higher shear strength than standard bolts."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"A clevis bolt is designed for:","o":["Tension loads","Shear loads only (used with a clevis pin)","Both tension and shear","Compression only"],"c":1,"x":"Clevis bolts have a slotted head for screwdriver installation. Used only in shear applications (control system clevises). NOT for tension \u2014 the head isn't strong enough."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Lock washers are:","o":["Acceptable on all aircraft applications","Generally NOT used on aircraft because they can damage surfaces and lose spring temper","Required on every bolt","Only used with castle nuts"],"c":1,"x":"Lock washers damage mating surfaces, can embed and lose locking ability. Aircraft use positive locking: cotter pins, safety wire, self-locking nuts instead."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Control cable 7\u00d719 construction means:","o":["7 wires, 19 strands","7 strands of 19 wires each (133 total wires)","7mm \u00d7 19mm dimensions","7 feet \u00d7 19 gauge"],"c":1,"x":"7\u00d719 = 7 strands, each containing 19 wires = 133 wires total. Very flexible. 7\u00d77 (49 wires) is stiffer. Larger numbers = more flexibility."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"Swaged cable terminals must be inspected with:","o":["Visual only","A go/no-go gauge to verify proper swage diameter","A torque wrench","An ohmmeter"],"c":1,"x":"Go/no-go gauge checks that the swage was compressed to the correct diameter. Under-swaged = weak joint. Over-swaged = damaged cable. Both are rejection criteria."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"AN fittings use a flare angle of:","o":["45 degrees","37 degrees","30 degrees","60 degrees"],"c":1,"x":"AN = 37\u00b0 flare. AC (automotive) = 45\u00b0 flare. NEVER interchange \u2014 different angles won't seal properly. Look for the fitting style to determine which system."},{"e":"SPM","t":"Aircraft Hardware","d":3,"q":"Teflon (PTFE) hose is used in aircraft because:","o":["It's cheapest","It's compatible with virtually all aircraft fluids and handles extreme temperatures (-65\u00b0F to +450\u00b0F)","It's strongest","It stretches the most"],"c":1,"x":"PTFE hoses resist Skydrol, Jet-A, hydraulic fluid, and synthetic oils. Wide temperature range. Used in high-pressure, high-temperature applications. More expensive than rubber."},{"e":"SPM","t":"Aircraft Hardware","d":2,"q":"The purpose of a grommet in a hydraulic or electrical installation is:","o":["To increase flow","To protect hoses/wires from chafing where they pass through bulkheads or structure","To connect two fittings","To seal against pressure"],"c":1,"x":"Grommets prevent chafing damage at pass-through points. Rubber or plastic. Without them, vibration causes insulation or hose wear = failure."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"A detail drawing shows:","o":["The complete assembly","A single part with all dimensions and specifications needed to manufacture it","Only the title block","A wiring diagram"],"c":1,"x":"Detail drawing = complete info for one part: shape, dimensions, tolerances, material, finish, part number. The manufacturing blueprint."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"An assembly drawing shows:","o":["One part only","How multiple parts fit together, with part numbers referencing detail drawings","Only wiring","Surface finishes"],"c":1,"x":"Assembly drawing shows the relationship between parts. Part numbers/callouts reference individual detail drawings for dimensions. Used during installation and inspection."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A schematic diagram shows:","o":["Physical appearance of components","Functional arrangement using symbols \u2014 how a system works, not physical layout","Physical location of parts","Assembly sequence"],"c":1,"x":"Schematics use standardized symbols (resistor, valve, pump). Shows how the system works logically. Different from installation/wiring diagrams that show physical routing."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"A block diagram shows:","o":["Detailed component internals","System overview using labeled blocks connected by lines showing signal/flow path","Physical component locations","Wiring connections"],"c":1,"x":"Highest level system representation. Each block = a subsystem. Lines show inputs/outputs between blocks. Good for understanding overall system architecture."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"Wiring diagrams differ from schematics in that wiring diagrams show:","o":["How the circuit works logically","The physical routing, wire numbers, connector pins, and terminal locations","Only the power source","Component internals"],"c":1,"x":"Wiring diagram = physical routing for installation and troubleshooting. Shows wire gauge, color codes, pin assignments, connector types. Schematic shows circuit function."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"An exploded view drawing shows:","o":["A destroyed aircraft","Components separated along an axis showing assembly order and relationship","A sectional view","A blueprint"],"c":1,"x":"Exploded views are 3D illustrations with parts pulled apart along assembly axes. Shows sequence and spatial relationships. Common in parts catalogs and maintenance manuals."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"A blueprint revision letter 'C' means:","o":["The original drawing","The third revision of the drawing","The drawing is cancelled","Copy number 3"],"c":1,"x":"Revisions are lettered: A=first change, B=second, C=third. Always verify you're using the latest revision. Revision block lists what changed and when."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"Cross-hatching in a sectional view indicates:","o":["Empty space","Solid material that has been 'cut through'","A hidden feature","A moving part"],"c":1,"x":"Different cross-hatch patterns indicate different materials (steel, aluminum, rubber, etc.). Spacing and angle of lines follow standard conventions."},{"e":"SPM","t":"Aircraft Drawing","d":2,"q":"Extension lines on a drawing:","o":["Show hidden edges","Extend from the feature to show where dimension lines start and end","Indicate center lines","Show cutting planes"],"c":1,"x":"Extension lines are thin lines drawn from the feature edges. Dimension lines with arrowheads touch the extension lines. The dimension value is placed between them."},{"e":"SPM","t":"Aircraft Drawing","d":3,"q":"A note on a drawing reading 'UNLESS OTHERWISE SPECIFIED, TOLERANCES \u00b10.010' means:","o":["All dimensions are exact","Any dimension without its own tolerance can vary by \u00b10.010 from the stated value","Only hole sizes can vary","The drawing is approximate"],"c":1,"x":"General tolerance note in title block applies to all dimensions that don't have individual tolerances called out. Tighter tolerances are stated at the specific dimension."},{"e":"SPM","t":"General Servicing","d":2,"q":"Halon 1211 extinguishers are used for:","o":["Class D fires only","Class A, B, and C fires \u2014 effective multipurpose agent","Class D fires only","Only electrical fires"],"c":1,"x":"Halon 1211 (BCF): versatile, clean agent. Leaves no residue. Being phased out for environmental reasons. Know fire class applicability."},{"e":"SPM","t":"General Servicing","d":2,"q":"CO2 fire extinguishers should NOT be used:","o":["On electrical fires","In enclosed spaces without ventilation \u2014 CO2 displaces oxygen","On paper fires","On liquid fires"],"c":1,"x":"CO2 is an asphyxiant. In enclosed cockpits or confined spaces, it can displace breathable air. Also, the discharge horn gets extremely cold \u2014 frostbite risk."},{"e":"SPM","t":"General Servicing","d":3,"q":"When jacking an aircraft, the maximum wind speed for safe operations is:","o":["Any wind speed is fine","As specified in the maintenance manual \u2014 typically 15-25 knots maximum","100 knots","Only calm conditions"],"c":1,"x":"Wind can topple a jacked aircraft. Specific limits vary by aircraft type. Always check the manual. Position tail into wind if possible. Use tail stands when required."},{"e":"SPM","t":"General Servicing","d":2,"q":"Before starting an aircraft engine, the area around the propeller/intake must be:","o":["Cleaned of FOD and all personnel warned and clear","Painted with safety markings","Only checked by the pilot","Nothing special required"],"c":0,"x":"FOD damage and personnel injury prevention. Clear the area, check for loose objects, verify chocks/brakes, ensure fire extinguisher is available."},{"e":"SPM","t":"General Servicing","d":3,"q":"Hydraulic fluid types MIL-H-5606 (red), MIL-PRF-83282 (red), and Skydrol (purple):","o":["Can be freely mixed","Must NEVER be mixed \u2014 they are chemically incompatible and will damage seals","Are identical except for color","Differ only in viscosity"],"c":1,"x":"Mineral-based (5606/83282) and phosphate ester (Skydrol) are completely incompatible. Mixing destroys seals, causes corrosion, and renders the system inoperative. Purple = Skydrol, Red = mineral."},{"e":"SPM","t":"General Servicing","d":2,"q":"Oxygen system servicing requires:","o":["Any compressed gas","Only aviator's breathing oxygen \u2014 never industrial oxygen","Medical oxygen is preferred","Welding oxygen works fine"],"c":1,"x":"Aviator's breathing oxygen has strict moisture limits (prevents freezing in regulators) and purity requirements. Industrial and welding O2 may contain contaminants."},{"e":"SPM","t":"General Servicing","d":2,"q":"Tire inflation on aircraft should be done:","o":["With compressed air only","With dry nitrogen to prevent moisture and reduce fire/explosion risk","With helium","With any available gas"],"c":1,"x":"Nitrogen is inert (won't support combustion), dry (no moisture to freeze or corrode), and stable with temperature. Air contains moisture and oxygen \u2014 fire risk in hot brakes."},{"e":"SPM","t":"General Servicing","d":3,"q":"When towing an aircraft, the maximum towing speed is:","o":["Whatever is convenient","Walking speed \u2014 slow enough for the tail walker and wing walkers to keep up","30 km/h","Full vehicle speed"],"c":1,"x":"Walking pace. Wing walkers at each wingtip, tail walker if required. Bypass pin installed in nose gear steering to allow full range. Check for obstructions before moving."},{"e":"SPM","t":"General Servicing","d":2,"q":"MIL-PRF-83282 replaced MIL-H-5606 because it:","o":["Is a different color","Has a higher flash point (less fire hazard) while being compatible with 5606 systems","Is cheaper","Flows better at all temperatures"],"c":1,"x":"83282 = synthetic hydrocarbon, higher flash point = reduced fire risk. Drop-in replacement for 5606 in most systems. Both are red. Check aircraft maintenance manual for approved fluid."},{"e":"SPM","t":"General Servicing","d":3,"q":"Foreign Object Damage (FOD) prevention includes:","o":["Only cleaning after work","Tool control, clean work areas, pocket checks, inlet/exhaust covers, and regular FOD walks","Only securing engine covers","Only wearing a uniform"],"c":1,"x":"FOD is the #1 preventable cause of engine damage. Every loose tool, washer, safety wire piece, or bit of debris is a potential engine killer. Your responsibility every day."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"The most common metal in aircraft construction is:","o":["Steel","Aluminum alloy (2024, 7075)","Titanium","Magnesium"],"c":1,"x":"Aluminum alloys dominate aircraft structure: 2024-T3 (damage tolerant), 7075-T6 (high strength). Steel for landing gear, titanium for high-stress/high-heat applications."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"7075-T6 aluminum is used where:","o":["Corrosion resistance is the only concern","High strength is required (wing spars, fittings, structural members)","Good weldability is needed","Only in non-structural applications"],"c":1,"x":"7075-T6 = one of the strongest aluminum alloys. Used for primary structure. More susceptible to stress corrosion than 2024. Often Alclad for corrosion protection."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Annealing aluminum makes it:","o":["Harder and stronger","Softer and more workable for forming","More corrosion resistant","Magnetic"],"c":1,"x":"Annealing (heating + slow cooling) = 'O' temper = dead soft. Used when forming tight bends. Must be re-heat-treated after forming to restore strength for structural use."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Crevice corrosion occurs:","o":["Only in open air","In tight gaps where moisture is trapped and oxygen is depleted (lap joints, under fasteners)","Only on painted surfaces","Only at high temperatures"],"c":1,"x":"Stagnant moisture in tight joints creates oxygen-depleted zones that accelerate corrosion. Prevention: proper sealing, drainage, and sealant in lap joints."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"The galvanic series helps determine:","o":["Which metal is stronger","Which metal will corrode when two dissimilar metals are in contact with an electrolyte","Which metal conducts better","Which metal weighs less"],"c":1,"x":"Metals far apart on the galvanic series = severe corrosion of the more anodic (active) metal. Aluminum + steel in contact = aluminum corrodes. Use barrier compounds to separate."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"Corrosion is best prevented by:","o":["Ignoring it until inspection","Proper surface protection (primer, paint, sealant), drainage, and regular inspection","Using only one type of metal","Heating the structure"],"c":1,"x":"Prevention > treatment. Maintain paint/primer, seal lap joints, ensure drain holes are open, apply corrosion preventive compounds (CPC) to bare metal, inspect regularly."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Titanium is used in aircraft for:","o":["Low-cost applications","High-strength, high-temperature applications (engine components, firewalls, landing gear fittings)","Non-structural fairings only","Cabin interior only"],"c":1,"x":"Titanium: excellent strength-to-weight ratio, corrosion resistant, withstands high temperatures. Expensive to machine. Used where steel is too heavy and aluminum too weak or hot."},{"e":"SPM","t":"Metallurgy & Corrosion","d":2,"q":"To remove corrosion from aluminum:","o":["Use steel wool","Use approved aluminum-safe methods: Scotch-Brite pads, aluminum wool, or chemical treatment","Sandblast it","Use a wire brush"],"c":1,"x":"Steel wool/wire brush embeds steel particles in aluminum = galvanic corrosion later. Only use aluminum-compatible abrasives. Chemical treatments (Alodine) convert remaining corrosion."},{"e":"SPM","t":"Metallurgy & Corrosion","d":3,"q":"Magnesium alloys in aircraft are:","o":["Very corrosion resistant","Very susceptible to corrosion and must be carefully protected","Heavier than aluminum","Non-flammable"],"c":1,"x":"Magnesium is the lightest structural metal but corrodes aggressively. Requires chromate treatment, primer, and paint. Highly flammable in chip/powder form. Special fire extinguisher needed (Class D)."},{"e":"SPM","t":"Metallurgy & Corrosion","d":4,"q":"Hydrogen embrittlement can occur in steel parts that are:","o":["Exposed to UV light","Exposed to hydrogen during electroplating, pickling, or improper cleaning processes","Stored at room temperature","Used at low stress levels"],"c":1,"x":"Hydrogen absorbed during chemical processes diffuses into steel grain boundaries causing cracking under stress. Bake parts after plating to drive out hydrogen. Very dangerous for high-strength steel fasteners."},{"e":"SPM","t":"NDT","d":2,"q":"The five main NDT methods are:","o":["Only visual","Visual, liquid penetrant, magnetic particle, eddy current, ultrasonic, and radiographic","Only X-ray","Only magnetic"],"c":1,"x":"VT, PT, MPI, ET, UT, RT \u2014 each has specific capabilities. Know which method works on which materials and defect types. TC tests method selection."},{"e":"SPM","t":"NDT","d":3,"q":"Penetrant inspection process steps in order:","o":["Apply developer then penetrant","Clean surface, apply penetrant, dwell time, remove excess, apply developer, inspect","Apply penetrant directly to dirty surface","Inspect then apply penetrant"],"c":1,"x":"1) Clean 2) Apply penetrant 3) Dwell (soak time) 4) Remove excess penetrant 5) Apply developer 6) Inspect. Each step is critical \u2014 especially cleaning."},{"e":"SPM","t":"NDT","d":3,"q":"Magnetic particle inspection requires the part to be:","o":["Non-magnetic","Magnetized \u2014 either with permanent magnets, electromagnets, or current flow through the part","Heated above 500\u00b0F","Submerged in water"],"c":1,"x":"The part must be magnetized so defects disrupt the magnetic field and attract particles. Longitudinal and circular magnetization may both be needed for full coverage."},{"e":"SPM","t":"NDT","d":3,"q":"After magnetic particle inspection, the part must be:","o":["Left magnetized","Demagnetized to prevent interference with instruments and attraction of metal debris","Painted immediately","Stress relieved"],"c":1,"x":"Residual magnetism can affect compasses, attract metal chips (accelerating wear), and interfere with nearby instruments. Demagnetize after inspection."},{"e":"SPM","t":"NDT","d":2,"q":"Radiographic (X-ray) inspection requires:","o":["No special precautions","Strict radiation safety procedures including restricted areas, dosimeters, and certified operators","Only normal PPE","A quiet environment"],"c":1,"x":"Radiation hazard. Restricted access areas, lead shielding, monitoring badges, and trained/certified operators. Never enter an active radiography area."},{"e":"SPM","t":"NDT","d":3,"q":"Eddy current inspection can detect:","o":["Only surface cracks","Surface and near-surface cracks, plus measure conductivity, coating thickness, and sort alloys","Only deep internal flaws","Only corrosion"],"c":1,"x":"Versatile: crack detection, conductivity measurement (alloy sorting), coating thickness, and heat damage detection. Works on any conductive material."},{"e":"SPM","t":"NDT","d":3,"q":"A-scan ultrasonic display shows:","o":["A picture of the flaw","Signal amplitude vs. time (distance) \u2014 peaks indicate surfaces and flaws","A cross-section image","Nothing useful"],"c":1,"x":"A-scan: horizontal = time/distance, vertical = signal amplitude. Initial pulse on left, back-wall echo on right. Flaw echoes appear between them. Most common UT display."},{"e":"SPM","t":"NDT","d":4,"q":"For inspecting a non-ferromagnetic aluminum wing skin for subsurface fatigue cracks around fastener holes:","o":["Use magnetic particle inspection","Use dye penetrant (it finds everything)","Use eddy current or ultrasonic inspection","Visual inspection is sufficient"],"c":2,"x":"Aluminum = non-ferromagnetic (no MPI). PT = surface only. Subsurface cracks around fasteners need ET (bolt hole eddy current) or UT. This is THE classic TC NDT selection question."},{"e":"SPM","t":"NDT","d":2,"q":"Tap testing on composites uses:","o":["An ultrasonic probe","A coin or tap hammer \u2014 listening for difference between sharp ring (good) and dull thud (defect)","X-ray equipment","Magnetic particles"],"c":1,"x":"Simplest composite inspection. Good bond = sharp ring. Disbond/delamination = dull thud. Quick but limited \u2014 only detects near-surface defects. UT needed for thorough inspection."},{"e":"SPM","t":"NDT","d":3,"q":"Borescope inspection is used to:","o":["Test electrical circuits","Visually inspect internal areas without disassembly (engine combustion chambers, cylinders, turbine blades)","Measure thread pitch","Test fluid pressure"],"c":1,"x":"Rigid or flexible borescopes/videoscopes inserted through inspection ports. See internal condition of engines, tubes, and cavities. Essential for turbine engine hot section inspection without removal."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Rivet spacing (pitch) is measured:","o":["Edge to edge","Center to center of adjacent rivets","Head to head","Between rows only"],"c":1,"x":"Pitch = center-to-center in a row. Minimum 3D. Too close = cracking between holes. Too far = inadequate load transfer. Follow SRM specifications."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"An over-driven rivet shows:","o":["Too-small shop head","A shop head that is too flat/wide with possible cracking of surrounding material","A perfectly formed head","No shop head"],"c":1,"x":"Over-driven: head too flat and wide, skin may be dimpled or cracked around the hole. Repair: drill out and replace with next size up. Cannot be left in service."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"The setback in a sheet metal bend is:","o":["The distance from the bend tangent line to the mold point","The amount of stretch","The bend radius","The sheet thickness"],"c":0,"x":"Setback = bend radius + sheet thickness (for 90\u00b0 bend). Used in bend calculations to determine where to place bend lines on flat layout."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Cleco fasteners are used during sheet metal work to:","o":["Permanently join sheets","Temporarily hold sheets in alignment during drilling and riveting","Replace rivets","Measure hole size"],"c":1,"x":"Clecos (spring-type temporary fasteners) hold sheets together after drilling pilot holes. Allows checking alignment before committing to permanent rivets."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"When drilling through aluminum, the correct drill speed is:","o":["As fast as possible","High speed with light pressure \u2014 let the drill do the work","Slow speed with heavy pressure","It doesn't matter"],"c":1,"x":"High RPM, light feed. Heavy pressure causes the drill to grab. Backing plate when drilling through to prevent burrs. Use cutting fluid for cleaner holes."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"A flush patch repair uses:","o":["Protruding rivets","Countersunk or dimpled rivets so the repair surface is smooth and aerodynamically clean","No rivets","Only adhesive"],"c":1,"x":"Flush repairs maintain the original surface profile. Important on aerodynamic surfaces (wing skins). Countersink or dimple depending on material thickness."},{"e":"SPM","t":"Sheet Metal & Composites","d":2,"q":"Composite layup must follow the specified ply orientation because:","o":["It looks better","Fiber direction determines the strength in each direction \u2014 wrong orientation = inadequate strength","Color matching","Weight reduction"],"c":1,"x":"Fibers are strong along their length, weak across. Plies at 0\u00b0/45\u00b0/90\u00b0 etc. are engineered for specific load paths. Wrong orientation = structurally inadequate repair."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Vacuum bagging in composite repair:","o":["Is optional","Applies atmospheric pressure evenly during cure to compact plies and remove air/volatiles","Adds structural strength","Is only for factory use"],"c":1,"x":"Vacuum compacts layers together, removes trapped air (which creates voids), and forces excess resin out. Essential for quality composite repairs. ~14.7 PSI atmospheric pressure."},{"e":"SPM","t":"Sheet Metal & Composites","d":3,"q":"Fiberglass, carbon fiber, and Kevlar differ in that carbon fiber provides:","o":["The lowest strength","The highest stiffness-to-weight ratio but is brittle on impact","The most flexibility","The lowest cost"],"c":1,"x":"Carbon = stiffest and strongest per weight but shatters on impact. Kevlar = best impact resistance but hard to cut/machine. Fiberglass = cheapest, good general purpose. Many aircraft use all three."},{"e":"SPM","t":"Sheet Metal & Composites","d":4,"q":"A potted insert in a honeycomb panel is used to:","o":["Fill voids only","Provide a solid anchor point for fasteners in the honeycomb core","Replace the face sheet","Add weight for balance"],"c":1,"x":"Honeycomb core can't hold fasteners. Potting compound fills cells around the fastener location, creating a solid block. Must be done per approved data \u2014 wrong potting compound or technique = failure."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"A vernier caliper measures:","o":["Only outside dimensions","Outside, inside, and depth dimensions to 0.001 inch","Torque values","Temperature"],"c":1,"x":"Versatile measuring tool. Main scale + vernier scale for precision. Digital versions are increasingly common. Know how to read the vernier scale for the exam."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Safety wire is always installed using:","o":["Regular pliers","Dedicated safety wire pliers that twist the wire uniformly","Vise grips","Your fingers"],"c":1,"x":"Safety wire pliers grip and twist the wire evenly. Twist rate: 6-8 twists per inch. Cut end tucked away from personnel. Pull direction must tend to TIGHTEN the fastener."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A protractor head on a combination set measures:","o":["Pressure","Angles from 0\u00b0 to 180\u00b0","Wire gauge","Torque"],"c":1,"x":"Protractor head + blade measures angles for checking control surface deflections, bend angles, and installation angles. Part of the combination square set."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Feeler gauges measure:","o":["Large distances","Small gaps between surfaces (valve clearance, bearing play, seal gaps)","Voltage","Fluid pressure"],"c":1,"x":"Thin metal leaves of known thickness inserted into gaps. Used for checking valve lash, breaker point gaps, and any small clearance measurement."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"A multimeter (VOM) can measure:","o":["Only voltage","Voltage, resistance, and current \u2014 the three fundamental electrical measurements","Only current","Only resistance"],"c":1,"x":"Volt-Ohm-Milliammeter. Essential troubleshooting tool. Digital multimeters (DMM) are standard. Know which setting and range to use. Always start on the highest range."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Drill bit sizes for aircraft use include:","o":["Only metric sizes","Number drills, letter drills, and fractional sizes","Only one standard","Only fractional sizes"],"c":1,"x":"Number (1-80, smaller number = larger), letter (A-Z), and fractional (1/16, 1/8, etc.). Must match rivet diameter precisely. A #30 drill = standard for 3/32 rivets."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Die grinders and pneumatic drills are set to the correct speed using:","o":["Guesswork","An air pressure regulator set per the tool manufacturer's specifications","Maximum pressure always","Minimum pressure always"],"c":1,"x":"Correct air pressure = correct RPM. Too high = tool overspeeds (dangerous, poor results). Too low = insufficient power. Check the tool rating plate."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"When using a rivet gun, the regulator pressure should be set to:","o":["Maximum at all times","The minimum pressure that will properly set the rivet \u2014 excess pressure damages surrounding structure","It doesn't matter","Half of maximum"],"c":1,"x":"Start low and increase until rivets set properly. Too much pressure = over-driven rivets, damaged skins, and excessive noise. Gun type and rivet size determine the setting."},{"e":"SPM","t":"Tools & Measuring","d":2,"q":"Thread pitch gauge (screw pitch gauge) identifies:","o":["Wire diameter","The number of threads per inch on a fastener","Torque values","Material type"],"c":1,"x":"Hold gauge leaves against the threads until a perfect match is found. Identifies UNC (coarse), UNF (fine), or metric pitch. Essential for selecting correct replacement fasteners."},{"e":"SPM","t":"Tools & Measuring","d":3,"q":"An outside micrometer reads 0.375 inches. The thimble is at:","o":["The 3 line on the sleeve","3 major divisions + 1 minor division on sleeve + 0 on thimble","Exactly 375 on the thimble","Random position"],"c":1,"x":"Sleeve: 3 major (0.300) + 0 minor (0.000) + thimble: 25 (0.025\u00d7... wait \u2014 0.375 = 3 major(0.300) + 3 minor(0.075) + thimble 0. Know how to read a mic for the exam."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Moment equals:","o":["Weight only","Weight \u00d7 arm (distance from datum)","Arm \u00f7 weight","CG location"],"c":1,"x":"Moment = W \u00d7 A. Fundamental W&B calculation. All moments are summed, then divided by total weight to find CG location."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Basic empty weight includes:","o":["Only the airframe","Airframe, engines, fixed equipment, unusable fuel, and full operating fluids","Payload and crew","Fuel and passengers"],"c":1,"x":"Basic empty weight = everything permanently installed + fluids that can't be drained + unusable fuel. The starting point for all loading calculations."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Maximum ramp weight exceeds maximum takeoff weight by a small amount to account for:","o":["Passenger weight","Fuel burned during taxi from ramp to runway","CG shift in flight","Landing gear weight"],"c":1,"x":"Ramp weight = MTOW + fuel burned during start/taxi. Typically 10-50 lbs difference. After taxi, the aircraft must be AT or below MTOW for takeoff."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"If an item is removed from an aircraft, the effect on CG depends on:","o":["Only the item's weight","The item's weight AND its arm relative to the current CG","The item's color","The item's age"],"c":1,"x":"Removing weight ahead of CG moves CG aft. Removing weight behind CG moves CG forward. The farther from CG, the greater the effect. Same weight, different arm = different CG shift."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"The MAC (Mean Aerodynamic Chord) is used to express CG as:","o":["A station number only","A percentage of the chord \u2014 e.g., 25% MAC means CG is 25% back from the leading edge of the MAC","A weight value","A distance from the tail"],"c":1,"x":"CG in % MAC is the standard way to express CG on transport aircraft. It's easier to compare across different aircraft types than station numbers."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"LEMAC stands for:","o":["Left Engine Mean Aerodynamic Control","Leading Edge of the Mean Aerodynamic Chord","Landing Equipment Maintenance Advisory Committee","Lateral Engine Mount Attachment Component"],"c":1,"x":"LEMAC = the station number of the front edge of the MAC. CG in % MAC = ((CG station - LEMAC) \u00f7 MAC length) \u00d7 100. TEMAC = trailing edge."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"An aircraft loaded over the maximum gross weight is:","o":["Acceptable for short flights","Dangerous \u2014 exceeds structural design limits for takeoff, flight, and landing","Only a problem during landing","Not a concern with strong engines"],"c":1,"x":"Over gross = higher stall speed, longer takeoff/landing distances, reduced climb rate, possible structural failure during turbulence or maneuvers. Never exceed max weight."},{"e":"SPM","t":"Weight & Balance","d":4,"q":"An aircraft weighs 2,500 lbs at CG station 82. Adding 200 lbs at station 120 moves the CG to:","o":["Station 82","Station 84.8","Station 120","Station 90"],"c":1,"x":"New CG = (2500\u00d782 + 200\u00d7120) \u00f7 2700 = (205000+24000)/2700 = 229000/2700 = 84.8. Practice these calculations \u2014 they appear on every SPM exam."},{"e":"SPM","t":"Weight & Balance","d":3,"q":"Adverse loading CG check verifies:","o":["Normal loading only","That the most extreme forward and aft loading configurations still fall within CG limits","That fuel quantity is correct","Engine performance"],"c":1,"x":"Check: most forward CG (front seats full, rear empty, low fuel) AND most aft CG (rear seats full, front empty, low fuel). Both must be within limits for the aircraft to be safe in all loading conditions."},{"e":"SPM","t":"Weight & Balance","d":2,"q":"Tare weight on weighing scales is:","o":["The aircraft weight","The weight of chocks, blocks, and equipment on the scales that is NOT part of the aircraft \u2014 must be subtracted","Extra fuel weight","Passenger weight"],"c":1,"x":"Tare = anything on the scales that isn't the aircraft (chocks, jacks, tail support). Subtract tare from scale readings to get true aircraft weight."},{"e":"AF","t":"Aerodynamics","d":2,"q":"Relative wind is:","o":["Wind at the airport","The airflow opposite and equal to the aircraft's flight path","Headwind only","Crosswind component"],"c":1,"x":"Relative wind is always opposite to the direction of flight. AOA is measured between chord line and relative wind."},{"e":"AF","t":"Aerodynamics","d":3,"q":"The boundary layer on a wing is:","o":["The outer skin panel","The thin layer of air immediately adjacent to the surface where friction slows the airflow","The area beyond the wingtip","A structural component"],"c":1,"x":"Laminar boundary layer (smooth, low drag) transitions to turbulent (thicker, more drag). Stall occurs when the boundary layer separates from the surface."},{"e":"AF","t":"Aerodynamics","d":2,"q":"Flaps increase:","o":["Only drag","Both lift (by changing camber) and drag","Only speed","Only range"],"c":1,"x":"Flaps increase wing camber = more lift at lower speeds. Also increase drag significantly. Used for slower takeoff/landing speeds and steeper approaches."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Ground effect increases lift efficiency because:","o":["Air is denser near ground","Wingtip vortices are disrupted by the ground, reducing induced drag","The runway pushes air upward","Engine power increases near ground"],"c":1,"x":"Within one wingspan of the ground, vortices are compressed and weakened = less induced drag = more lift for same AOA. Aircraft 'floats' in ground effect during landing."},{"e":"AF","t":"Aerodynamics","d":2,"q":"The center of pressure on a wing:","o":["Never moves","Moves forward as AOA increases (up to the stall angle)","Moves aft as AOA increases","Is always at the CG"],"c":1,"x":"As AOA increases, the center of lift moves forward. At stall, it shifts rapidly aft. This shift affects aircraft pitch stability and trim requirements."},{"e":"AF","t":"Aerodynamics","d":3,"q":"Mach number is:","o":["Aircraft speed in mph","The ratio of aircraft speed to the speed of sound at that altitude/temperature","Engine RPM percentage","A navigation frequency"],"c":1,"x":"Mach 1.0 = speed of sound (~661 knots at sea level, decreasing with altitude/temperature). Important for high-speed aircraft \u2014 aerodynamic effects change dramatically near Mach 1."},{"e":"AF","t":"Aerodynamics","d":2,"q":"Adverse yaw is caused by:","o":["Rudder deflection","The raised wing's aileron producing more drag than the lowered wing's aileron","Engine torque","Crosswind"],"c":1,"x":"Down aileron = more lift AND more drag on that wing. This drag yaws the nose toward the raised wing (opposite to the turn). Compensated by rudder input and differential ailerons."},{"e":"AF","t":"Aerodynamics","d":3,"q":"An aircraft in a spin is:","o":["Flying normally","In an aggravated stall with autorotation \u2014 one wing more deeply stalled than the other","Climbing rapidly","In level flight"],"c":1,"x":"Spin = stalled + yawing. One wing has higher AOA (deeper stall, less lift) than the other. Recovery: reduce power, full opposite rudder, forward stick, level wings."},{"e":"AF","t":"Aer
